<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Jawad's Escape Room — Ecosystems</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#1a1a2e;--bg2:#16213e;--text:#e0e0e0;--text-bright:#ffffff;
--r1:#2d6a4f;--r1a:#40916c;--r1bg:rgba(45,106,79,.12);
--r2:#1d3557;--r2a:#457b9d;--r2bg:rgba(29,53,87,.12);
--r3:#e76f51;--r3a:#f4a261;--r3bg:rgba(231,111,81,.12);
--green:#4caf50;--red:#ef5350;--gold:#ffd700;
--glow-r1:0 0 15px rgba(64,145,108,.5);--glow-r2:0 0 15px rgba(69,123,157,.5);--glow-r3:0 0 15px rgba(244,162,97,.5);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent;}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;}
.screen.active{display:flex;}

/* START SCREEN */
#startScreen{justify-content:center;align-items:center;text-align:center;background:radial-gradient(ellipse at 50% 40%,#1a2a4e 0%,var(--bg) 70%);}
.brand-line{font-size:clamp(10px,1.4vw,14px);text-transform:uppercase;letter-spacing:4px;color:#4dd0e1;margin-bottom:18px;font-weight:600;}
.start-title{font-size:clamp(28px,5vw,56px);font-weight:700;color:var(--text-bright);text-shadow:0 0 30px rgba(77,208,225,.3),0 0 60px rgba(77,208,225,.15);line-height:1.15;margin-bottom:12px;}
.start-divider{width:120px;height:2px;background:#4dd0e1;margin:0 auto 14px;box-shadow:0 0 8px #4dd0e1;}
.start-sub{font-size:clamp(14px,2vw,20px);color:rgba(255,255,255,.6);margin-bottom:40px;letter-spacing:1px;}
.start-btn{font-size:clamp(16px,2.2vw,22px);padding:16px 48px;background:linear-gradient(135deg,#4dd0e1,#26a69a);color:#fff;border-radius:8px;font-weight:700;letter-spacing:1px;box-shadow:0 0 20px rgba(77,208,225,.3);transition:transform .2s,box-shadow .2s;}
.start-btn:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(77,208,225,.5);}
.start-footer{position:absolute;bottom:24px;font-size:11px;text-transform:uppercase;letter-spacing:3px;color:rgba(255,255,255,.25);}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.08);min-height:48px;flex-shrink:0;z-index:10;position:relative;}
.top-bar .room-info{font-size:clamp(13px,1.6vw,16px);font-weight:600;color:var(--text-bright);}
.top-bar .room-progress{font-size:clamp(11px,1.3vw,13px);color:rgba(255,255,255,.5);margin-left:8px;}
.streak-icon{font-size:18px;margin-left:10px;display:none;}
.streak-icon.active{display:inline-block;animation:fireFlicker 0.6s ease-in-out infinite alternate;}
.puzzles-cleared{margin-left:auto;font-size:clamp(12px,1.5vw,15px);font-weight:600;color:var(--text-bright);white-space:nowrap;}

/* CODE VAULT */
.code-vault{position:fixed;top:8px;right:8px;z-index:100;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:8px 12px;backdrop-filter:blur(4px);min-width:140px;}
.vault-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:6px;}
.vault-rooms{display:flex;gap:10px;justify-content:center;}
.vault-room{text-align:center;}
.vault-room-label{font-size:9px;color:rgba(255,255,255,.35);margin-bottom:3px;}
.vault-digits{display:flex;gap:3px;}
.vault-digit{width:22px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border-radius:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.25);transition:all .4s ease;}
.vault-digit.revealed{border-color:currentColor;background:rgba(255,255,255,.1);animation:digitRevealVault .5s ease;}

/* MISSION LINE */
.mission-line{text-align:center;padding:8px 16px;font-size:clamp(12px,1.5vw,15px);color:rgba(255,255,255,.55);font-style:italic;flex-shrink:0;}

/* PUZZLE AREA */
.puzzle-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px;overflow-y:auto;position:relative;}
.puzzle-instruction{font-size:clamp(12px,1.4vw,15px);color:rgba(255,255,255,.5);margin-bottom:10px;text-align:center;}
.micro-progress{font-size:clamp(11px,1.2vw,13px);color:rgba(255,255,255,.4);margin-bottom:8px;text-align:center;}

/* BOTTOM BAR */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0;min-height:48px;}
.scanner-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-size:clamp(12px,1.4vw,14px);font-weight:600;transition:all .3s;animation:scannerPulse 2s ease-in-out infinite;}
.scanner-btn:hover{background:rgba(255,255,255,.14);}
.progress-dots{display:flex;gap:8px;position:absolute;left:50%;transform:translateX(-50%);}
.progress-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);transition:all .4s;}
.progress-dot.filled{background:currentColor;box-shadow:0 0 8px currentColor;}

/* CARDS */
.card{padding:clamp(10px,1.5vw,16px) clamp(14px,2vw,22px);border-radius:10px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);cursor:pointer;transition:all .25s ease;font-size:clamp(13px,1.6vw,17px);text-align:center;min-height:48px;min-width:48px;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;position:relative;}
.card:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);}
.card.selected{transform:scale(1.05);border-width:3px;box-shadow:0 0 20px currentColor;background:rgba(255,255,255,.12);}
.card.selected::after{content:'▶ SELECTED';position:absolute;top:-10px;right:-6px;font-size:9px;background:currentColor;color:#000;padding:2px 6px;border-radius:4px;font-weight:700;}
.card.correct{border-color:var(--green)!important;background:rgba(76,175,80,.15)!important;box-shadow:0 0 15px rgba(76,175,80,.4)!important;}
.card.correct::before{content:'✔';position:absolute;top:4px;right:8px;color:var(--green);font-size:14px;font-weight:700;}
.card.wrong{border-color:var(--red)!important;background:rgba(239,83,80,.12)!important;animation:shakeCard .4s ease;}
.card.wrong::before{content:'✖';position:absolute;top:4px;right:8px;color:var(--red);font-size:14px;font-weight:700;}
.card.dimmed{opacity:.35;pointer-events:none;}
.card.locked{pointer-events:none;border-color:var(--green);background:rgba(76,175,80,.1);box-shadow:0 0 10px rgba(76,175,80,.3);}
.card.locked::before{content:'✔';position:absolute;top:4px;right:8px;color:var(--green);font-size:14px;}

/* MATCH LOCK */
.match-area{display:flex;gap:clamp(16px,3vw,40px);align-items:center;justify-content:center;width:100%;max-width:700px;}
.match-col{display:flex;flex-direction:column;gap:10px;flex:1;max-width:280px;}
.match-col.right .card{justify-content:flex-start;}

/* SEQUENCE */
.seq-area{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:500px;}
.seq-slots{display:flex;gap:10px;margin-bottom:14px;width:100%;}
.seq-slot{flex:1;min-height:56px;border:2px dashed rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,1.4vw,15px);color:rgba(255,255,255,.25);position:relative;}
.seq-slot.filled{border-style:solid;border-color:var(--green);background:rgba(76,175,80,.08);color:var(--text-bright);}
.seq-slot .slot-num{position:absolute;top:-8px;left:8px;font-size:10px;background:rgba(0,0,0,.6);padding:1px 6px;border-radius:3px;color:rgba(255,255,255,.4);}
.seq-options{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;}
.seq-arrow{font-size:18px;color:rgba(255,255,255,.2);align-self:center;}

/* GAUGES (System Scanner) */
.gauges-row{display:flex;gap:clamp(14px,2.5vw,30px);justify-content:center;margin-bottom:16px;}
.gauge{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px;}
.gauge-label{font-size:clamp(10px,1.2vw,12px);font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5);}
.gauge-bar-wrap{width:50px;height:120px;border:2px solid rgba(255,255,255,.15);border-radius:6px;position:relative;overflow:hidden;background:rgba(0,0,0,.3);}
.gauge-fill{position:absolute;bottom:0;width:100%;border-radius:0 0 4px 4px;transition:height .6s ease;}
.gauge-value{font-size:clamp(10px,1.1vw,12px);color:rgba(255,255,255,.4);font-weight:600;}
.scanner-question{font-size:clamp(16px,2.2vw,22px);font-weight:700;color:var(--text-bright);text-align:center;margin:12px 0;}
.answer-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* MYSTERY INPUT */
.chain-flow{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;justify-content:center;}
.chain-box{padding:10px 16px;border-radius:8px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);font-size:clamp(12px,1.5vw,15px);text-align:center;min-width:100px;}
.chain-box.mystery{border-color:var(--gold);background:rgba(255,215,0,.08);animation:mysteryPulse 1.5s ease-in-out infinite;color:var(--gold);font-weight:700;font-size:clamp(16px,2vw,22px);}
.chain-arrow{font-size:22px;color:rgba(255,255,255,.25);}

/* DIAGNOSTIC PANEL */
.diag-panel{width:100%;max-width:600px;}
.diag-header{text-align:center;font-size:clamp(14px,1.8vw,18px);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;color:var(--text-bright);}
.diag-slots{display:flex;gap:16px;margin-bottom:16px;justify-content:center;}
.diag-slot{flex:1;max-width:260px;padding:14px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);text-align:center;min-height:90px;display:flex;flex-direction:column;justify-content:center;transition:all .3s;}
.diag-slot.active{border-color:currentColor;box-shadow:0 0 12px currentColor;}
.diag-slot.locked{border-color:var(--green);background:rgba(76,175,80,.1);}
.diag-slot.inactive{opacity:.35;}
.diag-slot-label{font-size:clamp(11px,1.3vw,13px);color:rgba(255,255,255,.5);margin-bottom:6px;}
.diag-slot-value{font-size:clamp(14px,1.7vw,18px);font-weight:600;color:var(--text-bright);}
.parts-bank{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.part-chip{padding:10px 18px;border-radius:8px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);cursor:pointer;font-size:clamp(12px,1.4vw,15px);transition:all .25s;min-height:48px;display:flex;align-items:center;gap:6px;}
.part-chip:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);}
.part-chip.used{opacity:.25;pointer-events:none;}
.part-chip.wrong-flash{border-color:var(--red);animation:shakeCard .4s ease;}
.diag-check-btn{margin-top:14px;padding:12px 32px;border-radius:8px;font-size:clamp(13px,1.5vw,16px);font-weight:700;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);color:var(--text-bright);transition:all .25s;}
.diag-check-btn:hover{background:rgba(255,255,255,.18);}

/* QUICK FIRE */
.qf-area{width:100%;max-width:500px;text-align:center;}
.qf-header{font-size:clamp(14px,1.8vw,18px);font-weight:700;letter-spacing:2px;margin-bottom:10px;color:var(--text-bright);}
.qf-question{font-size:clamp(16px,2.2vw,22px);font-weight:600;color:var(--text-bright);margin:16px 0;min-height:48px;display:flex;align-items:center;justify-content:center;}
.qf-buttons{display:flex;gap:16px;justify-content:center;}
.qf-btn{padding:14px 32px;border-radius:10px;font-size:clamp(14px,1.8vw,18px);font-weight:700;min-width:140px;min-height:56px;transition:all .25s;}
.qf-btn.confirm{background:rgba(76,175,80,.15);border:2px solid var(--green);color:var(--green);}
.qf-btn.confirm:hover{background:rgba(76,175,80,.25);}
.qf-btn.deny{background:rgba(239,83,80,.15);border:2px solid var(--red);color:var(--red);}
.qf-btn.deny:hover{background:rgba(239,83,80,.25);}
.qf-progress{display:flex;gap:6px;justify-content:center;margin-top:14px;}
.qf-pip{width:28px;height:6px;border-radius:3px;background:rgba(255,255,255,.1);transition:background .3s;}
.qf-pip.correct{background:var(--green);}
.qf-pip.wrong{background:var(--red);}

/* SCANNER OVERLAY */
.scanner-overlay{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.92);border-top:2px solid;padding:16px 20px;z-index:80;animation:slideUp .3s ease;max-height:40vh;overflow-y:auto;}
.scanner-overlay.active{display:block;}
.scanner-text{font-size:clamp(13px,1.5vw,16px);color:rgba(255,255,255,.8);margin-bottom:8px;line-height:1.5;}
.scanner-dismiss{font-size:clamp(11px,1.2vw,13px);color:rgba(255,255,255,.35);cursor:pointer;text-decoration:underline;margin-top:6px;display:inline-block;}

/* CODE ENTRY */
.code-entry-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:90;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.code-entry-overlay.active{display:flex;}
.code-title{font-size:clamp(18px,3vw,28px);font-weight:700;color:var(--text-bright);margin-bottom:6px;}
.code-subtitle{font-size:clamp(13px,1.6vw,16px);color:rgba(255,255,255,.5);margin-bottom:20px;}
.code-inputs{display:flex;gap:10px;margin-bottom:20px;}
.code-input{width:56px;height:64px;font-size:28px;font-weight:700;text-align:center;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.2);border-radius:10px;color:var(--text-bright);outline:none;}
.code-input:focus{border-color:currentColor;box-shadow:0 0 12px currentColor;}
.code-submit{padding:14px 40px;border-radius:10px;font-size:clamp(14px,1.7vw,18px);font-weight:700;color:#fff;transition:all .25s;}
.code-submit:hover{transform:scale(1.03);}
.code-error{color:var(--red);font-size:14px;margin-top:10px;min-height:20px;}

/* PASS THE LAPTOP */
.ptl-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:95;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.ptl-overlay.active{display:flex;}
.ptl-text{font-size:clamp(28px,5vw,48px);font-weight:700;color:var(--text-bright);margin-bottom:8px;letter-spacing:2px;}
.ptl-sub{font-size:clamp(13px,1.6vw,16px);color:rgba(255,255,255,.45);margin-bottom:24px;}
.ptl-ready{padding:16px 48px;border-radius:10px;font-size:clamp(16px,2vw,20px);font-weight:700;color:#fff;transition:all .25s;}

/* DOOR OVERLAY */
.door-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:85;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.door-panel{width:200px;height:280px;border:4px solid;border-radius:14px;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.door-lock{font-size:40px;}
.door-label{font-size:clamp(12px,1.6vw,16px);font-weight:700;color:var(--text-bright);text-transform:uppercase;letter-spacing:2px;}

/* DIGIT REVEAL */
.digit-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:88;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.digit-overlay.active{display:flex;}
.digit-reveal-num{font-size:clamp(60px,12vw,100px);font-weight:700;animation:digitScale .6s ease;text-shadow:0 0 40px currentColor,0 0 80px currentColor;}
.digit-reveal-label{font-size:clamp(13px,1.6vw,16px);color:rgba(255,255,255,.5);margin-top:10px;}
.digit-continue{margin-top:20px;padding:12px 36px;border-radius:8px;font-size:clamp(13px,1.5vw,16px);font-weight:600;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--text-bright);transition:all .25s;}

/* SCAN PREVIEW */
.scan-preview{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:86;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.scan-preview.active{display:flex;}
.scan-label{font-size:clamp(14px,1.8vw,18px);font-weight:700;text-transform:uppercase;letter-spacing:3px;margin-bottom:16px;animation:scanFlicker 1s ease-in-out infinite;}
.scan-visual{width:80%;max-width:500px;min-height:160px;border:2px solid;border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;animation:scanFrame 2s ease;}
.scan-visual-text{font-size:clamp(18px,3vw,32px);}
.scan-visual-sub{font-size:clamp(11px,1.3vw,14px);color:rgba(255,255,255,.4);}

/* FINAL LOCK */
.final-lock-area{width:100%;max-width:700px;}
.final-intro{text-align:center;font-size:clamp(16px,2.2vw,22px);font-weight:700;color:var(--text-bright);margin-bottom:16px;animation:fadeInUp .6s ease;}

/* ESCAPE REPORT */
#escapeReport{justify-content:flex-start;align-items:center;overflow-y:auto;padding:20px;background:radial-gradient(ellipse at 50% 30%,#1a2a4e 0%,var(--bg) 70%);}
.report-escaped{font-size:clamp(32px,6vw,56px);font-weight:700;color:var(--text-bright);text-shadow:0 0 30px rgba(77,208,225,.4);margin:20px 0 6px;animation:escapePulse 1.5s ease infinite alternate;}
.report-brand{font-size:clamp(10px,1.2vw,12px);text-transform:uppercase;letter-spacing:3px;color:rgba(77,208,225,.5);margin-bottom:20px;}
.report-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:20px 28px;max-width:500px;width:100%;margin-bottom:14px;}
.report-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:clamp(13px,1.5vw,16px);}
.report-row:last-child{border-bottom:none;}
.report-label{color:rgba(255,255,255,.5);}
.report-value{font-weight:600;color:var(--text-bright);}
.report-stars{font-size:clamp(28px,5vw,40px);margin:10px 0;}
.report-star{opacity:.2;transition:opacity .4s;}
.report-star.earned{opacity:1;}
.report-badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
.report-badge{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:clamp(11px,1.3vw,14px);}
.report-btns{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
.report-btn{padding:12px 28px;border-radius:8px;font-size:clamp(13px,1.5vw,15px);font-weight:600;transition:all .25s;}
.report-btn.primary{background:linear-gradient(135deg,#4dd0e1,#26a69a);color:#fff;}
.report-btn.secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text);}
.copied-msg{color:var(--green);font-size:13px;margin-top:8px;min-height:18px;}

/* ANIMATIONS */
@keyframes scannerPulse{0%,100%{box-shadow:0 0 5px rgba(255,255,255,.05);}50%{box-shadow:0 0 12px rgba(255,255,255,.12);}}
@keyframes fireFlicker{0%{transform:scale(1);filter:brightness(1);}100%{transform:scale(1.15);filter:brightness(1.3);}}
@keyframes shakeCard{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);};}
@keyframes digitScale{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.2);opacity:1;}100%{transform:scale(1);}}
@keyframes digitRevealVault{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes slideUp{0%{transform:translateY(100%);}100%{transform:translateY(0);}}
@keyframes scanFlicker{0%,100%{opacity:1;}50%{opacity:.5;}}
@keyframes scanFrame{0%{opacity:0;transform:scale(.9);}100%{opacity:1;transform:scale(1);}}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}

// ============= UTILITIES =============
function $(id) { return document.getElementById(id); }
function closeAllOverlays() {
  try {
    ['scannerOverlay','codeEntryOverlay','ptlOverlay','digitOverlay','scanPreview'].forEach(id => {
      const el = $(id);
      if (el) { el.classList.remove('active'); el.style.display = 'none'; }
    });
    state.scannerActive = false;
  } catch(e) { console.error('closeAllOverlays error:', e); }
}
function closeScanner() {
  try {
    const so = $('scannerOverlay');
    so.classList.remove('active'); so.style.display = 'none';
    state.scannerActive = false;
  } catch(e) {}
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
function getRoomColor(ri) { return rooms[ri] ? rooms[ri].color : '#4dd0e1'; }
function getRoomAccent(ri) { return rooms[ri] ? rooms[ri].accent : '#4dd0e1'; }

function spawnParticles(x, y, color, count) {
  try {
    count = Math.min(count || 10, 12);
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      const angle = (Math.PI * 2 * i) / count;
      const dist = 40 + Math.random() * 60;
      p.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};z-index:200;pointer-events:none;--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;animation:particleBurst .6s ease forwards;`;
      document.body.appendChild(p);
      const cleanup = () => { try { p.remove(); } catch(e){} };
      p.addEventListener('animationend', cleanup);
      setTimeout(cleanup, 800);
    }
  } catch(e) {}
}

function updateVaultDigit(room, puzzle, digit) {
  try {
    const el = $(`v-r${room+1}d${puzzle+1}`);
    if (!el) return;
    el.textContent = digit;
    el.classList.add('revealed');
    el.style.color = getRoomColor(room);
    el.style.borderColor = getRoomColor(room);
  } catch(e) {}
}

function updatePuzzlesCleared() {
  try { $('puzzlesCleared').textContent = `Puzzles Cleared: ${state.puzzlesSolved}/6`; $('puzzlesCleared').style.animation = 'none'; void $('puzzlesCleared').offsetWidth; $('puzzlesCleared').style.animation = 'pulseOnce .4s ease'; } catch(e) {}
}
function updateStreak() {
  try { const si = $('streakIcon'); if (state.streak >= 2) { si.classList.add('active'); si.style.display = 'inline-block'; } else { si.classList.remove('active'); si.style.display = 'none'; } } catch(e) {}
}
function updateProgressDots() {
  try {
    const pd = $('progressDots');
    pd.innerHTML = '';
    const room = rooms[state.currentRoom];
    if (!room) return;
    const color = room.color;
    for (let i = 0; i < 2; i++) {
      const d = document.createElement('div');
      d.className = 'progress-dot';
      d.style.color = color;
      if (state.roomDigits[state.currentRoom][i] !== null) d.classList.add('filled');
      pd.appendChild(d);
    }
  } catch(e) {}
}

// ============= GAME START =============
function startGame() {
  try {
    state.startTime = Date.now();
    showScreen('gameScreen');
    $('codeVault').style.display = 'block';
    showTutorial();
  } catch(e) { console.error('startGame error:', e); }
}

// ============= TUTORIAL =============
function showTutorial() {
  try {
    state.screen = 'tutorial';
    $('roomInfo').textContent = '📖 Tutorial';
    $('roomProgress').textContent = '';
    $('missionLine').textContent = 'Learn the controls — tap to match!';
    $('scannerBtn').style.display = 'none';
    $('progressDots').innerHTML = '';
    const area = $('puzzleArea');
    area.innerHTML = '';

    const tutPairs = [
      { term: '☀️ Sun', match: '🔥 Hot' },
      { term: '🧊 Ice', match: '❄️ Cold' }
    ];
    let pairIdx = 0, selected = null;

    function renderPair() {
      area.innerHTML = `
        <div class="puzzle-instruction">👆 Tap a word on the LEFT, then tap its match on the RIGHT</div>
        <div class="micro-progress">Pair ${pairIdx+1} of 2</div>
        <div class="match-area">
          <div class="match-col left" id="tutLeft"></div>
          <div class="match-col right" id="tutRight"></div>
        </div>
        <button onclick="skipTutorial()" style="position:absolute;top:10px;right:10px;padding:8px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:rgba(255,255,255,.5);font-size:13px;">Skip Tutorial →</button>
      `;
      const leftCol = $('tutLeft');
      const rightCol = $('tutRight');
      // Term card
      const tc = document.createElement('div');
      tc.className = 'card'; tc.style.color = '#4dd0e1'; tc.style.borderColor = 'rgba(77,208,225,.3)';
      tc.textContent = tutPairs[pairIdx].term;
      tc.onclick = function() {
        if (tc.classList.contains('locked')) return;
        document.querySelectorAll('#tutLeft .card, #tutRight .card').forEach(c => c.classList.remove('selected'));
        tc.classList.add('selected');
        selected = 'term';
      };
      leftCol.appendChild(tc);
      // Match options (shuffled)
      const opts = pairIdx === 0 ? ['🔥 Hot', '❄️ Cold'] : ['❄️ Cold', '🔥 Hot'];
      opts.forEach(o => {
        const mc = document.createElement('div');
        mc.className = 'card'; mc.style.color = '#4dd0e1'; mc.style.borderColor = 'rgba(77,208,225,.3)';
        mc.textContent = o;
        mc.onclick = function() {
          if (!selected) {
            tc.classList.add('selected');
            selected = 'term';
          }
          if (o === tutPairs[pairIdx].match) {
            mc.classList.add('correct'); tc.classList.add('locked');
            setTimeout(() => {
              pairIdx++;
              if (pairIdx >= 2) { finishTutorial(); }
              else { selected = null; renderPair(); }
            }, 600);
          } else {
            mc.classList.add('wrong');
            setTimeout(() => mc.classList.remove('wrong'), 500);
          }
        };
        rightCol.appendChild(mc);
      });
    }
    renderPair();
  } catch(e) { console.error('showTutorial error:', e); skipTutorial(); }
}

function skipTutorial() { finishTutorial(); }
function finishTutorial() {
  try {
    state.tutorialDone = true;
    state.currentRoom = 0; state.currentPuzzle = 0;
    $('scannerBtn').style.display = 'flex';
    startRoom(0);
  } catch(e) { console.error('finishTutorial:', e); }
}

// ============= ROOM MANAGEMENT =============
function startRoom(ri) {
  try {
    state.currentRoom = ri;
    state.currentPuzzle = 0;
    const room = rooms[ri];
    document.body.style.background = `radial-gradient(ellipse at 50% 40%, ${room.color}18 0%, var(--bg) 70%)`;
    $('roomInfo').innerHTML = `${room.emoji} Room ${ri+1}: ${room.name}`;
    $('roomProgress').textContent = `Room ${ri+1} of 3`;
    $('missionLine').textContent = room.mission;
    $('scannerBtn').style.borderColor = room.accent;
    $('scannerBtn').style.color = room.accent;
    updateProgressDots();
    showScanPreview(ri, 0);
  } catch(e) { console.error('startRoom error:', e); loadPuzzle(); }
}

// ============= SCAN PREVIEW =============
function showScanPreview(ri, pi) {
  try {
    state.previewDone = false;
    closeAllOverlays();
    const room = rooms[ri];
    const puzzle = room.puzzles[pi];
    const sp = $('scanPreview');
    sp.style.borderColor = room.color;
    sp.innerHTML = `
      <div class="scan-label" style="color:${room.accent};">SCANNING ROOM...</div>
      <div class="scan-visual" style="border-color:${room.color};">
        <div class="scan-visual-text" style="color:${room.accent};">${puzzle.preview.lines.join('<br>')}</div>
        <div class="scan-visual-sub">${puzzle.preview.sub}</div>
      </div>
    `;
    sp.style.display = 'flex'; sp.classList.add('active');

    function finishPreview() {
      if (state.previewDone) return;
      state.previewDone = true;
      sp.classList.remove('active'); sp.style.display = 'none';
      loadPuzzle();
    }
    setTimeout(finishPreview, 3500);
    setTimeout(finishPreview, 5000); // safety
  } catch(e) { state.previewDone = true; loadPuzzle(); }
}

// ============= LOAD PUZZLE =============
function loadPuzzle() {
  try {
    state.wrongCount = 0;
    state.overrideTriggered = false;
    state.puzzleSolving = false;
    state.scannerActive = false;
    closeScanner();
    const room = rooms[state.currentRoom];
    const puzzle = room.puzzles[state.currentPuzzle];
    updateProgressDots();

    switch(puzzle.type) {
      case 'match': renderMatchLock(puzzle, room); break;
      case 'sequence': renderSequenceLock(puzzle, room); break;
      case 'scanner': renderSystemScanner(puzzle, room); break;
      case 'mystery': renderMysteryInput(puzzle, room); break;
      case 'diagnostic': renderDiagnosticPanel(puzzle, room); break;
      case 'quickfire': renderQuickFire(puzzle, room); break;
    }
  } catch(e) { console.error('loadPuzzle error:', e); }
}

// ============= MATCH LOCK =============
function renderMatchLock(puzzle, room) {
  try {
    state.matchPairIndex = 0;
    state.matchSelected = null;
    const area = $('puzzleArea');

    function renderPair() {
      const pi = state.matchPairIndex;
      if (pi >= puzzle.pairs.length) { puzzleSolved(puzzle.digit); return; }
      // Close scanner overlay between pairs (keep wrongCount for puzzle-level tracking)
      closeScanner();
      area.innerHTML = `
        <div class="puzzle-instruction">👆 Tap a word on the LEFT, then tap its match on the RIGHT</div>
        <div class="micro-progress" style="color:${room.accent}">Pair ${pi+1} of ${puzzle.pairs.length}</div>
        <div class="match-area">
          <div class="match-col left" id="matchLeft"></div>
          <div class="match-col right" id="matchRight"></div>
        </div>
      `;
      const leftCol = $('matchLeft');
      const rightCol = $('matchRight');
      const pair = puzzle.pairs[pi];

      // Term card
      const tc = document.createElement('div');
      tc.className = 'card'; tc.style.color = room.accent;
      tc.textContent = pair.term;
      tc.onclick = function() {
        if (tc.classList.contains('locked')) return;
        document.querySelectorAll('.match-area .card').forEach(c => c.classList.remove('selected'));
        tc.classList.add('selected');
        state.matchSelected = 'term';
      };
      leftCol.appendChild(tc);

      // Right options - correct + distractors
      let options = [pair.match];
      puzzle.pairs.forEach((p, i) => { if (i !== pi) options.push(p.match); });

      // If scanner narrowed for this pair, filter to 2 choices
      if (state.scannerActive && state.wrongCount >= 1) {
        const narrow = puzzle.strongScanner[pair.term];
        if (narrow) options = [...narrow];
      }
      shuffleArray(options);

      options.forEach(o => {
        const mc = document.createElement('div');
        mc.className = 'card'; mc.style.color = room.accent;
        mc.textContent = o;
        if (o === pair.match) mc.dataset.correct = 'true';
        mc.onclick = function() {
          if (mc.classList.contains('dimmed') || mc.classList.contains('locked')) return;
          if (!state.matchSelected) { tc.classList.add('selected'); state.matchSelected = 'term'; }
          if (mc.dataset.correct === 'true') {
            mc.classList.add('correct'); tc.classList.add('locked');
            spawnParticles(mc.getBoundingClientRect().x + 40, mc.getBoundingClientRect().y + 20, room.accent, 8);
            setTimeout(() => { state.matchPairIndex++; state.matchSelected = null; renderPair(); }, 700);
          } else {
            mc.classList.add('wrong');
            setTimeout(() => { mc.classList.remove('wrong'); mc.classList.add('dimmed'); }, 500);
            handleWrongAnswer(puzzle, room, () => renderPair());
          }
        };
        rightCol.appendChild(mc);
      });
    }
    renderPair();
  } catch(e) { console.error('renderMatchLock error:', e); }
}

// ============= SEQUENCE LOCK =============
function renderSequenceLock(puzzle, room) {
  try {
    state.seqStep = 0;
    const area = $('puzzleArea');
    const prompts = ["What happens FIRST?", "What happens NEXT?", "Complete!"];

    function renderStep() {
      const step = state.seqStep;
      if (step >= puzzle.cards.length) { puzzleSolved(puzzle.digit); return; }
      // Close scanner overlay between steps (keep wrongCount for puzzle-level tracking)
      closeScanner();

      // Last card auto-places
      if (step === puzzle.cards.length - 1) {
        const remaining = puzzle.cards.filter((c,i) => i >= step);
        state.seqStep = puzzle.cards.length;
        renderStep_final(remaining[0]);
        return;
      }

      area.innerHTML = `
        <div class="puzzle-instruction">${prompts[step]}</div>
        <div class="micro-progress" style="color:${room.accent}">Step ${step+1} of ${puzzle.cards.length}</div>
        <div class="seq-area">
          <div class="seq-slots" id="seqSlots"></div>
          <div class="seq-options" id="seqOptions"></div>
        </div>
      `;

      const slotsEl = $('seqSlots');
      for (let i = 0; i < puzzle.cards.length; i++) {
        const slot = document.createElement('div');
        slot.className = 'seq-slot';
        const num = document.createElement('div');
        num.className = 'slot-num'; num.textContent = i + 1;
        slot.appendChild(num);
        if (i < step) {
          slot.classList.add('filled');
          slot.innerHTML += `<span>${puzzle.cards[puzzle.correctOrder[i]].label}</span>`;
        }
        if (i > 0) {
          const arrow = document.createElement('div');
          arrow.className = 'seq-arrow'; arrow.textContent = '→';
          slotsEl.appendChild(arrow);
        }
        slotsEl.appendChild(slot);
      }

      const optsEl = $('seqOptions');
      let available = puzzle.cards.filter((c, i) => !puzzle.correctOrder.slice(0, step).includes(c.id));

      // Scanner narrowing
      if (state.scannerActive && state.wrongCount >= 1 && puzzle.strongScanner[step]) {
        const narrowIds = puzzle.strongScanner[step];
        available = available.filter(c => narrowIds.includes(c.id));
      }

      shuffleArray(available);
      available.forEach(card => {
        const cd = document.createElement('div');
        cd.className = 'card'; cd.style.color = room.accent;
        cd.textContent = card.label;
        if (card.id === puzzle.correctOrder[step]) cd.dataset.correct = 'true';
        cd.onclick = function() {
          if (cd.classList.contains('dimmed')) return;
          if (card.id === puzzle.correctOrder[step]) {
            cd.classList.add('correct');
            spawnParticles(cd.getBoundingClientRect().x + 40, cd.getBoundingClientRect().y + 20, room.accent, 8);
            setTimeout(() => { state.seqStep++; renderStep(); }, 600);
          } else {
            cd.classList.add('wrong');
            setTimeout(() => { cd.classList.remove('wrong'); cd.classList.add('dimmed'); }, 500);
            handleWrongAnswer(puzzle, room, () => renderStep());
          }
        };
        optsEl.appendChild(cd);
      });
    }

    function renderStep_final(lastCard) {
      // Auto-place last card
      area.innerHTML = `
        <div class="puzzle-instruction">Complete!</div>
        <div class="micro-progress" style="color:${room.accent}">Step 3 of 3</div>
        <div class="seq-area"><div class="seq-slots" id="seqSlots"></div></div>
      `;
      const slotsEl = $('seqSlots');
      for (let i = 0; i < puzzle.cards.length; i++) {
        if (i > 0) { const a = document.createElement('div'); a.className = 'seq-arrow'; a.textContent = '→'; slotsEl.appendChild(a); }
        const slot = document.createElement('div');
        slot.className = 'seq-slot filled';
        const num = document.createElement('div'); num.className = 'slot-num'; num.textContent = i + 1;
        slot.appendChild(num);
        slot.innerHTML += `<span>${puzzle.cards[puzzle.correctOrder[i]].label}</span>`;
        slotsEl.appendChild(slot);
      }
      setTimeout(() => puzzleSolved(puzzle.digit), 800);
    }

    renderStep();
  } catch(e) { console.error('renderSequenceLock error:', e); }
}

// ============= SYSTEM SCANNER =============
function renderSystemScanner(puzzle, room) {
  try {
    const area = $('puzzleArea');
    let opts = [...puzzle.options];

    area.innerHTML = `
      <div class="gauges-row" id="gaugesRow"></div>
      <div class="scanner-question">${puzzle.question}</div>
      <div class="answer-cards" id="answerCards"></div>
    `;

    const gr = $('gaugesRow');
    puzzle.gauges.forEach(g => {
      gr.innerHTML += `
        <div class="gauge">
          <div class="gauge-label">${g.label}</div>
          <div class="gauge-bar-wrap">
            <div class="gauge-fill" style="height:${g.pct}%;background:${g.color};box-shadow:0 0 10px ${g.color};"></div>
          </div>
          <div class="gauge-value">${g.value}</div>
        </div>
      `;
    });

    function renderOptions() {
      const ac = $('answerCards');
      ac.innerHTML = '';
      let options = state.scannerActive && state.wrongCount >= 1 ? puzzle.strongScanner.map(l => opts.find(o => o.label === l)).filter(Boolean) : opts;

      options.forEach(o => {
        const c = document.createElement('div');
        c.className = 'card'; c.style.color = room.accent; c.style.minWidth = '140px';
        c.textContent = o.label;
        if (o.correct) c.dataset.correct = 'true';
        c.onclick = function() {
          if (c.classList.contains('dimmed')) return;
          if (o.correct) {
            c.classList.add('correct');
            spawnParticles(c.getBoundingClientRect().x + 50, c.getBoundingClientRect().y + 20, room.accent, 10);
            setTimeout(() => puzzleSolved(puzzle.digit), 600);
          } else {
            c.classList.add('wrong');
            setTimeout(() => { c.classList.remove('wrong'); c.classList.add('dimmed'); }, 500);
            handleWrongAnswer(puzzle, room, () => renderOptions());
          }
        };
        ac.appendChild(c);
      });
    }
    renderOptions();
  } catch(e) { console.error('renderSystemScanner error:', e); }
}

// ============= DIAGNOSTIC PANEL =============
function renderDiagnosticPanel(puzzle, room) {
  try {
    state.diagSlot = 0;
    state.diagFilled = [null, null];
    const area = $('puzzleArea');

    function renderPanel() {
      const slot = state.diagSlot;
      area.innerHTML = `
        <div class="diag-panel">
          <div class="diag-header" style="color:${room.accent}">🔧 ECOSYSTEM REPAIR STATION</div>
          <div class="micro-progress" style="color:${room.accent}">Slot ${slot+1} of 2</div>
          <div class="diag-slots" id="diagSlots"></div>
          <div class="parts-bank" id="partsBank"></div>
          <div style="text-align:center;" id="diagCheckWrap"></div>
        </div>
      `;

      const slotsEl = $('diagSlots');
      puzzle.slots.forEach((s, i) => {
        const slotDiv = document.createElement('div');
        slotDiv.className = 'diag-slot';
        if (i === slot) { slotDiv.classList.add('active'); slotDiv.style.color = room.accent; slotDiv.style.borderColor = room.accent; }
        else if (i < slot) { slotDiv.classList.add('locked'); }
        else { slotDiv.classList.add('inactive'); }
        slotDiv.innerHTML = `<div class="diag-slot-label">${s.label}</div><div class="diag-slot-value" id="slotVal${i}">${state.diagFilled[i] ? state.diagFilled[i] : (i === slot ? 'Select below ↓' : '—')}</div>`;
        // Allow clicking active filled slot to clear
        if (i === slot && state.diagFilled[i]) {
          slotDiv.style.cursor = 'pointer';
          slotDiv.onclick = () => { state.diagFilled[i] = null; renderPanel(); };
        }
        slotsEl.appendChild(slotDiv);
      });

      const bank = $('partsBank');
      let availParts = puzzle.parts.filter(p => !state.diagFilled.includes(p.id) || (state.diagFilled[slot] === p.id));

      // Scanner narrowing
      if (state.scannerActive && state.wrongCount >= 1 && puzzle.strongScanner[slot]) {
        const narrowIds = puzzle.strongScanner[slot];
        availParts = availParts.filter(p => narrowIds.includes(p.id));
      }

      availParts.forEach(p => {
        const chip = document.createElement('div');
        chip.className = 'part-chip'; chip.style.color = room.accent;
        chip.textContent = p.label;
        if (state.diagFilled[slot] === p.id) chip.classList.add('used');
        chip.onclick = () => {
          state.diagFilled[slot] = p.id;
          renderPanel();
        };
        bank.appendChild(chip);
      });

      // Check button if filled
      if (state.diagFilled[slot]) {
        const wrap = $('diagCheckWrap');
        const btn = document.createElement('button');
        btn.className = 'diag-check-btn'; btn.style.borderColor = room.accent; btn.style.color = room.accent;
        btn.textContent = '✔ Check';
        btn.onclick = () => {
          if (state.diagFilled[slot] === puzzle.slots[slot].answer) {
            state.diagSlot++;
            if (state.diagSlot >= 2) {
              setTimeout(() => puzzleSolved(puzzle.digit), 500);
            } else {
              // Reset scanner state for next slot — each slot gets its own support ladder
              state.wrongCount = 0;
              state.overrideTriggered = false;
              state.scannerActive = false;
              closeScanner();
              renderPanel();
            }
          } else {
            state.diagFilled[slot] = null;
            handleWrongAnswer(puzzle, room, () => renderPanel());
          }
        };
        wrap.appendChild(btn);
      }
    }
    renderPanel();
  } catch(e) { console.error('renderDiagnosticPanel error:', e); }
}

// ============= QUICK FIRE =============
function renderQuickFire(puzzle, room) {
  try {
    state.qfIndex = 0; state.qfCorrect = 0; state.qfMissed = [];
    state.qfCumulativeWrong = 0; state.qfAnswered = new Array(puzzle.questions.length).fill(null);
    const area = $('puzzleArea');

    function renderQ(indices) {
      if (indices.length === 0) {
        // Check if passed
        const correct = state.qfAnswered.filter(a => a === true).length;
        if (correct >= 3) { puzzleSolved(puzzle.digit); }
        else {
          // Retry missed
          const missed = [];
          state.qfAnswered.forEach((a, i) => { if (a !== true) missed.push(i); });
          if (state.qfCumulativeWrong >= 5) {
            // Override
            state.roomOverrideUsed[state.currentRoom][state.currentPuzzle] = true;
            missed.forEach(i => { state.qfAnswered[i] = true; });
            area.innerHTML = `<div style="text-align:center;"><div style="font-size:18px;color:${room.accent};margin-bottom:10px;">⚡ System override — policy scan complete</div></div>`;
            setTimeout(() => puzzleSolved(puzzle.digit), 1200);
            return;
          }
          renderQ(missed);
        }
        return;
      }

      const qi = indices[0];
      const q = puzzle.questions[qi];
      area.innerHTML = `
        <div class="qf-area">
          <div class="qf-header" style="color:${room.accent}">⚡ POLICY SYSTEM CHECK</div>
          <div class="qf-question">${q.text}</div>
          <div class="qf-buttons" id="qfBtns"></div>
          <div class="qf-progress" id="qfPips"></div>
        </div>
      `;

      // Pips
      const pips = $('qfPips');
      for (let i = 0; i < puzzle.questions.length; i++) {
        const pip = document.createElement('div');
        pip.className = 'qf-pip';
        if (state.qfAnswered[i] === true) pip.classList.add('correct');
        else if (state.qfAnswered[i] === false) pip.classList.add('wrong');
        pips.appendChild(pip);
      }

      const btns = $('qfBtns');

      // Scanner text for this question
      if (state.scannerActive && state.wrongCount >= 1) {
        showScannerOverlay(puzzle.scannerTexts[qi], room);
      }

      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'qf-btn confirm'; confirmBtn.textContent = '✅ CONFIRM';
      confirmBtn.onclick = () => handleQFAnswer(true, q.answer, qi, indices.slice(1), puzzle, room);
      btns.appendChild(confirmBtn);

      const denyBtn = document.createElement('button');
      denyBtn.className = 'qf-btn deny'; denyBtn.textContent = '❌ DENY';
      denyBtn.onclick = () => handleQFAnswer(false, q.answer, qi, indices.slice(1), puzzle, room);
      btns.appendChild(denyBtn);
    }

    function handleQFAnswer(picked, correct, qi, remaining, puzzle, room) {
      // Disable buttons to prevent double-tap
      const btns = document.querySelectorAll('.qf-btn');
      btns.forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });

      if (picked === correct) {
        state.qfAnswered[qi] = true;
        area.querySelector('.qf-question').innerHTML = `<span style="color:var(--green);">✔ Correct!</span>`;
      } else {
        state.qfAnswered[qi] = false;
        state.qfCumulativeWrong++;
        area.querySelector('.qf-question').innerHTML = `<span style="color:var(--red);">✖ Not quite</span>`;
        if (state.qfCumulativeWrong >= 5) {
          setTimeout(() => {
            state.roomOverrideUsed[state.currentRoom][state.currentPuzzle] = true;
            puzzle.questions.forEach((_, i) => { if (state.qfAnswered[i] !== true) state.qfAnswered[i] = true; });
            area.innerHTML = `<div style="text-align:center;"><div style="font-size:18px;color:${room.accent};margin-bottom:10px;">⚡ System override — policy scan complete</div></div>`;
            setTimeout(() => puzzleSolved(puzzle.digit), 1200);
          }, 600);
          return;
        }
        // Activate scanner on wrong
        if (!state.scannerActive) {
          state.scannerActive = true;
          state.wrongCount = 1;
          state.roomScannerUsed[state.currentRoom][state.currentPuzzle] = true;
        }
      }
      setTimeout(() => renderQ(remaining), 600);
    }

    const allIndices = puzzle.questions.map((_, i) => i);
    renderQ(allIndices);
  } catch(e) { console.error('renderQuickFire error:', e); }
}

// ============= WRONG ANSWER HANDLER =============
function handleWrongAnswer(puzzle, room, rerenderFn) {
  try {
    state.wrongCount++;
    if (state.wrongCount === 1) {
      // Scanner auto-activates
      state.scannerActive = true;
      state.roomScannerUsed[state.currentRoom][state.currentPuzzle] = true;
      showScannerOverlay(puzzle.scannerText, room);
      // Streak breaks
      state.streak = 0; updateStreak();
      // Re-render to narrow options
      if (rerenderFn) setTimeout(rerenderFn, 600);
    } else if (state.wrongCount >= 2 && !state.overrideTriggered) {
      state.overrideTriggered = true;
      state.streak = 0; updateStreak();
      closeScanner();
      triggerOverride(puzzle, room);
    }
  } catch(e) { console.error('handleWrongAnswer error:', e); }
}

function showScannerOverlay(text, room) {
  try {
    const so = $('scannerOverlay');
    so.style.borderColor = room.accent;
    so.innerHTML = `
      <div class="scanner-text" style="color:${room.accent};">🔍 ${text}</div>
      <span class="scanner-dismiss" onclick="closeScanner()">Dismiss</span>
    `;
    so.style.display = 'block'; so.classList.add('active');
    state.scannerActive = true;
  } catch(e) {}
}

function toggleScanner() {
  if (state.scannerActive) closeScanner();
}

// ============= OVERRIDE =============
function triggerOverride(puzzle, room) {
  try {
    state.roomOverrideUsed[state.currentRoom][state.currentPuzzle] = true;
    const area = $('puzzleArea');
    if (puzzle.type === 'match') {
      // Auto-solve cascade for remaining pairs
      cascadeMatchSolve(puzzle, room);
    } else if (puzzle.type === 'sequence') {
      cascadeSequenceSolve(puzzle, room);
    } else if (puzzle.type === 'diagnostic') {
      cascadeDiagnosticSolve(puzzle, room);
    } else {
      // Tap-to-select: highlight correct
      highlightCorrectAnswer(room);
    }
  } catch(e) { console.error('triggerOverride error:', e); puzzleSolved(rooms[state.currentRoom].puzzles[state.currentPuzzle].digit); }
}

function highlightCorrectAnswer(room) {
  try {
    const correct = document.querySelector('[data-correct="true"]:not(.dimmed):not(.locked)');
    if (correct) {
      correct.style.borderColor = room.accent;
      correct.style.boxShadow = `0 0 20px ${room.accent}`;
      correct.style.animation = 'pulseOnce 1s ease infinite';
      // Add override label
      const lbl = document.createElement('div');
      lbl.style.cssText = `font-size:12px;color:${room.accent};margin-top:4px;font-weight:600;`;
      lbl.textContent = '🔓 Scanner locked on';
      correct.appendChild(lbl);
    }
  } catch(e) {}
}

function cascadeMatchSolve(puzzle, room) {
  try {
    const area = $('puzzleArea');
    area.innerHTML = `<div style="text-align:center;color:${room.accent};font-size:16px;font-weight:600;">🔓 Lock override triggered</div>`;
    let pi = state.matchPairIndex;
    function solveNext() {
      if (pi >= puzzle.pairs.length) {
        setTimeout(() => puzzleSolved(puzzle.digit), 500);
        return;
      }
      const p = puzzle.pairs[pi];
      area.innerHTML += `<div style="text-align:center;margin-top:8px;font-size:15px;color:var(--text-bright);animation:fadeInUp .4s ease;">${p.term} → ${p.match}</div>`;
      pi++;
      setTimeout(solveNext, 600);
    }
    solveNext();
  } catch(e) { puzzleSolved(puzzle.digit); }
}

function cascadeSequenceSolve(puzzle, room) {
  try {
    const area = $('puzzleArea');
    area.innerHTML = `<div style="text-align:center;color:${room.accent};font-size:16px;font-weight:600;">🔓 Lock override triggered</div><div class="seq-area"><div class="seq-slots" id="seqSlots"></div></div>`;
    const slotsEl = $('seqSlots');
    let step = state.seqStep;
    function solveNext() {
      if (step >= puzzle.cards.length) {
        setTimeout(() => puzzleSolved(puzzle.digit), 500);
        return;
      }
      const card = puzzle.cards[puzzle.correctOrder[step]];
      if (step > 0) { const a = document.createElement('div'); a.className = 'seq-arrow'; a.textContent = '→'; slotsEl.appendChild(a); }
      const slot = document.createElement('div');
      slot.className = 'seq-slot filled';
      slot.style.animation = 'fadeInUp .4s ease';
      slot.innerHTML = `<div class="slot-num">${step+1}</div><span>${card.label}</span>`;
      slotsEl.appendChild(slot);
      step++;
      setTimeout(solveNext, 600);
    }
    solveNext();
  } catch(e) { puzzleSolved(puzzle.digit); }
}

function cascadeDiagnosticSolve(puzzle, room) {
  try {
    const area = $('puzzleArea');
    area.innerHTML = `<div style="text-align:center;color:${room.accent};font-size:16px;font-weight:600;">🔓 Lock override triggered</div>`;
    let si = state.diagSlot;
    function solveNext() {
      if (si >= puzzle.slots.length) {
        setTimeout(() => puzzleSolved(puzzle.digit), 500);
        return;
      }
      const s = puzzle.slots[si];
      area.innerHTML += `<div style="text-align:center;margin-top:10px;font-size:15px;color:var(--text-bright);animation:fadeInUp .4s ease;">${s.icon} ${s.answer} → ${s.label}</div>`;
      si++;
      setTimeout(solveNext, 600);
    }
    solveNext();
  } catch(e) { puzzleSolved(puzzle.digit); }
}

// ============= PUZZLE SOLVED =============
function puzzleSolved(digit) {
  try {
    if (state.puzzleSolving) return;
    state.puzzleSolving = true;
    closeScanner();
    closeAllOverlays();

    const ri = state.currentRoom;
    const pi = state.currentPuzzle;

    // Store digit
    state.roomDigits[ri][pi] = digit;
    updateVaultDigit(ri, pi, digit);

    // Track stats
    state.puzzlesSolved++;
    const wasFirstTry = state.wrongCount === 0;
    state.roomFirstTry[ri][pi] = wasFirstTry;
    if (wasFirstTry) { state.firstTrySolves++; state.streak++; }
    else { state.streak = 0; }
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    updateStreak();
    updatePuzzlesCleared();
    updateProgressDots();

    // Show digit reveal
    showDigitReveal(digit, ri, pi);
  } catch(e) { console.error('puzzleSolved error:', e); advanceAfterPuzzle(); }
}

function showDigitReveal(digit, ri, pi) {
  try {
    const color = rooms[ri].color;
    const dov = $('digitOverlay');
    dov.innerHTML = `
      <div class="digit-reveal-num" style="color:${color};">${digit}</div>
      <div class="digit-reveal-label">Code digit unlocked!</div>
      <button class="digit-continue" onclick="advanceAfterPuzzle()">Continue →</button>
    `;
    dov.style.display = 'flex'; dov.classList.add('active');
    spawnParticles(window.innerWidth/2, window.innerHeight/2, color, 12);
    // Safety timeout
    setTimeout(() => { if (dov.classList.contains('active')) advanceAfterPuzzle(); }, 8000);
  } catch(e) { advanceAfterPuzzle(); }
}

function advanceAfterPuzzle() {
  try {
    closeAllOverlays();
    const ri = state.currentRoom;
    const pi = state.currentPuzzle;

    if (pi === 0) {
      // Next puzzle in same room
      state.currentPuzzle = 1;
      showScanPreview(ri, 1);
    } else {
      // Room complete — show code entry
      showCodeEntry(ri);
    }
  } catch(e) { console.error('advanceAfterPuzzle error:', e); }
}

// ============= CODE ENTRY =============
function showCodeEntry(ri) {
  try {
    closeAllOverlays();
    const room = rooms[ri];
    const d1 = state.roomDigits[ri][0];
    const d2 = state.roomDigits[ri][1];
    const ce = $('codeEntryOverlay');
    ce.innerHTML = `
      <div class="code-title" style="color:${room.accent};">Enter Room ${ri+1} Exit Code</div>
      <div class="code-subtitle">Your digits: ${d1 !== null ? d1 : '?'} ${d2 !== null ? d2 : '?'}</div>
      <div class="code-inputs">
        <input class="code-input" id="codeIn1" type="tel" maxlength="1" style="color:${room.accent};border-color:${room.accent}40;" autofocus>
        <input class="code-input" id="codeIn2" type="tel" maxlength="1" style="color:${room.accent};border-color:${room.accent}40;">
      </div>
      <button class="code-submit" style="background:${room.color};" onclick="checkCode(${ri})">Submit Code</button>
      <div class="code-error" id="codeError"></div>
    `;
    ce.style.display = 'flex'; ce.classList.add('active');

    // Auto-focus and auto-advance
    setTimeout(() => {
      const i1 = $('codeIn1');
      if (i1) {
        i1.focus();
        i1.addEventListener('input', () => { if (i1.value.length === 1) $('codeIn2').focus(); });
      }
    }, 100);
  } catch(e) { console.error('showCodeEntry error:', e); }
}

function checkCode(ri) {
  try {
    const room = rooms[ri];
    const v = ($('codeIn1').value || '') + ($('codeIn2').value || '');
    if (v === room.code) {
      closeAllOverlays();
      if (ri < 2) {
        showPassTheLaptop(ri + 1);
      } else {
        showFinalLockTransition();
      }
    } else {
      $('codeError').textContent = '✖ Wrong code — check your digits above!';
      setTimeout(() => { try { $('codeError').textContent = ''; } catch(e){} }, 2000);
    }
  } catch(e) { console.error('checkCode error:', e); }
}

// ============= PASS THE LAPTOP =============
function showPassTheLaptop(nextRi) {
  try {
    closeAllOverlays();
    const nextRoom = rooms[nextRi];
    const ptl = $('ptlOverlay');
    ptl.style.background = `radial-gradient(ellipse at 50% 50%, ${nextRoom.color}30 0%, rgba(0,0,0,.95) 70%)`;
    ptl.innerHTML = `
      <div class="ptl-text" style="color:${nextRoom.accent};">🔄 PASS THE LAPTOP</div>
      <div class="ptl-sub">Next team member takes over</div>
      <button class="ptl-ready" style="background:${nextRoom.color};" onclick="afterPTL(${nextRi})">Ready →</button>
    `;
    ptl.style.display = 'flex'; ptl.classList.add('active');
  } catch(e) { afterPTL(nextRi); }
}

function afterPTL(nextRi) {
  try {
    closeAllOverlays();
    showDoorTransition(nextRi, () => startRoom(nextRi));
  } catch(e) { startRoom(nextRi); }
}

// ============= DOOR TRANSITION =============
function showDoorTransition(nextRi, callback) {
  try {
    const color = rooms[nextRi].color;
    const emoji = rooms[nextRi].emoji;
    const name = rooms[nextRi].name;
    const overlay = document.createElement('div');
    overlay.className = 'door-overlay';
    overlay.style.background = `rgba(0,0,0,.85)`;
    overlay.innerHTML = `
      <div class="door-panel" style="border-color:${color};animation:doorSlide 1.4s ease forwards;">
        <div class="door-lock" style="animation:lockPulse .6s ease;">🔒</div>
        <div class="door-label" style="color:${color};">${emoji} ${name}</div>
      </div>
    `;
    document.body.appendChild(overlay);

    const cleanup = () => { try { overlay.remove(); } catch(e){} if (callback) { const cb = callback; callback = null; cb(); } };
    overlay.querySelector('.door-panel').addEventListener('animationend', cleanup);
    setTimeout(cleanup, 2000);
  } catch(e) { if (callback) callback(); }
}

// ============= FINAL LOCK =============
function showFinalLockTransition() {
  try {
    const overlay = document.createElement('div');
    overlay.className = 'door-overlay';
    overlay.style.background = 'rgba(0,0,0,.9)';
    overlay.innerHTML = `
      <div class="door-panel" style="border-color:#4dd0e1;animation:doorSlideFL 1.8s ease forwards;">
        <div class="door-lock" style="animation:lockPulse .8s ease;">🔒</div>
        <div class="door-label" style="color:#4dd0e1;">FINAL LOCK</div>
      </div>
    `;
    document.body.appendChild(overlay);
    const cleanup = () => { try { overlay.remove(); } catch(e){} renderFinalLock(); };
    overlay.querySelector('.door-panel').addEventListener('animationend', cleanup);
    setTimeout(cleanup, 2500);
  } catch(e) { renderFinalLock(); }
}

function renderFinalLock() {
  try {
    state.screen = 'finalLock';
    state.flSelected = null; state.flMatched = 0; state.flWrongCounts = [0,0,0];
    state.wrongCount = 0; state.overrideTriggered = false; state.scannerActive = false;

    $('roomInfo').innerHTML = '🔐 Final Lock';
    $('roomProgress').textContent = '';
    $('missionLine').textContent = 'Match each concept to its effect — this is it!';
    $('progressDots').innerHTML = '';
    $('scannerBtn').style.borderColor = '#4dd0e1';
    $('scannerBtn').style.color = '#4dd0e1';
    document.body.style.background = `radial-gradient(ellipse at 50% 40%, #1a2a4e 0%, var(--bg) 70%)`;

    const area = $('puzzleArea');
    area.innerHTML = `
      <div class="final-intro">🔐 This is it!</div>
      <div class="puzzle-instruction">👆 Tap a term on the LEFT, then tap its match on the RIGHT</div>
      <div class="match-area" style="max-width:800px;">
        <div class="match-col left" id="flLeft"></div>
        <div class="match-col right" id="flRight"></div>
      </div>
    `;

    const leftCol = $('flLeft');
    const rightCol = $('flRight');

    // Terms
    finalLock.pairs.forEach((p, i) => {
      const tc = document.createElement('div');
      tc.className = 'card'; tc.style.color = '#ccc'; tc.style.borderColor = '#444';
      tc.dataset.index = i;
      tc.textContent = p.term;
      tc.onclick = function() {
        if (tc.classList.contains('locked')) return;
        document.querySelectorAll('#flLeft .card, #flRight .card').forEach(c => c.classList.remove('selected'));
        tc.classList.add('selected');
        state.flSelected = { side: 'left', index: i };
      };
      leftCol.appendChild(tc);
    });

    // Targets (shuffled)
    const shuffledTargets = [...finalLock.pairs.map((p, i) => ({ ...p, origIndex: i }))];
    shuffleArray(shuffledTargets);

    shuffledTargets.forEach(t => {
      const mc = document.createElement('div');
      mc.className = 'card'; mc.style.color = '#ccc'; mc.style.borderColor = '#444';
      mc.dataset.origIndex = t.origIndex;
      mc.textContent = t.target;
      mc.onclick = function() {
        if (mc.classList.contains('locked')) return;
        if (!state.flSelected || state.flSelected.side !== 'left') {
          // Select this first if no left selected
          document.querySelectorAll('#flLeft .card, #flRight .card').forEach(c => c.classList.remove('selected'));
          mc.classList.add('selected');
          return;
        }
        const li = state.flSelected.index;
        if (parseInt(mc.dataset.origIndex) === li) {
          // Correct match
          mc.classList.add('correct','locked');
          const leftCard = leftCol.querySelector(`[data-index="${li}"]`);
          if (leftCard) leftCard.classList.add('correct','locked');
          state.flMatched++;
          state.flSelected = null;
          closeScanner();
          if (state.flMatched >= 3) {
            setTimeout(() => showEscapeAnimation(), 600);
          }
        } else {
          // Wrong
          mc.classList.add('wrong');
          const leftCard = leftCol.querySelector(`[data-index="${li}"]`);
          setTimeout(() => {
            mc.classList.remove('wrong','selected');
            mc.classList.add('dimmed'); // Dim wrong target so student doesn't re-pick
            if (leftCard) leftCard.classList.remove('selected');
          }, 500);
          state.flWrongCounts[li] = (state.flWrongCounts[li] || 0) + 1;
          state.flSelected = null;

          if (state.flWrongCounts[li] === 1) {
            // Scanner auto-activates — shows clue, wrong target dimmed = 2 remaining
            state.scannerActive = true;
            showScannerOverlay(finalLock.pairs[li].scanText, { accent: '#4dd0e1' });
          } else if (state.flWrongCounts[li] >= 2) {
            // Override — auto-solve all remaining
            closeScanner();
            cascadeFinalLockSolve(leftCol, rightCol);
          }
        }
      };
      rightCol.appendChild(mc);
    });
  } catch(e) { console.error('renderFinalLock error:', e); }
}

function cascadeFinalLockSolve(leftCol, rightCol) {
  try {
    let delay = 0;
    finalLock.pairs.forEach((p, i) => {
      const leftCard = leftCol.querySelector(`[data-index="${i}"]`);
      const rightCard = rightCol.querySelector(`[data-orig-index="${i}"]`);
      if (leftCard && !leftCard.classList.contains('locked')) {
        setTimeout(() => {
          leftCard.classList.add('correct','locked');
          if (rightCard) rightCard.classList.add('correct','locked');
          state.flMatched++;
          if (state.flMatched >= 3) setTimeout(() => showEscapeAnimation(), 500);
        }, delay);
        delay += 700;
      }
    });
    // Safety
    setTimeout(() => { if (state.flMatched < 3) showEscapeAnimation(); }, delay + 1000);
  } catch(e) { showEscapeAnimation(); }
}

// ============= ESCAPE ANIMATION =============
let escapeAnimationFired = false;
function showEscapeAnimation() {
  try {
    if (escapeAnimationFired) return;
    escapeAnimationFired = true;
    closeAllOverlays();
    $('codeVault').style.display = 'none';
    const area = $('puzzleArea');
    $('roomInfo').textContent = '';
    $('roomProgress').textContent = '';
    $('missionLine').textContent = '';
    $('scannerBtn').style.display = 'none';
    $('progressDots').innerHTML = '';

    area.innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:48px;margin-bottom:10px;animation:pulseOnce 1s ease;">🦌🔬📋</div>
        <div class="report-escaped">ESCAPED!</div>
      </div>
    `;

    // Confetti
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      const colors = ['#2d6a4f','#1d3557','#e76f51','#4dd0e1','#ffd700','#fff'];
      c.style.cssText = `position:fixed;left:${Math.random()*100}%;top:-10px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'1px'};z-index:200;pointer-events:none;animation:confettiFall ${2+Math.random()*2}s linear forwards;animation-delay:${Math.random()*1}s;`;
      document.body.appendChild(c);
      const clean = () => { try { c.remove(); } catch(e){} };
      c.addEventListener('animationend', clean);
      setTimeout(clean, 5000);
    }

    setTimeout(() => showEscapeReport(), 3000);
  } catch(e) { showEscapeReport(); }
}

// ============= ESCAPE REPORT =============
function showEscapeReport() {
  try {
    closeAllOverlays();
    $('codeVault').style.display = 'none';
    state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const mins = Math.floor(state.elapsed / 60);
    const secs = state.elapsed % 60;

    // Calculate stars
    let stars = 1;
    if (state.firstTrySolves >= 2) stars = 2;
    if (state.firstTrySolves >= 4) stars = 3;

    // Calculate badges
    const badges = [];
    for (let r = 0; r < 3; r++) {
      if (state.roomSkipped[r]) continue;
      const ft = state.roomFirstTry[r];
      const sc = state.roomScannerUsed[r];

      // Clean Room: both puzzles solved on first or second try (no override used on either)
      if (ft[0] !== null && ft[1] !== null) {
        const noOverride0 = !state.roomOverrideUsed[r][0];
        const noOverride1 = !state.roomOverrideUsed[r][1];
        if (noOverride0 && noOverride1) badges.push(`🧹 Clean Room (R${r+1})`);
      }

      // No Scanner: completed room without scanner activating on either puzzle
      if (!sc[0] && !sc[1]) badges.push('🚫 No Scanner');

      // Comeback + Deep Scan: used scanner and still solved
      for (let p = 0; p < 2; p++) {
        if (sc[p] && state.roomDigits[r][p] !== null) {
          if (!badges.includes('🔄 Comeback')) badges.push('🔄 Comeback');
          if (ft[p] === false) {
            // Used scanner, wasn't first try but still solved
            if (!badges.includes('🔍 Deep Scan')) badges.push('🔍 Deep Scan');
          }
        }
      }
    }

    // Deduplicate and clean room badges
    const uniqueBadges = [];
    const seen = new Set();
    badges.forEach(b => {
      const base = b.replace(/ \(R\d+\)/, '');
      if (!seen.has(base)) { seen.add(base); uniqueBadges.push(base); }
    });

    showScreen('escapeReport');
    const er = $('escapeReport');
    er.innerHTML = `
      <div class="report-escaped">ESCAPED!</div>
      <div class="report-brand">Mr. Jawad's Ecosystem Escape — Report</div>
      <div class="report-stars">${'⭐'.repeat(3).split('').map((s,i) => `<span class="report-star ${i < stars ? 'earned' : ''}">${s}</span>`).join('')}</div>
      <div class="report-card">
        <div class="report-row"><span class="report-label">Rooms Cleared</span><span class="report-value">${state.roomSkipped.filter(s=>!s).length + state.roomSkipped.filter(s=>s).length}/3</span></div>
        <div class="report-row"><span class="report-label">Puzzles Cleared</span><span class="report-value">${state.puzzlesSolved}/6</span></div>
        <div class="report-row"><span class="report-label">First-Try Solves</span><span class="report-value">${state.firstTrySolves}/6</span></div>
        <div class="report-row"><span class="report-label">Time</span><span class="report-value">${mins}m ${secs}s</span></div>
      </div>
      ${uniqueBadges.length > 0 ? `<div class="report-badges">${uniqueBadges.map(b => `<div class="report-badge">${b}</div>`).join('')}</div>` : ''}
      <div class="report-btns">
        <button class="report-btn primary" onclick="playAgain()">🔄 Play Again</button>
        <button class="report-btn secondary" onclick="copyReport()">📋 Copy Report</button>
      </div>
      <div class="copied-msg" id="copiedMsg"></div>
    `;

    // Animate stars
    er.querySelectorAll('.report-star.earned').forEach((s, i) => {
      s.style.opacity = '0';
      setTimeout(() => { s.style.opacity = '1'; s.style.animation = 'pulseOnce .4s ease'; }, 300 + i * 400);
    });
  } catch(e) { console.error('showEscapeReport error:', e); }
}

function copyReport() {
  try {
    const mins = Math.floor(state.elapsed / 60);
    const secs = state.elapsed % 60;
    let stars = 1;
    if (state.firstTrySolves >= 2) stars = 2;
    if (state.firstTrySolves >= 4) stars = 3;

    const text = `Mr. Jawad's Escape Room Simulations — Ecosystems Report
${'⭐'.repeat(stars)}
Rooms Cleared:\t3/3
Puzzles Cleared:\t${state.puzzlesSolved}/6
First-Try Solves:\t${state.firstTrySolves}/6
Time:\t${mins}m ${secs}s`;
    navigator.clipboard.writeText(text).then(() => {
      $('copiedMsg').textContent = '✔ Copied to clipboard!';
      setTimeout(() => { try { $('copiedMsg').textContent = ''; } catch(e){} }, 3000);
    }).catch(() => {
      $('copiedMsg').textContent = 'Copy failed — select text manually.';
    });
  } catch(e) {}
}

function playAgain() {
  try {
    // Full reset
    Object.assign(state, {
      screen: 'start', currentRoom: 0, currentPuzzle: 0,
      puzzlesSolved: 0, firstTrySolves: 0, streak: 0, maxStreak: 0,
      wrongCount: 0, overrideTriggered: false, scannerActive: false,
      puzzleSolving: false, previewDone: false,
      roomDigits: [[null,null],[null,null],[null,null]],
      roomFirstTry: [[null,null],[null,null],[null,null]],
      roomScannerUsed: [[false,false],[false,false],[false,false]],
      roomOverrideUsed: [[false,false],[false,false],[false,false]],
      roomSkipped: [false,false,false],
      badges: [], startTime: 0, elapsed: 0,
      tutorialDone: false, finalLockDone: false,
      qfIndex: 0, qfCorrect: 0, qfMissed: [], qfCumulativeWrong: 0, qfAnswered: [],
      diagSlot: 0, diagFilled: [null,null],
      matchPairIndex: 0, matchSelected: null,
      seqStep: 0,
      flSelected: null, flMatched: 0, flWrongCounts: [0,0,0],
      skipConfirm: false
    });
    // Reset vault display
    for (let r = 0; r < 3; r++) {
      for (let d = 0; d < 2; d++) {
        const el = $(`v-r${r+1}d${d+1}`);
        if (el) { el.textContent = '?'; el.className = 'vault-digit'; el.style.color = ''; el.style.borderColor = ''; }
      }
    }
    $('codeVault').style.display = 'none';
    document.body.style.background = '';
    escapeAnimationFired = false;
    showScreen('startScreen');
  } catch(e) { location.reload(); }
}

// ============= EMERGENCY SKIP =============
(function setupEmergencySkip() {
  try {
    // Long-press on room title
    const topBar = document.querySelector('.top-bar');
    let pressTimer = null;
    let confirmActive = false;

    topBar.addEventListener('pointerdown', function(e) {
      if (e.target.closest('.puzzles-cleared') || e.target.closest('.streak-icon')) return;
      pressTimer = setTimeout(() => {
        if (confirmActive) {
          executeEmergencySkip();
          confirmActive = false;
        } else {
          confirmActive = true;
          $('missionLine').textContent = '⚠️ Hold again to skip this room';
          setTimeout(() => { if (confirmActive) { confirmActive = false; try { $('missionLine').textContent = rooms[state.currentRoom]?.mission || ''; } catch(e){} } }, 5000);
        }
      }, 5000);
    });
    topBar.addEventListener('pointerup', () => clearTimeout(pressTimer));
    topBar.addEventListener('pointerleave', () => clearTimeout(pressTimer));

    // Shift+S
    let shiftSStart = 0;
    document.addEventListener('keydown', function(e) {
      if (e.key === 'S' && e.shiftKey) {
        if (shiftSStart === 0) shiftSStart = Date.now();
        if (Date.now() - shiftSStart >= 2000) {
          if (state.skipConfirm) {
            executeEmergencySkip();
            state.skipConfirm = false;
            shiftSStart = 0;
          } else {
            state.skipConfirm = true;
            $('missionLine').textContent = '⚠️ Press Shift+S again to skip';
            setTimeout(() => { state.skipConfirm = false; try { $('missionLine').textContent = rooms[state.currentRoom]?.mission || ''; } catch(e){} }, 5000);
            shiftSStart = 0;
          }
        }
      }
    });
    document.addEventListener('keyup', function(e) {
      if (e.key === 'S') shiftSStart = 0;
    });
  } catch(e) { console.error('setupEmergencySkip error:', e); }
})();

function executeEmergencySkip() {
  try {
    closeAllOverlays();

    if (state.screen === 'finalLock') {
      showEscapeAnimation();
      return;
    }

    const ri = state.currentRoom;
    if (ri >= 0 && ri < 3) {
      state.roomSkipped[ri] = true;
      // Reveal remaining digits
      const room = rooms[ri];
      for (let p = 0; p < 2; p++) {
        if (state.roomDigits[ri][p] === null) {
          state.roomDigits[ri][p] = room.puzzles[p].digit;
          updateVaultDigit(ri, p, room.puzzles[p].digit + ' (Skipped)');
        }
      }
      // Move to next room or final lock
      if (ri < 2) {
        showPassTheLaptop(ri + 1);
      } else {
        showFinalLockTransition();
      }
    }
  } catch(e) { console.error('executeEmergencySkip error:', e); }
}

// ============= UTILITIES =============
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
