<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Jawad's Escape Room — Fitness Claims & Evidence Evaluation</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a2e;--bg2:#16213e;--text:#e0e0e0;--text-bright:#ffffff;
--r1:#9b59b6;--r1a:#e74c8c;--r1g:rgba(155,89,182,.4);--r1l:rgba(155,89,182,.15);
--r2:#2980b9;--r2a:#00d2ff;--r2g:rgba(41,128,185,.4);--r2l:rgba(41,128,185,.15);
--r3:#27ae60;--r3a:#f39c12;--r3g:rgba(39,174,96,.4);--r3l:rgba(39,174,96,.15);
--teal:#00bcd4;--success:#4caf50;--fail:#e74c3c;--gold:#f39c12;
--rc:var(--r1);--rca:var(--r1a);--rcg:var(--r1g);--rcl:var(--r1l);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;justify-content:center;align-items:center}
#game{width:100%;height:100%;max-width:1920px;position:relative;overflow:hidden;display:flex;flex-direction:column}
/* TOP BAR */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(0,0,0,.4);border-bottom:2px solid var(--rc);min-height:48px;z-index:10;flex-shrink:0}
.top-bar .room-name{font-size:clamp(14px,2vw,18px);font-weight:700;color:var(--rc);text-shadow:0 0 10px var(--rcg)}
.top-bar .room-progress{font-size:clamp(12px,1.5vw,14px);color:var(--text);opacity:.8}
.top-bar .puzzles-cleared{margin-left:auto;font-size:clamp(14px,1.8vw,16px);font-weight:600;color:var(--text-bright);padding:4px 12px;border:1px solid var(--rc);border-radius:20px;transition:all .3s}
.top-bar .streak{font-size:20px;margin-left:8px;opacity:0;transition:opacity .3s}
.top-bar .streak.active{opacity:1;animation:flicker 1s infinite alternate}
/* CODE VAULT */
.code-vault{position:fixed;top:8px;right:16px;z-index:20;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 12px;display:none;backdrop-filter:blur(4px)}
.code-vault.visible{display:flex;gap:10px;align-items:center}
.vault-room{display:flex;flex-direction:column;align-items:center;gap:2px}
.vault-label{font-size:10px;color:var(--text);opacity:.6}
.vault-digits{display:flex;gap:3px}
.vault-digit{width:22px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);transition:all .4s}
.vault-digit.revealed{color:var(--text-bright);border-color:currentColor;background:rgba(255,255,255,.1);animation:vaultPop .4s ease}
/* MISSION LINE */
.mission-line{text-align:center;padding:6px 16px;font-size:clamp(13px,1.6vw,15px);color:var(--rca);font-style:italic;opacity:.9;flex-shrink:0;min-height:32px}
/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;overflow-y:auto;position:relative}
/* BOTTOM BAR */
.bottom-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;min-height:52px;flex-shrink:0}
.scanner-btn{display:none;align-items:center;gap:6px;padding:8px 16px;border:2px solid var(--rc);border-radius:24px;background:transparent;color:var(--rc);font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;animation:scanPulse 2s infinite}
.scanner-btn:hover{background:var(--rcl);transform:scale(1.05)}
.progress-dots{display:flex;gap:8px;position:absolute;left:50%;transform:translateX(-50%)}
.pdot{width:12px;height:12px;border-radius:50%;border:2px solid var(--rc);background:transparent;transition:all .3s}
.pdot.filled{background:var(--rc);box-shadow:0 0 8px var(--rcg)}
/* SCREENS */
.screen{display:none;width:100%;height:100%;flex-direction:column;position:absolute;top:0;left:0}
.screen.active{display:flex}
/* START SCREEN */
#startScreen{justify-content:center;align-items:center;text-align:center;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0d0d1a 100%)}
.start-brand{font-size:clamp(10px,1.3vw,12px);text-transform:uppercase;letter-spacing:4px;color:var(--teal);margin-bottom:12px;font-weight:600}
.start-title{font-size:clamp(28px,5vw,48px);font-weight:700;color:var(--text-bright);text-shadow:0 0 30px rgba(0,188,212,.3);margin-bottom:8px;line-height:1.1}
.start-divider{width:80px;height:2px;background:var(--teal);margin:12px auto;box-shadow:0 0 10px var(--teal)}
.start-subtitle{font-size:clamp(14px,2vw,18px);color:var(--text);margin-bottom:32px}
.start-btn{padding:14px 40px;font-size:18px;font-weight:700;border:2px solid var(--teal);border-radius:30px;background:transparent;color:var(--teal);cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:2px}
.start-btn:hover{background:rgba(0,188,212,.15);box-shadow:0 0 20px rgba(0,188,212,.3);transform:scale(1.05)}
.start-footer{position:absolute;bottom:20px;font-size:10px;text-transform:uppercase;letter-spacing:3px;color:rgba(255,255,255,.25)}
/* PLAY SCREEN */
#playScreen{display:none;flex-direction:column}
/* PUZZLE CONTAINERS */
.puzzle-box{width:100%;max-width:700px;margin:0 auto;text-align:center}
.puzzle-instruction{font-size:clamp(13px,1.5vw,15px);color:var(--text);margin-bottom:10px;opacity:.8}
.micro-progress{font-size:clamp(12px,1.4vw,14px);color:var(--rca);font-weight:600;margin-bottom:8px}
/* MATCH LOCK */
.match-area{display:flex;justify-content:center;gap:24px;align-items:flex-start;flex-wrap:wrap}
.match-col{display:flex;flex-direction:column;gap:10px;min-width:140px}
.match-card{padding:14px 18px;border:2px solid rgba(255,255,255,.2);border-radius:12px;font-size:clamp(14px,1.8vw,17px);font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.04);color:var(--text);min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center;user-select:none;position:relative}
.match-card:hover{border-color:var(--rc);background:var(--rcl)}
.match-card.selected{border-color:var(--rca);background:rgba(255,255,255,.1);transform:scale(1.05);box-shadow:0 0 15px var(--rcg)}
.match-card.selected::after{content:'▶ SELECTED';position:absolute;top:-10px;right:-8px;font-size:9px;background:var(--rca);color:#fff;padding:2px 6px;border-radius:8px;font-weight:700}
.match-card.correct{border-color:var(--success);background:rgba(76,175,80,.15);color:var(--success);cursor:default}
.match-card.wrong{border-color:var(--fail);animation:shake .4s;cursor:default}
.match-card.dimmed{opacity:.35;pointer-events:none}
.match-card.locked{pointer-events:none}
/* COMPLETED PAIRS */
.completed-pairs{display:flex;flex-direction:column;gap:6px;margin-top:12px;width:100%}
.completed-pair{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 12px;background:rgba(76,175,80,.1);border:1px solid var(--success);border-radius:8px;font-size:13px;color:var(--success);animation:fadeIn .3s}
/* SEQUENCE LOCK */
.seq-slots{display:flex;gap:12px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.seq-slot{width:clamp(120px,20vw,180px);padding:14px 10px;border:2px dashed rgba(255,255,255,.2);border-radius:12px;min-height:60px;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,.3);position:relative;transition:all .3s}
.seq-slot.filled{border-style:solid;border-color:var(--success);background:rgba(76,175,80,.1);color:var(--success);font-weight:600}
.seq-slot .slot-num{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 6px;font-size:11px;color:var(--rc);font-weight:700}
.seq-arrow{font-size:24px;color:var(--rc);align-self:center;opacity:.5}
.seq-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.seq-card{padding:12px 18px;border:2px solid rgba(255,255,255,.2);border-radius:12px;font-size:clamp(13px,1.6vw,16px);font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.04);color:var(--text);min-height:48px;display:flex;align-items:center;gap:6px;user-select:none}
.seq-card:hover{border-color:var(--rc);background:var(--rcl)}
.seq-card.wrong{border-color:var(--fail);animation:shake .4s}
.seq-card.locked{pointer-events:none;opacity:.4}
.seq-card.placed{display:none}
/* SYSTEM SCANNER */
.gauges-panel{display:flex;gap:20px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.gauge{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px}
.gauge-bar-wrap{width:40px;height:clamp(80px,12vh,120px);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;position:relative;overflow:hidden}
.gauge-fill{position:absolute;bottom:0;width:100%;border-radius:0 0 7px 7px;transition:height 1s ease}
.gauge-label{font-size:clamp(11px,1.3vw,13px);color:var(--text);font-weight:600}
.gauge-val{font-size:10px;color:var(--text);opacity:.6}
.gauge-status{font-size:11px;color:var(--gold);font-weight:700;margin-top:4px;animation:pulse 1.5s infinite}
.ss-question{font-size:clamp(16px,2.2vw,22px);font-weight:700;color:var(--text-bright);margin:12px 0}
.answer-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.answer-card{padding:14px 22px;border:2px solid rgba(255,255,255,.2);border-radius:12px;font-size:clamp(14px,1.8vw,17px);font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.04);color:var(--text);min-height:48px;display:flex;align-items:center;gap:8px;user-select:none}
.answer-card:hover{border-color:var(--rc);background:var(--rcl);transform:scale(1.03)}
.answer-card.correct{border-color:var(--success);background:rgba(76,175,80,.15);color:var(--success);cursor:default}
.answer-card.wrong{border-color:var(--fail);animation:shake .4s}
.answer-card.dimmed{opacity:.35;pointer-events:none}
.answer-card.override-highlight{border-color:var(--gold);background:rgba(243,156,18,.15);color:var(--gold);box-shadow:0 0 15px rgba(243,156,18,.3);animation:overridePulse 1s infinite}
/* QUICK FIRE */
.qf-question{font-size:clamp(15px,2vw,20px);font-weight:600;color:var(--text-bright);margin:16px 0;min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center}
.qf-buttons{display:flex;gap:16px;justify-content:center}
.qf-btn{padding:16px 36px;font-size:clamp(16px,2.2vw,22px);font-weight:700;border:2px solid;border-radius:16px;cursor:pointer;transition:all .3s;min-width:120px;min-height:54px;text-transform:uppercase;letter-spacing:1px}
.qf-btn.true-btn{border-color:var(--success);color:var(--success);background:rgba(76,175,80,.08)}
.qf-btn.true-btn:hover{background:rgba(76,175,80,.2)}
.qf-btn.false-btn{border-color:var(--fail);color:var(--fail);background:rgba(231,76,60,.08)}
.qf-btn.false-btn:hover{background:rgba(231,76,60,.2)}
.qf-btn.flash-correct{background:rgba(76,175,80,.3);box-shadow:0 0 20px rgba(76,175,80,.4)}
.qf-btn.flash-wrong{background:rgba(231,76,60,.3);box-shadow:0 0 20px rgba(231,76,60,.4)}
.qf-progress{display:flex;gap:8px;justify-content:center;margin-top:12px}
.qf-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.2);transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:10px}
.qf-dot.correct{border-color:var(--success);background:rgba(76,175,80,.2);color:var(--success)}
.qf-dot.wrong{border-color:var(--fail);background:rgba(231,76,60,.2);color:var(--fail)}
.qf-scanner-hint{font-size:13px;color:var(--rca);margin-top:8px;padding:8px 12px;border:1px solid var(--rcg);border-radius:8px;background:rgba(0,0,0,.3);animation:fadeIn .3s}
/* MYSTERY INPUT */
.chain-display{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin:16px 0;padding:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:12px}
.chain-box{padding:10px 16px;border:2px solid var(--rc);border-radius:10px;font-size:clamp(13px,1.5vw,15px);font-weight:600;color:var(--text-bright);background:rgba(255,255,255,.05)}
.chain-mystery{border-color:var(--gold);color:var(--gold);animation:pulse 1.5s infinite;font-size:clamp(16px,2vw,20px)}
.chain-arrow{font-size:20px;color:var(--rc);opacity:.6}
.chain-box.solved{border-color:var(--success);color:var(--success);animation:none}
/* DIAGNOSTIC PANEL */
.diag-panel{display:flex;flex-direction:column;gap:12px;width:100%;max-width:500px;margin:0 auto}
.diag-title{font-size:clamp(16px,2vw,20px);font-weight:700;color:var(--text-bright);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:2px}
.diag-slots{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.diag-slot{width:clamp(160px,22vw,200px);padding:16px;border:2px dashed rgba(255,255,255,.2);border-radius:12px;text-align:center;transition:all .3s;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative}
.diag-slot.active{border-color:var(--rc);border-style:solid;box-shadow:0 0 10px var(--rcg)}
.diag-slot.filled{border-style:solid}
.diag-slot.correct{border-color:var(--success);background:rgba(76,175,80,.1)}
.diag-slot.wrong{border-color:var(--fail);animation:shake .4s}
.diag-slot-label{font-size:12px;color:var(--text);opacity:.7;position:absolute;top:-10px;background:var(--bg);padding:0 6px}
.diag-slot-content{font-size:16px;font-weight:600;color:var(--text-bright)}
.parts-bank{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.part-chip{padding:10px 16px;border:2px solid rgba(255,255,255,.2);border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.04);color:var(--text);display:flex;align-items:center;gap:6px;user-select:none}
.part-chip:hover{border-color:var(--rc);background:var(--rcl)}
.part-chip.used{opacity:.3;pointer-events:none}
.part-chip.wrong{border-color:var(--fail);animation:shake .4s}
/* SCANNER OVERLAY */
.scanner-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:40;background:rgba(0,0,0,.85);flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.scanner-overlay.visible{display:flex}
.scanner-overlay.inline-mode{position:relative;width:100%;height:auto;z-index:1;background:rgba(0,0,0,.4);border:1px solid var(--rcg);border-radius:12px;margin-top:10px;padding:12px}
.scanner-title{font-size:16px;font-weight:700;color:var(--rca);margin-bottom:8px}
.scanner-text{font-size:clamp(13px,1.6vw,15px);color:var(--text);max-width:500px;line-height:1.5;margin-bottom:16px}
.scanner-dismiss{padding:8px 20px;border:1px solid rgba(255,255,255,.2);border-radius:20px;background:transparent;color:var(--text);font-size:13px;cursor:pointer;transition:all .3s}
.scanner-dismiss:hover{border-color:var(--text);background:rgba(255,255,255,.05)}
/* DIGIT REVEAL */
.digit-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:45;background:rgba(0,0,0,.9);flex-direction:column;align-items:center;justify-content:center}
.digit-overlay.visible{display:flex}
.digit-reveal-num{font-size:clamp(60px,12vw,100px);font-weight:700;color:var(--rc);text-shadow:0 0 40px var(--rcg);animation:digitPop .6s ease}
.digit-reveal-label{font-size:16px;color:var(--text);margin-top:8px}
.digit-continue{margin-top:20px;padding:12px 30px;border:2px solid var(--rc);border-radius:24px;background:transparent;color:var(--rc);font-size:15px;font-weight:600;cursor:pointer;transition:all .3s}
.digit-continue:hover{background:var(--rcl);box-shadow:0 0 15px var(--rcg)}
/* CODE ENTRY */
.code-entry{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:42;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center}
.code-entry.visible{display:flex}
.code-entry-title{font-size:clamp(20px,3vw,28px);font-weight:700;color:var(--rc);margin-bottom:4px}
.code-entry-sub{font-size:14px;color:var(--rca);margin-bottom:16px}
.code-input-wrap{display:flex;gap:12px;margin-bottom:16px}
.code-digit-input{width:56px;height:64px;font-size:28px;font-weight:700;text-align:center;border:2px solid var(--rc);border-radius:12px;background:rgba(255,255,255,.05);color:var(--text-bright);outline:none;transition:all .3s}
.code-digit-input:focus{box-shadow:0 0 15px var(--rcg);border-color:var(--rca)}
.code-submit{padding:12px 30px;border:2px solid var(--rc);border-radius:24px;background:transparent;color:var(--rc);font-size:16px;font-weight:600;cursor:pointer;transition:all .3s}
.code-submit:hover{background:var(--rcl);box-shadow:0 0 15px var(--rcg)}
.code-error{color:var(--fail);font-size:14px;margin-top:8px;min-height:20px}
/* PASS THE LAPTOP */
.pass-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:43;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.pass-overlay.visible{display:flex}
.pass-text{font-size:clamp(28px,5vw,48px);font-weight:700;color:var(--text-bright);margin-bottom:20px;letter-spacing:2px}
.pass-ready{padding:14px 36px;border:2px solid var(--text-bright);border-radius:28px;background:transparent;color:var(--text-bright);font-size:18px;font-weight:600;cursor:pointer;transition:all .3s}
.pass-ready:hover{background:rgba(255,255,255,.1)}
/* DOOR TRANSITION */
.door-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none}
.door-panel{width:80%;max-width:400px;height:70%;background:#0d0d1a;border:3px solid var(--rc);border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.door-icon{font-size:48px}
.door-label{font-size:24px;font-weight:700;color:var(--rc);text-transform:uppercase;letter-spacing:3px}
.door-lock{font-size:32px;color:var(--rca)}
/* SCAN THE ROOM PREVIEW */
.scan-preview{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:35;background:rgba(0,0,0,.9);flex-direction:column;align-items:center;justify-content:center;text-align:center}
.scan-preview.visible{display:flex}
.scan-frame{border:2px solid var(--rc);border-radius:16px;padding:24px 32px;max-width:500px;width:90%;box-shadow:0 0 30px var(--rcg);position:relative;overflow:hidden}
.scan-frame::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);animation:scanSweep 1.5s ease infinite}
.scan-label{font-size:12px;text-transform:uppercase;letter-spacing:3px;color:var(--rc);margin-bottom:12px}
.scan-content{font-size:clamp(14px,1.8vw,18px);color:var(--text-bright);line-height:1.6}
.scan-bar{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:16px;overflow:hidden}
.scan-bar-fill{height:100%;background:var(--rc);border-radius:2px;animation:scanBarFill 3.5s linear}
/* FINAL LOCK */
.final-match-area{display:flex;justify-content:center;gap:clamp(16px,4vw,40px);align-items:flex-start;flex-wrap:wrap}
.final-col{display:flex;flex-direction:column;gap:10px}
.final-card{padding:12px 18px;border:2px solid;border-radius:12px;font-size:clamp(13px,1.6vw,16px);font-weight:600;cursor:pointer;transition:all .3s;min-height:48px;display:flex;align-items:center;gap:8px;user-select:none;min-width:clamp(140px,20vw,200px);justify-content:center;text-align:center;position:relative}
.final-card.term{background:rgba(255,255,255,.05)}
.final-card.target{border-color:rgba(255,255,255,.2);color:var(--text);background:rgba(255,255,255,.04)}
.final-card:hover{transform:scale(1.03)}
.final-card.selected{transform:scale(1.05);box-shadow:0 0 15px currentColor}
.final-card.selected::after{content:'▶';position:absolute;right:6px;font-size:10px}
.final-card.matched{opacity:.7;cursor:default;pointer-events:none}
.final-card.wrong{animation:shake .4s}
/* ESCAPE REPORT */
#escapeReport{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:55;background:radial-gradient(ellipse at center,#1a1a3e,#0a0a15);flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:20px}
#escapeReport.visible{display:flex}
.report-escaped{font-size:clamp(36px,7vw,64px);font-weight:700;color:var(--teal);text-shadow:0 0 40px rgba(0,188,212,.4);margin:20px 0;animation:escapePulse 2s ease}
.report-brand{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:rgba(0,188,212,.5);margin-bottom:20px}
.report-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px 28px;max-width:500px;width:90%;margin-bottom:16px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:15px}
.report-row:last-child{border-bottom:none}
.report-row .label{color:var(--text);opacity:.8}
.report-row .value{color:var(--text-bright);font-weight:600}
.report-stars{font-size:28px;letter-spacing:4px}
.report-star{color:rgba(255,255,255,.15);transition:all .3s}
.report-star.earned{color:var(--gold);text-shadow:0 0 10px rgba(243,156,18,.4)}
.report-badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.report-badge{padding:6px 14px;border:1px solid var(--teal);border-radius:16px;font-size:13px;color:var(--teal);background:rgba(0,188,212,.08)}
.report-btns{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.report-btn{padding:10px 24px;border:2px solid var(--teal);border-radius:24px;background:transparent;color:var(--teal);font-size:14px;font-weight:600;cursor:pointer;transition:all .3s}
.report-btn:hover{background:rgba(0,188,212,.15)}
/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;z-index:56;pointer-events:none}
/* TUTORIAL */
.tutorial-card{padding:16px 22px;border:2px solid rgba(255,255,255,.2);border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.04);color:var(--text);min-height:48px;display:flex;align-items:center;justify-content:center;user-select:none}
.tutorial-card:hover{border-color:var(--teal);background:rgba(0,188,212,.08)}
.tutorial-card.selected{border-color:var(--teal);transform:scale(1.05);box-shadow:0 0 15px rgba(0,188,212,.3)}
.tutorial-card.selected::after{content:'▶ SELECTED';position:absolute;top:-10px;right:-8px;font-size:9px;background:var(--teal);color:#fff;padding:2px 6px;border-radius:8px;font-weight:700}
.tutorial-card.correct{border-color:var(--success);background:rgba(76,175,80,.15);color:var(--success)}
.tutorial-card.wrong{border-color:var(--fail);animation:shake .4s}
.skip-tutorial{position:absolute;top:12px;right:16px;padding:6px 16px;border:1px solid rgba(255,255,255,.2);border-radius:16px;background:transparent;color:var(--text);font-size:12px;cursor:pointer;transition:all .3s;z-index:5}
.skip-tutorial:hover{border-color:var(--text);background:rgba(255,255,255,.05)}
/* ROOM ATMOSPHERE */
.room-atmos{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.atmos-gradient{position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:radial-gradient(ellipse,var(--rcl) 0%,transparent 70%);animation:atmosDrift 20s linear infinite;opacity:.4}
.atmos-grid{position:absolute;width:100%;height:100%;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px}
/* ANIMATIONS */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes scanPulse{0%,100%{box-shadow:0 0 5px var(--rcg)}50%{box-shadow:0 0 20px var(--rcg)}}
@keyframes flicker{0%{opacity:.7;transform:scale(1)}100%{opacity:1;transform:scale(1.15)}}
@keyframes vaultPop{0%{transform:scale(1.4);opacity:.5}100%{transform:scale(1);opacity:1}}
@keyframes digitPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanSweep{0%{left:-100%}100%{left:200%}}
@keyframes scanBarFill{from{width:0}to{width:100%}}
@keyframes overridePulse{0%,100%{box-shadow:0 0 10px rgba(243,156,18,.2)}50%{box-shadow:0 0 25px rgba(243,156,18,.5)}}
@keyframes escapePulse{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes doorAnim{0%{opacity:0}20%{opacity:1}55%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-110%)}}
@keyframes doorAnimSlow{0%{opacity:0}15%{opacity:1}50%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-110%)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes atmosDrift{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
/* Responsive */
@media(max-width:768px){.match-area,.final-match-area{flex-direction:column;align-items:center}.gauges-panel{gap:12px}.code-vault{top:auto;bottom:8px;right:8px}}
</style>
</head>
<body>
<div id="game">
<div id="startScreen" class="screen active">
<div class="start-brand">Mr. Jawad's Escape Room Simulations</div>
<div class="start-title">Fitness Claims &<br>Evidence Evaluation</div>
<div class="start-divider"></div>
<div class="start-subtitle">Unit Review</div>
<button class="start-btn" onclick="startGame()">BEGIN ESCAPE</button>
<div class="start-footer">DESIGNED BY MR. JAWAD</div>
</div>
<div id="playScreen" class="screen">
<div class="room-atmos" id="roomAtmos"><div class="atmos-gradient"></div><div class="atmos-grid"></div></div>
<div class="top-bar">
<div>
<span class="room-name" id="roomName"></span>
<span class="room-progress" id="roomProgress"></span>
</div>
<div class="puzzles-cleared" id="puzzlesCleared">Puzzles Cleared: 0/6</div>
<div class="streak" id="streakIcon">🔥</div>
</div>
<div class="mission-line" id="missionLine"></div>
<div class="main-area" id="mainArea"></div>
<div class="bottom-bar">
<button class="scanner-btn" id="scannerBtn" onclick="openScanner()">🔍 Scanner</button>
<div class="progress-dots" id="progressDots"></div>
<div style="width:80px"></div>
</div>
</div>
<div class="code-vault" id="codeVault">
<div class="vault-room" id="vr1"><div class="vault-label" style="color:var(--r1)">R1</div><div class="vault-digits"><div class="vault-digit" id="v1d1">?</div><div class="vault-digit" id="v1d2">?</div></div></div>
<div class="vault-room" id="vr2"><div class="vault-label" style="color:var(--r2)">R2</div><div class="vault-digits"><div class="vault-digit" id="v2d1">?</div><div class="vault-digit" id="v2d2">?</div></div></div>
<div class="vault-room" id="vr3"><div class="vault-label" style="color:var(--r3)">R3</div><div class="vault-digits"><div class="vault-digit" id="v3d1">?</div><div class="vault-digit" id="v3d2">?</div></div></div>
</div>
<div class="scanner-overlay" id="scannerOverlay">
<div class="scanner-title">📡 SCANNER ACTIVE</div>
<div class="scanner-text" id="scannerText"></div>
<button class="scanner-dismiss" onclick="closeScanner()">Dismiss</button>
</div>
<div class="digit-overlay" id="digitOverlay">
<div class="digit-reveal-num" id="digitNum"></div>
<div class="digit-reveal-label" id="digitLabel">Code Digit Unlocked</div>
<button class="digit-continue" id="digitContinue">Continue</button>
</div>
<div class="code-entry" id="codeEntry">
<div class="code-entry-title" id="codeEntryTitle">Enter Room Code</div>
<div class="code-entry-sub" id="codeEntrySub"></div>
<div class="code-input-wrap"><input class="code-digit-input" id="ci1" type="tel" maxlength="1" inputmode="numeric"><input class="code-digit-input" id="ci2" type="tel" maxlength="1" inputmode="numeric"></div>
<button class="code-submit" onclick="submitCode()">UNLOCK</button>
<div class="code-error" id="codeError"></div>
</div>
<div class="pass-overlay" id="passOverlay">
<div class="pass-text">🔄 PASS THE LAPTOP</div>
<button class="pass-ready" id="passReady">READY</button>
</div>
<div class="scan-preview" id="scanPreview">
<div class="scan-frame">
<div class="scan-label">SCANNING ROOM...</div>
<div class="scan-content" id="scanContent"></div>
<div class="scan-bar"><div class="scan-bar-fill"></div></div>
</div>
</div>
<div id="escapeReport">
<div class="report-brand">Mr. Jawad's Escape Room Simulations</div>
<div class="report-escaped">ESCAPED!</div>
<div id="reportContent"></div>
</div>
</div>
<script>
'use strict';
/* ==================== STATE ==================== */
const S={
room:0,puzzle:0,puzzlesCleared:0,totalFirstTry:0,streak:0,maxStreak:0,
wrongCount:0,scannerUsed:false,overrideTriggered:false,puzzleSolving:false,
startTime:0,roomDigits:[[null,null],[null,null],[null,null]],
roomData:[],puzzleWrongs:{},badgeData:{rooms:[{p1w:0,p2w:0,p1scan:false,p2scan:false},{p1w:0,p2w:0,p1scan:false,p2scan:false},{p1w:0,p2w:0,p1scan:false,p2scan:false}]},
skippedRooms:new Set(),screen:'start',qfState:null,finalLockState:null,
longPressTimer:null,shiftSTimer:null,shiftSDown:false
};

/* ==================== CONTENT DATA ==================== */
const ROOMS=[
{name:'THE INFLUENCE LAB',emoji:'📱',color:'var(--r1)',accent:'var(--r1a)',code:'73',
mission:'Expose the fake claims before they go viral.',
scanPreviews:[
'📱 🏋️ 🍵 🍎 👗\nScenario cards flash across the feed — claim titles and emoji icons pulse before fading...',
'🏋️ "Dry Scooping"\nBriatney\'s scenario card flashes — the Evidence? column shows a red ✖ before fading...'
],
puzzles:[
{type:'match',digit:'7',
pairs:[['Testimonial 🗣️','One person\'s story'],['Evidence 🔬','Real proof from testing'],['Influencer 📱','Big following online']],
distractors:[['One person\'s story','Real proof from testing','Big following online'],['Real proof from testing','One person\'s story','Big following online'],['Big following online','One person\'s story','Real proof from testing']],
scannerText:'📡 Bad Advice, Real Damage — scenario cards labeled each claim and showed whether real evidence existed.',
narrowChoices:[['One person\'s story','Real proof from testing'],['Real proof from testing','Big following online'],['Big following online','One person\'s story']]
},
{type:'sequence',digit:'3',
cards:[{label:'No evidence checked',icon:'📵'},{label:'Dry scoops pre-workout',icon:'🏋️'},{label:'Heart attack at 20',icon:'🏥'}],
scannerText:'📡 Bad Advice, Real Damage — Briatney\'s scenario card showed zero studies behind the dry scooping claim before the consequence hit.',
narrowChoices:[['No evidence checked','Dry scoops pre-workout'],['Dry scoops pre-workout','Heart attack at 20']]
}
]},
{name:'THE DATA VAULT',emoji:'🔬',color:'var(--r2)',accent:'var(--r2a)',code:'59',
mission:'Calibrate the data systems to separate real evidence from noise.',
scanPreviews:[
'📊 Confidence gauge panel — percentage meter and data spread indicator with sample size sliders visible...',
'📈 Evidence meter — Red Flag / Weak / Strong zones with green check icons floating...'
],
puzzles:[
{type:'system',digit:'5',
gauges:[{label:'Sample Size',height:95,val:'1,000',color:'var(--r2a)'},{label:'Study Length',height:15,val:'1 Day',color:'var(--fail)'},{label:'Confidence',height:55,val:'55%',color:'var(--gold)',status:'⚠️ CAPPED'}],
question:'Why is confidence stuck?',
options:[{text:'Study too short',correct:true},{text:'Too many people',correct:false},{text:'Not enough people',correct:false}],
scannerText:'📡 Testing Fitness Claims — the confidence gauge hit a ceiling when sample size was high but study length stayed short.',
narrowTo:['Study too short','Not enough people']
},
{type:'quickfire',digit:'9',
questions:[
{text:'🧴 "Detox Tea: 0 checks + selling = Red Flag"',answer:true},
{text:'💰 "Selling a product = claim is automatically false"',answer:false},
{text:'🏋️ "Sit-Up Fat Burn: strong evidence = Disproven"',answer:true},
{text:'🤔 "A gut feeling counts as real evidence"',answer:false}
],
scannerText:'📡 Evaluating Fitness Claims — the evidence meter shifted based on how many green checks a claim had and whether someone was selling.'
}
]},
{name:'THE EVIDENCE CHAMBER',emoji:'📊',color:'var(--r3)',accent:'var(--r3a)',code:'28',
mission:'Restore the evidence analyzer before the last claims slip through.',
scanPreviews:[
'🎯 Evidence meter needle in the Strong zone — "DISPROVEN" label glowing next to the spot reduction icon...',
'✅❌ Evidence feature checklist — green and red indicators next to feature labels flash...'
],
puzzles:[
{type:'mystery',digit:'2',
chain:['All 5 evidence features ✅','Rating = STRONG','Spot reduction is ???'],
options:[{text:'Proven ✅',correct:false},{text:'Disproven ❌',correct:true},{text:'Weak ⚠️',correct:false}],
scannerText:'📡 Evaluating Evidence Strength — the evidence meter hit Strong for spot reduction, but 13 studies with controls proved the claim was false.',
narrowTo:['Proven ✅','Disproven ❌']
},
{type:'diagnostic',digit:'8',
title:'EVIDENCE ANALYZER',
slots:[{label:'⚠️ Bias Warning',correct:'Selling 💰'},{label:'⬆️ Strength Booster',correct:'Replicated 🔄'}],
parts:['Selling 💰','Replicated 🔄','Celebrity Post ⭐','Testimonial 🗣️','Gut Feeling 🤔'],
scannerText:'📡 Evaluating Evidence Strength — the evidence meter dropped when a seller funded the study and rose when results were replicated by other scientists.',
narrowChoices:[['Selling 💰','Testimonial 🗣️'],['Replicated 🔄','Celebrity Post ⭐']]
}
]}
];

const FINAL_LOCK=[
{term:'Influencer 📱',target:'Big following online',color:'var(--r1)'},
{term:'Sample Size 🔬',target:'Number of people in the study',color:'var(--r2)'},
{term:'Disproven 📊',target:'Claim strong evidence shows is FALSE',color:'var(--r3)'}
];

/* ==================== UTILITIES ==================== */
function $(id){return document.getElementById(id)}
function closeAllOverlays(){try{['scannerOverlay','digitOverlay','codeEntry','passOverlay','scanPreview'].forEach(id=>{const el=$(id);if(el){el.classList.remove('visible');el.style.display='none'}})}catch(e){}}
function setRoomTheme(ri){
const colors=[['var(--r1)','var(--r1a)','var(--r1g)','var(--r1l)'],['var(--r2)','var(--r2a)','var(--r2g)','var(--r2l)'],['var(--r3)','var(--r3a)','var(--r3g)','var(--r3l)']];
if(ri>=0&&ri<3){const c=colors[ri];document.documentElement.style.setProperty('--rc',c[0]);document.documentElement.style.setProperty('--rca',c[1]);document.documentElement.style.setProperty('--rcg',c[2]);document.documentElement.style.setProperty('--rcl',c[3])}
}
function updateVault(room,pIdx,digit){
try{const id='v'+(room+1)+'d'+(pIdx+1);const el=$(id);if(el){el.textContent=digit;el.classList.add('revealed');el.style.color=ROOMS[room].color}}catch(e){}
}
function updatePuzzlesCleared(){
try{$('puzzlesCleared').textContent='Puzzles Cleared: '+S.puzzlesCleared+'/6';$('puzzlesCleared').style.animation='none';void $('puzzlesCleared').offsetWidth;$('puzzlesCleared').style.animation='vaultPop .3s ease'}catch(e){}
}
function updateStreak(){try{$('streakIcon').classList.toggle('active',S.streak>=2)}catch(e){}}
function updateProgressDots(){
try{const dots=$('progressDots');dots.innerHTML='';for(let i=0;i<2;i++){const d=document.createElement('div');d.className='pdot';if(i<S.puzzle)d.classList.add('filled');dots.appendChild(d)}}catch(e){}
}
function spawnParticles(x,y,count,color){
try{const max=Math.min(count||8,12);for(let i=0;i<max;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=x+'px';p.style.top=y+'px';p.style.background=color||'var(--rc)';const angle=Math.random()*360;const dist=40+Math.random()*60;const dx=Math.cos(angle*Math.PI/180)*dist;const dy=Math.sin(angle*Math.PI/180)*dist;p.style.animation='none';document.body.appendChild(p);p.style.transition='all .6s ease-out';p.style.opacity='1';requestAnimationFrame(()=>{p.style.transform='translate('+dx+'px,'+dy+'px)';p.style.opacity='0'});const cleanup=()=>{try{p.remove()}catch(e){}};p.addEventListener('transitionend',cleanup);setTimeout(cleanup,800)}}catch(e){}
}

/* ==================== SCANNER ==================== */
function openScanner(){
try{if(S.screen==='quickfire'){return}
const ov=$('scannerOverlay');ov.style.display='flex';ov.classList.add('visible')}catch(e){}
}
function closeScanner(){
try{const ov=$('scannerOverlay');ov.classList.remove('visible');ov.style.display='none'}catch(e){}
}
function showScannerInline(text){
try{$('scannerText').textContent=text;openScanner()}catch(e){}
}

/* ==================== GAME START ==================== */
function startGame(){
try{S.startTime=Date.now();
$('startScreen').classList.remove('active');$('startScreen').style.display='none';
$('playScreen').classList.add('active');$('playScreen').style.display='flex';
$('codeVault').classList.add('visible');
showTutorial()}catch(e){console.error(e)}
}

/* ==================== TUTORIAL ==================== */
function showTutorial(){
try{S.screen='tutorial';
$('roomName').textContent='TUTORIAL';$('roomProgress').textContent='';$('missionLine').textContent='Learn the basics — tap to match!';
$('scannerBtn').style.display='none';$('progressDots').innerHTML='';
setRoomTheme(0);
const area=$('mainArea');
area.innerHTML='';
const wrap=document.createElement('div');wrap.className='puzzle-box';wrap.style.position='relative';
const skipBtn=document.createElement('button');skipBtn.className='skip-tutorial';skipBtn.textContent='Skip Tutorial ⏩';skipBtn.onclick=()=>{try{skipTutorial()}catch(e){}};
wrap.appendChild(skipBtn);
const inst=document.createElement('div');inst.className='puzzle-instruction';inst.textContent='👆 Tap a word on the LEFT, then tap its match on the RIGHT.';
wrap.appendChild(inst);
const prog=document.createElement('div');prog.className='micro-progress';prog.id='tutProg';prog.textContent='Pair 1 of 2';
wrap.appendChild(prog);
const pairs=[['Sun ☀️','Hot 🔥'],['Ice 🧊','Cold ❄️']];
let step=0,selected=null;
const matchArea=document.createElement('div');matchArea.className='match-area';matchArea.id='tutMatch';
function renderPair(){
try{matchArea.innerHTML='';
const lc=document.createElement('div');lc.className='match-col';
const rc=document.createElement('div');rc.className='match-col';
const term=document.createElement('div');term.className='tutorial-card';term.textContent=pairs[step][0];term.style.position='relative';
term.onclick=()=>{try{if(term.classList.contains('correct'))return;document.querySelectorAll('.tutorial-card.selected').forEach(c=>c.classList.remove('selected'));term.classList.add('selected');selected='term'}catch(e){}};
lc.appendChild(term);
const opts=step===0?['Hot 🔥','Cold ❄️']:['Cold ❄️','Hot 🔥'];
opts.forEach(o=>{const card=document.createElement('div');card.className='tutorial-card';card.textContent=o;card.style.position='relative';
card.onclick=()=>{try{if(card.classList.contains('correct'))return;
if(selected==='term'){
if(o===pairs[step][1]){term.classList.remove('selected');term.classList.add('correct');card.classList.add('correct');term.textContent=pairs[step][0]+' ✔';card.textContent=o+' ✔';selected=null;
setTimeout(()=>{step++;if(step<2){$('tutProg').textContent='Pair '+(step+1)+' of 2';renderPair()}else{$('tutProg').textContent='Complete!';setTimeout(()=>endTutorial(),800)}},600)
}else{card.classList.add('wrong');setTimeout(()=>card.classList.remove('wrong'),400)}
}else{document.querySelectorAll('.tutorial-card.selected').forEach(c=>c.classList.remove('selected'));term.classList.add('selected');selected='term'}}catch(e){}};
rc.appendChild(card)});
matchArea.appendChild(lc);matchArea.appendChild(rc)}catch(e){}}
renderPair();
wrap.appendChild(matchArea);area.appendChild(wrap)}catch(e){console.error(e);endTutorial()}
}
function skipTutorial(){endTutorial()}
function endTutorial(){try{S.room=0;S.puzzle=0;showDoorTransition(0)}catch(e){loadRoom(0)}}

/* ==================== DOOR TRANSITION ==================== */
function showDoorTransition(roomIdx,isFinal){
try{closeAllOverlays();
setRoomTheme(isFinal?0:roomIdx);
const ov=document.createElement('div');ov.className='door-overlay';
const panel=document.createElement('div');panel.className='door-panel';
const icon=document.createElement('div');icon.className='door-icon';icon.textContent=isFinal?'🔐':ROOMS[roomIdx].emoji;
const label=document.createElement('div');label.className='door-label';label.textContent=isFinal?'FINAL LOCK':ROOMS[roomIdx].name;
const lock=document.createElement('div');lock.className='door-lock';lock.textContent='🔓';
panel.appendChild(icon);panel.appendChild(label);panel.appendChild(lock);ov.appendChild(panel);document.body.appendChild(ov);
const dur=isFinal?'1.8s':'1.2s';ov.style.animation='doorAnim'+(isFinal?'Slow':'')+' '+dur+' ease forwards';
let cleaned=false;
const cleanup=()=>{if(cleaned)return;cleaned=true;try{ov.remove()}catch(e){}
if(isFinal){loadFinalLock()}else{loadRoom(roomIdx)}};
ov.addEventListener('animationend',cleanup);
setTimeout(cleanup,isFinal?2500:1800)}catch(e){if(isFinal)loadFinalLock();else loadRoom(roomIdx)}
}

/* ==================== ROOM LOADING ==================== */
function loadRoom(ri){
try{S.room=ri;S.puzzle=0;S.screen='room';setRoomTheme(ri);
const r=ROOMS[ri];
$('roomName').textContent=r.emoji+' '+r.name;$('roomProgress').textContent=' — Room '+(ri+1)+' of 3';
$('missionLine').textContent=r.mission;
$('scannerBtn').style.display='flex';updateProgressDots();
showScanPreview(ri,0)}catch(e){console.error(e);try{loadPuzzle()}catch(e2){}}
}

/* ==================== SCAN THE ROOM PREVIEW ==================== */
function showScanPreview(ri,pi){
try{S._previewGuard=false;
const sp=$('scanPreview');$('scanContent').textContent=ROOMS[ri].scanPreviews[pi];
sp.style.display='flex';sp.classList.add('visible');
const finish=()=>{if(S._previewGuard)return;S._previewGuard=true;
sp.classList.remove('visible');sp.style.display='none';loadPuzzle()};
setTimeout(finish,3500);setTimeout(finish,5000)}catch(e){loadPuzzle()}
}

/* ==================== PUZZLE LOADER ==================== */
function loadPuzzle(){
try{S.wrongCount=0;S.scannerUsed=false;S.overrideTriggered=false;S.puzzleSolving=false;
closeScanner();
const r=ROOMS[S.room];const p=r.puzzles[S.puzzle];
$('scannerText').textContent=p.scannerText;
$('scannerBtn').style.display='flex';

function renderMatch(p){

const completed=document.createElement('div');completed.className='completed-pairs';completed.id='matchCompleted';wrap.appendChild(completed);
area.appendChild(wrap);
let step=0,selected=null,wrongOptions=new Set();
function renderPair(){
try{if(step>=3){puzzleSolved(p.digit);return}
$('matchProg').textContent='Pair '+(step+1)+' of 3';
const mc=$('matchContainer');mc.innerHTML='';
const ma=document.createElement('div');ma.className='match-area';

const rc=document.createElement('div');rc.className='match-col';

lc.appendChild(termCard);
const opts=p.distractors[step].slice();
// shuffle
for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]]}
opts.forEach(o=>{const card=document.createElement('div');card.className='match-card';card.textContent=o;

termCard.classList.remove('selected');termCard.classList.add('correct','locked');termCard.textContent=p.pairs[step][0]+' ✔';
card.classList.add('correct');card.textContent=o+' ✔';
const cp=$('matchCompleted');const pair=document.createElement('div');pair.className='completed-pair';pair.textContent=p.pairs[step][0]+' → '+p.pairs[step][1];cp.appendChild(pair);

rc.appendChild(card)});
ma.appendChild(lc);ma.appendChild(rc);mc.appendChild(ma)}catch(e){}}

renderPair()}catch(e){showRetry()}
}

const keep=new Set(p.narrowChoices[step]);
rc.querySelectorAll('.match-card').forEach(c=>{if(!c.classList.contains('correct')&&!keep.has(c.textContent.replace(' ✔',''))){c.classList.add('dimmed')}})}catch(e){}
}
function overrideMatch(){
try{const p=ROOMS[S.room].puzzles[S.puzzle];
let step=S._matchStep?S._matchStep():0;
function autoSolve(){
if(step>=3){puzzleSolved(p.digit);return}
const mc=$('matchContainer');

function renderSequence(p){
try{S.screen='puzzle';
const area=$('mainArea');const wrap=document.createElement('div');wrap.className='puzzle-box';

area.appendChild(wrap);
let step=0;const placed=new Set();
function renderCards(){
try{$('seqProg').textContent=step>=3?'Complete!':'Step '+(step+1)+' of 3';
$('seqPrompt').textContent=step<2?prompts[step]:'';
if(step>=3){puzzleSolved(p.digit);return}
const cd=$('seqCards');cd.innerHTML='';
if(step===2){
// auto-place last
const remaining=p.cards.findIndex((_,i)=>!placed.has(i));
if(remaining>=0){
placed.add(remaining);
const slot=$('seqSlot2');slot.innerHTML='<span class="slot-num">3</span>';slot.innerHTML+=p.cards[remaining].icon+' '+p.cards[remaining].label+' ✔';
slot.classList.add('filled');
setTimeout(()=>{step=3;renderCards()},600);return}}
const indices=[0,1,2].filter(i=>!placed.has(i));
// shuffle
for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]]}
indices.forEach(idx=>{
const card=document.createElement('div');card.className='seq-card';card.textContent=p.cards[idx].icon+' '+p.cards[idx].label;
card.dataset.idx=idx;card.dataset.correct=(idx===step)?'true':'false';

slot.innerHTML+=p.cards[step].icon+' '+p.cards[step].label+' ✔';slot.classList.add('filled');
step++;setTimeout(()=>renderCards(),500)
}else{card.classList.add('wrong');setTimeout(()=>card.classList.remove('wrong'),400);
handleWrongAnswer(()=>narrowSequence(step,p))}}catch(e){}};
cd.appendChild(card)})}catch(e){}}
S._seqStep=()=>step;S._seqSetStep=v=>{step=v};S._seqPlaced=placed;
renderCards()}catch(e){showRetry()}
}
function narrowSequence(step,p){
try{if(!p.narrowChoices||!p.narrowChoices[step])return;
const keep=new Set(p.narrowChoices[step].map(t=>{const c=p.cards.find(cc=>cc.label===t);return c?c.icon+' '+c.label:t}));
document.querySelectorAll('.seq-card').forEach(c=>{if(!keep.has(c.textContent))c.classList.add('locked')})}catch(e){}
}
function overrideSequence(){
try{const p=ROOMS[S.room].puzzles[S.puzzle];
let step=S._seqStep?S._seqStep():0;
const placed=S._seqPlaced||new Set();
$('seqCards').innerHTML='<div style="color:var(--gold);font-size:16px;font-weight:600;padding:12px">⚡ Lock override triggered</div>';
function autoPlace(){
if(step>=3){puzzleSolved(p.digit);return}
if(!placed.has(step)){placed.add(step);
const slot=$('seqSlot'+step);if(slot){slot.innerHTML='<span class="slot-num">'+(step+1)+'</span>';
slot.innerHTML+=p.cards[step].icon+' '+p.cards[step].label+' ✔';slot.classList.add('filled')}}
step++;setTimeout(()=>autoPlace(),500)}
autoPlace()}catch(e){puzzleSolved(ROOMS[S.room].puzzles[S.puzzle].digit)}
}

function renderQuickFire(p){
try{S.screen='quickfire';
$('scannerBtn').style.display='none';
const area=$('mainArea');const wrap=document.createElement('div');wrap.className='puzzle-box';
const qf={qIdx:0,results:Array(4).fill(null),missed:[],cumulativeWrong:0,done:false,indices:[0,1,2,3]};
S.qfState=qf;
const qText=document.createElement('div');qText.className='qf-question';qText.id='qfText';wrap.appendChild(qText);

btns.appendChild(trueBtn);btns.appendChild(falseBtn);wrap.appendChild(btns);

const idx=qf.indices[qf.qIdx];
$('qfText').textContent=p.questions[idx].text;
$('qfHint').innerHTML='';

$('qfTrue').className='qf-btn true-btn';$('qfFalse').className='qf-btn false-btn';
$('qfTrue').onclick=()=>checkQF(true);$('qfFalse').onclick=()=>checkQF(false)}catch(e){}}
function checkQF(ans){
try{if(qf.done)return;
$('qfTrue').disabled=true;$('qfFalse').disabled=true;
const idx=qf.indices[qf.qIdx];const correct=p.questions[idx].answer===ans;
if(correct){
qf.results[idx]=true;
const dot=$('qfDot'+idx);dot.classList.add('correct');dot.textContent='✔';
const btn=ans?$('qfTrue'):$('qfFalse');btn.classList.add('flash-correct')
}else{
qf.results[idx]=false;qf.cumulativeWrong++;S.wrongCount++;
const dot=$('qfDot'+idx);dot.classList.add('wrong');dot.textContent='✖';

if(qf.cumulativeWrong>=5){overrideQuickFire();return}
}
qf.qIdx++;
setTimeout(()=>showQuestion(),600)}catch(e){}}
function finishQFPass(){
try{const correctCount=qf.results.filter(r=>r===true).length;
if(correctCount>=3){qf.done=true;puzzleSolved(p.digit);return}
// retry missed
const missed=[];qf.results.forEach((r,i)=>{if(r!==true)missed.push(i)});
qf.indices=missed;qf.qIdx=0;

missed.forEach(i=>{const d=$('qfDot'+i);d.className='qf-dot';d.textContent=''});

setTimeout(()=>showQuestion(),800)}catch(e){}}
showQuestion()}catch(e){showRetry()}
}

for(let i=0;i<4;i++){if(qf.results[i]!==true){qf.results[i]=true;const d=$('qfDot'+i);d.className='qf-dot correct';d.textContent='✔'}}

wrap.appendChild(slotsDiv);
const bank=document.createElement('div');bank.className='parts-bank';bank.id='partsBank';
const shuffled=p.parts.slice();for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]}
shuffled.forEach(part=>{
const chip=document.createElement('div');chip.className='part-chip';chip.textContent=part;chip.dataset.part=part;
chip.onclick=()=>{try{diagPlacePart(chip,p)}catch(e){}};
bank.appendChild(chip)});
wrap.appendChild(bank);area.appendChild(wrap);
S._diagSlot=0}catch(e){showRetry()}
}
function diagPlacePart(chip,p){
try{if(chip.classList.contains('used'))return;
const slotIdx=S._diagSlot;if(slotIdx>=2)return;
const correct=p.slots[slotIdx].correct;
const slot=$('diagSlot'+slotIdx);const content=$('diagSlotContent'+slotIdx);
content.textContent=chip.textContent;
if(chip.dataset.part===correct){
chip.classList.add('used');slot.classList.remove('active');slot.classList.add('correct','filled');content.textContent=chip.textContent+' ✔';
S._diagSlot++;
if(S._diagSlot<2){
// Restore chips that were narrowed (not actually placed) so Slot 2 has full options
document.querySelectorAll('.part-chip').forEach(c=>{if(!c.classList.contains('used')||c===chip)return;
for(let s=0;s<S._diagSlot;s++){const sc=$('diagSlotContent'+s);if(sc&&sc.textContent.replace(' ✔','')===c.textContent){return}}
c.classList.remove('used')});
$('diagSlot'+S._diagSlot).classList.add('active');$('diagProg').textContent='Slot 2 of 2'}
else{$('diagProg').textContent='Complete!';setTimeout(()=>puzzleSolved(p.digit),600)}
}else{
slot.classList.add('wrong');chip.classList.add('wrong');
setTimeout(()=>{slot.classList.remove('wrong');chip.classList.remove('wrong');content.textContent='Empty'},400);
handleWrongAnswer(()=>narrowDiag(p,slotIdx))}
}catch(e){}
}
function narrowDiag(p,slotIdx){
try{if(!p.narrowChoices||!p.narrowChoices[slotIdx])return;
const keep=new Set(p.narrowChoices[slotIdx]);
document.querySelectorAll('.part-chip').forEach(c=>{if(!c.classList.contains('used')&&!keep.has(c.textContent))c.classList.add('used')})}catch(e){}
}
function overrideDiagnostic(){
try{const p=ROOMS[S.room].puzzles[S.puzzle];
const bank=document.querySelectorAll('.part-chip');bank.forEach(c=>c.classList.add('used'));
$('partsBank').innerHTML='<div style="color:var(--gold);font-size:16px;font-weight:600;padding:12px">⚡ Lock override triggered</div>';
let slotIdx=S._diagSlot||0;
function autoFill(){
if(slotIdx>=2){puzzleSolved(p.digit);return}
const slot=$('diagSlot'+slotIdx);const content=$('diagSlotContent'+slotIdx);
slot.classList.add('correct','filled');slot.classList.remove('active');
content.textContent=p.slots[slotIdx].correct+' ✔';
slotIdx++;setTimeout(autoFill,500)}
autoFill()}catch(e){puzzleSolved(ROOMS[S.room].puzzles[S.puzzle].digit)}
}

/* ==================== FINAL LOCK ==================== */
function loadFinalLock(){
try{S.screen='finallock';closeAllOverlays();setRoomTheme(0);
$('roomName').textContent='🔐 FINAL LOCK';$('roomProgress').textContent='';
$('missionLine').textContent='This is it — match every term to escape!';
$('scannerBtn').style.display='none';$('progressDots').innerHTML='';
const area=$('mainArea');area.innerHTML='';
const wrap=document.createElement('div');wrap.className='puzzle-box';
const inst=document.createElement('div');inst.className='puzzle-instruction';
inst.textContent='👆 Tap a term on the LEFT, then tap its match on the RIGHT.';wrap.appendChild(inst);
const ma=document.createElement('div');ma.className='final-match-area';
const lc=document.createElement('div');lc.className='final-col';
const rc=document.createElement('div');rc.className='final-col';
let selected=null,matched=0;
FINAL_LOCK.forEach((fl,i)=>{
const card=document.createElement('div');card.className='final-card term';card.style.borderColor=fl.color;card.style.color=fl.color;
card.textContent=fl.term;card.dataset.idx=i;card.style.position='relative';
card.onclick=()=>{try{if(card.classList.contains('matched'))return;
document.querySelectorAll('.final-card.selected').forEach(c=>c.classList.remove('selected'));
card.classList.add('selected');selected=i}catch(e){}};
lc.appendChild(card)});
const shuffledTargets=FINAL_LOCK.map((fl,i)=>({...fl,origIdx:i}));
for(let i=shuffledTargets.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffledTargets[i],shuffledTargets[j]]=[shuffledTargets[j],shuffledTargets[i]]}
shuffledTargets.forEach(fl=>{
const card=document.createElement('div');card.className='final-card target';card.textContent=fl.target;
card.dataset.idx=fl.origIdx;card.dataset.correct='false';
card.onclick=()=>{try{if(selected===null||card.classList.contains('matched'))return;
if(parseInt(card.dataset.idx)===selected){
card.classList.add('matched');card.style.borderColor=FINAL_LOCK[selected].color;card.style.color=FINAL_LOCK[selected].color;card.textContent=fl.target+' ✔';
const termCards=lc.querySelectorAll('.final-card');termCards[selected].classList.add('matched');
document.querySelectorAll('.final-card.selected').forEach(c=>c.classList.remove('selected'));
selected=null;matched++;
if(matched>=3){setTimeout(()=>showEscapeReport(),1000)}
}else{card.classList.add('wrong');setTimeout(()=>card.classList.remove('wrong'),400)}}catch(e){}};
rc.appendChild(card)});
ma.appendChild(lc);ma.appendChild(rc);wrap.appendChild(ma);area.appendChild(wrap)}catch(e){showEscapeReport()}
}

/* ==================== ESCAPE REPORT ==================== */
function showEscapeReport(){
try{closeAllOverlays();
const elapsed=Math.floor((Date.now()-S.startTime)/1000);const mins=Math.floor(elapsed/60);const secs=elapsed%60;
// star rating
let stars=1;if(S.totalFirstTry>=2)stars=2;if(S.totalFirstTry>=4)stars=3;
// badges
const badges=[];
S.badgeData.rooms.forEach((r,i)=>{
if(S.skippedRooms.has(i))return;
if(r.p1w<=1&&r.p2w<=1)badges.push({name:'Clean Room',icon:'🧹',room:i+1});
if(!r.p1scan&&!r.p2scan)badges.push({name:'No Scanner',icon:'🔇',room:i+1});
if((r.p1scan&&r.p1w<=2)||(r.p2scan&&r.p2w<=2)){
if(r.p1scan&&r.p1w>0&&r.p1w<=2)badges.push({name:'Comeback',icon:'🔄',room:i+1});
if(r.p2scan&&r.p2w>0&&r.p2w<=2)badges.push({name:'Comeback',icon:'🔄',room:i+1})}
if(r.p1scan&&r.p1w===1)badges.push({name:'Deep Scan',icon:'🔍',room:i+1});
if(r.p2scan&&r.p2w===1)badges.push({name:'Deep Scan',icon:'🔍',room:i+1})});
// unique badges
const uniqueBadges=[];const seen=new Set();
badges.forEach(b=>{const key=b.name+b.room;if(!seen.has(key)){seen.add(key);uniqueBadges.push(b)}});
// confetti
spawnConfetti();
const er=$('escapeReport');er.style.display='flex';er.classList.add('visible');
$('playScreen').style.display='none';
const rc=$('reportContent');rc.innerHTML='';
const card=document.createElement('div');card.className='report-card';
const rows=[
{label:'Rooms Cleared',value:(3-S.skippedRooms.size)+'/3'},
{label:'Puzzles Cleared',value:S.puzzlesCleared+'/6'},
{label:'First-Try Solves',value:S.totalFirstTry+'/6'},
{label:'Time',value:mins+'m '+secs+'s'}
];
rows.forEach(r=>{const row=document.createElement('div');row.className='report-row';
row.innerHTML='<span class="label">'+r.label+'</span><span class="value">'+r.value+'</span>';card.appendChild(row)});
// stars
const starRow=document.createElement('div');starRow.className='report-row';
starRow.innerHTML='<span class="label">Rating</span><span class="report-stars">'+
[1,2,3].map(i=>'<span class="report-star'+(i<=stars?' earned':'')+'">⭐</span>').join('')+'</span>';
card.appendChild(starRow);
rc.appendChild(card);
// badges
if(uniqueBadges.length>0){
const bdiv=document.createElement('div');bdiv.className='report-badges';
uniqueBadges.forEach(b=>{const badge=document.createElement('div');badge.className='report-badge';badge.textContent=b.icon+' '+b.name+' (Room '+b.room+')';bdiv.appendChild(badge)});
rc.appendChild(bdiv)}
// buttons
const btns=document.createElement('div');btns.className='report-btns';
const playAgain=document.createElement('button');playAgain.className='report-btn';playAgain.textContent='🔄 Play Again';
let playAgainClicked=false;
playAgain.onclick=()=>{if(playAgainClicked)return;playAgainClicked=true;location.reload()};
btns.appendChild(playAgain);
const copyBtn=document.createElement('button');copyBtn.className='report-btn';copyBtn.textContent='📋 Copy Report';
copyBtn.onclick=()=>{try{
const text="Mr. Jawad's Escape Room Simulations\nFitness Claims & Evidence Evaluation\n"+
"Rooms: "+(3-S.skippedRooms.size)+"/3\tPuzzles: "+S.puzzlesCleared+"/6\tFirst-Try: "+S.totalFirstTry+"/6\t"+
"Stars: "+stars+"/3\tTime: "+mins+"m "+secs+"s\tBadges: "+(uniqueBadges.length>0?uniqueBadges.map(b=>b.icon+b.name).join(', '):'None');
navigator.clipboard.writeText(text).then(()=>{copyBtn.textContent='✅ Copied!'});
}catch(e){copyBtn.textContent='Copy failed'}};
btns.appendChild(copyBtn);rc.appendChild(btns);
}catch(e){console.error('Report error:',e)}
}
function spawnConfetti(){
try{const colors=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#00bcd4'];
for(let i=0;i<30;i++){
const p=document.createElement('div');p.className='confetti-piece';
p.style.left=Math.random()*100+'vw';p.style.top='-10px';
p.style.background=colors[Math.floor(Math.random()*colors.length)];
p.style.width=(4+Math.random()*6)+'px';p.style.height=(4+Math.random()*6)+'px';
p.style.animation='confettiFall '+(2+Math.random()*3)+'s linear '+(Math.random()*.5)+'s forwards';
document.body.appendChild(p);
const cleanup=()=>{try{p.remove()}catch(e){}};
p.addEventListener('animationend',cleanup);setTimeout(cleanup,6000)}}catch(e){}
}

/* ==================== EMERGENCY SKIP ==================== */
function setupEmergencySkip(){
// Long press on room name
$('roomName').addEventListener('pointerdown',e=>{
S.longPressTimer=setTimeout(()=>{
if(S.screen==='finallock'){showEscapeReport();return}
if((S.screen==='room'||S.screen==='puzzle'||S.screen==='quickfire')&&S.room>=0&&S.room<3){skipRoom()}
},5000)});
$('roomName').addEventListener('pointerup',()=>{clearTimeout(S.longPressTimer)});
$('roomName').addEventListener('pointerleave',()=>{clearTimeout(S.longPressTimer)});
// Shift+S
document.addEventListener('keydown',e=>{
if(e.key==='S'&&e.shiftKey&&!S.shiftSDown){
S.shiftSDown=true;
S.shiftSTimer=setTimeout(()=>{
if(S.screen==='finallock'){showEscapeReport()}
else if((S.screen==='room'||S.screen==='puzzle'||S.screen==='quickfire')&&S.room>=0&&S.room<3){skipRoom()}
},2000)}
});
document.addEventListener('keyup',e=>{if(e.key==='S'){S.shiftSDown=false;clearTimeout(S.shiftSTimer)}});
}
function skipRoom(){
try{closeAllOverlays();S._previewGuard=true;
S.skippedRooms.add(S.room);
const r=ROOMS[S.room];
for(let i=0;i<2;i++){
if(!S.roomDigits[S.room][i]){
S.roomDigits[S.room][i]=r.code[i];
S.puzzlesCleared++;updatePuzzlesCleared();
updateVault(S.room,i,r.code[i]+' (Skipped)')}}
if(S.room<2){showPassTheLaptop()}
else{showDoorTransition(0,true)}}catch(e){}
}

/* ==================== INIT ==================== */
setupEmergencySkip();
</script>
