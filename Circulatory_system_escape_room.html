<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Jawad's Escape Room — Circulatory System</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a2e;--bg2:#16162a;--text:#e0e0e0;--white:#ffffff;
--r1:#e63946;--r1a:#ff6b6b;--r1bg:rgba(230,57,70,.08);
--r2:#2ec4b6;--r2a:#83e8ba;--r2bg:rgba(46,196,182,.08);
--r3:#4361ee;--r3a:#7b8cff;--r3bg:rgba(67,97,238,.08);
--tut:#3a3a4e;--tuta:#ffffff;
--accent:var(--r1);--accentA:var(--r1a);
--gold:#f9a825;--green:#4caf50;--red:#ef5350;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}

/* ===== START SCREEN ===== */
#startScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:1000;text-align:center;padding:2rem}
.brand-line{font-size:clamp(.7rem,1.2vw,.85rem);letter-spacing:.35em;text-transform:uppercase;color:var(--r2);margin-bottom:1.2rem;font-weight:600}
.start-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;color:var(--white);text-shadow:0 0 40px rgba(46,196,182,.3),0 0 80px rgba(46,196,182,.15);margin-bottom:.8rem;line-height:1.1}
.start-divider{width:80px;height:2px;background:var(--r2);margin:0 auto 1rem;box-shadow:0 0 10px var(--r2)}
.start-subtitle{font-size:clamp(1rem,2vw,1.3rem);color:rgba(255,255,255,.6);margin-bottom:2.5rem;font-weight:300}
.start-btn{padding:1rem 3rem;font-size:clamp(1rem,2vw,1.2rem);font-weight:700;background:transparent;border:2px solid var(--r2);color:var(--white);border-radius:50px;letter-spacing:.15em;text-transform:uppercase;transition:all .3s ease;position:relative;overflow:hidden}
.start-btn:hover,.start-btn:active{background:var(--r2);box-shadow:0 0 30px rgba(46,196,182,.4)}
.start-footer{position:absolute;bottom:2rem;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.2)}

/* ===== TOP BAR ===== */
#topBar{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.06);min-height:48px;gap:.5rem;position:relative;z-index:10}
.room-label{font-size:clamp(.85rem,1.5vw,1rem);font-weight:700;color:var(--accent);white-space:nowrap}
.room-progress{font-size:clamp(.7rem,1.2vw,.8rem);color:rgba(255,255,255,.45);white-space:nowrap}
.puzzles-cleared{margin-left:auto;font-size:clamp(.75rem,1.3vw,.9rem);color:var(--white);font-weight:600;white-space:nowrap;transition:transform .3s ease}
.puzzles-cleared.pulse{animation:counterPulse .4s ease}
.streak-icon{font-size:1.2rem;margin-left:.5rem;display:none}
.streak-icon.active{display:inline-block;animation:firePulse 1s infinite}

/* ===== CODE VAULT ===== */
#codeVault{position:fixed;top:60px;right:.8rem;display:flex;gap:.5rem;z-index:50;padding:.5rem .7rem;background:rgba(0,0,0,.6);border-radius:10px;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(4px)}
.vault-slot{display:flex;flex-direction:column;align-items:center;gap:.2rem;min-width:42px}
.vault-emoji{font-size:.9rem;opacity:.35;transition:opacity .4s ease}
.vault-emoji.lit{opacity:1}
.vault-digits{display:flex;gap:2px}
.vault-digit{width:20px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;color:rgba(255,255,255,.2);background:rgba(255,255,255,.04);border-radius:4px;border:1px solid rgba(255,255,255,.06);transition:all .4s ease}
.vault-digit.revealed{color:var(--accent);background:rgba(255,255,255,.08);border-color:var(--accent);box-shadow:0 0 8px currentColor;animation:digitUnlock .5s ease}

/* ===== MISSION LINE ===== */
#missionLine{text-align:center;padding:.5rem 1rem;font-size:clamp(.8rem,1.4vw,.95rem);color:rgba(255,255,255,.5);font-style:italic;min-height:2rem}

/* ===== PUZZLE AREA ===== */
#puzzleArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;overflow-y:auto;position:relative;min-height:0}
#puzzleContent{width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center;gap:1rem}

/* ===== BOTTOM BAR ===== */
#bottomBar{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;min-height:56px;position:relative;z-index:10}
#scannerBtn{display:flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:25px;color:var(--text);font-size:clamp(.75rem,1.2vw,.85rem);font-weight:600;transition:all .3s ease;min-width:48px;min-height:48px}
#scannerBtn:hover{background:rgba(255,255,255,.1)}
#scannerBtn .scan-icon{font-size:1.1rem}
.progress-dots{display:flex;gap:.5rem;position:absolute;left:50%;transform:translateX(-50%)}
.progress-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);transition:all .4s ease}
.progress-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent)}

/* ===== GAME CONTAINER ===== */
#gameScreen{display:none;flex-direction:column;height:100vh;width:100%;position:relative}
#gameScreen.active{display:flex}

/* ===== SCANNER OVERLAY ===== */
#scannerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:2rem;text-align:center}
#scannerOverlay.active{display:flex}
.scanner-frame{border:2px solid var(--accent);border-radius:12px;padding:2rem;max-width:500px;width:90%;position:relative;box-shadow:0 0 30px rgba(var(--accent),.2)}
.scanner-title{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.1em}
.scanner-text{font-size:clamp(.85rem,1.4vw,1rem);color:rgba(255,255,255,.8);line-height:1.5;margin-bottom:1.5rem}
.scanner-dismiss{padding:.5rem 1.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;color:rgba(255,255,255,.5);font-size:.8rem;transition:all .3s ease}
.scanner-dismiss:hover{background:rgba(255,255,255,.15);color:var(--white)}

/* ===== CODE ENTRY OVERLAY ===== */
#codeEntry{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300;padding:2rem}
#codeEntry.active{display:flex}
.code-title{font-size:clamp(1.2rem,2.5vw,1.6rem);font-weight:800;color:var(--white);margin-bottom:.5rem}
.code-subtitle{font-size:clamp(.85rem,1.4vw,1rem);color:var(--accent);margin-bottom:1.5rem}
.code-input-row{display:flex;gap:.8rem;margin-bottom:1.5rem}
.code-digit-input{width:clamp(50px,12vw,65px);height:clamp(60px,14vw,75px);text-align:center;font-size:clamp(1.5rem,3vw,2rem);font-weight:800;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:10px;color:var(--white);transition:all .3s ease}
.code-digit-input:focus{border-color:var(--accent);box-shadow:0 0 15px rgba(var(--accent),.3);outline:none}
.code-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;max-width:260px}
.numpad-btn{width:clamp(55px,14vw,70px);height:clamp(55px,14vw,70px);font-size:clamp(1.2rem,2.5vw,1.5rem);font-weight:700;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--white);transition:all .2s ease}
.numpad-btn:hover,.numpad-btn:active{background:rgba(255,255,255,.15);border-color:var(--accent)}
.numpad-btn.submit-btn{background:var(--accent);border-color:var(--accent);font-size:1rem;letter-spacing:.1em}
.numpad-btn.clear-btn{color:var(--red);border-color:rgba(239,83,80,.3)}
.code-error{color:var(--red);font-size:.85rem;margin-top:.5rem;min-height:1.2rem}

/* ===== DIGIT REVEAL OVERLAY ===== */
#digitReveal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:250;padding:2rem}
#digitReveal.active{display:flex}
.digit-reveal-num{font-size:clamp(4rem,12vw,7rem);font-weight:900;color:var(--accent);text-shadow:0 0 40px var(--accent),0 0 80px var(--accent);animation:digitScale .6s ease-out}
.digit-reveal-label{font-size:clamp(.9rem,1.5vw,1.1rem);color:rgba(255,255,255,.6);margin-top:.5rem}
.digit-continue{margin-top:1.5rem;padding:.7rem 2rem;background:var(--accent);border-radius:25px;color:var(--white);font-weight:700;font-size:clamp(.85rem,1.4vw,1rem);transition:all .3s ease;box-shadow:0 0 20px rgba(var(--accent),.3)}

/* ===== PASS THE LAPTOP ===== */
#passLaptop{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:350;padding:2rem;text-align:center}
#passLaptop.active{display:flex}
.pass-title{font-size:clamp(2rem,5vw,3rem);font-weight:900;color:var(--white);letter-spacing:.1em;margin-bottom:.5rem;text-shadow:0 0 30px var(--accent)}
.pass-sub{font-size:clamp(.9rem,1.5vw,1.1rem);color:rgba(255,255,255,.5);margin-bottom:2rem}
.pass-ready{padding:1rem 3rem;font-size:clamp(1rem,2vw,1.2rem);font-weight:700;background:var(--accent);border-radius:50px;color:var(--white);letter-spacing:.1em;transition:all .3s ease;box-shadow:0 0 25px rgba(var(--accent),.3)}

/* ===== DOOR TRANSITION ===== */
#doorOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:400;pointer-events:none}
#doorOverlay.active{display:flex}
.door-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.95);animation:doorAnim 1.2s ease-in-out forwards}
.door-rect{width:200px;height:280px;border:3px solid var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 40px var(--accent),inset 0 0 20px rgba(0,0,0,.5)}
.door-lock{font-size:2.5rem;animation:lockPulse .4s ease .1s}
.door-label{position:absolute;bottom:-40px;font-size:1.1rem;font-weight:700;color:var(--white);letter-spacing:.15em;opacity:0;animation:labelFade .3s ease .2s forwards}
.door-container.final{animation:doorAnim 1.8s ease-in-out forwards}
.final-text{position:absolute;font-size:clamp(1.5rem,3vw,2rem);font-weight:900;color:var(--white);letter-spacing:.2em;text-shadow:0 0 20px var(--accent);opacity:0;animation:finalTextFlash .4s ease .3s forwards}

/* ===== SCAN PREVIEW ===== */
#scanPreview{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:180;padding:2rem}
#scanPreview.active{display:flex}
.scan-frame{border:2px solid var(--accent);border-radius:12px;padding:2rem;max-width:550px;width:90%;text-align:center;position:relative;box-shadow:0 0 25px var(--accent);animation:scanPulse 1.5s ease infinite}
.scan-header{font-size:.85rem;font-weight:700;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem}
.scan-visual{min-height:120px;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.scan-label{display:inline-block;padding:.3rem .7rem;background:rgba(255,255,255,.08);border:1px solid var(--accent);border-radius:15px;font-size:.8rem;color:var(--accent);font-weight:600;animation:labelBlink 1s ease infinite}

/* ===== ESCAPE REPORT ===== */
#escapeReport{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;z-index:500;overflow-y:auto;padding:2rem}
#escapeReport.active{display:flex}
.report-escaped{font-size:clamp(2.5rem,6vw,4rem);font-weight:900;color:var(--white);text-shadow:0 0 40px rgba(46,196,182,.4),0 0 80px rgba(46,196,182,.2);margin:1.5rem 0;animation:escapedSlam .6s ease-out}
.report-brand{font-size:clamp(.65rem,1.1vw,.75rem);letter-spacing:.35em;text-transform:uppercase;color:var(--r2);margin-bottom:.5rem}
.report-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1.5rem;max-width:500px;width:100%;margin-bottom:1rem}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.report-row:last-child{border-bottom:none}
.report-label{color:rgba(255,255,255,.5);font-size:clamp(.8rem,1.3vw,.9rem)}
.report-value{font-weight:700;color:var(--white);font-size:clamp(.9rem,1.4vw,1rem)}
.report-stars{font-size:1.5rem;letter-spacing:.3rem}
.report-star{opacity:.2;transition:opacity .3s ease}
.report-star.earned{opacity:1;animation:starFill .4s ease}
.report-badges{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem}
.report-badge{padding:.4rem .8rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;font-size:clamp(.7rem,1.1vw,.8rem);color:rgba(255,255,255,.7)}
.report-actions{display:flex;gap:.8rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center}
.report-btn{padding:.7rem 2rem;border-radius:25px;font-weight:700;font-size:clamp(.8rem,1.3vw,.9rem);transition:all .3s ease}
.report-btn.primary{background:var(--r2);color:var(--white)}
.report-btn.secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:var(--white)}
.copy-feedback{font-size:.75rem;color:var(--green);margin-top:.3rem;min-height:1rem}

/* ===== PUZZLE CARDS ===== */
.puzzle-instruction{font-size:clamp(.75rem,1.2vw,.85rem);color:rgba(255,255,255,.45);text-align:center;margin-bottom:.5rem}
.puzzle-question{font-size:clamp(1.1rem,2vw,1.4rem);font-weight:700;color:var(--white);text-align:center;margin-bottom:1rem}
.micro-progress{font-size:clamp(.7rem,1.1vw,.8rem);color:var(--accent);text-align:center;margin-bottom:.5rem;font-weight:600}

/* Match Lock Cards */
.match-container{display:flex;gap:1.5rem;width:100%;justify-content:center;align-items:flex-start;flex-wrap:wrap}
.match-col{display:flex;flex-direction:column;gap:.6rem;min-width:140px;flex:1;max-width:280px}
.match-card{padding:clamp(.7rem,1.5vw,1rem) clamp(.8rem,1.5vw,1.2rem);background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:10px;font-size:clamp(.8rem,1.3vw,.95rem);color:var(--text);cursor:pointer;transition:all .3s ease;min-height:48px;display:flex;align-items:center;gap:.5rem;position:relative;user-select:none}
.match-card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
.match-card.selected{border-color:var(--accent);background:rgba(255,255,255,.1);box-shadow:0 0 15px var(--accent);transform:scale(1.04)}
.match-card.selected::after{content:'▶ SELECTED';position:absolute;top:-8px;right:8px;font-size:.55rem;padding:1px 6px;background:var(--accent);color:var(--white);border-radius:8px;font-weight:700;letter-spacing:.05em}
.match-card.matched{border-color:var(--green);background:rgba(76,175,80,.1);opacity:.6;pointer-events:none}
.match-card.wrong{animation:wrongShake .4s ease;border-color:var(--red)}
.match-card.dimmed{opacity:.35;pointer-events:none}

/* Sequence Lock */
.seq-slots{display:flex;gap:.5rem;margin-bottom:1rem;justify-content:center;align-items:center;flex-wrap:wrap}
.seq-slot{width:clamp(100px,25vw,160px);height:clamp(50px,10vw,60px);border:2px dashed rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(.75rem,1.2vw,.85rem);color:rgba(255,255,255,.2);transition:all .4s ease}
.seq-slot.filled{border-style:solid;border-color:var(--green);background:rgba(76,175,80,.1);color:var(--green);font-weight:600}
.seq-arrow{color:rgba(255,255,255,.15);font-size:1.2rem}
.seq-options{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
.seq-card{padding:clamp(.7rem,1.5vw,.9rem) clamp(1rem,2vw,1.4rem);background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);border-radius:10px;font-size:clamp(.8rem,1.3vw,.95rem);color:var(--text);cursor:pointer;transition:all .3s ease;min-height:48px;display:flex;align-items:center;gap:.5rem;user-select:none}
.seq-card:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.seq-card.locked{border-color:var(--green);background:rgba(76,175,80,.08);pointer-events:none;opacity:.5}
.seq-card.wrong{animation:wrongShake .4s ease;border-color:var(--red)}

/* System Scanner Gauges */
.gauge-container{display:flex;gap:1.5rem;justify-content:center;margin-bottom:1rem;align-items:flex-end;min-height:180px}
.gauge-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;cursor:pointer;transition:all .3s ease;padding:.5rem;border-radius:10px;border:2px solid transparent;min-width:80px}
.gauge-item:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.03)}
.gauge-item.selected{border-color:var(--accent);background:rgba(255,255,255,.06);box-shadow:0 0 12px var(--accent)}
.gauge-bar-wrapper{width:50px;height:150px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}
.gauge-bar-fill{position:absolute;bottom:0;width:100%;border-radius:0 0 6px 6px;transition:height .8s ease}
.gauge-label{font-size:clamp(.7rem,1.1vw,.8rem);color:rgba(255,255,255,.6);font-weight:600;text-align:center}
.gauge-icon{font-size:1.2rem}
.gauge-item.correct{border-color:var(--green);box-shadow:0 0 15px rgba(76,175,80,.4)}
.gauge-item.wrong{animation:wrongShake .4s ease;border-color:var(--red)}
.gauge-item.dimmed{opacity:.35;pointer-events:none}

/* Quick Fire */
.qf-question{font-size:clamp(.95rem,1.6vw,1.15rem);color:var(--white);text-align:center;margin-bottom:1.2rem;min-height:3rem;line-height:1.4}
.qf-buttons{display:flex;gap:1rem;justify-content:center}
.qf-btn{padding:clamp(.8rem,1.5vw,1rem) clamp(2rem,5vw,3rem);font-size:clamp(1rem,1.8vw,1.2rem);font-weight:800;border-radius:12px;min-width:120px;min-height:56px;transition:all .2s ease;letter-spacing:.1em}
.qf-btn.true-btn{background:rgba(76,175,80,.15);border:2px solid var(--green);color:var(--green)}
.qf-btn.false-btn{background:rgba(239,83,80,.15);border:2px solid var(--red);color:var(--red)}
.qf-btn:hover{transform:scale(1.04)}
.qf-btn.flash-correct{background:var(--green)!important;color:var(--white)!important;border-color:var(--green)!important}
.qf-btn.flash-wrong{background:var(--red)!important;color:var(--white)!important;border-color:var(--red)!important}
.qf-progress{font-size:clamp(.7rem,1.1vw,.8rem);color:rgba(255,255,255,.4);text-align:center;margin-top:.8rem}
.qf-feedback{font-size:1.5rem;text-align:center;min-height:2rem;margin-bottom:.5rem}

/* Mystery Input */
.chain-flow{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.2rem}
.chain-box{padding:.6rem 1rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;font-size:clamp(.8rem,1.3vw,.9rem);color:var(--text)}
.chain-mystery{border-color:var(--accent);color:var(--accent);font-weight:700;box-shadow:0 0 10px var(--accent)}
.chain-arrow{color:rgba(255,255,255,.2);font-size:1rem}
.chain-filled{border-color:var(--green);color:var(--green);background:rgba(76,175,80,.1)}
.answer-cards{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
.answer-card{padding:clamp(.7rem,1.5vw,.9rem) clamp(1rem,2vw,1.4rem);background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);border-radius:10px;font-size:clamp(.85rem,1.3vw,.95rem);color:var(--text);cursor:pointer;transition:all .3s ease;min-height:48px;display:flex;align-items:center;gap:.5rem;user-select:none}
.answer-card:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.answer-card.correct{border-color:var(--green);background:rgba(76,175,80,.15);color:var(--green)}
.answer-card.wrong{animation:wrongShake .4s ease;border-color:var(--red)}
.answer-card.dimmed{opacity:.35;pointer-events:none}
.answer-card.override-highlight{border-color:var(--green);box-shadow:0 0 20px rgba(76,175,80,.4);animation:overridePulse 1s infinite}

/* Visual Recall */
.vr-display{display:flex;gap:1rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;width:100%}
.artery-section{flex:1;min-width:200px;max-width:300px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1rem;text-align:center;position:relative;overflow:hidden}
.artery-section::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(67,97,238,.05) 100%)}
.artery-title{font-size:clamp(.7rem,1.1vw,.8rem);color:var(--accent);font-weight:700;margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.1em}
.artery-visual{width:100%;height:100px;border-radius:8px;position:relative;overflow:hidden;background:rgba(0,0,0,.3);margin-bottom:.5rem}
.artery-wall{position:absolute;top:0;left:0;right:0;height:15px;background:linear-gradient(180deg,#c62828,#8b0000);border-radius:0 0 4px 4px}
.artery-wall-bottom{position:absolute;bottom:0;left:0;right:0;height:15px;background:linear-gradient(0deg,#c62828,#8b0000);border-radius:4px 4px 0 0}
.plaque-top{position:absolute;top:15px;left:0;right:0;background:#f9a825;border-radius:0 0 8px 8px}
.plaque-bottom{position:absolute;bottom:15px;left:0;right:0;background:#f9a825;border-radius:8px 8px 0 0}
.artery-flow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.2rem;font-weight:700}
.artery-label{font-size:clamp(.7rem,1vw,.78rem);color:rgba(255,255,255,.5)}
.crack-icon{position:absolute;top:35px;right:15px;font-size:.9rem}

/* Diagnostic Panel */
.diag-panel{width:100%;max-width:500px}
.diag-slots{display:flex;gap:1rem;margin-bottom:1.2rem;justify-content:center}
.diag-slot{width:clamp(140px,30vw,200px);min-height:70px;border:2px dashed rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;padding:.5rem;font-size:clamp(.8rem,1.2vw,.9rem);color:rgba(255,255,255,.2);transition:all .4s ease;cursor:pointer}
.diag-slot.active-slot{border-color:var(--accent);border-style:solid;box-shadow:0 0 10px var(--accent)}
.diag-slot.filled{color:var(--text);background:rgba(255,255,255,.05)}
.diag-slot.locked{border-color:var(--green);background:rgba(76,175,80,.1);color:var(--green);pointer-events:none}
.diag-slot.wrong-slot{animation:wrongShake .4s ease;border-color:var(--red)}
.diag-slot.dimmed-slot{opacity:.3}
.diag-parts{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}
.diag-chip{padding:.5rem 1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:20px;font-size:clamp(.75rem,1.2vw,.85rem);color:var(--text);cursor:pointer;transition:all .3s ease;min-height:40px;display:flex;align-items:center;gap:.3rem;user-select:none}
.diag-chip:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.diag-chip.used{opacity:.3;pointer-events:none}
.diag-check{margin-top:.8rem;padding:.5rem 1.5rem;background:var(--accent);border-radius:20px;color:var(--white);font-weight:700;font-size:clamp(.8rem,1.2vw,.9rem);transition:all .3s ease;display:none}

/* Spot the Difference */
.std-container{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;width:100%}

/* ===== ANIMATIONS ===== */
@keyframes counterPulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes firePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes digitUnlock{0%{transform:scale(1.8);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes digitScale{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes scanPulse{0%,100%{box-shadow:0 0 15px var(--accent)}50%{box-shadow:0 0 35px var(--accent)}}
@keyframes overridePulse{0%,100%{box-shadow:0 0 10px rgba(76,175,80,.3)}50%{box-shadow:0 0 25px rgba(76,175,80,.6)}}
@keyframes labelBlink{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes doorAnim{0%{opacity:0;transform:scale(1)}25%{opacity:1;transform:scale(1)}55%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-110%)}}
@keyframes lockPulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes labelFade{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes finalTextFlash{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
@keyframes escapedSlam{0%{transform:scale(3);opacity:0}60%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes starFill{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes particleBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes roomAtmosphere{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.particle{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:600;animation:particleBurst .7s ease-out forwards}
.confetti{position:fixed;top:-10px;width:8px;height:14px;border-radius:1px;pointer-events:none;z-index:600;animation:confettiFall 3s ease-in forwards}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="brand-line">Mr. Jawad's Escape Room Simulations</div>
  <div class="start-title">Circulatory System</div>
  <div class="start-divider"></div>
  <div class="start-subtitle">Unit Review</div>
  <button class="start-btn" onclick="startGame()">BEGIN ESCAPE</button>
  <div class="start-footer">DESIGNED BY MR. JAWAD</div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen">
  <div id="topBar">
    <span class="room-label" id="roomLabel"></span>
    <span class="room-progress" id="roomProgress"></span>
    <span class="puzzles-cleared" id="puzzlesCleared">Puzzles Cleared: 0/6</span>
    <span class="streak-icon" id="streakIcon">🔥</span>
  </div>
  <div id="codeVault" class="hidden">
    <div class="vault-slot" data-room="1">
      <span class="vault-emoji">🫀</span>
      <div class="vault-digits">
        <span class="vault-digit" id="v1d1">?</span>
        <span class="vault-digit" id="v1d2">?</span>
      </div>
    </div>
    <div class="vault-slot" data-room="2">
      <span class="vault-emoji">💪</span>
      <div class="vault-digits">
        <span class="vault-digit" id="v2d1">?</span>
        <span class="vault-digit" id="v2d2">?</span>
      </div>
    </div>
    <div class="vault-slot" data-room="3">
      <span class="vault-emoji">🩸</span>
      <div class="vault-digits">
        <span class="vault-digit" id="v3d1">?</span>
        <span class="vault-digit" id="v3d2">?</span>
      </div>
    </div>
  </div>
  <div id="missionLine"></div>
  <div id="puzzleArea"><div id="puzzleContent"></div></div>
  <div id="bottomBar">
    <button id="scannerBtn" onclick="openScanner()"><span class="scan-icon">📡</span> Scanner</button>
    <div class="progress-dots" id="progressDots"></div>
    <div style="width:80px"></div>
  </div>
</div>

<!-- OVERLAYS -->
<div id="scannerOverlay"></div>
<div id="codeEntry"></div>
<div id="digitReveal"></div>
<div id="passLaptop"></div>
<div id="doorOverlay"></div>
<div id="scanPreview"></div>
<div id="escapeReport"></div>

<script>
// ===== GAME DATA =====
const ROOMS = [
  {
    name: "Cardiac Command", emoji: "🫀", color: "#e63946", colorA: "#ff6b6b",
    code: "47", mission: "Decode the emergency cardiac signals.",
    puzzles: [
      {
        type: "sequence", digit: "4",
        cards: [
          { label: "Years of training", icon: "🏋️" },
          { label: "Stronger pumping", icon: "🫀" },
          { label: "Rate drops", icon: "📉" }
        ],
        scannerText: "Scan detected: In the Heart Demands sim, an athlete's resting heart rate changed — what caused it?",
        scanNarrow: { 1: [0, 1], 2: [1, 2] },
        scanPreview: {
          labels: ["Training", "Heart Rate"],
          visuals: [
            { type: "icon", content: "📈💓", size: "2.5rem" },
            { type: "text", content: "Pulse slowing..." }
          ]
        }
      },
      {
        type: "mystery", digit: "7",
        chain: ["Heart suddenly stops", "???", "Oxygen keeps reaching the brain"],
        options: [
          { label: "CPR", icon: "🫀", correct: true },
          { label: "Defibrillator", icon: "⚡", correct: false },
          { label: "Calling 911", icon: "📞", correct: false }
        ],
        scannerText: "Scan detected: In the Heart Demands sim, bystanders kept oxygen flowing to the brain before the ambulance arrived — how?",
        scanNarrow: [0, 1],
        scanPreview: {
          labels: ["Cardiac Arrest", "CPR"],
          visuals: [
            { type: "icon", content: "💔➡️🫁", size: "2.5rem" },
            { type: "text", content: "Flatline detected..." }
          ]
        }
      }
    ]
  },
  {
    name: "Performance Lab", emoji: "💪", color: "#2ec4b6", colorA: "#83e8ba",
    code: "29", mission: "Calibrate the body's performance systems.",
    puzzles: [
      {
        type: "scanner", digit: "2",
        question: "Best O₂ at sprint?",
        gauges: [
          { label: "Untrained", pct: 55, color: "#ff9800", icon: "⚠️", correct: false },
          { label: "Moderate", pct: 88, color: "#4caf50", icon: "✔", correct: true },
          { label: "Extreme", pct: 48, color: "#ef5350", icon: "✖", correct: false }
        ],
        scannerText: "Scan detected: In the Training sim, check which O₂ bar hit the highest level when the body was sprinting.",
        scanNarrow: [1, 2],
        scanPreview: {
          labels: ["Training Level", "O₂ Delivery"],
          visuals: [
            { type: "icon", content: "🏃💨", size: "2.5rem" },
            { type: "text", content: "Gauges activating..." }
          ]
        }
      },
      {
        type: "match", digit: "9",
        pairs: [
          { term: "High-Fat 🍔", match: "Builds plaque every round 📈" },
          { term: "Heart-Healthy 🥦", match: "Only choice that reverses 📉" },
          { term: "Sedentary 🪑", match: "Adds plaque beyond diet ⚠️" }
        ],
        scannerText: "Scan detected: In the Artery sim, the plaque bar reacted differently to each fuel type — what moved it which way?",
        scanPreview: {
          labels: ["Fuel", "Plaque", "Blood Flow"],
          visuals: [
            { type: "icon", content: "🍔🥦🪑", size: "2.5rem" },
            { type: "text", content: "Artery scan loading..." }
          ]
        }
      }
    ]
  },
  {
    name: "Supply Station", emoji: "🩸", color: "#4361ee", colorA: "#7b8cff",
    code: "51", mission: "Restore supply to the failing network.",
    puzzles: [
      {
        type: "visual", digit: "5",
        question: "90% blocked — what next?",
        options: [
          { label: "Heart attack", icon: "💥", correct: true },
          { label: "Body compensates", icon: "🔄", correct: false },
          { label: "Heart speeds up", icon: "⚡", correct: false }
        ],
        scannerText: "Scan detected: In the Hidden Dangers sim, plaque blocked an artery almost completely — the body hid it until the plaque cracked open.",
        scanNarrow: [0, 2],
        scanPreview: {
          labels: ["Blockage", "Flow"],
          visuals: [
            { type: "icon", content: "🫀🔴", size: "2.5rem" },
            { type: "text", content: "Artery scan active..." }
          ]
        }
      },
      {
        type: "quickfire", digit: "1",
        questions: [
          { text: "High demand makes the heart work harder", answer: true },
          { text: "Plaque shows warning signs before 90% blocked", answer: false },
          { text: "Sickle cells can jam capillaries", answer: true },
          { text: "A mechanical heart adjusts to demand", answer: false }
        ],
        scannerText: "Scan detected: In the Hidden Dangers sim, check what plaque does silently, what sickle cells do in capillaries, and what the mechanical pump couldn't do.",
        scanPreview: {
          labels: ["Supply", "Demand", "Hidden Dangers"],
          visuals: [
            { type: "icon", content: "📊❓", size: "2.5rem" },
            { type: "text", content: "Quick scan initiating..." }
          ]
        }
      }
    ]
  }
];

const FINAL_LOCK = {
  pairs: [
    { term: "CPR", termEmoji: "🫀", termColor: "#e63946", match: "Keeps oxygen flowing when heart stops" },
    { term: "Moderate training", termEmoji: "💪", termColor: "#2ec4b6", match: "Best O₂ delivery" },
    { term: "Plaque", termEmoji: "🩸", termColor: "#4361ee", match: "Silently blocks arteries" }
  ],
  scannerText: "Scan detected: 🫀 = what saves you when the heart stops. 💪 = the training level that won. 🩸 = what builds up inside arteries."
};

const TUTORIAL_PAIRS = [
  { term: "Sun ☀️", match: "Hot 🔥" },
  { term: "Ice 🧊", match: "Cold ❄️" }
];

// ===== STATE =====
let state = {
  phase: 'start',
  roomIndex: 0,
  puzzleIndex: 0,
  puzzlesSolved: 0,
  firstTrySolves: 0,
  streak: 0,
  startTime: 0,
  wrongCounts: {},
  scannerUsed: {},
  roomFirstTry: {},
  overrideTriggered: false,
  puzzleSolving: false,
  badges: [],
  roomSolveQuality: [{}, {}, {}],
  vaultDigits: [['?','?'],['?','?'],['?','?']],
  skipHoldTimer: null,
  skipConfirmed: false,
  shiftSHeld: false,
  shiftSTimer: null,
  previewDone: false,
  qfState: null
};

// ===== UTILITIES =====
function $(id) { return document.getElementById(id); }
function closeAllOverlays() {
  try {
    ['scannerOverlay','codeEntry','digitReveal','passLaptop','doorOverlay','scanPreview'].forEach(id => {
      const el = $(id);
      if (el) { el.classList.remove('active'); el.style.display = 'none'; }
    });
  } catch(e) { console.error('closeAllOverlays error:', e); }
}
function closeScanner() {
  try {
    const s = $('scannerOverlay');
    if (s) { s.classList.remove('active'); s.style.display = 'none'; }
  } catch(e) {}
}
function setRoomTheme(room) {
  try {
    document.documentElement.style.setProperty('--accent', room.color);
    document.documentElement.style.setProperty('--accentA', room.colorA);
  } catch(e) {}
}

function spawnParticles(x, y, color, count) {
  try {
    count = Math.min(count || 10, 12);
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / count;
      const dist = 60 + Math.random() * 40;
      p.style.cssText = `left:${x}px;top:${y}px;background:${color};--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;`;
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
      setTimeout(() => { if (p.parentNode) p.remove(); }, 1000);
    }
  } catch(e) {}
}

function spawnConfetti() {
  try {
    const colors = ['#e63946','#2ec4b6','#4361ee','#f9a825','#ffffff'];
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.cssText = `left:${Math.random()*100}vw;background:${colors[i%colors.length]};animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;`;
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
      setTimeout(() => { if (c.parentNode) c.remove(); }, 6000);
    }
  } catch(e) {}
}

function updatePuzzlesCleared() {
  try {
    const el = $('puzzlesCleared');
    el.textContent = `Puzzles Cleared: ${state.puzzlesSolved}/6`;
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  } catch(e) {}
}

function updateStreak() {
  try {
    const el = $('streakIcon');
    if (state.streak >= 2) { el.classList.add('active'); el.style.display = 'inline-block'; }
    else { el.classList.remove('active'); el.style.display = 'none'; }
  } catch(e) {}
}

function updateVault(roomIdx, puzzleIdx, digit) {
  try {
    state.vaultDigits[roomIdx][puzzleIdx] = digit;
    const id = `v${roomIdx+1}d${puzzleIdx+1}`;
    const el = $(id);
    if (el) {
      el.textContent = digit;
      el.classList.add('revealed');
      el.style.color = ROOMS[roomIdx].color;
      el.style.borderColor = ROOMS[roomIdx].color;
    }
    const emoji = document.querySelector(`.vault-slot[data-room="${roomIdx+1}"] .vault-emoji`);
    if (emoji && state.vaultDigits[roomIdx][0] !== '?' && state.vaultDigits[roomIdx][1] !== '?') {
      emoji.classList.add('lit');
    }
  } catch(e) {}
}

function getPuzzleKey() { return `${state.roomIndex}-${state.puzzleIndex}`; }

function updateProgressDots() {
  try {
    const dots = $('progressDots');
    const room = ROOMS[state.roomIndex];
    if (!room) { dots.innerHTML = ''; return; }
    dots.innerHTML = '';
    for (let i = 0; i < 2; i++) {
      const d = document.createElement('div');
      d.className = 'progress-dot';
      if (i < state.puzzleIndex) d.classList.add('filled');
      dots.appendChild(d);
    }
  } catch(e) {}
}

// ===== GAME FLOW =====
function startGame() {
  try {
    $('startScreen').style.display = 'none';
    $('gameScreen').classList.add('active');
    state.startTime = Date.now();
    state.phase = 'tutorial';
    showTutorial();
  } catch(e) { console.error('startGame error:', e); }
}

// ===== TUTORIAL =====
function showTutorial() {
  try {
    $('codeVault').classList.add('hidden');
    $('roomLabel').textContent = '📖 Tutorial';
    $('roomProgress').textContent = '';
    $('missionLine').textContent = 'Learn the basics — tap to match.';
    $('scannerBtn').style.display = 'none';
    $('progressDots').innerHTML = '';
    document.documentElement.style.setProperty('--accent', '#3a3a4e');

    let pairIdx = 0;
    let selected = null;

    function renderTutPair() {
      const pc = $('puzzleContent');
      const pair = TUTORIAL_PAIRS[pairIdx];
      pc.innerHTML = `
        <div class="micro-progress">Pair ${pairIdx+1} of 2</div>
        <div class="puzzle-instruction">👆 Tap the word on the LEFT, then tap its match on the RIGHT.</div>
        <div class="match-container">
          <div class="match-col" id="tutLeft"></div>
          <div class="match-col" id="tutRight"></div>
        </div>
        <div style="margin-top:1.5rem">
          <button onclick="skipTutorial()" style="padding:.4rem 1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:15px;color:rgba(255,255,255,.35);font-size:.75rem">Skip Tutorial →</button>
        </div>`;

      const leftCol = $('tutLeft');
      const rightCol = $('tutRight');
      const termCard = document.createElement('div');
      termCard.className = 'match-card';
      termCard.textContent = pair.term;
      termCard.onclick = () => {
        if (termCard.classList.contains('matched')) return;
        document.querySelectorAll('.match-card').forEach(c => c.classList.remove('selected'));
        termCard.classList.add('selected');
        selected = 'term';
      };
      leftCol.appendChild(termCard);

      const options = [pair.match, pairIdx === 0 ? 'Cold ❄️' : 'Hot 🔥'];
      const shuffled = options.sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.textContent = opt;
        card.onclick = () => {
          if (!selected) return;
          if (opt === pair.match) {
            card.classList.add('matched');
            termCard.classList.add('matched');
            termCard.classList.remove('selected');
            selected = null;
            pairIdx++;
            if (pairIdx >= 2) {
              setTimeout(() => finishTutorial(), 600);
            } else {
              setTimeout(() => renderTutPair(), 500);
            }
          } else {
            card.classList.add('wrong');
            setTimeout(() => card.classList.remove('wrong'), 400);
          }
        };
        rightCol.appendChild(card);
      });
    }
    renderTutPair();
  } catch(e) { console.error('Tutorial error:', e); skipTutorial(); }
}

function skipTutorial() { finishTutorial(); }

let tutorialDone = false;
function finishTutorial() {
  if (tutorialDone) return;
  tutorialDone = true;
  try {
    state.phase = 'room';
    state.roomIndex = 0;
    state.puzzleIndex = 0;
    $('codeVault').classList.remove('hidden');
    $('scannerBtn').style.display = 'flex';
    enterRoom(0);
  } catch(e) { console.error('finishTutorial error:', e); }
}

// ===== ROOM ENTRY =====
function enterRoom(idx) {
  try {
    state.roomIndex = idx;
    state.puzzleIndex = 0;
    const room = ROOMS[idx];
    setRoomTheme(room);
    $('roomLabel').textContent = `${room.emoji} ${room.name}`;
    $('roomProgress').textContent = `Room ${idx+1} of 3`;
    $('missionLine').textContent = room.mission;
    document.body.style.background = `radial-gradient(ellipse at 50% 50%, ${room.color}11 0%, var(--bg) 70%)`;
    updateProgressDots();
    showScanPreview(room.puzzles[0], () => loadPuzzle());
  } catch(e) { console.error('enterRoom error:', e); loadPuzzle(); }
}

// ===== SCAN PREVIEW =====
function showScanPreview(puzzle, callback) {
  try {
    state.previewDone = false;
    closeAllOverlays();
    const sp = $('scanPreview');
    const pdata = puzzle.scanPreview;
    let visualHTML = '';
    if (pdata && pdata.visuals) {
      pdata.visuals.forEach(v => {
        if (v.type === 'icon') visualHTML += `<div style="font-size:${v.size || '2rem'}">${v.content}</div>`;
        else visualHTML += `<div style="color:rgba(255,255,255,.6);font-size:.9rem">${v.content}</div>`;
      });
    }
    let labelsHTML = '';
    if (pdata && pdata.labels) {
      labelsHTML = pdata.labels.map(l => `<span class="scan-label">${l}</span>`).join(' ');
    }
    sp.innerHTML = `
      <div class="scan-frame">
        <div class="scan-header">📡 Scanning Room...</div>
        <div class="scan-visual">${visualHTML}</div>
        <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">${labelsHTML}</div>
      </div>`;
    sp.classList.add('active');
    sp.style.display = 'flex';

    function finishPreview() {
      if (state.previewDone) return;
      state.previewDone = true;
      sp.classList.remove('active');
      sp.style.display = 'none';
      if (callback) callback();
    }
    setTimeout(finishPreview, 3500);
    setTimeout(finishPreview, 5000);
  } catch(e) {
    state.previewDone = true;
    $('scanPreview').style.display = 'none';
    if (callback) callback();
  }
}

// ===== LOAD PUZZLE =====
function loadPuzzle() {
  try {
    state.puzzleSolving = false;
    state.overrideTriggered = false;
    state.wrongCounts[getPuzzleKey()] = 0;
    state.scannerUsed[getPuzzleKey()] = false;
    const room = ROOMS[state.roomIndex];
    const puzzle = room.puzzles[state.puzzleIndex];
    updateProgressDots();
    $('scannerBtn').style.display = 'flex';

    switch (puzzle.type) {
      case 'sequence': renderSequence(puzzle); break;
      case 'mystery': renderMystery(puzzle); break;
      case 'scanner': renderSystemScanner(puzzle); break;
      case 'match': renderMatch(puzzle); break;
      case 'visual': renderVisualRecall(puzzle); break;
      case 'quickfire': renderQuickFire(puzzle); break;
      default: console.error('Unknown puzzle type:', puzzle.type);
    }
  } catch(e) { console.error('loadPuzzle error:', e); }
}

// ===== PUZZLE SOLVED =====
function puzzleSolved(digit) {
  if (state.puzzleSolving) return;
  state.puzzleSolving = true;
  try {
    closeScanner();
    const key = getPuzzleKey();
    const wrongs = state.wrongCounts[key] || 0;
    const usedScanner = state.scannerUsed[key] || false;
    const ri = state.roomIndex;
    const pi = state.puzzleIndex;

    // Track quality
    if (!state.roomSolveQuality[ri]) state.roomSolveQuality[ri] = {};
    state.roomSolveQuality[ri][pi] = { wrongs, usedScanner };

    // First try?
    if (wrongs === 0 && !usedScanner) {
      state.firstTrySolves++;
      state.streak++;
    } else {
      state.streak = 0;
    }
    updateStreak();
    state.puzzlesSolved++;
    updatePuzzlesCleared();
    updateVault(ri, pi, digit);

    // Badges
    checkBadges(ri, pi, wrongs, usedScanner);

    // Show digit reveal
    showDigitReveal(digit);
  } catch(e) {
    console.error('puzzleSolved error:', e);
    state.puzzleSolving = false;
    advanceAfterPuzzle();
  }
}

function checkBadges(ri, pi, wrongs, usedScanner) {
  try {
    if (usedScanner && wrongs <= 1) {
      if (!state.badges.includes('Deep Scan')) state.badges.push('Deep Scan');
    }
    if (usedScanner && wrongs >= 1) {
      if (!state.badges.includes('Comeback')) state.badges.push('Comeback');
    }
    if (pi === 1) {
      const q0 = state.roomSolveQuality[ri][0] || { wrongs: 99 };
      const q1 = state.roomSolveQuality[ri][1] || { wrongs: 99 };
      if (q0.wrongs <= 1 && q1.wrongs <= 1) {
        if (!state.badges.includes('Clean Room')) state.badges.push('Clean Room');
      }
      if (!q0.usedScanner && !q1.usedScanner) {
        if (!state.badges.includes('No Scanner')) state.badges.push('No Scanner');
      }
    }
  } catch(e) {}
}

function showDigitReveal(digit) {
  try {
    closeAllOverlays();
    const dr = $('digitReveal');
    dr.innerHTML = `
      <div class="digit-reveal-num">${digit}</div>

    dr.classList.add('active');

    const rect = dr.querySelector('.digit-reveal-num').getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, ROOMS[state.roomIndex].color, 10);

}

function closeDigitAndAdvance() {

function advanceAfterPuzzle() {

function codeInput(digit) {

function codeClear() {
  try {
    const i1 = $('ci1'), i2 = $('ci2');
    if (i2.value) i2.value = '';
    else i1.value = '';
    $('codeError').textContent = '';
  } catch(e) {}

function codeSubmit() {
  try {
    const i1 = $('ci1'), i2 = $('ci2');
    const entered = i1.value + i2.value;

function showDoorTransition(isFinal) {
  try {

    if (isFinal) {
      nextColor = '#ffffff';

// ===== FINAL LOCK =====
function showFinalLock() {
  try {
    state.phase = 'final';
    document.documentElement.style.setProperty('--accent', '#ffffff');
    $('roomLabel').textContent = '🔒 Final Lock';
    $('roomProgress').textContent = 'Escape Sequence';
    $('missionLine').textContent = 'Match each concept to unlock the exit.';
    $('scannerBtn').style.display = 'flex';
    $('progressDots').innerHTML = '';
    document.body.style.background = `radial-gradient(ellipse at 50% 50%, rgba(255,255,255,.03) 0%, var(--bg) 70%)`;

    state.wrongCounts['final'] = 0;
    state.overrideTriggered = false;
    state.scannerUsed['final'] = false;

    const pc = $('puzzleContent');
    const pairs = [...FINAL_LOCK.pairs];
    const terms = pairs.map((p, i) => ({ ...p, idx: i }));
    const targets = pairs.map((p, i) => ({ match: p.match, idx: i })).sort(() => Math.random() - 0.5);

    let selectedTerm = null;
    let matched = new Set();
    let wrongCount = 0;

    function render() {
      pc.innerHTML = `
        <div class="puzzle-instruction">👆 Tap a term on the LEFT, then tap its match on the RIGHT.</div>
        <div class="match-container" id="finalMatchArea">
          <div class="match-col" id="fTerms"></div>
          <div class="match-col" id="fTargets"></div>
        </div>`;

      const tc = $('fTerms');
      const mc = $('fTargets');
      terms.forEach(t => {
        const card = document.createElement('div');
        card.className = 'match-card';
        if (matched.has(t.idx)) card.classList.add('matched');
        card.innerHTML = `<span>${t.termEmoji}</span> ${t.term}`;
        card.style.borderColor = matched.has(t.idx) ? '#4caf50' : t.termColor;
        card.style.boxShadow = `0 0 8px ${t.termColor}44`;
        card.dataset.idx = t.idx;
        card.onclick = () => {
          if (matched.has(t.idx)) return;
          document.querySelectorAll('#fTerms .match-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedTerm = t.idx;
        };
        tc.appendChild(card);
      });

      targets.forEach(t => {
        const card = document.createElement('div');
        card.className = 'match-card';
        if (matched.has(t.idx)) card.classList.add('matched');
        card.textContent = t.match;
        card.dataset.idx = t.idx;
        card.dataset.correct = 'true';
        card.onclick = () => {
          if (selectedTerm === null || matched.has(t.idx)) return;
          if (selectedTerm === t.idx) {
            matched.add(t.idx);
            card.classList.add('matched');
            selectedTerm = null;
            const rect = card.getBoundingClientRect();
            spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, pairs[t.idx].termColor, 6);
            if (matched.size === 3) {
              setTimeout(() => showEscapeAnimation(), 500);
            } else {
              setTimeout(render, 300);
            }
          } else {
            wrongCount++;
            state.wrongCounts['final'] = wrongCount;
            card.classList.add('wrong');
            setTimeout(() => card.classList.remove('wrong'), 400);
            if (wrongCount === 1 && !state.overrideTriggered) {
              state.scannerUsed['final'] = true;
              showFinalScanner();
            } else if (wrongCount >= 2 && !state.overrideTriggered) {
              state.overrideTriggered = true;
              finalOverride(matched);
            }
          }
        };
        mc.appendChild(card);
      });
    }

    function finalOverride(alreadyMatched) {
      closeScanner();
      const remaining = terms.filter(t => !alreadyMatched.has(t.idx));
      let i = 0;
      function cascadeNext() {
        if (i >= remaining.length) {
          setTimeout(() => showEscapeAnimation(), 500);
          return;
        }
        const t = remaining[i];
        matched.add(t.idx);
        render();
        i++;
        setTimeout(cascadeNext, 500);
      }
      cascadeNext();
    }

    function showFinalScanner() {
      try {
        const so = $('scannerOverlay');
        so.innerHTML = `
          <div class="scanner-frame">
            <div class="scanner-title">📡 Scanner Active</div>
            <div class="scanner-text">${FINAL_LOCK.scannerText}</div>
            <button class="scanner-dismiss" onclick="closeScanner()">Dismiss</button>
          </div>`;
        so.classList.add('active');
        so.style.display = 'flex';
      } catch(e) {}
    }

    render();
  } catch(e) { console.error('showFinalLock error:', e); showEscapeReport(); }
}

function openScanner() {

    showScannerOverlay();
  } catch(e) {}

function autoActivateScanner() {
  try {
    const key = state.phase === 'final' ? 'final' : getPuzzleKey();
    state.scannerUsed[key] = true;
    showScannerOverlay();
  } catch(e) {}
}

function showScannerOverlay() {
  try {
    const key = state.phase === 'final' ? 'final' : getPuzzleKey();
    let text = '';
    if (state.phase === 'final') {
      text = FINAL_LOCK.scannerText;
    } else {
      text = ROOMS[state.roomIndex].puzzles[state.puzzleIndex].scannerText;
    }
    const so = $('scannerOverlay');
    so.innerHTML = `
      <div class="scanner-frame">
        <div class="scanner-title">📡 Scanner Active</div>
        <div class="scanner-text">${text}</div>
        <button class="scanner-dismiss" onclick="closeScanner()">Dismiss</button>
      </div>`;
    so.classList.add('active');
    so.style.display = 'flex';
  } catch(e) {}
}

function handleWrongAnswer(type) {
  try {
    const key = state.phase === 'final' ? 'final' : getPuzzleKey();
    state.wrongCounts[key] = (state.wrongCounts[key] || 0) + 1;
    const wrongs = state.wrongCounts[key];
    if (wrongs === 1) {
      autoActivateScanner();
    }
    if (wrongs >= 2 && !state.overrideTriggered) {
      state.overrideTriggered = true;
      return 'override';
    }
    return 'retry';
  } catch(e) { return 'retry'; }
}

// ===== SEQUENCE LOCK =====
function renderSequence(puzzle) {
  try {
    const pc = $('puzzleContent');
    const correct = puzzle.cards;
    const shuffled = [...correct].sort(() => Math.random() - 0.5);
    let step = 0;
    let locked = [];

    function render() {
      let slotsHTML = '';
      for (let i = 0; i < 3; i++) {
        const filled = i < locked.length;
        slotsHTML += `<div class="seq-slot ${filled ? 'filled' : ''}">${filled ? locked[i].icon + ' ' + locked[i].label : (i + 1)}</div>`;
        if (i < 2) slotsHTML += `<span class="seq-arrow">→</span>`;
      }

      const prompts = ["What happens FIRST?", "What happens NEXT?", "Complete!"];
      let optionsHTML = '';
      if (step < 2) {
        const available = shuffled.filter(c => !locked.find(l => l.label === c.label));
        available.forEach((c, i) => {
          optionsHTML += `<div class="seq-card" data-idx="${i}" data-label="${c.label}" onclick="seqPick(this,'${c.label.replace(/'/g, "\\'")}')">${c.icon} ${c.label}</div>`;
        });
      }

      pc.innerHTML = `
        <div class="micro-progress">Step ${Math.min(step + 1, 3)} of 3</div>
        <div class="puzzle-question">${prompts[Math.min(step, 2)]}</div>
        <div class="puzzle-instruction">👆 Tap the correct answer below.</div>
        <div class="seq-slots">${slotsHTML}</div>
        <div class="seq-options" id="seqOpts">${optionsHTML}</div>`;

      if (step === 2) {
        const last = shuffled.find(c => !locked.find(l => l.label === c.label));
        if (last) {
          locked.push(last);
          setTimeout(() => {
            render();
            setTimeout(() => puzzleSolved(puzzle.digit), 500);
          }, 300);
        }
      }
    }

    window.seqPick = function(el, label) {
      const correctLabel = correct[step].label;
      if (label === correctLabel) {
        locked.push(correct[step]);
        step++;
        el.classList.add('locked');
        setTimeout(render, 300);
      } else {
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 400);
        const result = handleWrongAnswer('sequence');
        if (result === 'override') {
          closeScanner();
          // Safe cascade: don't use render() to avoid step===2 auto-fire conflict
          let oi = step;
          function cascadeSeq() {
            if (oi >= 3) {
              setTimeout(() => puzzleSolved(puzzle.digit), 400);
              return;
            }
            locked.push(correct[oi]);
            oi++;
            // Direct DOM update instead of calling render()
            let slotsHTML = '';
            for (let s = 0; s < 3; s++) {
              const filled = s < locked.length;
              slotsHTML += `<div class="seq-slot ${filled ? 'filled' : ''}">${filled ? locked[s].icon + ' ' + locked[s].label : (s + 1)}</div>`;
              if (s < 2) slotsHTML += '<span class="seq-arrow">→</span>';
            }
            pc.innerHTML = `
              <div class="micro-progress" style="color:var(--green)">Lock override — auto-sequencing...</div>
              <div class="puzzle-question">Complete!</div>
              <div class="seq-slots">${slotsHTML}</div>`;
            setTimeout(cascadeSeq, 500);
          }
          setTimeout(cascadeSeq, 300);
        }
      }
    };

    render();

// ===== MYSTERY INPUT =====
function renderMystery(puzzle) {
  try {
    const pc = $('puzzleContent');
    const opts = [...puzzle.options];
    let dimmed = new Set();

    function render() {
      const chainHTML = puzzle.chain.map(c =>
        c === '???' ? `<span class="chain-box chain-mystery" id="mysteryBox">???</span>`
        : `<span class="chain-box">${c}</span>`
      ).join('<span class="chain-arrow">→</span>');

      let optsHTML = '';
      opts.forEach((o, i) => {
        const dim = dimmed.has(i) ? 'dimmed' : '';
        optsHTML += `<div class="answer-card ${dim}" data-idx="${i}" data-correct="${o.correct}" onclick="mysteryPick(${i})">${o.icon} ${o.label}</div>`;
      });

      pc.innerHTML = `
        <div class="puzzle-instruction">👆 Tap the missing piece in the chain.</div>
        <div class="chain-flow">${chainHTML}</div>
        <div class="answer-cards" id="mysteryOpts">${optsHTML}</div>`;
    }

    window.mysteryPick = function(idx) {
      if (dimmed.has(idx)) return;
      const opt = opts[idx];
      const card = document.querySelector(`.answer-card[data-idx="${idx}"]`);
      if (opt.correct) {
        card.classList.add('correct');
        const box = $('mysteryBox');
        if (box) { box.textContent = opt.label; box.classList.remove('chain-mystery'); box.classList.add('chain-filled'); }
        const rect = card.getBoundingClientRect();
        spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, ROOMS[state.roomIndex].color, 8);
        setTimeout(() => puzzleSolved(puzzle.digit), 600);
      } else {
        card.classList.add('wrong');
        setTimeout(() => { card.classList.remove('wrong'); }, 400);
        dimmed.add(idx);
        const result = handleWrongAnswer('mystery');
        if (result === 'override') {
          closeScanner();
          const correctIdx = opts.findIndex(o => o.correct);
          setTimeout(() => {
            render();
            const correctCard = document.querySelector(`.answer-card[data-idx="${correctIdx}"]`);
            if (correctCard) {
              correctCard.classList.add('override-highlight');
              correctCard.innerHTML += ' <span style="font-size:.7rem;color:var(--green)">Scanner locked on</span>';
              correctCard.onclick = () => {
                correctCard.classList.add('correct');
                const box = $('mysteryBox');
                if (box) { box.textContent = opts[correctIdx].label; box.classList.remove('chain-mystery'); box.classList.add('chain-filled'); }
                setTimeout(() => puzzleSolved(puzzle.digit), 500);
              };
            }
          }, 300);
        } else {
          setTimeout(render, 400);
        }
      }
    };

    render();
  } catch(e) { console.error('renderMystery error:', e); }
}

// ===== MATCH LOCK =====
function renderMatch(puzzle) {
  try {
    const pc = $('puzzleContent');
    const pairs = puzzle.pairs;
    let pairIdx = 0;
    let selected = null;
    let dimmedMatches = new Set();

    function render() {
      if (pairIdx >= pairs.length) {
        setTimeout(() => puzzleSolved(puzzle.digit), 400);
        return;
      }
      const pair = pairs[pairIdx];
      const allMatches = pairs.map(p => p.match);
      const available = allMatches.filter((m, i) => i >= pairIdx);
      const shuffled = [...available].sort(() => Math.random() - 0.5);
      dimmedMatches = new Set();
      selected = null;

      pc.innerHTML = `
        <div class="micro-progress">Pair ${pairIdx + 1} of 3</div>
        <div class="puzzle-instruction">👆 Tap a word on the LEFT, then tap its match on the RIGHT.</div>
        <div class="match-container">
          <div class="match-col" id="matchLeft"></div>
          <div class="match-col" id="matchRight"></div>
        </div>`;

      const leftCol = $('matchLeft');
      const rightCol = $('matchRight');

      const termCard = document.createElement('div');
      termCard.className = 'match-card';
      termCard.textContent = pair.term;
      termCard.style.boxShadow = `0 0 10px ${ROOMS[state.roomIndex].color}44`;
      termCard.onclick = () => {
        document.querySelectorAll('.match-card').forEach(c => c.classList.remove('selected'));
        termCard.classList.add('selected');
        selected = true;
      };
      leftCol.appendChild(termCard);

      shuffled.forEach((m, i) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        if (dimmedMatches.has(m)) card.classList.add('dimmed');
        card.textContent = m;
        card.dataset.correct = (m === pair.match).toString();
        card.onclick = () => {
          if (!selected || dimmedMatches.has(m)) return;
          if (m === pair.match) {
            card.classList.add('matched');
            termCard.classList.add('matched');
            const rect = card.getBoundingClientRect();
            spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, ROOMS[state.roomIndex].color, 6);
            pairIdx++;
            setTimeout(render, 400);
          } else {
            card.classList.add('wrong');
            dimmedMatches.add(m);
            setTimeout(() => { card.classList.remove('wrong'); card.classList.add('dimmed'); }, 400);
            const result = handleWrongAnswer('match');
            if (result === 'override') {
              closeScanner();
              setTimeout(() => {
                // Auto-match current pair first
                const termEl = document.querySelector('#matchLeft .match-card');
                const correctEl = document.querySelector(`.match-card[data-correct="true"]`);
                if (termEl) termEl.classList.add('matched');
                if (correctEl) correctEl.classList.add('matched');
                pairIdx++;
                // Now cascade remaining
                function cascadeMatch() {
                  if (pairIdx >= pairs.length) {
                    setTimeout(() => puzzleSolved(puzzle.digit), 400);
                    return;
                  }
                  // Quick render of next pair, auto-matched
                  const p = pairs[pairIdx];
                  pc.innerHTML = `
                    <div class="micro-progress" style="color:var(--green)">Lock override — auto-matching...</div>
                    <div class="match-container">
                      <div class="match-col"><div class="match-card matched">${p.term}</div></div>
                      <div class="match-col"><div class="match-card matched">${p.match}</div></div>
                    </div>`;
                  pairIdx++;
                  setTimeout(cascadeMatch, 500);
                }
                setTimeout(cascadeMatch, 400);
              }, 300);
              return;
            }
          }
        };
        rightCol.appendChild(card);
      });
    }

    render();
  } catch(e) { console.error('renderMatch error:', e); }
}

// ===== QUICK FIRE =====
function renderQuickFire(puzzle) {
  try {
    const pc = $('puzzleContent');
    state.qfState = {
      questions: puzzle.questions.map((q, i) => ({ ...q, idx: i, answered: false, correct: false })),
      currentIdx: 0,
      correctCount: 0,
      cumulativeWrongs: 0,
      retryMode: false
    };

    function getNext() {
      const qs = state.qfState;
      if (qs.retryMode) {
        return qs.questions.find(q => !q.correct);
      }
      return qs.questions.find(q => !q.answered);
    }

    function render() {
      const qs = state.qfState;
      const q = getNext();
      if (!q) {
        if (qs.correctCount >= 3) {
          setTimeout(() => puzzleSolved(puzzle.digit), 400);
        } else {
          qs.retryMode = true;
          qs.questions.forEach(qq => { if (!qq.correct) qq.answered = false; });
          setTimeout(render, 500);
        }
        return;
      }

      const total = qs.retryMode ? qs.questions.filter(qq => !qq.correct).length : 4;
      const current = qs.retryMode
        ? qs.questions.filter(qq => !qq.correct).indexOf(q) + 1
        : q.idx + 1;

      pc.innerHTML = `
        <div class="micro-progress">${qs.retryMode ? 'Retry: ' : ''}Question ${current} of ${qs.retryMode ? total : 4}</div>
        <div class="qf-feedback" id="qfFeedback"></div>
        <div class="qf-question">"${q.text}"</div>
        <div class="qf-buttons">
          <button class="qf-btn true-btn" onclick="qfAnswer(true)">TRUE ✔</button>
          <button class="qf-btn false-btn" onclick="qfAnswer(false)">FALSE ✖</button>
        </div>
        <div class="qf-progress">${qs.correctCount} of 3 needed</div>`;
    }

    window.qfAnswer = function(answer) {
      const qs = state.qfState;
      const q = getNext();
      if (!q) return;

      const isCorrect = (answer === q.answer);
      q.answered = true;

      const trueBtn = document.querySelector('.true-btn');
      const falseBtn = document.querySelector('.false-btn');
      const fb = $('qfFeedback');

      if (isCorrect) {
        q.correct = true;
        qs.correctCount++;
        fb.textContent = '✔';
        fb.style.color = 'var(--green)';
        if (answer) trueBtn.classList.add('flash-correct');
        else falseBtn.classList.add('flash-correct');
      } else {
        qs.cumulativeWrongs++;
        fb.textContent = '✖';
        fb.style.color = 'var(--red)';
        if (answer) trueBtn.classList.add('flash-wrong');
        else falseBtn.classList.add('flash-wrong');

        if (qs.cumulativeWrongs === 1) {
          autoActivateScanner();
        }
        state.wrongCounts[getPuzzleKey()] = qs.cumulativeWrongs;

        if (qs.cumulativeWrongs >= 5) {
          state.overrideTriggered = true;
          closeScanner();
          qs.questions.forEach(qq => { qq.correct = true; qq.answered = true; });
          qs.correctCount = 4;
          setTimeout(() => {
            pc.innerHTML = `
              <div class="puzzle-question" style="color:var(--green)">Lock override triggered — station systems restored</div>`;
            setTimeout(() => puzzleSolved(puzzle.digit), 1000);
          }, 600);
          return;
        }
      }

      trueBtn.disabled = true;
      falseBtn.disabled = true;
      setTimeout(render, 600);
    };

    render();
  } catch(e) { console.error('renderQuickFire error:', e); }
}

// ===== EMERGENCY SKIP =====
function initEmergencySkip() {
  try {
    const roomLabel = $('roomLabel');
    if (!roomLabel) return;

    let pressTimer = null;
    let confirmed = false;

    roomLabel.addEventListener('pointerdown', (e) => {
      confirmed = false;
      pressTimer = setTimeout(() => {
        if (!confirmed) {
          confirmed = true;
          roomLabel.textContent = '⚠️ Hold again to reveal';
          let confirmTimer = setTimeout(() => {
            roomLabel.textContent = getOriginalLabel();
            confirmed = false;
          }, 3000);
          roomLabel.addEventListener('pointerdown', function confirmHandler() {
            clearTimeout(confirmTimer);
            roomLabel.removeEventListener('pointerdown', confirmHandler);
            executeSkip();
          }, { once: true });
        }
      }, 5000);
    });

    roomLabel.addEventListener('pointerup', () => { clearTimeout(pressTimer); });
    roomLabel.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });

    // Shift+S
    let shiftSStart = 0;
    document.addEventListener('keydown', (e) => {
      if (e.key === 'S' && e.shiftKey && !state.shiftSHeld) {
        state.shiftSHeld = true;
        shiftSStart = Date.now();
        state.shiftSTimer = setTimeout(() => {
          executeSkip();
        }, 2000);
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'S' || !e.shiftKey) {
        state.shiftSHeld = false;
        clearTimeout(state.shiftSTimer);
      }
    });
  } catch(e) {}
}

function getOriginalLabel() {
  if (state.phase === 'final') return '🔒 Final Lock';
  const room = ROOMS[state.roomIndex];
  return room ? `${room.emoji} ${room.name}` : '';
}

function executeSkip() {
  try {
    closeAllOverlays();
    state.previewDone = true; // Cancel any pending scanPreview callback
    if (state.phase === 'final') {
      showEscapeReport();
      return;
    }
    const room = ROOMS[state.roomIndex];
    const digits = room.code.split('');
    digits.forEach((d, i) => {
      updateVault(state.roomIndex, i, d);
    });
    state.puzzlesSolved = Math.min(state.puzzlesSolved + (2 - state.puzzleIndex), 6);
    updatePuzzlesCleared();
    showCodeEntry();
  } catch(e) {}
}

// ===== INIT =====
initEmergencySkip();
