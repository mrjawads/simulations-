<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mr. Jawad's Simulations — Capsaicin &amp; Sensory Receptors</title>
<style>
:root {
  --bg1: #0F0A1A;
  --bg2: #1A0F2E;
  --neon: #39FF14;
  --pink: #FF1493;
  --gold: #FFD700;
  --streak-orange: #FF6B35;
  --text: #F0F0F0;
  --text-dim: #8888AA;
  --panel-bg: rgba(20,12,40,0.92);
  --card-bg: rgba(30,20,55,0.95);
  --correct-green: #00E676;
  --wrong-red: #FF4444;
  --hint-yellow: #FFF9C4;
  --hint-orange: #FFE0B2;
  --border-glow: rgba(57,255,20,0.3);
  --node-dim: #2A2040;
  --node-active: #39FF14;
  --partial-yellow: #FFD700;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg1);color:var(--text);}
body{display:flex;flex-direction:column;}
/* ---- HEX BACKGROUND ---- */
.hex-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:linear-gradient(160deg,var(--bg1),var(--bg2));}
.hex-bg::after{content:'';position:absolute;top:0;left:0;width:200%;height:200%;
  background-image:radial-gradient(circle,rgba(57,255,20,0.03) 1px,transparent 1px);
  background-size:40px 40px;animation:hexDrift 60s linear infinite;}
@keyframes hexDrift{0%{transform:translate(0,0)}100%{transform:translate(-40px,-40px)}}
/* ---- TOP BAR ---- */
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(15,10,26,0.95);border-bottom:2px solid rgba(57,255,20,0.2);min-height:44px;flex-shrink:0;}
.round-badge{font-size:15px;font-weight:700;color:var(--neon);text-transform:uppercase;letter-spacing:1px;}
.score-display{font-size:18px;font-weight:700;color:var(--gold);position:relative;}
.points-anim{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:700;color:var(--neon);animation:floatUp 1.2s ease-out forwards;pointer-events:none;}
@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(1.3)}}
.streak-display{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:700;}
.streak-flame{font-size:22px;transition:transform 0.3s;}
.streak-flame.bronze{filter:drop-shadow(0 0 4px #CD7F32);transform:scale(1.1);}
.streak-flame.silver{filter:drop-shadow(0 0 6px #C0C0C0);transform:scale(1.2);}
.streak-flame.gold{filter:drop-shadow(0 0 10px #FFD700);transform:scale(1.4);}
.streak-count{color:var(--streak-orange);}
/* ---- PATHWAY TRACKER ---- */
.pathway-tracker{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;gap:3px;padding:6px 12px;background:rgba(15,10,26,0.85);border-bottom:1px solid rgba(57,255,20,0.1);flex-shrink:0;}
.path-node{width:30px;height:30px;border-radius:6px;background:var(--node-dim);border:2px solid rgba(100,80,150,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-dim);transition:all 0.5s;position:relative;}
.path-node.complete{background:rgba(0,230,118,0.2);border-color:var(--correct-green);color:var(--correct-green);animation:nodeGlow 0.6s ease-out;}
.path-node.partial{background:rgba(255,215,0,0.15);border-color:var(--partial-yellow);color:var(--partial-yellow);}
.path-node.current{border-color:var(--neon);box-shadow:0 0 10px rgba(57,255,20,0.3);animation:currentPulse 2s infinite;}
.path-node .lock-icon{font-size:10px;}
@keyframes nodeGlow{0%{box-shadow:0 0 20px rgba(0,230,118,0.8)}100%{box-shadow:0 0 4px rgba(0,230,118,0.2)}}
@keyframes currentPulse{0%,100%{box-shadow:0 0 10px rgba(57,255,20,0.3)}50%{box-shadow:0 0 18px rgba(57,255,20,0.6)}}
.path-line{width:12px;height:2px;background:rgba(100,80,150,0.2);transition:background 0.5s;}
.path-line.lit{background:var(--correct-green);box-shadow:0 0 6px rgba(0,230,118,0.5);}
/* ---- MAIN CONTENT AREA ---- */
.main-area{flex:1;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:5;}
.context-panel{display:flex;flex-direction:column;position:relative;padding:8px 12px;flex-shrink:0;}
.focus-prompt{text-align:center;font-size:13px;color:var(--gold);padding:4px 10px;background:rgba(255,215,0,0.08);border-radius:8px;margin-bottom:6px;transition:opacity 0.5s;line-height:1.3;}
.context-caption{text-align:center;font-size:12px;color:var(--text-dim);padding:3px 8px;background:rgba(30,20,55,0.6);border-radius:6px;margin-bottom:6px;line-height:1.3;}
.arena-box{background:var(--card-bg);border-radius:12px;border:1px solid rgba(57,255,20,0.1);overflow:auto;position:relative;display:flex;align-items:center;justify-content:center;min-height:140px;max-height:40vh;}
/* ---- INTERACTION ZONE ---- */
.interaction-zone{position:relative;z-index:10;padding:10px 14px 8px;background:rgba(15,10,26,0.95);border-top:2px solid rgba(57,255,20,0.15);flex-shrink:0;min-height:100px;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:opacity 0.3s;}
.iz-prompt{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;text-align:center;line-height:1.3;}
.options-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.option-card{padding:10px 14px;border-radius:10px;background:rgba(40,30,70,0.9);border:2px solid rgba(100,80,160,0.4);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;min-width:70px;min-height:48px;text-align:center;line-height:1.3;-webkit-tap-highlight-color:transparent;user-select:none;display:flex;align-items:center;justify-content:center;word-break:break-word;}
.option-card:active{transform:scale(0.97);}
.option-card.selected{border-color:var(--neon);box-shadow:0 0 12px rgba(57,255,20,0.3);}
.option-card.correct{border-color:var(--correct-green);background:rgba(0,230,118,0.15);animation:correctFlash 0.5s;}
.option-card.wrong{border-color:var(--wrong-red);background:rgba(255,68,68,0.15);animation:wrongFlash 0.5s;}
.option-card.dimmed{opacity:0.35;pointer-events:none;text-decoration:line-through;}
.option-card.ghost-glow{box-shadow:0 0 15px rgba(57,255,20,0.2);border-color:rgba(57,255,20,0.3);}
@keyframes correctFlash{0%{box-shadow:0 0 30px rgba(0,230,118,0.8)}100%{box-shadow:0 0 4px rgba(0,230,118,0.2)}}
@keyframes wrongFlash{0%{background:rgba(255,68,68,0.4)}100%{background:rgba(255,68,68,0.15)}}
.lock-in-btn{display:block;margin:8px auto 0;padding:10px 28px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--neon),#20CC10);color:#000;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;opacity:0.4;pointer-events:none;-webkit-tap-highlight-color:transparent;}
.lock-in-btn.ready{opacity:1;pointer-events:auto;box-shadow:0 0 16px rgba(57,255,20,0.4);}
.lock-in-btn.ready:active{transform:scale(0.97);}
.try-again-btn{display:inline-block;margin:10px auto 0;padding:14px 28px;border:none;border-radius:10px;background:linear-gradient(135deg,#6C63FF,#8B5CF6);color:#fff;font-size:15px;font-weight:700;cursor:pointer;min-height:48px;-webkit-tap-highlight-color:transparent;}
.try-again-btn:active{transform:scale(0.97);}
/* ---- COACHING BAR ---- */
.coaching-bar{background:rgba(255,249,196,0.95);color:#333;padding:8px 12px;border-radius:8px;margin-top:6px;font-size:12px;line-height:1.3;text-align:center;animation:slideUp 0.3s ease-out;}
@keyframes slideUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
/* ---- BOTTOM BAR ---- */
.bottom-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:rgba(15,10,26,0.95);border-top:1px solid rgba(57,255,20,0.1);flex-shrink:0;min-height:38px;}
.bottom-bar button{padding:5px 10px;border:1px solid rgba(100,80,160,0.4);border-radius:8px;background:rgba(40,30,70,0.8);color:var(--text-dim);font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.bottom-bar button:active{transform:scale(0.97);}
.source-day{font-size:12px;font-weight:600;}
.source-day .day-mon{color:#39FF14;}
.source-day .day-tue{color:#00D4FF;}
.source-day .day-wed{color:#8B5CF6;}
.source-day .day-multi{color:#FFD700;}
/* ---- HINT OVERLAY ---- */
.hint-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s;}
.hint-panel{background:#1A1030;border:2px solid var(--gold);border-radius:16px;padding:20px;max-width:380px;width:90%;max-height:80vh;overflow-y:auto;}
.hint-panel h3{color:var(--gold);font-size:16px;margin-bottom:10px;}
.hint-panel p{font-size:14px;line-height:1.5;color:var(--text);margin-bottom:12px;}
.hint-panel button{padding:10px 24px;border:none;border-radius:8px;background:var(--gold);color:#000;font-weight:700;font-size:14px;cursor:pointer;display:block;margin:0 auto;}
/* ---- VOCAB OVERLAY ---- */
.vocab-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s;}
.vocab-panel{background:#1A1030;border:2px solid var(--pink);border-radius:16px;padding:20px;max-width:380px;width:90%;max-height:80vh;overflow-y:auto;}
.vocab-panel h3{color:var(--pink);font-size:16px;margin-bottom:12px;text-align:center;}
.vocab-item{padding:10px;border-bottom:1px solid rgba(100,80,160,0.3);display:flex;gap:10px;align-items:flex-start;}
.vocab-item:last-child{border-bottom:none;}
.vocab-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center;}
.vocab-term{font-weight:700;color:var(--neon);}
.vocab-def{font-size:13px;color:var(--text-dim);margin-top:2px;line-height:1.3;}
.vocab-panel .close-btn{margin-top:12px;display:block;margin-left:auto;margin-right:auto;padding:8px 20px;border:1px solid var(--pink);border-radius:8px;background:transparent;color:var(--pink);font-weight:600;cursor:pointer;}
/* ---- CELEBRATION OVERLAY ---- */
.celebration-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);animation:fadeIn 0.3s;}
.celebration-text{font-size:28px;font-weight:800;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.5);margin-bottom:8px;}
.affirmation-text{font-size:22px;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.3);animation:fadeIn 0.5s;}
.celebration-overlay .btn-row{display:flex;gap:12px;margin-top:16px;}
.celebration-overlay .btn-row button{padding:12px 24px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-keep{background:linear-gradient(135deg,var(--neon),#20CC10);color:#000;}
.btn-score{background:linear-gradient(135deg,var(--gold),#FFA500);color:#000;}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
/* ---- SIGNAL BUFFERING ---- */
.buffering-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);animation:fadeIn 0.3s;}
.buffer-bar{width:200px;height:8px;background:rgba(100,80,160,0.3);border-radius:4px;overflow:hidden;margin-bottom:12px;}
.buffer-fill{height:100%;background:var(--neon);border-radius:4px;animation:bufferFill 5s linear forwards;}
@keyframes bufferFill{0%{width:0}100%{width:100%}}
.buffer-text{font-size:14px;color:var(--gold);text-align:center;padding:0 20px;line-height:1.4;}
/* ---- WELCOME SCREEN ---- */
.welcome-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;background:linear-gradient(160deg,var(--bg1),var(--bg2));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.welcome-screen h1{font-size:22px;color:var(--neon);text-align:center;margin-bottom:4px;text-shadow:0 0 20px rgba(57,255,20,0.3);}
.welcome-screen h2{font-size:15px;color:var(--gold);text-align:center;margin-bottom:20px;font-weight:400;}
.welcome-screen .hook{font-size:14px;color:var(--text);text-align:center;margin-bottom:24px;max-width:340px;line-height:1.5;background:var(--card-bg);padding:14px;border-radius:10px;border:1px solid rgba(57,255,20,0.15);}
.welcome-screen label{display:block;color:var(--text-dim);font-size:13px;margin-bottom:4px;}
.welcome-screen input{width:260px;padding:10px 14px;border:2px solid rgba(100,80,160,0.4);border-radius:8px;background:rgba(30,20,55,0.9);color:var(--text);font-size:15px;margin-bottom:12px;outline:none;}
.welcome-screen input:focus{border-color:var(--neon);}
.welcome-screen .start-btn{padding:14px 40px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--neon),#20CC10);color:#000;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 0 20px rgba(57,255,20,0.3);}
.welcome-screen .start-btn:disabled{opacity:0.4;cursor:default;}
/* ---- RECEIPT SCREEN ---- */
.receipt-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:250;background:linear-gradient(160deg,var(--bg1),var(--bg2));overflow-y:auto;padding:16px;}
.receipt-inner{max-width:500px;margin:0 auto;}
.receipt-header{text-align:center;margin-bottom:16px;}
.receipt-header h2{color:var(--neon);font-size:18px;}
.receipt-header h3{color:var(--gold);font-size:14px;font-weight:400;}
.receipt-name{display:flex;align-items:center;gap:8px;margin-bottom:16px;justify-content:center;}
.receipt-name input{padding:8px 12px;border:2px solid rgba(100,80,160,0.4);border-radius:8px;background:rgba(30,20,55,0.9);color:var(--text);font-size:15px;width:220px;outline:none;}
.receipt-name input:disabled{opacity:0.7;}
.receipt-name button{padding:8px 16px;border:none;border-radius:8px;background:var(--neon);color:#000;font-weight:700;font-size:13px;cursor:pointer;}
.pathway-completion{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:8px;}
.pc-node{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.pc-node.g{background:rgba(0,230,118,0.2);border:2px solid var(--correct-green);color:var(--correct-green);}
.pc-node.y{background:rgba(255,215,0,0.15);border:2px solid var(--partial-yellow);color:var(--partial-yellow);}
.pc-node.x{background:var(--node-dim);border:2px solid rgba(100,80,150,0.3);color:var(--text-dim);}
.signals-decoded{text-align:center;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:16px;}
.overall-pct{text-align:center;font-size:36px;font-weight:800;margin-bottom:4px;}
.overall-pct.green{color:var(--correct-green);}
.overall-pct.yellow{color:var(--gold);}
.overall-pct.red{color:var(--wrong-red);}
.mastery-label{text-align:center;font-size:14px;color:var(--text-dim);margin-bottom:4px;}
.streak-record{text-align:center;font-size:13px;color:var(--streak-orange);margin-bottom:16px;}
.detail-toggle{display:block;margin:0 auto 12px;padding:8px 20px;border:1px solid rgba(100,80,160,0.4);border-radius:8px;background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;}
.detail-table{width:100%;border-collapse:collapse;margin-bottom:16px;display:none;}
.detail-table.open{display:table;}
.detail-table th{background:rgba(57,255,20,0.1);color:var(--neon);font-size:12px;padding:6px 4px;text-align:left;border-bottom:1px solid rgba(100,80,160,0.3);}
.detail-table td{font-size:12px;padding:6px 4px;border-bottom:1px solid rgba(30,20,55,0.8);}
.detail-table tr:nth-child(even) td{background:rgba(30,20,55,0.3);}
.detail-table .bonus-row td{color:var(--gold);}
.completion-badge{text-align:center;padding:10px;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:12px;}
.completion-badge.req{background:rgba(0,230,118,0.1);border:1px solid var(--correct-green);color:var(--correct-green);}
.completion-badge.bonus{background:rgba(255,215,0,0.1);border:1px solid var(--gold);color:var(--gold);}
.receipt-actions{display:flex;gap:10px;justify-content:center;margin-bottom:8px;}
.receipt-actions button{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-print{background:var(--neon);color:#000;}
.btn-startover{background:rgba(255,68,68,0.2);border:1px solid var(--wrong-red);color:var(--wrong-red);}
.screenshot-note{text-align:center;font-size:13px;color:var(--text-dim);margin-bottom:12px;}
.total-time{text-align:center;font-size:13px;color:var(--text-dim);margin-bottom:8px;}
/* ---- CONFIRM DIALOG ---- */
.confirm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:280;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s;}
.confirm-box{background:#1A1030;border:2px solid var(--wrong-red);border-radius:12px;padding:20px;max-width:300px;text-align:center;}
.confirm-box p{margin-bottom:14px;font-size:14px;line-height:1.4;}
.confirm-box .btn-row{display:flex;gap:10px;justify-content:center;}
.confirm-box button{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
/* ---- PARTICLE LAYER ---- */
#particle-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:190;overflow:hidden;}
.particle{position:absolute;width:8px;height:8px;border-radius:50%;display:none;animation:particleFly 1.5s ease-out forwards;}
@keyframes particleFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}
}
/* ---- ARENA INTERNALS ---- */
.arena-diagram{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;position:relative;}
.arena-diagram .label{position:absolute;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;pointer-events:none;}
.arena-diagram .highlight-pulse{animation:highlightPulse 1.5s infinite;}
@keyframes highlightPulse{0%,100%{box-shadow:0 0 6px rgba(255,215,0,0.3)}50%{box-shadow:0 0 16px rgba(255,215,0,0.7)}}
/* Hotspot styles */
.hotspot-target{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s;}
.hotspot-target:active{transform:scale(0.97);}
.hotspot-correct{animation:correctFlash 0.5s;}
.hotspot-wrong{animation:wrongFlash 0.5s;}
.highlighted{border-color:var(--gold)!important;box-shadow:0 0 10px rgba(255,215,0,0.4)!important;}
.locked{opacity:0.5;pointer-events:none;filter:grayscale(0.5);}
.pulsing{animation:highlightPulse 1.5s infinite;}
/* Step indicator */
.step-indicator{text-align:center;font-size:12px;color:var(--gold);margin-bottom:6px;font-weight:700;}
/* Sequence chain display */
.chain-display{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.chain-slot{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;min-width:50px;text-align:center;}
.chain-slot.filled{background:rgba(0,230,118,0.15);border:1px solid var(--correct-green);color:var(--correct-green);}
.chain-slot.empty{background:rgba(100,80,160,0.2);border:1px dashed rgba(100,80,160,0.5);color:var(--text-dim);}
.chain-arrow{color:var(--text-dim);font-size:14px;}
/* Evidence matching */
.evidence-row{display:flex;gap:8px;justify-content:center;margin-bottom:8px;flex-wrap:wrap;}
.evidence-thumb{width:80px;height:60px;border-radius:8px;border:2px solid rgba(100,80,160,0.4);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all 0.2s;position:relative;background:var(--card-bg);}
.evidence-thumb.active-highlight{border-color:var(--gold);box-shadow:0 0 10px rgba(255,215,0,0.3);animation:highlightPulse 1.5s infinite;}
.evidence-thumb.matched{border-color:var(--correct-green);pointer-events:none;}
.evidence-thumb .check-mark{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--correct-green);color:#000;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.vocab-btn-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.vocab-match-btn{padding:10px 14px;border-radius:8px;border:2px solid rgba(100,80,160,0.4);background:var(--card-bg);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;min-height:48px;display:flex;align-items:center;justify-content:center;}
.vocab-match-btn.used{opacity:0.3;pointer-events:none;}
.vocab-match-btn.wrong-flash{border-color:var(--wrong-red);animation:wrongFlash 0.5s;}
.vocab-match-btn.pulse-hint{border-color:var(--partial-yellow);box-shadow:0 0 8px rgba(255,215,0,0.3);}
/* Brain response cards */
.brain-card{display:flex;flex-direction:column;align-items:center;padding:10px 14px;border-radius:10px;border:2px solid rgba(100,80,160,0.4);background:var(--card-bg);cursor:pointer;min-width:90px;transition:all 0.2s;}
.brain-card .brain-icon{font-size:28px;margin-bottom:4px;}
.brain-card .bar-level{font-size:11px;color:var(--text-dim);margin-bottom:2px;}
.brain-card .intensity-label{font-size:12px;font-weight:600;}
/* Tile builder */
.tile-pool{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;}
.tile{padding:10px 12px;border-radius:8px;border:2px solid rgba(100,80,160,0.4);background:var(--card-bg);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:4px;min-height:48px;}
.tile:active{transform:scale(0.97);}
.tile.placed{opacity:0.3;pointer-events:none;}
.tile.bounce-back{animation:bounceBack 0.4s;}
@keyframes bounceBack{0%{transform:translateX(20px)}50%{transform:translateX(-5px)}100%{transform:translateX(0)}}
.placed-chain{display:flex;align-items:center;gap:4px;justify-content:center;margin-bottom:8px;flex-wrap:wrap;min-height:40px;}
.placed-tile{padding:6px 10px;border-radius:6px;background:rgba(0,230,118,0.1);border:1px solid var(--correct-green);color:var(--correct-green);font-size:12px;font-weight:600;}
.placed-arrow{color:var(--text-dim);font-size:14px;}
/* Explanation tiles */
.explain-card{padding:10px 14px;border-radius:10px;border:2px solid rgba(100,80,160,0.4);background:var(--card-bg);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.3;}
/* Print */
@media print{
  .top-bar,.pathway-tracker,.bottom-bar,.main-area,.interaction-zone,.welcome-screen,.celebration-overlay,.hint-overlay,.vocab-overlay,.buffering-overlay,.confirm-overlay,#particle-layer,.hex-bg{display:none!important;}
  .receipt-screen{position:static!important;background:#fff!important;color:#000!important;padding:10px!important;}
  .receipt-screen *{color:#000!important;border-color:#999!important;}
  .receipt-inner{max-width:100%!important;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .detail-table{display:table!important;}
  .detail-toggle,.btn-print,.btn-startover{display:none!important;}
  .overall-pct.green{color:#00A050!important;}
  .overall-pct.yellow{color:#CC9900!important;}
  .overall-pct.red{color:#CC0000!important;}
}
/* ---- RESPONSIVE ---- */
@media(max-height:700px){
  .top-bar{padding:4px 10px;min-height:38px;}
  .pathway-tracker{padding:4px 10px;}
  .path-node{width:28px;height:28px;font-size:10px;}
  .path-line{width:10px;}
  .focus-prompt{font-size:12px;padding:3px 8px;margin-bottom:4px;}
  .context-caption{font-size:11px;padding:2px 6px;margin-bottom:4px;}
  .arena-box{max-height:35vh;}
  .bottom-bar{padding:4px 10px;min-height:36px;}
}
@media(max-width:480px){
  .top-bar{padding:4px 8px;min-height:38px;}
  .round-badge{font-size:12px;}
  .score-display{font-size:14px;}
  .pathway-tracker{padding:4px 8px;}
  .path-node{width:26px;height:26px;font-size:10px;}
  .path-line{width:8px;}
  .context-panel{padding:4px 8px;}
  .focus-prompt{font-size:11px;padding:3px 6px;margin-bottom:4px;}
  .context-caption{font-size:10px;padding:2px 6px;margin-bottom:4px;}
  .interaction-zone{padding:8px 10px 6px;}
  .iz-prompt{font-size:12px;margin-bottom:6px;}
  .option-card{padding:8px 10px;font-size:12px;min-height:44px;}
  .lock-in-btn{padding:8px 20px;font-size:14px;margin-top:6px;}
  .bottom-bar{padding:4px 8px;min-height:34px;}
  .bottom-bar button{padding:4px 8px;font-size:10px;}
  .evidence-thumb{width:65px;height:50px;font-size:20px;}
  .tile{padding:6px 8px;font-size:11px;min-height:44px;}
  .coaching-bar{font-size:11px;padding:6px 8px;}
  .try-again-btn{padding:10px 20px;font-size:13px;min-height:44px;}
}

<body>
<div class="hex-bg"></div>
<div id="particle-layer"></div>
<!-- WELCOME SCREEN -->
<div class="welcome-screen" id="welcomeScreen">
  <h1 id="simTitle">Mr. Jawad's Simulations</h1>
  <h2>Capsaicin &amp; Sensory Receptors — Thursday</h2>
  <div class="hook">Harris's nervous system fired 8 distress signals. Decode all 8 to unlock the full chain — from chip to brain.</div>
  <label for="studentNameInput">Your Name</label>
  <input type="text" id="studentNameInput" placeholder="Enter your name" autocomplete="off">
  <label for="teacherNameInput" style="margin-top:4px;">Your Teacher's Name <span style="font-size:11px;color:var(--text-dim);">(optional)</span></label>
  <input type="text" id="teacherNameInput" placeholder="e.g. Mr. Jawad" autocomplete="off">
  <button class="start-btn" id="startBtn" disabled>Decode the Signals</button>
</div>
<!-- TOP BAR -->
<div class="top-bar" id="topBar" style="display:none;">
  <div class="round-badge" id="roundBadge">Signal 1 of 8</div>
  <div class="score-display" id="scoreDisplay">0</div>
  <div class="streak-display">
    <span class="streak-flame" id="streakFlame">&#x1F525;</span>
    <span class="streak-count" id="streakCount">x0</span>
  </div>
</div>
<!-- PATHWAY TRACKER -->
<div class="pathway-tracker" id="pathwayTracker" style="display:none;"></div>
<!-- MAIN AREA -->
<div class="main-area" id="mainArea" style="display:none;">
  <div class="context-panel">
    <div class="focus-prompt" id="focusPrompt"></div>
    <div class="context-caption" id="contextCaption"></div>
    <div class="arena-box" id="arenaBox"></div>
  </div>
  <div class="interaction-zone" id="interactionZone"></div>
</div>
<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar" style="display:none;">
  <button id="vocabBtn">&#x1F4D6; Vocab</button>
  <button id="hintBtn">&#x1F4A1; Hint</button>
  <span class="source-day" id="sourceDay"></span>
  <button id="resetLevelBtn">Reset Level</button>
</div>
<!-- RECEIPT (built dynamically) -->
<div class="receipt-screen" id="receiptScreen" style="display:none;"></div>
<script>
// ========== GLOBAL STATE ==========
let teacherName = "Your teacher";
const TOPIC = "Capsaicin & Sensory Receptors";
let audioCtx = null;
function getAudioContext(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
let affirmations = [];
function buildAffirmations(){
  affirmations = [
    `${teacherName} is proud of you!`,
    `${teacherName} knew you could do it!`,
    `That's the kind of thinking ${teacherName} loves to see!`,
    `${teacherName} says: you're getting it!`,
    `Strong work — ${teacherName} sees your effort!`,
    `${teacherName} is impressed right now!`,
    `You're showing ${teacherName} what you can do!`,
    `${teacherName} says: keep that energy!`
  ];
}
let lastAffirmation = -1;
function getAffirmation(){
  if(affirmations.length===0) buildAffirmations();
  let idx;
  do { idx = Math.floor(Math.random()*affirmations.length); } while(idx===lastAffirmation && affirmations.length>1);
  lastAffirmation = idx;
  return affirmations[idx];
}
const gameState = {
  studentName: "",
  currentRound: 0,
  score: 0,
  streak: 0,
  maxStreak: 0,
  rounds: [],
  requiredComplete: false,
  bonusComplete: false,
  totalStartTime: 0,
  receiptRendered: false,
  requiredCompleteShown: false,
  bonusCompleteShown: false,
  processing: false,
};
// ========== PARTICLE POOL ==========
const PARTICLE_POOL = [];
(function initParticles(){
  const layer = document.getElementById('particle-layer');
  for(let i=0;i<15;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.display='none';
    layer.appendChild(p);
    PARTICLE_POOL.push(p);
  }
})();
let particleIdx = 0;
function spawnParticle(x,y,color){
  const p = PARTICLE_POOL[particleIdx % 15];
  particleIdx++;
  p.style.display='block';
  p.style.left=x+'px';
  p.style.top=y+'px';
  p.style.background=color||'var(--gold)';
  p.style.setProperty('--dx',(Math.random()*120-60)+'px');
  p.style.setProperty('--dy',(Math.random()*-100-30)+'px');
  p.style.animation='none';
  p.offsetHeight;
  p.style.animation='particleFly 1.5s ease-out forwards';
  setTimeout(()=>{p.style.display='none';},1600);
}
function burstParticles(x,y,count,color){
  for(let i=0;i<Math.min(count,15);i++){
    setTimeout(()=>spawnParticle(x+Math.random()*40-20,y+Math.random()*40-20,color),i*50);
  }
}
// ========== SOUND ==========
function playCorrectSound(){
  try{
    const ctx=getAudioContext();
    [523,659,784].forEach((f,i)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0.08,ctx.currentTime+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.08+0.3);
      o.start(ctx.currentTime+i*0.08);o.stop(ctx.currentTime+i*0.08+0.3);
    });
  }catch(e){}
}
function playWrongSound(){
  try{
    const ctx=getAudioContext();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=200;o.type='sawtooth';
    g.gain.setValueAtTime(0.06,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);
  }catch(e){}
}
// ========== OVERLAY MANAGEMENT ==========
function closeAllOverlays(){
  document.querySelectorAll('.celebration-overlay,.hint-overlay,.vocab-overlay,.buffering-overlay,.confirm-overlay').forEach(el=>el.remove());
}
// ========== UNIVERSAL FAIL-OUT CHECK ==========
function checkFailOut(rs,idx,threshold){
  threshold = threshold || 5;
  if(rs.wrongAttempts >= threshold && rs.hintsUsed >= 2 && !rs.completed){
    rs.failedOut=true;rs.score=50;rs.completed=true;
    rs.timeEnd=Date.now();
    updateStreak(false);
    gameState.processing=false;
    showCelebration("Let's move on — you'll see this idea again.",null,2000);
    setTimeout(()=>{completeRound(idx);},2200);
    return true;
  }
  return false;
}
// ========== TRACK ATTEMPT ==========
function trackAttempt(rs){
  rs.attempts=(rs.attempts||0)+1;
}
// ========== ESCAPE HTML ==========
function escHtml(s){
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}
// ========== VOCAB ==========
const vocabData = [
  {icon:'&#x1F336;&#xFE0F;',term:'CAPSAICIN',def:'Chemical in peppers causing burn feeling'},
  {icon:'&#x1F511;',term:'RECEPTOR',def:'Protein that detects a stimulus'},
  {icon:'&#x26A1;',term:'NEURON',def:'Nerve cell that carries signals'},
  {icon:'&#x1F446;',term:'STIMULUS',def:'Trigger that activates a receptor'}
];
function showVocab(){
  closeAllOverlays();
  const ov=document.createElement('div');ov.className='vocab-overlay';
  let html='<div class="vocab-panel"><h3>Key Vocabulary</h3>';
  vocabData.forEach(v=>{
    html+=`<div class="vocab-item"><div class="vocab-icon">${v.icon}</div><div><div class="vocab-term">${v.term}</div><div class="vocab-def">${v.def}</div></div></div>`;
  });
  html+='<button class="close-btn" onclick="this.closest(\'.vocab-overlay\').remove()">Close</button></div>';
  ov.innerHTML=html;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}
// ========== HINT SYSTEM ==========
function showHint(){
  const rd = ROUNDS[gameState.currentRound];
  if(!rd) return;
  const rs = gameState.rounds[gameState.currentRound];
  if(!rs) return;
  // Show hint 1 if available
  if(rs.hintsUsed < 1 && rd.hintLadder.hint1){
    rs.hintsUsed = Math.max(rs.hintsUsed,1);
    showHintPanel('Hint', rd.hintLadder.hint1.text);
  } else if(rd.hintLadder.stepByStep){
    rs.hintsUsed = Math.max(rs.hintsUsed,2);
    showStepByStep(rd.hintLadder.stepByStep.panels);
  }
}
function showHintPanel(title,text){
  closeAllOverlays();
  const ov=document.createElement('div');ov.className='hint-overlay';
  ov.innerHTML=`<div class="hint-panel"><h3>${title}</h3><p>${text}</p><button onclick="this.closest('.hint-overlay').remove()">Got It</button></div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}
function showStepByStep(panels){
  closeAllOverlays();
  let step=0;
  const ov=document.createElement('div');ov.className='hint-overlay';
  function render(){
    const p=panels[step];
    ov.innerHTML=`<div class="hint-panel"><h3>Step ${step+1} of ${panels.length}</h3><p>${p.text}</p><button id="sbsNext">${step<panels.length-1?'Next':'Got It'}</button></div>`;
    ov.querySelector('#sbsNext').addEventListener('click',()=>{
      step++;
      if(step>=panels.length){ov.remove();}else{render();}
    });
  }
  render();
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}
// ========== SIGNAL BUFFERING ==========
function showBuffering(text,duration,cb){
  closeAllOverlays();
  const ov=document.createElement('div');ov.className='buffering-overlay';
  ov.innerHTML=`<div class="buffer-bar"><div class="buffer-fill" style="animation-duration:${duration}ms"></div></div><div class="buffer-text">${text}</div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{ov.remove();if(cb)cb();},duration);
}
// ========== CELEBRATION ==========
let celebrationTimeout = null;
function showCelebration(text,affirmation,duration,buttons){
  closeAllOverlays();
  if(celebrationTimeout){clearTimeout(celebrationTimeout);celebrationTimeout=null;}
  const ov=document.createElement('div');ov.className='celebration-overlay';
  let html=`<div class="celebration-text">${text}</div>`;
  if(affirmation) html+=`<div class="affirmation-text">${affirmation}</div>`;
  if(buttons){
    html+='<div class="btn-row">';
    buttons.forEach(b=>{html+=`<button class="${b.cls}" data-action="${b.action}">${b.label}</button>`;});
    html+='</div>';
  }
  ov.innerHTML=html;
  document.body.appendChild(ov);
  burstParticles(window.innerWidth/2,window.innerHeight/2,10,'var(--gold)');
  playCorrectSound();
  if(buttons){
    let btnClicked=false;
    ov.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(btnClicked)return;
        btnClicked=true;
        if(celebrationTimeout){clearTimeout(celebrationTimeout);celebrationTimeout=null;}
        ov.remove();
        const act=btn.dataset.action;
        if(act==='keepGoing') advanceRound();
        else if(act==='seeScore') showReceipt();
      });
    });
    celebrationTimeout=setTimeout(()=>{if(ov.parentNode){ov.remove();if(!btnClicked){btnClicked=true;advanceRound();}}},15000);
  } else {
    celebrationTimeout=setTimeout(()=>{if(ov.parentNode)ov.remove();},duration||2000);
  }
}
// ========== POINTS ANIMATION ==========
function animatePoints(pts){
  const sd=document.getElementById('scoreDisplay');
  const el=document.createElement('span');el.className='points-anim';el.textContent='+'+pts;
  sd.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}
// ========== STREAK ==========
function updateStreak(correct){
  if(correct){
    gameState.streak++;
    if(gameState.streak>gameState.maxStreak) gameState.maxStreak=gameState.streak;
  } else {
    gameState.streak=0;
  }
  const flame=document.getElementById('streakFlame');
  const cnt=document.getElementById('streakCount');
  cnt.textContent='x'+gameState.streak;
  flame.className='streak-flame';
  if(gameState.streak>=8) flame.classList.add('gold');
  else if(gameState.streak>=5) flame.classList.add('silver');
  else if(gameState.streak>=3) flame.classList.add('bronze');
}
// ========== PATHWAY TRACKER ==========
function buildPathway(){
  const pt=document.getElementById('pathwayTracker');
  pt.innerHTML='';
  for(let i=0;i<8;i++){
    if(i>0){
      const line=document.createElement('div');line.className='path-line';line.id='pathLine'+(i-1);
      pt.appendChild(line);
    }
    const node=document.createElement('div');node.className='path-node';node.id='pathNode'+i;
    node.innerHTML=`<span class="lock-icon">&#x1F512;</span>`;
    pt.appendChild(node);
  }
  updatePathway();
}
function updatePathway(){
  for(let i=0;i<8;i++){
    const node=document.getElementById('pathNode'+i);
    const rs=gameState.rounds[i];
    if(!node)continue;
    node.className='path-node';
    if(rs && rs.completed){
      node.classList.add(rs.score>=60?'complete':'partial');
      node.innerHTML=`<span>${i+1}</span>`;
      if(i>0){const ln=document.getElementById('pathLine'+(i-1));if(ln)ln.classList.add('lit');}
    } else if(i===gameState.currentRound){
      node.classList.add('current');
      node.innerHTML=`<span>${i+1}</span>`;
    }
  }
}
// ========== SCORING ==========
function scoreForRound(rs){
  if(rs.failedOut) return 50;
  if(rs.hintsUsed===0) return 100;
  if(rs.hintsUsed===1) return 85;
  return 60; // hintsUsed >= 2 (step-by-step used)
}
function calcOverall(){
  let reqScores=[];
  let bonusCount=0;
  gameState.rounds.forEach((rs,i)=>{
    if(!rs.completed) return;
    if(ROUNDS[i].required) reqScores.push(rs.score);
    else bonusCount++;
  });
  if(reqScores.length===0) return 0;
  const avg=reqScores.reduce((a,b)=>a+b,0)/reqScores.length;
  return Math.min(100, Math.round(avg + bonusCount*5));
}
// ========== ROUND DATA ==========
const ROUNDS = [
  // ROUND 1: The Trigger
  {
    name: "The Trigger",
    sourceDay: "Monday",
    sourceDayClass: "day-mon",
    required: true,
    focusPrompt: "Remember the moment from Monday when something first touched Harris's receptor.",
    contextCaption: "From Monday: This diagram shows the moment capsaicin from the chip reached Harris's tongue.",
    buildArena: function(box){
      box.innerHTML = `
        <div class="arena-diagram" style="background:linear-gradient(180deg,#1a0f2e 0%,#12081f 100%);">
          <svg viewBox="0 0 360 220" style="width:100%;max-width:400px;height:auto;">
            <defs>
              <linearGradient id="tongueG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8838f"/><stop offset="100%" stop-color="#c45a6a"/></linearGradient>
              <linearGradient id="membraneG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#553388"/><stop offset="100%" stop-color="#3a2266"/></linearGradient>
              <radialGradient id="capsG"><stop offset="0%" stop-color="#FF6655"/><stop offset="80%" stop-color="#DD2222"/><stop offset="100%" stop-color="#AA1111"/></radialGradient>
            </defs>
            <!-- Tongue body -->
            <ellipse cx="180" cy="195" rx="155" ry="35" fill="url(#tongueG)" opacity="0.85"/>
            <ellipse cx="180" cy="190" rx="145" ry="28" fill="url(#tongueG)"/>
            <!-- Taste bud bumps -->
            <ellipse cx="110" cy="178" rx="12" ry="6" fill="#d4747f"/><ellipse cx="150" cy="175" rx="10" ry="5" fill="#d4747f"/>
            <ellipse cx="200" cy="176" rx="11" ry="5" fill="#d4747f"/><ellipse cx="250" cy="179" rx="10" ry="5" fill="#d4747f"/>
            <!-- Cell membrane band -->
            <rect x="100" y="145" width="160" height="22" rx="4" fill="url(#membraneG)" opacity="0.9"/>
            <!-- Membrane phospholipid circles -->
            <g opacity="0.4">
              <circle cx="110" cy="148" r="3" fill="#7755aa"/><circle cx="120" cy="148" r="3" fill="#7755aa"/>
              <circle cx="130" cy="148" r="3" fill="#7755aa"/><circle cx="140" cy="148" r="3" fill="#7755aa"/>
              <circle cx="150" cy="148" r="3" fill="#7755aa"/><circle cx="160" cy="148" r="3" fill="#7755aa"/>
              <circle cx="170" cy="148" r="3" fill="#7755aa"/><circle cx="180" cy="148" r="3" fill="#7755aa"/>
              <circle cx="190" cy="148" r="3" fill="#7755aa"/><circle cx="200" cy="148" r="3" fill="#7755aa"/>
              <circle cx="210" cy="148" r="3" fill="#7755aa"/><circle cx="220" cy="148" r="3" fill="#7755aa"/>
              <circle cx="230" cy="148" r="3" fill="#7755aa"/><circle cx="240" cy="148" r="3" fill="#7755aa"/>
              <circle cx="250" cy="148" r="3" fill="#7755aa"/>
            </g>
            <text x="180" y="162" text-anchor="middle" fill="#9977cc" font-size="7" font-weight="600" opacity="0.7">CELL MEMBRANE</text>
            <!-- Receptor protein embedded in membrane -->
            <g>
              <path d="M180 130 L168 148 Q162 162 172 164 L188 164 Q198 162 192 148 Z" fill="#8B5CF6" stroke="#B794F6" stroke-width="2"/>
              <!-- Keyhole detail -->
              <circle cx="180" cy="140" r="4" fill="#1a0f2e"/><rect x="178" y="140" width="4" height="8" fill="#1a0f2e"/>
              <text x="180" y="125" text-anchor="middle" fill="#B794F6" font-size="11" font-weight="700">RECEPTOR</text>
            </g>
            <!-- Capsaicin molecule with chemical structure detail -->
            <g id="r1capsaicin">
              <circle cx="95" cy="78" r="16" fill="url(#capsG)" stroke="#FF7766" stroke-width="2.5"/>
              <!-- Bond arms on molecule -->

document.getElementById('resetLevelBtn').addEventListener('click',()=>{
  const rs=gameState.rounds[gameState.currentRound];
  if(!rs||rs.completed)return;
  gameState.processing=false; // Force-clear so reset always works mid-animation
  closeAllOverlays();

  rs.consecutiveFastWrongs=0;

});
// ========== LOAD ROUND ==========
function loadRound(idx){
  if(gameState.processing)return;
  if(idx>=ROUNDS.length){showReceipt();return;}
  gameState.currentRound=idx;
  const rd=ROUNDS[idx];
  const rs=gameState.rounds[idx];
  rs.timeStart=Date.now();
  rs.phaseStartTime=Date.now();
  // Reset _explainDone flag if present (for tile builder rounds on reset)
  if(rd.doPhase && rd.doPhase._explainDone) rd.doPhase._explainDone = false;
  // Clear any pending celebration timeout
  if(celebrationTimeout){clearTimeout(celebrationTimeout);celebrationTimeout=null;}
  // Update UI
  document.getElementById('roundBadge').textContent=`Signal ${idx+1} of 8`;
  document.getElementById('scoreDisplay').textContent=gameState.score;
  document.getElementById('sourceDay').innerHTML=`Source: <span class="${rd.sourceDayClass}">${rd.sourceDay}</span>`;
  document.getElementById('focusPrompt').textContent=rd.focusPrompt;
  document.getElementById('contextCaption').textContent=rd.contextCaption;
  // Reset level button state
  const rlb=document.getElementById('resetLevelBtn');
  rlb.disabled=false;rlb.style.opacity='1';
  // Clear arena
  const box=document.getElementById('arenaBox');
  while(box.firstChild)box.removeChild(box.firstChild);
  // Build arena
  try{rd.buildArena(box);}catch(e){console.error('Arena build error',e);box.innerHTML='<p style="color:var(--text-dim)">Visual loading...</p>';}
  updatePathway();
  // Start DO phase
  setTimeout(()=>{startDoPhase(idx);},800);
}
// ========== DO PHASE ==========
function startDoPhase(idx){
  const rd=ROUNDS[idx];
  const rs=gameState.rounds[idx];
  rs.phaseStartTime=Date.now();
  const iz=document.getElementById('interactionZone');
  if(rd.doPhase.mechanic==='pickTheMatch'){
    renderPickTheMatch(iz,rd,rs,idx);
  } else if(rd.doPhase.mechanic==='coachClickMatch'){
    renderCoachClickMatch(iz,rd,rs,idx);
  } else if(rd.doPhase.mechanic==='whatComesNext'){
    renderWhatComesNext(iz,rd,rs,idx);
  } else if(rd.doPhase.mechanic==='hotspot'){
    renderHotspot(iz,rd,rs,idx);
  } else if(rd.doPhase.mechanic==='coachClick'){
    renderCoachClick(iz,rd,rs,idx);
  } else if(rd.doPhase.mechanic==='steppedClaimBuilder'){
    renderSteppedClaimBuilder(iz,rd,rs,idx);
  } else if(rd.doPhase.mechanic==='tileBuilder'){
    renderTileBuilder(iz,rd,rs,idx);
  } else {
    iz.innerHTML=`<div class="iz-prompt">${rd.doPhase.prompt}</div><p style="color:var(--text-dim);text-align:center;">Mechanic loading...</p>`;
  }
}
// ========== PICK THE MATCH MECHANIC ==========
function renderPickTheMatch(iz,rd,rs,idx){
  let selected=null;
  const dimmed=new Set();
  function render(){
    let html=`<div class="iz-prompt">${rd.doPhase.prompt}</div><div class="options-row">`;
    rd.doPhase.options.forEach(opt=>{
      const cls=['option-card'];
      if(dimmed.has(opt.id)) cls.push('dimmed');
      if(selected===opt.id) cls.push('selected');
      if(idx===0 && opt.correct && dimmed.size===0) cls.push('ghost-glow');
      html+=`<div class="${cls.join(' ')}" data-id="${opt.id}">${opt.text}</div>`;
    });
    html+=`</div><button class="lock-in-btn ${selected?'ready':''}" id="lockInDo">Lock In</button>`;
    html+=`<div id="coachingArea"></div>`;
    iz.innerHTML=html;
    iz.querySelectorAll('.option-card:not(.dimmed)').forEach(card=>{
      card.addEventListener('click',()=>{
        if(gameState.processing)return;
        selected=card.dataset.id;
        render();
      });
    });
    const lockBtn=document.getElementById('lockInDo');
    if(lockBtn && selected){
      lockBtn.addEventListener('click',()=>{
        if(gameState.processing)return;
        gameState.processing=true;
        const opt=rd.doPhase.options.find(o=>o.id===selected);
        const elapsed=Date.now()-rs.phaseStartTime;
        if(opt.correct){
          trackAttempt(rs);
          const card=iz.querySelector(`[data-id="${selected}"]`);
          if(card)card.classList.add('correct');
          playCorrectSound();
          const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?50:rs.hintsUsed>=2?25:35;
          gameState.score+=pts;
          animatePoints(pts);
          document.getElementById('scoreDisplay').textContent=gameState.score;
          setTimeout(()=>{gameState.processing=false;startProvePhase(idx);},800);
        } else {
          rs.wrongAttempts++;
          trackAttempt(rs);
          if(elapsed<2000) rs.consecutiveFastWrongs++;
          else rs.consecutiveFastWrongs=0;
          const card=iz.querySelector(`[data-id="${selected}"]`);
          if(card)card.classList.add('wrong');
          playWrongSound();
          // Fast guess gate
          if(rs.consecutiveFastWrongs>=2){
            rs.consecutiveFastWrongs=0;
            gameState.processing=false;
            showBuffering('Find the label in the picture...',5000,()=>{
              selected=null;dimmed.clear();render();
            });
            return;
          }
          // Check fail-out
          if(rs.wrongAttempts>=3 && rs.hintsUsed>=2){
            rs.failedOut=true;rs.score=50;rs.completed=true;
            rs.timeEnd=Date.now();
            updateStreak(false);
            gameState.processing=false;
            showCelebration("Let's move on — you'll see this idea again.",null,2000);
            setTimeout(()=>{completeRound(idx);},2200);
            return;
          }
          // Show coaching
          dimmed.add(selected);
          selected=null;
          const ca=document.getElementById('coachingArea');
          if(ca) ca.innerHTML=`<div class="coaching-bar">${opt.feedback}</div><button class="try-again-btn" id="tryAgainDo">Try Again</button>`;
          // Auto-trigger hints
          if(rs.wrongAttempts===1 && rs.hintsUsed<1){rs.hintsUsed=1;
            setTimeout(()=>showHintPanel('Hint',rd.hintLadder.hint1.text),500);
          } else if(rs.wrongAttempts>=2 && rs.hintsUsed<2 && rd.hintLadder.stepByStep){
            rs.hintsUsed=2;
            setTimeout(()=>showStepByStep(rd.hintLadder.stepByStep.panels),500);
          }
          gameState.processing=false;
          rs.phaseStartTime=Date.now();
          const ta=document.getElementById('tryAgainDo');
          if(ta)ta.addEventListener('click',()=>{render();});
        }
      });
    }
  }
  render();
}
// ========== COACH-CLICK MATCH MECHANIC (Round 2) ==========
function renderCoachClickMatch(iz,rd,rs,idx){
  const matches=rd.doPhase.matches;
  let currentMatchIdx=0;
  const completed=[];
  let selectedEv=null;
  const usedTerms=new Set();
  function render(){
    if(currentMatchIdx>=matches.length){
      // All matched - DO complete
      const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?50:rs.hintsUsed>=2?25:35;
      gameState.score+=pts;
      animatePoints(pts);
      document.getElementById('scoreDisplay').textContent=gameState.score;
      playCorrectSound();
      setTimeout(()=>{startProvePhase(idx);},800);
      return;
    }
    const m=matches[currentMatchIdx];
    let html=`<div class="iz-prompt">${rd.doPhase.prompt}</div>`;
    html+=`<div class="step-indicator">Match ${currentMatchIdx+1} of ${matches.length}</div>`;
    html+=`<div style="text-align:center;margin-bottom:8px;"><span style="color:var(--gold);font-weight:700;">Tap Evidence ${m.evLabel}</span>, then tap its vocabulary term below.</div>`;
    html+=`<div class="vocab-btn-row">`;
    ['Capsaicin','Receptor','Neuron'].forEach(t=>{
      const cls=['vocab-match-btn'];
      if(usedTerms.has(t))cls.push('used');
      html+=`<div class="${cls.join(' ')}" data-term="${t}">${t}</div>`;
    });
    html+=`</div><div id="coachingArea"></div>`;
    iz.innerHTML=html;
    // Highlight evidence in arena
    const evEl=document.getElementById(m.evId);
    if(evEl){
      evEl.style.border='2px solid var(--gold)';
      evEl.style.boxShadow='0 0 12px rgba(255,215,0,0.4)';
    }
    iz.querySelectorAll('.vocab-match-btn:not(.used)').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(gameState.processing)return;
        const term=btn.dataset.term;
        trackAttempt(rs);
        if(term===m.term){
          // Correct match
          usedTerms.add(term);
          completed.push(m);
          if(evEl){evEl.style.border='2px solid var(--correct-green)';evEl.style.boxShadow='0 0 8px rgba(0,230,118,0.4)';}
          btn.style.borderColor='var(--correct-green)';btn.style.color='var(--correct-green)';
          currentMatchIdx++;
          setTimeout(()=>render(),600);
        } else {
          // Wrong
          rs.wrongAttempts++;
          btn.classList.add('wrong-flash');
          const ca=document.getElementById('coachingArea');
          if(ca)ca.innerHTML=`<div class="coaching-bar">${m.wrongFeedback}</div>`;
          // Hint correct button
          setTimeout(()=>{
            const correctBtn=iz.querySelector(`[data-term="${m.term}"]`);
            if(correctBtn)correctBtn.classList.add('pulse-hint');
          },1000);
          if(rs.wrongAttempts===1&&rs.hintsUsed<1){rs.hintsUsed=1;}
          if(rs.wrongAttempts>=2&&rs.hintsUsed<2){rs.hintsUsed=2;}
          if(checkFailOut(rs,idx,5)) return;
        }
      });
    });
  }
  render();
}
// ========== WHAT COMES NEXT MECHANIC ==========
function renderWhatComesNext(iz,rd,rs,idx){
  if(!rd.doPhase.steps||rd.doPhase.steps.length===0){
    iz.innerHTML='<p style="color:var(--text-dim);text-align:center;">Loading...</p>';
    return;
  }
  let currentStep=0;
  const filledSteps=[];
  function render(){
    if(currentStep>=rd.doPhase.steps.length){
      const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?50:rs.hintsUsed>=2?25:35;
      gameState.score+=pts;animatePoints(pts);
      document.getElementById('scoreDisplay').textContent=gameState.score;
      playCorrectSound();
      setTimeout(()=>{startProvePhase(idx);},800);
      return;
    }
    const step=rd.doPhase.steps[currentStep];
    let html=`<div class="iz-prompt">${rd.doPhase.prompt}</div>`;
    html+=`<div class="chain-display">`;
    step.chainSoFar.forEach((s,i)=>{
      if(i>0) html+=`<span class="chain-arrow">&rarr;</span>`;
      html+=`<span class="chain-slot filled">${s}</span>`;
    });
    html+=`<span class="chain-arrow">&rarr;</span><span class="chain-slot empty">???</span>`;
    html+=`</div>`;
    html+=`<div class="options-row">`;
    const dimmed=new Set();
    step.options.forEach(opt=>{
      const cls=['option-card'];
      if(dimmed.has(opt.id))cls.push('dimmed');
      html+=`<div class="${cls.join(' ')}" data-id="${opt.id}">${opt.text}</div>`;
    });
    html+=`</div><div id="coachingArea"></div>`;
    iz.innerHTML=html;
    iz.querySelectorAll('.option-card:not(.dimmed)').forEach(card=>{
      card.addEventListener('click',()=>{
        if(gameState.processing)return;
        gameState.processing=true;
        trackAttempt(rs);
        const opt=step.options.find(o=>o.id===card.dataset.id);
        if(opt.correct){
          card.classList.add('correct');
          filledSteps.push(opt.text);
          currentStep++;
          setTimeout(()=>{gameState.processing=false;render();},600);
        } else {
          rs.wrongAttempts++;
          card.classList.add('wrong');
          card.classList.add('dimmed');
          const ca=document.getElementById('coachingArea');
          if(ca)ca.innerHTML=`<div class="coaching-bar">${opt.feedback||'Look at the diagram for the next step.'}</div><button class="try-again-btn" onclick="this.parentNode.innerHTML=''">Try Again</button>`;
          if(rs.wrongAttempts===1&&rs.hintsUsed<1){rs.hintsUsed=1;setTimeout(()=>showHintPanel('Hint',rd.hintLadder.hint1.text),500);}
          if(rs.wrongAttempts>=2&&rs.hintsUsed<2){rs.hintsUsed=2;setTimeout(()=>showStepByStep(rd.hintLadder.stepByStep.panels),500);}
          gameState.processing=false;
          if(checkFailOut(rs,idx,5)) return;
        }
      });
    });
  }
  render();
}
// ========== HOTSPOT MECHANIC ==========
function renderHotspot(iz,rd,rs,idx){
  if(!rd.doPhase.hotspots){
    iz.innerHTML='<p style="color:var(--text-dim);text-align:center;">Loading...</p>';
    return;
  }
  iz.innerHTML=`<div class="iz-prompt">${rd.doPhase.prompt}</div><div id="coachingArea"></div>`;
  let hotspotDone=false; // Guard: prevents arena handlers from firing after DO completes
  // Attach click handlers to arena elements
  rd.doPhase.hotspots.forEach(hs=>{
    const el=document.getElementById(hs.id);
    if(!el)return;
    el.style.cursor='pointer';
    el.addEventListener('click',function handler(){
      if(gameState.processing||hotspotDone)return;
      trackAttempt(rs);
      if(hs.correct){
        hotspotDone=true;
        gameState.processing=true;
        el.style.border='3px solid var(--correct-green)';
        el.style.boxShadow='0 0 15px rgba(0,230,118,0.5)';
        playCorrectSound();
        const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?50:rs.hintsUsed>=2?25:35;
        gameState.score+=pts;animatePoints(pts);
        document.getElementById('scoreDisplay').textContent=gameState.score;
        setTimeout(()=>{gameState.processing=false;startProvePhase(idx);},800);
      } else {
        rs.wrongAttempts++;
        playWrongSound();
        el.style.border='3px solid var(--wrong-red)';
        setTimeout(()=>{el.style.border='';},800);
        const ca=document.getElementById('coachingArea');
        if(ca)ca.innerHTML=`<div class="coaching-bar">${hs.feedback}</div>`;
        if(rs.wrongAttempts>=3){
          const correctHs=rd.doPhase.hotspots.find(h=>h.correct);
          if(correctHs){const correctEl=document.getElementById(correctHs.id);
          if(correctEl){correctEl.style.border='2px solid var(--gold)';correctEl.style.boxShadow='0 0 12px rgba(255,215,0,0.5)';}}
        }
        if(rs.wrongAttempts===1&&rs.hintsUsed<1){rs.hintsUsed=1;setTimeout(()=>showHintPanel('Hint',rd.hintLadder.hint1.text),500);}
        if(rs.wrongAttempts>=2&&rs.hintsUsed<2){rs.hintsUsed=2;setTimeout(()=>showStepByStep(rd.hintLadder.stepByStep.panels),500);}
        if(checkFailOut(rs,idx,6)){hotspotDone=true;return;}
      }
    });
  });
}

// ========== STEPPED CLAIM BUILDER ==========
function renderSteppedClaimBuilder(iz,rd,rs,idx){
  if(!rd.doPhase.steps){
    iz.innerHTML='<p style="color:var(--text-dim);text-align:center;">Loading...</p>';
    return;
  }
  let currentStep=0;
  function render(){
    if(currentStep>=rd.doPhase.steps.length){
      const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?50:rs.hintsUsed>=2?25:35;
      gameState.score+=pts;animatePoints(pts);
      document.getElementById('scoreDisplay').textContent=gameState.score;
      playCorrectSound();
      setTimeout(()=>{startProvePhase(idx);},800);
      return;
    }
    const step=rd.doPhase.steps[currentStep];
    let html=`<div class="step-indicator">STEP ${currentStep+1} of ${rd.doPhase.steps.length}</div>`;
    html+=`<div class="iz-prompt">${step.prompt}</div>`;
    html+=`<div class="options-row">`;
    step.options.forEach(opt=>{
      html+=`<div class="option-card" data-id="${opt.id}">${opt.text}</div>`;
    });
    html+=`</div><div id="coachingArea"></div>`;
    iz.innerHTML=html;
    iz.querySelectorAll('.option-card').forEach(card=>{
      card.addEventListener('click',()=>{
        if(gameState.processing)return;
        gameState.processing=true;
        trackAttempt(rs);
        const opt=step.options.find(o=>o.id===card.dataset.id);
        if(opt.correct){
          card.classList.add('correct');
          currentStep++;
          setTimeout(()=>{gameState.processing=false;render();},600);
        } else {
          rs.wrongAttempts++;
          card.classList.add('wrong');
          const ca=document.getElementById('coachingArea');
          if(ca)ca.innerHTML=`<div class="coaching-bar">${opt.feedback||step.wrongFeedback||'Look at the visual for a clue.'}</div><button class="try-again-btn" id="trySCB">Try Again</button>`;
          if(rs.wrongAttempts===1&&rs.hintsUsed<1){rs.hintsUsed=1;}
          if(rs.wrongAttempts>=2&&rs.hintsUsed<2){rs.hintsUsed=2;}
          gameState.processing=false;
          if(checkFailOut(rs,idx,5)) return;
          const ta=document.getElementById('trySCB');
          if(ta)ta.addEventListener('click',()=>{render();});
        }
      });
    });
  }
  render();
}
// ========== TILE BUILDER ==========
function renderTileBuilder(iz,rd,rs,idx){
  if(!rd.doPhase.tiles){
    iz.innerHTML='<p style="color:var(--text-dim);text-align:center;">Loading...</p>';
    return;
  }
  const placed=[];
  const correctOrder=rd.doPhase.correctOrder;
  function render(){
    if(placed.length>=correctOrder.length){
      // All placed correctly, now show explain phase if exists
      if(rd.doPhase.explainPhase && !rd.doPhase._explainDone){
        renderExplainPhase(iz,rd,rs,idx);
        return;
      }
      const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?50:rs.hintsUsed>=2?25:35;
      gameState.score+=pts;animatePoints(pts);
      document.getElementById('scoreDisplay').textContent=gameState.score;
      playCorrectSound();
      setTimeout(()=>{startProvePhase(idx);},800);
      return;
    }
    let html=`<div class="iz-prompt">${rd.doPhase.prompt}</div>`;
    // Show placed chain
    html+=`<div class="placed-chain">`;
    placed.forEach((t,i)=>{
      if(i>0)html+=`<span class="placed-arrow">&rarr;</span>`;
      html+=`<span class="placed-tile">${t.short}</span>`;
    });
    if(placed.length>0 && placed.length<correctOrder.length) html+=`<span class="placed-arrow">&rarr;</span><span class="chain-slot empty">???</span>`;
    if(placed.length===0) html+=`<span class="chain-slot empty">Tap first step</span>`;
    html+=`</div>`;
    // Tile pool
    html+=`<div class="tile-pool">`;
    rd.doPhase.tiles.forEach(tile=>{
      const isPlaced=placed.some(p=>p.id===tile.id);
      html+=`<div class="tile ${isPlaced?'placed':''}" data-id="${tile.id}">${tile.icon||''} ${tile.text}</div>`;
    });
    html+=`</div><div id="coachingArea"></div>`;
    iz.innerHTML=html;
    iz.querySelectorAll('.tile:not(.placed)').forEach(t=>{
      t.addEventListener('click',()=>{
        if(gameState.processing)return;
        trackAttempt(rs);
        const tileId=t.dataset.id;
        const expectedId=correctOrder[placed.length];
        if(tileId===expectedId){
          placed.push(rd.doPhase.tiles.find(x=>x.id===tileId));
          render();
        } else {
          rs.wrongAttempts++;
          t.classList.add('bounce-back');
          const ca=document.getElementById('coachingArea');
          if(ca)ca.innerHTML=`<div class="coaching-bar">Check the order — what gets activated first?</div>`;
          if(rs.wrongAttempts===1&&rs.hintsUsed<1){rs.hintsUsed=1;setTimeout(()=>showHintPanel('Hint',rd.hintLadder.hint1.text),500);}
          if(rs.wrongAttempts>=2&&rs.hintsUsed<2){rs.hintsUsed=2;setTimeout(()=>showStepByStep(rd.hintLadder.stepByStep.panels),500);}
          if(checkFailOut(rs,idx,6)) return;
        }
      });
    });
  }
  render();
}
function renderExplainPhase(iz,rd,rs,idx){
  const ep=rd.doPhase.explainPhase;
  rd.doPhase._explainDone=true;
  let html=`<div class="iz-prompt">${ep.prompt}</div><div class="options-row">`;
  ep.options.forEach(opt=>{
    html+=`<div class="explain-card option-card" data-id="${opt.id}">${opt.text}</div>`;
  });
  html+=`</div><div id="coachingArea"></div>`;
  iz.innerHTML=html;
  iz.querySelectorAll('.option-card').forEach(card=>{
    card.addEventListener('click',()=>{
      if(gameState.processing)return;
      gameState.processing=true;
      trackAttempt(rs);
      const opt=ep.options.find(o=>o.id===card.dataset.id);
      if(opt.correct){
        card.classList.add('correct');
        playCorrectSound();
        const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?25:15;
        gameState.score+=pts;animatePoints(pts);
        document.getElementById('scoreDisplay').textContent=gameState.score;
        setTimeout(()=>{gameState.processing=false;startProvePhase(idx);},800);
      } else {
        rs.wrongAttempts++;
        card.classList.add('wrong');card.classList.add('dimmed');
        const ca=document.getElementById('coachingArea');
        if(ca)ca.innerHTML=`<div class="coaching-bar">${opt.feedback}</div><button class="try-again-btn" onclick="this.parentNode.innerHTML=''">Try Again</button>`;
        gameState.processing=false;
        if(checkFailOut(rs,idx,5)) return;
      }
    });
  });
}
// ========== PROVE PHASE ==========
function startProvePhase(idx){
  const rd=ROUNDS[idx];
  const rs=gameState.rounds[idx];
  rs.phaseStartTime=Date.now();
  const iz=document.getElementById('interactionZone');
  const dimmed=new Set();
  let selected=null;
  function render(){
    let html=`<div class="iz-prompt">${rd.provePhase.question}</div><div class="options-row">`;
    rd.provePhase.options.forEach(opt=>{
      const cls=['option-card'];
      if(dimmed.has(opt.id))cls.push('dimmed');
      if(selected===opt.id)cls.push('selected');
      html+=`<div class="${cls.join(' ')}" data-id="${opt.id}">${opt.text}</div>`;
    });
    html+=`</div><button class="lock-in-btn ${selected?'ready':''}" id="lockInProve">Lock In</button><div id="coachingAreaProve"></div>`;
    iz.innerHTML=html;
    iz.querySelectorAll('.option-card:not(.dimmed)').forEach(card=>{
      card.addEventListener('click',()=>{
        if(gameState.processing)return;
        selected=card.dataset.id;
        render();
      });
    });
    const lockBtn=document.getElementById('lockInProve');
    if(lockBtn && selected){
      lockBtn.addEventListener('click',()=>{
        if(gameState.processing)return;
        gameState.processing=true;
        const opt=rd.provePhase.options.find(o=>o.id===selected);
        if(opt.correct){
          trackAttempt(rs);
          const card=iz.querySelector(`[data-id="${selected}"]`);
          if(card)card.classList.add('correct');
          playCorrectSound();
          const pts=rs.hintsUsed===0&&rs.wrongAttempts===0?50:rs.hintsUsed>=2?25:35;
          gameState.score+=pts;animatePoints(pts);
          document.getElementById('scoreDisplay').textContent=gameState.score;
          // Score round
          rs.score=scoreForRound(rs);
          rs.completed=true;
          rs.timeEnd=Date.now();
          updateStreak(true);
          setTimeout(()=>{gameState.processing=false;completeRound(idx);},800);
        } else {
          rs.wrongAttempts++;
          trackAttempt(rs);
          const card=iz.querySelector(`[data-id="${selected}"]`);
          if(card)card.classList.add('wrong');
          playWrongSound();
          dimmed.add(selected);selected=null;
          // Check fail-out
          if(rs.wrongAttempts>=4 && rs.hintsUsed>=2){
            rs.failedOut=true;rs.score=50;rs.completed=true;
            rs.timeEnd=Date.now();
            updateStreak(false);
            gameState.processing=false;
            showCelebration("Let's move on — you'll see this idea again.",null,2000);
            setTimeout(()=>{completeRound(idx);},2200);
            return;
          }
          const ca=document.getElementById('coachingAreaProve');
          if(ca)ca.innerHTML=`<div class="coaching-bar">${opt.feedback}</div><button class="try-again-btn" id="tryAgainProve">Try Again</button>`;
          gameState.processing=false;
          const ta=document.getElementById('tryAgainProve');
          if(ta)ta.addEventListener('click',()=>{render();});
        }
      });
    }
  }
  render();
}
// ========== COMPLETE ROUND ==========
function completeRound(idx){
  if(gameState.processing)return;
  updatePathway();
  const rd=ROUNDS[idx];
  const rs=gameState.rounds[idx];
  // Disable reset
  const rlb=document.getElementById('resetLevelBtn');
  rlb.disabled=true;rlb.style.opacity='0.4';
  // Check affirmation (first try)
  const isFirstTry = rs.wrongAttempts===0 && rs.hintsUsed===0;
  // Check milestones
  const completedCount = gameState.rounds.filter(r=>r.completed).length;
  const reqCompleted = gameState.rounds.filter((r,i)=>r.completed && ROUNDS[i].required).length;
  const bonusCompleted = gameState.rounds.filter((r,i)=>r.completed && !ROUNDS[i].required).length;
  // Check required complete
  if(reqCompleted>=6 && !gameState.requiredCompleteShown){
    gameState.requiredCompleteShown=true;
    gameState.requiredComplete=true;
    if(bonusCompleted<2){
      showCelebration("You did it! 2 Bonus Rounds — dare to try?",getAffirmation(),null,[
        {label:'Keep Going',cls:'btn-keep',action:'keepGoing'},
        {label:'See Score',cls:'btn-score',action:'seeScore'}
      ]);
      return;
    }
  }
  // Check bonus complete
  if(bonusCompleted>=2 && !gameState.bonusCompleteShown){
    gameState.bonusCompleteShown=true;
    gameState.bonusComplete=true;
    showCelebration("BOSS DEFEATED!",getAffirmation(),3000);
    setTimeout(()=>{showReceipt();},3500);
    return;
  }
  // Milestone celebration every 2 rounds
  if(completedCount>0 && completedCount%2===0){
    const txt = isFirstTry ? getAffirmation() : "Nice!";
    showCelebration(txt,null,1000);
    setTimeout(()=>{advanceRound();},1200);
  } else {
    if(isFirstTry){
      // Brief affirmation
      showCelebration(getAffirmation(),null,1000);
      setTimeout(()=>{advanceRound();},1200);
    } else {
      setTimeout(()=>{advanceRound();},500);
    }
  }
}
function advanceRound(){
  if(gameState.processing)return;
  const next=gameState.currentRound+1;
  if(next>=ROUNDS.length){
    showReceipt();
  } else {
    loadRound(next);
  }
}
// ========== RECEIPT ==========
function showReceipt(){
  if(gameState.receiptRendered)return;
  gameState.receiptRendered=true;
  closeAllOverlays();
  // Hide game UI
  document.getElementById('topBar').style.display='none';
  document.getElementById('pathwayTracker').style.display='none';
  document.getElementById('mainArea').style.display='none';
  document.getElementById('bottomBar').style.display='none';
  const overall=calcOverall();
  const totalTime=Math.round((Date.now()-gameState.totalStartTime)/1000);
  const mins=Math.floor(totalTime/60);
  const secs=totalTime%60;
  const decoded=gameState.rounds.filter(r=>r.completed).length;
  let colorCls='green';
  let label='Mastery';
  if(overall<85){colorCls='yellow';label='Approaching Mastery';}
  if(overall<70){colorCls='red';label='Needs More Practice';}
  // Pathway nodes
  let pNodes='';
  for(let i=0;i<8;i++){
    const rs=gameState.rounds[i];
    const cls=rs.completed?(rs.score>=60?'g':'y'):'x';
    pNodes+=`<div class="pc-node ${cls}">${i+1}</div>`;
  }
  // Detail table rows
  let rows='';
  ROUNDS.forEach((rd,i)=>{
    const rs=gameState.rounds[i];
    const t=rs.completed?Math.round((rs.timeEnd-rs.timeStart)/1000):0;
    const tm=Math.floor(t/60)+':'+String(t%60).padStart(2,'0');
    const bonusCls=rd.required?'':'bonus-row';
    const star=rd.required?'':'&#x2B50; ';
    rows+=`<tr class="${bonusCls}"><td>${star}${i+1}</td><td>${rd.name}</td><td>${rd.sourceDay}</td><td style="color:${rs.score>=85?'var(--correct-green)':rs.score>=70?'var(--gold)':'var(--wrong-red)'}">${rs.completed?rs.score+'%':'—'}</td><td>${rs.completed?rs.attempts:'—'}</td><td>${rs.completed?tm:'—'}</td></tr>`;
  });
  const reqComp=gameState.rounds.filter((r,i)=>r.completed&&ROUNDS[i].required).length>=6;
  const bonComp=gameState.rounds.filter((r,i)=>r.completed&&!ROUNDS[i].required).length>=2;
  let badgeCls='req';let badgeText='Required Complete';
  if(bonComp){badgeCls='bonus';badgeText='Full Clear — Boss Defeated!';}
  else if(!reqComp){badgeCls='req';badgeText='In Progress';}
  const receiptEl=document.getElementById('receiptScreen');
  receiptEl.style.display='block';
  receiptEl.innerHTML=`
    <div class="receipt-inner">
      <div class="receipt-header">
        <h2>Mr. Jawad's Simulations</h2>
        <h3>${TOPIC} — Thursday Score Report</h3>
      </div>
      <div class="receipt-name">
        <input type="text" id="receiptName" value="${escHtml(gameState.studentName)}">
        <button id="lockNameBtn">Lock</button>
      </div>
      <div class="pathway-completion">${pNodes}</div>
      <div class="signals-decoded">SIGNALS DECODED: ${decoded} of 8</div>
      <div class="overall-pct ${colorCls}">${overall}%</div>
      <div class="mastery-label">${label}</div>
      <div class="streak-record">Best Streak: ${gameState.maxStreak}</div>
      <button class="detail-toggle" id="detailToggle">See Details</button>
      <table class="detail-table" id="detailTable">
        <thead><tr><th>#</th><th>Round</th><th>Source</th><th>Score</th><th>Tries</th><th>Time</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="total-time">Total Time: ${mins}:${String(secs).padStart(2,'0')}</div>
      <div class="completion-badge ${badgeCls}">${badgeText}</div>
      <div class="screenshot-note">Take a screenshot and upload to Google Classroom</div>
      <div class="receipt-actions">
        <button class="btn-print" id="printBtn">&#x1F5A8;&#xFE0F; Print</button>
        <button class="btn-startover" id="startOverBtn">Start Over</button>
      </div>
    </div>`;
  document.getElementById('lockNameBtn').addEventListener('click',function(){
    const inp=document.getElementById('receiptName');
    inp.disabled=true;this.textContent='Locked';this.disabled=true;
    gameState.studentName=inp.value.trim();
  });
  document.getElementById('detailToggle').addEventListener('click',function(){
    const dt=document.getElementById('detailTable');
    dt.classList.toggle('open');
    this.textContent=dt.classList.contains('open')?'Hide Details':'See Details';
  });
  document.getElementById('printBtn').addEventListener('click',()=>{try{window.print();}catch(e){}});
  document.getElementById('startOverBtn').addEventListener('click',()=>{
    closeAllOverlays();
    const ov=document.createElement('div');ov.className='confirm-overlay';
    ov.innerHTML=`<div class="confirm-box"><p>Start over? This will erase all progress.</p><div class="btn-row"><button style="background:var(--wrong-red);color:#fff;" id="confirmYes">Yes, Start Over</button><button style="background:rgba(100,80,160,0.4);color:var(--text);" id="confirmNo">Cancel</button></div></div>`;
    document.body.appendChild(ov);
    document.getElementById('confirmYes').addEventListener('click',()=>{location.reload();});
    document.getElementById('confirmNo').addEventListener('click',()=>{ov.remove();});
  });
}
// ========== VISIBILITY CHANGE ==========
let ambientInterval=null;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    if(ambientInterval){clearInterval(ambientInterval);ambientInterval=null;}
  }
});
