<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mr. Jawad Unit Review: Weather Patterns — Precipitation</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a2e;--bg2:#16213e;--text:#e0e0e0;--text-bright:#ffffff;
--room1:#1e90ff;--room1-accent:#00d4ff;--room1-bg:rgba(30,144,255,.08);
--room2:#00e676;--room2-accent:#76ff03;--room2-bg:rgba(0,230,118,.08);
--room3:#ff6d00;--room3-accent:#ffab00;--room3-bg:rgba(255,109,0,.08);
--teal:#00bcd4;--success:#4caf50;--error:#f44336;--warn:#ff9800;
--current-color:#1e90ff;--current-accent:#00d4ff;--current-bg:rgba(30,144,255,.08);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* START SCREEN */
#startScreen{justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0d0d1a 100%)}
.start-brand{font-size:clamp(10px,1.4vw,14px);letter-spacing:4px;text-transform:uppercase;color:var(--teal);margin-bottom:12px;font-weight:600}
.start-title{font-size:clamp(28px,5vw,52px);font-weight:700;color:var(--text-bright);text-shadow:0 0 30px rgba(0,188,212,.4);margin-bottom:8px;text-align:center;line-height:1.2}
.start-divider{width:80px;height:2px;background:var(--teal);margin:12px auto;box-shadow:0 0 10px var(--teal)}
.start-subtitle{font-size:clamp(14px,2vw,20px);color:var(--text);margin-bottom:32px}
.start-btn{padding:16px 48px;font-size:20px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--teal),#0097a7);border-radius:12px;box-shadow:0 0 20px rgba(0,188,212,.3);transition:all .3s ease}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(0,188,212,.5)}
.start-footer{position:absolute;bottom:24px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3)}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,.4);min-height:48px;flex-shrink:0;position:relative;z-index:10}
.room-label{font-size:clamp(14px,1.8vw,18px);font-weight:600;color:var(--current-color);display:flex;align-items:center;gap:8px}
.room-progress{font-size:13px;color:var(--text);opacity:.7}
.puzzles-cleared{margin-left:auto;font-size:14px;color:var(--text-bright);display:flex;align-items:center;gap:6px}
.streak-icon{font-size:18px;opacity:0;transition:opacity .3s;margin-left:8px}
.streak-icon.active{opacity:1;animation:flicker 1s infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.6}}
.cleared-count{transition:transform .2s}
.cleared-count.pulse{animation:countPulse .3s ease}
@keyframes countPulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* CODE VAULT */
.code-vault{position:fixed;top:8px;right:8px;z-index:20;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:8px 10px;backdrop-filter:blur(4px);min-width:140px}
.vault-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:6px}
.vault-slots{display:flex;flex-direction:column;gap:4px}
.vault-row{display:flex;align-items:center;gap:4px;font-size:12px}
.vault-room-icon{width:20px;text-align:center}
.vault-digit{width:22px;height:26px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:4px;font-weight:700;font-size:14px;color:rgba(255,255,255,.3);transition:all .4s ease}
.vault-digit.revealed{color:var(--text-bright);border-color:var(--current-color);background:rgba(255,255,255,.1);animation:vaultReveal .5s ease}
.vault-digit.room-done{box-shadow:0 0 8px var(--current-color)}
@keyframes vaultReveal{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}

/* MISSION LINE */
.mission-line{text-align:center;padding:8px 16px;font-size:clamp(13px,1.6vw,16px);color:var(--text);opacity:.8;font-style:italic;flex-shrink:0}

/* PUZZLE AREA */
.puzzle-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px;overflow-y:auto;position:relative}
.puzzle-instruction{font-size:clamp(12px,1.4vw,15px);color:rgba(255,255,255,.6);margin-bottom:10px;text-align:center}
.puzzle-title{font-size:clamp(18px,2.5vw,26px);font-weight:700;color:var(--text-bright);margin-bottom:8px;text-align:center}
.micro-progress{font-size:13px;color:var(--current-color);margin-bottom:10px;font-weight:600}

/* BOTTOM BAR */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;min-height:52px;flex-shrink:0;background:rgba(0,0,0,.3)}
.scanner-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-size:14px;transition:all .3s;animation:scanPulse 2s infinite}
.scanner-btn:hover{background:rgba(255,255,255,.15)}
@keyframes scanPulse{0%,100%{box-shadow:0 0 5px rgba(255,255,255,.1)}50%{box-shadow:0 0 15px var(--current-color)}}
.progress-dots{display:flex;gap:8px}
.progress-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);transition:all .3s}
.progress-dot.filled{background:var(--current-color);box-shadow:0 0 8px var(--current-color);border-color:var(--current-color)}

/* CARDS */
.card{padding:14px 20px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:10px;color:var(--text-bright);font-size:clamp(14px,1.8vw,18px);cursor:pointer;transition:all .3s ease;min-height:48px;min-width:48px;display:flex;align-items:center;justify-content:center;text-align:center;user-select:none;-webkit-user-select:none;position:relative}
.card:hover{border-color:var(--current-color);box-shadow:0 0 12px rgba(255,255,255,.1)}
.card.selected{border-color:var(--current-accent);box-shadow:0 0 20px var(--current-color);transform:scale(1.05);background:rgba(255,255,255,.12)}
.card.selected::after{content:'▶ SELECTED';position:absolute;top:-10px;right:-10px;background:var(--current-color);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.card.correct{border-color:var(--success)!important;box-shadow:0 0 20px var(--success)!important;background:rgba(76,175,80,.15)!important}
.card.correct::before{content:'✔';position:absolute;top:4px;right:8px;color:var(--success);font-size:16px;font-weight:700}
.card.wrong{border-color:var(--error)!important;box-shadow:0 0 15px var(--error)!important;background:rgba(244,67,54,.1)!important;animation:wrongShake .4s ease}
.card.wrong::before{content:'✖';position:absolute;top:4px;right:8px;color:var(--error);font-size:16px;font-weight:700}
.card.dimmed{opacity:.35;pointer-events:none;border-style:dashed}
.card.locked{pointer-events:none;border-color:var(--success);background:rgba(76,175,80,.1);box-shadow:0 0 10px var(--success)}
.card.locked::before{content:'✔';position:absolute;top:4px;right:8px;color:var(--success);font-size:14px}
.card.override-highlight{border-color:var(--warn)!important;box-shadow:0 0 25px var(--warn)!important;animation:overridePulse 1s infinite;background:rgba(255,152,0,.15)!important}
@keyframes overridePulse{0%,100%{box-shadow:0 0 15px var(--warn)}50%{box-shadow:0 0 30px var(--warn)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* QUICK FIRE */
.qf-btn{padding:16px 40px;font-size:clamp(16px,2.2vw,22px);font-weight:700;border-radius:10px;min-width:140px;min-height:56px;transition:all .2s}
.qf-confirm{background:rgba(76,175,80,.15);border:2px solid var(--success);color:var(--success)}
.qf-confirm:hover{background:rgba(76,175,80,.25);box-shadow:0 0 15px var(--success)}
.qf-deny{background:rgba(244,67,54,.15);border:2px solid var(--error);color:var(--error)}
.qf-deny:hover{background:rgba(244,67,54,.25);box-shadow:0 0 15px var(--error)}
.qf-flash-correct{background:rgba(76,175,80,.3)!important;box-shadow:0 0 20px var(--success)}
.qf-flash-wrong{background:rgba(244,67,54,.3)!important;box-shadow:0 0 20px var(--error)}
.qf-progress{display:flex;gap:6px;margin-top:12px}
.qf-pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);transition:all .3s}
.qf-pip.done-correct{background:var(--success);border-color:var(--success);box-shadow:0 0 6px var(--success)}
.qf-pip.done-wrong{background:var(--error);border-color:var(--error)}
.qf-pip.current{border-color:var(--current-color);box-shadow:0 0 8px var(--current-color)}

/* SCANNER OVERLAY */
.scanner-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:40;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.scanner-overlay.active{display:flex}
.scanner-text{font-size:clamp(14px,1.8vw,18px);color:var(--text-bright);max-width:500px;line-height:1.6;margin-bottom:20px}
.scanner-dismiss{padding:10px 24px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:var(--text);font-size:14px;transition:all .3s}
.scanner-dismiss:hover{background:rgba(255,255,255,.2)}

/* OVERLAYS */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.overlay.active{display:flex}

/* DIGIT REVEAL */
.digit-reveal-overlay{background:rgba(0,0,0,.88);z-index:35}
.digit-reveal-num{font-size:clamp(60px,12vw,100px);font-weight:700;color:var(--current-color);text-shadow:0 0 40px var(--current-color);animation:digitReveal .8s ease}
.digit-reveal-label{font-size:18px;color:var(--text);margin-top:8px}
.digit-continue{margin-top:20px;padding:12px 32px;background:var(--current-color);color:#fff;font-size:16px;font-weight:600;border-radius:8px;transition:all .3s}
@keyframes digitReveal{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* CODE ENTRY */
.code-entry-overlay{background:rgba(10,10,30,.95);z-index:32}
.code-digits-display{font-size:14px;color:var(--current-accent);margin-bottom:16px}
.code-input-row{display:flex;gap:10px;margin-bottom:16px}
.code-slot{width:56px;height:64px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--text-bright);transition:all .3s}
.code-slot.filled{border-color:var(--current-color);box-shadow:0 0 10px var(--current-color)}
.code-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px}
.numpad-btn{width:60px;height:52px;font-size:22px;font-weight:600;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text-bright);transition:all .2s}
.numpad-btn:hover{background:rgba(255,255,255,.15);box-shadow:0 0 8px var(--current-color)}
.code-clear{grid-column:span 2;width:100%;padding:12px;background:rgba(244,67,54,.15);border:1px solid var(--error);border-radius:8px;color:var(--error);font-size:14px;font-weight:600;transition:all .2s}
.code-clear:hover{background:rgba(244,67,54,.25)}

/* DOOR TRANSITION */
.door-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.95);opacity:0;pointer-events:none}
.door-overlay.animate{animation:doorAnim 1.2s ease-in-out forwards}
.door-box{width:200px;height:280px;border:3px solid var(--current-color);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.door-lock{position:absolute;bottom:20px;width:30px;height:30px;background:var(--current-color);border-radius:50%;box-shadow:0 0 20px var(--current-color)}
@keyframes doorAnim{0%{opacity:0}20%{opacity:1}30%{opacity:1}60%{opacity:1;transform:translateX(0)}90%{opacity:1;transform:translateX(-120vw)}100%{opacity:0;transform:translateX(-120vw)}}

/* PASS THE LAPTOP */
.pass-laptop-overlay{background:rgba(0,0,0,.95);z-index:45}
.pass-text{font-size:clamp(28px,5vw,48px);font-weight:700;color:var(--text-bright);margin-bottom:8px}
.pass-emoji{font-size:40px;margin-bottom:20px}
.pass-ready{padding:14px 40px;font-size:18px;font-weight:600;background:var(--current-color);color:#fff;border-radius:10px;transition:all .3s;box-shadow:0 0 20px var(--current-color)}
.pass-ready:hover{transform:scale(1.05)}

/* FINAL LOCK */
.fl-container{display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.fl-col{display:flex;flex-direction:column;gap:10px}
.fl-card{padding:12px 20px;min-width:160px}
.fl-matched{opacity:.6;pointer-events:none;border-color:var(--success);background:rgba(76,175,80,.1)}

/* ESCAPE REPORT */
#escapeReport{background:radial-gradient(ellipse at center,#1a1a3e,#0d0d1a);overflow-y:auto}
.report-header{font-size:clamp(32px,6vw,56px);font-weight:700;color:var(--text-bright);text-shadow:0 0 40px var(--teal);margin:20px 0;animation:reportGlow 2s ease infinite alternate}
@keyframes reportGlow{0%{text-shadow:0 0 20px var(--teal)}100%{text-shadow:0 0 50px var(--teal)}}
.report-brand{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--teal);margin-top:16px}
.report-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 24px;margin:8px 0;max-width:480px;width:90%}
.report-row{display:flex;justify-content:space-between;padding:6px 0;font-size:15px}
.report-label{color:var(--text)}
.report-value{color:var(--text-bright);font-weight:600}
.report-stars{font-size:32px;margin:12px 0}
.report-star{opacity:.2;transition:opacity .5s}
.report-star.earned{opacity:1;animation:starFill .5s ease}
@keyframes starFill{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
.report-badges{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.badge{padding:8px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px}
.badge.earned{border-color:var(--teal);color:var(--text-bright);box-shadow:0 0 10px rgba(0,188,212,.2);animation:badgeUnlock .5s ease}
@keyframes badgeUnlock{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.report-btns{display:flex;gap:12px;margin:16px 0 24px}
.report-btn{padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;transition:all .3s}
.btn-play-again{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--text-bright)}
.btn-play-again:hover{background:rgba(255,255,255,.2)}
.btn-copy{background:var(--teal);color:#fff}
.btn-copy:hover{box-shadow:0 0 15px var(--teal)}

/* PARTICLES */
.particle{position:fixed;pointer-events:none;z-index:60;border-radius:3px;animation:particleBurst .8s ease-out forwards}
@keyframes particleBurst{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

/* CONFETTI */
.confetti{position:fixed;pointer-events:none;z-index:60;width:8px;height:8px;animation:confettiFall 3s ease-in forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* SCANNING PREVIEW */
.scan-preview{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);z-index:15;animation:scanFade 3s ease forwards}
.scan-preview-content{border:2px solid var(--current-color);border-radius:12px;padding:24px;box-shadow:0 0 30px var(--current-color);text-align:center;max-width:400px}
.scan-label{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--current-color);margin-bottom:12px}
@keyframes scanFade{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}

/* SPOT THE DIFFERENCE */
.std-container{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.std-panel{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:16px;min-width:260px;max-width:320px;position:relative}
.std-panel-label{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--bg);padding:2px 12px;font-size:12px;font-weight:600;color:var(--current-color);border:1px solid var(--current-color);border-radius:4px}
.mountain-scene{width:100%;height:180px;position:relative;overflow:hidden;border-radius:8px;margin-top:8px}
.mountain-bg{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:130px solid transparent;border-right:130px solid transparent;border-bottom:160px solid rgba(255,255,255,.08)}
.mountain-label{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.4);font-weight:600}
.wind-arrow{position:absolute;top:30px;font-size:20px;color:var(--current-accent);animation:windFlow 2s infinite}
@keyframes windFlow{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
.side-label{position:absolute;bottom:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.side-left{left:10px}
.side-right{right:10px}
.weather-icon{position:absolute;font-size:28px;cursor:default}
.weather-icon.tappable{cursor:pointer;transition:all .3s}
.weather-icon.tappable:hover{transform:scale(1.2);filter:brightness(1.3)}
.weather-icon.error-found{color:var(--error);animation:wrongShake .4s}
.weather-icon.correct-overlay{color:var(--success);animation:digitReveal .5s}
.weather-icon.tried{opacity:.4}

/* GAUGES */
.gauge-panel{display:flex;gap:24px;justify-content:center;align-items:flex-end;margin-bottom:16px}
.gauge{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-bar-container{width:48px;height:140px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;overflow:hidden;position:relative;display:flex;align-items:flex-end}
.gauge-fill{width:100%;border-radius:0 0 6px 6px;transition:height .8s ease;position:relative}
.gauge-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.4);border-radius:2px}
.gauge-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text)}
.gauge-reading{font-size:13px;font-weight:700;color:var(--current-color)}

/* TUTORIAL */
.tutorial-skip{position:absolute;top:12px;right:12px;padding:8px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:var(--text);font-size:13px;z-index:5;transition:all .3s}
.tutorial-skip:hover{background:rgba(255,255,255,.15)}

/* CHAIN DISPLAY */
.chain{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.chain-box{padding:10px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:clamp(13px,1.6vw,16px);color:var(--text-bright)}
.chain-arrow{font-size:20px;color:var(--current-color)}
.chain-mystery{border-color:var(--current-color);box-shadow:0 0 15px var(--current-color);color:var(--current-accent);font-weight:700;animation:mysteryPulse 1.5s infinite}
.chain-mystery.solved{animation:none;border-color:var(--success);box-shadow:0 0 15px var(--success);color:var(--success)}
@keyframes mysteryPulse{0%,100%{box-shadow:0 0 10px var(--current-color)}50%{box-shadow:0 0 25px var(--current-color)}}

/* OVERRIDE MSG */
.override-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(255,152,0,.15);border:1px solid var(--warn);color:var(--warn);padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:36;animation:overrideFadeIn .3s ease}
@keyframes overrideFadeIn{0%{opacity:0;transform:translateX(-50%) translateY(10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ROOM BG TINT */
.room-bg-tint{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.5}

/* RESPONSIVE */
@media(max-width:600px){
.fl-container{gap:20px}
.std-container{flex-direction:column;align-items:center}
.code-vault{min-width:120px;padding:6px 8px}
}
</style>
</head>
<body>

<!-- CODE VAULT -->
<div class="code-vault" id="codeVault" style="display:none">
<div class="vault-title">Code Vault</div>
<div class="vault-slots" id="vaultSlots"></div>
</div>

<!-- START SCREEN -->
<div class="screen active" id="startScreen">
<div class="start-brand">Mr. Jawad's Escape Room Simulations</div>
<div class="start-title">Weather Patterns:<br>Precipitation</div>
<div class="start-divider"></div>
<div class="start-subtitle">Unit Review</div>
<button class="start-btn" onclick="startGame()">BEGIN ESCAPE</button>
<div class="start-footer">DESIGNED BY MR. JAWAD</div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
<div class="room-bg-tint" id="roomBgTint"></div>
<div class="top-bar">
<div class="room-label" id="roomLabel">⛈️ The Storm Archive</div>
<div class="room-progress" id="roomProgress">Room 1 of 3</div>
<div class="puzzles-cleared">Puzzles Cleared: <span class="cleared-count" id="clearedCount">0</span>/6</div>
<span class="streak-icon" id="streakIcon">🔥</span>
</div>
<div class="mission-line" id="missionLine"></div>
<div class="puzzle-area" id="puzzleArea"></div>
<div class="bottom-bar" id="bottomBar">
<button class="scanner-btn" id="scannerBtn" onclick="openScanner()">🔍 Scanner</button>
<div class="progress-dots" id="progressDots">
<div class="progress-dot" id="dot0"></div>
<div class="progress-dot" id="dot1"></div>
</div>
<div style="width:100px"></div>
</div>
</div>

<!-- ESCAPE REPORT -->
<div class="screen" id="escapeReport"></div>

<!-- SCANNER OVERLAY -->
<div class="scanner-overlay" id="scannerOverlay">
<div class="scan-label" style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--current-color);margin-bottom:12px">📡 SCANNER ACTIVE</div>
<div class="scanner-text" id="scannerText"></div>
<button class="scanner-dismiss" onclick="closeScanner()">Dismiss</button>
</div>

<!-- DIGIT REVEAL OVERLAY -->
<div class="overlay digit-reveal-overlay" id="digitRevealOverlay">
<div style="font-size:14px;color:var(--current-color);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Digit Unlocked</div>
<div class="digit-reveal-num" id="digitRevealNum"></div>
<div class="digit-reveal-label" id="digitRevealLabel"></div>
<button class="digit-continue" id="digitContinueBtn">Continue</button>
</div>

<!-- CODE ENTRY OVERLAY -->
<div class="overlay code-entry-overlay" id="codeEntryOverlay">
<div style="font-size:clamp(18px,2.5vw,24px);font-weight:700;color:var(--text-bright);margin-bottom:4px">Enter Room Code</div>
<div class="code-digits-display" id="codeDigitsDisplay"></div>
<div class="code-input-row" id="codeInputRow"></div>
<div class="code-numpad" id="codeNumpad"></div>
<div id="codeFeedback" style="margin-top:12px;font-size:14px;min-height:20px"></div>
</div>

<!-- PASS THE LAPTOP -->
<div class="overlay pass-laptop-overlay" id="passLaptopOverlay">
<div class="pass-emoji" id="passEmoji"></div>
<div class="pass-text">PASS THE LAPTOP</div>
<div style="font-size:16px;color:var(--text);margin-bottom:20px">Hand it to the next person!</div>
<button class="pass-ready" id="passReadyBtn">Ready</button>
</div>

<!-- DOOR TRANSITION -->
<div class="door-overlay" id="doorOverlay">
<div class="door-box" id="doorBox">
<div class="door-lock"></div>
</div>
</div>

<script>
// ===== GAME STATE =====
const state = {
  screen:'start',currentRoom:0,currentPuzzle:0,puzzlesSolved:0,
  firstTrySolves:0,streak:0,startTime:0,
  puzzleSolving:false,overrideTriggered:false,
  wrongCounts:{},scannerUsed:{},puzzleFirstTry:{},
  roomBadges:{0:{clean:true,noScanner:true},1:{clean:true,noScanner:true},2:{clean:true,noScanner:true}},
  badges:{cleanRoom:false,comeback:false,noScanner:false,deepScan:false},
  vaultDigits:[[null,null],[null,null],[null,null]],
  qfState:null,scannerOpen:false,skippedRooms:{},
  longPressTimer:null,shiftSTimer:null,shiftSStart:0,
  playAgainBound:false,previewDone:false
};

// ===== CONTENT =====
const rooms = [
  {
    name:'The Storm Archive',emoji:'⛈️',
    color:'#1e90ff',accent:'#00d4ff',bgVar:'rgba(30,144,255,.08)',
    mission:'Decode the storm files to unlock the vault.',
    code:[7,2],
    completion:'⛈️ Storm Archive decoded — vault unsealed!',
    puzzles:[
      {
        type:'match',digit:7,
        pairs:[
          {term:'❄️ Cold air + warm lake',match:'Heavy Snow'},
          {term:'🏜️ Mountains block moisture',match:'No Rain'},
          {term:'🌊 Stalled storm over valley',match:'Flash Flood'}
        ],
        scannerText:'📡 In Precipitation: How Rain Forms, the lake-effect card showed cold air crossing warm water — snowflakes piled up over the city.',
        strongScanner:[
          ['Heavy Snow','Flash Flood'],
          ['No Rain','Flash Flood'],
          []
        ],
        scanPreview:{label:'SCANNING STORM ARCHIVE',items:['❄️','🏜️','🌊','⛈️','🌧️']},
      },
      {
        type:'mystery',digit:2,
        chain:['Monsoon winds hit steep hills','???','Extreme precipitation'],
        options:[
          {text:'Air forced upward ☁️⬆️',correct:true},
          {text:'Air sinks to ground 🔽',correct:false},
          {text:'Wind reverses direction 🔄',correct:false}
        ],
        scannerText:'📡 In Precipitation: How Rain Forms, the Mawsynram card showed arrows pushing air UP the steep hills before clouds formed.',
        strongScanner:['Air forced upward ☁️⬆️','Wind reverses direction 🔄'],
        scanPreview:{label:'SCANNING MONSOON DATA',items:['💨','⬆️','☁️','🌧️']},
      }
    ]
  },
  {
    name:'The Weather Engine',emoji:'🌀',
    color:'#00e676',accent:'#76ff03',bgVar:'rgba(0,230,118,.08)',
    mission:'Calibrate the weather engine to restore the forecast.',
    code:[4,9],
    completion:'🌀 Weather Engine calibrated — forecast restored!',
    puzzles:[
      {
        type:'scanner',digit:4,
        gauges:[
          {name:'AIR TEMP',reading:'Warm',fill:65,color:'#ff9800'},
          {name:'MOISTURE',reading:'Moist',fill:60,color:'#42a5f5'},
          {name:'RESULT',reading:'???',fill:0,color:'#aaa'}
        ],
        question:'What does the result gauge show?',
        options:[
          {text:'Rain 🌧️',correct:false},
          {text:'Clouds Only ☁️',correct:true,dataCorrect:'true'},
          {text:'No Rain ☀️',correct:false}
        ],
        scannerText:'📡 In The Rain Machine, the result gauge only hit RAIN when BOTH bars were maxed — anything less made clouds but no rain.',
        strongScanner:['Clouds Only ☁️','Rain 🌧️'],
        scanPreview:{label:'SCANNING RAIN MACHINE',items:['🌡️','💧','☁️','🌧️']},
      },
      {
        type:'spotdiff',digit:9,
        scannerText:'📡 Mountain scan — in Rain Shadow Effect, the rain ALWAYS fell on the side the wind hit first. The other side stayed dry.',
        strongScanner:['windward','leeward'],
        scanPreview:{label:'SCANNING MOUNTAIN DATA',items:['🏔️','💨','🌧️','☀️']},
      }
    ]
  },
  {
    name:'The Dry Zone',emoji:'🏜️',
    color:'#ff6d00',accent:'#ffab00',bgVar:'rgba(255,109,0,.08)',
    mission:'Map the dry zones to crack the final seal.',
    code:[3,6],
    completion:'🏜️ Dry zones mapped — final seal cracked!',
    puzzles:[
      {
        type:'quickfire',digit:3,
        questions:[
          {text:'🏔️ Bigger mountain → bigger rain shadow',answer:'CONFIRM'},
          {text:'🌧️ The sheltered side gets heavy rain',answer:'DENY'},
          {text:'🌵 Same latitude = same weather',answer:'DENY'},
          {text:'💨 Flip the wind → flip the wet side',answer:'CONFIRM'}
        ],
        scannerText:'📡 In Why Extreme Precipitation Places Exist, the Kauai map showed 400+ inches of rain on one side and cactus just miles away on the other — same mountain, opposite weather.',
        scanPreview:{label:'SCANNING DRY ZONE DATA',items:['🏔️','🌧️','🌵','💨']},
      },
      {
        type:'sequence',digit:6,
        steps:[
          {label:'Wind hits mountain 💨',order:1},
          {label:'Air rises and cools ☁️',order:2},
          {label:'Rain on windward 🌧️',order:3}
        ],
        scannerText:'📡 In Why Extreme Precipitation Places Exist, the mountain diagram showed air moving UP the slope first, THEN cooling into clouds, THEN dropping rain.',
        strongScanner:['Wind hits mountain 💨','Air rises and cools ☁️'],
        scanPreview:{label:'SCANNING OROGRAPHIC DATA',items:['💨','☁️','🌧️']},
      }
    ]
  }
];

const finalLockPairs = [
  {term:'⛈️ Monsoon Winds',match:'Air Forced Upward',color:'#1e90ff'},
  {term:'🌀 Leeward Side',match:'Dry / No Rain',color:'#00e676'},
  {term:'🏜️ Bigger Mountain',match:'Bigger Rain Shadow',color:'#ff6d00'}
];

// ===== UTILITIES =====
function $(id){return document.getElementById(id)}
function closeAllOverlays(){
  ['scannerOverlay','digitRevealOverlay','codeEntryOverlay','passLaptopOverlay'].forEach(id=>{
    try{$(id).classList.remove('active');$(id).style.display='none'}catch(e){}
  });
  state.scannerOpen=false;
  try{const door=$('doorOverlay');door.classList.remove('animate');door.style.opacity='0';door.style.display='none';door.style.pointerEvents='none'}catch(e){}
  document.querySelectorAll('.override-msg').forEach(el=>el.remove());
  document.querySelectorAll('.scan-preview').forEach(el=>el.remove());
}
function closeScanner(){
  try{$('scannerOverlay').classList.remove('active');$('scannerOverlay').style.display='none';state.scannerOpen=false}catch(e){}
}
function setRoomTheme(room){
  const r=rooms[room]||rooms[0];
  document.documentElement.style.setProperty('--current-color',r.color);
  document.documentElement.style.setProperty('--current-accent',r.accent);
  document.documentElement.style.setProperty('--current-bg',r.bgVar);
  try{$('roomBgTint').style.background=`radial-gradient(ellipse at center, ${r.bgVar} 0%, transparent 70%)`}catch(e){}
}
function spawnParticles(x,y,color,count){
  try{
    const c=Math.min(count||8,12);
    for(let i=0;i<c;i++){
      const p=document.createElement('div');
      p.className='particle';
      const size=4+Math.random()*6;
      p.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};--tx:${(Math.random()-.5)*120}px;--ty:${(Math.random()-.5)*120}px`;
      document.body.appendChild(p);
      p.addEventListener('animationend',()=>p.remove());
      setTimeout(()=>{if(p.parentNode)p.remove()},1500);
    }
  }catch(e){}
}
function spawnConfetti(){
  try{
    const colors=['#1e90ff','#00e676','#ff6d00','#ffab00','#00d4ff','#76ff03','#ff4444','#ffffff'];
    for(let i=0;i<40;i++){
      const c=document.createElement('div');
      c.className='confetti';
      c.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*1.5}s;border-radius:${Math.random()>.5?'50%':'0'}`;
      document.body.appendChild(c);
      c.addEventListener('animationend',()=>c.remove());
      setTimeout(()=>{if(c.parentNode)c.remove()},5000);
    }
  }catch(e){}
}
function pkey(room,puzzle){return `${room}-${puzzle}`}

// ===== VAULT =====
function initVault(){
  $('codeVault').style.display='block';
  const sl=$('vaultSlots');sl.innerHTML='';
  const emojis=['⛈️','🌀','🏜️'];
  for(let r=0;r<3;r++){
    const row=document.createElement('div');row.className='vault-row';
    row.innerHTML=`<span class="vault-room-icon">${emojis[r]}</span>
      <span class="vault-digit" id="vd-${r}-0">?</span>
      <span class="vault-digit" id="vd-${r}-1">?</span>`;
    sl.appendChild(row);
  }
}
function updateVaultDigit(room,puzzleIdx,digit){
  try{
    state.vaultDigits[room][puzzleIdx]=digit;
    const el=$(`vd-${room}-${puzzleIdx}`);
    if(el){
      el.textContent=digit;
      el.classList.add('revealed');
      el.style.setProperty('--current-color',rooms[room].color);
      el.style.color=rooms[room].color;
      el.style.borderColor=rooms[room].color;
      if(state.vaultDigits[room][0]!==null&&state.vaultDigits[room][1]!==null){
        $(`vd-${room}-0`).classList.add('room-done');
        $(`vd-${room}-1`).classList.add('room-done');
      }
    }
  }catch(e){}
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

// ===== START GAME =====
function startGame(){
  state.startTime=Date.now();
  state.puzzlesSolved=0;state.firstTrySolves=0;state.streak=0;
  state.puzzleSolving=false;state.overrideTriggered=false;
  state.wrongCounts={};state.scannerUsed={};state.puzzleFirstTry={};
  state.roomBadges={0:{clean:true,noScanner:true},1:{clean:true,noScanner:true},2:{clean:true,noScanner:true}};
  state.badges={cleanRoom:false,comeback:false,noScanner:false,deepScan:false};
  state.vaultDigits=[[null,null],[null,null],[null,null]];
  state.qfState=null;state.skippedRooms={};state.playAgainBound=false;
  showScreen('gameScreen');
  initVault();
  loadTutorial();
}

// ===== TUTORIAL =====
let tutorialActive=false;
function loadTutorial(){
  try{
    tutorialActive=true;
    setRoomTheme(0);
    $('roomLabel').innerHTML='📖 Tutorial';
    $('roomProgress').textContent='Practice Round';
    $('missionLine').textContent='Learn the basics — tap to match!';
    $('bottomBar').style.display='none';
    $('clearedCount').textContent='0';
    $('streakIcon').classList.remove('active');
    const area=$('puzzleArea');
    area.innerHTML='';
    
    const skipBtn=document.createElement('button');
    skipBtn.className='tutorial-skip';
    skipBtn.textContent='Skip Tutorial →';
    skipBtn.onclick=()=>{tutorialActive=false;startRoom(0)};
    area.appendChild(skipBtn);
    
    const title=document.createElement('div');
    title.className='puzzle-title';
    title.textContent='Tutorial: Match Lock';
    area.appendChild(title);
    
    const inst=document.createElement('div');
    inst.className='puzzle-instruction';
    inst.textContent='👆 Tap a word on the LEFT, then tap its match on the RIGHT.';
    area.appendChild(inst);
    
    const pairs=[{term:'Sun ☀️',match:'Hot'},{term:'Ice 🧊',match:'Cold'}];
    let pairIdx=0,selected=null;
    
    const prog=document.createElement('div');
    prog.className='micro-progress';
    area.appendChild(prog);
    
    const container=document.createElement('div');
    container.style.cssText='display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;justify-content:center';
    area.appendChild(container);
    
    function showTutPair(){
      if(!tutorialActive)return;
      if(pairIdx>=pairs.length){
        tutorialActive=false;
        area.innerHTML='<div class="puzzle-title" style="color:var(--success)">✔ Tutorial complete!</div><div class="puzzle-instruction">Starting Room 1...</div>';
        setTimeout(()=>startRoom(0),1500);
        return;
      }
      prog.textContent=`Pair ${pairIdx+1} of ${pairs.length}`;
      container.innerHTML='';
      selected=null;
      const leftCol=document.createElement('div');
      leftCol.style.cssText='display:flex;flex-direction:column;gap:10px';
      const rightCol=document.createElement('div');
      rightCol.style.cssText='display:flex;flex-direction:column;gap:10px';
      
      const termCard=document.createElement('div');
      termCard.className='card';
      termCard.textContent=pairs[pairIdx].term;
      termCard.onclick=()=>{
        container.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
        termCard.classList.add('selected');
        selected='term';
      };
      leftCol.appendChild(termCard);
      
      const matchTexts=pairIdx===0?['Hot','Cold']:['Cold','Hot'];
      matchTexts.forEach(mt=>{
        const mc=document.createElement('div');
        mc.className='card';
        mc.textContent=mt;
        mc.onclick=()=>{
          if(selected!=='term')return;
          if(mt===pairs[pairIdx].match){
            mc.classList.add('correct');
            termCard.classList.remove('selected');
            termCard.classList.add('locked');
            spawnParticles(mc.getBoundingClientRect().x+60,mc.getBoundingClientRect().y+20,rooms[0].color,6);
            pairIdx++;
            setTimeout(showTutPair,700);
          }else{
            mc.classList.add('wrong');
            setTimeout(()=>mc.classList.remove('wrong'),500);
          }
        };
        rightCol.appendChild(mc);
      });
      
      container.appendChild(leftCol);
      container.appendChild(rightCol);
    }
    showTutPair();
  }catch(e){startRoom(0)}
}

// ===== ROOM MANAGEMENT =====
function startRoom(roomIdx){
  closeAllOverlays();
  state.currentRoom=roomIdx;
  state.currentPuzzle=0;
  setRoomTheme(roomIdx);
  $('bottomBar').style.display='flex';
  updateTopBar();
  updateProgressDots();
  showScanPreview(roomIdx,0);
}
function updateTopBar(){
  const r=rooms[state.currentRoom];
  $('roomLabel').innerHTML=`${r.emoji} ${r.name}`;
  $('roomProgress').textContent=`Room ${state.currentRoom+1} of 3`;
  $('missionLine').textContent=r.mission;
  $('clearedCount').textContent=state.puzzlesSolved;
}
function updateProgressDots(){
  for(let i=0;i<2;i++){
    const dot=$(`dot${i}`);
    if(!dot)continue;
    dot.className='progress-dot';
    const pk=pkey(state.currentRoom,i);
    if(state.puzzleFirstTry[pk]!==undefined)dot.classList.add('filled');
  }
}

// ===== SCAN PREVIEW =====
function showScanPreview(roomIdx,puzzleIdx){
  state.previewDone=false;
  const puzzle=rooms[roomIdx].puzzles[puzzleIdx];
  const sp=puzzle.scanPreview;
  const area=$('puzzleArea');
  area.innerHTML='';
  
  const preview=document.createElement('div');
  preview.className='scan-preview';
  preview.innerHTML=`<div class="scan-preview-content">
    <div class="scan-label">${sp.label}</div>
    <div style="font-size:36px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">${sp.items.map(i=>`<span style="animation:scanFade 3s ease">${i}</span>`).join('')}</div>
    <div style="margin-top:12px;font-size:13px;color:rgba(255,255,255,.5)">SCANNING ROOM...</div>
  </div>`;
  area.appendChild(preview);
  
  function finishPreview(){
    if(state.previewDone)return;
    state.previewDone=true;
    try{preview.remove()}catch(e){}
    loadPuzzle(roomIdx,puzzleIdx);
  }
  setTimeout(finishPreview,3200);
  setTimeout(finishPreview,5000);// safety
}

// ===== LOAD PUZZLE =====
function loadPuzzle(roomIdx,puzzleIdx){
  try{
    state.currentRoom=roomIdx;
    state.currentPuzzle=puzzleIdx;
    state.puzzleSolving=false;
    state.overrideTriggered=false;
    const pk=pkey(roomIdx,puzzleIdx);
    if(state.wrongCounts[pk]===undefined)state.wrongCounts[pk]=0;
    
    const puzzle=rooms[roomIdx].puzzles[puzzleIdx];
    const area=$('puzzleArea');
    area.innerHTML='';
    
    switch(puzzle.type){
      case 'match':renderMatchLock(area,puzzle,roomIdx,puzzleIdx);break;
      case 'mystery':renderMystery(area,puzzle,roomIdx,puzzleIdx);break;
      case 'scanner':renderSystemScanner(area,puzzle,roomIdx,puzzleIdx);break;
      case 'spotdiff':renderSpotDiff(area,puzzle,roomIdx,puzzleIdx);break;
      case 'quickfire':renderQuickFire(area,puzzle,roomIdx,puzzleIdx);break;
      case 'sequence':renderSequence(area,puzzle,roomIdx,puzzleIdx);break;
    }
  }catch(e){
    $('puzzleArea').innerHTML=`<div class="puzzle-title">Something went wrong</div><button class="card" onclick="loadPuzzle(${roomIdx},${puzzleIdx})">Click to retry this puzzle</button>`;
  }
}

// ===== WRONG ANSWER HANDLER =====
function handleWrongAnswer(roomIdx,puzzleIdx,wrongElement,onOverride){
  try{
    const pk=pkey(roomIdx,puzzleIdx);
    state.wrongCounts[pk]=(state.wrongCounts[pk]||0)+1;
    const wc=state.wrongCounts[pk];
    state.roomBadges[roomIdx].clean=state.roomBadges[roomIdx].clean&&wc<=1;
    
    if(wrongElement){
      wrongElement.classList.add('wrong');
      setTimeout(()=>{try{wrongElement.classList.remove('wrong')}catch(e){}},500);
    }
    
    if(wc===1){
      // 1st wrong: auto-open scanner
      state.scannerUsed[pk]=true;
      state.roomBadges[roomIdx].noScanner=false;
      autoOpenScanner(roomIdx,puzzleIdx);
    }else if(wc>=2&&!state.overrideTriggered){
      state.overrideTriggered=true;
      closeScanner();
      if(onOverride)onOverride();
    }
  }catch(e){}
}
function autoOpenScanner(roomIdx,puzzleIdx){
  try{
    const puzzle=rooms[roomIdx].puzzles[puzzleIdx];
    $('scannerText').textContent=puzzle.scannerText;
    $('scannerOverlay').style.display='flex';
    $('scannerOverlay').classList.add('active');
    state.scannerOpen=true;
    narrowChoices(roomIdx,puzzleIdx);
  }catch(e){}
}
function openScanner(){
  try{
    const pk=pkey(state.currentRoom,state.currentPuzzle);
    const puzzle=rooms[state.currentRoom].puzzles[state.currentPuzzle];
    // During Quick Fire, scanner must NOT open full-screen overlay (blocks buttons)
    if(puzzle.type==='quickfire'){
      // Show inline scanner cue if not already visible
      const inl=$('qfInlineScanner');
      if(inl)inl.style.display='block';
      state.scannerUsed[pk]=true;
      state.roomBadges[state.currentRoom].noScanner=false;
      return;
    }
    state.scannerUsed[pk]=true;
    state.roomBadges[state.currentRoom].noScanner=false;
    $('scannerText').textContent=puzzle.scannerText;
    $('scannerOverlay').style.display='flex';
    $('scannerOverlay').classList.add('active');
    state.scannerOpen=true;
  }catch(e){}
}
function narrowChoices(roomIdx,puzzleIdx){
  // Narrow to 2 choices — handled per puzzle type via data attributes
  try{
    const puzzle=rooms[roomIdx].puzzles[puzzleIdx];
    if(puzzle.type==='match'||puzzle.type==='sequence'||puzzle.type==='quickfire')return;
    const strong=puzzle.strongScanner;
    if(!strong)return;
    const cards=document.querySelectorAll('[data-answer-card]');
    cards.forEach(c=>{
      const txt=c.getAttribute('data-answer-text');
      if(!strong.includes(txt)&&!c.classList.contains('locked')&&!c.classList.contains('correct')){
        c.classList.add('dimmed');
      }
    });
  }catch(e){}
}

// ===== PUZZLE SOLVED =====
function puzzleSolved(roomIdx,puzzleIdx){
  if(state.puzzleSolving)return;
  state.puzzleSolving=true;
  
  try{
    closeScanner();
    closeAllOverlays();
    
    const puzzle=rooms[roomIdx].puzzles[puzzleIdx];
    const pk=pkey(roomIdx,puzzleIdx);
    const wc=state.wrongCounts[pk]||0;
    const isFirstTry=wc===0;
    
    state.puzzleFirstTry[pk]=isFirstTry;
    if(isFirstTry)state.firstTrySolves++;
    
    // Streak
    if(isFirstTry){state.streak++}else{state.streak=0}
    $('streakIcon').classList.toggle('active',state.streak>=2);
    
    // Badges
    if(state.scannerUsed[pk]&&wc<=2){state.badges.comeback=true}
    if(state.scannerUsed[pk]&&wc===1){state.badges.deepScan=true}
    
    state.puzzlesSolved++;
    const cc=$('clearedCount');
    cc.textContent=state.puzzlesSolved;
    cc.classList.remove('pulse');
    void cc.offsetWidth;
    cc.classList.add('pulse');
    
    // Update vault IMMEDIATELY
    updateVaultDigit(roomIdx,puzzleIdx,puzzle.digit);
    updateProgressDots();
    
    // Show digit reveal
    showDigitReveal(puzzle.digit,roomIdx,puzzleIdx);
  }catch(e){
    state.puzzleSolving=false;
    advanceAfterPuzzle(roomIdx,puzzleIdx);
  }
}
function showDigitReveal(digit,roomIdx,puzzleIdx){
  try{
    const ov=$('digitRevealOverlay');
    ov.style.display='flex';
    ov.classList.add('active');
    $('digitRevealNum').textContent=digit;
    $('digitRevealLabel').textContent=`Room ${roomIdx+1}, Puzzle ${puzzleIdx+1}`;
    
    spawnParticles(window.innerWidth/2,window.innerHeight/2,rooms[roomIdx].color,10);
    
    const btn=$('digitContinueBtn');
    const handler=()=>{
      btn.removeEventListener('click',handler);
      closeAllOverlays();
      advanceAfterPuzzle(roomIdx,puzzleIdx);
    };
    btn.onclick=null;
    btn.addEventListener('click',handler);
    
    // Safety timeout
    setTimeout(()=>{
      if(ov.classList.contains('active')){
        btn.removeEventListener('click',handler);
        closeAllOverlays();
        advanceAfterPuzzle(roomIdx,puzzleIdx);
      }
    },15000);
  }catch(e){

    advanceAfterPuzzle(roomIdx,puzzleIdx);
  }
}
function advanceAfterPuzzle(roomIdx,puzzleIdx){

function showDoorTransition(callback){
  try{

    box.style.borderColor=getComputedStyle(document.documentElement).getPropertyValue('--current-color');
    door.style.display='flex';

// ===== MATCH LOCK =====
function renderMatchLock(area,puzzle,roomIdx,puzzleIdx){
  let pairIdx=0,selected=null;
  
  const title=document.createElement('div');
  title.className='puzzle-title';
  title.textContent='Match Lock';
  area.appendChild(title);
  
  const inst=document.createElement('div');
  inst.className='puzzle-instruction';
  inst.textContent='👆 Tap a word on the LEFT, then tap its match on the RIGHT.';
  area.appendChild(inst);
  
  const prog=document.createElement('div');
  prog.className='micro-progress';
  area.appendChild(prog);
  
  const container=document.createElement('div');
  container.style.cssText='display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;justify-content:center';
  area.appendChild(container);
  
  function showPair(){
    if(pairIdx>=puzzle.pairs.length){
      puzzleSolved(roomIdx,puzzleIdx);
      return;
    }
    prog.textContent=`Pair ${pairIdx+1} of ${puzzle.pairs.length}`;
    container.innerHTML='';
    selected=null;
    
    const leftCol=document.createElement('div');
    leftCol.style.cssText='display:flex;flex-direction:column;gap:10px';
    const rightCol=document.createElement('div');
    rightCol.style.cssText='display:flex;flex-direction:column;gap:10px';
    
    const pair=puzzle.pairs[pairIdx];
    const termCard=document.createElement('div');
    termCard.className='card';
    termCard.textContent=pair.term;
    termCard.style.minWidth='180px';
    termCard.onclick=()=>{
      container.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
      termCard.classList.add('selected');
      selected='term';
    };
    leftCol.appendChild(termCard);
    
    // Build right side options
    const strong=puzzle.strongScanner[pairIdx];
    let rightOptions;
    if(pairIdx<puzzle.pairs.length-1){
      rightOptions=[pair.match];
      // Add distractor(s) from strong scanner
      if(strong&&strong.length>0){
        strong.forEach(s=>{if(s!==pair.match&&rightOptions.indexOf(s)===-1)rightOptions.push(s)});
      }
      if(rightOptions.length<2){
        // Add another distractor
        puzzle.pairs.forEach((p,i)=>{
          if(i!==pairIdx&&rightOptions.indexOf(p.match)===-1)rightOptions.push(p.match);
        });
      }
    }else{
      // Last pair — just the correct match
      rightOptions=[pair.match];
    }
    // Shuffle
    rightOptions.sort(()=>Math.random()-.5);
    
    let wrongForThisPair=0;
    rightOptions.forEach(opt=>{
      const mc=document.createElement('div');
      mc.className='card';
      mc.textContent=opt;
      mc.style.minWidth='150px';
      mc.setAttribute('data-answer-card','true');
      mc.setAttribute('data-answer-text',opt);
      if(opt===pair.match)mc.setAttribute('data-correct','true');
      
      mc.onclick=()=>{
        if(selected!=='term'||mc.classList.contains('dimmed')||mc.classList.contains('locked'))return;
        if(opt===pair.match){
          mc.classList.add('correct');
          termCard.classList.remove('selected');
          termCard.classList.add('locked');
          spawnParticles(mc.getBoundingClientRect().x+60,mc.getBoundingClientRect().y+20,rooms[roomIdx].color,8);
          pairIdx++;
          setTimeout(showPair,700);
        }else{
          wrongForThisPair++;
          handleWrongAnswer(roomIdx,puzzleIdx,mc,()=>{
            // Override: auto-solve remaining pairs
            showOverrideMsg();
            autoSolveMatchCascade(pairIdx,puzzle,container,area,prog,roomIdx,puzzleIdx);
          });
          mc.classList.add('dimmed');
        }
      };
      rightCol.appendChild(mc);
    });
    
    container.appendChild(leftCol);
    container.appendChild(rightCol);
  }
  showPair();
}
function autoSolveMatchCascade(fromPair,puzzle,container,area,prog,roomIdx,puzzleIdx){
  let idx=fromPair;
  function solveNext(){
    if(idx>=puzzle.pairs.length){
      setTimeout(()=>puzzleSolved(roomIdx,puzzleIdx),500);
      return;
    }
    prog.textContent=`Pair ${idx+1} of ${puzzle.pairs.length}`;
    container.innerHTML='';
    const pair=puzzle.pairs[idx];
    const tc=document.createElement('div');tc.className='card locked';tc.textContent=pair.term;tc.style.minWidth='180px';
    const mc=document.createElement('div');mc.className='card correct';mc.textContent=pair.match;mc.style.minWidth='150px';
    const leftCol=document.createElement('div');leftCol.style.cssText='display:flex;flex-direction:column;gap:10px';
    const rightCol=document.createElement('div');rightCol.style.cssText='display:flex;flex-direction:column;gap:10px';
    leftCol.appendChild(tc);rightCol.appendChild(mc);
    container.appendChild(leftCol);container.appendChild(rightCol);
    idx++;
    setTimeout(solveNext,600);
  }
  solveNext();
}

  const pips=document.createElement('div');
  pips.className='qf-progress';
  pips.style.justifyContent='center';
  for(let i=0;i<4;i++){
    const pip=document.createElement('div');
    pip.className='qf-pip';
    pip.id=`qfPip${i}`;
    pips.appendChild(pip);
  }
  area.appendChild(pips);
  
  const feedback=document.createElement('div');
  feedback.id='qfFeedback';
  feedback.style.cssText='margin-top:8px;font-size:14px;min-height:20px;text-align:center';
  area.appendChild(feedback);
  
  // Inline scanner cue (shown on first wrong, NOT the full-screen overlay)
  const inlineScanner=document.createElement('div');
  inlineScanner.id='qfInlineScanner';
  inlineScanner.style.cssText='margin-top:10px;padding:10px 16px;background:rgba(255,255,255,.06);border:1px solid var(--current-color);border-radius:8px;font-size:13px;color:var(--text);max-width:420px;text-align:center;display:none;line-height:1.5';
  inlineScanner.textContent=puzzle.scannerText;
  area.appendChild(inlineScanner);
  
  let qfScannerShown=false;
  
  let processing=false;
  
  function showQuestion(){
    const qs=state.qfState;
    if(qs.overridden)return;
    
    if(qs.activeIndices.length===0||qs.currentIdx>=qs.activeIndices.length){
      finishQFPass();
      return;
    }
    
    const realIdx=qs.activeIndices[qs.currentIdx];
    const q=qs.questions[realIdx];
    $('qfQuestion').textContent=q.text;
    processing=false;
    
    // Update pips
    for(let i=0;i<4;i++){
      const pip=$(`qfPip${i}`);
      pip.className='qf-pip';
      if(qs.results[i]===true)pip.classList.add('done-correct');
      else if(qs.results[i]===false)pip.classList.add('done-wrong');
      if(i===realIdx)pip.classList.add('current');
    }
  }
  
  function handleQFAnswer(answer){
    if(processing||state.qfState.overridden)return;
    processing=true;
    const qs=state.qfState;
    const realIdx=qs.activeIndices[qs.currentIdx];
    const q=qs.questions[realIdx];
    const isCorrect=answer===q.answer;
    
    if(isCorrect){
      qs.results[realIdx]=true;
      $(`qfPip${realIdx}`).className='qf-pip done-correct';
      confirmBtn.classList.toggle('qf-flash-correct',answer==='CONFIRM');
      denyBtn.classList.toggle('qf-flash-correct',answer==='DENY');
      $('qfFeedback').innerHTML='<span style="color:var(--success)">✔ Correct!</span>';
    }else{
      qs.results[realIdx]=false;
      qs.missedIndices.push(realIdx);
      qs.cumulativeWrong++;
      $(`qfPip${realIdx}`).className='qf-pip done-wrong';
      confirmBtn.classList.toggle('qf-flash-wrong',answer==='CONFIRM');
      denyBtn.classList.toggle('qf-flash-wrong',answer==='DENY');
      $('qfFeedback').innerHTML='<span style="color:var(--error)">✖ Incorrect</span>';
      
      state.scannerUsed[pkey(roomIdx,puzzleIdx)]=true;
      state.roomBadges[roomIdx].noScanner=false;
      
      // Show inline scanner cue on first wrong (NOT overlay)
      if(!qfScannerShown){
        qfScannerShown=true;
        $('qfInlineScanner').style.display='block';
      }
      
      // Check cumulative override
      if(qs.cumulativeWrong>=5&&!qs.overridden){
        qs.overridden=true;
        setTimeout(()=>{
          showOverrideMsg();
          // Auto-mark all remaining as correct
          for(let i=0;i<4;i++){
            if(qs.results[i]!==true){
              qs.results[i]=true;
              $(`qfPip${i}`).className='qf-pip done-correct';
            }
          }
          $('qfFeedback').innerHTML='<span style="color:var(--warn)">Lock override triggered — signals confirmed.</span>';
          setTimeout(()=>puzzleSolved(roomIdx,puzzleIdx),1200);
        },600);
        return;
      }
    }
    
    setTimeout(()=>{
      confirmBtn.classList.remove('qf-flash-correct','qf-flash-wrong');
      denyBtn.classList.remove('qf-flash-correct','qf-flash-wrong');
      $('qfFeedback').textContent='';
      qs.currentIdx++;
      showQuestion();
    },600);
  }
  
  function finishQFPass(){
    const qs=state.qfState;
    const correctCount=qs.results.filter(r=>r===true).length;
    
    if(correctCount>=3){
      setTimeout(()=>puzzleSolved(roomIdx,puzzleIdx),400);
    }else{
      // Retry missed only
      qs.activeIndices=[...qs.missedIndices];
      qs.missedIndices=[];
      qs.currentIdx=0;
      // Reset results for missed questions
      qs.activeIndices.forEach(i=>{qs.results[i]=null});
      qs.retrying=true;
      $('qfFeedback').innerHTML='<span style="color:var(--warn)">Retrying missed signals...</span>';
      setTimeout(()=>{
        $('qfFeedback').textContent='';
        showQuestion();
      },800);
    }
  }
  
  confirmBtn.onclick=()=>handleQFAnswer('CONFIRM');
  denyBtn.onclick=()=>handleQFAnswer('DENY');
  
  showQuestion();
}

// ===== SEQUENCE LOCK =====
function renderSequence(area,puzzle,roomIdx,puzzleIdx){
  const title=document.createElement('div');
  title.className='puzzle-title';
  title.textContent='Sequence Lock';
  area.appendChild(title);
  
  const inst=document.createElement('div');
  inst.className='puzzle-instruction';
  inst.textContent='👆 Tap the cards in the correct order.';
  area.appendChild(inst);
  
  const prog=document.createElement('div');
  prog.className='micro-progress';
  area.appendChild(prog);
  
  // Locked slots display
  const slotsRow=document.createElement('div');
  slotsRow.style.cssText='display:flex;gap:8px;margin-bottom:16px;align-items:center';
  for(let i=0;i<3;i++){
    if(i>0){const arr=document.createElement('span');arr.style.cssText='color:var(--current-color);font-size:20px';arr.textContent='→';slotsRow.appendChild(arr)}
    const slot=document.createElement('div');
    slot.id=`seqSlot${i}`;
    slot.className='card';
    slot.style.cssText='min-width:140px;opacity:.3;pointer-events:none;border-style:dashed';
    slot.textContent=`Position ${i+1}`;
    slotsRow.appendChild(slot);
  }
  area.appendChild(slotsRow);
  
  const prompt=document.createElement('div');
  prompt.id='seqPrompt';
  prompt.style.cssText='font-size:clamp(15px,1.8vw,18px);color:var(--current-accent);margin-bottom:12px;font-weight:600;text-align:center';
  area.appendChild(prompt);
  
  // Cards
  const cardsRow=document.createElement('div');
  cardsRow.id='seqCards';
  cardsRow.style.cssText='display:flex;gap:12px;flex-wrap:wrap;justify-content:center';
  area.appendChild(cardsRow);
  
  let currentStep=0;
  const correctOrder=[...puzzle.steps].sort((a,b)=>a.order-b.order);
  const shuffled=[...puzzle.steps].sort(()=>Math.random()-.5);
  const locked=[];
  
  function renderStep(){
    if(currentStep>=3){
      puzzleSolved(roomIdx,puzzleIdx);
      return;
    }
    
    const prompts=['What happens FIRST?','What happens NEXT?',''];
    prompt.textContent=currentStep<2?prompts[currentStep]:'';
    prog.textContent=currentStep<2?`Step ${currentStep+1} of 3`:'Complete!';
    
    if(currentStep===2){
      // Auto-place last card
      const remaining=shuffled.filter(s=>!locked.includes(s.label));
      if(remaining.length>0){
        const last=remaining[0];
        locked.push(last.label);
        const slot=$(`seqSlot${2}`);
        slot.textContent=last.label;
        slot.style.opacity='1';
        slot.style.borderStyle='solid';
        slot.classList.add('locked');
        spawnParticles(slot.getBoundingClientRect().x+60,slot.getBoundingClientRect().y+20,rooms[roomIdx].color,8);
      }
      cardsRow.innerHTML='';
      setTimeout(()=>puzzleSolved(roomIdx,puzzleIdx),800);
      return;
    }
    
    cardsRow.innerHTML='';
    const remaining=shuffled.filter(s=>!locked.includes(s.label));
    remaining.forEach(step=>{
      const card=document.createElement('div');
      card.className='card';
      card.textContent=step.label;
      card.style.minWidth='160px';
      card.setAttribute('data-answer-card','true');
      card.setAttribute('data-answer-text',step.label);
      if(step.order===currentStep+1)card.setAttribute('data-correct','true');
      
      card.onclick=()=>{
        if(card.classList.contains('dimmed')||card.classList.contains('locked'))return;
        if(step.order===currentStep+1){
          card.classList.add('correct');
          locked.push(step.label);
          const slot=$(`seqSlot${currentStep}`);
          slot.textContent=step.label;
          slot.style.opacity='1';
          slot.style.borderStyle='solid';
          slot.classList.add('locked');
          spawnParticles(card.getBoundingClientRect().x+60,card.getBoundingClientRect().y+20,rooms[roomIdx].color,8);
          currentStep++;
          setTimeout(renderStep,700);
        }else{
          card.classList.add('dimmed');
          handleWrongAnswer(roomIdx,puzzleIdx,card,()=>{
            showOverrideMsg();
            autoSolveSequenceCascade(currentStep,correctOrder,locked,cardsRow,prog,roomIdx,puzzleIdx);
          });
        }
      };
      cardsRow.appendChild(card);
    });
  }
  renderStep();
}
function autoSolveSequenceCascade(fromStep,correctOrder,locked,cardsRow,prog,roomIdx,puzzleIdx){
  let step=fromStep;
  cardsRow.innerHTML='';
  function solveNext(){
    if(step>=3){
      setTimeout(()=>puzzleSolved(roomIdx,puzzleIdx),500);
      return;
    }
    const item=correctOrder[step];
    const slot=$(`seqSlot${step}`);
    slot.textContent=item.label;
    slot.style.opacity='1';
    slot.style.borderStyle='solid';
    slot.classList.add('locked');
    prog.textContent=step<2?`Step ${step+1} of 3`:'Complete!';
    step++;
    setTimeout(solveNext,600);
  }
  solveNext();
}

// ===== OVERRIDE MESSAGE =====
function showOverrideMsg(){
  document.querySelectorAll('.override-msg').forEach(el=>el.remove());
  const msg=document.createElement('div');
  msg.className='override-msg';
  msg.textContent='🔓 Lock override triggered';
  document.body.appendChild(msg);
  setTimeout(()=>{try{msg.remove()}catch(e){}},4000);
}

// ===== FINAL LOCK =====
function loadFinalLock(){
  try{
    closeAllOverlays();
    $('roomLabel').innerHTML='🔐 Final Lock';
    $('roomProgress').textContent='Master Match';
    $('missionLine').textContent='Match each term to its partner — one from each room!';
    $('bottomBar').style.display='none';
    
    document.documentElement.style.setProperty('--current-color','#00bcd4');
    document.documentElement.style.setProperty('--current-accent','#00e5ff');
    $('roomBgTint').style.background='radial-gradient(ellipse at center, rgba(0,188,212,.06) 0%, transparent 70%)';
    
    const area=$('puzzleArea');
    area.innerHTML='';
    
    const title=document.createElement('div');
    title.className='puzzle-title';
    title.textContent='Master Match';
    title.style.marginBottom='4px';
    area.appendChild(title);
    
    const inst=document.createElement('div');
    inst.className='puzzle-instruction';
    inst.textContent='👆 Tap a term on the LEFT, then tap its match on the RIGHT.';
    area.appendChild(inst);
    
    const container=document.createElement('div');
    container.className='fl-container';
    
    const leftCol=document.createElement('div');
    leftCol.className='fl-col';
    const rightCol=document.createElement('div');
    rightCol.className='fl-col';
    
    let selectedLeft=null;
    const matched=new Set();
    let wrongCount=0;
    let flOverride=false;
    
    const shuffledRight=[...finalLockPairs].sort(()=>Math.random()-.5);
    
    finalLockPairs.forEach((pair,i)=>{
      const card=document.createElement('div');
      card.className='card fl-card';
      card.textContent=pair.term;
      card.style.borderColor=pair.color;
      card.style.boxShadow=`0 0 8px ${pair.color}40`;
      card.setAttribute('data-fl-idx',String(i));
      card.setAttribute('data-fl-side','left');
      
      card.onclick=()=>{
        if(matched.has(i)||card.classList.contains('fl-matched'))return;
        leftCol.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
        selectedLeft=i;
      };
      leftCol.appendChild(card);
    });
    
    shuffledRight.forEach((pair,j)=>{
      const origIdx=finalLockPairs.indexOf(pair);
      const card=document.createElement('div');
      card.className='card fl-card';
      card.textContent=pair.match;
      card.style.borderColor=pair.color;
      card.style.boxShadow=`0 0 8px ${pair.color}40`;
      card.setAttribute('data-fl-idx',String(origIdx));
      card.setAttribute('data-fl-side','right');
      
      card.onclick=()=>{
        if(selectedLeft===null||matched.has(origIdx)||card.classList.contains('fl-matched')||flOverride)return;
        
        if(selectedLeft===origIdx){
          // Correct match
          matched.add(origIdx);
          card.classList.add('fl-matched','correct');
          const leftCard=leftCol.querySelector(`[data-fl-idx="${origIdx}"]`);
          if(leftCard){leftCard.classList.remove('selected');leftCard.classList.add('fl-matched','correct')}
          selectedLeft=null;
          spawnParticles(card.getBoundingClientRect().x+60,card.getBoundingClientRect().y+20,pair.color,8);
          
          if(matched.size===3){
            setTimeout(()=>showEscapeAnimation(),600);
          }
        }else{
          // Wrong match
          wrongCount++;
          const attemptedLeft=selectedLeft;
          card.classList.add('wrong');
          setTimeout(()=>card.classList.remove('wrong'),500);
          selectedLeft=null;
          leftCol.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
          
          if(wrongCount===1){
            // Scanner: pre-match 2 of 3 pairs
            $('scannerText').textContent='📡 Final scan — each pair came from a different room. Match the room colors to remember where you solved each one.';
            $('scannerOverlay').style.display='flex';
            $('scannerOverlay').classList.add('active');
            state.scannerOpen=true;
            
            // Pre-match 2 pairs (not the attempted one)
            setTimeout(()=>{
              if(flOverride)return;// override already fired, skip
              closeScanner();
              const unmatched=[...Array(3).keys()].filter(i=>!matched.has(i)&&i!==attemptedLeft);
              unmatched.slice(0,2).forEach((idx,delay)=>{
                setTimeout(()=>{
                  if(flOverride)return;
                  matched.add(idx);
                  const lc=leftCol.querySelector(`[data-fl-idx="${idx}"]`);
                  const rc=rightCol.querySelector(`[data-fl-idx="${idx}"]`);
                  if(lc){lc.classList.add('fl-matched','correct');lc.classList.remove('selected')}
                  if(rc){rc.classList.add('fl-matched','correct')}
                  if(matched.size===3)setTimeout(()=>showEscapeAnimation(),600);
                },delay*500);
              });
            },1500);
          }else if(wrongCount>=2){
            flOverride=true;
            closeScanner();
            showOverrideMsg();
            // Auto-solve all remaining
            setTimeout(()=>{
              const unmatched=[...Array(3).keys()].filter(i=>!matched.has(i));
              let d=0;
              unmatched.forEach(idx=>{
                setTimeout(()=>{
                  matched.add(idx);
                  const lc=leftCol.querySelector(`[data-fl-idx="${idx}"]`);
                  const rc=rightCol.querySelector(`[data-fl-idx="${idx}"]`);
                  if(lc){lc.classList.add('fl-matched','correct');lc.classList.remove('selected')}
                  if(rc){rc.classList.add('fl-matched','correct')}
                  if(matched.size===3)setTimeout(()=>showEscapeAnimation(),600);
                },d*500);
                d++;
              });
            },400);
          }
        }
      };
      rightCol.appendChild(card);
    });
    
    container.appendChild(leftCol);
    container.appendChild(rightCol);
    area.appendChild(container);
  }catch(e){showEscapeReport()}
}

        ${badgeList.length>0?`

        $('copyReportBtn').textContent='Copy failed';
      }
    };
  }catch(e){}
}

// ===== EMERGENCY SKIP =====
// Long-press on room label
function setupEmergencySkip(){
  const label=$('roomLabel');
  let pressTimer=null;
  let confirmed=false;
  
  function startPress(e){
    if(pressTimer)clearTimeout(pressTimer);
    confirmed=false;
    pressTimer=setTimeout(()=>{
      if(!confirmed){
        confirmed=true;
        label.style.color='var(--warn)';
        label.textContent='Hold again to reveal';
        let pressTimer2=null;
        const startPress2=()=>{
          pressTimer2=setTimeout(()=>{
            triggerEmergencySkip();
          },2000);
        };
        const endPress2=()=>{
          if(pressTimer2)clearTimeout(pressTimer2);
          setTimeout(()=>{
            confirmed=false;
            updateTopBar();
          },3000);
        };
        label.addEventListener('mousedown',startPress2,{once:true});
        label.addEventListener('touchstart',startPress2,{once:true});
        label.addEventListener('mouseup',endPress2,{once:true});
        label.addEventListener('touchend',endPress2,{once:true});
      }
    },5000);
  }
  function endPress(){
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null}
  }
  
  label.addEventListener('mousedown',startPress);
  label.addEventListener('touchstart',startPress);
  label.addEventListener('mouseup',endPress);
  label.addEventListener('touchend',endPress);
  label.addEventListener('mouseleave',endPress);
}

// Shift+S
document.addEventListener('keydown',(e)=>{
  if(e.key==='S'&&e.shiftKey){
    if(!state.shiftSStart)state.shiftSStart=Date.now();
  }
});
document.addEventListener('keyup',(e)=>{
  if(e.key==='S'){
    if(state.shiftSStart&&Date.now()-state.shiftSStart>=2000){
      triggerEmergencySkip();
    }
    state.shiftSStart=0;
  }
});

function triggerEmergencySkip(){
  try{
    closeAllOverlays();
    
    // Detect screen state
    const gameActive=$('gameScreen').classList.contains('active');
    if(!gameActive)return;
    
    const label=$('roomLabel').textContent;
    const isFinalLock=label.includes('Final Lock');
    
    if(isFinalLock){
      showEscapeReport();
      return;
    }
    
    const room=state.currentRoom;
    state.skippedRooms[room]=true;
    
    // Reveal both digits
    for(let p=0;p<2;p++){
      const digit=rooms[room].code[p];
      updateVaultDigit(room,p,digit);
      const pk=pkey(room,p);
      if(state.puzzleFirstTry[pk]===undefined){
        state.puzzleFirstTry[pk]=false;
        state.puzzlesSolved++;
      }
    }
    $('clearedCount').textContent=state.puzzlesSolved;
    
    // Go to code entry
    showCodeEntry(room);
  }catch(e){}
}

// ===== INIT =====
setupEmergencySkip();
