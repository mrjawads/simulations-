<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mr. Jawad's Simulations — Sugar, Insulin, and Balance</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;font-family:'Segoe UI',Tahoma,sans-serif;background:radial-gradient(ellipse at top,#1a2a52 0%,#0a1228 50%,#050810 100%);color:#fff;overflow-x:hidden;min-height:100vh}
  #app{max-width:1480px;margin:0 auto;padding:10px}
  header{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,#4CAF50 0%,#7E57C2 50%,#9C27B0 100%);padding:14px 24px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);margin-bottom:10px;border:1px solid rgba(255,255,255,.1);position:relative;overflow:hidden}
  header::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.15) 50%,transparent 100%);transform:translateX(-100%);animation:shine 6s infinite}
  @keyframes shine{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
  header h1{font-size:22px;letter-spacing:.5px;text-shadow:0 2px 4px rgba(0,0,0,.4);position:relative;z-index:1}
  header .mission{font-size:14px;background:rgba(0,0,0,.35);padding:8px 16px;border-radius:20px;font-weight:700;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px);position:relative;z-index:1}
  .layout{display:grid;grid-template-columns:290px 1fr;gap:10px}
  .panel{background:linear-gradient(160deg,#1f2a4a 0%,#13192e 100%);border-radius:16px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;color:#FFD54F;border-bottom:2px solid rgba(255,213,79,.25);padding-bottom:6px}

  .hud{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .stat{background:linear-gradient(160deg,#2a3760,#1a2342);border-radius:12px;padding:10px 8px;text-align:center;border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);position:relative;overflow:hidden}
  .stat .lbl{font-size:10px;text-transform:uppercase;color:#90CAF9;letter-spacing:1px;font-weight:600}
  .stat .val{font-size:24px;font-weight:bold;margin-top:3px;text-shadow:0 2px 4px rgba(0,0,0,.4);transition:transform .2s}
  .stat .val.bump{animation:bump .35s}
  @keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.3);color:#FFEB3B}}
  .zone-ok{color:#69F0AE}.zone-warn{color:#FFD54F}.zone-bad{color:#FF5252}

  .control{margin-bottom:14px}
  .ctrl-label{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:bold;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
  .lock-icon{font-size:18px;filter:drop-shadow(0 0 3px rgba(255,213,79,.6))}
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#0a1020;padding:5px;border-radius:11px;border:1px solid rgba(255,255,255,.05)}
  .seg button{padding:13px 4px;border:none;background:transparent;color:#8b96b8;font-weight:bold;font-size:13px;border-radius:8px;cursor:pointer;transition:all .25s;font-family:inherit}
  .seg button.active{background:linear-gradient(160deg,#66BB6A,#2E7D32);color:#fff;box-shadow:0 4px 12px rgba(76,175,80,.5),inset 0 1px 0 rgba(255,255,255,.25);transform:scale(1.05)}
  .seg button.insulin.active{background:linear-gradient(160deg,#42A5F5,#1565C0);box-shadow:0 4px 12px rgba(66,165,245,.5),inset 0 1px 0 rgba(255,255,255,.25)}
  .seg.locked button{cursor:not-allowed;opacity:.45}
  .seg.locked button.active{opacity:.9;background:linear-gradient(160deg,#5d6b8a,#3a4560);box-shadow:none}

  .btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;font-family:inherit;transition:transform .12s,box-shadow .2s}
  .btn:active{transform:scale(.96)}
  .btn-release{background:linear-gradient(160deg,#FF7043,#D84315);color:#fff;box-shadow:0 6px 18px rgba(255,87,34,.5),inset 0 1px 0 rgba(255,255,255,.25);margin-bottom:8px;font-size:18px;padding:18px;position:relative;overflow:hidden}
  .btn-release:hover:not(:disabled){box-shadow:0 8px 22px rgba(255,87,34,.7);transform:translateY(-1px)}
  .btn-release:disabled{background:linear-gradient(160deg,#555,#333);cursor:not-allowed;box-shadow:none;color:#888}
  .btn-secondary{background:linear-gradient(160deg,#455A64,#263238);color:#fff;font-size:12px;padding:11px;margin-bottom:6px;box-shadow:0 3px 8px rgba(0,0,0,.3)}
  .btn-secondary:hover{background:linear-gradient(160deg,#546E7A,#37474F)}

  #arena-wrap{position:relative;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 10px 40px rgba(0,0,0,.6),inset 0 0 60px rgba(0,0,0,.4)}
  canvas{display:block;width:100%;height:auto;background:transparent}
  .arena-overlay{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none;z-index:5}
  .badge{background:rgba(0,0,0,.75);padding:8px 14px;border-radius:20px;font-weight:bold;font-size:13px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);box-shadow:0 4px 10px rgba(0,0,0,.4)}
  .badge.boost{background:linear-gradient(90deg,#FFD700,#FF9800);color:#000;animation:pulse 1s infinite;border:1px solid rgba(255,255,255,.5)}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 4px 14px rgba(255,193,7,.6)}50%{transform:scale(1.08);box-shadow:0 6px 20px rgba(255,193,7,.9)}}

  .feedback{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;font-weight:900;text-shadow:0 4px 24px rgba(0,0,0,.95),0 0 50px currentColor;pointer-events:none;opacity:0;transition:opacity .3s;z-index:10;letter-spacing:3px}
  .feedback.show{opacity:1;animation:popIn .9s cubic-bezier(.34,1.56,.64,1)}
  @keyframes popIn{0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg)}60%{transform:translate(-50%,-50%) scale(1.4) rotate(5deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}

  #arena-wrap.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translate(0)}10%,30%,50%,70%,90%{transform:translate(-6px,2px)}20%,40%,60%,80%{transform:translate(6px,-2px)}}

  .results-section{margin-top:12px}
  .results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .copy-btn{background:linear-gradient(160deg,#26A69A,#00695C);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-weight:bold;cursor:pointer;font-size:13px;font-family:inherit;box-shadow:0 4px 12px rgba(38,166,154,.4);transition:all .2s}
  .copy-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(38,166,154,.5)}
  table{width:100%;border-collapse:collapse;background:#0a1020;border-radius:11px;overflow:hidden;font-size:13px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
  th{background:linear-gradient(90deg,#1565C0,#0D47A1);padding:11px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:1px}
  td{padding:9px 11px;border-top:1px solid rgba(255,255,255,.05)}
  tr.row-good td{background:rgba(76,175,80,.18)}
  tr.row-warn td{background:rgba(255,213,79,.16)}
  tr.row-bad td{background:rgba(244,67,54,.18)}
  tr.new-row{animation:slideIn .5s}
  @keyframes slideIn{0%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
  .response-pill{display:inline-block;padding:4px 11px;border-radius:14px;font-weight:bold;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  .pill-good{background:linear-gradient(90deg,#4CAF50,#388E3C);color:#fff}
  .pill-warn{background:linear-gradient(90deg,#FFC107,#FFA000);color:#000}
  .pill-bad{background:linear-gradient(90deg,#EF5350,#C62828);color:#fff}

  .status-msg{text-align:center;padding:12px;margin:10px 0;border-radius:11px;font-weight:bold;font-size:14px;box-shadow:0 4px 10px rgba(0,0,0,.3)}
  .status-info{background:linear-gradient(90deg,rgba(33,150,243,.25),rgba(33,150,243,.15));border:1px solid #2196F3}
  .status-extra{background:linear-gradient(90deg,#FFD700,#FFA000);color:#000;animation:pulse 1.2s infinite}
  .status-done{background:linear-gradient(90deg,#4CAF50,#2E7D32);box-shadow:0 6px 20px rgba(76,175,80,.5)}

  @media(max-width:900px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🩸 Mr. Jawad's Simulations — Sugar, Insulin, and Balance</h1>
    <div class="mission">Mission: Survive 8 meals</div>
  </header>

  <div class="layout">
    <div class="panel">
      <h2>📊 HUD</h2>
      <div class="hud">
        <div class="stat"><div class="lbl">Round</div><div class="val" id="hud-round">1/8</div></div>
        <div class="stat"><div class="lbl">Score</div><div class="val" id="hud-score">0</div></div>
        <div class="stat"><div class="lbl">Streak</div><div class="val" id="hud-streak">0</div></div>
        <div class="stat"><div class="lbl">Zone</div><div class="val zone-ok" id="hud-zone">OK</div></div>
      </div>

      <h2>🎛️ Controls</h2>
      <div class="control">
        <div class="ctrl-label"><span>🍩 Food</span><span class="lock-icon" id="food-lock"></span></div>
        <div class="seg" id="food-seg">
          <button data-v="1">LOW</button>
          <button data-v="2" class="active">MED</button>
          <button data-v="3">HIGH</button>
        </div>
      </div>
      <div class="control">
        <div class="ctrl-label"><span>💉 Insulin</span><span class="lock-icon" id="insulin-lock"></span></div>
        <div class="seg" id="insulin-seg">
          <button class="insulin" data-v="1">LOW</button>
          <button class="insulin active" data-v="2">MED</button>
          <button class="insulin" data-v="3">HIGH</button>
        </div>
      </div>

      <button class="btn btn-release" id="btn-release">▶ RELEASE</button>
      <button class="btn btn-secondary" id="btn-reset">🔄 Reset Round</button>
      <button class="btn btn-secondary" id="btn-newrun">🆕 New Run</button>
    </div>

    <div class="panel" style="padding:8px">
      <div id="arena-wrap">
        <canvas id="arena" width="1100" height="680"></canvas>
        <div class="arena-overlay">
          <div class="badge" id="locked-badge">🔒 Food Locked — Pick Insulin</div>
          <div class="badge boost" id="boost-badge" style="display:none">⚡ PANCREAS BOOST!</div>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>

      <div class="status-msg status-info" id="status">Pick the OPEN variable, then press RELEASE.</div>

      <div class="results-section">
        <div class="results-header">
          <h2 style="font-size:13px;color:#FFD54F;margin:0">📋 Data Log</h2>
          <button class="copy-btn" id="copy-btn">📋 Copy Table</button>
        </div>
        <table>
          <thead><tr><th>Round</th><th>Food</th><th>Insulin</th><th>Body Response</th></tr></thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

const state = {
  round: 1, score: 0, streak: 0, greenCount: 0,
  food: 2, insulin: 2,
  lockedVar: 'food',
  rounds: [], busy: false, boostReady: false,
  bloodSugar: 50, zone: 'ok', generation: 0,
  cellGlucose: 0.5, pancreasActivity: 0, stomachContents: 0,
  releaseFlash: 0, scanLine: 0
};
const LEVELS = {1:'Low', 2:'Med', 3:'High'};
const $ = id => document.getElementById(id);
const canvas = $('arena'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let audioCtx = null;
function beep(freq, dur, type='sine', vol=0.08){
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}
function chord(freqs,dur,type='sine',vol=0.06){freqs.forEach(f=>beep(f,dur,type,vol));}

function updateLocks(){
  state.lockedVar = state.round <= 4 ? 'food' : 'insulin';
  const foodSeg = $('food-seg'), insSeg = $('insulin-seg');
  const foodLock = $('food-lock'), insLock = $('insulin-lock');
  const badge = $('locked-badge');
  if(state.lockedVar === 'food'){
    foodSeg.classList.add('locked'); insSeg.classList.remove('locked');
    foodLock.textContent = '🔒'; insLock.textContent = '';
    badge.textContent = '🔒 Food Locked — Pick Insulin';
    const lockedFood = ((state.round - 1) % 3) + 1;
    state.food = lockedFood; setSeg('food-seg', lockedFood);
  } else {
    insSeg.classList.add('locked'); foodSeg.classList.remove('locked');
    insLock.textContent = '🔒'; foodLock.textContent = '';
    badge.textContent = '🔒 Insulin Locked — Pick Food';
    const lockedIns = ((state.round - 5) % 3) + 1;
    state.insulin = lockedIns; setSeg('insulin-seg', lockedIns);
  }
}
function setSeg(segId, val){
  $(segId).querySelectorAll('button').forEach(b=>{
    b.classList.toggle('active', +b.dataset.v === val);
  });
}

$('food-seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  if($('food-seg').classList.contains('locked')) return;
  state.food = +b.dataset.v; setSeg('food-seg', state.food); beep(440,0.05);
});
$('insulin-seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  if($('insulin-seg').classList.contains('locked')) return;
  state.insulin = +b.dataset.v; setSeg('insulin-seg', state.insulin); beep(660,0.05);
});
$('btn-release').addEventListener('click', releaseRound);
$('btn-reset').addEventListener('click', ()=>{
  if(state.busy) return;
  $('status').textContent = 'Pick the OPEN variable, then press RELEASE.';
});
$('btn-newrun').addEventListener('click', newRun);
$('copy-btn').addEventListener('click', copyTable);

function evaluateRound(){
  let response, zone, score = 0, isGreen = false;
  const diff = state.insulin - state.food;
  if(state.boostReady){
    response = 'Good (in OK Zone)'; zone='ok'; score=10; isGreen=true;
    state.boostReady = false; $('boost-badge').style.display='none';
  } else if(diff === 0){ response='Good (in OK Zone)'; zone='ok'; score=10; isGreen=true; }
  else if(diff === 1){ response='Low Sugar (warning)'; zone='warn'; score=5; }
  else if(diff === 2){ response='Crash (too much insulin)'; zone='bad'; score=0; }
  else if(diff === -1){ response='High Sugar (warning)'; zone='warn'; score=5; }
  else if(diff === -2){ response='Spike (not enough insulin)'; zone='bad'; score=0; }
  return {response, zone, score, isGreen, diff};
}

function releaseRound(){
  try {
    if(state.busy) return;
    state.busy = true; $('btn-release').disabled = true;
    state.generation++; const myGen = state.generation;
    const result = evaluateRound();
    const targetSugar = result.zone==='ok' ? 50 :
                        result.diff === 1 ? 28 :
                        result.diff === 2 ? 10 :
                        result.diff === -1 ? 75 : 92;
    state.zone = result.zone;
    state.releaseFlash = 1;
    animateRelease(targetSugar, result, myGen);
    setTimeout(()=>{
      if(state.generation === myGen && state.busy) finalizeRound(result);
    }, 7000);
  } catch(e){
    console.error(e); state.busy = false; $('btn-release').disabled = false;
  }
}

function finalizeRound(result){
  if(!state.busy) return;
  state.rounds.push({
    round: state.round, food: LEVELS[state.food], insulin: LEVELS[state.insulin],
    response: result.response, zone: result.zone
  });
  state.score += result.score;
  if(result.isGreen){ state.streak++; state.greenCount++; }
  else { state.streak = 0; }
  if(state.streak >= 3 && !state.boostReady && state.round < 8){
    state.boostReady = true; $('boost-badge').style.display = 'block';
    showFeedback('⚡ BOOST!', '#FFD700');
    chord([523,659,784],0.3,'triangle',0.1);
  }
  // Camera shake on bad
  if(result.zone === 'bad'){
    document.getElementById('arena-wrap').classList.add('shake');
    setTimeout(()=>document.getElementById('arena-wrap').classList.remove('shake'), 400);
  }
  // Stat bumps
  bumpStat('hud-score'); if(result.isGreen) bumpStat('hud-streak');
  showFeedback(
    result.zone==='ok'?'✅ GOOD!':result.zone==='warn'?'⚠️ WARNING':'❌ CRASH!',
    result.zone==='ok'?'#69F0AE':result.zone==='warn'?'#FFD54F':'#FF5252'
  );
  // Score popup at center
  scorePopups.push({
    x:W*0.5, y:H*0.4, text:result.score>0?'+'+result.score:'0',
    color:result.zone==='ok'?'#FFEB3B':result.zone==='warn'?'#FFA726':'#888',
    life:60, vy:-2
  });
  renderTable(); updateHUD();
  setTimeout(()=>{
    advanceRound(); state.busy = false;
    if(state.rounds.length < 8) $('btn-release').disabled = false;
  }, 1300);
}

function bumpStat(id){
  const el = $(id);
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
}

function advanceRound(){
  if(state.round >= 8){
    if(state.greenCount >= 5){
      $('status').className = 'status-msg status-done';
      $('status').textContent = '🏆 EXTRA CREDIT COMPLETE! '+state.greenCount+' green rounds!';
    } else {
      $('status').className = 'status-msg status-info';
      $('status').textContent = '🏁 8 rounds done. Green rounds: '+state.greenCount+'/8. Press New Run!';
    }
    return;
  }
  state.round++; updateHUD(); updateLocks();
  if(state.round === 6){
    $('status').className = 'status-msg status-extra';
    $('status').textContent = '⭐ Required Complete! Continue for Extra Credit!';
  } else {
    $('status').className = 'status-msg status-info';
    $('status').textContent = 'Round '+state.round+' — pick the OPEN variable, then press RELEASE.';
  }
}

function newRun(){
  state.round=1; state.score=0; state.streak=0; state.greenCount=0;
  state.food=2; state.insulin=2; state.rounds=[]; state.busy=false;
  state.boostReady=false; state.bloodSugar=50; state.zone='ok';
  state.cellGlucose=0.5; state.pancreasActivity=0; state.stomachContents=0;
  state.generation++;
  particles.length=0; foodIcons.length=0; surpriseSnack=null;
  glucoseDots.length=0; sparkles.length=0; scorePopups.length=0;
  bgMolecules.length=0; for(let i=0;i<15;i++) spawnBgMolecule();
  $('boost-badge').style.display='none'; $('btn-release').disabled = false;
  $('status').className='status-msg status-info';
  $('status').textContent='Pick the OPEN variable, then press RELEASE.';
  renderTable(); updateHUD(); updateLocks();
}

function updateHUD(){
  $('hud-round').textContent = Math.min(state.round,8)+'/8';
  $('hud-score').textContent = state.score;
  $('hud-streak').textContent = state.streak;
  const zEl = $('hud-zone');
  zEl.textContent = state.zone==='ok'?'OK':state.zone==='warn'?'WARN':'BAD';
  zEl.className = 'val ' + (state.zone==='ok'?'zone-ok':state.zone==='warn'?'zone-warn':'zone-bad');
}

function showFeedback(text, color){
  const f = $('feedback');
  f.textContent = text; f.style.color = color;
  f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 1100);
  if(color==='#69F0AE') chord([523,659,784,1047],0.18,'sine',0.1);
  else if(color==='#FFD54F') beep(440,0.25,'square',0.1);
  else if(color==='#FF5252') chord([180,140,100],0.4,'sawtooth',0.1);
}

function renderTable(){
  const tb = $('results-body');
  tb.innerHTML = state.rounds.map((r,i)=>{
    const cls = r.zone==='ok'?'row-good':r.zone==='warn'?'row-warn':'row-bad';
    const pcls = r.zone==='ok'?'pill-good':r.zone==='warn'?'pill-warn':'pill-bad';
    const newCls = i===state.rounds.length-1?' new-row':'';
    return `<tr class="${cls}${newCls}"><td>${r.round}</td><td>${r.food}</td><td>${r.insulin}</td><td><span class="response-pill ${pcls}">${r.response}</span></td></tr>`;
  }).join('');
}

function copyTable(){
  const header = 'Round\tFood Amount\tInsulin Dose\tBody Response';
  const lines = state.rounds.map(r=>`${r.round}\t${r.food}\t${r.insulin}\t${r.response}`);
  const text = [header, ...lines].join('\n');
  const btn = $('copy-btn');
  const finish=()=>{btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy Table',2000);};
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(finish).catch(()=>{
      const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
      ta.select();document.execCommand('copy');document.body.removeChild(ta);finish();
    });
  } else {
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);finish();
  }
}

// ============ ANIMATIONS ============
const particles = [];
const glucoseDots = [];
const foodIcons = [];
const sparkles = [];
const scorePopups = [];
const bgMolecules = [];
let surpriseSnack = null;
let pulsePhase = 0, sugarAnim = 50, animatingRelease = false;

const FLOW_SEED = [];
for(let i=0;i<24;i++) FLOW_SEED.push({offset:i*0.042, layer:i%2});

function spawnBgMolecule(){
  bgMolecules.push({
    x: Math.random()*W, y: Math.random()*H,
    vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
    size: 2+Math.random()*4, opacity:0.05+Math.random()*0.15,
    rot:Math.random()*Math.PI*2, vrot:(Math.random()-0.5)*0.02,
    type: Math.random() < 0.5 ? 'hex' : 'dot'
  });
}
for(let i=0;i<15;i++) spawnBgMolecule();

function animateRelease(targetSugar, result, gen){
  animatingRelease = true;
  state.stomachContents = state.food / 3;

  for(let i=0;i<state.food*5;i++){
    const angle = Math.random()*Math.PI*2;
    foodIcons.push({
      x: W*0.16 + Math.cos(angle)*30,
      y: H*0.05 + Math.random()*20,
      vy: 1.5+Math.random()*1.5, vx:(Math.random()-0.5)*0.5,
      life: 160, rot: Math.random()*Math.PI*2, vrot:(Math.random()-0.5)*0.15,
      emoji:['🍩','🍬','🍞','🍪','🍰','🧁'][Math.floor(Math.random()*6)],
      size: 24+Math.random()*10
    });
  }
  beep(220,0.15,'sine',0.08);

  setTimeout(()=>{
    if(state.generation!==gen) return;
    state.pancreasActivity = 1;
    for(let i=0;i<state.insulin*8;i++){
      setTimeout(()=>{
        if(state.generation!==gen) return;
        const targetCell = CELL_POSITIONS[Math.floor(Math.random()*CELL_POSITIONS.length)];
        particles.push({
          x: W*0.34 + (Math.random()-0.5)*40,
          y: H*0.55 + (Math.random()-0.5)*25,
          tx: targetCell.x + (Math.random()-0.5)*30,
          ty: targetCell.y + (Math.random()-0.5)*30,
          progress: 0, speed: 0.008+Math.random()*0.005,
          trail: [], targetCell, docked:false
        });
      }, i*45);
    }
    beep(440,0.12,'triangle',0.08);
    setTimeout(()=>beep(660,0.12,'triangle',0.06), 200);
    setTimeout(()=>beep(880,0.12,'triangle',0.05), 400);

    for(let i=0;i<state.food*5;i++){
      setTimeout(()=>{
        if(state.generation!==gen) return;
        const targetCell = CELL_POSITIONS[Math.floor(Math.random()*CELL_POSITIONS.length)];
        glucoseDots.push({
          x: W*0.2, y: H*0.32,
          tx: targetCell.x + (Math.random()-0.5)*20,
          ty: targetCell.y + (Math.random()-0.5)*20,
          progress: 0, speed: 0.0055+Math.random()*0.003,
          rot: Math.random()*Math.PI*2
        });
      }, 700+i*70);
    }
  }, 600);

  if(Math.random() < 0.3){
    setTimeout(()=>{
      if(state.generation!==gen) return;
      surpriseSnack = {x:W*0.2, y:H*0.08, vy:-3, bounces:3, life:140};
    }, 300);
  }

  const startSugar = state.bloodSugar;
  const animStart = performance.now();
  const animDur = 2400;
  function tick(now){
    if(state.generation!==gen) return;
    const t = Math.min(1, (now-animStart)/animDur);
    const eased = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
    state.bloodSugar = startSugar + (targetSugar - startSugar) * eased;
    sugarAnim = state.bloodSugar;
    state.cellGlucose = Math.max(0, Math.min(1, sugarAnim/100));
    if(t < 1) requestAnimationFrame(tick);
    else {
      animatingRelease = false;
      state.pancreasActivity = 0;
      if(result.zone === 'ok'){
        for(let i=0;i<35;i++){
          sparkles.push({
            x: W*0.7+(Math.random()-0.5)*220,
            y: H*0.42+(Math.random()-0.5)*220,
            vx:(Math.random()-0.5)*5, vy:-2-Math.random()*4,
            life:70, color:'#69F0AE'
          });
        }
      }
      setTimeout(()=>{
        if(state.generation===gen) finalizeRound(result);
      }, 500);
    }
  }
  requestAnimationFrame(tick);
}

const CELL_POSITIONS = [
  {x:W*0.6,  y:H*0.32, r:30},
  {x:W*0.68, y:H*0.28, r:26},
  {x:W*0.74, y:H*0.42, r:32},
  {x:W*0.62, y:H*0.46, r:28},
  {x:W*0.55, y:H*0.42, r:30},
  {x:W*0.78, y:H*0.55, r:27},
  {x:W*0.66, y:H*0.58, r:31},
  {x:W*0.72, y:H*0.65, r:26},
  {x:W*0.56, y:H*0.6,  r:25}
];

function draw(){
  try {
    pulsePhase += 0.04;
    state.scanLine = (state.scanLine + 1.5) % H;
    if(state.releaseFlash > 0) state.releaseFlash -= 0.04;

    ctx.clearRect(0,0,W,H);

    // Layered background
    drawBackground();
    drawBgMolecules();
    drawScanLine();

    drawArenaFrame();
    drawBloodVessels();
    drawAmbientFlow();
    drawStomach();
    drawPancreas();
    drawGlucoseDots();
    drawCells();
    drawParticles();
    drawSparkles();
    drawScorePopups();
    drawFoodIcons();
    drawSurpriseSnack();
    drawSugarMeter();
    drawFaceBadge();
    drawVignette();

    if(state.releaseFlash > 0){
      ctx.fillStyle = `rgba(255,255,255,${state.releaseFlash*0.18})`;
      ctx.fillRect(0,0,W,H);
    }

    requestAnimationFrame(draw);
  } catch(e){
    console.error('Draw error:', e);
    requestAnimationFrame(draw);
  }
}

function drawBackground(){
  // Multi-layer radial gradient
  const bg = ctx.createRadialGradient(W*0.45, H*0.5, 50, W*0.5, H*0.5, W*0.75);
  bg.addColorStop(0,'#1c2a55');
  bg.addColorStop(0.5,'#0e1530');
  bg.addColorStop(1,'#020610');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Subtle hex grid
  ctx.strokeStyle = 'rgba(80,140,220,.05)';
  ctx.lineWidth = 1;
  const hexSize = 30;
  for(let y=0; y<H+hexSize; y+=hexSize*1.5){
    for(let x=0; x<W+hexSize; x+=hexSize*Math.sqrt(3)){
      const offset = (Math.floor(y/(hexSize*1.5)) % 2) * hexSize*Math.sqrt(3)/2;
      drawHex(x+offset, y, hexSize*0.5);
    }
  }
}

function drawHex(cx, cy, r){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a = (i/6)*Math.PI*2;
    const x = cx+Math.cos(a)*r, y = cy+Math.sin(a)*r;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();
}

function drawScanLine(){
  ctx.save();
  const y = state.scanLine;
  const grad = ctx.createLinearGradient(0, y-30, 0, y+30);
  grad.addColorStop(0, 'rgba(100,200,255,0)');
  grad.addColorStop(0.5, 'rgba(100,200,255,.08)');
  grad.addColorStop(1, 'rgba(100,200,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, y-30, W, 60);
  ctx.restore();
}

function drawBgMolecules(){
  ctx.save();
  bgMolecules.forEach(m=>{
    m.x += m.vx; m.y += m.vy; m.rot += m.vrot;
    if(m.x<-20) m.x = W+20; if(m.x>W+20) m.x = -20;
    if(m.y<-20) m.y = H+20; if(m.y>H+20) m.y = -20;
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rot);
    ctx.globalAlpha = m.opacity;
    if(m.type==='hex'){
      ctx.strokeStyle = '#42A5F5';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a = (i/6)*Math.PI*2;
        const x = Math.cos(a)*m.size, y = Math.sin(a)*m.size;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.stroke();
    } else {
      ctx.fillStyle = '#64B5F6';
      ctx.beginPath();
      ctx.arc(0,0,m.size*0.5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
  ctx.restore();
}

function drawArenaFrame(){
  ctx.save();
  // Subtle medical-scan circular vignette — defines the "inside the body" zone
  const cx = W*0.45, cy = H*0.5;
  const grad = ctx.createRadialGradient(cx, cy, W*0.2, cx, cy, W*0.55);
  grad.addColorStop(0, 'rgba(80,140,210,.06)');
  grad.addColorStop(0.7, 'rgba(80,140,210,.03)');
  grad.addColorStop(1, 'rgba(0,0,0,.3)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
  // "BODY INTERIOR" subtle banner top
  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(120,180,230,.4)';
  ctx.textAlign = 'left';
  ctx.fillText('◉ LIVE BODY SCAN — INTERIOR VIEW', 18, H-18);
  ctx.restore();
}

function drawBloodVessels(){
  ctx.save();
  // Vessel network connecting stomach -> pancreas -> cells, with branching to multiple cell areas
  const vessels = [
    {from:[W*0.22,H*0.32], to:[W*0.34,H*0.55], curve:0},   // stomach -> pancreas
    {from:[W*0.46,H*0.55], to:[W*0.62,H*0.4], curve:-12},  // pancreas -> upper cell cluster
    {from:[W*0.46,H*0.55], to:[W*0.74,H*0.5], curve:-8},   // pancreas -> middle cells
    {from:[W*0.46,H*0.55], to:[W*0.66,H*0.62], curve:5},   // pancreas -> lower cells
    {from:[W*0.22,H*0.22], to:[W*0.62,H*0.4], curve:-50},  // stomach -> cells (top arc, glucose path)
    {from:[W*0.62,H*0.4], to:[W*0.78,H*0.32], curve:-3},   // cell-to-cell branch upper
    {from:[W*0.74,H*0.5], to:[W*0.82,H*0.62], curve:5}     // cell-to-cell branch lower
  ];
  // Outer walls
  vessels.forEach(v=>{
    ctx.strokeStyle = '#5D1A1A';
    ctx.lineWidth = 18; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(v.from[0], v.from[1]);
    const mx = (v.from[0]+v.to[0])/2, my = (v.from[1]+v.to[1])/2;
    ctx.quadraticCurveTo(mx+v.curve, my+v.curve, v.to[0], v.to[1]);
    ctx.stroke();
  });
  // Inner blood
  vessels.forEach(v=>{
    const grad = ctx.createLinearGradient(v.from[0],v.from[1],v.to[0],v.to[1]);
    grad.addColorStop(0,'#D32F2F');
    grad.addColorStop(0.5,'#EF5350');
    grad.addColorStop(1,'#C62828');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 12;
    ctx.beginPath();
    ctx.moveTo(v.from[0], v.from[1]);
    const mx = (v.from[0]+v.to[0])/2, my = (v.from[1]+v.to[1])/2;
    ctx.quadraticCurveTo(mx+v.curve, my+v.curve, v.to[0], v.to[1]);
    ctx.stroke();
  });
  // Inner highlight
  vessels.forEach(v=>{
    ctx.strokeStyle = 'rgba(255,180,180,.6)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(v.from[0], v.from[1]);
    const mx = (v.from[0]+v.to[0])/2, my = (v.from[1]+v.to[1])/2;
    ctx.quadraticCurveTo(mx+v.curve, my+v.curve-3, v.to[0], v.to[1]);
    ctx.stroke();
  });
  ctx.restore();
}

function drawAmbientFlow(){
  ctx.save();
  const speed = pulsePhase * 0.45;
  const paths = [
    {fx:W*0.22, fy:H*0.32, tx:W*0.34, ty:H*0.55},
    {fx:W*0.46, fy:H*0.55, tx:W*0.62, ty:H*0.4},
    {fx:W*0.46, fy:H*0.55, tx:W*0.74, ty:H*0.5},
    {fx:W*0.46, fy:H*0.55, tx:W*0.66, ty:H*0.62},
    {fx:W*0.22, fy:H*0.22, tx:W*0.62, ty:H*0.4},
    {fx:W*0.62, fy:H*0.4,  tx:W*0.78, ty:H*0.32}
  ];
  paths.forEach((p, pi)=>{
    FLOW_SEED.forEach((s,i)=>{
      const t = ((s.offset + speed + pi*0.1) % 1);
      const x = p.fx + (p.tx-p.fx)*t;
      const y = p.fy + (p.ty-p.fy)*t;
      ctx.fillStyle = `rgba(255,170,170,${0.5+s.layer*0.2})`;
      ctx.beginPath();
      ctx.ellipse(x, y, 4.5, 3, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(180,30,30,.3)';
      ctx.beginPath();
      ctx.ellipse(x, y, 2, 1.3, 0, 0, Math.PI*2);
      ctx.fill();
    });
  });
  ctx.restore();
}

function drawStomach(){
  const cx = W*0.2, cy = H*0.27, r = 80;
  const pulse = 1 + Math.sin(pulsePhase*1.2)*0.04 + state.stomachContents*0.1;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  ctx.shadowColor = 'rgba(255,100,50,.5)'; ctx.shadowBlur = 25;
  // Stomach body
  const g = ctx.createRadialGradient(-18,-22, 8, 0,5, r);
  g.addColorStop(0,'#FFE0D0');
  g.addColorStop(0.4,'#FF8A65');
  g.addColorStop(1,'#7A2010');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, -r*0.85);
  ctx.bezierCurveTo(r*0.95, -r*0.85, r*1.15, 0, r*0.85, r*0.7);
  ctx.bezierCurveTo(r*0.4, r*1.0, -r*0.7, r*1.0, -r*0.95, r*0.5);
  ctx.bezierCurveTo(-r*1.15, -r*0.3, -r*0.6, -r*0.85, 0, -r*0.85);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  // Outline
  ctx.strokeStyle = '#2E0A05'; ctx.lineWidth = 3;
  ctx.stroke();
  // Inner texture lines
  ctx.strokeStyle = 'rgba(60,15,5,.5)'; ctx.lineWidth = 1.5;
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.ellipse(0, -10+i*8, 32-i*4, 4, 0, 0, Math.PI);
    ctx.stroke();
  }
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.beginPath();
  ctx.ellipse(-22,-25, 18, 10, -.3, 0, Math.PI*2);
  ctx.fill();
  // Secondary highlight
  ctx.fillStyle = 'rgba(255,255,255,.2)';
  ctx.beginPath();
  ctx.ellipse(-12,-15, 8, 4, -.3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  drawLabel('STOMACH', cx, cy + 100, '#FFCCBC');
}

function drawPancreas(){
  const cx = W*0.34, cy = H*0.55;
  const baseGlow = state.pancreasActivity * (0.7 + Math.sin(pulsePhase*4)*0.3);
  const boostPulse = state.boostReady ? 1 + Math.sin(pulsePhase*5)*0.2 : 1;
  const pulse = (1 + Math.sin(pulsePhase*1.5)*0.04) * boostPulse;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.3);
  ctx.scale(pulse, pulse);
  if(state.boostReady){
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 50;
  } else if(baseGlow > 0){
    ctx.shadowColor = '#42A5F5'; ctx.shadowBlur = 38 * baseGlow;
  }
  // Pancreas body - bigger and more prominent
  const g = ctx.createLinearGradient(-100,0, 100,0);
  g.addColorStop(0,'#FFD180');
  g.addColorStop(0.4,'#FFA726');
  g.addColorStop(1,'#BF360C');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(-105, 0);
  ctx.bezierCurveTo(-88, -28, 45, -32, 105, -16);
  ctx.bezierCurveTo(115, 0, 95, 28, 45, 33);
  ctx.bezierCurveTo(-45, 36, -95, 28, -105, 0);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#2E1308'; ctx.lineWidth = 3;
  ctx.stroke();
  // Beta cells (islets) - bigger and more visible
  for(let i=-75;i<=75;i+=18){
    const yOff = Math.sin(i*0.1)*8;
    const cellGlow = baseGlow * (0.5 + Math.sin(pulsePhase*3 + i*0.1)*0.5);
    if(cellGlow > 0.3){
      ctx.shadowColor = '#42A5F5'; ctx.shadowBlur = 12;
    }
    const cg = ctx.createRadialGradient(i, yOff, 0, i, yOff, 5);
    cg.addColorStop(0, '#fff');
    cg.addColorStop(0.5, '#90CAF9');
    cg.addColorStop(1, '#1565C0');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(i, yOff, 4.5, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  // Texture lines
  ctx.strokeStyle = 'rgba(255,255,255,.2)'; ctx.lineWidth = 1;
  for(let i=-80;i<=80;i+=22){
    ctx.beginPath();
    ctx.moveTo(i, -10); ctx.lineTo(i, 10);
    ctx.stroke();
  }
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  ctx.beginPath();
  ctx.ellipse(-22,-20, 38, 7, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  drawLabel('PANCREAS', cx, cy + 70, '#FFE0B2');
}

function drawCells(){
  CELL_POSITIONS.forEach((cell, i)=>{
    const fed = state.cellGlucose;
    let color1, color2, glowColor, membraneColor;
    if(state.zone === 'ok'){
      color1 = '#A5D6A7'; color2 = '#1B5E20'; glowColor = '#69F0AE'; membraneColor = '#2E7D32';
    } else if(state.zone === 'warn'){
      color1 = '#FFE082'; color2 = '#E65100'; glowColor = '#FFD54F'; membraneColor = '#F57C00';
    } else if(sugarAnim < 30){
      color1 = '#90A4AE'; color2 = '#263238'; glowColor = '#607D8B'; membraneColor = '#37474F';
    } else {
      color1 = '#FFAB91'; color2 = '#7F0000'; glowColor = '#FF5252'; membraneColor = '#B71C1C';
    }
    const sizeFactor = state.zone === 'ok' ? 1.05 : sugarAnim < 30 ? 0.7 : 1.1;
    const breath = 1 + Math.sin(pulsePhase*2 + i*0.7)*0.07;
    const r = cell.r * sizeFactor * breath;
    ctx.save();
    // Outer glow
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 20 + (state.zone==='ok'?12:0);
    // Membrane gradient
    const g = ctx.createRadialGradient(cell.x-r*0.3, cell.y-r*0.3, r*0.1, cell.x, cell.y, r);
    g.addColorStop(0, color1);
    g.addColorStop(0.6, color1);
    g.addColorStop(1, color2);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cell.x, cell.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Membrane (thicker)
    ctx.strokeStyle = membraneColor;
    ctx.lineWidth = 3;
    ctx.stroke();
    // Insulin receptors - small bumps around the membrane
    for(let j=0;j<8;j++){
      const ang = (j/8)*Math.PI*2 + pulsePhase*0.3;
      const rx = cell.x + Math.cos(ang)*r;
      const ry = cell.y + Math.sin(ang)*r;
      ctx.fillStyle = state.zone==='ok'?'#69F0AE':membraneColor;
      ctx.beginPath();
      ctx.arc(rx, ry, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
    // Nucleus
    ctx.fillStyle = 'rgba(15,20,40,.65)';
    ctx.beginPath();
    ctx.arc(cell.x+r*0.15, cell.y+r*0.1, r*0.32, 0, Math.PI*2);
    ctx.fill();
    // Nucleus internal structure
    ctx.fillStyle = 'rgba(80,120,200,.4)';
    for(let j=0;j<3;j++){
      const a = (j/3)*Math.PI*2;
      ctx.beginPath();
      ctx.arc(cell.x+r*0.15+Math.cos(a)*r*0.1, cell.y+r*0.1+Math.sin(a)*r*0.1, r*0.07, 0, Math.PI*2);
      ctx.fill();
    }
    // Nucleus highlight
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.beginPath();
    ctx.arc(cell.x+r*0.05, cell.y, r*0.13, 0, Math.PI*2);
    ctx.fill();
    // Glucose hexagons inside (fed cells)
    if(fed > 0.3){
      const dotCount = Math.floor(fed * 6);
      for(let j=0;j<dotCount;j++){
        const a = (j/dotCount)*Math.PI*2 + pulsePhase*0.5;
        const dx = cell.x + Math.cos(a)*r*0.55;
        const dy = cell.y + Math.sin(a)*r*0.55;
        ctx.save();
        ctx.translate(dx,dy);
        ctx.rotate(pulsePhase + j);
        ctx.shadowColor = '#FFEB3B'; ctx.shadowBlur = 8;
        ctx.fillStyle = '#FFEB3B';
        ctx.beginPath();
        for(let k=0;k<6;k++){
          const ka = (k/6)*Math.PI*2;
          const px = Math.cos(ka)*3, py = Math.sin(ka)*3;
          if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      ctx.shadowBlur = 0;
    }
    // Cell highlight (specular)
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.beginPath();
    ctx.ellipse(cell.x-r*0.3, cell.y-r*0.4, r*0.3, r*0.15, -0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  drawLabel('CELLS', W*0.66, H*0.78, '#A5D6A7');
}

function drawSugarMeter(){
  const mx = W*0.93, my = H*0.13, mw = 56, mh = H*0.74;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.7)'; ctx.shadowBlur = 15;
  // Outer frame
  const frameGrad = ctx.createLinearGradient(mx-6, 0, mx+mw+6, 0);
  frameGrad.addColorStop(0, '#2a3760');
  frameGrad.addColorStop(0.5, '#1a2342');
  frameGrad.addColorStop(1, '#2a3760');
  ctx.fillStyle = frameGrad;
  roundRect(ctx, mx-7, my-7, mw+14, mh+14, 9); ctx.fill();
  ctx.shadowBlur = 0;
  // Inner well
  ctx.fillStyle = '#020610';
  roundRect(ctx, mx, my, mw, mh, 4); ctx.fill();
  // Fill
  const fillH = (sugarAnim/100) * mh;
  const fillColor = sugarAnim < 25 ? '#E53935' :
                    sugarAnim < 40 ? '#FFA726' :
                    sugarAnim <= 60 ? '#4CAF50' :
                    sugarAnim <= 75 ? '#FFA726' : '#E53935';
  const grad = ctx.createLinearGradient(0, my+mh-fillH, 0, my+mh);
  grad.addColorStop(0, shade(fillColor, 30));
  grad.addColorStop(0.3, fillColor);
  grad.addColorStop(1, shade(fillColor, -50));
  ctx.fillStyle = grad;
  ctx.fillRect(mx, my+mh-fillH, mw, fillH);
  // Liquid surface
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath();
  const waveY = my+mh-fillH + Math.sin(pulsePhase*2)*1.5;
  ctx.ellipse(mx+mw/2, waveY, mw/2-2, 4, 0, 0, Math.PI*2);
  ctx.fill();
  // Inner shine
  ctx.fillStyle = 'rgba(255,255,255,.2)';
  ctx.fillRect(mx+4, my+mh-fillH+2, 5, fillH-4);
  // Bubbles
  for(let i=0;i<4;i++){
    const bt = (pulsePhase*0.5 + i*0.25) % 1;
    const by = my+mh - bt*fillH;
    if(by > my+mh-fillH+5 && by < my+mh-3){
      ctx.fillStyle = `rgba(255,255,255,${0.4*(1-bt)})`;
      ctx.beginPath();
      const bx = mx + 12 + Math.sin(bt*Math.PI*4 + i)*8;
      ctx.arc(bx, by, 2+bt*2, 0, Math.PI*2);
      ctx.fill();
    }
  }
  // OK zone
  const okTop = my + mh*0.4, okBot = my + mh*0.6;
  ctx.strokeStyle = '#69F0AE'; ctx.lineWidth = 2.5;
  ctx.shadowColor = '#69F0AE'; ctx.shadowBlur = 6;
  ctx.setLineDash([6,4]);
  ctx.strokeRect(mx, okTop, mw, okBot-okTop);
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#69F0AE';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('OK', mx + mw/2, my + mh*0.52);
  // Tick marks
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 1;
  for(let i=1;i<10;i++){
    const ty = my + (mh/10)*i;
    ctx.beginPath(); ctx.moveTo(mx, ty); ctx.lineTo(mx+6, ty); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx+mw-6, ty); ctx.lineTo(mx+mw, ty); ctx.stroke();
  }
  // Title
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('BLOOD', mx + mw/2, my - 24);
  ctx.fillText('SUGAR', mx + mw/2, my - 10);
  ctx.fillStyle = '#FF8A80'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText('HIGH', mx + mw/2, my + 14);
  ctx.fillStyle = '#82B1FF';
  ctx.fillText('LOW', mx + mw/2, my + mh + 18);
  // Animated indicator pointer
  const arrowY = my + mh - fillH;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = fillColor; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(mx-12, arrowY);
  ctx.lineTo(mx-3, arrowY-6);
  ctx.lineTo(mx-3, arrowY+6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawFaceBadge(){
  // Compact "BODY STATE" badge in top-right area (between locked badge and meter)
  const cx = W*0.78, cy = H*0.09, r = 38;
  ctx.save();
  // Badge container
  ctx.shadowColor = 'rgba(0,0,0,.6)'; ctx.shadowBlur = 12;
  const bgGrad = ctx.createLinearGradient(cx-70, cy-r-5, cx+70, cy+r+5);
  bgGrad.addColorStop(0, 'rgba(20,30,60,.85)');
  bgGrad.addColorStop(1, 'rgba(15,20,45,.85)');
  ctx.fillStyle = bgGrad;
  roundRect(ctx, cx-r-50, cy-r-8, r*2+60, r*2+16, 12);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Label
  ctx.fillStyle = '#90CAF9';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('BODY STATE', cx-r-44, cy-r+5);
  // Status text
  let stateText, stateColor;
  if(state.zone==='ok'){ stateText='HEALTHY'; stateColor='#69F0AE'; }
  else if(state.zone==='warn'){ stateText='WARNING'; stateColor='#FFD54F'; }
  else if(sugarAnim<30){ stateText='CRASHED'; stateColor='#FF5252'; }
  else { stateText='SPIKED'; stateColor='#FF5252'; }
  ctx.fillStyle = stateColor;
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText(stateText, cx-r-44, cy+r-2);

  // Face on the right side of the badge
  if(state.zone === 'ok'){ ctx.shadowColor = '#FFEB3B'; ctx.shadowBlur = 12; }
  const g = ctx.createRadialGradient(cx-8, cy-8, 4, cx, cy, r-6);
  let faceColor1, faceColor2;
  if(state.zone === 'ok'){ faceColor1='#FFE082'; faceColor2='#F57C00'; }
  else if(state.zone === 'warn'){ faceColor1='#FFCC80'; faceColor2='#BF360C'; }
  else { faceColor1='#90A4AE'; faceColor2='#263238'; }
  g.addColorStop(0, faceColor1); g.addColorStop(1, faceColor2);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, r-6, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#3E2723'; ctx.lineWidth = 2;
  ctx.stroke();
  // Cheeks
  if(state.zone === 'ok'){
    ctx.fillStyle = 'rgba(244,143,177,.5)';
    ctx.beginPath(); ctx.arc(cx-13, cy+5, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+13, cy+5, 5, 0, Math.PI*2); ctx.fill();
  }
  // Eyes
  if(state.zone === 'bad' && sugarAnim < 30){
    ctx.strokeStyle = '#212121'; ctx.lineWidth = 2.5;
    [[-10,-4],[10,-4]].forEach(([dx,dy])=>{
      ctx.beginPath();
      ctx.moveTo(cx+dx-4, cy+dy-4); ctx.lineTo(cx+dx+4, cy+dy+4);
      ctx.moveTo(cx+dx+4, cy+dy-4); ctx.lineTo(cx+dx-4, cy+dy+4);
      ctx.stroke();
    });
  } else if(state.zone === 'bad'){
    ctx.strokeStyle = '#212121'; ctx.lineWidth = 1.8;
    [[-10,-4],[10,-4]].forEach(([dx,dy])=>{
      ctx.beginPath();
      for(let a=0;a<Math.PI*2.5;a+=0.3){
        const sr = a*0.6;
        const sx = cx+dx+Math.cos(a+pulsePhase)*sr;
        const sy = cy+dy+Math.sin(a+pulsePhase)*sr;
        if(a===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
      }
      ctx.stroke();
    });
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-10, cy-4, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+10, cy-4, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#212121';
    ctx.beginPath(); ctx.arc(cx-10, cy-4, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+10, cy-4, 2, 0, Math.PI*2); ctx.fill();
  }
  // Mouth
  ctx.strokeStyle = '#212121'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  if(state.zone === 'ok'){
    ctx.arc(cx, cy+8, 9, 0.2, Math.PI-0.2);
  } else if(state.zone === 'warn'){
    ctx.moveTo(cx-8, cy+11); ctx.lineTo(cx+8, cy+11);
  } else {
    ctx.arc(cx, cy+18, 9, Math.PI+0.2, -0.2);
  }
  ctx.stroke();
  // Sweat drop
  if(state.zone === 'warn'){
    ctx.fillStyle = '#42A5F5';
    ctx.beginPath();
    ctx.moveTo(cx+22, cy-10);
    ctx.bezierCurveTo(cx+18, cy-3, cx+18, cy+3, cx+22, cy+5);
    ctx.bezierCurveTo(cx+26, cy+3, cx+26, cy-3, cx+22, cy-10);
    ctx.fill();
  }
  ctx.restore();
}

function drawParticles(){
  for(let i = particles.length-1; i >= 0; i--){
    const p = particles[i];
    p.progress += p.speed;
    if(p.progress >= 1){
      // Burst at cell - receptor docking effect
      sparkles.push({x:p.tx, y:p.ty, vx:0, vy:0, life:25, color:'#42A5F5'});
      for(let j=0;j<4;j++){
        sparkles.push({
          x:p.tx, y:p.ty,
          vx:Math.cos(j*Math.PI/2)*2, vy:Math.sin(j*Math.PI/2)*2,
          life:20, color:'#90CAF9'
        });
      }
      particles.splice(i,1);
      continue;
    }
    const t = p.progress;
    const cpx = (p.x+p.tx)/2 + Math.sin(t*Math.PI*2)*20;
    const cpy = (p.y+p.ty)/2 - 40 - Math.sin(t*Math.PI)*20;
    const x = (1-t)*(1-t)*p.x + 2*(1-t)*t*cpx + t*t*p.tx;
    const y = (1-t)*(1-t)*p.y + 2*(1-t)*t*cpy + t*t*p.ty;
    p.trail.push({x,y});
    if(p.trail.length > 10) p.trail.shift();
    ctx.save();
    // Trail
    p.trail.forEach((tp, j)=>{
      const a = (j/p.trail.length)*0.6;
      ctx.fillStyle = `rgba(100,180,255,${a})`;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, 1.5+(j/p.trail.length)*3, 0, Math.PI*2);
      ctx.fill();
    });
    // Core - looks like a small protein molecule
    ctx.shadowColor = '#42A5F5'; ctx.shadowBlur = 14;
    const grad = ctx.createRadialGradient(x-2,y-2,1, x,y,6);
    grad.addColorStop(0,'#fff');
    grad.addColorStop(0.4,'#64B5F6');
    grad.addColorStop(1,'#0D47A1');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI*2);
    ctx.fill();
    // Inner detail (chain links)
    ctx.fillStyle = 'rgba(255,255,255,.6)';
    ctx.beginPath();
    ctx.arc(x-1, y-1, 1.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawGlucoseDots(){
  for(let i = glucoseDots.length-1; i >= 0; i--){
    const g = glucoseDots[i];
    g.progress += g.speed;
    if(g.progress >= 1){ glucoseDots.splice(i,1); continue; }
    const t = g.progress;
    const cpx = (g.x+g.tx)/2;
    const cpy = (g.y+g.ty)/2 + 20;
    const x = (1-t)*(1-t)*g.x + 2*(1-t)*t*cpx + t*t*g.tx;
    const y = (1-t)*(1-t)*g.y + 2*(1-t)*t*cpy + t*t*g.ty;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(g.rot + pulsePhase);
    ctx.shadowColor = '#FFEB3B'; ctx.shadowBlur = 10;
    // Glucose hexagon
    const hexGrad = ctx.createRadialGradient(0,0,0, 0,0,5);
    hexGrad.addColorStop(0,'#FFFDE7');
    hexGrad.addColorStop(0.5,'#FFEB3B');
    hexGrad.addColorStop(1,'#F57F17');
    ctx.fillStyle = hexGrad;
    ctx.beginPath();
    for(let k=0;k<6;k++){
      const ka = (k/6)*Math.PI*2;
      const px = Math.cos(ka)*4.5, py = Math.sin(ka)*4.5;
      if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#E65100';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();
  }
}

function drawSparkles(){
  for(let i = sparkles.length-1; i >= 0; i--){
    const s = sparkles[i];
    s.life--;
    if(s.life <= 0){ sparkles.splice(i,1); continue; }
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.18;
    const a = s.life/70;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = s.color; ctx.shadowBlur = 10;
    ctx.fillStyle = s.color;
    // Star
    ctx.beginPath();
    for(let j=0;j<5;j++){
      const ang = (j/5)*Math.PI*2 - Math.PI/2;
      const r = 5;
      ctx.lineTo(s.x+Math.cos(ang)*r, s.y+Math.sin(ang)*r);
      const ang2 = ang + Math.PI/5;
      ctx.lineTo(s.x+Math.cos(ang2)*(r*0.4), s.y+Math.sin(ang2)*(r*0.4));
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawScorePopups(){
  for(let i = scorePopups.length-1; i >= 0; i--){
    const p = scorePopups[i];
    p.life--; p.y += p.vy; p.vy *= 0.96;
    if(p.life <= 0){ scorePopups.splice(i,1); continue; }
    const a = p.life/60;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = p.color; ctx.shadowBlur = 12;
    ctx.fillStyle = '#000';
    ctx.fillText(p.text, p.x+2, p.y+2);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }
}

function drawFoodIcons(){
  for(let i = foodIcons.length-1; i >= 0; i--){
    const f = foodIcons[i];
    f.life--;
    if(f.life <= 0){ foodIcons.splice(i,1); continue; }
    f.x += f.vx; f.y += f.vy; f.rot += f.vrot;
    if(f.y > H*0.32){ f.vy *= -0.4; f.vx *= 0.8; f.y = H*0.32; }
    f.vy += 0.18;
    ctx.save();
    ctx.globalAlpha = Math.min(1, f.life/30);
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 6;
    ctx.font = `${f.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(f.emoji, 0, 0);
    ctx.restore();
  }
}

function drawSurpriseSnack(){
  if(!surpriseSnack) return;
  const s = surpriseSnack;
  s.life--;
  s.y += s.vy;
  s.vy += 0.25;
  if(s.y > H*0.18 && s.bounces > 0){
    s.vy = -Math.abs(s.vy)*0.6; s.bounces--;
  }
  if(s.life <= 0){ surpriseSnack = null; return; }
  ctx.save();
  ctx.globalAlpha = Math.min(1, s.life/40);
  ctx.font = '40px sans-serif';
  ctx.textAlign = 'center';
  // Sparkle ring
  for(let i=0;i<8;i++){
    const a = (i/8)*Math.PI*2 + pulsePhase;
    const sx = s.x + Math.cos(a)*30, sy = s.y + Math.sin(a)*30;
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 6;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#FFD700';
  ctx.fillText('🍪', s.x, s.y);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText('SURPRISE!', s.x, s.y - 32);
  ctx.restore();
}

function drawVignette(){
  // Edge darkening
  const v = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,.45)');
  ctx.fillStyle = v;
  ctx.fillRect(0,0,W,H);
}

function drawLabel(text, x, y, color){
  ctx.save();
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function shade(hex, lum){
  hex = hex.replace('#','');
  let r = parseInt(hex.substr(0,2),16),
      g = parseInt(hex.substr(2,2),16),
      b = parseInt(hex.substr(4,2),16);
  r = Math.max(0, Math.min(255, r+lum));
  g = Math.max(0, Math.min(255, g+lum));
  b = Math.max(0, Math.min(255, b+lum));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

updateLocks();
updateHUD();
draw();

function fitCanvas(){
  const wrap = document.getElementById('arena-wrap');
  const w = wrap.clientWidth;
  const ratio = H/W;
  canvas.style.width = w + 'px';
  canvas.style.height = (w*ratio) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

})();
</script>
