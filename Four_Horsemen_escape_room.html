<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Jawad's Escape Room — Conflict &amp; Relationships</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a2e;--bg2:#16213e;--text:#e0e0e0;--text-bright:#ffffff;
--r1:#e63946;--r1a:#ff6b6b;--r1bg:rgba(230,57,70,.08);
--r2:#7b2d8e;--r2a:#c77dff;--r2bg:rgba(123,45,142,.08);
--r3:#00b4d8;--r3a:#90e0ef;--r3bg:rgba(0,180,216,.08);
--gold:#f9a825;--green:#4caf50;--red:#ef5350;
--current:#e63946;--current-a:#ff6b6b;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ===== START SCREEN ===== */
#startScreen{justify-content:center;align-items:center;text-align:center;background:radial-gradient(ellipse at 50% 40%,#2a1a3e 0%,#1a1a2e 60%,#0f0f1e 100%)}
.brand-line{font-size:clamp(10px,1.4vw,13px);letter-spacing:4px;text-transform:uppercase;color:#00b4d8;margin-bottom:24px;opacity:.85}
.start-title{font-size:clamp(28px,5vw,52px);font-weight:700;color:#fff;line-height:1.15;margin-bottom:12px;text-shadow:0 0 40px rgba(0,180,216,.3)}
.start-divider{width:60px;height:2px;background:#00b4d8;margin:16px auto;border-radius:2px}
.start-subtitle{font-size:clamp(14px,2vw,20px);color:#90e0ef;margin-bottom:40px;font-weight:300}
.start-btn{background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;font-size:clamp(16px,2.2vw,22px);font-weight:600;padding:16px 48px;border-radius:12px;box-shadow:0 0 30px rgba(0,180,216,.4),0 4px 15px rgba(0,0,0,.3);transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 45px rgba(0,180,216,.6),0 6px 20px rgba(0,0,0,.4)}
.start-footer{position:absolute;bottom:24px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3)}

/* ===== TOP BAR ===== */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.08);min-height:48px;flex-shrink:0;position:relative;z-index:10}
.room-label{font-size:clamp(13px,1.8vw,16px);font-weight:600;color:var(--current);display:flex;align-items:center;gap:8px}
.room-progress{font-size:12px;color:rgba(255,255,255,.5);margin-left:4px}
.streak-icon{font-size:20px;display:none;animation:flicker 0.6s infinite alternate}
.puzzles-cleared{font-size:clamp(12px,1.6vw,14px);color:var(--text);margin-left:auto;padding:4px 12px;border-radius:8px;background:rgba(255,255,255,.06);white-space:nowrap}
.puzzles-cleared.pulse{animation:counterPulse .4s ease}

/* ===== CODE VAULT ===== */
.code-vault{position:fixed;top:60px;right:12px;z-index:50;background:rgba(15,15,30,.92);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 10px;display:none;backdrop-filter:blur(6px)}
.vault-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);text-align:center;margin-bottom:6px}
.vault-rooms{display:flex;flex-direction:column;gap:4px}
.vault-room{display:flex;align-items:center;gap:6px;font-size:12px}
.vault-room-label{width:16px;text-align:center}
.vault-digit{width:22px;height:26px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:4px;font-weight:700;font-size:14px;color:rgba(255,255,255,.3);transition:all .4s ease}
.vault-digit.revealed{color:var(--current);border-color:var(--current);box-shadow:0 0 8px rgba(255,255,255,.15);animation:digitReveal .5s ease}

/* ===== MISSION LINE ===== */
.mission-line{text-align:center;padding:8px 16px;font-size:clamp(12px,1.6vw,15px);color:rgba(255,255,255,.6);font-style:italic;flex-shrink:0}

/* ===== PUZZLE AREA ===== */
.puzzle-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px;overflow-y:auto;position:relative}

/* ===== BOTTOM BAR ===== */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0;min-height:52px}
.scanner-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid var(--current);color:var(--current);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;animation:scannerPulse 2s infinite;transition:all .2s}
.scanner-btn:hover{background:rgba(255,255,255,.12)}
.progress-dots{display:flex;gap:8px}
.progress-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);transition:all .3s}
.progress-dot.filled{background:var(--current);border-color:var(--current);box-shadow:0 0 8px var(--current)}
.progress-dot.active{border-color:var(--current);box-shadow:0 0 6px rgba(255,255,255,.15)}

/* ===== SCANNER OVERLAY ===== */
.scanner-overlay{display:none;position:fixed;bottom:60px;left:16px;right:16px;max-width:500px;background:rgba(15,15,30,.95);border:1px solid var(--current);border-radius:12px;padding:16px;z-index:80;box-shadow:0 0 20px rgba(0,0,0,.5),0 0 10px var(--current);backdrop-filter:blur(8px)}
.scanner-overlay.active{display:block}
.scanner-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.scanner-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--current);font-weight:600}
.scanner-dismiss{font-size:12px;color:rgba(255,255,255,.4);background:none;padding:4px 8px;border-radius:4px}
.scanner-dismiss:hover{color:#fff;background:rgba(255,255,255,.1)}
.scanner-text{font-size:clamp(12px,1.5vw,14px);color:rgba(255,255,255,.8);line-height:1.5}

/* ===== PUZZLE COMMON ===== */
.puzzle-instruction{font-size:clamp(12px,1.5vw,14px);color:rgba(255,255,255,.5);margin-bottom:12px;text-align:center}
.micro-progress{font-size:clamp(11px,1.3vw,13px);color:var(--current);margin-bottom:8px;text-align:center;font-weight:600}
.puzzle-question{font-size:clamp(18px,2.8vw,26px);font-weight:700;color:#fff;text-align:center;margin-bottom:20px;text-shadow:0 0 15px rgba(255,255,255,.1)}
.answer-cards{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:600px}
.answer-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:14px 20px;font-size:clamp(13px,1.7vw,16px);color:#fff;cursor:pointer;transition:all .25s ease;min-width:140px;min-height:48px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;position:relative}
.answer-card:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1);transform:translateY(-2px)}
.answer-card[data-correct="true"].highlighted{border-color:var(--current);box-shadow:0 0 15px var(--current);animation:highlightPulse 1s infinite alternate}
.answer-card.correct{border-color:var(--green)!important;background:rgba(76,175,80,.15)!important;box-shadow:0 0 12px rgba(76,175,80,.4)!important}
.answer-card.wrong{border-color:var(--red)!important;background:rgba(239,83,80,.1)!important;animation:wrongShake .4s ease}
.answer-card.dimmed{opacity:.35;pointer-events:none}
.answer-card.selected{border-color:var(--current)!important;background:rgba(255,255,255,.12)!important;transform:scale(1.05);box-shadow:0 0 15px var(--current)}
.selected-badge{position:absolute;top:-8px;right:-8px;background:var(--current);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:1px}

/* ===== MATCH LOCK ===== */
.match-area{display:flex;gap:24px;align-items:center;justify-content:center;flex-wrap:wrap;width:100%;max-width:600px}
.match-col{display:flex;flex-direction:column;gap:10px;min-width:140px}
.match-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 18px;font-size:clamp(13px,1.7vw,16px);color:#fff;cursor:pointer;transition:all .25s ease;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px;position:relative}
.match-card:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)}
.match-card.selected{border-color:var(--current)!important;background:rgba(255,255,255,.12)!important;transform:scale(1.05);box-shadow:0 0 15px var(--current)}
.match-card.correct{border-color:var(--green)!important;background:rgba(76,175,80,.15)!important;box-shadow:0 0 10px rgba(76,175,80,.3)!important;pointer-events:none}
.match-card.wrong{border-color:var(--red)!important;animation:wrongShake .4s ease}
.match-card.dimmed{opacity:.35;pointer-events:none}
.matched-pairs{display:flex;flex-direction:column;gap:6px;margin-top:12px;width:100%;max-width:500px}
.matched-pair{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 12px;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.3);border-radius:8px;font-size:13px;color:rgba(255,255,255,.7)}

/* ===== SEQUENCE LOCK ===== */
.seq-slots{display:flex;gap:10px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.seq-slot{width:clamp(120px,25vw,180px);height:48px;border:2px dashed rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.3);position:relative;transition:all .3s}
.seq-slot.filled{border-style:solid;border-color:var(--green);background:rgba(76,175,80,.1);color:#fff}
.seq-arrow{font-size:18px;color:rgba(255,255,255,.2);align-self:center}
.seq-cards{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:600px}
.seq-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 18px;font-size:clamp(12px,1.6vw,15px);color:#fff;cursor:pointer;transition:all .25s ease;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px}
.seq-card:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1);transform:translateY(-2px)}
.seq-card.correct{border-color:var(--green)!important;background:rgba(76,175,80,.15)!important;pointer-events:none}
.seq-card.wrong{border-color:var(--red)!important;animation:wrongShake .4s ease}
.seq-card.dimmed{opacity:.35;pointer-events:none}

/* ===== QUICK FIRE ===== */
.qf-area{text-align:center;max-width:500px;width:100%}
.qf-question{font-size:clamp(16px,2.4vw,22px);color:#fff;font-weight:600;margin-bottom:20px;min-height:60px;display:flex;align-items:center;justify-content:center}
.qf-buttons{display:flex;gap:16px;justify-content:center}
.qf-btn{padding:14px 32px;border-radius:12px;font-size:clamp(15px,2vw,19px);font-weight:700;min-width:120px;min-height:54px;transition:all .2s}
.qf-btn.confirm{background:rgba(76,175,80,.15);border:2px solid var(--green);color:var(--green)}
.qf-btn.deny{background:rgba(239,83,80,.1);border:2px solid var(--red);color:var(--red)}
.qf-btn:hover{transform:scale(1.05)}
.qf-btn.flash-correct{background:rgba(76,175,80,.3)!important;box-shadow:0 0 20px rgba(76,175,80,.5)}
.qf-btn.flash-wrong{background:rgba(239,83,80,.2)!important;box-shadow:0 0 20px rgba(239,83,80,.4)}
.qf-progress{display:flex;gap:6px;justify-content:center;margin-top:16px}
.qf-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.qf-dot.correct{background:var(--green)}
.qf-dot.wrong{background:var(--red)}
.qf-dot.active{border:2px solid var(--current);box-shadow:0 0 6px var(--current)}

/* ===== DIAGNOSTIC PANEL ===== */
.diag-panel{display:flex;flex-direction:column;gap:16px;align-items:center;width:100%;max-width:500px}
.diag-slots{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.diag-slot{width:clamp(180px,30vw,220px);min-height:90px;border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .3s;position:relative;background:rgba(255,255,255,.03)}
.diag-slot.active-slot{border-color:var(--current);box-shadow:0 0 10px rgba(255,255,255,.1)}
.diag-slot.locked{border-color:var(--green);background:rgba(76,175,80,.1)}
.diag-slot.dimmed-slot{opacity:.4}
.diag-alert{font-size:11px;letter-spacing:1px;color:var(--gold);font-weight:600}
.diag-filled{font-size:14px;color:#fff;font-weight:600}
.diag-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.diag-chip{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 16px;font-size:clamp(12px,1.5vw,14px);color:#fff;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px}
.diag-chip:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1);transform:translateY(-2px)}
.diag-chip.used{opacity:.3;pointer-events:none}
.diag-chip.wrong{border-color:var(--red)!important;animation:wrongShake .4s ease}
.diag-check-btn{background:var(--current);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;margin-top:8px;box-shadow:0 0 10px var(--current);transition:all .2s}
.diag-check-btn:hover{transform:scale(1.05)}

/* ===== SYSTEM SCANNER GAUGES ===== */
.gauge-panel{display:flex;gap:clamp(16px,4vw,32px);justify-content:center;align-items:flex-end;margin-bottom:20px;padding:16px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px}
.gauge{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-bar-wrap{width:clamp(40px,8vw,56px);height:clamp(100px,18vh,160px);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;position:relative;overflow:hidden}
.gauge-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 5px 5px;transition:height 1s ease}
.gauge-reading{font-size:clamp(10px,1.2vw,12px);font-weight:700;letter-spacing:1px}
.gauge-label{font-size:clamp(10px,1.2vw,12px);color:rgba(255,255,255,.6);text-align:center;max-width:70px}

/* ===== MYSTERY INPUT ===== */
.chain-display{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;padding:16px;background:rgba(0,0,0,.2);border-radius:12px}
.chain-box{padding:12px 16px;border:2px solid rgba(255,255,255,.15);border-radius:10px;font-size:clamp(11px,1.5vw,14px);color:#fff;text-align:center;min-width:100px;background:rgba(255,255,255,.04);transition:all .3s}
.chain-box.mystery{border-color:var(--gold);color:var(--gold);font-weight:700;box-shadow:0 0 10px rgba(249,168,37,.2)}
.chain-box.solved{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(76,175,80,.3)}
.chain-arrow{font-size:20px;color:rgba(255,255,255,.3)}

/* ===== OVERLAYS ===== */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;justify-content:center;align-items:center;flex-direction:column}
.overlay.active{display:flex}

/* Door transition overlay */
#doorOverlay{background:var(--bg);z-index:200}
.door-frame{width:clamp(160px,30vw,240px);height:clamp(220px,40vh,340px);border:3px solid var(--current);border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(0,0,0,.6)}
.door-lock{font-size:48px}
.door-label{font-size:clamp(16px,2.5vw,24px);font-weight:700;color:var(--current);margin-top:16px;opacity:0}

/* Scan preview */
#scanPreview{background:rgba(10,10,25,.95);z-index:150}
.scan-frame{border:2px solid var(--current);border-radius:12px;padding:24px;max-width:400px;text-align:center;position:relative;overflow:hidden}
.scan-frame::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);animation:scanSweep 1.5s ease infinite}
.scan-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--current);margin-bottom:12px}
.scan-content{font-size:clamp(14px,2vw,18px);color:rgba(255,255,255,.8);line-height:1.6}

/* Code entry */
#codeEntry{background:rgba(10,10,25,.95);z-index:160}
.code-entry-box{text-align:center;padding:24px;background:rgba(255,255,255,.04);border:1px solid var(--current);border-radius:16px;max-width:340px}
.code-entry-title{font-size:clamp(18px,2.8vw,24px);font-weight:700;color:#fff;margin-bottom:4px}
.code-entry-subtitle{font-size:14px;color:var(--current);margin-bottom:20px;font-weight:600}
.code-digits{display:flex;gap:12px;justify-content:center;margin-bottom:16px}
.code-digit-input{width:52px;height:60px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.2);border-radius:10px;font-size:28px;font-weight:700;color:#fff;text-align:center}
.code-digit-input:focus{border-color:var(--current);box-shadow:0 0 10px var(--current);outline:none}
.code-submit{background:var(--current);color:#fff;padding:12px 32px;border-radius:10px;font-size:16px;font-weight:600;margin-top:8px;box-shadow:0 0 15px var(--current);transition:all .2s}
.code-submit:hover{transform:scale(1.05)}
.code-error{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}

/* Digit reveal */
#digitReveal{background:rgba(10,10,25,.9);z-index:170}
.digit-reveal-content{text-align:center}
.digit-reveal-label{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--current);margin-bottom:8px}
.digit-reveal-num{font-size:clamp(60px,12vw,100px);font-weight:700;color:#fff;text-shadow:0 0 30px var(--current),0 0 60px var(--current);animation:digitScale .6s ease}
.digit-reveal-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:8px}
.digit-continue{background:var(--current);color:#fff;padding:10px 28px;border-radius:8px;font-size:14px;font-weight:600;margin-top:20px;box-shadow:0 0 10px var(--current)}

/* Pass the laptop */
#passLaptop{background:rgba(10,10,25,.95);z-index:180}
.pass-content{text-align:center}
.pass-emoji{font-size:48px;margin-bottom:16px}
.pass-title{font-size:clamp(28px,5vw,44px);font-weight:700;color:var(--current);margin-bottom:8px;letter-spacing:2px}
.pass-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px}
.pass-btn{background:var(--current);color:#fff;padding:14px 36px;border-radius:10px;font-size:18px;font-weight:600;box-shadow:0 0 20px var(--current)}

/* Final lock */
.final-match-area{display:flex;gap:24px;align-items:flex-start;justify-content:center;flex-wrap:wrap;max-width:600px}
.final-col{display:flex;flex-direction:column;gap:10px}
.final-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 18px;font-size:clamp(12px,1.6vw,15px);color:#fff;cursor:pointer;transition:all .25s ease;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px;min-width:clamp(130px,22vw,190px)}
.final-card:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)}
.final-card.selected{transform:scale(1.05);box-shadow:0 0 15px var(--current)}
.final-card.matched{pointer-events:none;opacity:.7}
.final-matched-pairs{display:flex;flex-direction:column;gap:6px;margin-top:12px}

/* Escape report */
#escapeReport{background:radial-gradient(ellipse at 50% 30%,#1a2a3e 0%,#1a1a2e 60%,#0f0f1e 100%);z-index:250;overflow-y:auto;padding:24px 16px}
.report-wrap{max-width:500px;width:100%;margin:0 auto;text-align:center}
.report-brand{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,180,216,.6);margin-bottom:16px}
.report-title{font-size:clamp(32px,6vw,52px);font-weight:700;color:#fff;text-shadow:0 0 40px rgba(249,168,37,.4);margin-bottom:8px}
.report-subtitle{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px}
.report-stars{font-size:clamp(36px,7vw,56px);margin-bottom:20px}
.report-star{opacity:.2;transition:opacity .5s}
.report-star.earned{opacity:1}
.report-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.report-stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;text-align:center}
.report-stat-val{font-size:clamp(20px,3.5vw,28px);font-weight:700;color:#fff}
.report-stat-label{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.report-badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.report-badge{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;font-size:12px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:4px}
.report-badge.earned{border-color:var(--gold);color:var(--gold);box-shadow:0 0 8px rgba(249,168,37,.2)}
.report-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.report-btn{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;transition:all .2s}
.report-btn.primary{background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;box-shadow:0 0 15px rgba(0,180,216,.3)}
.report-btn.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.report-btn:hover{transform:scale(1.05)}

/* ===== KEYFRAMES ===== */
@keyframes scannerPulse{0%,100%{box-shadow:0 0 5px var(--current)}50%{box-shadow:0 0 15px var(--current)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes counterPulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes digitScale{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes digitReveal{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes flicker{0%{opacity:1}100%{opacity:.5}}
@keyframes scanSweep{0%{left:-100%}100%{left:100%}}
@keyframes highlightPulse{0%{box-shadow:0 0 10px var(--current)}100%{box-shadow:0 0 25px var(--current)}}
@keyframes doorAnim{0%{opacity:0;transform:translateX(0)}25%{opacity:1;transform:translateX(0)}55%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-110%)}}
@keyframes doorAnimSlow{0%{opacity:0;transform:translateX(0)}20%{opacity:1;transform:translateX(0)}50%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-110%)}}
@keyframes confettiDrop{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes escapePop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes starFill{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes particleBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{opacity:0}}
</style>
</head>

<script>
'use strict';
// ===== STATE =====
const state = {

// ===== ROOM DATA =====
const ROOMS=[

        strongScanner:[['Contempt hits: meter drops -25','Meter hits 25: flooding'],['Back-to-back: each hit 30% worse','Meter hits 25: flooding']],
        preview:'Relationship meter dropping from 🟢 green through 🟡 yellow to 🔴 red<br>Horseman icons stacking: 🗡️👑🛡️🧱<br>⚠️ FLOODING warning at bottom'

        gauges:[
          {label:'🔴 Amygdala',fill:90,color:'#ef5350',reading:'HIGH'},

        ],

      },

        chain:['Teen sees a scared face','???','Teen thinks the person is angry'],

          {label:'Prefrontal cortex reads it first',icon:'🧠✅',correct:false},

        strongScanner:['Amygdala reads it wrong','Prefrontal cortex reads it first'],

];

const FINAL_LOCK={
  pairs:[
    {term:'Contempt',match:'Drops meter -25',color:'#e63946',emoji:'🐴'},
    {term:'Flooding',match:'Meter hits 25 — shutdown',color:'#7b2d8e',emoji:'🌀'},
    {term:'Amygdala',match:'Brain\'s alarm center',color:'#00b4d8',emoji:'🧠'}
  ]
};

// ===== UTILITIES =====
function $(id){return document.getElementById(id)}
function closeAllOverlays(){
  ['scanPreview','digitReveal','codeEntry','doorOverlay','passLaptop','scannerOverlay'].forEach(id=>{
    const el=$(id);if(el){el.classList.remove('active');el.style.display='none'}
  });
}
function closeScanner(){const o=$('scannerOverlay');if(o){o.classList.remove('active');o.style.display='none'}}
function setRoomTheme(idx){
  const r=ROOMS[idx];if(!r)return;
  document.documentElement.style.setProperty('--current',r.color);
  document.documentElement.style.setProperty('--current-a',r.accent);
}
function spawnParticles(x,y,count,color){
  try{
    const c=Math.min(count||8,12);
    for(let i=0;i<c;i++){
      const p=document.createElement('div');
      const angle=Math.random()*Math.PI*2;
      const dist=40+Math.random()*60;
      const dx=Math.cos(angle)*dist;
      const dy=Math.sin(angle)*dist;
      const size=4+Math.random()*6;
      Object.assign(p.style,{
        position:'fixed',left:x+'px',top:y+'px',width:size+'px',height:size+'px',
        background:color||'var(--current)',borderRadius:Math.random()>.5?'50%':'2px',
        zIndex:'300',pointerEvents:'none',
        animation:`particleBurst 0.6s ease forwards`
      });
      p.style.setProperty('--dx',dx+'px');p.style.setProperty('--dy',dy+'px');
      // inline keyframe direction
      p.animate([
        {transform:'translate(0,0) scale(1)',opacity:1},
        {transform:`translate(${dx}px,${dy}px) scale(0)`,opacity:0}
      ],{duration:600,easing:'ease-out'});
      document.body.appendChild(p);
      const cleanup=()=>{try{p.remove()}catch(e){}};
      p.addEventListener('animationend',cleanup);
      setTimeout(cleanup,700);
    }
  }catch(e){/* particles non-critical */}
}
function spawnConfetti(){
  try{
    const colors=['#e63946','#7b2d8e','#00b4d8','#f9a825','#4caf50','#ff6b6b','#c77dff'];
    for(let i=0;i<20;i++){
      const c=document.createElement('div');
      const size=6+Math.random()*8;
      Object.assign(c.style,{
        position:'fixed',left:Math.random()*100+'vw',top:'-20px',
        width:size+'px',height:size*(1+Math.random())+'px',
        background:colors[Math.floor(Math.random()*colors.length)],
        borderRadius:'2px',zIndex:'310',pointerEvents:'none',
        animation:`confettiDrop ${2+Math.random()*2}s ease forwards`,
        animationDelay:Math.random()*0.5+'s'
      });
      document.body.appendChild(c);
      const cleanup=()=>{try{c.remove()}catch(e){}};
      c.addEventListener('animationend',cleanup);
      setTimeout(cleanup,5000);
    }
  }catch(e){}
}

// ===== VAULT =====
function initVault(){
  const v=$('vaultRooms');v.innerHTML='';
  const emojis=['🐴','🌀','🧠'];
  const colors=['#e63946','#7b2d8e','#00b4d8'];
  for(let r=0;r<3;r++){
    const row=document.createElement('div');row.className='vault-room';
    row.innerHTML=`<span class="vault-room-label">${emojis[r]}</span>`;
    for(let d=0;d<2;d++){
      const dig=document.createElement('div');
      dig.className='vault-digit';dig.id=`vault-${r}-${d}`;
      dig.textContent='?';dig.style.setProperty('--vc',colors[r]);
      row.appendChild(dig);
    }
    v.appendChild(row);
  }
  $('codeVault').style.display='block';
}
function updateVaultDigit(roomIdx,puzzleIdx,digit){
  const el=$(`vault-${roomIdx}-${puzzleIdx}`);
  if(!el)return;
  el.textContent=digit;
  el.classList.add('revealed');
  el.style.color=ROOMS[roomIdx].color;
  el.style.borderColor=ROOMS[roomIdx].color;
  state.vaultDigits[roomIdx][puzzleIdx]=digit;
}
function markVaultRoom(roomIdx){
  for(let d=0;d<2;d++){
    const el=$(`vault-${roomIdx}-${d}`);
    if(el)el.style.boxShadow=`0 0 8px ${ROOMS[roomIdx].color}`;
  }
}

// ===== GAME FLOW =====
function startGame(){
  state.startTime=Date.now();
  $('startScreen').classList.remove('active');
  $('gameScreen').classList.add('active');
  initVault();
  showTutorial();
}

// ===== TUTORIAL =====
function showTutorial(){
  state.phase='tutorial';
  $('roomLabel').innerHTML='🎓 Tutorial <span class="room-progress">Practice</span>';
  $('missionLine').textContent='Tap a word on the LEFT, then tap its match on the RIGHT.';
  $('scannerBtn').style.display='none';
  $('progressDots').innerHTML='';
  document.documentElement.style.setProperty('--current','#00b4d8');
  const area=$('puzzleArea');
  const tutPairs=[{term:'☀️ Sun',match:'Hot'},{term:'🧊 Ice',match:'Cold'}];
  let step=0,selectedTerm=null;
  function renderTutStep(){
    if(step>=tutPairs.length){
      area.innerHTML=`<div style="text-align:center"><div style="font-size:24px;color:#4caf50;margin-bottom:8px">✔ Systems Online</div><div style="font-size:14px;color:rgba(255,255,255,.5)">Entering Room 1...</div></div>`;
      setTimeout(()=>enterRoom(0),1200);
      return;
    }
    const pair=tutPairs[step];
    const wrongOpts=step===0?['Cold']:['Hot'];
    const rightOpts=[pair.match,...wrongOpts].sort(()=>Math.random()-.5);
    area.innerHTML=`
      <button id="skipTutBtn" style="position:absolute;top:8px;right:16px;background:none;color:rgba(255,255,255,.4);font-size:12px;padding:4px 8px;border-radius:4px;border:none;cursor:pointer;z-index:10">Skip Tutorial →</button>
      <div class="micro-progress">Pair ${step+1} of ${tutPairs.length}</div>
      <div class="puzzle-instruction">👆 Tap the word on the LEFT, then tap its match on the RIGHT.</div>
      <div class="match-area">
        <div class="match-col"><div class="match-card" id="tut-term">${pair.term}</div></div>
        <div class="match-col" id="tut-opts"></div>
      </div>`;
    $('skipTutBtn').addEventListener('click',()=>{area.innerHTML='';enterRoom(0)});
    const optCol=$('tut-opts');
    rightOpts.forEach(o=>{
      const card=document.createElement('div');card.className='match-card';card.textContent=o;
      card.dataset.val=o;
      card.addEventListener('click',()=>tutSelect(card,pair.match));
      optCol.appendChild(card);
    });
    $('tut-term').addEventListener('click',function(){
      if(selectedTerm)return;
      this.classList.add('selected');selectedTerm=true;
    });
  }
  function tutSelect(card,correct){
    if(!selectedTerm)return;
    if(card.dataset.val===correct){
      card.classList.add('correct');$('tut-term').classList.add('correct');
      step++;selectedTerm=null;
      setTimeout(renderTutStep,600);
    }else{
      card.classList.add('wrong');
      setTimeout(()=>card.classList.remove('wrong'),400);
    }
  }
  // Start tutorial
  renderTutStep();
}

// ===== ENTER ROOM =====
function enterRoom(idx){
  try{
    state.room=idx;state.puzzleIndex=0;
    state.wrongCount=0;state.scannerUsed=false;state.overrideTriggered=false;state.puzzleSolving=false;
    setRoomTheme(idx);
    const r=ROOMS[idx];
    $('roomLabel').innerHTML=`${r.emoji} ${r.name} <span class="room-progress">Room ${idx+1} of 3</span>`;
    $('missionLine').textContent=r.mission;
    $('scannerBtn').style.display='flex';
    updateProgressDots();
    state.phase='room';
    showScanPreview(idx,0);
  }catch(e){
    console.error('enterRoom error:',e);
    loadPuzzle();
  }
}

function updateProgressDots(){
  const dots=$('progressDots');dots.innerHTML='';
  for(let i=0;i<2;i++){
    const d=document.createElement('div');d.className='progress-dot';
    if(state.vaultDigits[state.room]&&state.vaultDigits[state.room][i]!==null)d.classList.add('filled');
    else if(i===state.puzzleIndex)d.classList.add('active');
    dots.appendChild(d);
  }
}

// ===== SCAN PREVIEW =====
function showScanPreview(roomIdx,puzzleIdx){
  state.previewDone=false;
  const r=ROOMS[roomIdx];const p=r.puzzles[puzzleIdx];
  if(!p||!p.preview){loadPuzzle();return;}
  closeAllOverlays();
  const el=$('scanPreview');
  el.innerHTML=`<div class="scan-frame"><div class="scan-title">📡 SCANNING ROOM...</div><div class="scan-content">${p.preview}</div></div>`;
  el.style.display='flex';el.classList.add('active');
  function finishPreview(){
    if(state.previewDone)return;
    state.previewDone=true;
    el.classList.remove('active');el.style.display='none';
    loadPuzzle();
  }
  setTimeout(finishPreview,3500);
  setTimeout(finishPreview,5000);// safety
}

// ===== LOAD PUZZLE =====
function loadPuzzle(){
  try{
    state.wrongCount=0;state.scannerUsed=false;state.overrideTriggered=false;state.puzzleSolving=false;state.puzzleHadWrong=false;state.puzzleUsedScanner=false;
    closeScanner();
    const r=ROOMS[state.room];
    const p=r.puzzles[state.puzzleIndex];
    if(!p){showCodeEntry();return;}
    const area=$('puzzleArea');area.innerHTML='';
    // Pre-load scanner text so manual Scanner tap works before first wrong
    if(p.scanText)$('scannerText').textContent=p.scanText;
    switch(p.type){
      case 'match':renderMatchLock(p,area);break;
      case 'quickfire':renderQuickFire(p,area);break;
      case 'sequence':renderSequenceLock(p,area);break;
      case 'diagnostic':renderDiagnosticPanel(p,area);break;
      case 'systemscanner':renderSystemScanner(p,area);break;
      case 'mystery':renderMysteryInput(p,area);break;
    }
    updateProgressDots();
  }catch(e){
    console.error('loadPuzzle error:',e);
    $('puzzleArea').innerHTML=`<div style="text-align:center;color:var(--red)">Something went wrong — <button onclick="loadPuzzle()" style="color:var(--current);background:none;border:1px solid var(--current);padding:8px 16px;border-radius:8px;margin-top:8px;cursor:pointer">click to retry this puzzle</button></div>`;
  }
}

// ===== MATCH LOCK =====
function renderMatchLock(p,area){
  state.matchStep=0;
  let selectedTerm=false;
  function renderStep(){
    if(state.overrideTriggered)return;
    if(state.matchStep>=p.pairs.length){
      puzzleSolved(p.digit);return;
    }
    const pair=p.pairs[state.matchStep];
    const opts=[pair.correct,...pair.distractors].sort(()=>Math.random()-.5);
    // Apply strong scanner narrowing if active
    let displayOpts=opts;
    if(state.scannerUsed&&p.strongScanner&&p.strongScanner[state.matchStep]){
      displayOpts=p.strongScanner[state.matchStep].sort(()=>Math.random()-.5);
    }
    area.innerHTML=`
      <div class="micro-progress">Pair ${state.matchStep+1} of ${p.pairs.length}</div>
      <div class="puzzle-instruction">👆 Tap the word on the LEFT, then tap its match on the RIGHT.</div>
      <div class="match-area">
        <div class="match-col"><div class="match-card" id="ml-term">${pair.term}</div></div>
        <div class="match-col" id="ml-opts"></div>
      </div>
      <div class="matched-pairs" id="ml-matched"></div>`;
    // Show previously matched pairs
    const mArea=$('ml-matched');
    for(let i=0;i<state.matchStep;i++){
      const mp=document.createElement('div');mp.className='matched-pair';
      mp.innerHTML=`✔ ${p.pairs[i].term} → ${p.pairs[i].correct}`;
      mArea.appendChild(mp);
    }
    selectedTerm=false;
    const termCard=$('ml-term');
    termCard.addEventListener('click',()=>{
      if(selectedTerm)return;
      termCard.classList.add('selected');
      const badge=document.createElement('span');badge.className='selected-badge';badge.textContent='▶ SELECTED';
      termCard.appendChild(badge);
      selectedTerm=true;
    });
    const optCol=$('ml-opts');
    displayOpts.forEach(o=>{
      const card=document.createElement('div');card.className='match-card';card.textContent=o;
      card.dataset.val=o;
      if(o===pair.correct)card.dataset.correct='true';
      card.addEventListener('click',()=>handleMatchClick(card,pair,p));
      optCol.appendChild(card);
    });
  }
  function handleMatchClick(card,pair,puzzle){
    if(!selectedTerm||card.classList.contains('dimmed')||state.overrideTriggered)return;
    if(card.dataset.val===pair.correct){
      card.classList.add('correct');
      $('ml-term').classList.add('correct');
      try{const r=card.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,6,ROOMS[state.room].color)}catch(e){}
      state.matchStep++;
      setTimeout(renderStep,600);
    }else{
      card.classList.add('wrong');
      setTimeout(()=>{card.classList.remove('wrong');card.classList.add('dimmed')},400);
      handleWrongAnswer(puzzle,'match',renderStep);
    }
  }
  renderStep();
}

// ===== QUICK FIRE =====
function renderQuickFire(p,area){
  state.qfCumulativeWrong=0;
  state.qfCorrectCount=0;
  // Build round queue: first pass = all questions in order
  const allQs=p.questions.map((q,i)=>({...q,idx:i,status:'pending'}));
  let roundQueue=[...allQs]; // current round's questions
  let roundIdx=0; // position within current round
  let processing=false;
  let isRetry=false;
  $('scannerText').textContent=p.scanText;

  function showQ(){
    // Sync wrongCount for puzzleSolved's first-try detection
    state.wrongCount=state.qfCumulativeWrong;
    // Check win condition: 3+ correct
    if(state.qfCorrectCount>=3){puzzleSolved(p.digit);return}
    // Check override
    if(state.qfCumulativeWrong>=5){
      allQs.filter(q=>q.status!=='correct').forEach(q=>q.status='correct');
      area.innerHTML='<div style="text-align:center"><div style="font-size:18px;color:var(--current);margin-bottom:8px">📡 Signal override — clearing channel</div></div>';
      setTimeout(()=>{state.wrongCount=state.qfCumulativeWrong;puzzleSolved(p.digit)},1200);return;
    }
    // End of round?
    if(roundIdx>=roundQueue.length){
      // Start retry round with only missed questions
      const missed=allQs.filter(q=>q.status==='missed');
      if(missed.length===0){puzzleSolved(p.digit);return}
      missed.forEach(q=>q.status='pending');
      roundQueue=missed;roundIdx=0;isRetry=true;
      showQ();return;
    }
    const q=roundQueue[roundIdx];
    processing=false;
    const qNum=allQs.filter(x=>x.status==='correct'||x.status==='missed').length+1;
    area.innerHTML=`
      <div class="qf-area">
        <div class="micro-progress">Question ${Math.min(qNum,allQs.length)} of ${allQs.length}${isRetry?' (Retry — missed only)':''}</div>
        <div class="qf-question">${q.emoji} ${q.text}</div>
        <div class="qf-buttons">
          <button class="qf-btn confirm" id="qf-confirm">✔ CONFIRM</button>
          <button class="qf-btn deny" id="qf-deny">✖ DENY</button>
        </div>
        <div class="qf-progress" id="qf-dots"></div>
      </div>`;
    const dotsEl=$('qf-dots');
    allQs.forEach(qq=>{
      const d=document.createElement('div');d.className='qf-dot';
      if(qq.status==='correct')d.classList.add('correct');
      else if(qq.status==='missed')d.classList.add('wrong');
      else if(qq===q)d.classList.add('active');
      dotsEl.appendChild(d);
    });
    $('qf-confirm').addEventListener('click',()=>handleQF(true,q));
    $('qf-deny').addEventListener('click',()=>handleQF(false,q));
  }
  function handleQF(userAnswer,q){
    if(processing)return;processing=true;
    const isCorrect=(userAnswer===q.answer);
    const btnId=userAnswer?'qf-confirm':'qf-deny';
    const btn=$(btnId);
    if(isCorrect){
      btn.classList.add('flash-correct');
      q.status='correct';state.qfCorrectCount++;
      roundIdx++;
      setTimeout(showQ,500);
    }else{
      btn.classList.add('flash-wrong');
      q.status='missed';
      state.qfCumulativeWrong++;
      state.puzzleHadWrong=true;
      // Auto-activate scanner on first wrong
      if(state.qfCumulativeWrong===1&&!state.scannerUsed){
        state.scannerUsed=true;state.puzzleUsedScanner=true;openScanner();
      }
      roundIdx++;
      setTimeout(showQ,500);
    }
  }
  showQ();
}

// ===== SEQUENCE LOCK =====
function renderSequenceLock(p,area){
  state.seqStep=0;
  const locked=[];
  const prompts=['What happens FIRST?','What triggers NEXT?','Complete!'];
  function renderStep(){
    if(state.overrideTriggered)return;
    if(state.seqStep>=p.cards.length){
      puzzleSolved(p.digit);return;
    }
    // Auto-place last card
    if(state.seqStep===p.cards.length-1){
      const remaining=p.cards.filter((_,i)=>!locked.includes(i));
      if(remaining.length===1){
        locked.push(p.cards.indexOf(remaining[0]));
        state.seqStep=p.cards.length;
        renderUI();
        setTimeout(()=>puzzleSolved(p.digit),600);
        return;
      }
    }
    renderUI();
  }
  function renderUI(){
    const done=state.seqStep>=p.cards.length;
    area.innerHTML=`
      <div class="micro-progress">Step ${Math.min(state.seqStep+1,p.cards.length)} of ${p.cards.length}</div>
      <div class="puzzle-question">${done?'✔ Sequence Complete!':prompts[state.seqStep]}</div>
      <div class="seq-slots" id="seq-slots"></div>
      <div class="seq-cards" id="seq-cards"></div>`;
    const slotsEl=$('seq-slots');
    for(let i=0;i<p.cards.length;i++){
      const slot=document.createElement('div');slot.className='seq-slot';
      if(i<locked.length){
        slot.classList.add('filled');
        const c=p.cards[locked[i]];
        slot.innerHTML=`${c.icon} ${c.label}`;
      }else if(i===state.seqStep){
        slot.textContent=`Position ${i+1}`;
      }else{
        slot.textContent=`Position ${i+1}`;slot.style.opacity='.3';
      }
      slotsEl.appendChild(slot);
      if(i<p.cards.length-1){
        const arrow=document.createElement('span');arrow.className='seq-arrow';arrow.textContent='→';
        slotsEl.appendChild(arrow);
      }
    }
    if(!done){
      const cardsEl=$('seq-cards');
      // Show available cards (not yet locked)
      let available=p.cards.map((c,i)=>({...c,origIdx:i})).filter(c=>!locked.includes(c.origIdx));
      // Strong scanner narrowing
      if(state.scannerUsed&&p.strongScanner&&p.strongScanner[state.seqStep]){
        const narrow=p.strongScanner[state.seqStep];
        available=available.filter(c=>narrow.includes(c.label));
      }
      available.forEach(c=>{
        const card=document.createElement('div');card.className='seq-card';
        card.innerHTML=`${c.icon} ${c.label}`;
        card.dataset.idx=c.origIdx;
        if(c.origIdx===state.seqStep)card.dataset.correct='true';
        card.addEventListener('click',()=>handleSeqClick(card,c,p));
        cardsEl.appendChild(card);
      });
    }
  }
  function handleSeqClick(card,cardData,puzzle){
    if(state.overrideTriggered)return;
    const correctIdx=state.seqStep;// The card that belongs at this position
    if(parseInt(card.dataset.idx)===correctIdx){
      card.classList.add('correct');
      locked.push(correctIdx);
      state.seqStep++;
      try{const r=card.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,6,ROOMS[state.room].color)}catch(e){}
      setTimeout(renderStep,500);
    }else{
      card.classList.add('wrong');
      setTimeout(()=>card.classList.remove('wrong'),400);
      handleWrongAnswer(puzzle,'sequence',renderStep);
    }
  }
  renderStep();
}

// ===== DIAGNOSTIC PANEL =====
function renderDiagnosticPanel(p,area){
  state.diagSlot=0;
  const filled=[null,null];
  function renderUI(){
    if(state.overrideTriggered)return;
    const allDone=filled.every(f=>f!==null);
    area.innerHTML=`
      <div class="micro-progress">Slot ${Math.min(state.diagSlot+1,p.slots.length)} of ${p.slots.length}</div>
      <div class="puzzle-question">🔧 Activate the Antidote Panel</div>
      <div class="diag-panel">
        <div class="diag-slots" id="diag-slots"></div>
        <div class="diag-bank" id="diag-bank"></div>
      </div>`;
    const slotsEl=$('diag-slots');
    p.slots.forEach((s,i)=>{
      const slot=document.createElement('div');slot.className='diag-slot';
      if(filled[i]!==null){
        slot.classList.add('locked');
        slot.innerHTML=`<div class="diag-alert">${s.alert}</div><div class="diag-filled">✔ ${p.bank.find(b=>b.name===filled[i])?.icon||''} ${filled[i]}</div>`;
      }else if(i===state.diagSlot){
        slot.classList.add('active-slot');
        slot.innerHTML=`<div class="diag-alert">${s.alert}</div><div style="color:rgba(255,255,255,.3);font-size:12px">Select a component below</div>`;
      }else{
        slot.classList.add('dimmed-slot');
        slot.innerHTML=`<div class="diag-alert">${s.alert}</div><div style="color:rgba(255,255,255,.2);font-size:12px">🔒 Locked</div>`;
      }
      slotsEl.appendChild(slot);
    });
    if(!allDone){
      const bankEl=$('diag-bank');
      let bankItems=p.bank.filter(b=>!filled.includes(b.name));
      // Strong scanner
      if(state.scannerUsed&&p.strongScanner&&p.strongScanner[state.diagSlot]){
        const narrow=p.strongScanner[state.diagSlot];
        bankItems=bankItems.filter(b=>narrow.includes(b.name));
      }
      bankItems.forEach(b=>{
        const chip=document.createElement('div');chip.className='diag-chip';
        chip.innerHTML=`${b.icon} ${b.name}`;chip.dataset.name=b.name;
        if(b.name===p.slots[state.diagSlot].correct)chip.dataset.correct='true';
        chip.addEventListener('click',()=>handleDiagClick(chip,b.name,p));
        bankEl.appendChild(chip);
      });
    }
  }
  function handleDiagClick(chip,name,puzzle){
    if(state.overrideTriggered)return;
    const slot=p.slots[state.diagSlot];
    if(name===slot.correct){
      filled[state.diagSlot]=name;
      chip.style.background='rgba(76,175,80,.2)';chip.style.borderColor='var(--green)';
      try{const r=chip.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,6,ROOMS[state.room].color)}catch(e){}
      state.diagSlot++;
      if(state.diagSlot>=p.slots.length){
        setTimeout(()=>puzzleSolved(puzzle.digit),600);
      }else{
        state.wrongCount=0;state.scannerUsed=false;state.overrideTriggered=false;
        setTimeout(renderUI,500);
      }
    }else{
      chip.classList.add('wrong');
      setTimeout(()=>{chip.classList.remove('wrong');chip.classList.add('used')},400);
      handleWrongAnswer(puzzle,'diagnostic',renderUI);
    }
  }
  renderUI();
}

// ===== WRONG ANSWER HANDLER =====
function handleWrongAnswer(puzzle,puzzleType,rerenderFn){
  state.wrongCount++;
  state.puzzleHadWrong=true;
  if(state.wrongCount===1&&!state.scannerUsed){
    // Auto-activate scanner
    state.scannerUsed=true;
    state.puzzleUsedScanner=true;
    $('scannerText').textContent=puzzle.scanText;
    if(puzzleType==='tap'||puzzleType==='match'||puzzleType==='sequence'||puzzleType==='diagnostic'){
      openScanner();
      // Narrow options for tap puzzles on re-render
      if(puzzleType!=='tap'&&rerenderFn){
        setTimeout(()=>rerenderFn(),500);
      }else{
        // For tap puzzles, narrow displayed options
        narrowTapOptions(puzzle);
      }
    }
  }
  if(state.wrongCount>=2&&!state.overrideTriggered){
    state.overrideTriggered=true;
    closeScanner();
    triggerOverride(puzzle,puzzleType,rerenderFn);
  }
}
function narrowTapOptions(puzzle){
  // For system scanner / mystery input: apply strong scanner by highlighting
  if(puzzle.strongScanner){
    const cards=document.querySelectorAll('.answer-card:not(.dimmed)');
    cards.forEach(c=>{
      const label=c.textContent.replace(/[✔✖]/g,'').trim();
      const isNarrow=puzzle.strongScanner.some(opt=>{
        return label.includes(opt)||opt.includes(label.replace(/[^\w\s]/g,'').trim());
      });
      if(!isNarrow)c.classList.add('dimmed');
    });
  }
}
function openScanner(){
  const o=$('scannerOverlay');
  if(o){o.style.display='block';o.classList.add('active')}
}
function triggerOverride(puzzle,puzzleType,rerenderFn){
  if(puzzleType==='tap'){
    // Highlight correct answer
    const cards=document.querySelectorAll('.answer-card[data-correct="true"],.match-card[data-correct="true"],.seq-card[data-correct="true"],.diag-chip[data-correct="true"],.final-card[data-correct="true"]');
    cards.forEach(c=>{
      c.classList.add('highlighted');
      c.classList.remove('dimmed');
      const lbl=document.createElement('div');
      lbl.style.cssText='font-size:10px;color:var(--current);margin-top:4px;font-weight:600';
      lbl.textContent='📡 Scanner locked on';
      c.appendChild(lbl);
    });
  }else if(puzzleType==='match'){
    // Auto-solve cascade for match lock
    autoSolveMatchCascade(puzzle);
  }else if(puzzleType==='sequence'){
    autoSolveSequenceCascade(puzzle);
  }else if(puzzleType==='diagnostic'){
    autoSolveDiagnosticCascade(puzzle);
  }
}
function autoSolveMatchCascade(puzzle){
  const area=$('puzzleArea');
  area.innerHTML=`<div style="text-align:center"><div style="font-size:16px;color:var(--current);margin-bottom:12px">📡 Lock override triggered</div><div id="cascade-area"></div></div>`;
  const cas=$('cascade-area');
  // Show already-matched pairs first
  for(let j=0;j<state.matchStep;j++){
    const prev=document.createElement('div');prev.className='matched-pair';
    prev.innerHTML=`✔ ${puzzle.pairs[j].term} → ${puzzle.pairs[j].correct}`;
    cas.appendChild(prev);
  }
  let i=state.matchStep;
  function next(){
    if(i>=puzzle.pairs.length){
      setTimeout(()=>puzzleSolved(puzzle.digit),500);return;
    }
    const pair=puzzle.pairs[i];
    const el=document.createElement('div');el.className='matched-pair';el.style.opacity='0';
    el.innerHTML=`✔ ${pair.term} → ${pair.correct}`;
    cas.appendChild(el);
    setTimeout(()=>el.style.opacity='1',50);
    i++;
    setTimeout(next,500);
  }
  next();
}

// ===== PUZZLE SOLVED =====
function puzzleSolved(digit){
  if(state.puzzleSolving)return;
  state.puzzleSolving=true;
  try{
    closeScanner();closeAllOverlays();
    // Update vault IMMEDIATELY
    updateVaultDigit(state.room,state.puzzleIndex,digit);
    // Track stats
    state.puzzlesSolved++;
    const wasFirstTry=!state.puzzleHadWrong;
    state.roomFirstTry[state.room][state.puzzleIndex]=wasFirstTry;
    state.roomWrongCounts[state.room][state.puzzleIndex]=state.puzzleHadWrong?Math.max(state.wrongCount,1):0;
    state.puzzleScannerUsed[state.room][state.puzzleIndex]=state.puzzleUsedScanner;
    state.puzzleSolvedAfterScanner[state.room][state.puzzleIndex]=(state.puzzleUsedScanner&&!state.overrideTriggered);
    if(wasFirstTry){state.firstTrySolves++;state.streak++}
    else{state.streak=0}
    // Update UI
    $('puzzlesCleared').textContent=`Puzzles Cleared: ${state.puzzlesSolved}/6`;
    $('puzzlesCleared').classList.add('pulse');
    setTimeout(()=>$('puzzlesCleared').classList.remove('pulse'),400);
    // Streak
    $('streakIcon').style.display=state.streak>=2?'inline':'none';
    // Show digit reveal
    showDigitReveal(digit);
  }catch(e){
    console.error('puzzleSolved error:',e);
    advanceAfterPuzzle();
  }
}
function showDigitReveal(digit){
  const el=$('digitReveal');
  el.innerHTML=`<div class="digit-reveal-content">
    <div class="digit-reveal-label">CODE DIGIT UNLOCKED</div>
    <div class="digit-reveal-num">${digit}</div>
    <div class="digit-reveal-sub">Stored in Code Vault</div>
    <button class="digit-continue" onclick="advanceAfterPuzzle()">Continue →</button>
  </div>`;
  el.style.display='flex';el.classList.add('active');
  try{spawnParticles(window.innerWidth/2,window.innerHeight/2,10,ROOMS[state.room].color)}catch(e){}
  // Safety timeout
  setTimeout(()=>{if(el.classList.contains('active'))advanceAfterPuzzle()},8000);
}
function advanceAfterPuzzle(){
  closeAllOverlays();
  state.puzzleIndex++;
  state.puzzleSolving=false;
  if(state.puzzleIndex>=2){
    // Room complete
    markVaultRoom(state.room);
    showCodeEntry();
  }else{
    showScanPreview(state.room,state.puzzleIndex);
  }
}

// ===== CODE ENTRY =====
function showCodeEntry(){
  closeAllOverlays();
  const r=ROOMS[state.room];
  const d0=state.vaultDigits[state.room][0]||'?';
  const d1=state.vaultDigits[state.room][1]||'?';
  const el=$('codeEntry');
  el.innerHTML=`<div class="code-entry-box">
    <div class="code-entry-title">Enter Room ${state.room+1} Code</div>
    <div class="code-entry-subtitle">Your digits: ${d0} ${d1}</div>
    <div class="code-digits">
      <input class="code-digit-input" id="cd1" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
      <input class="code-digit-input" id="cd2" type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
    </div>
    <button class="code-submit" onclick="checkCode()">Submit Code</button>
    <div class="code-error" id="codeError"></div>
  </div>`;
  el.style.display='flex';el.classList.add('active');
  setTimeout(()=>{try{$('cd1').focus()}catch(e){}},100);
  // Auto-advance input
  $('cd1').addEventListener('input',function(){if(this.value.length===1)$('cd2').focus()});
  $('cd2').addEventListener('input',function(){if(this.value.length===1)checkCode()});
}
function checkCode(){
  const code=($('cd1').value||'')+($('cd2').value||'');
  const correct=ROOMS[state.room].code;
  if(code===correct){
    closeAllOverlays();
    if(state.room<2){
      showPassLaptop(state.room+1);
    }else{
      showFinalLock();
    }
  }else{
    $('codeError').textContent='Wrong code — check your Code Vault digits!';
    $('cd1').value='';$('cd2').value='';
    try{$('cd1').focus()}catch(e){}
  }
}

// ===== PASS THE LAPTOP =====
function showPassLaptop(nextRoom){
  closeAllOverlays();
  const r=ROOMS[nextRoom];
  document.documentElement.style.setProperty('--current',r.color);
  const el=$('passLaptop');
  el.innerHTML=`<div class="pass-content">
    <div class="pass-emoji">💻</div>
    <div class="pass-title">PASS THE LAPTOP</div>
    <div class="pass-sub">Next player's turn!</div>
    <button class="pass-btn" onclick="afterPass(${nextRoom})">Ready →</button>
  </div>`;
  el.style.display='flex';el.classList.add('active');
}
function afterPass(nextRoom){
  closeAllOverlays();
  showDoorTransition(nextRoom);
}

// ===== DOOR TRANSITION =====
function showDoorTransition(nextRoom,isFinal){
  if(state.doorTransitioning)return;
  state.doorTransitioning=true;
  closeAllOverlays();
  const r=isFinal?null:ROOMS[nextRoom];
  const color=r?r.color:'#f9a825';
  const emoji=r?r.emoji:'🔐';
  const label=isFinal?'FINAL LOCK':(r?r.name:'');
  document.documentElement.style.setProperty('--current',color);
  const el=$('doorOverlay');
  el.style.display='flex';el.classList.add('active');
  el.style.background='var(--bg)';
  el.innerHTML=`<div class="door-frame" style="border-color:${color}">
    <div class="door-lock" id="doorLock">${emoji}</div>
  </div>
  <div class="door-label" id="doorLabel">${label}</div>`;
  const duration=isFinal?1800:1200;
  const frame=el.querySelector('.door-frame');
  const lbl=$('doorLabel');
  try{
    frame.animate([
      {opacity:0,transform:'translateX(0)'},
      {opacity:1,transform:'translateX(0)',offset:.3},
      {opacity:1,transform:'translateX(0)',offset:.55},
      {opacity:0,transform:'translateX(-110%)'}
    ],{duration,easing:'ease-in-out',fill:'forwards'});
    lbl.animate([{opacity:0},{opacity:1,offset:.35},{opacity:1,offset:.6},{opacity:0}],{duration,easing:'ease-in-out',fill:'forwards'});
  }catch(e){}
  let transitionDone=false;
  function finishTransition(){
    if(transitionDone)return;
    transitionDone=true;
    state.doorTransitioning=false;
    el.classList.remove('active');el.style.display='none';
    if(isFinal)loadFinalLock();
    else enterRoom(nextRoom);
  }
  setTimeout(finishTransition,duration+100);
  setTimeout(finishTransition,duration+300);// safety backup
}

// ===== FINAL LOCK =====
function showFinalLock(){
  showDoorTransition(null,true);
}
function loadFinalLock(){
  state.phase='final';
  $('roomLabel').innerHTML='🔐 Final Lock <span class="room-progress">Master Match</span>';
  $('missionLine').textContent='This is it! Match each term to its cross-room connection.';
  $('scannerBtn').style.display='none';
  $('progressDots').innerHTML='';
  document.documentElement.style.setProperty('--current','#f9a825');
  renderFinalMatch();
}
function renderFinalMatch(){
  const area=$('puzzleArea');
  const pairs=FINAL_LOCK.pairs;
  let selectedTerm=null;
  let matched=[];
  const shuffledTerms=[...pairs].sort(()=>Math.random()-.5);
  const shuffledMatches=[...pairs].sort(()=>Math.random()-.5);
  function render(){
    if(matched.length>=pairs.length){
      // All matched - escape!
      setTimeout(showEscapeAnimation,600);
      return;
    }
    area.innerHTML=`
      <div class="micro-progress">Match ${matched.length+1} of ${pairs.length}</div>
      <div class="puzzle-instruction">👆 Tap a term on the LEFT, then tap its match on the RIGHT.</div>
      <div class="final-match-area">
        <div class="final-col" id="fl-terms"></div>
        <div class="final-col" id="fl-matches"></div>
      </div>
      <div class="final-matched-pairs" id="fl-done"></div>`;
    const termsCol=$('fl-terms');
    const matchCol=$('fl-matches');
    shuffledTerms.forEach((p,i)=>{
      const card=document.createElement('div');card.className='final-card';
      card.style.borderColor=p.color;
      card.innerHTML=`${p.emoji} ${p.term}`;
      card.dataset.term=p.term;
      if(matched.find(m=>m.term===p.term)){card.classList.add('matched');card.style.opacity='.3'}
      else{
        card.addEventListener('click',()=>{
          document.querySelectorAll('#fl-terms .final-card').forEach(c=>c.classList.remove('selected'));
          card.classList.add('selected');card.style.borderColor=p.color;card.style.boxShadow=`0 0 15px ${p.color}`;
          selectedTerm=p;
        });
      }
      termsCol.appendChild(card);
    });
    shuffledMatches.forEach((p,i)=>{
      const card=document.createElement('div');card.className='final-card';
      card.innerHTML=p.match;card.dataset.match=p.match;
      if(matched.find(m=>m.match===p.match)){card.classList.add('matched');card.style.opacity='.3'}
      else{
        card.addEventListener('click',()=>{
          if(!selectedTerm)return;
          if(selectedTerm.match===p.match){
            card.classList.add('correct');card.style.borderColor=selectedTerm.color;
            const matchColor=selectedTerm.color;
            matched.push(selectedTerm);
            selectedTerm=null;
            try{const r=card.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,8,matchColor)}catch(e){}
            setTimeout(render,500);
          }else{
            card.classList.add('wrong');
            setTimeout(()=>card.classList.remove('wrong'),400);
          }
        });
      }
      matchCol.appendChild(card);
    });
    // Show matched
    const doneEl=$('fl-done');
    matched.forEach(m=>{
      const el=document.createElement('div');el.className='matched-pair';
      el.style.borderColor=m.color;
      el.innerHTML=`${m.emoji} ${m.term} → ${m.match}`;
      doneEl.appendChild(el);
    });
  }
  render();
}

// ===== ESCAPE ANIMATION =====
function showEscapeAnimation(){
  closeAllOverlays();
  $('gameScreen').classList.remove('active');
  $('codeVault').style.display='none';
  const el=$('escapeReport');
  el.style.display='flex';el.classList.add('active');
  // First show escape text
  el.innerHTML=`<div style="text-align:center;animation:escapePop .8s ease forwards"><div style="font-size:clamp(40px,8vw,64px);font-weight:700;color:#fff;text-shadow:0 0 40px rgba(249,168,37,.6),0 0 80px rgba(249,168,37,.3)">ESCAPED!</div></div>`;
  spawnConfetti();
  setTimeout(showEscapeReport,3000);
}

// ===== ESCAPE REPORT =====
function showEscapeReport(){
  closeAllOverlays();
  if(!$('escapeReport').classList.contains('active')){
    $('gameScreen').classList.remove('active');
    $('codeVault').style.display='none';
    $('escapeReport').style.display='flex';
    $('escapeReport').classList.add('active');
  }
  const elapsed=Math.floor((Date.now()-state.startTime)/1000);
  const mins=Math.floor(elapsed/60);
  const secs=elapsed%60;
  const timeStr=`${mins}:${secs.toString().padStart(2,'0')}`;
  // Stars
  let stars=1;
  if(state.firstTrySolves>=2)stars=2;
  if(state.firstTrySolves>=4)stars=3;
  // Badges
  const badges=[];
  // Clean Room: both puzzles in one room solved on first or second try (wrongCount<=1)
  for(let r=0;r<3;r++){
    if(!state.skippedRooms.has(r)){
      const wc=state.roomWrongCounts[r];
      if(wc[0]!==null&&wc[1]!==null&&wc[0]<=1&&wc[1]<=1){
        badges.push({name:'Clean Room',icon:'🧹'});break;
      }
    }
  }
  // Comeback: solved a puzzle after scanner was used (but without override = solved it themselves)
  for(let r=0;r<3;r++){
    for(let p=0;p<2;p++){
      if(state.puzzleSolvedAfterScanner[r][p]){
        badges.push({name:'Comeback',icon:'🔄'});r=3;break;
      }
    }
  }
  // No Scanner: completed a full room without scanner activating on either puzzle
  for(let r=0;r<3;r++){
    if(!state.skippedRooms.has(r)&&
       state.roomWrongCounts[r][0]!==null&&state.roomWrongCounts[r][1]!==null&&
       !state.puzzleScannerUsed[r][0]&&!state.puzzleScannerUsed[r][1]){
      badges.push({name:'No Scanner',icon:'🔇'});break;
    }
  }
  // Deep Scan: used scanner and still got puzzle right on next try (solved after scanner, first try after scanner)
  for(let r=0;r<3;r++){
    for(let p=0;p<2;p++){
      if(state.puzzleSolvedAfterScanner[r][p]&&state.roomWrongCounts[r][p]===1){
        badges.push({name:'Deep Scan',icon:'🔍'});r=3;break;
      }
    }
  }
  const roomsCleared=3-state.skippedRooms.size;
  const starsHTML='⭐'.repeat(stars)+'<span style="opacity:.15">'+'⭐'.repeat(3-stars)+'</span>';
  const el=$('escapeReport');
  el.innerHTML=`<div class="report-wrap">
    <div class="report-brand">Mr. Jawad's Escape Room Simulations</div>
    <div class="report-title">ESCAPED!</div>
    <div class="report-subtitle">Conflict &amp; Relationships — Unit Review</div>
    <div class="report-stars">${starsHTML}</div>
    <div class="report-stats">
      <div class="report-stat"><div class="report-stat-val">${roomsCleared}/3</div><div class="report-stat-label">Rooms Cleared</div></div>
      <div class="report-stat"><div class="report-stat-val">${state.puzzlesSolved}/6</div><div class="report-stat-label">Puzzles Cleared</div></div>
      <div class="report-stat"><div class="report-stat-val">${state.firstTrySolves}/6</div><div class="report-stat-label">First-Try Solves</div></div>
      <div class="report-stat"><div class="report-stat-val">${timeStr}</div><div class="report-stat-label">Time</div></div>
    </div>
    <div class="report-badges" id="report-badges"></div>
    <div class="report-actions">
      <button class="report-btn primary" onclick="copyReport()">📋 Copy Report</button>
      <button class="report-btn secondary" onclick="playAgain()">🔄 Play Again</button>
    </div>
  </div>`;
  const badgeEl=$('report-badges');
  const allBadgeDefs=[
    {name:'Clean Room',icon:'🧹'},{name:'Comeback',icon:'🔄'},{name:'No Scanner',icon:'🔇'},{name:'Deep Scan',icon:'🔍'}
  ];
  allBadgeDefs.forEach(bd=>{
    const earned=badges.some(b=>b.name===bd.name);
    const el=document.createElement('div');
    el.className='report-badge'+(earned?' earned':'');
    el.innerHTML=`${bd.icon} ${bd.name}`;
    badgeEl.appendChild(el);
  });
}
function copyReport(){
  const elapsed=Math.floor((Date.now()-state.startTime)/1000);
  const mins=Math.floor(elapsed/60);const secs=elapsed%60;
  const timeStr=`${mins}:${secs.toString().padStart(2,'0')}`;
  let stars=1;if(state.firstTrySolves>=2)stars=2;if(state.firstTrySolves>=4)stars=3;
  const text=`Mr. Jawad's Escape Room — Conflict & Relationships\n`+
    `${'⭐'.repeat(stars)} (${stars}/3 Stars)\n`+
    `Rooms: ${3-state.skippedRooms.size}/3\tPuzzles: ${state.puzzlesSolved}/6\tFirst-Try: ${state.firstTrySolves}/6\tTime: ${timeStr}`;
  try{navigator.clipboard.writeText(text);
    const btn=document.querySelector('.report-btn.primary');
    if(btn){btn.textContent='✔ Copied!';setTimeout(()=>btn.textContent='📋 Copy Report',2000)}
  }catch(e){/* clipboard not available */}
}
function playAgain(){
  // Full reset
  Object.assign(state,{
    phase:'start',room:0,puzzleIndex:0,puzzlesSolved:0,firstTrySolves:0,
    streak:0,wrongCount:0,scannerUsed:false,overrideTriggered:false,
    puzzleSolving:false,startTime:0,
    roomScanner:[false,false,false],roomFirstTry:[[null,null],[null,null],[null,null]],
    roomWrongCounts:[[null,null],[null,null],[null,null]],
    vaultDigits:[[null,null],[null,null],[null,null]],
    skippedRooms:new Set(),
    puzzleScannerUsed:[[false,false],[false,false],[false,false]],
    puzzleSolvedAfterScanner:[[false,false],[false,false],[false,false]],
    qfCumulativeWrong:0,qfCurrentQ:0,qfQuestions:null,qfCorrectCount:0,
    matchStep:0,seqStep:0,diagSlot:0,previewDone:false,doorTransitioning:false,puzzleHadWrong:false,puzzleUsedScanner:false
  });
  closeAllOverlays();
  $('escapeReport').classList.remove('active');$('escapeReport').style.display='none';
  $('gameScreen').classList.remove('active');
  $('startScreen').classList.add('active');
  $('codeVault').style.display='none';
  $('streakIcon').style.display='none';
  $('puzzlesCleared').textContent='Puzzles Cleared: 0/6';
}

// ===== EMERGENCY SKIP =====
let skipConfirmActive=false;
document.addEventListener('mousedown',e=>{
  if(skipConfirmActive)return;// Don't start new 5s timer during confirmation phase
  const label=$('roomLabel');
  if(label&&label.contains(e.target)){
    state.longPressTimer=setTimeout(()=>{
      skipConfirmActive=true;
      const conf=document.createElement('div');conf.id='skipConfirm';
      conf.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#fff;padding:20px;border-radius:12px;z-index:999;text-align:center;border:1px solid var(--gold)';
      conf.innerHTML='<div style="margin-bottom:8px;color:var(--gold)">⚠️ Skip this room?</div><div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:12px">Hold again to confirm</div>';
      document.body.appendChild(conf);
      let confirmTimer=null;
      const cleanup=()=>{skipConfirmActive=false;try{conf.remove()}catch(e){}};
      // Auto-dismiss after 4 seconds if no action
      const dismissTO=setTimeout(cleanup,4000);
      const confirmDown=()=>{
        confirmTimer=setTimeout(()=>{
          clearTimeout(dismissTO);cleanup();executeSkip();
        },2000);
      };
      const confirmUp=()=>{clearTimeout(confirmTimer);confirmTimer=null};
      document.addEventListener('mousedown',confirmDown,{once:true});
      document.addEventListener('mouseup',confirmUp,{once:true});
    },5000);
  }
});
document.addEventListener('mouseup',()=>{
  if(!skipConfirmActive)clearTimeout(state.longPressTimer);
});

// Shift+S skip
document.addEventListener('keydown',e=>{
  if(e.key==='S'&&e.shiftKey){
    if(!state.shiftSStart)state.shiftSStart=Date.now();
    if(!state.shiftSTimer){
      state.shiftSTimer=setInterval(()=>{
        if(Date.now()-state.shiftSStart>=2000){
          clearInterval(state.shiftSTimer);state.shiftSTimer=null;state.shiftSStart=0;
          executeSkip();
        }
      },100);
    }
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='S'){
    clearInterval(state.shiftSTimer);state.shiftSTimer=null;state.shiftSStart=0;
  }
});

function executeSkip(){
  closeAllOverlays();
  if(state.phase==='final'){
    showEscapeReport();return;
  }
  if(state.phase!=='room'&&state.phase!=='tutorial')return;
  // Reveal all digits for current room
  const r=ROOMS[state.room];
  const code=r.code;
  for(let i=0;i<2;i++){
    if(state.vaultDigits[state.room][i]===null){
      updateVaultDigit(state.room,i,code[i]+' (Skipped)');
    }
  }
  state.skippedRooms.add(state.room);
  markVaultRoom(state.room);
  // Advance
  if(state.room<2){
    showPassLaptop(state.room+1);
  }else{
    showFinalLock();
  }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  // Room background tint
  try{
    const style=document.createElement('style');
    style.textContent=`
      #gameScreen{background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,.03),var(--bg) 70%,#0f0f1e 100%)}
    `;
    document.head.appendChild(style);
  }catch(e){}
});
</script>
