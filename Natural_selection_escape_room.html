<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mr. Jawad Unit Review: Natural Selection</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a2e;--bg2:#16213e;--text:#fff;--text-dim:#8a8aa0;
--r1:#00c853;--r1a:#69f0ae;--r1bg:rgba(0,200,83,.08);
--r2:#ff1744;--r2a:#ff8a80;--r2bg:rgba(255,23,68,.08);
--r3:#2979ff;--r3a:#82b1ff;--r3bg:rgba(41,121,255,.08);
--teal:#00bcd4;--gold:#f9a825;
--correct:#00e676;--wrong:#ff1744;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto}
.screen.active{display:flex}

/* START SCREEN */
#startScreen{background:radial-gradient(ellipse at center,#16213e 0%,#0f0f23 100%);text-align:center;gap:12px}
.brand-line{font-size:clamp(10px,1.4vw,13px);letter-spacing:4px;text-transform:uppercase;color:var(--teal);font-weight:700;margin-top:-30px}
.title-main{font-size:clamp(28px,5vw,52px);font-weight:800;color:#fff;text-shadow:0 0 30px rgba(0,188,212,.4);line-height:1.1;margin:8px 0}
.title-divider{width:80px;height:2px;background:var(--teal);box-shadow:0 0 10px var(--teal);margin:4px auto}
.title-sub{font-size:clamp(14px,2vw,20px);color:#ccc;font-weight:300;letter-spacing:2px}
.start-btn{margin-top:24px;padding:16px 48px;font-size:clamp(16px,2vw,20px);font-weight:700;background:transparent;border:2px solid var(--teal);color:var(--teal);border-radius:8px;letter-spacing:2px;text-transform:uppercase;transition:all .3s;box-shadow:0 0 15px rgba(0,188,212,.2)}
.start-btn:hover,.start-btn:active{background:var(--teal);color:#1a1a2e;box-shadow:0 0 30px rgba(0,188,212,.5)}
.footer-brand{position:absolute;bottom:20px;font-size:10px;letter-spacing:3px;color:#555;text-transform:uppercase}

/* TOP BAR */
.top-bar{width:100%;padding:8px 16px;display:flex;align-items:center;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);position:relative;z-index:10;min-height:44px;flex-shrink:0}
.room-indicator{font-size:clamp(12px,1.5vw,15px);font-weight:600;white-space:nowrap}
.streak-icon{font-size:18px;margin-left:10px;display:none}
.streak-icon.active{display:inline-block;animation:counterPulse 0.6s infinite alternate}
.puzzles-cleared{margin-left:auto;font-size:clamp(12px,1.4vw,14px);font-weight:600;white-space:nowrap}
.puzzles-cleared .count{transition:all .3s}

/* CODE VAULT */
.code-vault{position:fixed;top:52px;right:12px;z-index:50;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;display:none;backdrop-filter:blur(4px)}
.code-vault.visible{display:block}
.vault-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#888;text-align:center;margin-bottom:4px}
.vault-rooms{display:flex;gap:8px}
.vault-room{display:flex;flex-direction:column;align-items:center;gap:2px}
.vault-room-label{font-size:10px;color:#888}
.vault-digits{display:flex;gap:3px}
.vault-digit{width:20px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#555;transition:all .4s}
.vault-digit.revealed{color:#fff;border-color:currentColor;animation:vaultReveal .5s ease;text-shadow:0 0 8px currentColor}

/* MISSION LINE */
.mission-line{width:100%;text-align:center;padding:6px 16px;font-size:clamp(12px,1.5vw,15px);color:#ccc;font-style:italic;opacity:.9;flex-shrink:0}

/* PUZZLE AREA */
.puzzle-area{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px;position:relative;overflow:hidden}
.puzzle-container{width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center;gap:12px}

/* BOTTOM BAR */
.bottom-bar{width:100%;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.scanner-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#ccc;font-size:13px;font-weight:600;transition:all .3s;min-width:48px;min-height:48px}
.scanner-btn:hover{background:rgba(255,255,255,.12)}
.scanner-btn.pulse{animation:scanPulse 1.5s infinite}
.progress-dots{display:flex;gap:8px}
.progress-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .4s}
.progress-dot.filled{box-shadow:0 0 8px currentColor;background:currentColor}

/* ROOM SCREEN */
.room-screen{flex-direction:column}

/* SCANNER OVERLAY */
.scanner-overlay{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(0,0,0,.92);border-top:2px solid;padding:16px 20px;display:none;flex-direction:column;gap:10px;max-height:40vh;overflow-y:auto;animation:slideUp .3s ease}
.scanner-overlay.open{display:flex}
.scanner-text{font-size:clamp(13px,1.6vw,16px);color:#ddd;line-height:1.4}
.scanner-dismiss{align-self:flex-end;padding:8px 16px;font-size:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#aaa;min-height:36px}

/* INSTRUCTION TEXT */
.puzzle-instruction{font-size:clamp(13px,1.5vw,16px);color:#bbb;text-align:center;margin-bottom:4px}
.micro-progress{font-size:clamp(11px,1.3vw,13px);color:#888;text-align:center;font-weight:600;letter-spacing:1px}

/* MATCH LOCK */
.match-area{display:flex;gap:20px;justify-content:center;align-items:center;width:100%;flex-wrap:wrap}
.match-col{display:flex;flex-direction:column;gap:10px;min-width:140px}
.match-card{padding:14px 20px;border-radius:10px;font-size:clamp(14px,1.8vw,18px);font-weight:600;text-align:center;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);cursor:pointer;transition:all .3s;min-height:48px;min-width:48px;position:relative;user-select:none}
.match-card:active{transform:scale(.97)}
.match-card.selected{transform:scale(1.05);border-width:3px;box-shadow:0 0 20px rgba(255,255,255,.2)}
.match-card.selected::after{content:'▶ SELECTED';position:absolute;top:-10px;right:-5px;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:800;letter-spacing:1px;background:rgba(0,0,0,.7);color:#fff}
.match-card.correct{border-color:var(--correct)!important;background:rgba(0,230,118,.15)!important;box-shadow:0 0 15px rgba(0,230,118,.3)!important}
.match-card.wrong{animation:wrongShake .4s ease}
.match-card.dimmed{opacity:.35;pointer-events:none}
.match-card.locked{pointer-events:none}

/* SEQUENCE LOCK */
.seq-slots{display:flex;gap:10px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.seq-slot{width:clamp(100px,20vw,180px);height:50px;border:2px dashed rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#555;position:relative}
.seq-slot.filled{border-style:solid;color:#fff;font-weight:600}
.seq-slot .arrow{position:absolute;right:-14px;font-size:16px;color:#555}
.seq-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.seq-card{padding:12px 18px;border-radius:10px;font-size:clamp(13px,1.6vw,16px);font-weight:600;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);cursor:pointer;transition:all .3s;min-height:48px;user-select:none;text-align:center}
.seq-card:active{transform:scale(.97)}
.seq-card.correct{border-color:var(--correct);background:rgba(0,230,118,.15);box-shadow:0 0 12px rgba(0,230,118,.3)}
.seq-card.wrong{animation:wrongShake .4s ease}
.seq-card.dimmed{opacity:.35;pointer-events:none}
.seq-card.locked{pointer-events:none;opacity:.4}
.seq-card.hidden{display:none}

/* SYSTEM SCANNER */
.gauges-container{display:flex;gap:clamp(16px,4vw,40px);justify-content:center;align-items:flex-end;padding:10px;width:100%}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-bar-outer{width:clamp(50px,10vw,70px);height:clamp(100px,18vh,160px);background:rgba(255,255,255,.06);border-radius:8px;border:1px solid rgba(255,255,255,.1);position:relative;overflow:hidden}
.gauge-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 6px 6px;transition:height 1s ease}
.gauge-label{font-size:clamp(10px,1.3vw,13px);font-weight:600;text-align:center;color:#ccc}
.gauge-header{font-size:clamp(12px,1.5vw,15px);font-weight:700;text-align:center;padding:6px 12px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.answer-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.answer-card{padding:14px 24px;border-radius:10px;font-size:clamp(14px,1.8vw,18px);font-weight:600;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);cursor:pointer;transition:all .3s;min-height:48px;min-width:48px;user-select:none}
.answer-card:active{transform:scale(.97)}
.answer-card.correct{border-color:var(--correct);background:rgba(0,230,118,.15);box-shadow:0 0 15px rgba(0,230,118,.3)}
.answer-card.wrong{animation:wrongShake .4s ease}
.answer-card.dimmed{opacity:.35;pointer-events:none}
.answer-card.override-glow{border-color:var(--correct);box-shadow:0 0 20px rgba(0,230,118,.4);animation:scanPulse 1s infinite}

/* QUICK FIRE */
.qf-question{font-size:clamp(16px,2.2vw,22px);font-weight:600;text-align:center;padding:10px;line-height:1.3}
.qf-buttons{display:flex;gap:16px;justify-content:center}
.qf-btn{padding:16px 36px;font-size:clamp(16px,2vw,20px);font-weight:800;border-radius:10px;letter-spacing:2px;min-height:56px;min-width:100px;transition:all .3s}
.qf-btn.confirm{background:rgba(0,230,118,.12);border:2px solid var(--correct);color:var(--correct)}
.qf-btn.deny{background:rgba(255,23,68,.12);border:2px solid var(--wrong);color:var(--wrong)}
.qf-btn:active{transform:scale(.95)}
.qf-progress{display:flex;gap:8px;justify-content:center}
.qf-pip{width:clamp(30px,8vw,50px);height:6px;border-radius:3px;background:rgba(255,255,255,.1);transition:all .3s}
.qf-pip.correct{background:var(--correct)}
.qf-pip.wrong{background:var(--wrong)}
.qf-pip.active{border:1px solid rgba(255,255,255,.3)}

/* MYSTERY INPUT */
.chain-container{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;padding:10px}
.chain-box{padding:10px 16px;border-radius:8px;font-size:clamp(12px,1.5vw,15px);font-weight:600;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);text-align:center}
.chain-arrow{font-size:20px;color:#555}
.chain-mystery{border-color:var(--gold);background:rgba(249,168,37,.1);color:var(--gold);font-size:clamp(16px,2vw,22px);min-width:60px}

/* SPOT THE DIFFERENCE */
.std-container{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;width:100%}
.std-card{flex:1;min-width:clamp(150px,30vw,280px);max-width:320px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .3s;user-select:none}
.std-card-header{font-size:clamp(14px,1.8vw,18px);font-weight:700}
.std-fossil-icon{font-size:clamp(36px,6vw,56px)}
.std-badge{padding:8px 16px;border-radius:20px;font-size:clamp(12px,1.4vw,14px);font-weight:700;min-height:40px;display:flex;align-items:center;gap:4px;transition:all .3s}
.std-card.wrong-tap{animation:wrongShake .4s ease}
.std-card.wrong-tap .std-badge{background:rgba(255,23,68,.2)!important;border-color:var(--wrong)!important}
.std-card.dimmed{opacity:.4;pointer-events:none}
.std-card.correct-found .std-badge{background:rgba(0,230,118,.2)!important;border-color:var(--correct)!important}

/* DIGIT REVEAL */
.digit-reveal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:70;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.digit-reveal-overlay.open{display:flex}
.digit-big{font-size:clamp(60px,15vw,120px);font-weight:900;animation:digitPop .6s ease;text-shadow:0 0 40px currentColor}
.digit-label{font-size:clamp(14px,1.8vw,18px);color:#ccc}

/* CODE ENTRY */
.code-entry-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:70;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.code-entry-overlay.open{display:flex}
.code-title{font-size:clamp(18px,3vw,28px);font-weight:800}
.code-subtitle{font-size:clamp(13px,1.6vw,16px);color:#ccc}
.code-display{display:flex;gap:12px}
.code-digit-slot{width:clamp(50px,10vw,70px);height:clamp(60px,12vw,80px);border:2px solid rgba(255,255,255,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,5vw,40px);font-weight:800;background:rgba(255,255,255,.05);transition:all .3s}
.code-digit-slot.filled{border-color:currentColor;text-shadow:0 0 10px currentColor}
.code-digit-slot.wrong{animation:wrongShake .4s ease;border-color:var(--wrong)!important}
.code-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px}
.code-key{padding:14px;font-size:clamp(18px,3vw,24px);font-weight:700;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;min-height:48px;transition:all .2s}
.code-key:active{background:rgba(255,255,255,.2);transform:scale(.95)}
.code-key.backspace{font-size:16px}

/* PASS THE LAPTOP */
.pass-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:70;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.pass-overlay.open{display:flex}
.pass-text{font-size:clamp(28px,5vw,48px);font-weight:900;letter-spacing:3px;text-shadow:0 0 30px currentColor}
.pass-ready{padding:16px 40px;font-size:clamp(16px,2vw,20px);font-weight:700;border-radius:10px;background:transparent;color:currentColor;border:2px solid;letter-spacing:2px;animation:readyPulse 1.5s infinite;min-height:48px}

/* DOOR TRANSITION */
.door-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:80;display:flex;align-items:center;justify-content:center;pointer-events:none}
.door-panel{width:80%;max-width:400px;height:60%;background:#111;border:3px solid;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;position:relative}
.door-lock{font-size:48px}
.door-room-name{font-size:clamp(16px,2.5vw,24px);font-weight:800;letter-spacing:2px}

/* FINAL LOCK */
.final-header{font-size:clamp(22px,4vw,36px);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.3);letter-spacing:2px}
.final-match-area{display:flex;gap:clamp(16px,4vw,40px);justify-content:center;width:100%;flex-wrap:wrap}
.final-match-col{display:flex;flex-direction:column;gap:10px;min-width:clamp(140px,25vw,220px)}
.final-card{padding:12px 18px;border-radius:10px;font-size:clamp(13px,1.6vw,17px);font-weight:600;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);cursor:pointer;transition:all .3s;min-height:48px;text-align:center;user-select:none;position:relative}
.final-card:active{transform:scale(.97)}
.final-card.selected{transform:scale(1.05);box-shadow:0 0 20px rgba(255,255,255,.2)}
.final-card.selected::after{content:'▶';position:absolute;top:-8px;right:-4px;font-size:10px;padding:2px 5px;border-radius:4px;font-weight:800;background:rgba(0,0,0,.7);color:#fff}
.final-card.matched{pointer-events:none}
.final-card.wrong{animation:wrongShake .4s ease}
.final-card.dimmed{opacity:.35;pointer-events:none}

/* SCAN PREVIEW */
.scan-preview{position:fixed;top:0;left:0;right:0;bottom:0;z-index:75;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.scan-preview.open{display:flex}
.scan-frame{border:2px solid;border-radius:12px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:10px;max-width:80%;animation:digitPop .5s ease}
.scan-label{font-size:clamp(12px,1.4vw,14px);text-transform:uppercase;letter-spacing:2px;color:#999}
.scan-visual{font-size:clamp(40px,8vw,64px)}
.scan-desc{font-size:clamp(14px,1.8vw,18px);font-weight:600}
.scanning-text{font-size:clamp(11px,1.3vw,13px);text-transform:uppercase;letter-spacing:3px;opacity:.6}

/* ESCAPE REPORT */
#escapeReport{background:radial-gradient(ellipse at center,#16213e 0%,#0f0f23 100%);overflow-y:auto;padding:20px;gap:16px}
.report-brand{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--teal)}
.escaped-text{font-size:clamp(32px,6vw,56px);font-weight:900;color:#fff;text-shadow:0 0 40px rgba(0,230,118,.5);animation:escapePop 1s ease}
.report-card{width:100%;max-width:500px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:12px}
.report-row{display:flex;justify-content:space-between;align-items:center;font-size:clamp(14px,1.6vw,17px)}
.report-label{color:#999}
.report-value{font-weight:700}
.report-stars{font-size:clamp(24px,4vw,36px)}
.report-star{opacity:.2;transition:opacity .5s}
.report-star.earned{opacity:1}
.report-badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.badge{padding:6px 14px;border-radius:20px;font-size:clamp(11px,1.3vw,13px);font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);animation:counterPulse .5s ease}
.badge.earned{border-color:var(--gold);color:var(--gold);background:rgba(249,168,37,.1)}
.report-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.report-btn{padding:14px 28px;font-size:clamp(14px,1.6vw,16px);font-weight:700;border-radius:8px;min-height:48px;letter-spacing:1px;transition:all .3s}
.btn-play-again{background:transparent;border:2px solid var(--teal);color:var(--teal)}
.btn-copy{background:var(--teal);color:#1a1a2e;border:2px solid var(--teal)}

/* KEYFRAME ANIMATIONS */
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes vaultReveal{0%{transform:scale(0);opacity:0}50%{transform:scale(1.4)}100%{transform:scale(1);opacity:1}}
@keyframes digitPop{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes scanPulse{0%,100%{box-shadow:0 0 5px rgba(255,255,255,.1)}50%{box-shadow:0 0 18px rgba(255,255,255,.3)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes readyPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes escapePop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes doorAnim{0%{opacity:0}25%{opacity:1}55%{opacity:1;transform:translateX(0)}100%{opacity:1;transform:translateX(-120%)}}
@keyframes doorAnimSlow{0%{opacity:0}20%{opacity:1}50%{opacity:1;transform:translateX(0)}100%{opacity:1;transform:translateX(-120%)}}
@keyframes lockPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@keyframes counterPulse{0%{transform:scale(1)}50%{transform:scale(1.2);text-shadow:0 0 10px currentColor}100%{transform:scale(1)}}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <div class="brand-line">Mr. Jawad's Escape Room Simulations</div>
  <div class="title-main">Natural Selection</div>
  <div class="title-divider"></div>
  <div class="title-sub">Unit Review</div>
  <button class="start-btn" onclick="startGame()">BEGIN ESCAPE</button>
  <div class="footer-brand">DESIGNED BY MR. JAWAD</div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen room-screen">
  <div class="top-bar" id="topBar">
    <span class="room-indicator" id="roomIndicator"></span>
    <span class="streak-icon" id="streakIcon">🔥</span>
    <span class="puzzles-cleared" id="puzzlesCleared">Puzzles: 0/6</span>
  </div>
  <div class="mission-line" id="missionLine"></div>
  <div class="puzzle-area" id="puzzleArea">
    <div class="puzzle-container" id="puzzleContainer"></div>
  </div>
  <div class="bottom-bar" id="bottomBar">
    <button class="scanner-btn" id="scannerBtn" onclick="openScanner()">🔍 Scanner</button>
    <div class="progress-dots" id="progressDots"></div>
  </div>
</div>

<!-- ESCAPE REPORT -->
<div id="escapeReport" class="screen"></div>

<!-- CODE VAULT (fixed overlay) -->
<div class="code-vault" id="codeVault">
  <div class="vault-title">Code Vault</div>
  <div class="vault-rooms" id="vaultRooms"></div>
</div>

<!-- SCANNER OVERLAY -->
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-text" id="scannerText"></div>
  <button class="scanner-dismiss" onclick="closeScanner()">Dismiss</button>
</div>

<!-- DIGIT REVEAL OVERLAY -->
<div class="digit-reveal-overlay" id="digitReveal">
  <div class="digit-label">CODE DIGIT UNLOCKED</div>
  <div class="digit-big" id="digitBig"></div>
  <button class="start-btn" style="margin-top:12px;padding:12px 32px;font-size:16px" onclick="closeDigitReveal()">Continue</button>
</div>

<!-- CODE ENTRY OVERLAY -->
<div class="code-entry-overlay" id="codeEntry">
  <div class="code-title" id="codeEntryTitle">Enter Room Code</div>
  <div class="code-subtitle" id="codeEntrySubtitle"></div>
  <div class="code-display" id="codeDisplay"></div>
  <div class="code-keypad" id="codeKeypad"></div>
</div>

<!-- PASS THE LAPTOP -->
<div class="pass-overlay" id="passOverlay">
  <div class="pass-text" id="passText">PASS THE LAPTOP</div>
  <button class="pass-ready" id="passReady" onclick="closePassOverlay()">Ready</button>
</div>

<!-- SCAN PREVIEW -->
<div class="scan-preview" id="scanPreview"></div>

const FINAL_LOCK = {
  pairs:[
    {term:'🏭 Trees darken',target:'🦋 Dark moths dominate',color:'#00c853',emoji:'🦋',scanText:'Color-Flip Moths — soot darkened the trees. Which moths survived?'},
    {term:'Food scarcity',target:'🟢 Small Green',color:'#ff1744',emoji:'🔬',scanText:'Selection Pressure Lab — food ran out in the beetle arena. Which group came out on top?'},
    {term:'🧬 Match is 98%',target:'👁 Can See It',color:'#2979ff',emoji:'🧬',scanText:'DNA Numbers — in Room 3, the chain showed "Match is 98%." What label did you tap for it?'}

};

    {term:'Sun ☀️',target:'Hot 🔥'},

/* ===================== STATE ===================== */
let state = {
  currentRoom:0,currentPuzzle:0,puzzlesCleared:0,
  firstTrySolves:0,streak:0,startTime:0,
  vaultDigits:[[null,null],[null,null],[null,null]],
  roomScannerUsed:[false,false,false],
  puzzleAttempts:{},badgeFlags:{},
  puzzleSolving:false,overrideTriggered:false,
  wrongCount:0,qfCumulativeWrong:0,qfMissed:[],
  seqStep:0,matchPair:0,diagSlot:0,
  selectedCard:null,scannerOpen:false,
  gamePhase:'start',skippedRooms:{},
  finalLockState:{wrongCounts:[0,0,0],matched:[false,false,false],scannerUsed:[false,false,false],overrides:[false,false,false],selectedTerm:null},
  _longPressInit:false
};

function resetState(){
  state={currentRoom:0,currentPuzzle:0,puzzlesCleared:0,firstTrySolves:0,streak:0,startTime:Date.now(),vaultDigits:[[null,null],[null,null],[null,null]],roomScannerUsed:[false,false,false],puzzleAttempts:{},badgeFlags:{},puzzleSolving:false,overrideTriggered:false,wrongCount:0,qfCumulativeWrong:0,qfMissed:[],seqStep:0,matchPair:0,diagSlot:0,selectedCard:null,scannerOpen:false,gamePhase:'playing',skippedRooms:{},finalLockState:{wrongCounts:[0,0,0],matched:[false,false,false],scannerUsed:[false,false,false],overrides:[false,false,false],selectedTerm:null},_longPressInit:false};
}

/* ===================== UTILITIES ===================== */
function $(id){return document.getElementById(id)}
function closeAllOverlays(){
  try{
    ['scannerOverlay','digitReveal','codeEntry','passOverlay','scanPreview'].forEach(function(id){
      var el=$(id);if(el){el.style.display='none';el.classList.remove('open');}
    });
    state.scannerOpen=false;
  }catch(e){console.error('closeAllOverlays:',e)}
}
function closeScanner(){
  try{var o=$('scannerOverlay');if(o){o.classList.remove('open');o.style.display='none';}}catch(e){}
}
function openScanner(){
  try{if(!state.scannerOpen)return;var o=$('scannerOverlay');if(o){o.style.display='flex';o.classList.add('open');}}catch(e){}
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  var el=$(id);if(el)el.classList.add('active');
}
function setRoomTheme(room){
  var r=ROOMS[room];if(!r)return;
  document.documentElement.style.setProperty('--rc',r.primary);
  document.documentElement.style.setProperty('--ra',r.accent);
}
function createParticles(x,y,color,count){
  try{
    count=Math.min(count||10,12);
    for(var i=0;i<count;i++){
      var p=document.createElement('div');
      var angle=Math.random()*Math.PI*2;
      var dist=40+Math.random()*60;
      var dx=Math.cos(angle)*dist;
      var dy=Math.sin(angle)*dist;
      p.style.cssText='position:fixed;width:8px;height:8px;border-radius:'+(Math.random()>.5?'50%':'2px')+';background:'+color+';left:'+x+'px;top:'+y+'px;z-index:100;pointer-events:none;';
      p.style.setProperty('--dx',dx+'px');
      p.style.setProperty('--dy',dy+'px');
      p.offsetHeight;
      p.style.transition='all .6s ease';
      p.style.transform='translate('+dx+'px,'+dy+'px)';
      p.style.opacity='0';
      document.body.appendChild(p);
      (function(el){
        setTimeout(function(){try{el.remove();}catch(e){}},700);
      })(p);
    }
  }catch(e){console.error('particles:',e)}
}
function updatePuzzlesCleared(){
  try{
    var el=$('puzzlesCleared');
    if(el){el.innerHTML='Puzzles: '+state.puzzlesCleared+'/6';el.style.animation='counterPulse .4s ease';setTimeout(function(){el.style.animation='';},500);}
  }catch(e){}
}
function updateStreak(){
  try{var el=$('streakIcon');if(el){if(state.streak>=2)el.classList.add('active');else el.classList.remove('active');}}catch(e){}
}
function updateProgressDots(){
  try{
    var dots=$('progressDots');if(!dots)return;
    dots.innerHTML='';
    var room=ROOMS[state.currentRoom];if(!room)return;
    for(var i=0;i<2;i++){
      var d=document.createElement('div');d.className='progress-dot';
      d.style.color=room.primary;
      if(i<state.currentPuzzle||(state.vaultDigits[state.currentRoom]&&state.vaultDigits[state.currentRoom][i]!==null))d.classList.add('filled');
      dots.appendChild(d);
    }
  }catch(e){}
}

/* ===================== CODE VAULT ===================== */
function initVault(){
  try{
    var vr=$('vaultRooms');if(!vr)return;vr.innerHTML='';
    for(var r=0;r<3;r++){
      var room=ROOMS[r];
      var div=document.createElement('div');div.className='vault-room';
      div.innerHTML='<div class="vault-room-label">'+room.emoji+'</div><div class="vault-digits"><div class="vault-digit" id="vd-'+r+'-0" style="color:'+room.primary+'">?</div><div class="vault-digit" id="vd-'+r+'-1" style="color:'+room.primary+'">?</div></div>';
      vr.appendChild(div);
    }
    $('codeVault').classList.add('visible');
  }catch(e){console.error('initVault:',e)}
}
function updateVaultDigit(room,puzzle,digit){
  try{
    state.vaultDigits[room][puzzle]=digit;
    var el=$('vd-'+room+'-'+puzzle);
    if(el){el.textContent=digit;el.classList.add('revealed');}
  }catch(e){}
}

/* ===================== START GAME ===================== */
function startGame(){
  try{
    resetState();showScreen('gameScreen');initVault();
    showTutorial();
  }catch(e){console.error('startGame:',e)}
}

/* ===================== TUTORIAL LOCK ===================== */
function showTutorial(){
  try{
    state.gamePhase='tutorial';
    $('roomIndicator').textContent='📖 Tutorial';
    $('missionLine').textContent='Practice: Tap a word, then tap its match.';
    $('bottomBar').style.display='none';
    var container=$('puzzleContainer');container.innerHTML='';
    var tutPair=0;
    function renderTutPair(){
      container.innerHTML='';
      if(tutPair>=TUTORIAL.pairs.length){finishTutorial();return;}
      var pair=TUTORIAL.pairs[tutPair];
      var inst=document.createElement('div');inst.className='puzzle-instruction';inst.textContent='👆 Tap the word, then tap its match';container.appendChild(inst);
      var mp=document.createElement('div');mp.className='micro-progress';mp.textContent='Pair '+(tutPair+1)+' of '+TUTORIAL.pairs.length;container.appendChild(mp);
      var area=document.createElement('div');area.className='match-area';
      var leftCol=document.createElement('div');leftCol.className='match-col';
      var rightCol=document.createElement('div');rightCol.className='match-col';
      var termCard=document.createElement('div');termCard.className='match-card';termCard.textContent=pair.term;termCard.style.borderColor='var(--teal)';
      var targetCard=document.createElement('div');targetCard.className='match-card';targetCard.textContent=pair.target;
      var sel=null;
      termCard.onclick=function(){
        if(termCard.classList.contains('locked'))return;
        if(sel===termCard){termCard.classList.remove('selected');sel=null;return;}
        if(sel)sel.classList.remove('selected');
        termCard.classList.add('selected');sel=termCard;
      };
      targetCard.onclick=function(){
        if(!sel)return;
        termCard.classList.add('correct','locked');targetCard.classList.add('correct','locked');
        sel=null;tutPair++;
        setTimeout(renderTutPair,600);
      };
      leftCol.appendChild(termCard);rightCol.appendChild(targetCard);
      area.appendChild(leftCol);area.appendChild(rightCol);container.appendChild(area);
    }
    // Skip button
    var skipBtn=document.createElement('button');
    skipBtn.textContent='Skip Tutorial →';
    skipBtn.style.cssText='position:absolute;top:60px;right:16px;padding:8px 16px;font-size:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#aaa;z-index:20;cursor:pointer;min-height:36px';
    skipBtn.onclick=finishTutorial;
    $('puzzleArea').appendChild(skipBtn);
    renderTutPair();
  }catch(e){console.error('tutorial:',e);finishTutorial();}
}
function finishTutorial(){
  try{
    // Remove skip button
    var pa=$('puzzleArea');
    var btns=pa.querySelectorAll('button');
    btns.forEach(function(b){if(b.textContent.indexOf('Skip')>-1)b.remove();});
    $('bottomBar').style.display='flex';
    state.gamePhase='playing';
    loadRoom(0);
  }catch(e){console.error('finishTut:',e);loadRoom(0);}
}

/* ===================== ROOM LOADING ===================== */
function loadRoom(roomIdx){
  try{
    state.currentRoom=roomIdx;state.currentPuzzle=0;
    setRoomTheme(roomIdx);
    var room=ROOMS[roomIdx];
    $('roomIndicator').textContent=room.emoji+' '+room.name+' — Room '+(roomIdx+1)+' of 3';
    $('missionLine').textContent=room.mission;
    $('puzzleArea').style.background=room.bg;
    updateProgressDots();
    initLongPress();
    showScanPreview(roomIdx,0);
  }catch(e){console.error('loadRoom:',e)}
}

/* ===================== SCAN PREVIEW ===================== */
function showScanPreview(roomIdx,puzzleIdx){
  try{
    var room=ROOMS[roomIdx];var puzzle=room.puzzles[puzzleIdx];
    if(!puzzle||!puzzle.scanPreview){loadPuzzle(roomIdx,puzzleIdx);return;}
    var sp=$('scanPreview');sp.innerHTML='';
    var frame=document.createElement('div');frame.className='scan-frame';frame.style.borderColor=room.primary;
    frame.innerHTML='<div class="scan-label">SCANNING ROOM...</div><div class="scan-visual">'+puzzle.scanPreview.visual+'</div><div class="scan-desc" style="color:'+room.accent+'">'+puzzle.scanPreview.desc+'</div><div class="scanning-text">'+puzzle.scanPreview.sub+'</div>';
    sp.appendChild(frame);sp.style.display='flex';sp.classList.add('open');
    var previewDone=false;
    function finishPreview(){
      if(previewDone)return;previewDone=true;
      try{sp.style.display='none';sp.classList.remove('open');}catch(e){}
      loadPuzzle(roomIdx,puzzleIdx);
    }
    setTimeout(finishPreview,3000);
    setTimeout(finishPreview,5000);// safety
  }catch(e){console.error('scanPreview:',e);loadPuzzle(roomIdx,puzzleIdx);}
}

/* ===================== LOAD PUZZLE ===================== */
function loadPuzzle(roomIdx,puzzleIdx){
  try{
    state.currentRoom=roomIdx;state.currentPuzzle=puzzleIdx;
    state.puzzleSolving=false;state.overrideTriggered=false;
    state.wrongCount=0;state.selectedCard=null;
    state.scannerOpen=false;closeScanner();
    var room=ROOMS[roomIdx];var puzzle=room.puzzles[puzzleIdx];
    $('scannerBtn').style.display=(puzzle.type==='quickfire')?'none':'flex';
    $('scannerBtn').classList.remove('pulse');
    updateProgressDots();
    var key=roomIdx+'-'+puzzleIdx;
    if(!state.puzzleAttempts[key])state.puzzleAttempts[key]={attempts:0,scannerUsed:false,overridden:false,firstTry:true};
    switch(puzzle.type){
      case 'sequence':renderSequence(room,puzzle);break;
      case 'quickfire':renderQuickFire(room,puzzle);break;
      case 'scanner':renderSystemScanner(room,puzzle);break;
      case 'match':renderMatchLock(room,puzzle);break;
      case 'mystery':renderMystery(room,puzzle);break;
      case 'spotdiff':renderSpotDiff(room,puzzle);break;
    }
  }catch(e){console.error('loadPuzzle:',e)}
}

/* ===================== PUZZLE SOLVED ===================== */
function puzzleSolved(roomIdx,puzzleIdx){
  try{
    if(state.puzzleSolving)return;state.puzzleSolving=true;
    closeScanner();closeAllOverlays();
    var room=ROOMS[roomIdx];var puzzle=room.puzzles[puzzleIdx];
    var digit=puzzle.digit;
    // Update vault IMMEDIATELY
    updateVaultDigit(roomIdx,puzzleIdx,digit);
    state.puzzlesCleared++;updatePuzzlesCleared();
    var key=roomIdx+'-'+puzzleIdx;
    var pa=state.puzzleAttempts[key];
    if(pa&&pa.firstTry){state.firstTrySolves++;state.streak++;}
    else{state.streak=0;}
    updateStreak();
    // Show digit reveal
    var dr=$('digitReveal');
    $('digitBig').textContent=digit;$('digitBig').style.color=room.primary;
    dr.style.display='flex';dr.classList.add('open');
    // Particles
    try{var rect=$('digitBig').getBoundingClientRect();createParticles(rect.left+rect.width/2,rect.top+rect.height/2,room.primary,10);}catch(e){}
  }catch(e){console.error('puzzleSolved:',e)}
}

function closeDigitReveal(){
  try{
    $('digitReveal').style.display='none';$('digitReveal').classList.remove('open');
    var roomIdx=state.currentRoom;var puzzleIdx=state.currentPuzzle;
    if(puzzleIdx===0){
      // Load second puzzle
      showScanPreview(roomIdx,1);
    } else {
      // Both puzzles done — show code entry
      showCodeEntry(roomIdx);
    }
  }catch(e){console.error('closeDigitReveal:',e)}
}

/* ===================== WRONG ANSWER HANDLER ===================== */
function handleWrongAnswer(roomIdx,puzzleIdx,element){
  try{
    var key=roomIdx+'-'+puzzleIdx;
    var pa=state.puzzleAttempts[key];
    if(pa){pa.firstTry=false;pa.attempts++;}
    state.wrongCount++;
    if(state.wrongCount===1){
      // First wrong: auto-activate scanner
      state.scannerOpen=true;
      state.roomScannerUsed[roomIdx]=true;
      if(pa)pa.scannerUsed=true;
      $('scannerBtn').classList.add('pulse');
      autoActivateScanner(roomIdx,puzzleIdx);
    }
    if(state.wrongCount>=2&&!state.overrideTriggered){
      state.overrideTriggered=true;
      if(pa)pa.overridden=true;
      triggerLockOverride(roomIdx,puzzleIdx);
    }
  }catch(e){console.error('handleWrong:',e)}
}

function autoActivateScanner(roomIdx,puzzleIdx){
  try{
    var room=ROOMS[roomIdx];var puzzle=room.puzzles[puzzleIdx];
    var text=puzzle.scannerText||'Scanner activated.';
    $('scannerText').textContent='🔍 '+text;
    $('scannerOverlay').style.borderColor=room.primary;
    openScanner();
    // Narrow options
    narrowOptions(roomIdx,puzzleIdx);
  }catch(e){}
}

function narrowOptions(roomIdx,puzzleIdx){
  try{
    var puzzle=ROOMS[roomIdx].puzzles[puzzleIdx];
    if(puzzle.type==='scanner'||puzzle.type==='mystery'){
      var opts=document.querySelectorAll('.answer-card');
      var keep=puzzle.narrowOptions||[];
      opts.forEach(function(o){
        if(keep.length>0&&keep.indexOf(o.textContent)===-1&&!o.classList.contains('dimmed')){
          o.classList.add('dimmed');
        }
      });
    }
    // Match lock already 2-choice, sequence handled per-step
  }catch(e){}
}

/* ===================== LOCK OVERRIDE ===================== */
function triggerLockOverride(roomIdx,puzzleIdx){
  try{
    var puzzle=ROOMS[roomIdx].puzzles[puzzleIdx];
    closeScanner();
    switch(puzzle.type){
      case 'scanner':case 'mystery':
        // Highlight correct
        var cards=document.querySelectorAll('.answer-card');
        cards.forEach(function(c){
          if(c.dataset.correct==='true'){
            c.classList.add('override-glow');
            c.innerHTML+='\n<div style="font-size:11px;color:var(--correct);margin-top:4px">Scanner locked on</div>';
          }
        });break;
      case 'spotdiff':
        var target=document.querySelector('.std-card[data-error="true"]');
        if(target){
          target.style.borderColor='var(--correct)';
          target.style.boxShadow='0 0 20px rgba(0,230,118,.4)';
          var lbl=document.createElement('div');lbl.style.cssText='font-size:11px;color:var(--correct);margin-top:4px;text-align:center';lbl.textContent='Scanner locked on — wrong label found';
          target.appendChild(lbl);
        }break;
      case 'sequence':overrideSequence(roomIdx,puzzleIdx);break;
      case 'match':overrideMatch(roomIdx,puzzleIdx);break;
    }
  }catch(e){console.error('override:',e)}
}

function overrideSequence(roomIdx,puzzleIdx){
  try{
    var puzzle=ROOMS[roomIdx].puzzles[puzzleIdx];
    var cards=puzzle.cards.slice().sort(function(a,b){return a.order-b.order});
    var step=state.seqStep;
    var delay=0;
    for(var i=step;i<cards.length;i++){
      (function(idx,d){
        setTimeout(function(){
          try{
            var slot=document.getElementById('seq-slot-'+idx);
            if(slot){var st=slot.querySelector('.seq-slot-text');if(st)st.textContent=cards[idx].icon+' '+cards[idx].text;slot.classList.add('filled');slot.style.borderColor='var(--correct)';slot.style.background='rgba(0,230,118,.12)';}
            // Hide card
            var cardEls=document.querySelectorAll('.seq-card');
            cardEls.forEach(function(c){if(c.dataset.order==String(cards[idx].order))c.classList.add('locked');});
            if(idx===cards.length-1){
              setTimeout(function(){puzzleSolved(roomIdx,puzzleIdx);},600);
            }
          }catch(e){}
        },d);
      })(i,delay);
      delay+=500;
    }
  }catch(e){console.error('overrideSeq:',e)}
}

function overrideMatch(roomIdx,puzzleIdx){
  try{
    var puzzle=ROOMS[roomIdx].puzzles[puzzleIdx];
    var startPair=state.matchPair;
    function cascadePair(idx){
      if(idx>=puzzle.pairs.length){
        setTimeout(function(){puzzleSolved(roomIdx,puzzleIdx);},400);
        return;
      }
      // If this isn't the currently rendered pair, render it first
      if(idx>startPair){
        state.matchPair=idx;state.wrongCount=0;state.overrideTriggered=true;
        var mp=document.getElementById('match-progress');
        if(mp)mp.textContent='Pair '+(idx+1)+' of '+puzzle.pairs.length;
        var old=document.querySelector('.match-area');if(old)old.remove();
        var area=document.createElement('div');area.className='match-area';
        var leftCol=document.createElement('div');leftCol.className='match-col';
        var rightCol=document.createElement('div');rightCol.className='match-col';
        var pair=puzzle.pairs[idx];
        var tc=document.createElement('div');tc.className='match-card term-card';tc.textContent=pair.term;tc.style.borderColor=ROOMS[roomIdx].primary;
        leftCol.appendChild(tc);
        pair.options.forEach(function(opt){
          var oc=document.createElement('div');oc.className='match-card option-card';oc.textContent=opt;
          oc.dataset.correct=(opt===pair.target)?'true':'false';
          rightCol.appendChild(oc);
        });
        area.appendChild(leftCol);area.appendChild(rightCol);
        $('puzzleContainer').appendChild(area);
      }
      // Now auto-match the current pair in DOM
      setTimeout(function(){
        try{
          var termEl=document.querySelector('.match-card.term-card:not(.locked)');
          if(termEl)termEl.classList.add('correct','locked');
          var opts=document.querySelectorAll('.match-card.option-card');
          opts.forEach(function(o){if(o.dataset.correct==='true')o.classList.add('correct','locked');});
          setTimeout(function(){cascadePair(idx+1);},500);
        }catch(e){cascadePair(idx+1);}
      },300);
    }
    // Match current pair first
    var termEl=document.querySelector('.match-card.term-card:not(.locked)');
    if(termEl)termEl.classList.add('correct','locked');
    var opts=document.querySelectorAll('.match-card.option-card');
    opts.forEach(function(o){if(o.dataset.correct==='true')o.classList.add('correct','locked');});
    setTimeout(function(){cascadePair(startPair+1);},500);
  }catch(e){console.error('overrideMatch:',e)}
}

function handleSeqTap(cardEl,room,puzzle){
  try{
    if(cardEl.classList.contains('locked')||cardEl.classList.contains('dimmed'))return;
    var sorted=puzzle.cards.slice().sort(function(a,b){return a.order-b.order});
    var expected=sorted[state.seqStep];
    var tappedOrder=parseInt(cardEl.dataset.order);
    if(tappedOrder===expected.order){
      // Correct
      cardEl.classList.add('correct','locked');
      var slot=document.getElementById('seq-slot-'+state.seqStep);
      if(slot){var st=slot.querySelector('.seq-slot-text');if(st)st.textContent=expected.icon+' '+expected.text;slot.classList.add('filled');slot.style.borderColor='var(--correct)';slot.style.background='rgba(0,230,118,.12)';}
      state.seqStep++;
      // Un-dim all remaining cards for next step
      document.querySelectorAll('.seq-card').forEach(function(c){if(!c.classList.contains('locked'))c.classList.remove('dimmed');});
      if(state.seqStep>=3){
        // All done
        var mp=document.getElementById('seq-progress');if(mp)mp.textContent='Complete!';
        setTimeout(function(){puzzleSolved(state.currentRoom,state.currentPuzzle);},500);
      } else {
        var mp=document.getElementById('seq-progress');if(mp)mp.textContent='Step '+(state.seqStep+1)+' of 3';
        var pr=document.getElementById('seq-prompt');
        if(pr)pr.textContent=(state.seqStep===1)?'What happened NEXT?':'What happened LAST?';
        if(state.seqStep===2){
          // Auto-place last card
          var remaining=document.querySelectorAll('.seq-card:not(.locked)');
          if(remaining.length===1){
            setTimeout(function(){
              remaining[0].classList.add('correct','locked');
              var lastSorted=sorted[2];
              var slot2=document.getElementById('seq-slot-2');
              if(slot2){var st2=slot2.querySelector('.seq-slot-text');if(st2)st2.textContent=lastSorted.icon+' '+lastSorted.text;slot2.classList.add('filled');slot2.style.borderColor='var(--correct)';slot2.style.background='rgba(0,230,118,.12)';}
              var mp2=document.getElementById('seq-progress');if(mp2)mp2.textContent='Complete!';
              setTimeout(function(){puzzleSolved(state.currentRoom,state.currentPuzzle);},500);
            },300);
          }
        }
      }
    } else {
      // Wrong
      cardEl.classList.add('wrong');
      setTimeout(function(){cardEl.classList.remove('wrong');},400);
      handleWrongAnswer(state.currentRoom,state.currentPuzzle,cardEl);
    }
  }catch(e){console.error('seqTap:',e)}
}

/* ===================== QUICK FIRE ===================== */
function renderQuickFire(room,puzzle){
  try{
    var c=$('puzzleContainer');c.innerHTML='';
    state.qfCumulativeWrong=0;
    state.qfMissed=[];
    var qfIdx=0;
    var questions=puzzle.questions.slice();
    var results=new Array(questions.length).fill(null);

    function renderQF(indices){
      var currentInRound=0;
      function showQ(){
        if(currentInRound>=indices.length){
          // Round done — check
          var correct=results.filter(function(r){return r===true}).length;
          if(correct>=3){
            setTimeout(function(){puzzleSolved(state.currentRoom,state.currentPuzzle);},400);
            return;
          }
          // Retry missed
          var missed=[];
          results.forEach(function(r,i){if(r!==true)missed.push(i);});
          if(state.qfCumulativeWrong>=5){
            // Override — auto-mark remaining
            missed.forEach(function(i){results[i]=true;});
            var qArea=$('puzzleContainer');
            var msg=document.createElement('div');msg.className='puzzle-instruction';msg.style.color='var(--correct)';msg.textContent='Signal override — archive unlocked';
            qArea.appendChild(msg);
            setTimeout(function(){puzzleSolved(state.currentRoom,state.currentPuzzle);},800);
            return;
          }
          setTimeout(function(){renderQF(missed);},500);
          return;
        }
        c.innerHTML='';
        var qi=indices[currentInRound];
        var q=questions[qi];
        // Progress
        var prog=document.createElement('div');prog.className='qf-progress';
        for(var i=0;i<questions.length;i++){
          var pip=document.createElement('div');pip.className='qf-pip';
          if(results[i]===true)pip.classList.add('correct');
          else if(results[i]===false)pip.classList.add('wrong');
          if(i===qi)pip.classList.add('active');
          prog.appendChild(pip);
        }
        c.appendChild(prog);
        var qDiv=document.createElement('div');qDiv.className='qf-question';qDiv.style.color=room.accent;
        qDiv.textContent=q.emoji+' '+q.text;c.appendChild(qDiv);
        var btns=document.createElement('div');btns.className='qf-buttons';
        var confirmBtn=document.createElement('button');confirmBtn.className='qf-btn confirm';confirmBtn.textContent='✔ CONFIRM';
        var denyBtn=document.createElement('button');denyBtn.className='qf-btn deny';denyBtn.textContent='✖ DENY';
        var qfAnswered=false;
        function answer(val){
          if(qfAnswered)return;qfAnswered=true;
          confirmBtn.style.pointerEvents='none';denyBtn.style.pointerEvents='none';
          if(val===q.answer){
            results[qi]=true;
            c.style.background='rgba(0,230,118,.08)';
            setTimeout(function(){c.style.background='';currentInRound++;showQ();},500);
          } else {
            results[qi]=false;
            state.qfCumulativeWrong++;
            var key=state.currentRoom+'-'+state.currentPuzzle;
            var pa=state.puzzleAttempts[key];if(pa)pa.firstTry=false;
            c.style.background='rgba(255,23,68,.08)';
            // Show scanner text for this question
            if(puzzle.scannerTexts&&puzzle.scannerTexts[qi]){
              state.roomScannerUsed[state.currentRoom]=true;
              if(pa)pa.scannerUsed=true;
            }
            setTimeout(function(){c.style.background='';currentInRound++;showQ();},500);
          }
        }
        confirmBtn.onclick=function(){answer(true)};
        denyBtn.onclick=function(){answer(false)};
        btns.appendChild(confirmBtn);btns.appendChild(denyBtn);
        c.appendChild(btns);
        // Scanner hint for QF (inline, not overlay)
        if(puzzle.scannerTexts&&puzzle.scannerTexts[qi]&&state.qfCumulativeWrong>0){
          var hint=document.createElement('div');hint.className='puzzle-instruction';hint.style.marginTop='10px';hint.style.fontSize='13px';hint.style.color='#999';
          hint.textContent='🔍 '+puzzle.scannerTexts[qi];
          c.appendChild(hint);
        }
      }
      showQ();
    }
    var allIdx=[];for(var i=0;i<questions.length;i++)allIdx.push(i);
    renderQF(allIdx);
  }catch(e){console.error('renderQF:',e)}
}

function renderMatchPair(room,puzzle,pairIdx){
  try{
    state.matchPair=pairIdx;state.selectedCard=null;
    state.wrongCount=0;state.overrideTriggered=false;
    if(pairIdx>=puzzle.pairs.length){
      puzzleSolved(state.currentRoom,state.currentPuzzle);return;
    }
    var pair=puzzle.pairs[pairIdx];
    var mp=document.getElementById('match-progress');
    if(mp)mp.textContent='Pair '+(pairIdx+1)+' of '+puzzle.pairs.length;
    // Remove old match area
    var old=document.querySelector('.match-area');if(old)old.remove();
    var area=document.createElement('div');area.className='match-area';
    var leftCol=document.createElement('div');leftCol.className='match-col';
    var rightCol=document.createElement('div');rightCol.className='match-col';
    // Term card
    var termCard=document.createElement('div');termCard.className='match-card term-card';
    termCard.textContent=pair.term;termCard.style.borderColor=room.primary;
    termCard.onclick=function(){
      if(termCard.classList.contains('locked'))return;
      document.querySelectorAll('.match-card').forEach(function(mc){mc.classList.remove('selected')});
      termCard.classList.add('selected');state.selectedCard=termCard;
    };
    leftCol.appendChild(termCard);
    // Options shuffled
    var opts=pair.options.slice().sort(function(){return Math.random()-.5});
    opts.forEach(function(opt){
      var optCard=document.createElement('div');optCard.className='match-card option-card';
      optCard.textContent=opt;optCard.style.borderColor='rgba(255,255,255,.15)';
      optCard.dataset.correct=(opt===pair.target)?'true':'false';
      optCard.onclick=function(){
        if(!state.selectedCard||optCard.classList.contains('dimmed')||optCard.classList.contains('locked'))return;
        if(opt===pair.target){
          state.selectedCard.classList.remove('selected');
          state.selectedCard.classList.add('correct','locked');
          optCard.classList.add('correct','locked');
          state.selectedCard=null;
          setTimeout(function(){
            if(pairIdx+1<puzzle.pairs.length){
              renderMatchPair(room,puzzle,pairIdx+1);
            } else {
              puzzleSolved(state.currentRoom,state.currentPuzzle);
            }
          },500);
        } else {
          optCard.classList.add('wrong');
          var savedTerm=state.selectedCard;
          state.selectedCard.classList.remove('selected');state.selectedCard=null;
          setTimeout(function(){
            optCard.classList.remove('wrong');optCard.classList.add('dimmed');
            // Auto-reselect the term card so student doesn't need to re-tap it
            if(savedTerm&&!savedTerm.classList.contains('locked')){
              savedTerm.classList.add('selected');state.selectedCard=savedTerm;
            }
          },400);
          handleWrongAnswer(state.currentRoom,state.currentPuzzle,optCard);
          // Scanner cue for this pair
          if(pair.cue&&state.wrongCount>=1){
            $('scannerText').textContent='🔍 '+pair.cue;
          }
        }
      };
      rightCol.appendChild(optCard);
    });
    area.appendChild(leftCol);area.appendChild(rightCol);
    $('puzzleContainer').appendChild(area);
  }catch(e){console.error('matchPair:',e)}
}

      var key=document.createElement('button');key.className='code-key';key.textContent=n;
      key.onclick=(function(num){return function(){
        if(entered.length>=2)return;
        entered.push(num);slots[entered.length-1].textContent=num;slots[entered.length-1].classList.add('filled');
        if(entered.length===2){
          setTimeout(function(){checkCode(roomIdx,entered,slots,room)},300);
        }
      }})(n);
      keypad.appendChild(key);
    }
    // 0 key
    var zeroKey=document.createElement('button');zeroKey.className='code-key';zeroKey.textContent='0';
    zeroKey.onclick=function(){
      if(entered.length>=2)return;
      entered.push(0);slots[entered.length-1].textContent='0';slots[entered.length-1].classList.add('filled');
      if(entered.length===2)setTimeout(function(){checkCode(roomIdx,entered,slots,room)},300);
    };
    var delKey=document.createElement('button');delKey.className='code-key backspace';delKey.textContent='⌫';
    delKey.onclick=function(){
      if(entered.length===0)return;
      entered.pop();
      slots[entered.length].textContent='';slots[entered.length].classList.remove('filled');
    };
    var spacer=document.createElement('div');
    keypad.appendChild(spacer);keypad.appendChild(zeroKey);keypad.appendChild(delKey);
    $('codeEntry').style.display='flex';$('codeEntry').classList.add('open');
  }catch(e){console.error('codeEntry:',e)}
}

function checkCode(roomIdx,entered,slots,room){
  try{
    var code=ROOMS[roomIdx].code;
    if(entered[0]===code[0]&&entered[1]===code[1]){
      // Correct
      slots.forEach(function(s){s.style.borderColor='var(--correct)';s.style.boxShadow='0 0 15px rgba(0,230,118,.4)';});
      setTimeout(function(){
        $('codeEntry').style.display='none';$('codeEntry').classList.remove('open');
        roomComplete(roomIdx);
      },600);
    } else {
      // Wrong — shake and reset
      slots.forEach(function(s){s.style.borderColor='var(--wrong)';s.classList.add('wrong');});
      setTimeout(function(){
        slots.forEach(function(s){s.textContent='';s.classList.remove('filled','wrong');s.style.borderColor='rgba(255,255,255,.3)';s.style.boxShadow='none';});
        entered.length=0;
      },500);
    }
  }catch(e){console.error('checkCode:',e)}
}

/* ===================== ROOM COMPLETE ===================== */
function roomComplete(roomIdx){
  try{
    if(roomIdx<2){
      // Show pass the laptop
      showPassOverlay(roomIdx);
    } else {
      // Room 3 done — go to Final Lock
      showDoorTransition(roomIdx,function(){loadFinalLock()},true);
    }
  }catch(e){console.error('roomComplete:',e)}
}

/* ===================== PASS THE LAPTOP ===================== */
function showPassOverlay(roomIdx){
  try{
    closeAllOverlays();
    var nextRoom=ROOMS[roomIdx+1];
    $('passText').textContent=nextRoom.emoji+' PASS THE LAPTOP';
    $('passText').style.color=nextRoom.primary;
    $('passReady').style.color=nextRoom.primary;$('passReady').style.borderColor=nextRoom.primary;
    $('passOverlay').style.display='flex';$('passOverlay').classList.add('open');
  }catch(e){console.error('passOverlay:',e)}
}

function closePassOverlay(){
  try{
    $('passOverlay').style.display='none';$('passOverlay').classList.remove('open');
    var nextIdx=state.currentRoom+1;
    showDoorTransition(state.currentRoom,function(){loadRoom(nextIdx)},false);
  }catch(e){console.error('closePass:',e)}
}

/* ===================== DOOR TRANSITION ===================== */
function showDoorTransition(fromRoom,callback,isFinal){
  try{
    var nextRoom=isFinal?null:ROOMS[fromRoom+1];
    var color=isFinal?'#fff':(nextRoom?nextRoom.primary:'#fff');
    var name=isFinal?'FINAL LOCK':(nextRoom?nextRoom.emoji+' '+nextRoom.name:'');
    var overlay=document.createElement('div');overlay.className='door-overlay';
    var panel=document.createElement('div');panel.className='door-panel';
    panel.style.borderColor=color;
    panel.innerHTML='<div class="door-lock" style="animation:lockPulse .5s ease">🔒</div><div class="door-room-name" style="color:'+color+'">'+name+'</div>';
    overlay.appendChild(panel);
    var dur=isFinal?1.8:1.2;
    overlay.style.animation=(isFinal?'doorAnimSlow':'doorAnim')+' '+dur+'s ease forwards';
    document.body.appendChild(overlay);
    var done=false;
    function finish(){
      if(done)return;done=true;
      try{overlay.remove();}catch(e){}
      if(callback)callback();
    }
    overlay.addEventListener('animationend',finish);
    setTimeout(finish,(dur+0.5)*1000); // safety
  }catch(e){console.error('doorTransition:',e);if(callback)callback();}
}

/* ===================== FINAL LOCK ===================== */
function loadFinalLock(){
  try{
    state.gamePhase='finallock';
    $('roomIndicator').textContent='🔓 FINAL LOCK';
    $('missionLine').textContent='This is it — match every term to escape.';
    $('scannerBtn').style.display='flex';
    $('progressDots').innerHTML='';
    $('puzzleArea').style.background='rgba(255,255,255,.02)';
    state.finalLockState={wrongCounts:[0,0,0],matched:[false,false,false],scannerUsed:[false,false,false],overrides:[false,false,false],selectedTerm:null};
    var c=$('puzzleContainer');c.innerHTML='';
    // Header
    var hdr=document.createElement('div');hdr.className='final-header';hdr.textContent='🔓 FINAL LOCK';c.appendChild(hdr);
    var inst=document.createElement('div');inst.className='puzzle-instruction';inst.textContent='Match each term to its pair — one from each room.';c.appendChild(inst);
    renderFinalLock();
  }catch(e){console.error('loadFinal:',e)}
}

function renderFinalLock(){
  try{
    var old=document.querySelector('.final-match-area');if(old)old.remove();
    var area=document.createElement('div');area.className='final-match-area';
    var leftCol=document.createElement('div');leftCol.className='final-match-col';
    var rightCol=document.createElement('div');rightCol.className='final-match-col';
    var fls=state.finalLockState;
    // Terms (left)
    FINAL_LOCK.pairs.forEach(function(pair,i){
      var card=document.createElement('div');card.className='final-card';
      card.textContent=pair.emoji+' '+pair.term;
      card.style.borderColor=pair.color;card.dataset.idx=i;card.dataset.side='term';
      if(fls.matched[i]){card.classList.add('matched','correct');card.style.borderColor=pair.color;card.style.background='rgba(0,230,118,.1)';}
      card.onclick=function(){handleFinalTap(card,'term',i)};
      leftCol.appendChild(card);
    });
    // Targets (right) — shuffled
    var targetOrder=[0,1,2].sort(function(){return Math.random()-.5});
    targetOrder.forEach(function(i){
      var pair=FINAL_LOCK.pairs[i];
      var card=document.createElement('div');card.className='final-card';
      card.textContent=pair.target;card.dataset.idx=i;card.dataset.side='target';
      if(fls.matched[i]){card.classList.add('matched','correct');card.style.borderColor=pair.color;card.style.background='rgba(0,230,118,.1)';}
      card.onclick=function(){handleFinalTap(card,'target',i)};
      rightCol.appendChild(card);
    });
    area.appendChild(leftCol);area.appendChild(rightCol);
    $('puzzleContainer').appendChild(area);
  }catch(e){console.error('renderFinal:',e)}
}

function handleFinalTap(card,side,idx){
  try{
    var fls=state.finalLockState;
    if(fls.matched[idx]&&side==='term')return;
    if(card.classList.contains('matched'))return;
    if(side==='term'){
      // Select term
      document.querySelectorAll('.final-card').forEach(function(c){c.classList.remove('selected')});
      card.classList.add('selected');
      fls.selectedTerm=idx;
    } else if(side==='target'&&fls.selectedTerm!==null){
      var termIdx=fls.selectedTerm;
      if(idx===termIdx){
        // Correct match
        fls.matched[termIdx]=true;
        var pair=FINAL_LOCK.pairs[termIdx];
        // Mark both
        document.querySelectorAll('.final-card').forEach(function(c){
          c.classList.remove('selected');
          var ci=parseInt(c.dataset.idx);
          if(ci===termIdx){c.classList.add('matched','correct');c.style.borderColor=pair.color;c.style.background='rgba(0,230,118,.1)';c.style.boxShadow='0 0 12px '+pair.color;}
        });
        fls.selectedTerm=null;
        // Check if all matched
        if(fls.matched[0]&&fls.matched[1]&&fls.matched[2]){
          setTimeout(showEscapeAnimation,600);
        }
      } else {
        // Wrong match
        card.classList.add('wrong');
        setTimeout(function(){card.classList.remove('wrong')},400);
        fls.wrongCounts[termIdx]=(fls.wrongCounts[termIdx]||0)+1;
        document.querySelectorAll('.final-card').forEach(function(c){c.classList.remove('selected')});
        fls.selectedTerm=null;
        if(fls.wrongCounts[termIdx]===1){
          // Scanner for this pair
          fls.scannerUsed[termIdx]=true;
          var pair=FINAL_LOCK.pairs[termIdx];
          $('scannerText').textContent='🔍 '+pair.scanText;
          $('scannerOverlay').style.borderColor=pair.color;
          state.scannerOpen=true;openScanner();
          // Dim non-matching targets
          document.querySelectorAll('.final-card[data-side="target"]').forEach(function(c){
            var ci=parseInt(c.dataset.idx);
            if(ci!==termIdx&&!fls.matched[ci])c.classList.add('dimmed');
          });
          setTimeout(function(){
            document.querySelectorAll('.final-card.dimmed').forEach(function(c){c.classList.remove('dimmed')});
          },3000);
        }
        if(fls.wrongCounts[termIdx]>=2&&!fls.overrides[termIdx]){
          fls.overrides[termIdx]=true;
          closeScanner();
          // Auto-match this pair
          setTimeout(function(){
            fls.matched[termIdx]=true;
            var pair2=FINAL_LOCK.pairs[termIdx];
            document.querySelectorAll('.final-card').forEach(function(c){
              var ci=parseInt(c.dataset.idx);
              if(ci===termIdx){c.classList.add('matched','correct');c.style.borderColor=pair2.color;c.style.background='rgba(0,230,118,.1)';c.style.boxShadow='0 0 12px '+pair2.color;}
            });
            if(fls.matched[0]&&fls.matched[1]&&fls.matched[2])setTimeout(showEscapeAnimation,600);
          },500);
        }
      }
    }
  }catch(e){console.error('finalTap:',e)}
}

/* ===================== ESCAPE ANIMATION ===================== */
function showEscapeAnimation(){
  try{
    closeAllOverlays();
    $('codeVault').classList.remove('visible');
    $('gameScreen').classList.remove('active');
    var report=$('escapeReport');
    report.innerHTML='';report.classList.add('active');
    // Lock to key animation
    var lockIcon=document.createElement('div');lockIcon.style.cssText='font-size:clamp(48px,10vw,80px);transition:all .8s';lockIcon.textContent='🔒';
    report.appendChild(lockIcon);
    setTimeout(function(){lockIcon.textContent='🔑';lockIcon.style.transform='scale(1.3)';},800);
    setTimeout(function(){lockIcon.style.display='none';showEscapedText(report);},1600);
    // Confetti
    spawnConfetti();
  }catch(e){console.error('escapeAnim:',e);showEscapeReport();}
}

function spawnConfetti(){
  try{
    var colors=['#00c853','#ff1744','#2979ff','#f9a825','#00bcd4','#ff6d00'];
    for(var i=0;i<25;i++){
      (function(idx){
        setTimeout(function(){
          var c=document.createElement('div');
          c.style.cssText='position:fixed;width:'+Math.floor(6+Math.random()*8)+'px;height:'+Math.floor(6+Math.random()*8)+'px;background:'+colors[idx%colors.length]+';left:'+Math.floor(Math.random()*100)+'vw;top:-10px;z-index:200;pointer-events:none;border-radius:'+(Math.random()>.5?'50%':'2px')+';animation:confettiFall '+(2+Math.random()*2)+'s ease forwards;';
          document.body.appendChild(c);
          setTimeout(function(){try{c.remove();}catch(e){}},5000);
        },idx*80);
      })(i);
    }
  }catch(e){}
}

function showEscapedText(report){
  try{
    var escaped=document.createElement('div');escaped.className='escaped-text';escaped.textContent='ESCAPED!';
    report.appendChild(escaped);
    setTimeout(function(){showEscapeReport()},1500);
  }catch(e){showEscapeReport()}
}

/* ===================== ESCAPE REPORT ===================== */
function showEscapeReport(){
  try{
    closeAllOverlays();$('codeVault').classList.remove('visible');
    var report=$('escapeReport');
    if(!report.classList.contains('active')){
      $('gameScreen').classList.remove('active');
      report.classList.add('active');
    }
    // Clear existing content
    var existing=report.querySelector('.report-card');if(existing)return;// already shown
    // Brand
    var brand=document.createElement('div');brand.className='report-brand';brand.textContent="Mr. Jawad's Escape Room Simulations";
    report.appendChild(brand);
    // Calculate stats
    var elapsed=Math.floor((Date.now()-state.startTime)/1000);
    var mins=Math.floor(elapsed/60);var secs=elapsed%60;
    var timeStr=mins+':'+(secs<10?'0':'')+secs;
    var roomsCleared=0;
    for(var r=0;r<3;r++){if(state.vaultDigits[r][0]!==null&&state.vaultDigits[r][1]!==null)roomsCleared++;}
    var stars=state.firstTrySolves>=4?3:state.firstTrySolves>=2?2:1;
    // Badges
    var badges=[];
    // Clean Room: both puzzles in one room first or second try
    for(var r=0;r<3;r++){
      var p1=state.puzzleAttempts[r+'-0'];var p2=state.puzzleAttempts[r+'-1'];
      if(p1&&p2&&(p1.attempts<=1)&&(p2.attempts<=1)&&!state.skippedRooms[r]){badges.push('🏠 Clean Room (Room '+(r+1)+')');}
    }
    // Comeback: solved after scanner
    for(var key in state.puzzleAttempts){
      var pa=state.puzzleAttempts[key];
      if(pa.scannerUsed&&!pa.overridden){badges.push('💪 Comeback');break;}
    }
    // No Scanner: completed a full room without scanner
    for(var r=0;r<3;r++){
      if(!state.roomScannerUsed[r]&&!state.skippedRooms[r]){badges.push('🔇 No Scanner (Room '+(r+1)+')');break;}
    }
    // Deep Scan: used scanner and got right on next try
    for(var key in state.puzzleAttempts){
      var pa=state.puzzleAttempts[key];
      if(pa.scannerUsed&&!pa.overridden&&pa.attempts<=2){badges.push('🔬 Deep Scan');break;}
    }
    // Card
    var card=document.createElement('div');card.className='report-card';
    // Stars
    var starsDiv=document.createElement('div');starsDiv.className='report-stars';starsDiv.style.textAlign='center';
    for(var i=0;i<3;i++){
      var star=document.createElement('span');star.className='report-star'+(i<stars?' earned':'');star.textContent='⭐';
      star.style.animationDelay=(i*0.3)+'s';
      starsDiv.appendChild(star);
    }
    card.appendChild(starsDiv);
    var rows=[
      ['Rooms Cleared',roomsCleared+' / 3'],
      ['Puzzles Cleared',state.puzzlesCleared+' / 6'],
      ['First-Try Solves',state.firstTrySolves+' / 6'],
      ['Time',timeStr]
    ];
    rows.forEach(function(row){
      var r=document.createElement('div');r.className='report-row';
      r.innerHTML='<span class="report-label">'+row[0]+'</span><span class="report-value">'+row[1]+'</span>';
      card.appendChild(r);
    });
    // Badges
    if(badges.length>0){
      var bdiv=document.createElement('div');bdiv.className='report-badges';
      badges.forEach(function(b){var el=document.createElement('div');el.className='badge earned';el.textContent=b;bdiv.appendChild(el);});
      card.appendChild(bdiv);
    }
    report.appendChild(card);
    // Buttons
    var btns=document.createElement('div');btns.className='report-btns';
    var playAgain=document.createElement('button');playAgain.className='report-btn btn-play-again';playAgain.textContent='Play Again';
    playAgain.onclick=function(){report.innerHTML='';report.classList.remove('active');startGame();};
    var copyBtn=document.createElement('button');copyBtn.className='report-btn btn-copy';copyBtn.textContent='Copy Report';
    copyBtn.onclick=function(){
      var text="Mr. Jawad's Escape Room Simulations\nNatural Selection — Unit Review\n";
      text+='Rooms: '+roomsCleared+'/3\tPuzzles: '+state.puzzlesCleared+'/6\tFirst-Try: '+state.firstTrySolves+'/6\n';
      text+='Stars: '+stars+'/3\tTime: '+timeStr+'\n';
      if(badges.length)text+='Badges: '+badges.join(', ')+'\n';
      try{navigator.clipboard.writeText(text).then(function(){copyBtn.textContent='Copied!';setTimeout(function(){copyBtn.textContent='Copy Report'},2000);});}catch(e){copyBtn.textContent='Copy failed';}
    };
    btns.appendChild(playAgain);btns.appendChild(copyBtn);
    report.appendChild(btns);
  }catch(e){console.error('escapeReport:',e)}
}

/* ===================== EMERGENCY SKIP ===================== */
var _globalLongPressInit=false;
function initLongPress(){
  try{
    if(_globalLongPressInit)return;_globalLongPressInit=true;
    var timer=null;var confirmed=false;
    var indicator=$('roomIndicator');
    if(!indicator)return;
    function startPress(){
      if(confirmed){
        // Second press after confirmation — start 2-second skip timer
        timer=setTimeout(function(){
          emergencySkip();confirmed=false;timer=null;
        },2000);
        return;
      }
      timer=setTimeout(function(){
        indicator.style.color='var(--gold)';
        indicator.textContent+=' — Hold again to reveal';
        confirmed=true;timer=null;
      },3000);
    }
    function endPress(){
      if(timer){clearTimeout(timer);timer=null;}
    }
    indicator.addEventListener('mousedown',startPress);
    indicator.addEventListener('touchstart',startPress);
    indicator.addEventListener('mouseup',endPress);
    indicator.addEventListener('touchend',endPress);
    // Shift+S
    var shiftTimer=null;
    document.addEventListener('keydown',function(e){
      if(e.key==='S'&&e.shiftKey&&!shiftTimer){
        shiftTimer=setTimeout(function(){emergencySkip();shiftTimer=null;},2000);
      }
    });
    document.addEventListener('keyup',function(e){
      if(e.key==='S'){if(shiftTimer){clearTimeout(shiftTimer);shiftTimer=null;}}
    });
  }catch(e){}
}

function emergencySkip(){
  try{
    if(state.gamePhase==='finallock'){
      showEscapeReport();return;
    }
    var roomIdx=state.currentRoom;
    state.skippedRooms[roomIdx]=true;
    var room=ROOMS[roomIdx];
    // Reveal both digits
    for(var p=0;p<2;p++){
      if(state.vaultDigits[roomIdx][p]===null){
        updateVaultDigit(roomIdx,p,room.code[p]);
        state.puzzlesCleared++;
      }
    }
    updatePuzzlesCleared();
    // Reset room indicator
    var ri=$('roomIndicator');
    if(ri){ri.style.color='';ri.textContent=room.emoji+' '+room.name+' (Skipped)';}
    // Go to code entry
    closeAllOverlays();
    showCodeEntry(roomIdx);
  }catch(e){console.error('emergencySkip:',e)}
}

/* ===================== INIT ===================== */

</script>
