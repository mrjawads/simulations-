<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mr. Jawad's Escape Room — Muscular System</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a2e;--bg2:#16213e;--text:#e0e0e0;--text-bright:#ffffff;
--r1:#e74c3c;--r1a:#f39c12;--r1bg:rgba(231,76,60,.08);--r1light:#fce4ec;
--r2:#2ecc71;--r2a:#27ae60;--r2bg:rgba(46,204,113,.08);--r2light:#e8f5e9;
--r3:#3498db;--r3a:#00d4ff;--r3bg:rgba(52,152,219,.08);--r3light:#e1f0fa;
--room-color:#e74c3c;--room-accent:#f39c12;
--correct:#2ecc71;--wrong:#e74c3c;
--vault-bg:rgba(26,26,46,.92);
--glow:0 0 15px var(--room-color),0 0 30px rgba(0,0,0,.3);
--btn-min:48px;--font-sm:16px;--font-md:18px;--font-lg:24px;--font-xl:clamp(28px,4vw,42px);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ---- SCREENS ---- */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;position:absolute;top:0;left:0;padding:16px;overflow-y:auto}
.screen.active{display:flex}

/* ---- START SCREEN ---- */
#startScreen{background:radial-gradient(ellipse at center,#1e2a4a 0%,#1a1a2e 70%);text-align:center;gap:18px}
.brand-line{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#00d4ff;opacity:.85;margin-bottom:4px}
.start-title{font-size:clamp(32px,5vw,52px);font-weight:800;color:#fff;text-shadow:0 0 30px rgba(0,212,255,.35);line-height:1.1}
.start-divider{width:60px;height:2px;background:#00d4ff;margin:6px auto;border-radius:2px}
.start-subtitle{font-size:clamp(16px,2.5vw,22px);color:#aab;font-weight:400}
.start-footer{position:absolute;bottom:18px;font-size:10px;letter-spacing:2px;color:#556;text-transform:uppercase}
.btn{min-height:var(--btn-min);min-width:120px;padding:12px 28px;border:none;border-radius:10px;font-size:var(--font-md);font-weight:700;cursor:pointer;transition:all .3s ease;position:relative;color:#fff}
.btn-primary{background:linear-gradient(135deg,var(--room-color),var(--room-accent,var(--room-color)));box-shadow:0 0 20px rgba(0,212,255,.25)}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(0,212,255,.4)}
.btn-start{padding:16px 48px;font-size:20px;background:linear-gradient(135deg,#00d4ff,#3498db);border-radius:14px;margin-top:12px}
.btn-start:hover{transform:scale(1.06);box-shadow:0 0 35px rgba(0,212,255,.5)}

/* ---- HUD ---- */
#hud{display:none;position:fixed;top:0;left:0;right:0;height:48px;background:rgba(22,33,62,.95);border-bottom:1px solid rgba(255,255,255,.08);z-index:100;padding:0 12px;align-items:center;justify-content:space-between;flex-direction:row}
#hud.active{display:flex}
.hud-left{display:flex;align-items:center;gap:12px}
.hud-room{font-size:14px;color:var(--text);font-weight:600}
.hud-puzzles{font-size:14px;color:var(--text);margin-left:auto;display:flex;align-items:center;gap:6px}
.hud-streak{font-size:18px;opacity:0;transition:opacity .3s;margin-left:8px}
.hud-streak.active{opacity:1;animation:pulse 1s infinite}
#codeVault{position:fixed;top:54px;right:12px;background:var(--vault-bg);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;z-index:99;display:none;flex-direction:column;gap:4px;min-width:100px}
#codeVault.active{display:flex}
.vault-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#889;text-align:center;margin-bottom:2px}
.vault-row{display:flex;align-items:center;gap:6px;font-size:13px}
.vault-emoji{font-size:14px}
.vault-digit{display:inline-flex;align-items:center;justify-content:center;width:22px;height:26px;border-radius:4px;background:rgba(255,255,255,.06);font-weight:700;font-size:14px;color:#667;border:1px solid rgba(255,255,255,.08);transition:all .4s ease}
.vault-digit.revealed{color:var(--room-color);border-color:var(--room-color);box-shadow:0 0 8px rgba(var(--room-color-rgb,.3));animation:vaultPop .4s ease}

/* ---- GAME AREA ---- */
#gameArea{display:none;position:fixed;top:48px;left:0;right:0;bottom:0;padding:16px;overflow-y:auto;flex-direction:column;align-items:center}
#gameArea.active{display:flex}
.mission-line{font-size:15px;color:var(--text);opacity:.7;text-align:center;margin:8px 0 12px;font-style:italic}
.puzzle-container{width:100%;max-width:700px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative}
.puzzle-instruction{font-size:15px;color:#aab;text-align:center;margin-bottom:8px}
.puzzle-progress{font-size:13px;color:var(--room-color);font-weight:600;margin-bottom:4px}

/* ---- BOTTOM BAR ---- */
#bottomBar{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(22,33,62,.95);border-top:1px solid rgba(255,255,255,.08);z-index:100;padding:0 16px;align-items:center;justify-content:space-between}
#bottomBar.active{display:flex}
.scanner-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text);font-size:14px;cursor:pointer;transition:all .3s;min-height:var(--btn-min)}
.scanner-btn:hover{background:rgba(255,255,255,.1)}
.scanner-btn.pulse{animation:scanPulse 2s infinite}
.progress-dots{display:flex;gap:8px}
.progress-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);transition:all .3s}
.progress-dot.filled{background:var(--room-color);border-color:var(--room-color);box-shadow:0 0 8px var(--room-color)}

/* ---- CARDS ---- */
.card{min-height:var(--btn-min);padding:12px 18px;border-radius:10px;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);cursor:pointer;transition:all .3s ease;font-size:var(--font-md);color:var(--text-bright);text-align:center;position:relative;user-select:none;display:flex;align-items:center;justify-content:center;gap:8px}
.card:hover:not(.disabled):not(.locked):not(.dimmed){border-color:var(--room-color);box-shadow:var(--glow);transform:translateY(-2px)}
.card.selected{border-color:var(--room-color);box-shadow:var(--glow);transform:scale(1.05);background:rgba(255,255,255,.08)}
.card.selected::after{content:'▶ SELECTED';position:absolute;top:-10px;right:8px;font-size:9px;background:var(--room-color);color:#fff;padding:2px 6px;border-radius:4px;font-weight:700}
.card.correct{border-color:var(--correct);background:rgba(46,204,113,.15);box-shadow:0 0 15px rgba(46,204,113,.4);animation:correctPop .4s ease}
.card.correct::after{content:'✔';position:absolute;top:-8px;right:8px;font-size:14px;background:var(--correct);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.card.wrong{border-color:var(--wrong);background:rgba(231,76,60,.12);animation:wrongShake .4s ease}
.card.wrong::after{content:'✖';position:absolute;top:-8px;right:8px;font-size:14px;background:var(--wrong);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.card.disabled,.card.dimmed{opacity:.4;pointer-events:none;cursor:default}
.card.locked{border-color:var(--correct);background:rgba(46,204,113,.12);pointer-events:none;cursor:default}
.card.locked::after{content:'✔';position:absolute;top:-8px;right:8px;font-size:14px;background:var(--correct);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.card.highlight{border-color:var(--room-color);box-shadow:0 0 20px var(--room-color);animation:pulse 1s infinite}
.card-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%}
.card-col{display:flex;flex-direction:column;gap:10px;flex:1;min-width:140px;max-width:260px}

/* ---- MATCH LOCK ---- */
.match-area{display:flex;gap:20px;width:100%;max-width:600px;justify-content:center;align-items:center}
.match-term{flex:0 0 auto;max-width:200px}
.match-targets{display:flex;flex-direction:column;gap:10px;flex:1;max-width:260px}
.match-arrow{font-size:24px;color:var(--room-color);opacity:.5}

/* ---- SEQUENCE LOCK ---- */
.seq-slots{display:flex;gap:10px;width:100%;max-width:500px;justify-content:center;margin-bottom:16px}
.seq-slot{min-width:100px;min-height:60px;border:2px dashed rgba(255,255,255,.15);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;color:#556;padding:8px;position:relative;transition:all .3s}
.seq-slot.filled{border-style:solid;border-color:var(--correct);background:rgba(46,204,113,.1);color:var(--text-bright)}
.seq-slot.active-slot{border-color:var(--room-color);box-shadow:0 0 10px rgba(var(--room-color-rgb),.3);animation:pulse 2s infinite}
.seq-arrow{color:var(--room-color);font-size:18px;display:flex;align-items:center}
.seq-cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ---- GAUGES (System Scanner) ---- */
.gauge-panel{display:flex;gap:16px;justify-content:center;width:100%;max-width:400px;margin-bottom:16px}
.gauge{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.gauge-label{font-size:12px;color:#aab;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.gauge-bar-outer{width:100%;height:120px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);position:relative;overflow:hidden}
.gauge-bar-inner{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 6px 6px;transition:height .6s ease}
.gauge-value{font-size:11px;color:#889;margin-top:2px}

/* ---- QUICK FIRE ---- */
.qf-statement{font-size:clamp(18px,3vw,24px);color:var(--text-bright);text-align:center;padding:20px;border:2px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.03);margin-bottom:16px;min-height:80px;display:flex;align-items:center;justify-content:center;max-width:500px;width:100%}
.qf-buttons{display:flex;gap:16px;justify-content:center}
.qf-btn{min-width:140px;min-height:56px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:var(--text-bright);font-size:20px;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px}
.qf-btn:hover{border-color:var(--room-color);box-shadow:var(--glow)}
.qf-btn.flash-correct{background:rgba(46,204,113,.25);border-color:var(--correct)}
.qf-btn.flash-wrong{background:rgba(231,76,60,.2);border-color:var(--wrong)}
.qf-progress{font-size:13px;color:#889;margin-bottom:8px}

/* ---- DIAGNOSTIC PANEL ---- */
.diag-panel{display:flex;gap:16px;justify-content:center;width:100%;max-width:500px;margin-bottom:16px}
.diag-slot{flex:1;min-height:90px;border:2px dashed rgba(255,255,255,.15);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:4px;transition:all .3s;cursor:default}
.diag-slot.active-slot{border-color:var(--room-color);box-shadow:0 0 12px rgba(var(--room-color-rgb),.2);animation:pulse 2s infinite}
.diag-slot.filled{border-style:solid;border-color:var(--correct);background:rgba(46,204,113,.1)}
.diag-slot.locked{border-color:var(--correct);background:rgba(46,204,113,.12)}
.diag-slot-label{font-size:11px;color:#889;text-transform:uppercase;letter-spacing:.5px}
.diag-slot-value{font-size:16px;color:var(--text-bright);font-weight:600}
.parts-bank{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.part-chip{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);cursor:pointer;font-size:15px;color:var(--text);transition:all .3s;min-height:40px;display:flex;align-items:center;gap:6px}
.part-chip:hover:not(.disabled){border-color:var(--room-color);box-shadow:0 0 8px rgba(var(--room-color-rgb),.3)}
.part-chip.disabled{opacity:.35;pointer-events:none}
.part-chip.placed{border-color:var(--correct);background:rgba(46,204,113,.1)}

/* ---- MYSTERY INPUT ---- */
.chain{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;font-size:clamp(16px,2.5vw,22px)}
.chain-box{padding:10px 16px;border:2px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(255,255,255,.04);color:var(--text-bright);min-width:80px;text-align:center}
.chain-box.mystery{border-color:var(--room-color);color:var(--room-color);font-weight:700;animation:pulse 2s infinite}
.chain-box.solved{border-color:var(--correct);color:var(--correct);animation:none}
.chain-arrow{color:var(--room-color);font-size:20px}

/* ---- OVERLAYS ---- */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;align-items:center;justify-content:center;background:rgba(10,10,20,.88);flex-direction:column;gap:16px;padding:20px}
.overlay.active{display:flex}

/* Scanner Overlay */
#scannerOverlay{z-index:210}
.scanner-box{max-width:440px;width:100%;background:rgba(22,33,62,.96);border:2px solid var(--room-color);border-radius:14px;padding:24px;box-shadow:0 0 30px rgba(0,0,0,.5);position:relative}
.scanner-title{font-size:14px;color:var(--room-color);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.scanner-text{font-size:16px;color:var(--text);line-height:1.5;margin-bottom:16px}
.scanner-dismiss{position:absolute;top:10px;right:12px;background:none;border:none;color:#667;font-size:12px;cursor:pointer;padding:4px 8px}
.scanner-dismiss:hover{color:#aab}

/* Digit Reveal Overlay */
#digitReveal{z-index:220}
.digit-display{font-size:clamp(60px,12vw,100px);font-weight:800;color:var(--room-color);text-shadow:0 0 40px var(--room-color);animation:digitPop .6s ease}
.digit-label{font-size:16px;color:#aab;margin-top:8px}

/* Code Entry */
#codeEntry{z-index:205}
.code-entry-box{max-width:360px;width:100%;background:rgba(22,33,62,.97);border:2px solid var(--room-color);border-radius:16px;padding:28px;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.5)}
.code-title{font-size:20px;color:var(--text-bright);font-weight:700;margin-bottom:6px}
.code-subtitle{font-size:14px;color:#aab;margin-bottom:16px}
.code-digits-hint{font-size:18px;color:var(--room-color);font-weight:700;margin-bottom:12px}
.code-input-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.code-digit-input{width:52px;height:60px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:var(--text-bright);font-size:28px;font-weight:700;text-align:center;outline:none;transition:border-color .3s}
.code-digit-input:focus{border-color:var(--room-color);box-shadow:0 0 10px rgba(var(--room-color-rgb),.3)}
.code-error{color:var(--wrong);font-size:14px;margin-top:8px;opacity:0;transition:opacity .3s}
.code-error.show{opacity:1}

/* Pass the Laptop */
#passLaptop{z-index:215;background:rgba(10,10,20,.95)}
.pass-text{font-size:clamp(32px,6vw,56px);font-weight:800;color:var(--text-bright)}
.pass-sub{font-size:16px;color:#aab;margin-top:8px}

/* Scan Preview */
#scanPreview{z-index:195;background:rgba(10,10,20,.92)}
.scan-preview-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.scan-icons{font-size:clamp(36px,6vw,56px);display:flex;gap:16px;animation:scanFade 2.5s ease forwards}
.scan-label{font-size:15px;color:var(--room-color);text-transform:uppercase;letter-spacing:1.5px;animation:scanFade 2.5s ease forwards}

/* Door Transition */
#doorOverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:var(--bg);align-items:center;justify-content:center;flex-direction:column}
.door-frame{width:200px;height:280px;border:4px solid var(--room-color);border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(0,0,0,.4)}
.door-lock{font-size:48px;animation:lockPulse 1.2s ease forwards}
.door-label{font-size:18px;color:var(--room-color);font-weight:700;margin-top:12px;opacity:0;animation:fadeInUp .4s .3s ease forwards}

/* Escape Report */
#escapeReport{z-index:250;background:radial-gradient(ellipse at center,#1e2a4a 0%,#1a1a2e 70%);overflow-y:auto}
.report-box{max-width:480px;width:100%;text-align:center;padding:20px}
.report-title{font-size:clamp(36px,7vw,56px);font-weight:800;color:#fff;text-shadow:0 0 40px rgba(0,212,255,.4);margin-bottom:6px}
.report-brand{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#00d4ff;opacity:.7;margin-bottom:20px}
.report-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:12px;text-align:left}
.report-section h3{font-size:15px;color:#889;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:16px}
.report-row:last-child{border:none}
.report-label{color:#aab}
.report-value{color:var(--text-bright);font-weight:600}
.stars{font-size:28px;letter-spacing:4px}
.star-on{color:#f1c40f;text-shadow:0 0 10px rgba(241,196,15,.4)}
.star-off{color:#334;text-shadow:none}
.badge-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:15px;color:var(--text)}
.badge-icon{font-size:20px}
.report-btns{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.btn-copy{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;min-height:var(--btn-min);transition:all .3s}
.btn-copy:hover{background:rgba(255,255,255,.14)}

/* Final Lock */
.fl-layout{display:flex;gap:24px;width:100%;max-width:600px;justify-content:center;align-items:flex-start}
.fl-terms,.fl-targets{display:flex;flex-direction:column;gap:10px;flex:1;max-width:240px}
.fl-card{position:relative}
.fl-card.active-term{animation:pulse 1.5s infinite;border-color:var(--room-color);box-shadow:var(--glow)}
.fl-card.matched{opacity:.5;pointer-events:none;border-color:var(--correct)}

/* ---- ANIMATIONS ---- */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes scanPulse{0%,100%{box-shadow:0 0 8px var(--room-color)}50%{box-shadow:0 0 20px var(--room-color)}}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes vaultPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes digitPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes lockPulse{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes scanFade{0%{opacity:0;transform:scale(.8)}30%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(1.05)}}
@keyframes doorSlide{0%{opacity:0;transform:translateX(0)}30%{opacity:1;transform:translateX(0)}60%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-110%)}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes particleBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{opacity:0}}
@keyframes starFill{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes hudPulse{0%{transform:scale(1)}50%{transform:scale(1.15);color:var(--room-color)}100%{transform:scale(1)}}
@keyframes escaped{0%{transform:scale(0);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* ---- RESPONSIVE ---- */
@media(max-width:768px){
.match-area{flex-direction:column;gap:12px}
.match-arrow{transform:rotate(90deg)}
.fl-layout{flex-direction:column;align-items:center}
.gauge-panel{gap:10px}
}
@media(min-height:900px){
.puzzle-container{justify-content:center}
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
<div class="brand-line">Mr. Jawad's Escape Room Simulations</div>
<div class="start-title">Muscular System</div>
<div class="start-divider"></div>

<!-- HUD -->
<div id="hud">
<div class="hud-left">
<span id="hudRoom" class="hud-room">Room 1 of 3</span>
</div>

<!-- CODE VAULT -->
<div id="codeVault">

<!-- BOTTOM BAR -->

</div>
</div>

<!-- SCANNER OVERLAY -->

</div>

<!-- CODE ENTRY -->

</div>
<button class="btn btn-primary" onclick="submitCode()">Unlock</button>
<div class="code-error" id="codeError">Wrong code — try again</div>
</div>
</div>

<!-- PASS THE LAPTOP -->
<div id="passLaptop" class="overlay" data-overlay="pass">
<div style="text-align:center">
<div class="pass-text">🔄 PASS THE LAPTOP</div>
<div class="pass-sub">New team member takes over.</div>
<button class="btn btn-primary" style="margin-top:24px" onclick="closePassLaptop()">Ready</button>
</div>
</div>

<!-- SCAN PREVIEW -->
<div id="scanPreview" class="overlay" data-overlay="preview">
<div class="scan-preview-content">
<div class="scan-icons" id="scanIcons"></div>

// ---- GAME STATE ----
let S = {};
function resetState(){
  S={
    screen:'start',currentRoom:0,currentPuzzle:0,
    puzzlesSolved:0,firstTrySolves:0,roomsCleared:0,
    startTime:null,
    vaultDigits:[['?','?'],['?','?'],['?','?']],
    streak:0,badges:[],

    ],

    // Per-puzzle sub-state

resetState();

// ---- UTILITIES ----
function $(id){return document.getElementById(id)}
function closeAllOverlays(){
  try{
    document.querySelectorAll('.overlay').forEach(o=>{o.classList.remove('active');o.style.display='none'});
    $('doorOverlay').style.display='none';
  }catch(e){}
}
function closeScanner(){try{$('scannerOverlay').classList.remove('active');$('scannerOverlay').style.display='none';}catch(e){}}
function setRoomTheme(room){
  const r=ROOMS[room];
  document.documentElement.style.setProperty('--room-color',r.color);
  document.documentElement.style.setProperty('--room-accent',r.accent);
}
function showHUD(show){
  $('hud').classList.toggle('active',show);
  $('codeVault').classList.toggle('active',show);
  $('bottomBar').classList.toggle('active',show);
  $('gameArea').classList.toggle('active',show);
}
function updateHUD(){
  const room=ROOMS[S.currentRoom];
  if(S.screen==='finalLock'){
    $('hudRoom').textContent='FINAL LOCK';
  }else{
    $('hudRoom').textContent=room?`${room.emoji} Room ${S.currentRoom+1} of 3`:'';
  }
  $('hudPuzzles').innerHTML=`Puzzles Cleared: ${S.puzzlesSolved}/6 <span id="hudStreak" class="hud-streak ${S.streak>=2?'active':''}">${S.streak>=2?'🔥':''}</span>`;
  // Progress dots
  if(S.screen==='finalLock'){
    $('dot0').style.display='none';$('dot1').style.display='none';
  }else{
    $('dot0').style.display='';$('dot1').style.display='';
    const ri=S.currentRoom;
    $('dot0').className='progress-dot'+(S.vaultDigits[ri][0]!=='?'?' filled':'');
    $('dot1').className='progress-dot'+(S.vaultDigits[ri][1]!=='?'?' filled':'');
  }
  // Vault
  for(let r=0;r<3;r++){
    for(let d=0;d<2;d++){
      const el=$(`vd${r}_${d}`);
      el.textContent=S.vaultDigits[r][d];
      const revealed=S.vaultDigits[r][d]!=='?';
      el.classList.toggle('revealed',revealed);
      if(revealed){el.style.color=ROOMS[r].color;el.style.borderColor=ROOMS[r].color;}
    }
  }
}
function spawnParticles(x,y,color,count){
  try{
    const ct=Math.min(count||8,12);
    for(let i=0;i<ct;i++){
      const p=document.createElement('div');
      const angle=Math.random()*Math.PI*2;
      const dist=60+Math.random()*80;
      const dx=Math.cos(angle)*dist;
      const dy=Math.sin(angle)*dist;
      const size=4+Math.random()*6;
      Object.assign(p.style,{
        position:'fixed',left:x+'px',top:y+'px',width:size+'px',height:size+'px',
        background:color,borderRadius:Math.random()>.5?'50%':'2px',
        zIndex:'400',pointerEvents:'none',
        animation:`particleBurst .6s ease forwards`
      });
      p.style.setProperty('--dx',dx+'px');p.style.setProperty('--dy',dy+'px');
      const kf=`@keyframes pb${Date.now()}${i}{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(${dx}px,${dy}px) scale(0);opacity:0}}`;
      const sheet=document.styleSheets[0];
      try{sheet.insertRule(kf,sheet.cssRules.length);p.style.animation=`pb${Date.now()}${i} .6s ease forwards`;}catch(e){p.style.animation='particleBurst .6s ease forwards';}
      document.body.appendChild(p);
      const removeP=()=>{try{p.remove();}catch(e){}};
      p.addEventListener('animationend',removeP);
      setTimeout(removeP,1000);
    }
  }catch(e){}
}
function pulseHudCounter(){
  try{$('hudPuzzles').style.animation='hudPulse .4s ease';setTimeout(()=>{$('hudPuzzles').style.animation='';},500);}catch(e){}
}

// ---- START GAME ----
function startGame(){
  try{
    resetState();
    S.startTime=Date.now();
    $('startScreen').classList.remove('active');
    showHUD(true);
    updateHUD();
    showTutorial();
  }catch(e){console.error('startGame error',e);showHUD(true);loadRoom(0);}
}

// ---- TUTORIAL ----
function showTutorial(){
  try{
    S.screen='tutorial';
    $('hudRoom').textContent='TUTORIAL';
    $('missionLine').textContent='Learn the tap-to-select mechanic.';
    $('bottomBar').classList.remove('active');
    setRoomTheme(0);
    renderTutorial(0);
  }catch(e){console.error('tutorial error',e);loadRoom(0);}
}
let tutPair=0;
function renderTutorial(idx){
  if(S.screen!=='tutorial')return;
  tutPair=idx;
  const pc=$('puzzleContainer');
  if(idx>=TUTORIAL_PAIRS.length){
    pc.innerHTML=`<div style="text-align:center"><div style="font-size:24px;color:var(--correct);margin-bottom:12px">✔ Systems Online</div><div style="font-size:16px;color:#aab">Entering Room 1...</div></div>`;
    setTimeout(()=>{try{loadRoom(0);}catch(e){console.error(e);}},1500);
    return;
  }
  const pair=TUTORIAL_PAIRS[idx];
  const targets=[pair.right,...pair.distractors].sort(()=>Math.random()-.5);
  let html=`<div style="text-align:center;margin-bottom:12px"><span style="font-size:13px;color:#889">Tutorial — Pair ${idx+1} of ${TUTORIAL_PAIRS.length}</span></div>`;
  html+=`<div class="puzzle-instruction">👆 Tap the word on the LEFT, then tap its match on the RIGHT.</div>`;
  html+=`<div class="match-area"><div class="card match-term" style="pointer-events:none;border-color:var(--room-color);box-shadow:var(--glow)">${pair.left}</div>`;
  html+=`<div class="match-arrow">→</div><div class="match-targets">`;
  targets.forEach(t=>{
    html+=`<div class="card" data-correct="${t===pair.right}" onclick="tutorialPick(this,'${t===pair.right}')">${t}</div>`;
  });
  html+=`</div></div>`;
  html+=`<button class="btn" style="margin-top:20px;background:rgba(255,255,255,.08);font-size:13px;color:#889" onclick="loadRoom(0)">Skip Tutorial →</button>`;
  pc.innerHTML=html;
}
function tutorialPick(el,isCorrect){
  if(el.classList.contains('disabled'))return;
  if(isCorrect==='true'){
    el.classList.add('correct');
    try{const r=el.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,'var(--correct)',6);}catch(e){}
    el.parentElement.querySelectorAll('.card').forEach(c=>c.classList.add('disabled'));
    setTimeout(()=>renderTutorial(tutPair+1),700);
  }else{
    el.classList.add('wrong');
    setTimeout(()=>{el.classList.remove('wrong');el.classList.add('dimmed');},500);
  }
}

// ---- ROOM LOADING ----
function loadRoom(roomIdx){
  try{
    closeAllOverlays();
    S.currentRoom=roomIdx;
    S.currentPuzzle=0;
    S.screen='room';
    setRoomTheme(roomIdx);
    const room=ROOMS[roomIdx];
    $('missionLine').textContent=room.mission;
    showHUD(true);
    $('bottomBar').classList.add('active');
    document.body.style.background=room.atmosphere+',var(--bg)';
    updateHUD();
    showScanPreview(roomIdx,0,()=>loadPuzzle());
  }catch(e){console.error('loadRoom error',e);loadPuzzle();}
}

// ---- SCAN PREVIEW ----
function showScanPreview(roomIdx,puzzleIdx,callback){
  S.previewDone=false;
  if(S.previewTimeout)clearTimeout(S.previewTimeout);
  const room=ROOMS[roomIdx];
  const sp=room.scanPreviews[puzzleIdx];
  if(!sp){finishPreview(callback);return;}
  try{
    $('scanIcons').textContent=sp.icons;
    $('scanLabel').textContent=sp.label;
    $('scanLabel').style.color=room.color;
    $('scanPreview').classList.add('active');$('scanPreview').style.display='flex';
    const done=()=>{if(!S.previewDone){S.previewDone=true;closeAllOverlays();callback();}};
    setTimeout(done,3000);
    S.previewTimeout=setTimeout(done,5000);
  }catch(e){finishPreview(callback);}
}
function finishPreview(cb){S.previewDone=true;closeAllOverlays();cb();}

// ---- PUZZLE LOADER ----
function loadPuzzle(){
  try{
    S.wrongCount=0;S.scannerActive=false;S.overrideTriggered=false;S.puzzleSolving=false;
    S.wrongPicks=new Set();
    closeScanner();
    $('scannerBtn').classList.remove('pulse');
    const room=ROOMS[S.currentRoom];
    const puzzle=room.puzzles[S.currentPuzzle];
    updateHUD();
    switch(puzzle.type){
      case'match':renderMatch(puzzle);break;
      case'sequence':renderSequence(puzzle);break;
      case'scanner':renderScanner(puzzle);break;
      case'quickfire':renderQuickFire(puzzle);break;
      case'mystery':renderMystery(puzzle);break;
      case'diagnostic':renderDiagnostic(puzzle);break;
      default:puzzleSolved();
    }
  }catch(e){console.error('loadPuzzle error',e);puzzleSolved();}
}

// ---- PUZZLE SOLVED (CENTRAL) ----
function puzzleSolved(){
  if(S.puzzleSolving)return;
  S.puzzleSolving=true;
  try{
    closeScanner();
    const room=ROOMS[S.currentRoom];
    const puzzle=room.puzzles[S.currentPuzzle];
    const digit=puzzle.digit;
    // Update vault IMMEDIATELY
    S.vaultDigits[S.currentRoom][S.currentPuzzle]=String(digit);
    // Track badges
    const bd=S.roomBadgeData[S.currentRoom];
    if(bd.firstTry[S.currentPuzzle]===null){
      bd.firstTry[S.currentPuzzle]=S.wrongCount===0;
    }
    if(S.wrongCount===0){
      S.firstTrySolves++;
      S.streak++;
    }else{
      S.streak=0;
    }
    S.puzzlesSolved++;
    updateHUD();
    pulseHudCounter();
    // Show digit reveal
    showDigitReveal(digit);
  }catch(e){
    console.error('puzzleSolved error',e);
    S.puzzlesSolved++;
    S.vaultDigits[S.currentRoom][S.currentPuzzle]=String(ROOMS[S.currentRoom].puzzles[S.currentPuzzle].digit);
    updateHUD();
    advanceAfterPuzzle();
  }
}
function showDigitReveal(digit){
  closeAllOverlays();
  const dr=$('digitReveal');
  $('digitDisplay').textContent=digit;
  $('digitDisplay').style.color=ROOMS[S.currentRoom].color;
  $('digitDisplay').style.textShadow=`0 0 40px ${ROOMS[S.currentRoom].color}`;
  $('digitLabel').textContent=`Digit ${S.currentPuzzle+1} of 2 unlocked`;
  dr.classList.add('active');dr.style.display='flex';
  $('digitContinueBtn').onclick=()=>{
    closeAllOverlays();
    advanceAfterPuzzle();
  };
  try{const r=$('digitDisplay').getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,ROOMS[S.currentRoom].color,10);}catch(e){}
}
function advanceAfterPuzzle(){
  S.currentPuzzle++;
  if(S.currentPuzzle>=2){
    showCodeEntry();
  }else{
    S.puzzleSolving=false;
    showScanPreview(S.currentRoom,S.currentPuzzle,()=>loadPuzzle());
  }
}

// ---- CODE ENTRY ----
function showCodeEntry(){
  closeAllOverlays();
  codeSubmitting=false;
  S.screen='codeEntry';
  const room=ROOMS[S.currentRoom];
  const d0=S.vaultDigits[S.currentRoom][0];
  const d1=S.vaultDigits[S.currentRoom][1];
  $('codeEntryTitle').textContent=`${room.emoji} Room ${S.currentRoom+1} Exit Code`;
  $('codeEntrySub').textContent='Enter the 2-digit exit code';

}
let codeSubmitting=false;
function submitCode(){
  if(codeSubmitting)return;
  try{
    const d0=$('codeInput0').value.trim();
    const d1=$('codeInput1').value.trim();
    const room=ROOMS[S.currentRoom];
    if(d0==String(room.code[0])&&d1==String(room.code[1])){
      codeSubmitting=true;
      closeAllOverlays();
      S.roomsCleared++;
      if(S.currentRoom<2){
        showPassLaptop();
      }else{
        showDoorTransition(()=>showFinalLock());
      }
    }else{
      $('codeError').classList.add('show');
      setTimeout(()=>$('codeError').classList.remove('show'),2000);
    }
  }catch(e){console.error('submitCode error',e);codeSubmitting=true;closeAllOverlays();S.roomsCleared++;showFinalLock();}
}

// ---- DOOR TRANSITION ----
function showDoorTransition(callback){
  let called=false;
  const fire=()=>{if(called)return;called=true;try{$('doorOverlay').style.display='none';$('doorOverlay').style.animation='none';}catch(e){}callback();};
  try{
    const nextIdx=Math.min(S.currentRoom+1,2);
    const nc=ROOMS[nextIdx].color;
    $('doorFrame').style.borderColor=nc;
    $('doorLock').textContent='🔒';
    const isFinal=S.currentRoom>=2;
    $('doorLabel').textContent=isFinal?'FINAL LOCK':ROOMS[nextIdx].name;
    $('doorLabel').style.color=nc;
    // Reset animation before re-triggering
    $('doorOverlay').style.animation='none';
    $('doorOverlay').style.display='flex';
    // Force reflow then set animation
    void $('doorOverlay').offsetWidth;
    const dur=isFinal?'1.8s':'1.4s';
    $('doorOverlay').style.animation=`doorSlide ${dur} ease forwards`;
    $('doorOverlay').addEventListener('animationend',fire,{once:true});
    setTimeout(fire,isFinal?3000:2500);
  }catch(e){fire();}
}

function activateScanner(puzzle){

// ---- MATCH LOCK ----
function renderMatch(puzzle){
  S.mlPair=0;S.mlSelected=null;
  renderMatchPair(puzzle);
}
function renderMatchPair(puzzle){
  const pc=$('puzzleContainer');
  const idx=S.mlPair;
  if(idx>=puzzle.pairs.length){puzzleSolved();return;}
  const pair=puzzle.pairs[idx];
  const allRights=puzzle.pairs.map(p=>p.right);
  let targets;
  if(S.scannerActive&&!S.overrideTriggered&&puzzle.strongScanner){
    targets=puzzle.strongScanner[idx].slice().sort(()=>Math.random()-.5);
  }else{
    targets=[pair.right,...pair.distractors].sort(()=>Math.random()-.5);
  }
  let html=`<div class="puzzle-progress">Pair ${idx+1} of ${puzzle.pairs.length}</div>`;
  html+=`<div class="puzzle-instruction">👆 Tap the word on the LEFT, then tap its match on the RIGHT.</div>`;
  html+=`<div class="match-area">`;
  html+=`<div class="card match-term" style="border-color:var(--room-color);box-shadow:var(--glow);pointer-events:none">${pair.left}</div>`;
  html+=`<div class="match-arrow">→</div>`;
  html+=`<div class="match-targets">`;
  targets.forEach(t=>{
    const wasPicked=S.wrongPicks.has(t.trim());
    html+=`<div class="card${wasPicked?' dimmed':''}" data-correct="${t===pair.right}" onclick="matchPick(this)">${t}</div>`;
  });
  html+=`</div></div>`;

}
function matchPick(el){
  if(el.classList.contains('disabled')||el.classList.contains('correct')||el.classList.contains('dimmed'))return;
  const puzzle=ROOMS[S.currentRoom].puzzles[S.currentPuzzle];
  if(el.dataset.correct==='true'){
    el.classList.add('correct');
    S.wrongPicks.clear();
    try{const r=el.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,ROOMS[S.currentRoom].color,8);}catch(e){}
    el.parentElement.querySelectorAll('.card').forEach(c=>c.style.pointerEvents='none');
    S.mlPair++;
    setTimeout(()=>{
      if(S.mlPair>=puzzle.pairs.length){puzzleSolved();}
      else{renderMatchPair(puzzle);}
    },600);
  }else{
    el.classList.add('wrong');
    S.wrongPicks.add(el.textContent.trim());
    setTimeout(()=>{el.classList.remove('wrong');el.classList.add('dimmed');},500);
    handleWrongAnswer(puzzle);
    // After wrong, re-render with narrowed options if scanner active
    if(S.scannerActive&&!S.overrideTriggered){

    }
  }
}
function triggerOverride(puzzle){
  closeScanner();
  const type=puzzle.type;
  if(type==='match'){matchOverride(puzzle);}
  else if(type==='sequence'){seqOverride(puzzle);}
  else if(type==='diagnostic'){diagOverride(puzzle);}
  else if(type==='quickfire'){qfOverride();}
  else{simpleOverride(puzzle);}
}
function matchOverride(puzzle){

}

// ---- SEQUENCE LOCK ----
function renderSequence(puzzle){
  S.slStep=0;S.slPlaced=[];
  S.slCards=puzzle.cards.map((c,i)=>({...c,idx:i})).sort(()=>Math.random()-.5);
  renderSeqStep(puzzle);
}
function renderSeqStep(puzzle){
  const pc=$('puzzleContainer');
  const step=S.slStep;
  if(step>=puzzle.cards.length){puzzleSolved();return;}
  // Auto-place last card
  if(step===puzzle.cards.length-1){
    const remaining=S.slCards.filter(c=>!S.slPlaced.includes(c.idx));
    if(remaining.length===1){
      S.slPlaced.push(remaining[0].idx);
      S.slStep++;
      renderSeqFinal(puzzle);
      setTimeout(()=>puzzleSolved(),800);
      return;
    }
  }
  const prompts=['What happens FIRST?','What happens NEXT?','What happens LAST?'];
  let narrowedLabels=null;
  if(S.scannerActive&&!S.overrideTriggered&&puzzle.strongScanner&&puzzle.strongScanner[step]){
    narrowedLabels=puzzle.strongScanner[step];
  }
  let html=`<div class="puzzle-progress">Step ${step+1} of ${puzzle.cards.length}</div>`;
  html+=`<div class="puzzle-instruction">${prompts[step]||'Pick the next step.'}</div>`;
  // Slots
  html+=`<div class="seq-slots">`;
  for(let i=0;i<puzzle.cards.length;i++){
    if(i>0)html+=`<div class="seq-arrow"><span>→</span></div>`;
    if(S.slPlaced.length>i){
      const c=puzzle.cards[S.slPlaced[i]];
      html+=`<div class="seq-slot filled"><div>${c.icon}</div><div style="font-size:13px">${c.label}</div></div>`;
    }else if(i===step){
      html+=`<div class="seq-slot active-slot"><div style="font-size:12px;color:#889">?</div></div>`;
    }else{
      html+=`<div class="seq-slot"><div style="font-size:12px;color:#556">?</div></div>`;
    }
  }
  html+=`</div>`;
  // Available cards
  html+=`<div class="seq-cards">`;
  S.slCards.forEach(c=>{
    if(S.slPlaced.includes(c.idx))return;
    const dimmed=narrowedLabels&&!narrowedLabels.includes(c.label);
    const cardText=`${c.icon} ${c.label}`;
    const wasPicked=S.wrongPicks.has(cardText.trim());
    html+=`<div class="card${dimmed?' dimmed':''}${wasPicked?' dimmed':''}" data-idx="${c.idx}" onclick="seqPick(this,${c.idx})">${cardText}${wasPicked?' ✖':''}</div>`;
  });
  html+=`</div>`;
  pc.innerHTML=html;
}
function renderSeqFinal(puzzle){
  const pc=$('puzzleContainer');
  let html=`<div class="puzzle-progress">Complete!</div><div class="seq-slots">`;
  for(let i=0;i<puzzle.cards.length;i++){
    if(i>0)html+=`<div class="seq-arrow"><span>→</span></div>`;
    const c=puzzle.cards[S.slPlaced[i]];
    html+=`<div class="seq-slot filled"><div>${c.icon}</div><div style="font-size:13px">${c.label}</div></div>`;
  }
  html+=`</div>`;
  pc.innerHTML=html;
}
function seqPick(el,idx){
  if(el.classList.contains('disabled')||el.classList.contains('dimmed'))return;
  const puzzle=ROOMS[S.currentRoom].puzzles[S.currentPuzzle];
  if(idx===S.slStep){
    // Correct
    el.classList.add('correct');
    S.slPlaced.push(idx);
    S.slStep++;
    S.wrongPicks.clear();
    try{const r=el.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,ROOMS[S.currentRoom].color,6);}catch(e){}
    setTimeout(()=>renderSeqStep(puzzle),500);
  }else{
    // Wrong
    el.classList.add('wrong');
    S.wrongPicks.add(el.textContent.trim());
    setTimeout(()=>{el.classList.remove('wrong');},500);
    handleWrongAnswer(puzzle);
    if(S.scannerActive&&!S.overrideTriggered){
      setTimeout(()=>renderSeqStep(puzzle),600);
    }
  }
}
function seqOverride(puzzle){
  closeScanner();
  const pc=$('puzzleContainer');
  pc.innerHTML=`<div style="text-align:center;color:var(--room-color);font-size:18px;margin:20px">🔓 Lock Override — Resolving Sequence...</div>`;
  let delay=0;
  for(let i=S.slStep;i<puzzle.cards.length;i++){
    if(!S.slPlaced.includes(i)){
      S.slPlaced.push(i);
      delay+=500;
      ((d,ci)=>{
        setTimeout(()=>{
          try{
            const c=puzzle.cards[ci];
            pc.innerHTML+=`<div class="card correct" style="margin:6px auto;max-width:300px">${c.icon} ${c.label} ✔</div>`;
          }catch(e){}
        },d);
      })(delay,i);
    }
  }
  S.slStep=puzzle.cards.length;
  setTimeout(()=>puzzleSolved(),delay+600);
}

// ---- QUICK FIRE ----
function renderQuickFire(puzzle){
  S.qfIndex=0;S.qfCorrect=0;S.qfCumulativeWrong=0;
  S.qfAnswers=[null,null,null,null];
  S.qfRetryIndices=null;
  S.qfCheckIndices=[0,1,2,3];
  renderQFStatement(puzzle);
}
function renderQFStatement(puzzle){
  const pc=$('puzzleContainer');
  const indices=S.qfCheckIndices;
  const ci=S.qfIndex;
  if(ci>=indices.length){
    // Check results
    const correct=S.qfAnswers.filter(a=>a===true).length;
    if(correct>=3){
      puzzleSolved();return;
    }else{
      // Retry missed
      S.qfCheckIndices=[];
      S.qfAnswers.forEach((a,i)=>{if(a!==true)S.qfCheckIndices.push(i);});
      S.qfIndex=0;
      renderQFStatement(puzzle);
      return;
    }
  }
  // Override check
  if(S.qfCumulativeWrong>=5){
    qfOverride();return;
  }
  const stmtIdx=indices[ci];
  const stmt=puzzle.statements[stmtIdx];
  let html=`<div style="text-align:center;font-size:14px;color:var(--room-color);margin-bottom:4px">⚡ INCOMING SIGNALS</div>`;
  html+=`<div class="qf-progress">Signal ${ci+1} of ${indices.length}${S.qfRetryIndices?' (retry)':''}</div>`;
  html+=`<div class="qf-statement">${stmt.text}</div>`;
  // Scanner clue if active
  if(S.scannerActive&&puzzle.scannerClues){
    html+=`<div style="font-size:13px;color:var(--room-color);margin-bottom:10px;padding:8px;border:1px solid var(--room-color);border-radius:8px;max-width:500px">🔍 ${puzzle.scannerClues[stmtIdx]}</div>`;
  }
  html+=`<div class="qf-buttons">`;
  html+=`<div class="qf-btn" data-ans="CONFIRM" onclick="qfAnswer(this,'CONFIRM')">✅ CONFIRM</div>`;
  html+=`<div class="qf-btn" data-ans="DENY" onclick="qfAnswer(this,'DENY')">❌ DENY</div>`;
  html+=`</div>`;
  pc.innerHTML=html;
}
function qfAnswer(el,ans){
  if(el.classList.contains('disabled'))return;
  const puzzle=ROOMS[S.currentRoom].puzzles[S.currentPuzzle];
  const indices=S.qfCheckIndices;
  const stmtIdx=indices[S.qfIndex];
  const stmt=puzzle.statements[stmtIdx];
  const correct=ans===stmt.answer;
  document.querySelectorAll('.qf-btn').forEach(b=>b.classList.add('disabled'));
  if(correct){
    el.classList.add('flash-correct');
    S.qfAnswers[stmtIdx]=true;
    S.qfCorrect++;
    try{const r=el.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,'#2ecc71',6);}catch(e){}
  }else{
    el.classList.add('flash-wrong');
    S.qfAnswers[stmtIdx]=false;
    S.qfCumulativeWrong++;
    S.wrongCount++;
    if(!S.scannerActive){
      S.roomBadgeData[S.currentRoom].scannerUsed[S.currentPuzzle]=true;
      activateScanner(puzzle);
    }
  }
  S.qfIndex++;
  setTimeout(()=>{
    if(S.qfCumulativeWrong>=5){qfOverride();return;}
    renderQFStatement(puzzle);
  },500);
}
function qfOverride(){
  S.qfAnswers=S.qfAnswers.map(()=>true);
  S.overrideTriggered=true;
  S.roomBadgeData[S.currentRoom].overridden[S.currentPuzzle]=true;
  closeScanner();
  const pc=$('puzzleContainer');
  pc.innerHTML=`<div style="text-align:center;color:var(--room-color);font-size:18px;margin:20px">🔓 Override activated — signals calibrated.</div>`;
  setTimeout(()=>puzzleSolved(),1000);
}

// ---- DIAGNOSTIC PANEL ----
function renderDiagnostic(puzzle){
  S.dpSlot=0;S.dpFilled=[null,null];
  renderDiagSlot(puzzle);
}
function renderDiagSlot(puzzle){
  const pc=$('puzzleContainer');
  const slot=S.dpSlot;
  let html=`<div style="text-align:center;font-size:16px;color:var(--room-color);font-weight:700;margin-bottom:8px">${puzzle.panelName}</div>`;
  html+=`<div class="puzzle-progress">Slot ${slot+1} of ${puzzle.slots.length}</div>`;
  html+=`<div class="diag-panel">`;
  puzzle.slots.forEach((s,i)=>{
    const filled=S.dpFilled[i]!==null;
    const active=i===slot&&!filled;
    const locked=filled&&i<slot;
    html+=`<div class="diag-slot${active?' active-slot':''}${filled?' filled':''}${locked?' locked':''}">`;
    html+=`<div class="diag-slot-label">${s.label}</div>`;
    html+=`<div class="diag-slot-value">${filled?`${s.correctIcon} ${S.dpFilled[i]}`:''}</div>`;
    html+=`</div>`;
  });
  html+=`</div>`;
  // Parts bank
  let parts=puzzle.parts;
  if(S.scannerActive&&!S.overrideTriggered&&puzzle.strongScanner&&puzzle.strongScanner[slot]){
    const narrowed=puzzle.strongScanner[slot];
    parts=puzzle.parts.map(p=>{
      const label=`${p.icon} ${p.text}`;
      return{...p,dimmed:!narrowed.includes(label)};
    });
  }
  html+=`<div class="parts-bank">`;
  parts.forEach(p=>{
    const used=S.dpFilled.includes(p.text);
    const dimmed=p.dimmed||false;
    const wasPicked=S.wrongPicks.has(p.text);
    html+=`<div class="part-chip${used?' disabled':''}${dimmed?' disabled':''}${wasPicked?' disabled':''}" data-text="${p.text}" onclick="diagPick(this,'${p.text}')">${p.icon} ${p.text}${wasPicked?' ✖':''}</div>`;
  });
  html+=`</div>`;
  pc.innerHTML=html;
}
function diagPick(el,text){
  if(el.classList.contains('disabled'))return;
  const puzzle=ROOMS[S.currentRoom].puzzles[S.currentPuzzle];
  const slot=S.dpSlot;
  const correct=text===puzzle.slots[slot].correct;
  if(correct){
    S.dpFilled[slot]=text;
    el.classList.add('placed');
    S.wrongPicks.clear();
    try{const r=el.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,ROOMS[S.currentRoom].color,6);}catch(e){}
    S.dpSlot++;
    if(S.dpSlot>=puzzle.slots.length){
      setTimeout(()=>puzzleSolved(),500);
    }else{
      setTimeout(()=>renderDiagSlot(puzzle),500);
    }
  }else{
    el.classList.add('disabled');
    el.style.borderColor='var(--wrong)';
    S.wrongPicks.add(text);
    setTimeout(()=>{el.style.borderColor='';},500);
    handleWrongAnswer(puzzle);
    if(S.scannerActive&&!S.overrideTriggered){
      setTimeout(()=>renderDiagSlot(puzzle),600);
    }
  }
}
function diagOverride(puzzle){
  closeScanner();
  const pc=$('puzzleContainer');
  pc.innerHTML=`<div style="text-align:center;color:var(--room-color);font-size:18px;margin:20px">🔓 Lock Override — Fiber Console Activating...</div>`;
  let delay=0;
  for(let i=S.dpSlot;i<puzzle.slots.length;i++){
    S.dpFilled[i]=puzzle.slots[i].correct;
    delay+=600;
    ((d,si)=>{
      setTimeout(()=>{
        try{
          const s=puzzle.slots[si];
          pc.innerHTML+=`<div class="card correct" style="margin:6px auto;max-width:300px">${s.correctIcon} ${s.correct} → ${s.label} ✔</div>`;
        }catch(e){}
      },d);
    })(delay,i);
  }
  S.dpSlot=puzzle.slots.length;
  setTimeout(()=>puzzleSolved(),delay+600);
}

// ---- FINAL LOCK ----
function showFinalLock(){
  try{
    closeAllOverlays();
    S.screen='finalLock';
    S.flMatch=0;S.flMatched=[false,false,false];
    S.wrongCount=0;S.scannerActive=false;S.overrideTriggered=false;S.puzzleSolving=false;
    showHUD(true);
    $('bottomBar').classList.add('active');
    $('missionLine').textContent='Match each term to escape.';
    updateHUD();
    renderFinalLock();
  }catch(e){console.error('finalLock error',e);showEscapeReport();}
}
function renderFinalLock(){
  const pc=$('puzzleContainer');
  const fl=FINAL_LOCK;
  const targets=[...fl.pairs].sort(()=>Math.random()-.5);
  let html=`<div style="text-align:center;font-size:clamp(20px,3.5vw,28px);color:var(--text-bright);font-weight:800;margin-bottom:4px;animation:pulse 2s infinite">🔒 FINAL LOCK — Match to Escape</div>`;
  html+=`<div class="puzzle-instruction">Match each term on the left to its result on the right.</div>`;
  html+=`<div class="fl-layout">`;
  // Terms
  html+=`<div class="fl-terms">`;
  fl.pairs.forEach((p,i)=>{
    const active=i===S.flMatch;
    const matched=S.flMatched[i];
    html+=`<div class="card fl-card${active?' active-term':''}${matched?' matched':''}" style="border-color:${matched?'var(--correct)':active?p.color:'rgba(255,255,255,.1)'};${active?'box-shadow:0 0 15px '+p.color:''}">${p.emoji} ${p.term}</div>`;
  });
  html+=`</div>`;
  // Targets
  html+=`<div class="fl-targets">`;
  targets.forEach(p=>{
    const matched=S.flMatched[fl.pairs.indexOf(p)];
    html+=`<div class="card fl-card${matched?' matched':''}" data-target="${p.target}" data-room="${fl.pairs.indexOf(p)}" onclick="flPick(this)" style="${matched?'opacity:.4;pointer-events:none':''}">${p.target}</div>`;
  });
  html+=`</div></div>`;
  pc.innerHTML=html;
}
function flPick(el){
  if(el.classList.contains('matched')||el.style.pointerEvents==='none')return;
  const fl=FINAL_LOCK;
  const currentPair=fl.pairs[S.flMatch];
  const targetRoom=parseInt(el.dataset.room);
  if(el.dataset.target===currentPair.target){
    // Correct
    el.classList.add('correct');
    S.flMatched[S.flMatch]=true;
    try{const r=el.getBoundingClientRect();spawnParticles(r.left+r.width/2,r.top+r.height/2,currentPair.color,8);}catch(e){}
    S.flMatch++;
    // Reset scanner/override state for next match
    S.wrongCount=0;S.scannerActive=false;S.overrideTriggered=false;
    $('scannerBtn').classList.remove('pulse');
    closeScanner();
    if(S.flMatch>=fl.pairs.length){
      // Auto-match last if only one remains
      setTimeout(()=>triggerEscape(),600);
    }else if(S.flMatch===fl.pairs.length-1){
      // Auto-lock last remaining match
      S.flMatched[S.flMatch]=true;
      S.flMatch++;
      setTimeout(()=>{
        renderFinalLock();
        setTimeout(()=>triggerEscape(),800);
      },500);
    }else{
      setTimeout(()=>renderFinalLock(),500);
    }
  }else{
    el.classList.add('wrong');
    setTimeout(()=>{el.classList.remove('wrong');el.classList.add('dimmed');},500);
    S.wrongCount++;
    if(S.wrongCount===1){
      S.scannerActive=true;
      $('scannerBtn').classList.add('pulse');
      $('scannerText').textContent=fl.scannerText;
      $('scannerOverlay').classList.add('active');$('scannerOverlay').style.display='flex';
    }else if(S.wrongCount>=2&&!S.overrideTriggered){
      S.overrideTriggered=true;
      closeScanner();
      // Highlight correct
      setTimeout(()=>{
        try{
          document.querySelectorAll('.fl-targets .card').forEach(c=>{
            if(c.dataset.target===currentPair.target){
              c.classList.add('highlight');c.classList.remove('dimmed');
            }
          });
          const label=document.createElement('div');
          label.style.cssText='text-align:center;color:var(--room-color);font-size:14px;margin-top:8px;font-weight:600';
          label.textContent='🔓 Scanner locked on — match confirmed.';
          $('puzzleContainer').appendChild(label);
        }catch(e){}
      },600);
    }
  }
}

// ---- ESCAPE ANIMATION ----
function triggerEscape(){
  try{
    closeAllOverlays();
    $('puzzleContainer').innerHTML=`<div style="text-align:center"><div style="font-size:clamp(48px,10vw,80px);font-weight:800;color:#fff;text-shadow:0 0 50px rgba(0,212,255,.5);animation:escaped .8s ease">ESCAPED!</div></div>`;
    // Confetti
    for(let i=0;i<15;i++){
      const c=document.createElement('div');
      const colors=['#e74c3c','#2ecc71','#3498db','#f1c40f','#00d4ff'];
      const size=6+Math.random()*8;
      Object.assign(c.style,{
        position:'fixed',top:'-20px',left:Math.random()*100+'%',
        width:size+'px',height:size+'px',background:colors[i%colors.length],
        borderRadius:Math.random()>.5?'50%':'2px',zIndex:'500',pointerEvents:'none',
        animation:`confettiFall ${1.5+Math.random()*2}s ${Math.random()*.5}s ease forwards`
      });
      document.body.appendChild(c);
      const rm=()=>{try{c.remove();}catch(e){}};
      c.addEventListener('animationend',rm);
      setTimeout(rm,5000);
    }
    setTimeout(()=>showEscapeReport(),3500);
  }catch(e){showEscapeReport();}
}

// ---- ESCAPE REPORT ----
function showEscapeReport(){
  try{
    closeAllOverlays();
    showHUD(false);
    S.screen='escapeReport';
    const elapsed=Math.round((Date.now()-S.startTime)/1000);
    const mins=Math.floor(elapsed/60);
    const secs=elapsed%60;
    const timeStr=`${mins}m ${secs}s`;
    // Stars
    let stars=1;
    if(S.firstTrySolves>=2)stars=2;
    if(S.firstTrySolves>=4)stars=3;
    // Badges
    const badges=[];
    for(let r=0;r<3;r++){
      const bd=S.roomBadgeData[r];
      if(S.skippedRooms[r])continue;
      // Clean Room: both puzzles solved without override (first or second try)
      if(!bd.overridden[0]&&!bd.overridden[1]&&bd.firstTry[0]!==null&&bd.firstTry[1]!==null){
        badges.push({icon:'🧹',name:'Clean Room',desc:`Room ${r+1}`});
      }
      // No Scanner: neither puzzle triggered the scanner
      if(!bd.scannerUsed[0]&&!bd.scannerUsed[1]){
        badges.push({icon:'🚫',name:'No Scanner',desc:`Room ${r+1}`});
      }
      // Per-puzzle badges
      for(let p=0;p<2;p++){
        // Comeback: used scanner but still solved it (not overridden)
        if(bd.scannerUsed[p]&&!bd.overridden[p]){
          badges.push({icon:'🔄',name:'Comeback',desc:`Room ${r+1} Puzzle ${p+1}`});
        }
        // Deep Scan: used scanner, not overridden, not first-try (had to use scanner help then got it right)
        if(bd.scannerUsed[p]&&!bd.overridden[p]&&!bd.firstTry[p]){
          badges.push({icon:'🔍',name:'Deep Scan',desc:`Room ${r+1} Puzzle ${p+1}`});
        }
      }
    }
    // De-dupe badge types per room
    const uniqueBadges=[];
    const seen=new Set();
    badges.forEach(b=>{const k=b.name+b.desc;if(!seen.has(k)){seen.add(k);uniqueBadges.push(b);}});

    let starsHtml='';
    for(let i=0;i<3;i++){
      starsHtml+=`<span class="${i<stars?'star-on':'star-off'}" style="animation:${i<stars?`starFill .4s ${i*.2}s ease both`:'none'}">⭐</span>`;
    }

    const rb=$('reportBox');
    rb.innerHTML=`
      <div class="report-title" style="animation:escaped .6s ease">ESCAPED!</div>
      <div class="report-brand">Mr. Jawad's Escape Room Simulations</div>
      <div class="report-section">
        <h3>Run Summary</h3>
        <div class="report-row"><span class="report-label">Rooms Cleared</span><span class="report-value">${S.roomsCleared} / 3</span></div>
        <div class="report-row"><span class="report-label">Puzzles Cleared</span><span class="report-value">${S.puzzlesSolved} / 6</span></div>
        <div class="report-row"><span class="report-label">First-Try Solves</span><span class="report-value">${S.firstTrySolves} / 6</span></div>
        <div class="report-row"><span class="report-label">Star Rating</span><span class="report-value"><span class="stars">${starsHtml}</span></span></div>
        <div class="report-row"><span class="report-label">Time</span><span class="report-value">${timeStr}</span></div>
      </div>
      ${uniqueBadges.length>0?`<div class="report-section"><h3>Badges Earned</h3>${uniqueBadges.map(b=>`<div class="badge-row"><span class="badge-icon">${b.icon}</span><span>${b.name}</span><span style="color:#667;font-size:12px;margin-left:auto">${b.desc}</span></div>`).join('')}</div>`:''}
      <div class="report-btns">
        <button class="btn btn-start" onclick="location.reload()">Play Again</button>
        <button class="btn-copy" onclick="copyReport()">📋 Copy Report</button>
      </div>
    `;
    $('escapeReport').classList.add('active');$('escapeReport').style.display='flex';
    S.reportText=`Mr. Jawad's Escape Room — Muscular System\tRooms: ${S.roomsCleared}/3\tPuzzles: ${S.puzzlesSolved}/6\tFirst-Try: ${S.firstTrySolves}/6\tStars: ${stars}\tTime: ${timeStr}\tBadges: ${uniqueBadges.map(b=>b.name).join(', ')||'None'}`;
  }catch(e){
    console.error('report error',e);
    $('reportBox').innerHTML='<div class="report-title">ESCAPED!</div><button class="btn btn-start" onclick="location.reload()">Play Again</button>';
    $('escapeReport').classList.add('active');$('escapeReport').style.display='flex';
  }
}
function copyReport(){
  try{
    navigator.clipboard.writeText(S.reportText).then(()=>{
      const btn=document.querySelector('.btn-copy');
      btn.textContent='✔ Copied!';
      setTimeout(()=>{btn.textContent='📋 Copy Report';},2000);
    });
  }catch(e){}
}

// ---- EMERGENCY SKIP ----
// Shift+S (keyboard)
document.addEventListener('keydown',e=>{
  if(e.key==='Shift')S.shiftHeld=true;
  if(e.key==='S'&&S.shiftHeld&&(S.screen==='room'||S.screen==='codeEntry'||S.screen==='finalLock')){
    if(!S.shiftStart)S.shiftStart=Date.now();
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='Shift'){S.shiftHeld=false;S.shiftStart=0;}
  if(e.key==='S')S.shiftStart=0;
});
setInterval(()=>{
  if(S.shiftHeld&&S.shiftStart&&Date.now()-S.shiftStart>=2000){
    S.shiftStart=0;
    performSkip();
  }
},200);

// Long-press on room title (single 5s hold)
$('hudRoom').addEventListener('pointerdown',e=>{
  if(S.screen==='start'||S.screen==='tutorial'||S.screen==='escapeReport'||S.screen==='skipping')return;
  S.longPressStart=Date.now();
  S.longPressTimer=setTimeout(()=>{
    if(S.longPressStart&&Date.now()-S.longPressStart>=4900){
      S.longPressStart=0;
      performSkip();
    }
  },5000);
});
$('hudRoom').addEventListener('pointerup',()=>{S.longPressStart=0;if(S.longPressTimer)clearTimeout(S.longPressTimer);});
$('hudRoom').addEventListener('pointerleave',()=>{S.longPressStart=0;if(S.longPressTimer)clearTimeout(S.longPressTimer);});

function performSkip(){
  try{
    if(S.screen==='finalLock'){
      showEscapeReport();
      return;
    }
    if(S.screen==='room'||S.screen==='codeEntry'){
      S.screen='skipping';
      S.puzzleSolving=true;
      S.previewDone=true;
      closeAllOverlays();
      if(S.previewTimeout)clearTimeout(S.previewTimeout);
      const room=ROOMS[S.currentRoom];
      S.skippedRooms[S.currentRoom]=true;
      // Reveal digits and count unsolved puzzles
      for(let i=0;i<2;i++){
        if(S.vaultDigits[S.currentRoom][i]==='?'){
          S.vaultDigits[S.currentRoom][i]=String(room.code[i]);
          S.puzzlesSolved++;
          S.roomBadgeData[S.currentRoom].firstTry[i]=false;
          S.roomBadgeData[S.currentRoom].overridden[i]=true;
        }
      }
      S.streak=0;
      updateHUD();
      // Show skipped message
      $('puzzleContainer').innerHTML=`<div style="text-align:center;color:#889;font-size:18px">⏭️ Room skipped<br><span style="font-size:14px;color:#556">(Skipped)</span></div>`;
      S.roomsCleared++;
      if(S.currentRoom<2){
        setTimeout(()=>showPassLaptop(),1200);
      }else{
        setTimeout(()=>showDoorTransition(()=>showFinalLock()),1200);
      }
    }
  }catch(e){console.error('skip error',e);}
}

// ---- INIT ----
document.addEventListener('DOMContentLoaded',()=>{
  $('startScreen').classList.add('active');
});
</script>
