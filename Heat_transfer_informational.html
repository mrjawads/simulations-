<h2 style="color:#4ecca3;margin-bottom:8px;">Heat Transfer — Surprising & Extreme</h2>
<p>A thermos, a phone, and a firefighter's gear all solve the same heat problem — in completely different ways.</p>
<p style="color:#e94560;font-weight:700;">Read 5 real-world heat cases and figure out what type of heat transfer is at work — finish all 8 for extra credit.</p>

const P={
1:{low:`A fire blasts heat over 1,000°F straight at a firefighter's body. That heat travels through <b>radiation</b> and <b>conduction</b>. Thick gear traps air between its layers. Trapped air is an <b>insulator</b> — it blocks heat from reaching skin.`,med:`A fire blasts heat over 1,000°F at a firefighter from every direction. That heat reaches the body two ways — <b>radiation</b> from the flames and <b>conduction</b> from hot surfaces. Without protection, skin burns in seconds. Firefighter gear weighs about 45 pounds and uses layers that trap air between them. Trapped air is a powerful <b>insulator</b> because air is a terrible <b>conductor</b> of heat. The gear cannot cool the firefighter down — it only slows how fast heat gets in.`,high:`A structure fire can reach over 1,000°F — hot enough to melt metal. Heat attacks a firefighter from every direction through <b>radiation</b> and <b>conduction</b> at the same time. Without gear, exposed skin would burn in just seconds from that intense heat energy. Firefighter turnout gear weighs about 45 pounds and uses multiple layers with air gaps between them. Those air gaps are the key — air is a terrible <b>conductor</b>, so it works as a natural <b>insulator</b>. The layers block <b>conduction</b> from transferring the fire's heat through to the firefighter's body. The gear does not cool the body down — it just slows how fast heat can get in. Even with full protection, firefighters still overheat because the gear also traps their own body heat inside.`,kw:["radiation","conduction","insulator","conductor"],pred:["Gear absorbs the heat and stores it","Gear layers trap air that blocks heat","Gear cools the firefighter with cold air","Gear reflects all heat back at the fire"],cp:1,resp:"Gear layers trap air as insulator, blocking conduction",ok:"Yes — body stays in safe zone"},
2:{low:`London's subway platforms get dangerously hot because there is no <b>ventilation</b> to move trapped air out. Engineers tested panels filled with cold water on the walls. The panels <b>absorb</b> heat from the air through <b>conduction</b>. Water carries that heat away — dropping the temperature up to 27°F.`,med:`London's underground subway platforms trap heat the same way NYC stations do. Trains pump hot exhaust air onto platforms, and the tunnels have no <b>ventilation</b> to move it out. Engineers tested a fix — panels filled with cold water mounted on platform walls. The cold panels <b>absorb</b> heat from the surrounding air through <b>conduction</b>. The warmed water flows away through pipes, carrying the heat with it. In tests, platform temperatures dropped by up to 27°F.`,high:`London's Piccadilly line subway platforms trap heat just like NYC stations — underground with no <b>ventilation</b>. Trains blast hot exhaust air onto the platform every time they stop. The tunnels hold that heat because there is no airflow to carry it away through <b>convection</b>. Engineers designed panels filled with cold circulating water and mounted them on the platform walls. These panels <b>absorb</b> heat from the surrounding air through <b>conduction</b> — heat flows from the hot air into the cold panel surface. The warmed water then flows through pipes to a cooling unit, carrying the heat out of the station. In testing, platform temperatures dropped by up to 27°F — a dramatic difference for passengers. The project works, but it costs over $27 million for just one subway line.`,kw:["ventilation","absorb","conduction","convection"],pred:["Cold water panels absorb heat through conduction","Giant fans blow hot air out of the tunnels","Ice blocks are placed on platforms to cool the air","Air conditioning units are installed in every tunnel"],cp:0,resp:"Cold-water panels absorb heat via conduction, carrying it away",ok:"Yes — platform drops up to 27°F"},
3:{low:`Your phone's processor makes heat every time you game or stream. That heat spreads through the metal case by <b>conduction</b>. A tiny <b>conductor</b> called a heat sink pulls heat away from the chip. It spreads the heat out so no single spot gets too hot.`,med:`Your phone's processor generates heat every time it works hard — gaming, streaming, or charging. That heat moves through the metal casing to your hand by <b>conduction</b>. Inside, a tiny metal piece called a heat sink acts as a <b>conductor</b> to pull heat away from the chip. The heat sink spreads that energy across a wider area so no one spot overheats. Without it, the processor would burn itself out in minutes.`,high:`Your phone's processor generates heat every time it works hard — gaming, streaming, or fast-charging push it the hardest. That heat energy has nowhere to go inside a sealed phone case. It moves outward through the metal frame by <b>conduction</b>, which is why the phone feels warm in your hand. Inside the phone, a tiny metal piece called a heat sink works as a <b>conductor</b> to pull heat away from the chip. The heat sink spreads that thermal energy across a wider surface area so no single spot gets dangerously hot. Without this system, the processor would overheat and damage itself within minutes of heavy use. Some phones even reduce performance on purpose when they get too hot — slowing down to make less heat. That slowdown is the phone protecting its own circuits from <b>conduction</b> damage.`,kw:["conduction","conductor"],pred:["A tiny fan blows cool air on the processor","A heat sink spreads heat away from the chip by conduction","The phone case absorbs all the heat itself","Cold liquid flows through tubes to cool the chip"],cp:1,resp:"Heat sink (conductor) pulls heat from chip, spreads it out",ok:"Yes — chip cools back toward safe range"},
4:{low:`Sunlight carries heat energy as <b>radiation</b> straight through glass windows. Some people tape aluminum foil over their windows during heat waves. The shiny foil reflects <b>radiation</b> back outside before it heats the room. A room with foil windows can stay 10–15°F cooler.`,med:`Sunlight carries heat energy as <b>radiation</b> — invisible waves that pass right through glass and heat up everything inside. During heat waves, some people tape aluminum foil over their windows to block that energy. The shiny surface reflects <b>radiation</b> back outside before it can enter the room and warm indoor surfaces. A room with foil-covered windows can stay 10–15°F cooler than an uncovered room on the same floor. The foil is cheap, but it works because it stops the heat at the source — the window.`,high:`Sunlight carries heat energy as <b>radiation</b> — invisible waves that pass right through clear glass and heat up everything they hit inside. During heat waves, some people tape aluminum foil to the inside of their windows to block that incoming energy. The shiny foil surface reflects <b>radiation</b> back outside before it can pass through and warm the room's surfaces. Dark surfaces <b>absorb</b> <b>radiation</b> and convert it to heat, but foil bounces it away — the energy never enters the room. A room with foil-covered windows can stay 10–15°F cooler than an identical uncovered room on the same floor. This trick works because it attacks the problem at the source — stopping <b>radiation</b> before it becomes trapped heat. Foil costs almost nothing, but it uses the same principle as the reflective coatings on expensive energy-efficient windows. The difference is that foil blocks all light too, so the room goes dark — a trade-off between cool air and sunlight.`,kw:["radiation","absorb"],pred:["Foil absorbs the sunlight and converts it to cool air","Foil reflects radiation back outside before it heats the room","Foil blocks convection from entering through the glass","Foil insulates the window by trapping air behind it"],cp:1,resp:"Shiny foil reflects radiation back outside",ok:"Yes — room stays 10–15°F cooler"},
5:{low:`In space, one side of a satellite faces the sun at over 250°F. The other side faces darkness at negative 250°F. There is no air, so <b>convection</b> cannot move heat around. Engineers use gold foil to reflect <b>radiation</b> and metal pipes to move heat by <b>conduction</b> inside.`,med:`In space, one side of a satellite bakes at over 250°F from the sun's <b>radiation</b>. The other side, facing empty darkness, drops to negative 250°F. With no air in space, <b>convection</b> cannot happen — there is nothing to carry heat from one side to the other. Engineers wrap satellites in reflective gold foil to block incoming <b>radiation</b> from overheating the sun-facing side. Inside, metal heat pipes act as <b>conductors</b>, moving heat from the hot side to the cold side. This keeps the electronics in a safe temperature range — all without any air or fans.`,high:`In space, a satellite's sun-facing side bakes at over 250°F from intense <b>radiation</b> hitting it constantly. The opposite side, facing empty darkness, plunges to around negative 250°F. That is a 500-degree difference across a single machine — and the electronics inside need a stable, safe range to work. On Earth, <b>convection</b> naturally balances temperatures as air moves heat around, but space has no air at all. With <b>convection</b> impossible, <b>radiation</b> is the only way heat enters or leaves the satellite from the outside. Engineers solve this by wrapping the outside in reflective gold foil that bounces away excess <b>radiation</b> from the sun. Inside, metal heat pipes work as <b>conductors</b>, carrying heat from the hot side to the cold side to spread it evenly. The satellite manages extreme heat using only <b>conduction</b> inside and <b>radiation</b> control outside — no moving air needed.`,kw:["convection","radiation","conduction","conductor"],pred:["Fans inside move heat from one side to the other","Gold foil reflects radiation and metal pipes conduct heat inside","The satellite spins to even out the temperature","Cold gas is pumped to the hot side"],cp:1,resp:"Gold foil reflects radiation; metal pipes conduct heat inside",ok:"Yes — electronics stay in safe range"},
6:{low:`NYC's High Line park sits above the street on an old rail line. Plants and soil cover the surface instead of bare concrete. The plants block <b>radiation</b> from heating the ground and release moisture that cools the air. The High Line is about 7°F cooler than the streets below.`,med:`NYC's High Line park is built on an old elevated rail line above the streets of Manhattan. The walkway is covered with plants and soil instead of the bare concrete that covers the streets below. Plants shade the ground, blocking <b>radiation</b> from heating the surface the way it heats exposed concrete. The plants also release moisture into the air, which cools the surrounding area through a process related to <b>convection</b>. A 2025 study found the High Line is an average of 7°F cooler than surrounding streets. The same concrete without plants would trap heat and stay hot long after sunset.`,high:`NYC's High Line park sits on an old elevated rail line above the streets of Manhattan's west side. Where the streets below are covered in bare concrete and asphalt, the High Line is covered with plants, trees, and soil. This matters because dark pavement <b>absorbs</b> <b>radiation</b> from the sun and converts it into trapped heat — making the street a heat island. The plants on the High Line shade the surface, blocking <b>radiation</b> from ever heating the ground beneath them. Plants also release moisture into the air through their leaves, which produces a cooling effect related to <b>convection</b>. Together, the shade and moisture make the High Line an average of 7°F cooler than the streets just below it. A 2025 study found neighborhoods next to the High Line have a nearly 64% reduction in heat island effect. This shows that replacing concrete with green space is one of the most effective ways to fight urban heat.`,kw:["radiation","convection","absorb"],pred:["Plants block radiation and release cooling moisture","Sprinklers spray cold water on the walkway","Shade structures are built over the concrete","Underground pipes pump cold air to the surface"],cp:0,resp:"Plants block radiation and moisture cools air via convection",ok:"Yes — High Line is ~7°F cooler"},
7:{low:`A fan blows air at you, but it does not change the air temperature at all. So why does it feel cooler? Sweat on your skin <b>absorbs</b> heat from your body and evaporates into the air. Moving air from <b>convection</b> speeds this up by replacing humid air with dry air.`,med:`A fan blows air across your body, but the air coming out is the exact same temperature as the air around you. So why does a fan feel cooler if it does not actually cool the air? The answer is <b>convection</b> — moving air speeds up your body's natural cooling system. When you sweat, the water on your skin <b>absorbs</b> heat from your body and evaporates, carrying that heat away. Still air traps a layer of warm, humid air right next to your skin, slowing evaporation down. The fan's moving air blows that humid layer away, letting fresh dry air reach your skin and speed up heat loss.`,high:`A fan blows air across your body, but the air coming out of the fan is the exact same temperature as the room. So why does a fan feel cooler if it does not actually lower the air temperature at all? The secret is <b>convection</b> — moving air works with your body's natural cooling system instead of replacing it. When you sweat, the water on your skin <b>absorbs</b> heat energy from your body and then evaporates into the surrounding air. That evaporation carries heat away from your body — it is the same reason stepping out of a pool feels cold. Without a fan, a layer of warm humid air sits right against your skin and slows evaporation down significantly. A fan uses <b>convection</b> to blow that humid layer away, replacing it with fresh dry air that lets evaporation happen faster. A wet t-shirt works the same way — more water on your skin means more evaporation and more heat carried away.`,kw:["absorb","convection"],pred:["The fan creates cold air that lowers body temperature","Moving air speeds up sweat evaporation via convection","The fan pushes body heat toward the floor","The fan blocks radiation from reaching your skin"],cp:1,resp:"Convection blows humid air away, speeding sweat evaporation",ok:"Yes — body cools toward comfortable range"},
8:{low:`A thermos keeps hot drinks hot and cold drinks cold for hours. It blocks all three types of heat transfer at once. A vacuum layer has no air, which blocks <b>convection</b>. A silver coating reflects <b>radiation</b>, and double walls block <b>conduction</b>.`,med:`A thermos can keep coffee hot or ice water cold for hours — the same container does both. It works by blocking all three types of heat transfer in one design. Between the inner and outer walls, there is a vacuum — a space with no air — which blocks <b>convection</b> completely. A reflective silver coating on the inner wall bounces <b>radiation</b> back, stopping heat from escaping or entering as waves. The double walls are made from low-conductivity material, which blocks <b>conduction</b> from carrying heat through the solid walls. No other everyday object blocks all three types of heat transfer at once.`,high:`A thermos keeps hot coffee hot for hours — and the exact same design keeps ice water cold for just as long. That seems impossible, but the thermos does not add or remove heat — it simply blocks heat from moving in any direction. The secret is that it fights all three types of heat transfer at once inside a single container. Between the inner and outer walls sits a vacuum — a space with no air at all — which completely blocks <b>convection</b>. A reflective silver coating on the inner wall bounces <b>radiation</b> back, preventing heat from leaving or entering as invisible waves. The double walls use a material that is a poor <b>conductor</b>, blocking <b>conduction</b> from carrying heat through the solid structure. This three-layer defense means almost no heat can cross the wall — not through air, not through waves, not through contact. The thermos is one of the simplest everyday examples of engineering that uses all three heat transfer principles.`,kw:["convection","radiation","conduction","conductor"],pred:["The thermos uses a heater to keep drinks warm","Three layers block convection, radiation, and conduction","The thermos absorbs heat and stores it in the walls","Cold liquid circulates between the walls"],cp:1,resp:"Vacuum blocks convection, silver reflects radiation, walls block conduction",ok:"Yes — temperature stays in safe zone for hours"}
};

function speak(text){try{if(!speechReady)return;window.speechSynthesis.cancel();clearInterval(speechResumeInterval);const u=new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g,''));u.rate=0.9;u.onend=u.onerror=()=>clearInterval(speechResumeInterval);window.speechSynthesis.speak(u);speechResumeInterval=setInterval(()=>{try{window.speechSynthesis.resume();}catch(e){}},10000);setTimeout(()=>{clearInterval(speechResumeInterval);try{window.speechSynthesis.cancel();}catch(e){}},120000);}catch(e){}}
function stopSpeak(){try{window.speechSynthesis.cancel();clearInterval(speechResumeInterval);}catch(e){}}

function startSim(){initSpeech();document.getElementById('welcome').style.display='none';const app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';app.innerHTML=`<div id="titleBar">🌡️ Mr. Jawad's Simulations — Heat Transfer: Surprising & Extreme</div><div style="display:flex;flex:1;overflow:hidden;"><div id="left"><h3>Pick Any 5 You Like</h3><div id="scenarioList"></div><div class="divider"></div><div class="section-label">Reading Level</div><div class="reading-tabs"><div class="reading-tab active" data-level="low" onclick="setLevel(this)">Low</div><div class="reading-tab" data-level="med" onclick="setLevel(this)">Med</div><div class="reading-tab" data-level="high" onclick="setLevel(this)">High</div></div><div class="divider"></div><div class="section-label">Key Words</div><div id="keywords"></div><div style="flex:1;"></div><button class="btn-reset" id="btnReset" onclick="resetSim()">Reset</button><button class="btn-reset" id="btnNewRun" onclick="resetSim()" style="margin-top:4px;">New Run</button></div><div id="center"><div id="stepTabs"><div class="step-tab" id="stab1">1. PREDICT</div><div class="step-tab" id="stab2">2. READ</div><div class="step-tab" id="stab3">3. WATCH</div><div class="step-tab" id="stab4">4. RECORD</div></div><div id="mainContent"><div class="content-card" style="text-align:center;margin-top:40px;"><h2>👈 Pick a Scenario</h2><p>Choose any scenario from the left sidebar to start.</p></div></div><div id="actionArea"><button class="action-btn primary" id="mainAction" onclick="handleAction()" disabled>Select a Scenario</button><button class="action-btn secondary" id="readAloudBtn" onclick="handleReadAloud()" style="display:none;">🔊 Read Aloud</button></div></div><div id="right"><h3>Progress</h3><div class="hud-grid"><div class="hud-box"><div class="hud-label">Score</div><div class="hud-value" id="hudScore">0</div></div><div class="hud-box"><div class="hud-label">Streak</div><div class="hud-value" id="hudStreak">0</div></div><div class="hud-box"><div class="hud-label">Completed</div><div class="hud-value" id="hudCompleted">0/8</div></div><div class="hud-box"><div class="hud-label">Accuracy</div><div class="hud-value" id="hudAccuracy">—</div></div></div><div id="progressBarWrap"><div id="progressBar"></div></div><div id="progressMsg">Pick 5 more you like!</div><div class="divider"></div><h3>Data Table</h3><button id="copyBtn" onclick="copyTable()">📋 Copy Table</button><div id="dataTableWrap"><table id="dataTable"><thead><tr><th>Scenario</th><th>What Changed?</th><th>System Response</th><th>Back Toward OK?</th></tr></thead><tbody id="dataBody"></tbody></table></div></div></div>`;renderScenarios();renderKW();}

function renderScenarios(){const l=document.getElementById('scenarioList');l.innerHTML='';SCENARIOS.forEach(s=>{const c=document.createElement('div');c.className='scenario-card'+(state.completedScenarios.includes(s.id)?' completed':'')+(state.selectedScenario===s.id?' selected':'');c.innerHTML=`<span class="sc-emoji">${s.emoji}</span><span class="sc-name">${s.name}</span>`;c.onclick=()=>{initSpeech();selectScenario(s.id);};l.appendChild(c);});}
function renderKW(){const k=document.getElementById('keywords');k.innerHTML='';KWLIST.forEach(w=>{const s=document.createElement('span');s.className='kw';s.textContent=w;s.id='kw_'+w;k.appendChild(s);});}
function highlightKW(id){const p=P[id];KWLIST.forEach(w=>{const el=document.getElementById('kw_'+w);if(el)el.className=p.kw.includes(w)?'kw highlighted':'kw';});}
function setLevel(el){initSpeech();stopSpeak();document.querySelectorAll('.reading-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');state.readingLevel=el.dataset.level;if(state.currentStep===2&&state.selectedScenario)showRead();}
function updateTabs(){for(let i=1;i<=4;i++){const t=document.getElementById('stab'+i);t.className='step-tab';if(i<state.currentStep)t.classList.add('done');if(i===state.currentStep)t.classList.add('active');}}

function selectScenario(id){if(state.completedScenarios.includes(id))return;stopSpeak();if(animId){cancelAnimationFrame(animId);animId=null;}state.selectedScenario=id;state.currentStep=1;renderScenarios();highlightKW(id);showPredict();updateTabs();}

function showPredict(){const s=P[state.selectedScenario],sc=SCENARIOS[state.selectedScenario-1],mc=document.getElementById('mainContent');let h=`<div class="content-card"><h2>${sc.emoji} ${sc.name} — Predict</h2><p style="margin-bottom:12px;font-weight:600;color:#e94560;">What do you think this system will do to manage heat?</p><div class="predict-options">`;s.pred.forEach((o,i)=>{h+=`<div class="predict-btn" onclick="choosePrediction(${i})" id="pred_${i}">${o}</div>`;});h+=`</div></div>`;mc.innerHTML=h;document.getElementById('mainAction').textContent='Make Your Prediction';document.getElementById('mainAction').disabled=true;document.getElementById('readAloudBtn').style.display='none';}
function choosePrediction(i){state.predictions[state.selectedScenario]=i;document.querySelectorAll('.predict-btn').forEach((b,j)=>b.className='predict-btn'+(j===i?' chosen':''));document.getElementById('mainAction').disabled=false;}
function showRead(){state.currentStep=2;updateTabs();const s=P[state.selectedScenario],sc=SCENARIOS[state.selectedScenario-1],mc=document.getElementById('mainContent');mc.innerHTML=`<div class="content-card" style="max-height:calc(100vh - 220px);overflow-y:auto;"><h2>${sc.emoji} ${sc.name}</h2><div id="passageText">${s[state.readingLevel]}</div></div>`;document.getElementById('mainAction').textContent='Continue to Watch';document.getElementById('mainAction').disabled=false;document.getElementById('readAloudBtn').style.display='inline-block';}
function showWatch(){state.currentStep=3;updateTabs();stopSpeak();const sc=SCENARIOS[state.selectedScenario-1],mc=document.getElementById('mainContent');mc.innerHTML=`<div class="content-card" style="padding:10px;"><h2 style="margin-bottom:6px;">${sc.emoji} ${sc.name} — Watch</h2><canvas id="watchCanvas" width="660" height="360"></canvas></div>`;document.getElementById('readAloudBtn').style.display='none';const btn=document.getElementById('mainAction');btn.textContent='Playing...';btn.disabled=true;try{runAnim(state.selectedScenario,()=>{btn.textContent='Record Data';btn.disabled=false;});}catch(e){btn.textContent='Record Data';btn.disabled=false;}}
function showRecord(){state.currentStep=4;updateTabs();const s=P[state.selectedScenario],sc=SCENARIOS[state.selectedScenario-1];const correct=state.predictions[state.selectedScenario]===s.cp;if(correct){state.score+=100;state.streak++;}else{state.streak=0;}state.completedScenarios.push(state.selectedScenario);state.data.push({scenario:sc.name,whatChanged:sc.whatChanged,response:s.resp,backToOK:s.ok});const mc=document.getElementById('mainContent');mc.innerHTML=`<div class="content-card" style="text-align:center;"><h2 style="color:#4ecca3;">✓ Data Recorded!</h2><p style="font-size:20px;margin:10px 0;">${correct?'🎯 Prediction correct! +100 points':'💡 The system works differently than expected.'}</p><p style="color:#a0a0c0;">${sc.name}: ${s.resp}</p>${state.completedScenarios.length===5?'<p style="color:#e94560;font-weight:700;font-size:18px;margin-top:12px;">✅ Required Complete! Continue for Extra Credit!</p>':''}${state.completedScenarios.length===8?'<p style="color:#FFD700;font-weight:700;font-size:20px;margin-top:12px;">🏆 Extra Credit Complete!</p>':''}</div>`;addDataRow(sc.name,sc.whatChanged,s.resp,s.ok);updateHUD();renderScenarios();flashComp();const btn=document.getElementById('mainAction');btn.textContent=state.completedScenarios.length>=8?'All Done!':'Pick Next Scenario';btn.disabled=state.completedScenarios.length>=8;document.getElementById('readAloudBtn').style.display='none';}

function handleAction(){initSpeech();if(state.currentStep===1)showRead();else if(state.currentStep===2)showWatch();else if(state.currentStep===3)showRecord();else if(state.currentStep===4){state.selectedScenario=null;state.currentStep=0;updateTabs();document.getElementById('mainContent').innerHTML=`<div class="content-card" style="text-align:center;margin-top:40px;"><h2>👈 Pick Your Next Scenario</h2><p>${8-state.completedScenarios.length} remaining.</p></div>`;document.getElementById('mainAction').textContent='Select a Scenario';document.getElementById('mainAction').disabled=true;renderScenarios();KWLIST.forEach(w=>{const el=document.getElementById('kw_'+w);if(el)el.className='kw';});}}
function handleReadAloud(){initSpeech();if(!speechReady)return;const el=document.getElementById('passageText');if(el)speak(el.innerHTML);}
function updateHUD(){document.getElementById('hudScore').textContent=state.score;document.getElementById('hudStreak').textContent=state.streak;const c=state.completedScenarios.length;document.getElementById('hudCompleted').textContent=c+'/8';const cp=state.data.filter((_,i)=>state.predictions[state.completedScenarios[i]]===P[state.completedScenarios[i]].cp).length;document.getElementById('hudAccuracy').textContent=c>0?Math.round(cp/c*100)+'%':'—';document.getElementById('progressBar').style.width=Math.min(c/5*100,100)+'%';const r=Math.max(5-c,0);document.getElementById('progressMsg').textContent=c>=8?'🏆 All 8 complete!':c>=5?'✅ Required done! '+(8-c)+' for extra credit.':'Pick '+r+' more you like!';}
function addDataRow(s,w,r,o){const tb=document.getElementById('dataBody'),tr=document.createElement('tr');tr.innerHTML=`<td>${s}</td><td>${w}</td><td>${r}</td><td>${o}</td>`;tb.appendChild(tr);}
function copyTable(){try{let t="Scenario\tWhat Changed?\tSystem Response\tBack Toward OK/Target?\n";state.data.forEach(d=>{t+=d.scenario+"\t"+d.whatChanged+"\t"+d.response+"\t"+d.backToOK+"\n";});navigator.clipboard.writeText(t).then(()=>{const b=document.getElementById('copyBtn');b.textContent='✅ Copied!';setTimeout(()=>b.textContent='📋 Copy Table',2000);});}catch(e){}}
function flashComp(){const d=document.createElement('div');d.className='completion-flash';document.body.appendChild(d);setTimeout(()=>d.remove(),1000);}
function resetSim(){if(animId){cancelAnimationFrame(animId);animId=null;}state={selectedScenario:null,readingLevel:'low',currentStep:0,completedScenarios:[],score:0,streak:0,predictions:{},data:[]};document.getElementById('dataBody').innerHTML='';updateHUD();renderScenarios();KWLIST.forEach(w=>{const el=document.getElementById('kw_'+w);if(el)el.className='kw';});document.querySelectorAll('.reading-tab').forEach(t=>{t.classList.remove('active');if(t.dataset.level==='low')t.classList.add('active');});document.getElementById('mainContent').innerHTML=`<div class="content-card" style="text-align:center;margin-top:40px;"><h2>👈 Pick a Scenario</h2><p>Choose any scenario from the left sidebar to start.</p></div>`;document.getElementById('mainAction').textContent='Select a Scenario';document.getElementById('mainAction').disabled=true;document.getElementById('readAloudBtn').style.display='none';updateTabs();}

// ===== DRAWING HELPERS =====
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function drawGauge(c,x,y,h,heat,label){
c.save();
c.fillStyle='#111';c.fillRect(x-10,y-2,20,h+4);
c.strokeStyle='#333';c.lineWidth=1;c.strokeRect(x-10,y-2,20,h+4);
const okT=y+h*0.35,okB=y+h*0.65;
c.fillStyle='rgba(78,204,163,0.15)';c.fillRect(x-10,okT,20,okB-okT);
c.strokeStyle='#4ecca3';c.lineWidth=1.5;c.beginPath();c.moveTo(x-10,okT);c.lineTo(x+10,okT);c.stroke();c.beginPath();c.moveTo(x-10,okB);c.lineTo(x+10,okB);c.stroke();
const fY=y+h*(1-heat);
const g=c.createLinearGradient(0,y,0,y+h);g.addColorStop(0,'#EF5350');g.addColorStop(0.35,'#FF7043');g.addColorStop(0.5,'#4ecca3');g.addColorStop(0.65,'#42A5F5');g.addColorStop(1,'#1565C0');
c.fillStyle=g;c.fillRect(x-7,fY,14,y+h-fY);
c.fillStyle='#fff';c.beginPath();c.moveTo(x+12,fY);c.lineTo(x+19,fY-5);c.lineTo(x+19,fY+5);c.fill();
c.font='bold 10px Segoe UI';c.fillStyle='#8a8';c.textAlign='center';c.fillText('OK',x,okT+(okB-okT)/2+4);
c.fillStyle='#aaa';c.fillText(label||'',x,y+h+16);
c.restore();
}
function drawArrow(c,x1,y1,x2,y2,color,w){
c.save();c.strokeStyle=color;c.lineWidth=w||2;c.lineCap='round';
c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
const a=Math.atan2(y2-y1,x2-x1);const hl=8;
c.fillStyle=color;c.beginPath();c.moveTo(x2,y2);c.lineTo(x2-hl*Math.cos(a-0.4),y2-hl*Math.sin(a-0.4));c.lineTo(x2-hl*Math.cos(a+0.4),y2-hl*Math.sin(a+0.4));c.fill();
c.restore();
}
function drawLabel(c,text,x,y,color,size){c.save();c.font=`bold ${size||13}px Segoe UI`;c.fillStyle=color||'#4ecca3';c.textAlign='center';c.textBaseline='middle';c.fillText(text,x,y);c.restore();}
function drawGlow(c,x,y,r,color){c.save();const g=c.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,color);g.addColorStop(1,'rgba(0,0,0,0)');c.fillStyle=g;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();c.restore();}
function particles(c,arr,frame){arr.forEach(p=>{const px=p.x+Math.sin(frame*p.sx+p.off)*p.dx;const py=p.y-((frame*p.speed+p.off*50)%p.range);const a=1-((frame*p.speed+p.off*50)%p.range)/p.range;c.fillStyle=p.color.replace('A)',a*0.8+')');c.beginPath();c.arc(px,py,p.r,0,Math.PI*2);c.fill();});}

// ===== ANIMATION ENGINE (FIXED — no nesting) =====
function runAnim(scenarioId, callback){
const canvas=document.getElementById('watchCanvas');
if(!canvas){callback();return;}
const c=canvas.getContext('2d');
const W=660,H=360;
animFrame=0;
const TOTAL=200;
const drawFn=DRAW_MAP[scenarioId];
if(!drawFn){callback();return;}
if(animId)cancelAnimationFrame(animId);
const safety=setTimeout(()=>{cancelAnimationFrame(animId);animId=null;callback();},9000);
function loop(){
try{drawFn(c,W,H,animFrame,TOTAL);}catch(e){}
animFrame++;
if(animFrame<TOTAL){animId=requestAnimationFrame(loop);}
else{clearTimeout(safety);animId=null;callback();}
}
animId=requestAnimationFrame(loop);
}

// ===== DRAW FUNCTIONS =====
function drawS1(c,W,H,f,T){
const p=f/T;c.clearRect(0,0,W,H);
// BG
const bg=c.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#2a0a0a');bg.addColorStop(1,'#0a0a1a');c.fillStyle=bg;c.fillRect(0,0,W,H);
// Fire glow
drawGlow(c,60,H/2,120,'rgba(255,100,0,0.3)');
// Flames
for(let i=0;i<20;i++){const fx=10+Math.random()*100,fy=30+Math.random()*(H-60),fs=8+Math.random()*18;const fl=Math.sin(f*0.3+i*2)*6;c.beginPath();c.arc(fx+fl,fy,fs,0,Math.PI*2);const r=200+Math.floor(Math.random()*55),g=Math.floor(Math.random()*80);c.fillStyle=`rgba(${r},${g},0,${0.3+Math.random()*0.5})`;c.fill();}
// Radiation arrows (wavy)
for(let i=0;i<6;i++){const ay=50+i*50;const fade=Math.max(0,1-p*2);c.save();c.strokeStyle=`rgba(255,${60+i*15},0,${fade})`;c.lineWidth=3;c.setLineDash([8,4]);c.beginPath();for(let x=120;x<320;x+=3)c.lineTo(x,ay+Math.sin(x*0.05+f*0.1)*6);c.stroke();c.setLineDash([]);c.restore();}
// Conduction arrows (straight, bottom)
for(let i=0;i<4;i++){const ax=140+i*40;const fade=Math.max(0,1-p*2);drawArrow(c,ax,H-40,ax+80,H-40,`rgba(255,150,50,${fade})`,2);}
// Firefighter cross-section
const bx=400,by=H/2;
// Outer gear
c.save();c.strokeStyle='#6D4C2F';c.lineWidth=35;c.shadowColor='rgba(0,0,0,0.5)';c.shadowBlur=10;c.beginPath();c.arc(bx,by,75,0,Math.PI*2);c.stroke();c.restore();
// Middle gear
c.strokeStyle='#555';c.lineWidth=25;c.beginPath();c.arc(bx,by,58,0,Math.PI*2);c.stroke();
// Air gap glow (insulator)
if(p>0.2){const ga=Math.min((p-0.2)*2.5,0.7);c.save();c.strokeStyle=`rgba(78,204,163,${ga})`;c.lineWidth=10;c.shadowColor=`rgba(78,204,163,${ga*0.5})`;c.shadowBlur=15;c.beginPath();c.arc(bx,by,66,0,Math.PI*2);c.stroke();c.restore();}
// Inner gear
c.strokeStyle='#444';c.lineWidth=12;c.beginPath();c.arc(bx,by,44,0,Math.PI*2);c.stroke();
// Body
const skinG=c.createRadialGradient(bx,by,0,bx,by,30);skinG.addColorStop(0,'#FFE0B2');skinG.addColorStop(1,'#FFD4A0');c.fillStyle=skinG;c.beginPath();c.arc(bx,by,30,0,Math.PI*2);c.fill();
// Body heat trapped (late)
if(p>0.7){const bha=Math.min((p-0.7)*3,0.5);drawGlow(c,bx,by,40,`rgba(255,150,50,${bha})`);}
// Labels
if(p>0.1){drawLabel(c,'radiation',130,25,'#FF7043',14);drawLabel(c,'conduction',130,H-20,'#FF9800',14);}
if(p>0.25){drawLabel(c,'insulator',bx,by+100,'#4ecca3',15);drawLabel(c,'air gaps',bx-80,by-85,'#4ecca3',12);}
if(p>0.5){const pulse=0.5+Math.sin(f*0.12)*0.4;c.globalAlpha=pulse;drawLabel(c,'conduction blocked',bx,by+120,'#4ecca3',14);c.globalAlpha=1;}
drawGauge(c,570,30,H-60,p>0.4?0.5:0.9-p*1,'Inside');
drawGauge(c,615,30,H-60,0.88,'Outside');
}

function drawS2(c,W,H,f,T){
const p=f/T;c.clearRect(0,0,W,H);
c.fillStyle='#12100e';c.fillRect(0,0,W,H);
// Tunnel arch
c.fillStyle='#2a2a2a';c.beginPath();c.moveTo(0,0);c.lineTo(W,0);c.lineTo(W,H);c.lineTo(0,H);c.fill();
c.fillStyle='#1a1a1a';c.beginPath();c.ellipse(W/2,0,W/2+20,100,0,0,Math.PI);c.fill();
// Platform
c.fillStyle='#555';c.fillRect(0,H-60,W,60);c.fillStyle='#666';c.fillRect(0,H-65,W,5);
// Yellow safety line
c.fillStyle='#FFD600';c.fillRect(0,H-68,W,3);
// Train exhaust particles
const exFade=Math.max(0,0.7-p*0.6);
for(let i=0;i<15;i++){const ex=40+i*42,ey=H-70-((f*1.5+i*30)%120);const ea=exFade*(1-((f*1.5+i*30)%120)/120);c.fillStyle=`rgba(255,${80+i*10},30,${ea})`;c.beginPath();c.arc(ex,ey,5+Math.sin(f*0.1+i)*3,0,Math.PI*2);c.fill();}
// "no ventilation" flash
if(p<0.25){const fa=0.6+Math.sin(f*0.15)*0.3;c.save();c.font='bold 18px Segoe UI';c.fillStyle=`rgba(233,69,96,${fa})`;c.textAlign='center';c.fillText('❌ no ventilation',W/2,80);c.restore();}
// Cold water panels
if(p>0.2){const pa=Math.min((p-0.2)*3,1);c.globalAlpha=pa;
for(let i=0;i<5;i++){const px=50+i*125,pw=40,ph=H-140;
const pg=c.createLinearGradient(px,70,px+pw,70);pg.addColorStop(0,'#1565C0');pg.addColorStop(1,'#42A5F5');
c.fillStyle=pg;rr(c,px,70,pw,ph,6);c.fill();c.strokeStyle='#64B5F6';c.lineWidth=1.5;rr(c,px,70,pw,ph,6);c.stroke();
// Water flow dots
for(let j=0;j<6;j++){const wy=70+((f*2+j*40+i*20)%ph);c.fillStyle='rgba(144,202,249,0.9)';c.beginPath();c.arc(px+pw/2,wy,3,0,Math.PI*2);c.fill();}
// Heat arrows into panel
if(p>0.35){const aa=Math.max(0,1-(p-0.35)*3);drawArrow(c,px-25,H/2,px,H/2,`rgba(255,100,50,${aa})`,2);}}
c.globalAlpha=1;
if(p>0.4)drawLabel(c,'conduction',W/2,H-40,'#42A5F5',14);
}
if(p>0.55){const ta=Math.min((p-0.55)*3,1);c.globalAlpha=ta;c.save();c.font='bold 22px Segoe UI';c.fillStyle='#4ecca3';c.textAlign='center';c.shadowColor='rgba(78,204,163,0.5)';c.shadowBlur=12;c.fillText('−27°F',W/2,H/2-10);c.restore();c.globalAlpha=1;}
drawGauge(c,610,30,H-60,Math.max(0.32,0.85-p*0.53),'Platform');
}

function drawS3(c,W,H,f,T){
const p=f/T;c.clearRect(0,0,W,H);
c.fillStyle='#080818';c.fillRect(0,0,W,H);
// Phone body with shadow
const px=W/2-55,py=30,pw=110,ph=240;
c.save();c.shadowColor='rgba(0,0,0,0.6)';c.shadowBlur=20;c.shadowOffsetY=5;c.fillStyle='#2a2a2a';rr(c,px-4,py-4,pw+8,ph+8,18);c.fill();c.restore();
c.fillStyle='#1a1a1a';rr(c,px,py,pw,ph,14);c.fill();
// Screen
const heat=p<0.4?p/0.4:Math.max(0.15,1-(p-0.4)/0.6*0.85);
const sg=c.createLinearGradient(px,py,px,py+ph);sg.addColorStop(0,`rgba(${Math.floor(60+heat*180)},${Math.floor(180-heat*140)},${Math.floor(200-heat*180)},0.25)`);sg.addColorStop(1,`rgba(${Math.floor(60+heat*180)},${Math.floor(100-heat*60)},${Math.floor(150-heat*130)},0.15)`);
c.fillStyle=sg;rr(c,px+6,py+25,pw-12,ph-50,8);c.fill();
// Chip (center of phone)
const cx=W/2-12,cy=py+ph/2-12;
