   TOP BAR & VAULT
   ============================================================ */
function renderTopBar() {
  const bar = $('topBar');
  bar.style.display = 'flex';
  $('codeVault').style.display = 'block';
  $('missionLine').style.display = 'block';
  $('bottomBar').style.display = 'flex';

  const room = ROOMS[state.currentRoom - 1];
  if (room) {
    $('roomTag').textContent = room.emoji + ' ' + room.name.toUpperCase();
    $('roomProgress').textContent = 'Room ' + state.currentRoom + ' of 3';
    $('missionLine').textContent = room.mission;
  }
  updatePuzzlesCleared();
  updateStreak();
  renderProgressDots();
  renderVault();
}

function updatePuzzlesCleared(pulse) {
  const el = $('pcCounter');
  el.textContent = 'Puzzles Cleared: ' + state.puzzlesCleared + '/6';
  if (pulse) {
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }
}

function updateStreak() {
  const el = $('streak');
  if (state.streak >= 2) el.classList.add('active');
  else el.classList.remove('active');
}

function renderProgressDots() {
  const el = $('progressDots');
  if (!el) return;
  let html = '';
  for (let i = 0; i < 2; i++) {
    const cls = (i < state.currentPuzzle) ? 'pdot solved' : 'pdot';
    html += '<div class="' + cls + '"></div>';
  }
  el.innerHTML = html;
}

function renderVault() {
  const el = $('vaultRooms');
  if (!el) return;
  const colors = { r1: '#8b5cf6', r2: '#ef4444', r3: '#10b981' };
  const labels = { r1: 'R1', r2: 'R2', r3: 'R3' };
  let html = '';
  ['r1','r2','r3'].forEach(rk => {
    const digits = state.digits[rk];
    let dh = '';
    digits.forEach(d => {
      if (d === '?') dh += '<div class="vault-digit">?</div>';
      else dh += '<div class="vault-digit revealed" style="--vault-room-color:' + colors[rk] + '">' + d + '</div>';
    });
    html += '<div class="vault-room"><div class="vault-room-label" style="color:' + colors[rk] + '">' + labels[rk] + '</div><div class="vault-digits">' + dh + '</div></div>';
  });
  el.innerHTML = html;
}

function updateVaultDigit(roomKey, idx, digit) {
  state.digits[roomKey][idx] = digit;
  renderVault();
}

/* ============================================================
   GAME FLOW
   ============================================================ */
function startGame() {
  state.startTime = Date.now();
  state.currentRoom = 0;
  state.currentPuzzle = 0;
  $('startScreen').remove();
  // Tutorial first
  setRoomTheme('#14b8a6', '#5eead4', 'rgba(20,184,166,0.5)');
  showTutorial();
}

function showTutorial() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <button class="skip-tutorial" id="skipTutBtn">SKIP TUTORIAL →</button>
    <div class="overlay-card" style="border-color:#14b8a6; box-shadow:0 0 30px rgba(20,184,166,0.5);">
      <h2 style="color:#5eead4;">🔓 TUTORIAL LOCK</h2>
      <p style="color:#a0a0c8;">Tap a word on the LEFT, then tap its match on the RIGHT.</p>
      <div id="tutContent"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const tutPairs = [
    { term: '☀️ Sun', options: ['🔥 Hot', '❄️ Cold'], correctIdx: 0 },
    { term: '🧊 Ice', options: ['🔥 Hot', '❄️ Cold'], correctIdx: 1 }
  ];
  let pairIdx = 0;
  let tutSkipped = false;

  function renderTutPair() {
    if (tutSkipped) return;
    if (pairIdx >= tutPairs.length) {
      finishTutorial();
      return;
    }
    const p = tutPairs[pairIdx];
    const tc = document.getElementById('tutContent');
    if (!tc) return;
    tc.innerHTML = `
      <div style="margin:14px 0; font-size:14px; color:#5eead4; letter-spacing:0.1em;">PAIR ${pairIdx+1} OF ${tutPairs.length}</div>
      <div class="match-row" style="grid-template-columns:1fr auto 1fr; gap:14px;">
        <div class="match-term" style="border-color:#14b8a6; box-shadow:0 0 14px rgba(20,184,166,0.5); font-size:24px;">${p.term}</div>
        <div class="match-arrow">→</div>
        <div class="match-options">
          ${p.options.map((opt, i) => `<button class="match-option tut-opt" data-correct="${i === p.correctIdx}">${opt}</button>`).join('')}
        </div>
      </div>
    `;
    tc.querySelectorAll('.tut-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        if (tutSkipped) return;
        if (btn.dataset.correct === 'true') {
          btn.classList.add('correct');
          spawnParticles(btn);
          safeTimeout(() => { pairIdx++; renderTutPair(); }, 700);
        } else {
          btn.classList.add('wrong');
          safeTimeout(() => btn.classList.remove('wrong'), 500);
        }
      });
    });
  }

  function finishTutorial() {
    if (tutSkipped) return;
    tutSkipped = true;
    closeAllOverlays();
    enterRoom(1);
  }

  document.getElementById('skipTutBtn').addEventListener('click', () => {
    tutSkipped = true;
    clearAllPendingTimers();
    closeAllOverlays();
    enterRoom(1);
  });

  renderTutPair();
}

function enterRoom(roomNum) {
  state.currentRoom = roomNum;
  state.currentPuzzle = 0;
  const room = ROOMS[roomNum - 1];
  setRoomTheme(room.color, room.accent, room.glow);

  // Door transition
  doorTransition(room.color, () => {
    renderTopBar();
    loadPuzzle();
  });
}

function doorTransition(themeColor, callback) {
  // Single overlay, single keyframe, animationend cleanup, safety timeout
  const overlay = document.createElement('div');
  overlay.className = 'overlay door-overlay';
  overlay.style.setProperty('--room-color', themeColor);
  overlay.innerHTML = `
    <div class="door-silhouette">
      <div class="door-lock-icon">🔒</div>
    </div>
  `;
  document.body.appendChild(overlay);

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    if (overlay.parentNode) overlay.remove();
    try { callback(); } catch(e) { console.error('door cb err', e); }
  };
  overlay.addEventListener('animationend', finish);
  // Safety: 2 seconds max
  safeTimeout(finish, 2000);
}

function finalDoorTransition(callback) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay door-overlay final-door';
  overlay.style.setProperty('--room-color', '#fbbf24');
  overlay.innerHTML = `
    <div class="door-silhouette" style="border-color:#fbbf24;">
      <div class="door-final-text">FINAL LOCK</div>
      <div class="door-lock-icon">🔐</div>
    </div>
  `;
  document.body.appendChild(overlay);
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    if (overlay.parentNode) overlay.remove();
    try { callback(); } catch(e) { console.error(e); }
  };
  overlay.addEventListener('animationend', finish);
  safeTimeout(finish, 2500);
}

function loadPuzzle() {
  // Reset puzzle state
  state.puzzleWrongCount = 0;
  state.puzzleSolving = false;
  state.overrideTriggered = false;
  state.scannerActivated = false;
  state.qfCumulativeWrong = 0;

  const room = ROOMS[state.currentRoom - 1];
  const puzzle = room.puzzles[state.currentPuzzle];
  state.currentPuzzleObj = puzzle;

  renderTopBar();
  closeAllOverlays();

  // Show scan preview, then puzzle
  showScanPreview(puzzle, () => {
    renderPuzzleByType(puzzle);
  });
}

function showScanPreview(puzzle, callback) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay scan-preview';
  overlay.innerHTML = `
    <div class="scan-preview-inner">
      <div class="scan-preview-label">⊙ SCANNING ROOM...</div>
      <div class="scan-preview-art">${puzzle.scanArt || '🔍'}</div>
      <div class="scan-preview-caption">${puzzle.scanCaption || ''}</div>
    </div>
  `;
  document.body.appendChild(overlay);

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    if (overlay.parentNode) overlay.remove();
    try { callback(); } catch(e) { console.error('preview cb err', e); }
  };
  safeTimeout(finish, 2000);
  // Safety:
  safeTimeout(finish, 5000);
}

function renderPuzzleByType(puzzle) {
  try {
    closeAllOverlays();
    switch(puzzle.type) {
      case 'matchLock': renderMatchLock(puzzle); break;
      case 'mysteryInput': renderMysteryInput(puzzle); break;
      case 'systemScanner': renderSystemScanner(puzzle); break;
      case 'sequenceLock': renderSequenceLock(puzzle); break;
      case 'spotDifference': renderSpotDifference(puzzle); break;
      case 'quickFire': renderQuickFire(puzzle); break;
      default:
        $('puzzleArea').innerHTML = '<div>Unknown puzzle type</div>';
    }
  } catch(e) {
    console.error('Puzzle render error:', e);
    $('puzzleArea').innerHTML = `
      <div class="puzzle-content" style="text-align:center;">
        <div style="font-size:22px; margin-bottom:14px;">Something went wrong — click to retry this puzzle</div>
        <button class="overlay-btn" id="retryPuzzleBtn">RETRY</button>
      </div>
    `;
    const r = document.getElementById('retryPuzzleBtn');
    if (r) r.addEventListener('click', loadPuzzle);
  }
}

/* ============================================================
   PUZZLE: MATCH LOCK (chunked, one pair at a time)
   ============================================================ */
function renderMatchLock(puzzle) {
  let pairIdx = 0;

  function showPair() {
    if (pairIdx >= puzzle.pairs.length) {
      puzzleSolved(puzzle);
      return;
    }
    const pair = puzzle.pairs[pairIdx];
    // per-pair tracking
    let pairWrongCount = 0;
    let pairOverrideTriggered = false;
    const pairWrongPicks = new Set();

    function renderPairUI(narrowed) {
      const pa = $('puzzleArea');
      const optsHtml = pair.options.map((opt, i) => {
        let cls = 'match-option';
        if (pairWrongPicks.has(i)) cls += ' dimmed';
        if (narrowed && !narrowed.includes(i) && !pairWrongPicks.has(i)) cls += ' dimmed';
        return `<button class="${cls}" data-idx="${i}" data-correct="${i === pair.correctIdx}">${opt}</button>`;
      }).join('');

      pa.innerHTML = `
        <div class="puzzle-content">
          <div class="puzzle-instruction">👆 Tap a word on the LEFT, then tap its match on the RIGHT.</div>
          <div class="step-progress">Pair ${pairIdx + 1} of ${puzzle.pairs.length}</div>
          <div class="match-row">
            <div class="match-term">${pair.term}</div>
            <div class="match-arrow">→</div>
            <div class="match-options">${optsHtml}</div>
          </div>
        </div>
      `;
      wireMatchOptions();
    }

    function wireMatchOptions() {
      let pairLocked = false;
      $('puzzleArea').querySelectorAll('.match-option').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.puzzleSolving) return;
          if (pairLocked) return;
          if (btn.classList.contains('dimmed')) return;
          const isCorrect = btn.dataset.correct === 'true';
          const idx = parseInt(btn.dataset.idx, 10);
          if (isCorrect) {
            pairLocked = true;
            btn.classList.add('correct');
            spawnParticles(btn);
            safeTimeout(() => {
              pairIdx++;
              showPair();
            }, 700);
          } else {
            handleMatchPairWrong(idx, btn);
          }
        });
      });
    }

    function handleMatchPairWrong(idx, btn) {
      btn.classList.add('wrong');
      pairWrongPicks.add(idx);
      pairWrongCount++;
      state.puzzleWrongCount++;

      if (pairWrongCount === 1) {
        // Scanner auto-activate + narrow
        state.scannerActivated = true;
        state.scannerUsedInRoom['r' + state.currentRoom] = true;
        showScannerOverlay(pair.scannerClue, () => {
          renderPairUI(pair.narrowKeep);
        });
      } else if (pairWrongCount >= 2 && !pairOverrideTriggered) {
        pairOverrideTriggered = true;
        // Override: highlight correct, student taps to confirm
        renderPairUI(null);
        safeTimeout(() => {
          const opts = $('puzzleArea').querySelectorAll('.match-option');
          opts.forEach(o => {
            if (o.dataset.correct === 'true') {
              o.classList.add('override-target');
              o.classList.remove('dimmed');
            } else if (!o.classList.contains('dimmed')) {
              o.classList.add('dimmed');
            }
          });
          const banner = document.createElement('div');
          banner.className = 'override-label';
          banner.textContent = '⚡ Scanner locked on — tap to confirm';
          $('puzzleArea').querySelector('.puzzle-content').insertBefore(banner, $('puzzleArea').querySelector('.match-row'));
        }, 200);
      } else {
        // shake bounce-back
        safeTimeout(() => btn.classList.add('dimmed'), 400);
      }
    }

    renderPairUI(null);
  }

  showPair();
}

/* ============================================================
   PUZZLE: MYSTERY INPUT
   ============================================================ */
function renderMysteryInput(puzzle) {
  const wrongPicks = new Set();

  function renderUI(narrowed) {
    const chainHtml = puzzle.chain.map((box, i) => {
      let cls = 'mi-box' + (box.isUnknown ? ' unknown' : '');
      const arrow = (i < puzzle.chain.length - 1) ? '<div class="mi-arrow">↓</div>' : '';
      return `<div class="${cls}" data-chain-idx="${i}">${box.text}</div>${arrow}`;
    }).join('');

    const optsHtml = puzzle.options.map((opt, i) => {
      let cls = 'answer-card';
      if (wrongPicks.has(i)) cls += ' dimmed';
      if (narrowed && !narrowed.includes(i) && !wrongPicks.has(i)) cls += ' dimmed';
      return `<button class="${cls}" data-idx="${i}" data-correct="${i === puzzle.correctIdx}">${opt}</button>`;
    }).join('');

    $('puzzleArea').innerHTML = `
      <div class="puzzle-content">
        <div class="mi-title">${puzzle.title}</div>
        <div class="mi-chain">${chainHtml}</div>
        <div class="puzzle-instruction">Fill in the missing piece.</div>
        <div class="answer-grid">${optsHtml}</div>
      </div>
    `;

    let answerLocked = false;
    $('puzzleArea').querySelectorAll('.answer-card').forEach(btn => {
      btn.addEventListener('click', () => {
        if (state.puzzleSolving) return;
        if (answerLocked) return;
        if (btn.classList.contains('dimmed')) return;
        const isCorrect = btn.dataset.correct === 'true';
        const idx = parseInt(btn.dataset.idx, 10);
        if (isCorrect) {
          answerLocked = true;
          btn.classList.add('correct');
          // Fill the unknown box
          const unknownBox = $('puzzleArea').querySelector('.mi-box.unknown');
          if (unknownBox) {
            unknownBox.classList.remove('unknown');
            unknownBox.classList.add('filled');
            unknownBox.textContent = puzzle.options[idx];
          }
          spawnParticles(btn);
          safeTimeout(() => puzzleSolved(puzzle), 1000);
        } else {
          btn.classList.add('wrong');
          wrongPicks.add(idx);
          state.puzzleWrongCount++;
          if (state.puzzleWrongCount === 1) {
            state.scannerActivated = true;
            state.scannerUsedInRoom['r' + state.currentRoom] = true;
            showScannerOverlay(puzzle.scannerClue, () => renderUI(puzzle.narrowKeep));
          } else if (state.puzzleWrongCount >= 2 && !state.overrideTriggered) {
            state.overrideTriggered = true;
            answerLocked = true;
            renderUI(null);
            safeTimeout(() => {
              const opts = $('puzzleArea').querySelectorAll('.answer-card');
              opts.forEach(o => {
                if (o.dataset.correct === 'true') {
                  o.classList.add('override-target');
                  o.classList.remove('dimmed');
                } else if (!o.classList.contains('dimmed')) {
                  o.classList.add('dimmed');
                }
              });
              const banner = document.createElement('div');
              banner.className = 'override-label';
              banner.textContent = '⚡ Scanner locked on — tap to confirm';
              const pc = $('puzzleArea').querySelector('.puzzle-content');
              pc.insertBefore(banner, pc.querySelector('.answer-grid'));
            }, 200);
          }
        }
      });
    });
  }

  renderUI(null);
}

/* ============================================================
   PUZZLE: SYSTEM SCANNER (gauges)
   ============================================================ */
function renderSystemScanner(puzzle) {
  const wrongPicks = new Set();

  function renderUI(narrowed) {
    const gaugesHtml = puzzle.gauges.map(g => {
      let inner = '';
      if (g.state === 'high') inner = '<div class="gauge-fill high"></div>';
      else if (g.state === 'low') inner = '<div class="gauge-fill low"></div>';
      else if (g.state === 'unknown') inner = '<div class="gauge-ok-band"></div><div class="gauge-needle">❓</div>';
      return `
        <div class="gauge">
          <div class="gauge-label">${g.label}</div>
          <div class="gauge-bar">${inner}</div>
          <div class="gauge-status">${g.status}</div>
        </div>
      `;
    }).join('');

    const optsHtml = puzzle.options.map((opt, i) => {
      let cls = 'answer-card';
      if (wrongPicks.has(i)) cls += ' dimmed';
      if (narrowed && !narrowed.includes(i) && !wrongPicks.has(i)) cls += ' dimmed';
      return `<button class="${cls}" data-idx="${i}" data-correct="${i === puzzle.correctIdx}">${opt}</button>`;
    }).join('');

    $('puzzleArea').innerHTML = `
      <div class="puzzle-content">
        <div class="gauges">${gaugesHtml}</div>
        <div class="question-text">${puzzle.question}</div>
        <div class="answer-grid">${optsHtml}</div>
      </div>
    `;

    let answerLocked = false;
    $('puzzleArea').querySelectorAll('.answer-card').forEach(btn => {
      btn.addEventListener('click', () => {
        if (state.puzzleSolving) return;
        if (answerLocked) return;
        if (btn.classList.contains('dimmed')) return;
        const isCorrect = btn.dataset.correct === 'true';
        const idx = parseInt(btn.dataset.idx, 10);
        if (isCorrect) {
          answerLocked = true;
          btn.classList.add('correct');
          spawnParticles(btn);
          safeTimeout(() => puzzleSolved(puzzle), 900);
        } else {
          btn.classList.add('wrong');
          wrongPicks.add(idx);
          state.puzzleWrongCount++;
          if (state.puzzleWrongCount === 1) {
            state.scannerActivated = true;
            state.scannerUsedInRoom['r' + state.currentRoom] = true;
            showScannerOverlay(puzzle.scannerClue, () => renderUI(puzzle.narrowKeep));
          } else if (state.puzzleWrongCount >= 2 && !state.overrideTriggered) {
            state.overrideTriggered = true;
            answerLocked = true;
            renderUI(null);
            safeTimeout(() => triggerOverrideAnswerCard(), 200);
          }
        }
      });
    });
  }

  function triggerOverrideAnswerCard() {
    const opts = $('puzzleArea').querySelectorAll('.answer-card');
    opts.forEach(o => {
      if (o.dataset.correct === 'true') {
        o.classList.add('override-target');
        o.classList.remove('dimmed');
      } else if (!o.classList.contains('dimmed')) {
        o.classList.add('dimmed');
      }
    });
    const banner = document.createElement('div');
    banner.className = 'override-label';
    banner.textContent = '⚡ Scanner locked on — tap to confirm';
    const pc = $('puzzleArea').querySelector('.puzzle-content');
    pc.insertBefore(banner, pc.querySelector('.answer-grid'));
  }

  renderUI(null);
}

/* ============================================================
   PUZZLE: SEQUENCE LOCK (guided pick)
   ============================================================ */
function renderSequenceLock(puzzle) {
  // step 0,1,2 — at step 2 last card auto-places
  const placed = []; // array of card original indices in order
  const remaining = puzzle.cards.map((_, i) => i);

  function renderUI(stepWrongPicks, narrowed) {
    stepWrongPicks = stepWrongPicks || new Set();
    const stepIdx = placed.length;

    // Build slots
    let slotsHtml = '';
    for (let s = 0; s < puzzle.cards.length; s++) {
      const isFilled = s < placed.length;
      const arrow = (s < puzzle.cards.length - 1) ? '<div class="seq-arrow">→</div>' : '';
      let inner = '';
      if (isFilled) inner = puzzle.cards[placed[s]];
      else inner = (s === stepIdx ? 'NEXT?' : '—');
      slotsHtml += `<div class="seq-slot ${isFilled ? 'filled' : ''}"><div class="seq-slot-num">${s+1}</div>${inner}</div>${arrow}`;
    }

    // Build remaining cards
    let cardsHtml = '';
    if (stepIdx < puzzle.cards.length) {
      cardsHtml = remaining.map(idx => {
        let cls = 'seq-card';
        if (stepWrongPicks.has(idx)) cls += ' dimmed';
        if (narrowed && !narrowed.includes(idx) && !stepWrongPicks.has(idx)) cls += ' dimmed';
        return `<button class="${cls}" data-idx="${idx}" data-correct="${idx === puzzle.correctOrder[stepIdx]}">${puzzle.cards[idx]}</button>`;
      }).join('');
    }

    const prompt = (stepIdx < puzzle.cards.length) ? puzzle.prompts[stepIdx] : 'Complete!';
    const stepLabel = (stepIdx < puzzle.cards.length) ? `Step ${stepIdx+1} of ${puzzle.cards.length}` : 'COMPLETE';

    $('puzzleArea').innerHTML = `
      <div class="puzzle-content">
        <div class="step-progress">${stepLabel}</div>
        <div class="seq-zone">${slotsHtml}</div>
        <div class="puzzle-instruction">${prompt}</div>
        <div class="seq-cards">${cardsHtml}</div>
      </div>
    `;

    let stepLocked = false;
    $('puzzleArea').querySelectorAll('.seq-card').forEach(btn => {
      btn.addEventListener('click', () => {
        if (state.puzzleSolving) return;
        if (stepLocked) return;
        if (btn.classList.contains('dimmed')) return;
        const idx = parseInt(btn.dataset.idx, 10);
        const isCorrect = btn.dataset.correct === 'true';
        if (isCorrect) {
          stepLocked = true;
          btn.classList.add('correct');
          spawnParticles(btn);
          safeTimeout(() => {
            placed.push(idx);
            const remIdx = remaining.indexOf(idx);
            if (remIdx > -1) remaining.splice(remIdx, 1);
            advanceStep();
          }, 600);
        } else {
          handleSeqStepWrong(idx, btn, stepWrongPicks);
        }
      });
    });
  }

  function handleSeqStepWrong(idx, btn, stepWrongPicks) {
    btn.classList.add('wrong');
    stepWrongPicks.add(idx);
    state.puzzleWrongCount++;
    const stepIdx = placed.length;
    const stepWrongCount = stepWrongPicks.size;

    if (stepWrongCount === 1) {
      state.scannerActivated = true;
      state.scannerUsedInRoom['r' + state.currentRoom] = true;
      const narrowKeep = puzzle.narrowKeep && puzzle.narrowKeep[stepIdx] ? puzzle.narrowKeep[stepIdx] : null;
      showScannerOverlay(puzzle.scannerClue, () => renderUI(stepWrongPicks, narrowKeep));
    } else if (stepWrongCount >= 2 && !state.overrideTriggered) {
      state.overrideTriggered = true;
      // Auto-solve cascade for sequence lock
      autoSolveCascade();
    }
  }

  function autoSolveCascade() {
    // place remaining cards in correct order one by one
    let stepIdx = placed.length;
    const banner = document.createElement('div');
    banner.className = 'override-label';
    banner.textContent = '⚡ Lock override — Resolving...';

    function step() {
      if (stepIdx >= puzzle.cards.length) {
        // Done — show all slots filled then puzzleSolved
        renderFrameOnly();
        safeTimeout(() => puzzleSolved(puzzle), 700);
        return;
      }
      const correctIdx = puzzle.correctOrder[stepIdx];
      placed.push(correctIdx);
      const remIdx = remaining.indexOf(correctIdx);
      if (remIdx > -1) remaining.splice(remIdx, 1);
      renderFrameOnly();
      stepIdx++;
      safeTimeout(step, 600);
    }

    function renderFrameOnly() {
      // Non-interactive frame
      let slotsHtml = '';
      for (let s = 0; s < puzzle.cards.length; s++) {
        const isFilled = s < placed.length;
        const arrow = (s < puzzle.cards.length - 1) ? '<div class="seq-arrow">→</div>' : '';
        let inner = '';
        if (isFilled) inner = puzzle.cards[placed[s]];
        else inner = '—';
        slotsHtml += `<div class="seq-slot ${isFilled ? 'filled' : ''}"><div class="seq-slot-num">${s+1}</div>${inner}</div>${arrow}`;
      }
      $('puzzleArea').innerHTML = `
        <div class="puzzle-content">
          <div class="override-label">⚡ Lock Override — Resolving...</div>
          <div class="seq-zone">${slotsHtml}</div>
        </div>
      `;
    }

    step();
  }

  function advanceStep() {
    if (placed.length >= puzzle.cards.length) {
      // All done — but wait, last card should auto-place if step 3 is reached with 1 remaining
      puzzleSolved(puzzle);
      return;
    }
    if (placed.length === puzzle.cards.length - 1) {
      // Auto-place last card
      const lastIdx = remaining[0];
      placed.push(lastIdx);
      remaining.splice(0, 1);
      // render with all filled briefly
      let slotsHtml = '';
      for (let s = 0; s < puzzle.cards.length; s++) {
        const arrow = (s < puzzle.cards.length - 1) ? '<div class="seq-arrow">→</div>' : '';
        slotsHtml += `<div class="seq-slot filled"><div class="seq-slot-num">${s+1}</div>${puzzle.cards[placed[s]]}</div>${arrow}`;
      }
      $('puzzleArea').innerHTML = `
        <div class="puzzle-content">
          <div class="step-progress">COMPLETE</div>
          <div class="seq-zone">${slotsHtml}</div>
        </div>
      `;
      safeTimeout(() => puzzleSolved(puzzle), 700);
      return;
    }
    renderUI(new Set(), null);
  }

  renderUI(new Set(), null);
}

/* ============================================================
   PUZZLE: SPOT THE DIFFERENCE
   ============================================================ */
function renderSpotDifference(puzzle) {
  let wrongCount = 0;
  const wrongTaps = new Set(); // 'left-0', 'right-2' style

  function renderUI(narrowToMedicine) {
    function tapEl(side, idx, label) {
      const key = side + '-' + idx;
      let cls = 'stf-tap';
      if (wrongTaps.has(key)) cls += ' dimmed';
      // narrow scanner: only medicine elements remain interactive
      if (narrowToMedicine && idx !== 2) cls += ' scanner-dim';
      const isCorrect = (side === puzzle.correctSide && idx === puzzle.correctIdx);
      return `<button class="${cls}" data-side="${side}" data-idx="${idx}" data-correct="${isCorrect}">${label}</button>`;
    }

    function flowFor(side, loop) {
      // 4 elements: gland, effect, medicine, OK Zone (static)
      return [
        tapEl(side, 0, loop[0]),
        '<div class="stf-arrow">→</div>',
        tapEl(side, 1, loop[1]),
        '<div class="stf-arrow">→</div>',
        tapEl(side, 2, loop[2]),
        '<div class="stf-arrow">→</div>',
        '<div class="stf-static">' + loop[3] + '</div>'
      ].join('');
    }

    $('puzzleArea').innerHTML = `
      <div class="puzzle-content">
        <div class="puzzle-instruction">Find the ONE element that's wrong in the right loop. Tap it.</div>
        <div class="stf-loops">
          <div class="stf-loop">
            <div class="stf-loop-title">CORRECT LOOP</div>
            <div class="stf-flow">${flowFor('left', puzzle.leftLoop)}</div>
          </div>
          <div class="stf-loop" style="border-color:var(--bad); box-shadow:0 0 14px rgba(239,68,68,0.4);">
            <div class="stf-loop-title" style="color:#fca5a5;">CHECK THIS LOOP</div>
            <div class="stf-flow">${flowFor('right', puzzle.rightLoop)}</div>
          </div>
        </div>
      </div>
    `;

    let stfLocked = false;
    $('puzzleArea').querySelectorAll('.stf-tap').forEach(btn => {
      btn.addEventListener('click', () => {
        if (state.puzzleSolving) return;
        if (stfLocked) return;
        if (btn.classList.contains('dimmed') || btn.classList.contains('scanner-dim')) return;
        const isCorrect = btn.dataset.correct === 'true';
        if (isCorrect) {
          stfLocked = true;
          btn.classList.add('found-error');
          // Show correct version overlay
          safeTimeout(() => {
            btn.classList.remove('found-error');
            btn.classList.add('show-correct');
            btn.textContent = '💊 BLOCKS ✔';
            spawnParticles(btn);
            safeTimeout(() => puzzleSolved(puzzle), 900);
          }, 700);
        } else {
          btn.classList.add('wrong');
          const key = btn.dataset.side + '-' + btn.dataset.idx;
          wrongTaps.add(key);
          wrongCount++;
          state.puzzleWrongCount++;
          if (wrongCount === 1) {
            state.scannerActivated = true;
            state.scannerUsedInRoom['r' + state.currentRoom] = true;
            showScannerOverlay(puzzle.scannerClue, () => renderUI(true));
          } else if (wrongCount >= 2 && !state.overrideTriggered) {
            state.overrideTriggered = true;
            stfLocked = true;
            renderUI(true);
            safeTimeout(() => {
              const opts = $('puzzleArea').querySelectorAll('.stf-tap');
              opts.forEach(o => {
                if (o.dataset.correct === 'true') {
                  o.classList.add('override-target');
                  o.classList.remove('dimmed');
                  o.classList.remove('scanner-dim');
                } else {
                  o.classList.add('dimmed');
                }
              });
              const banner = document.createElement('div');
              banner.className = 'override-label';
              banner.textContent = '⚡ Scanner locked on — tap to confirm';
              const pc = $('puzzleArea').querySelector('.puzzle-content');
              pc.insertBefore(banner, pc.querySelector('.stf-loops'));
            }, 200);
          }
        }
      });
    });
  }

  renderUI(false);
}

/* ============================================================
   PUZZLE: QUICK FIRE (inline hints, no scanner overlay)
   ============================================================ */
function renderQuickFire(puzzle) {
  const status = puzzle.questions.map(() => 'unanswered'); // 'correct'|'wrong'|'unanswered'
  let currentQ = 0;
  let inFlight = false;

  function dotsHtml() {
    return status.map(s => {
      if (s === 'correct') return '<span class="qf-dot correct">✔</span>';
      if (s === 'wrong') return '<span class="qf-dot wrong">✖</span>';
      return '<span class="qf-dot"></span>';
    }).join('');
  }

  function findNextUnanswered(start) {
    for (let i = start; i < status.length; i++) {
      if (status[i] !== 'correct') return i;
    }
    return -1;
  }

  function showQuestion() {
    if (state.puzzleSolving) return;
    if (currentQ < 0 || currentQ >= status.length) {
      checkPhaseComplete();
      return;
    }
    if (status[currentQ] === 'correct') {
      currentQ++;
      showQuestion();
      return;
    }
    inFlight = false;
    const q = puzzle.questions[currentQ];
    const isRetry = status[currentQ] === 'wrong';

    const correctCount = status.filter(s => s === 'correct').length;
    const totalAnswered = status.filter(s => s !== 'unanswered').length;

    let retryBanner = '';
    if (isRetry) {
      retryBanner = '<div class="qf-retry-banner">🔄 Retry — give this one another shot</div>';
    }

    $('puzzleArea').innerHTML = `
      <div class="puzzle-content">
        <div class="qf-header">SIGNAL CHECK INCOMING</div>
        <div class="qf-progress">${dotsHtml()}</div>
        ${retryBanner}
        <div class="qf-question">${q.text}</div>
        <div id="qfHintSlot"></div>
        <div class="qf-buttons">
          <button class="qf-btn confirm" data-answer="CONFIRM">✅ CONFIRM</button>
          <button class="qf-btn deny" data-answer="DENY">❌ DENY</button>
        </div>
      </div>
    `;

    $('puzzleArea').querySelectorAll('.qf-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (state.puzzleSolving || inFlight) return;
        inFlight = true;
        const isCorrect = btn.dataset.answer === q.correct;

        if (isCorrect) {
          btn.classList.add('correct');
          status[currentQ] = 'correct';
          spawnParticles(btn);
          safeTimeout(() => {
            currentQ++;
            const nx = findNextUnanswered(currentQ);
            if (nx === -1) checkPhaseComplete();
            else { currentQ = nx; showQuestion(); }
          }, 600);
        } else {
          btn.classList.add('wrong');
          status[currentQ] = 'wrong';
          state.qfCumulativeWrong++;
          state.puzzleWrongCount++;
          state.scannerActivated = true;
          state.scannerUsedInRoom['r' + state.currentRoom] = true;

          if (state.qfCumulativeWrong >= 5 && !state.overrideTriggered) {
            state.overrideTriggered = true;
            // Mark remaining as correct, override
            for (let i = 0; i < status.length; i++) {
              if (status[i] !== 'correct') status[i] = 'correct';
            }
            $('puzzleArea').innerHTML = `
              <div class="puzzle-content" style="text-align:center;">
                <div class="override-label" style="font-size:18px; margin-bottom:14px;">⚡ Scanner override engaged ⚡</div>
                <div class="qf-progress">${dotsHtml()}</div>
                <div style="margin-top:18px; font-size:18px; color:var(--text-dim);">Resolving remaining signals...</div>
              </div>
            `;
            safeTimeout(() => puzzleSolved(puzzle), 1500);
            return;
          }

          // Show inline hint
          const hintSlot = $('qfHintSlot') || document.getElementById('qfHintSlot');
          if (hintSlot) {
            hintSlot.innerHTML = '<div class="qf-hint">🔍 ' + q.hint + '</div>';
          }

          safeTimeout(() => {
            currentQ++;
            const nx = findNextUnanswered(currentQ);
            if (nx === -1) checkPhaseComplete();
            else { currentQ = nx; showQuestion(); }
          }, 1100);
        }
      });
    });
  }

  function checkPhaseComplete() {
    const correctCount = status.filter(s => s === 'correct').length;
    if (correctCount >= 3) {
      puzzleSolved(puzzle);
    } else {
      // Retry phase: re-attempt wrong questions
      const firstWrong = status.indexOf('wrong');
      if (firstWrong === -1) {
        // safety
        puzzleSolved(puzzle);
        return;
      }
      currentQ = firstWrong;
      showQuestion();
    }
  }

  // Hide scanner button during QF (not used; inline hints instead)
  // But we also disable its action since QF uses inline hints.
  // Keep it visible for consistency but make it show a friendly note.

  showQuestion();
}

/* ============================================================
   SCANNER OVERLAY
   ============================================================ */
function showScannerOverlay(clueText, callback) {
  closeScanner();
  const overlay = document.createElement('div');
  overlay.className = 'overlay scanner-overlay-active';
  overlay.innerHTML = `
    <div class="overlay-card">
      <span class="scan-icon-big">⊙</span>
      <h2>SCANNER ACTIVATED</h2>
      <p>${clueText}</p>
      <button class="overlay-btn" id="scannerGotIt">GOT IT</button>
    </div>
  `;
  document.body.appendChild(overlay);

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    if (overlay.parentNode) overlay.remove();
    try { callback(); } catch(e) { console.error(e); }
  };

  document.getElementById('scannerGotIt').addEventListener('click', finish);
  // Safety timeout — if user doesn't click, auto-close after 12s
  safeTimeout(finish, 12000);
}

/* ============================================================
   PUZZLE SOLVED + DIGIT REVEAL
   ============================================================ */
function puzzleSolved(puzzle) {
  if (state.puzzleSolving) return;
  state.puzzleSolving = true;

  closeScanner();
  closeAllOverlays();

  // Update vault IMMEDIATELY
  const roomKey = 'r' + state.currentRoom;
  updateVaultDigit(roomKey, state.currentPuzzle, puzzle.digit);

  // Stats
  state.puzzlesCleared++;
  if (state.puzzleWrongCount === 0) {
    state.firstTrySolves++;
    state.streak++;
    state.roomFirstTries[roomKey] = (state.roomFirstTries[roomKey] || 0) + 1;
  } else {
    state.streak = 0;
    if (state.scannerActivated) {
      state.comebackEarned = true;
      if (state.puzzleWrongCount === 1) {
        state.deepScanEarned = true;
      }
    }
    // If override fired (2+ wrongs on a tap-puzzle, or 5+ wrongs on QF), this room loses Clean Room eligibility
    if (state.puzzleWrongCount >= 2) {
      state.roomCleanFlag = false;
    }
  }
  updatePuzzlesCleared(true);
  updateStreak();
  renderProgressDots();

  showDigitReveal(puzzle.digit, () => {
    if (state.currentPuzzle === 0) {
      state.currentPuzzle = 1;
      loadPuzzle();
    } else {
      // Both puzzles done — show code entry
      showCodeEntry();
    }
  });
}

function showDigitReveal(digit, callback) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay digit-reveal';
  overlay.innerHTML = `
    <div class="digit-reveal-content">
      <div class="digit-reveal-label">🔓 DIGIT REVEALED</div>
      <div class="digit-reveal-number">${digit}</div>
    </div>
  `;
  document.body.appendChild(overlay);

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    if (overlay.parentNode) overlay.remove();
    try { callback(); } catch(e) { console.error(e); }
  };
  safeTimeout(finish, 1700);
  // Safety
  safeTimeout(finish, 4000);
}

/* ============================================================
   CODE ENTRY
   ============================================================ */
function showCodeEntry() {
  const room = ROOMS[state.currentRoom - 1];
  const roomKey = 'r' + state.currentRoom;
  const earnedDigits = state.digits[roomKey].join(' ');

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-card code-entry-card">
      <span class="scan-icon-big">🔐</span>
      <h2>${room.emoji} ${room.name.toUpperCase()} — EXIT CODE</h2>
      <div class="code-entry-subtitle">Your digits: ${earnedDigits}</div>
      <div class="code-input-row">
        <input class="code-input" id="ci0" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="code-input" id="ci1" maxlength="1" inputmode="numeric" autocomplete="off">
      </div>
      <div class="code-feedback" id="codeFb"></div>
      <button class="overlay-btn" id="codeSubmit">SUBMIT</button>
    </div>
  `;
  document.body.appendChild(overlay);

  const ci0 = document.getElementById('ci0');
  const ci1 = document.getElementById('ci1');
  const fb = document.getElementById('codeFb');
  const sub = document.getElementById('codeSubmit');

  let submitted = false;

  function tryFocus() { try { ci0.focus(); } catch(e) {} }
  safeTimeout(tryFocus, 100);

  ci0.addEventListener('input', () => {
    ci0.value = ci0.value.replace(/[^0-9]/g, '');
    if (ci0.value.length === 1) ci1.focus();
  });
  ci1.addEventListener('input', () => {
    ci1.value = ci1.value.replace(/[^0-9]/g, '');
  });
  ci0.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSubmit();
  });
  ci1.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSubmit();
    if (e.key === 'Backspace' && ci1.value === '') ci0.focus();
  });

  function doSubmit() {
    if (submitted) return;
    const code = (ci0.value || '') + (ci1.value || '');
    if (code === room.exitCode || (state.digits[roomKey][0] !== '?' && state.digits[roomKey][1] !== '?' && code === state.digits[roomKey].join(''))) {
      submitted = true;
      fb.textContent = '✔ ACCEPTED';
      fb.className = 'code-feedback good';
      safeTimeout(() => {
        closeAllOverlays();
        showRoomCompletionThenAdvance();
      }, 800);
    } else {
      ci0.classList.add('wrong'); ci1.classList.add('wrong');
      fb.textContent = '✖ Code rejected — check the vault';
      fb.className = 'code-feedback bad';
      safeTimeout(() => { ci0.classList.remove('wrong'); ci1.classList.remove('wrong'); }, 500);
    }
  }
  sub.addEventListener('click', doSubmit);

  // Compute exitCode from earned digits if not pre-set
  if (!room.exitCode) {
    room.exitCode = state.digits[roomKey].join('');
  }
}

function showRoomCompletionThenAdvance() {
  const room = ROOMS[state.currentRoom - 1];
  // Brief banner
  const banner = document.createElement('div');
  banner.className = 'room-msg-banner';
  banner.textContent = '✔ ' + room.completion;
  document.body.appendChild(banner);
  banner.addEventListener('animationend', () => { if (banner.parentNode) banner.remove(); });
  safeTimeout(() => { if (banner.parentNode) banner.remove(); }, 2200);

  // Award Clean Room badge if eligible (both puzzles solved with 0-1 wrong each = first or second try)
  // Spec: both puzzles in one room solved on first or second try
  // We track first-try count per room — if first-tries === 2, definitely qualifies. Otherwise check wrong count history.
  // Simpler: if no override was triggered in either puzzle, that means student got both within 2 tries each.
  // We don't directly track that — use puzzleWrongCount per puzzle. We've been tracking globally per puzzle.
  // For simplicity: award Clean Room if both puzzles in this room had no override triggered.
  // We'll track via roomCleanFlag: true unless any override fired in the room.
  // Initialize at room entry, set false on override.
  if (state.roomCleanFlag !== false) {
    state.badges.add('🧹 Clean Room — ' + room.name);
  }
  // No Scanner badge per room
  if (!state.scannerUsedInRoom[room.id]) {
    state.badges.add('🚫 No Scanner — ' + room.name);
  }

  // Advance: if not last room, Pass the Laptop. Else, Final Lock.
  if (state.currentRoom < 3) {
    safeTimeout(showPassTheLaptop, 1500);
  } else {
    safeTimeout(enterFinalLock, 1500);
  }
}

/* ============================================================
   PASS THE LAPTOP
   ============================================================ */
function showPassTheLaptop() {
  const nextRoomNum = state.currentRoom + 1;
  const nextRoom = ROOMS[nextRoomNum - 1];
  setRoomTheme(nextRoom.color, nextRoom.accent, nextRoom.glow);

  const overlay = document.createElement('div');
  overlay.className = 'overlay pass-laptop';
  overlay.innerHTML = `
    <div style="text-align:center;">
      <div class="pass-laptop-text">PASS THE LAPTOP</div>
      <div class="pass-laptop-sub">Next: ${nextRoom.emoji} ${nextRoom.name}</div>
      <button class="overlay-btn" id="ptlReady">READY</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('ptlReady').addEventListener('click', () => {
    closeAllOverlays();
    state.roomCleanFlag = true; // reset for new room
    enterRoom(nextRoomNum);
  });
}

/* ============================================================
   FINAL LOCK
   ============================================================ */
function enterFinalLock() {
  state.currentRoom = 4;
  // Clear any scanner state
  state.scannerActivated = false;
  state.overrideTriggered = false;
  setRoomTheme('#fbbf24', '#fde68a', 'rgba(251,191,36,0.55)');

  finalDoorTransition(() => {
    renderFinalLock();
  });
}

function renderFinalLock() {
  // Hide regular bottom bar progress dots / scanner — final lock has its own UX
  $('roomTag').textContent = '🔐 FINAL LOCK';
  $('roomProgress').textContent = 'Master Match';
  $('missionLine').textContent = 'This is it! Match each room\'s key concept.';
  $('bottomBar').style.display = 'none';
  // Make sure scanner state is clear visually
  closeScanner();

  const matched = []; // indices of pairs matched
  const remainingRights = FINAL_LOCK.pairs.map((_, i) => i); // indices of right targets still available
  let activePairIdx = 0;
  let pairWrongCount = 0;
  let pairOverrideTriggered = false;

  function renderUI(narrowed) {
    const pairs = FINAL_LOCK.pairs;
    // Build left stack
    const leftHtml = pairs.map((p, i) => {
      let cls = 'ml-source';
      if (matched.includes(i)) cls += ' matched';
      else if (i === activePairIdx) cls += ' active';
      return `<div class="${cls}"><div class="ml-room-tag ${p.leftRoomTag}">${p.leftRoomTag.toUpperCase()}</div>${p.left}</div>`;
    }).join('');

    // Build right stack — show all 3 targets, dim ones already matched, narrow if scanner active
    const allRights = pairs.map(p => p.rightCorrect);
    const activePair = pairs[activePairIdx];
    const narrowList = narrowed ? activePair.narrowOptions : null;

    const rightHtml = allRights.map((r, i) => {
      let cls = 'ml-target';
      let label = r;
      if (matched.includes(i)) cls += ' matched';
      else if (narrowList && !narrowList.includes(r)) cls += ' dimmed';
      const isCorrect = (i === activePairIdx);
      return `<button class="${cls}" data-target-idx="${i}" data-correct="${isCorrect}">${label}</button>`;
    }).join('');

    // Also show narrowed option that's NOT in the right list (a distractor) if needed
    // Per content pack, distractor options are extra. Let's add them as additional buttons during scanner.
    let extraRightHtml = '';
    if (narrowList) {
      const extras = narrowList.filter(opt => !allRights.includes(opt));
      extraRightHtml = extras.map((opt) => {
        return `<button class="ml-target" data-target-idx="-1" data-extra="true" data-correct="false">${opt}</button>`;
      }).join('');
    }

    $('puzzleArea').innerHTML = `
      <div class="puzzle-content">
        <div class="puzzle-instruction">The pulsing card on the left is active — tap its match on the right.</div>
        <div class="ml-board">
          <div>
            <div class="ml-col-title">CONCEPTS</div>
            <div class="ml-stack">${leftHtml}</div>
          </div>
          <div>
            <div class="ml-col-title">MATCHES</div>
            <div class="ml-stack">${rightHtml}${extraRightHtml}</div>
          </div>
        </div>
        <div class="final-vault">
          <div class="final-vault-digit r1">${state.digits.r1.join('')}</div>
          <div class="final-vault-digit r2">${state.digits.r2.join('')}</div>
          <div class="final-vault-digit r3">${state.digits.r3.join('')}</div>
        </div>
      </div>
    `;

    let clickLocked = false;
    $('puzzleArea').querySelectorAll('.ml-target').forEach(btn => {
      btn.addEventListener('click', () => {
        if (clickLocked) return;
        if (btn.classList.contains('matched') || btn.classList.contains('dimmed')) return;
        const isCorrect = btn.dataset.correct === 'true';
        if (isCorrect) {
          clickLocked = true;
          btn.classList.add('matched');
          spawnParticles(btn);
          matched.push(activePairIdx);
          pairWrongCount = 0;
          pairOverrideTriggered = false;
          safeTimeout(() => {
            advanceFinal();
          }, 700);
        } else {
          btn.classList.add('wrong');
          pairWrongCount++;
          if (pairWrongCount === 1) {
            renderUI(true);
          } else if (pairWrongCount >= 2 && !pairOverrideTriggered) {
            pairOverrideTriggered = true;
            clickLocked = true; // prevent further clicks during cascade
            // Override cascade — auto match all remaining
            autoMatchAll();
          }
        }
      });
    });
  }

  function advanceFinal() {
    if (matched.length === 2) {
      // Auto-match the last pair
      const lastIdx = [0,1,2].find(i => !matched.includes(i));
      matched.push(lastIdx);
      // Brief render then escape
      renderFinalDone();
      safeTimeout(() => triggerEscape(), 1000);
      return;
    }
    if (matched.length >= 3) {
      renderFinalDone();
      safeTimeout(() => triggerEscape(), 1000);
      return;
    }
    activePairIdx = [0,1,2].find(i => !matched.includes(i));
    pairWrongCount = 0;
    pairOverrideTriggered = false;
    renderUI(false);
  }

  function autoMatchAll() {
    const remaining = [0,1,2].filter(i => !matched.includes(i));
    let step = 0;
    const banner = document.createElement('div');

    function renderFrame() {
      const pairs = FINAL_LOCK.pairs;
      const leftHtml = pairs.map((p, i) => {
        let cls = 'ml-source' + (matched.includes(i) ? ' matched' : '');
        return `<div class="${cls}"><div class="ml-room-tag ${p.leftRoomTag}">${p.leftRoomTag.toUpperCase()}</div>${p.left}</div>`;
      }).join('');
      const rightHtml = pairs.map((p, i) => {
        let cls = 'ml-target' + (matched.includes(i) ? ' matched' : ' dimmed');
        return `<div class="${cls}">${p.rightCorrect}</div>`;
      }).join('');
      $('puzzleArea').innerHTML = `
        <div class="puzzle-content">
          <div class="override-label">⚡ Lock Override — Resolving...</div>
          <div class="ml-board">
            <div><div class="ml-col-title">CONCEPTS</div><div class="ml-stack">${leftHtml}</div></div>
            <div><div class="ml-col-title">MATCHES</div><div class="ml-stack">${rightHtml}</div></div>
          </div>
        </div>
      `;
    }

    function nextStep() {
      if (step >= remaining.length) {
        renderFinalDone();
        safeTimeout(() => triggerEscape(), 800);
        return;
      }
      matched.push(remaining[step]);
      step++;
      renderFrame();
      safeTimeout(nextStep, 600);
    }
    nextStep();
  }

  function renderFinalDone() {
    const pairs = FINAL_LOCK.pairs;
    const leftHtml = pairs.map((p, i) => `<div class="ml-source matched"><div class="ml-room-tag ${p.leftRoomTag}">${p.leftRoomTag.toUpperCase()}</div>${p.left}</div>`).join('');
    const rightHtml = pairs.map(p => `<div class="ml-target matched">${p.rightCorrect}</div>`).join('');
    $('puzzleArea').innerHTML = `
      <div class="puzzle-content">
        <div class="step-progress" style="color:var(--gold);">ALL MATCHES SECURED</div>
        <div class="ml-board">
          <div><div class="ml-col-title">CONCEPTS</div><div class="ml-stack">${leftHtml}</div></div>
          <div><div class="ml-col-title">MATCHES</div><div class="ml-stack">${rightHtml}</div></div>
        </div>
      </div>
    `;
  }

  // Initial render
  // Show "This is it!" pause first
  $('puzzleArea').innerHTML = `
    <div class="puzzle-content" style="text-align:center;">
      <div style="font-size:48px; font-weight:900; color:var(--gold); letter-spacing:0.15em; text-shadow:0 0 20px rgba(251,191,36,0.6);">
        THIS IS IT!
      </div>
    </div>
  `;
  safeTimeout(() => renderUI(false), 800);
}

/* ============================================================
   ESCAPE ANIMATION + REPORT
   ============================================================ */
function triggerEscape() {
  closeAllOverlays();
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.style.background = 'rgba(0,0,0,0.92)';
  overlay.innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:80px; margin-bottom:18px;">🔓</div>
      <div style="font-size:80px; font-weight:900; letter-spacing:0.15em; background:linear-gradient(90deg,#fbbf24,#f97316,#fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:digitPop 1s ease;">
        ESCAPED!
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  spawnConfetti();
  safeTimeout(() => {
    if (overlay.parentNode) overlay.remove();
    showEscapeReport();
  }, 2800);
}

function showEscapeReport() {
  if (state.gameEnded) return;
  state.gameEnded = true;
  // Force-close everything
  closeScanner();
  closeAllOverlays();

  const elapsedMs = Date.now() - (state.startTime || Date.now());
  const totalSec = Math.floor(elapsedMs / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  const timeStr = min + 'm ' + (sec < 10 ? '0' : '') + sec + 's';

  // Calculate stars
  let stars = 1;
  if (state.firstTrySolves >= 4) stars = 3;
  else if (state.firstTrySolves >= 2) stars = 2;

  // Add Comeback / Deep Scan badges
  if (state.comebackEarned) state.badges.add('🔁 Comeback');
  if (state.deepScanEarned) state.badges.add('🔍 Deep Scan');

  const badgesHtml = Array.from(state.badges).map(b => `<span class="badge">${b}</span>`).join('') || '<span class="badge">🚪 Escapee</span>';

  const overlay = document.createElement('div');
  overlay.className = 'overlay report-overlay';
  overlay.innerHTML = `
    <div class="report-card">
      <div style="font-size:13px; letter-spacing:0.3em; color:#14b8a6; margin-bottom:10px;">MR. JAWAD'S ESCAPE ROOM SIMULATIONS</div>
      <div class="escaped-text">ESCAPED!</div>
      <div style="color:var(--text-dim); margin-bottom:10px;">Endocrine System — Unit Review</div>
      <div class="stars">
        <span class="star ${stars>=1?'lit':''}">★</span>
        <span class="star ${stars>=2?'lit':''}" style="animation-delay:0.3s;">★</span>
        <span class="star ${stars>=3?'lit':''}" style="animation-delay:0.6s;">★</span>
      </div>
      <div class="report-stats">
        <div class="stat-item"><div class="stat-label">⏱️ TOTAL TIME</div><div class="stat-value">${timeStr}</div></div>
        <div class="stat-item"><div class="stat-label">🚪 ROOMS CLEARED</div><div class="stat-value">3 / 3</div></div>
        <div class="stat-item"><div class="stat-label">🧩 PUZZLES CLEARED</div><div class="stat-value">${state.puzzlesCleared} / 6</div></div>
        <div class="stat-item"><div class="stat-label">⚡ FIRST-TRY SOLVES</div><div class="stat-value">${state.firstTrySolves}</div></div>
      </div>
      <div style="font-size:14px; letter-spacing:0.15em; color:var(--text-dim); margin-bottom:6px;">BADGES EARNED</div>
      <div class="badges-list">${badgesHtml}</div>
      <div class="report-buttons">
        <button class="report-btn primary" id="copyRpt">📋 COPY REPORT</button>
        <button class="report-btn secondary" id="playAgain">↻ PLAY AGAIN</button>
      </div>
      <div id="copyStatus" style="margin-top:10px; font-size:13px; color:var(--good); min-height:18px;"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  document.getElementById('copyRpt').addEventListener('click', () => {
    const lines = [
      "Mr. Jawad's Escape Room Simulations",
      "Endocrine System — Unit Review",
      "",
      "Time:\t" + timeStr,
      "Rooms cleared:\t3/3",
      "Puzzles cleared:\t" + state.puzzlesCleared + "/6",
      "First-try solves:\t" + state.firstTrySolves,
      "Stars:\t" + stars,
      "Badges:\t" + Array.from(state.badges).join(', ')
    ];
    const text = lines.join('\n');
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          document.getElementById('copyStatus').textContent = '✔ Report copied to clipboard';
        }, () => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    } catch(e) {
      fallbackCopy(text);
    }
  });
  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); document.getElementById('copyStatus').textContent = '✔ Report copied'; } catch(e) { document.getElementById('copyStatus').textContent = 'Copy failed — please copy manually'; }
    ta.remove();
  }

  document.getElementById('playAgain').addEventListener('click', () => {
    location.reload();
  });
}

/* ============================================================
   EMERGENCY SKIP
   ============================================================ */
let longPressTimer = null;
let shiftSTimer = null;
let shiftSPressed = false;

function handleEmergencySkip() {
  // Detect screen state
  if (state.gameEnded) return;
  if (state.currentRoom === 4) {
    // Final Lock — skip directly to escape report
    showToast('⚡ Skipping to escape report...');
    clearAllPendingTimers();
    closeAllOverlays();
    safeTimeout(showEscapeReport, 600);
    return;
  }
  if (state.currentRoom < 1 || state.currentRoom > 3) return;

  // Reveal both digits for current room and open code entry
  const room = ROOMS[state.currentRoom - 1];
  const digits = room.puzzles.map(p => p.digit);
  const roomKey = 'r' + state.currentRoom;
  // Mark digits as revealed (with skipped flag for report)
  if (state.digits[roomKey][0] === '?') {
    state.digits[roomKey][0] = digits[0];
    state.skippedDigits = state.skippedDigits || {};
    state.skippedDigits[roomKey + '0'] = true;
  }
  if (state.digits[roomKey][1] === '?') {
    state.digits[roomKey][1] = digits[1];
    state.skippedDigits = state.skippedDigits || {};
    state.skippedDigits[roomKey + '1'] = true;
  }
  renderVault();
  clearAllPendingTimers();
  closeAllOverlays();
  // Mark room as not eligible for first-try / clean room badges
  state.roomCleanFlag = false;
  showToast('⚡ Skipped — codes revealed');
  // Set exitCode for code entry validator
  if (!room.exitCode) room.exitCode = digits.join('');
  safeTimeout(showCodeEntry, 700);
}

function setupEmergencySkip() {
  // Long-press on room title
  const tag = $('roomTag');
  if (tag) {
    let pressed = false;
    tag.addEventListener('mousedown', () => {
      pressed = true;
      longPressTimer = setTimeout(() => {
        if (pressed) handleEmergencySkip();
      }, 5000);
    });
    tag.addEventListener('mouseup', () => { pressed = false; clearTimeout(longPressTimer); });
    tag.addEventListener('mouseleave', () => { pressed = false; clearTimeout(longPressTimer); });
    tag.addEventListener('touchstart', (e) => {
      pressed = true;
      longPressTimer = setTimeout(() => { if (pressed) handleEmergencySkip(); }, 5000);
    });
    tag.addEventListener('touchend', () => { pressed = false; clearTimeout(longPressTimer); });
    tag.addEventListener('touchcancel', () => { pressed = false; clearTimeout(longPressTimer); });
  }

  // Shift+S held 2 seconds (must exceed any 5-sec long press? actually spec says 2 sec — fine)
  document.addEventListener('keydown', (e) => {
    if (e.shiftKey && (e.key === 'S' || e.key === 's')) {
      if (!shiftSPressed) {
        shiftSPressed = true;
        shiftSTimer = setTimeout(() => {
          if (shiftSPressed) handleEmergencySkip();
        }, 2000);
      }
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.key === 'S' || e.key === 's' || e.key === 'Shift') {
      shiftSPressed = false;
      clearTimeout(shiftSTimer);
    }
  });
}

/* ============================================================
   SCANNER BUTTON (manual)
   ============================================================ */
function setupScannerBtn() {
  const btn = $('scannerBtn');
  if (!btn) return;
  btn.addEventListener('click', () => {
    if (state.gameEnded) return;
    const room = ROOMS[state.currentRoom - 1];
    if (!room) return;
    const puzzle = room.puzzles[state.currentPuzzle];
    if (!puzzle) return;
    // For QF — show inline hint of current question if available — but we don't have current Q reference here.
    // Simplest: show generic scanner clue for the puzzle.
    if (puzzle.type === 'quickFire') {
      showToast('🔍 Hints appear automatically after a wrong tap.', 1800);
      return;
    }
    if (puzzle.type === 'matchLock') {
      // Would need pair context — show generic scanner hint
      showToast('🔍 Scanner activates automatically on a wrong tap.', 1800);
      return;
    }
    if (puzzle.scannerClue) {
      state.scannerActivated = true;
      state.scannerUsedInRoom['r' + state.currentRoom] = true;
      showScannerOverlay(puzzle.scannerClue, () => {});
    }
  });
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  state.roomCleanFlag = true; // reset per room — start true
  document.getElementById('startBtn').addEventListener('click', startGame);
  setupEmergencySkip();
  setupScannerBtn();

  // Global error catch — keep game alive
  window.addEventListener('error', (e) => {
    console.error('Global error:', e.message);
  });
}

// Set room exit codes at boot from puzzle digits
ROOMS.forEach(r => {
  r.exitCode = r.puzzles.map(p => p.digit).join('');
});

init();
</script>
