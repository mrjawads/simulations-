<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Jawad Unit Review: Endocrine System</title>
<style>
  :root {
    --bg-deep: #0e0e1f;
    --bg-mid: #1a1a2e;
    --bg-soft: #252544;
    --text: #f0f0ff;
    --text-dim: #a0a0c8;
    --room-color: #8b5cf6;
    --room-accent: #c4b5fd;
    --room-glow: rgba(139,92,246,0.55);
    --good: #34d399;
    --bad: #ef4444;
    --gold: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: radial-gradient(ellipse at center, var(--bg-mid) 0%, var(--bg-deep) 100%);
    color: var(--text);
    font-size: 18px;
    line-height: 1.4;
    user-select: none;
    -webkit-user-select: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* ========== APP LAYOUT ========== */
  #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  .ambient {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 10%, var(--room-glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, var(--room-glow) 0%, transparent 45%);
    opacity: 0.25;
    animation: ambientShift 12s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes ambientShift {
    0%, 100% { opacity: 0.20; }
    50% { opacity: 0.35; }
  }

  /* ========== TOP BAR ========== */
  #topBar {
    position: relative; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
    gap: 14px;
  }
  .room-tag {
    font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(0,0,0,0.4);
    border: 2px solid var(--room-color);
    color: var(--room-accent);
    cursor: pointer;
    box-shadow: 0 0 12px var(--room-glow);
  }
  .room-progress { font-size: 14px; color: var(--text-dim); letter-spacing: 0.08em; }
  .streak { font-size: 22px; opacity: 0; transition: opacity 0.3s; }
  .streak.active { opacity: 1; animation: flicker 1.4s ease-in-out infinite; }
  @keyframes flicker {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 6px #ff8c00); }
    50% { transform: scale(1.15); filter: drop-shadow(0 0 14px #ff5500); }
  }
  .puzzles-cleared {
    margin-left: auto;
    font-size: 14px; font-weight: 700; letter-spacing: 0.08em;
    padding: 8px 14px; border-radius: 8px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .puzzles-cleared.pulse { animation: pcPulse 0.6s ease; }
  @keyframes pcPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.18); background: var(--room-color); }
    100% { transform: scale(1); }
  }

  /* ========== CODE VAULT ========== */
  #codeVault {
    position: absolute; top: 64px; right: 18px; z-index: 4;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 10px 12px;
    backdrop-filter: blur(4px);
  }
  .vault-title { font-size: 11px; letter-spacing: 0.2em; color: var(--text-dim); text-align: center; margin-bottom: 6px; }
  .vault-rooms { display: flex; gap: 12px; }
  .vault-room { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .vault-room-label { font-size: 10px; color: var(--text-dim); }
  .vault-digits { display: flex; gap: 3px; }
  .vault-digit {
    width: 22px; height: 28px; border-radius: 4px;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: var(--text-dim);
  }
  .vault-digit.revealed {
    background: var(--vault-room-color, var(--room-color));
    color: #fff; border-color: transparent;
    box-shadow: 0 0 10px var(--vault-room-color, var(--room-color));
    animation: vaultReveal 0.6s ease;
  }
  @keyframes vaultReveal {
    0% { transform: scale(0.4); opacity: 0; }
    60% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ========== MISSION LINE ========== */
  #missionLine {
    text-align: center;
    font-size: 17px; color: var(--room-accent);
    padding: 4px 18px 12px;
    font-style: italic; letter-spacing: 0.02em;
    position: relative; z-index: 3;
  }

  /* ========== PUZZLE AREA ========== */
  #puzzleArea {
    position: relative; z-index: 2;
    width: 100%; max-width: 1100px; margin: 0 auto;
    padding: 14px 22px 100px;
    min-height: calc(100vh - 200px);
    display: flex; align-items: center; justify-content: center;
  }
  .puzzle-content { width: 100%; }
  .puzzle-instruction {
    text-align: center; font-size: 18px; color: var(--text-dim);
    margin-bottom: 18px;
  }
  .step-progress {
    text-align: center; font-size: 13px; letter-spacing: 0.18em;
    color: var(--room-accent); margin-bottom: 14px;
    text-transform: uppercase; font-weight: 700;
  }

  /* ========== BOTTOM BAR ========== */
  #bottomBar {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; z-index: 5;
    background: linear-gradient(0deg, rgba(0,0,0,0.6), rgba(0,0,0,0));
  }
  .scanner-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 18px; border-radius: 10px;
    background: rgba(0,0,0,0.55);
    border: 2px solid var(--room-color);
    color: var(--room-accent);
    font-size: 14px; font-weight: 700; letter-spacing: 0.1em;
    box-shadow: 0 0 12px var(--room-glow);
    animation: scannerPulse 2.4s ease-in-out infinite;
  }
  .scanner-btn .scan-icon { font-size: 18px; }
  .scanner-btn:active { transform: scale(0.95); }
  @keyframes scannerPulse {
    0%, 100% { box-shadow: 0 0 8px var(--room-glow); }
    50% { box-shadow: 0 0 18px var(--room-glow), 0 0 28px var(--room-glow); }
  }
  .progress-dots { display: flex; gap: 10px; }
  .pdot {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
  }
  .pdot.solved {
    background: var(--room-color); border-color: var(--room-color);
    box-shadow: 0 0 10px var(--room-glow);
  }
  .bb-spacer { width: 100px; }

  /* ========== MATCH LOCK ========== */
  .match-row {
    display: grid; grid-template-columns: 1fr auto 2fr;
    gap: 24px; align-items: center;
    margin: 14px 0;
  }
  .match-term {
    background: rgba(0,0,0,0.55); border: 2px solid var(--room-color);
    border-radius: 12px; padding: 22px 18px;
    font-size: 28px; font-weight: 700; text-align: center;
    box-shadow: 0 0 16px var(--room-glow);
    color: var(--text);
  }
  .match-arrow { font-size: 32px; color: var(--room-accent); text-align: center; }
  .match-options { display: flex; flex-direction: column; gap: 12px; }
  .match-option, .answer-card {
    background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.18);
    border-radius: 12px; padding: 18px 16px;
    font-size: 22px; font-weight: 600; text-align: center;
    color: var(--text);
    transition: all 0.25s ease;
    min-height: 64px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .match-option:hover, .answer-card:hover { border-color: var(--room-accent); }
  .match-option.correct, .answer-card.correct, .seq-card.correct {
    background: rgba(52,211,153,0.25); border-color: var(--good);
    box-shadow: 0 0 18px rgba(52,211,153,0.6);
    color: #fff;
  }
  .match-option.correct::before, .answer-card.correct::before, .seq-card.correct::before {
    content: "✔ "; color: var(--good); font-weight: 900; margin-right: 4px;
  }
  .match-option.wrong, .answer-card.wrong, .seq-card.wrong, .qf-btn.wrong, .stf-tap.wrong {
    background: rgba(239,68,68,0.22); border-color: var(--bad);
    animation: shake 0.4s ease;
  }
  .match-option.wrong::after, .answer-card.wrong::after, .seq-card.wrong::after, .qf-btn.wrong::after {
    content: " ✖"; color: var(--bad); font-weight: 900;
  }
  .match-option.dimmed, .answer-card.dimmed {
    opacity: 0.32; pointer-events: none;
    background: rgba(60,60,80,0.3);
  }
  .match-option.dimmed::after, .answer-card.dimmed::after { content: " ✖"; color: var(--bad); }
  .match-option.override-target, .answer-card.override-target, .seq-card.override-target, .stf-tap.override-target, .ml-target.override-target {
    border-color: var(--gold);
    background: rgba(251,191,36,0.18);
    box-shadow: 0 0 20px rgba(251,191,36,0.7);
    animation: overridePulse 0.9s ease-in-out infinite;
  }
  @keyframes overridePulse {
    0%, 100% { box-shadow: 0 0 14px rgba(251,191,36,0.6); }
    50% { box-shadow: 0 0 28px rgba(251,191,36,0.95); }
  }
  .override-label {
    text-align: center; color: var(--gold); font-weight: 700;
    letter-spacing: 0.15em; font-size: 14px; margin-bottom: 10px;
    text-transform: uppercase;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ========== MYSTERY INPUT ========== */
  .mi-chain { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 24px; }
  .mi-box {
    background: rgba(0,0,0,0.55); border: 2px solid var(--room-color);
    border-radius: 12px; padding: 18px 22px;
    font-size: 22px; text-align: center; min-width: 320px;
    box-shadow: 0 0 14px var(--room-glow);
  }
  .mi-box.unknown { background: rgba(0,0,0,0.7); color: var(--gold); font-weight: 700; }
  .mi-box.filled { background: rgba(52,211,153,0.25); border-color: var(--good); box-shadow: 0 0 18px rgba(52,211,153,0.6); }
  .mi-arrow { font-size: 28px; color: var(--room-accent); }
  .mi-title { text-align: center; font-size: 14px; letter-spacing: 0.18em; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; }
  .answer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 800px; margin: 0 auto; }

  /* ========== SYSTEM SCANNER ========== */
  .gauges { display: flex; gap: 22px; justify-content: center; margin-bottom: 24px; }
  .gauge {
    background: rgba(0,0,0,0.55); border: 2px solid var(--room-color);
    border-radius: 12px; padding: 12px;
    width: 160px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    box-shadow: 0 0 12px var(--room-glow);
  }
  .gauge-label { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-align: center; }
  .gauge-bar {
    width: 28px; height: 160px; background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
    position: relative; overflow: hidden;
  }
  .gauge-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    border-radius: 0 0 5px 5px;
  }
  .gauge-fill.high { height: 88%; background: linear-gradient(0deg, #f97316, #ef4444); }
  .gauge-fill.low { height: 22%; background: linear-gradient(0deg, #eab308, #fbbf24); }
  .gauge-needle {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 28px; color: var(--gold);
    animation: needleFlash 1.2s ease-in-out infinite;
  }
  @keyframes needleFlash {
    0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
  }
  .gauge-status { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; text-align: center; }
  .gauge-ok-band {
    position: absolute; left: -3px; right: -3px; top: 45%;
    height: 14px; background: rgba(52,211,153,0.25);
    border-top: 1px dashed var(--good); border-bottom: 1px dashed var(--good);
  }
  .question-text { text-align: center; font-size: 26px; font-weight: 700; margin-bottom: 18px; }

  /* ========== SEQUENCE LOCK ========== */
  .seq-zone { display: flex; gap: 12px; justify-content: center; align-items: center; margin-bottom: 22px; min-height: 110px; }
  .seq-slot {
    width: 200px; height: 100px; border-radius: 12px;
    border: 2px dashed rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-dim); letter-spacing: 0.1em;
    position: relative;
  }
  .seq-slot.filled { border-style: solid; border-color: var(--good); background: rgba(52,211,153,0.18); box-shadow: 0 0 14px rgba(52,211,153,0.5); }
  .seq-slot-num { position: absolute; top: -10px; left: -10px; width: 28px; height: 28px; border-radius: 50%; background: var(--room-color); color: #fff; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .seq-arrow { font-size: 26px; color: var(--room-accent); }
  .seq-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 800px; margin: 0 auto; }
  .seq-card {
    background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.18);
    border-radius: 12px; padding: 18px;
    text-align: center; font-size: 18px; font-weight: 600;
    transition: all 0.25s ease; min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .seq-card:hover { border-color: var(--room-accent); }
  .seq-card.locked { opacity: 0; pointer-events: none; transform: scale(0.5); }
  .seq-card.dimmed { opacity: 0.32; pointer-events: none; }

  /* ========== SPOT THE DIFFERENCE ========== */
  .stf-loops { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 18px; }
  .stf-loop {
    background: rgba(0,0,0,0.45); border: 2px solid var(--room-color);
    border-radius: 14px; padding: 16px;
    box-shadow: 0 0 14px var(--room-glow);
  }
  .stf-loop-title { font-size: 14px; letter-spacing: 0.12em; text-align: center; color: var(--room-accent); margin-bottom: 10px; text-transform: uppercase; font-weight: 700; }
  .stf-flow { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px; }
  .stf-tap {
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 12px 14px; font-size: 16px; font-weight: 600;
    transition: all 0.2s ease;
    min-height: 56px; display: flex; align-items: center; justify-content: center;
    text-align: center;
  }
  .stf-tap:hover { border-color: var(--room-accent); background: rgba(255,255,255,0.1); }
  .stf-tap.dimmed { opacity: 0.3; pointer-events: none; }
  .stf-tap.scanner-dim { opacity: 0.25; pointer-events: none; }
  .stf-tap.found-error { background: rgba(239,68,68,0.35); border-color: var(--bad); animation: shake 0.4s ease; }
  .stf-tap.show-correct { background: rgba(52,211,153,0.25); border-color: var(--good); }
  .stf-arrow { color: var(--room-accent); font-size: 22px; }
  .stf-static { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px 14px; font-size: 16px; min-height: 56px; display: flex; align-items: center; justify-content: center; }

  /* ========== QUICK FIRE ========== */
  .qf-header { text-align: center; font-size: 22px; font-weight: 700; letter-spacing: 0.18em; color: var(--bad); margin-bottom: 14px; text-transform: uppercase; }
  .qf-progress { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }
  .qf-dot { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }
  .qf-dot.correct { background: var(--good); border-color: var(--good); color: #fff; }
  .qf-dot.wrong { background: var(--bad); border-color: var(--bad); color: #fff; }
  .qf-question { text-align: center; font-size: 30px; font-weight: 700; padding: 28px 18px; background: rgba(0,0,0,0.4); border-radius: 14px; border: 2px solid var(--room-color); box-shadow: 0 0 16px var(--room-glow); margin-bottom: 14px; }
  .qf-hint { text-align: center; font-size: 16px; color: var(--gold); padding: 10px; background: rgba(251,191,36,0.12); border: 1px dashed var(--gold); border-radius: 8px; margin-bottom: 14px; }
  .qf-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 600px; margin: 0 auto; }
  .qf-btn { padding: 26px; font-size: 26px; font-weight: 700; border-radius: 14px; border: 2px solid; transition: all 0.2s ease; }
  .qf-btn.confirm { border-color: var(--good); color: var(--good); background: rgba(52,211,153,0.1); }
  .qf-btn.deny { border-color: var(--bad); color: var(--bad); background: rgba(239,68,68,0.1); }
  .qf-btn:hover { transform: scale(1.03); }
  .qf-btn.correct { background: rgba(52,211,153,0.4); animation: correctPop 0.5s ease; }
  @keyframes correctPop {
    0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); }
  }
  .qf-retry-banner { text-align: center; padding: 12px; background: rgba(251,191,36,0.15); border: 1px solid var(--gold); border-radius: 8px; margin-bottom: 14px; color: var(--gold); font-weight: 700; }

  /* ========== OVERLAYS (general) ========== */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(6px);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-card {
    background: linear-gradient(180deg, rgba(40,40,80,0.95), rgba(20,20,40,0.95));
    border: 2px solid var(--room-color); border-radius: 16px;
    padding: 30px; max-width: 560px; width: 90%;
    text-align: center; box-shadow: 0 0 30px var(--room-glow);
  }
  .overlay-card h2 { font-size: 22px; margin-bottom: 14px; color: var(--room-accent); letter-spacing: 0.05em; }
  .overlay-card .scan-icon-big { font-size: 42px; margin-bottom: 10px; display: block; animation: sweep 2s ease-in-out infinite; }
  @keyframes sweep {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }
  .overlay-card p { font-size: 18px; line-height: 1.5; color: var(--text); margin-bottom: 20px; }
  .overlay-btn {
    background: var(--room-color); color: #fff;
    padding: 14px 30px; border-radius: 10px; font-size: 16px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    box-shadow: 0 0 14px var(--room-glow);
  }
  .overlay-btn:hover { transform: scale(1.05); }
  .overlay-btn.gold { background: var(--gold); color: #1a1a2e; box-shadow: 0 0 14px rgba(251,191,36,0.6); }

  /* ========== SCAN PREVIEW ========== */
  .scan-preview {
    background: rgba(0,0,0,0.85);
  }
  .scan-preview-inner {
    border: 3px solid var(--room-color);
    border-radius: 16px; padding: 30px 50px;
    text-align: center;
    box-shadow: 0 0 30px var(--room-glow);
    background: rgba(20,20,40,0.6);
    position: relative;
  }
  .scan-preview-inner::before, .scan-preview-inner::after {
    content: ""; position: absolute; width: 30px; height: 30px;
    border: 3px solid var(--room-accent);
  }
  .scan-preview-inner::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
  .scan-preview-inner::after { bottom: -3px; right: -3px; border-left: none; border-top: none; }
  .scan-preview-label { font-size: 14px; letter-spacing: 0.3em; color: var(--room-accent); margin-bottom: 18px; }
  .scan-preview-art { font-size: 80px; margin-bottom: 10px; }
  .scan-preview-caption { font-size: 14px; color: var(--text-dim); }

  /* ========== DOOR TRANSITION ========== */
  .door-overlay {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(0,0,0,0.95);
    display: flex; align-items: center; justify-content: center;
    animation: doorSequence 1.2s ease forwards;
  }
  .door-overlay.final-door { animation: doorSequence 1.8s ease forwards; }
  .door-silhouette {
    width: 280px; height: 360px; border-radius: 18px 18px 6px 6px;
    border: 4px solid var(--room-color);
    background: linear-gradient(180deg, rgba(20,20,40,0.95), rgba(0,0,0,0.95));
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    box-shadow: 0 0 40px var(--room-glow), inset 0 0 30px rgba(0,0,0,0.6);
  }
  .door-lock-icon { font-size: 72px; animation: lockBeat 1.2s ease infinite; }
  @keyframes lockBeat {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px var(--room-color)); }
    50% { transform: scale(1.25); filter: drop-shadow(0 0 18px var(--room-color)); }
  }

/* ============================================================
   UTILITIES
   ============================================================ */
function $(id) { return document.getElementById(id); }

function safeTimeout(fn, ms) {
  const id = setTimeout(() => {
    state.pendingTimers.delete(id);
    try { fn(); } catch(e) { console.error('Timer fn error:', e); }
  }, ms);
  state.pendingTimers.add(id);
  return id;
}

function clearAllPendingTimers() {
  state.pendingTimers.forEach(id => clearTimeout(id));
  state.pendingTimers.clear();
}

function setRoomTheme(color, accent, glow) {
  document.documentElement.style.setProperty('--room-color', color);
  document.documentElement.style.setProperty('--room-accent', accent);
  document.documentElement.style.setProperty('--room-glow', glow);
}

function closeAllOverlays() {
  document.querySelectorAll('.overlay').forEach(el => el.remove());
}

function closeScanner() {
  document.querySelectorAll('.scanner-overlay-active').forEach(el => el.remove());
}

function spawnParticles(targetEl, color) {
  try {
    if (!targetEl) return;
    const rect = targetEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const c = color || getComputedStyle(document.documentElement).getPropertyValue('--good').trim();
    const count = 10;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / count;
      const dist = 60 + Math.random() * 40;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.background = c;
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
      // Safety cleanup
      setTimeout(() => { if (p.parentNode) p.remove(); }, 1500);
    }
  } catch(e) { console.error('particle err', e); }
}

function spawnConfetti() {
  try {
    const colors = ['#fbbf24', '#8b5cf6', '#ef4444', '#10b981', '#14b8a6', '#f97316'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 1.2) + 's';
      c.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
      setTimeout(() => { if (c.parentNode) c.remove(); }, 5000);
    }
  } catch(e) { console.error('confetti err', e); }
}

function showToast(text, ms = 1500) {
  const t = document.createElement('div');
  t.className = 'skip-confirm-toast';
  t.textContent = text;
  document.body.appendChild(t);
  safeTimeout(() => { if (t.parentNode) t.remove(); }, ms);
}
