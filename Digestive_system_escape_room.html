<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Jawad's Escape Room — Digestive System</title>
<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--bg2:#16213e;--text:#e0e0e0;--white:#fff;
  --green:#00ff88;--green-dark:#004d29;--green-light:rgba(0,255,136,.15);
  --orange:#ff8c00;--orange-dark:#4d2900;--orange-light:rgba(255,140,0,.15);
  --red:#ff3366;--red-dark:#4d0f1e;--red-light:rgba(255,51,102,.15);
  --teal:#00bcd4;--gold:#ffd700;
  --room-color:var(--green);--room-accent:var(--green-dark);--room-light:var(--green-light);
  --font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
button:active{transform:scale(.96)}

/* === SCREENS === */
.screen{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;z-index:1}
.screen.active{display:flex}

/* === START SCREEN === */
#startScreen{background:radial-gradient(ellipse at center,#1e2a4a 0%,var(--bg) 70%);text-align:center;padding:20px}
.brand-line{font-size:clamp(10px,1.4vw,13px);color:var(--teal);text-transform:uppercase;letter-spacing:4px;font-weight:600;margin-bottom:12px}
.start-title{font-size:clamp(28px,5vw,52px);color:var(--white);font-weight:800;line-height:1.1;text-shadow:0 0 40px rgba(0,188,212,.3),0 0 80px rgba(0,188,212,.1);margin-bottom:8px}
.start-divider{width:60px;height:2px;background:var(--teal);margin:16px auto;box-shadow:0 0 10px var(--teal)}
.start-subtitle{font-size:clamp(14px,2vw,20px);color:rgba(255,255,255,.6);margin-bottom:40px}
.start-btn{background:linear-gradient(135deg,var(--teal),#0097a7);color:var(--white);font-size:clamp(16px,2.2vw,22px);font-weight:700;padding:16px 48px;border-radius:50px;letter-spacing:1px;box-shadow:0 0 30px rgba(0,188,212,.4);transition:all .3s ease}
.start-btn:hover{box-shadow:0 0 50px rgba(0,188,212,.6);transform:translateY(-2px)}
.start-footer{position:absolute;bottom:20px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:2px;text-transform:uppercase}

/* === TOP BAR === */
.topbar{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(0,0,0,.4);z-index:50;font-size:clamp(12px,1.6vw,15px)}
.topbar-left{display:flex;align-items:center;gap:12px}
.room-label{color:var(--room-color);font-weight:700}
.room-progress{color:rgba(255,255,255,.5);font-size:clamp(10px,1.3vw,13px)}
.topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.puzzles-cleared{color:var(--white);font-weight:600}
.puzzles-cleared .count{color:var(--gold);transition:all .3s ease}
.puzzles-cleared .count.pulse{animation:countPulse .4s ease}
.streak-fire{font-size:18px;opacity:0;transition:opacity .3s ease}
.streak-fire.active{opacity:1;animation:firePulse 1s ease infinite}

/* === CODE VAULT === */
.code-vault{position:absolute;top:56px;right:12px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:8px 12px;z-index:50;display:none}
.code-vault.visible{display:block}
.vault-title{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;text-align:center}
.vault-rooms{display:flex;gap:10px}
.vault-room{text-align:center}
.vault-room-label{font-size:9px;margin-bottom:3px}
.vault-digits{display:flex;gap:3px}
.vault-digit{width:22px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;font-size:14px;font-weight:800;color:rgba(255,255,255,.3);transition:all .4s ease}
.vault-digit.revealed{color:var(--white);border-color:var(--room-color);box-shadow:0 0 8px var(--room-color);animation:digitUnlock .5s ease}

/* === MISSION LINE === */
.mission-line{position:absolute;top:54px;left:16px;right:140px;font-size:clamp(11px,1.4vw,14px);color:rgba(255,255,255,.5);font-style:italic;z-index:40}

/* === PUZZLE AREA === */
.puzzle-area{position:absolute;top:90px;left:16px;right:16px;bottom:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.puzzle-instruction{font-size:clamp(11px,1.3vw,13px);color:rgba(255,255,255,.5);margin-bottom:8px;text-align:center}
.puzzle-title{font-size:clamp(16px,2.4vw,24px);color:var(--white);font-weight:700;margin-bottom:16px;text-align:center}
.puzzle-content{width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center}

/* === BOTTOM BAR === */
.bottombar{position:absolute;bottom:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:50}
.scanner-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:var(--room-color);padding:10px 18px;border-radius:25px;font-size:14px;font-weight:600;transition:all .3s ease;animation:scannerPulse 2s ease infinite}
.scanner-btn:hover{background:rgba(255,255,255,.15)}
.progress-dots{display:flex;gap:8px}
.progress-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s ease}
.progress-dot.filled{background:var(--room-color);box-shadow:0 0 8px var(--room-color)}
.micro-progress{font-size:clamp(10px,1.2vw,12px);color:rgba(255,255,255,.4);text-align:center;margin-top:6px}

/* === PUZZLE CARDS === */
.card-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.answer-card{min-width:120px;min-height:52px;padding:12px 20px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:12px;color:var(--text);font-size:clamp(13px,1.6vw,16px);font-weight:600;text-align:center;transition:all .3s ease;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.answer-card:hover{border-color:var(--room-color);box-shadow:0 0 15px rgba(255,255,255,.1)}
.answer-card.selected{border-color:var(--room-color);box-shadow:0 0 20px var(--room-color);transform:scale(1.05);background:rgba(255,255,255,.12)}
.answer-card.correct{border-color:#00ff88;background:rgba(0,255,136,.15);box-shadow:0 0 20px rgba(0,255,136,.4);animation:correctFlash .5s ease}
.answer-card.wrong{border-color:#ff3366;background:rgba(255,51,102,.15);box-shadow:0 0 20px rgba(255,51,102,.4);animation:wrongShake .5s ease}
.answer-card.dimmed{opacity:.35;pointer-events:none;border-style:dashed}
.answer-card.override-highlight{border-color:var(--room-color);box-shadow:0 0 30px var(--room-color);animation:overridePulse 1s ease infinite;position:relative}
.answer-card.override-highlight::after{content:'Scanner locked on';position:absolute;top:-22px;font-size:10px;color:var(--room-color);white-space:nowrap}

/* === MATCH LOCK === */
.match-area{display:flex;gap:30px;align-items:center;justify-content:center;width:100%}
.match-col{display:flex;flex-direction:column;gap:10px;min-width:140px}
.match-card{padding:14px 20px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:12px;font-size:clamp(13px,1.5vw,16px);font-weight:600;color:var(--text);text-align:center;cursor:pointer;transition:all .3s ease;min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px}
.match-card:hover{border-color:var(--room-color)}
.match-card.selected{border-color:var(--room-color);box-shadow:0 0 20px var(--room-color);transform:scale(1.05);background:rgba(255,255,255,.12)}
.match-card.selected::before{content:'▶ ';color:var(--room-color)}
.match-card.matched{border-color:#00ff88;background:rgba(0,255,136,.12);box-shadow:0 0 10px rgba(0,255,136,.3);pointer-events:none}
.match-card.wrong-flash{animation:wrongShake .5s ease;border-color:#ff3366;box-shadow:0 0 15px rgba(255,51,102,.4)}
.match-card.dimmed{opacity:.35;pointer-events:none}
.match-arrow{font-size:28px;color:var(--room-color);opacity:.5}
.completed-pairs{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.completed-pair{font-size:clamp(11px,1.3vw,13px);color:rgba(0,255,136,.7);text-align:center}

/* === SEQUENCE LOCK === */
.seq-slots{display:flex;gap:12px;margin-bottom:16px;justify-content:center}
.seq-slot{width:clamp(100px,18vw,160px);min-height:60px;border:2px dashed rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,1.4vw,15px);color:rgba(255,255,255,.3);transition:all .4s ease;padding:8px}
.seq-slot.filled{border-style:solid;border-color:#00ff88;background:rgba(0,255,136,.1);color:#00ff88;box-shadow:0 0 10px rgba(0,255,136,.3)}
.seq-slot.active{border-color:var(--room-color);box-shadow:0 0 15px rgba(255,255,255,.1)}
.seq-arrows{display:flex;align-items:center;gap:0}
.seq-arrow{color:var(--room-color);font-size:20px;opacity:.4;margin:0 -4px}
.seq-options{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.seq-card{padding:12px 20px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:12px;font-size:clamp(13px,1.5vw,16px);font-weight:600;color:var(--text);cursor:pointer;transition:all .3s ease;min-height:48px;display:flex;align-items:center;gap:6px}
.seq-card:hover{border-color:var(--room-color);box-shadow:0 0 12px rgba(255,255,255,.1)}
.seq-card.locked{border-color:#00ff88;background:rgba(0,255,136,.1);pointer-events:none;opacity:.5}
.seq-card.wrong-flash{animation:wrongShake .5s ease;border-color:#ff3366}

/* === SYSTEM SCANNER GAUGES === */
.gauges-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:500px;margin-bottom:20px}
.gauge{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-bar-wrap{width:40px;height:clamp(80px,12vh,120px);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;position:relative;overflow:hidden}
.gauge-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 7px 7px;transition:height 1s ease}
.gauge-label{font-size:clamp(9px,1.1vw,11px);color:rgba(255,255,255,.6);text-align:center;font-weight:600}
.gauge-reading{font-size:clamp(9px,1vw,11px);color:var(--room-color);font-weight:700}
.gauge-icon{font-size:16px}
.gauge-danger{animation:dangerFlash 1s ease infinite}

/* === VISUAL RECALL === */
.visual-scene{display:flex;gap:16px;width:100%;max-width:600px;margin-bottom:16px;justify-content:center}
.scene-half{flex:1;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;min-height:clamp(120px,18vh,180px);display:flex;flex-direction:column;align-items:center;position:relative}
.scene-label{font-size:clamp(10px,1.2vw,12px);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.villi-container{display:flex;gap:clamp(4px,.6vw,8px);align-items:flex-end;flex:1;padding-bottom:4px}
.villus{width:clamp(12px,2vw,18px);border-radius:8px 8px 2px 2px;transition:all .3s ease;position:relative}
.villus-arrow{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:10px;color:#00ff88}
.meter-bar{width:100%;height:16px;background:rgba(255,255,255,.08);border-radius:8px;margin-top:6px;overflow:hidden;position:relative}
.meter-fill{height:100%;border-radius:8px;transition:width 1s ease}
.meter-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--white)}

/* === QUICK FIRE === */
.qf-statement{font-size:clamp(15px,2vw,20px);color:var(--white);font-weight:700;text-align:center;margin-bottom:20px;min-height:48px;display:flex;align-items:center;justify-content:center}
.qf-buttons{display:flex;gap:16px}
.qf-btn{min-width:clamp(100px,15vw,140px);min-height:56px;font-size:clamp(15px,2vw,20px);font-weight:800;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .3s ease}
.qf-confirm{background:rgba(0,255,136,.1);border:2px solid #00ff88;color:#00ff88}
.qf-confirm:hover{background:rgba(0,255,136,.2);box-shadow:0 0 20px rgba(0,255,136,.3)}
.qf-reject{background:rgba(255,51,102,.1);border:2px solid #ff3366;color:#ff3366}
.qf-reject:hover{background:rgba(255,51,102,.2);box-shadow:0 0 20px rgba(255,51,102,.3)}
.qf-btn.flash-correct{background:rgba(0,255,136,.3);box-shadow:0 0 30px rgba(0,255,136,.5)}
.qf-btn.flash-wrong{background:rgba(255,51,102,.3);box-shadow:0 0 30px rgba(255,51,102,.5)}
.qf-progress{display:flex;gap:8px;margin-top:16px}
.qf-dot{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s ease}
.qf-dot.correct{background:rgba(0,255,136,.15);border-color:#00ff88;color:#00ff88}
.qf-dot.wrong{background:rgba(255,51,102,.15);border-color:#ff3366;color:#ff3366}
.qf-dot.active{border-color:var(--room-color);box-shadow:0 0 8px var(--room-color)}

/* === MYSTERY INPUT === */
.chain-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.chain-box{padding:10px 16px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.2);border-radius:10px;font-size:clamp(12px,1.4vw,15px);font-weight:600;color:var(--text);min-height:44px;display:flex;align-items:center;text-align:center}
.chain-mystery{border-color:var(--room-color);box-shadow:0 0 15px var(--room-color);animation:mysteryPulse 2s ease infinite;color:var(--room-color);font-size:clamp(16px,2vw,22px);font-weight:800}
.chain-mystery.filled{animation:none;color:#00ff88;border-color:#00ff88;box-shadow:0 0 15px rgba(0,255,136,.4)}
.chain-arrow-icon{font-size:20px;color:var(--room-color);opacity:.5}

/* === DIAGNOSTIC PANEL === */
.diag-panel{width:100%;max-width:500px}
.diag-slots{display:flex;gap:16px;margin-bottom:16px;justify-content:center}
.diag-slot{flex:1;min-height:60px;border:2px dashed rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,1.4vw,15px);color:rgba(255,255,255,.3);transition:all .4s ease;padding:10px;text-align:center;cursor:pointer}
.diag-slot.active{border-color:var(--room-color);box-shadow:0 0 12px rgba(255,255,255,.1)}
.diag-slot.filled{color:var(--text);font-weight:600}
.diag-slot.locked{border-style:solid;border-color:#00ff88;background:rgba(0,255,136,.1);color:#00ff88;pointer-events:none;box-shadow:0 0 10px rgba(0,255,136,.3)}
.diag-slot.wrong-flash{animation:wrongShake .5s ease;border-color:#ff3366}
.diag-slot.dimmed{opacity:.4;pointer-events:none}
.parts-bank{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.part-chip{padding:10px 16px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:20px;font-size:clamp(12px,1.3vw,14px);font-weight:600;color:var(--text);cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:4px}
.part-chip:hover{border-color:var(--room-color)}
.part-chip.used{opacity:.3;pointer-events:none}

/* === SCANNER OVERLAY === */
.scanner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.scanner-overlay.active{display:flex}
.scanner-text{max-width:500px;font-size:clamp(14px,1.8vw,18px);color:var(--room-color);text-align:center;line-height:1.6;margin-bottom:20px}
.scanner-dismiss{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:8px 20px;border-radius:20px;font-size:13px;transition:all .3s ease}
.scanner-dismiss:hover{background:rgba(255,255,255,.15)}
.scanner-header{font-size:clamp(10px,1.2vw,12px);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}

/* === SCAN PREVIEW === */
.scan-preview{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:180;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.scan-preview.active{display:flex}
.scan-frame{border:2px solid var(--room-color);border-radius:16px;padding:24px;max-width:500px;width:90%;box-shadow:0 0 30px var(--room-color);position:relative}
.scan-header{font-size:clamp(10px,1.2vw,12px);color:var(--room-color);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:12px;animation:scannerPulse 2s ease infinite}
.scan-body{font-size:clamp(13px,1.6vw,16px);color:var(--text);line-height:1.6;text-align:center}
.scan-continue{margin-top:16px;background:var(--room-color);color:var(--bg);font-weight:700;padding:10px 28px;border-radius:25px;font-size:14px;transition:all .3s ease}

/* === CODE ENTRY === */
.code-entry-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:190;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.code-entry-overlay.active{display:flex}
.code-title{font-size:clamp(18px,3vw,28px);color:var(--room-color);font-weight:800;margin-bottom:8px}
.code-subtitle{font-size:clamp(12px,1.5vw,16px);color:rgba(255,255,255,.6);margin-bottom:20px}
.code-digits{display:flex;gap:12px;margin-bottom:20px}
.code-digit-input{width:clamp(48px,8vw,64px);height:clamp(56px,9vw,72px);background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.2);border-radius:12px;font-size:clamp(24px,4vw,36px);font-weight:800;color:var(--white);text-align:center;transition:all .3s ease}
.code-digit-input:focus{border-color:var(--room-color);box-shadow:0 0 15px var(--room-color);outline:none}
.code-submit{background:var(--room-color);color:var(--bg);font-size:clamp(14px,1.8vw,18px);font-weight:700;padding:12px 36px;border-radius:30px;margin-top:8px;transition:all .3s ease}
.code-submit:hover{box-shadow:0 0 25px var(--room-color)}
.code-error{color:#ff3366;font-size:14px;margin-top:8px;opacity:0;transition:opacity .3s ease}
.code-error.show{opacity:1}

/* === PASS THE LAPTOP === */
.pass-laptop-overlay{display:none;position:fixed;inset:0;z-index:195;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pass-laptop-overlay.active{display:flex}
.pass-text{font-size:clamp(28px,5vw,48px);font-weight:900;color:var(--white);text-shadow:0 0 30px var(--room-color);animation:passTextPulse 1s ease infinite;margin-bottom:24px}
.pass-ready{background:var(--room-color);color:var(--bg);font-size:clamp(16px,2.2vw,22px);font-weight:700;padding:14px 40px;border-radius:30px;transition:all .3s ease}

/* === DIGIT REVEAL === */
.digit-reveal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:210;flex-direction:column;align-items:center;justify-content:center}
.digit-reveal-overlay.active{display:flex}
.digit-big{font-size:clamp(80px,15vw,140px);font-weight:900;color:var(--room-color);text-shadow:0 0 60px var(--room-color),0 0 120px var(--room-color);animation:digitReveal .8s ease;opacity:0;animation-fill-mode:forwards}
.digit-label{font-size:clamp(12px,1.5vw,16px);color:rgba(255,255,255,.5);margin-top:8px}
.digit-continue{margin-top:24px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--white);padding:10px 28px;border-radius:25px;font-size:14px;opacity:0;animation:fadeIn .5s ease .8s forwards}

/* === DOOR TRANSITION === */
.door-overlay{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;pointer-events:none}
.door-panel{width:80%;max-width:400px;height:70%;background:var(--bg);border:3px solid var(--room-color);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 60px var(--room-color);animation:doorOpen 1.2s ease forwards}
.door-panel .lock-icon{font-size:48px;animation:lockPulse .4s ease .1s}
.door-panel .door-room-text{font-size:clamp(14px,2vw,20px);color:var(--room-color);font-weight:700;margin-top:12px;opacity:0;animation:fadeIn .3s ease .05s forwards}
.final-door .door-panel{animation:doorOpen 1.8s ease forwards}
.final-door .final-text{font-size:clamp(20px,3vw,32px);color:var(--white);font-weight:900;text-shadow:0 0 30px var(--room-color);margin-top:8px;opacity:0;animation:fadeIn .3s ease .2s forwards}

/* === ESCAPE REPORT === */
#escapeReport{background:radial-gradient(ellipse at center,#1e2a4a 0%,var(--bg) 70%);overflow-y:auto;padding:40px 20px;text-align:center}
.report-brand{font-size:clamp(9px,1.2vw,11px);color:var(--teal);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.escaped-text{font-size:clamp(36px,7vw,64px);font-weight:900;color:var(--white);text-shadow:0 0 40px rgba(0,188,212,.5),0 0 80px rgba(0,188,212,.2);margin-bottom:8px;animation:escapedGlow 2s ease infinite}
.report-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;max-width:500px;margin:16px auto;text-align:left}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.report-row:last-child{border-bottom:none}
.report-label{color:rgba(255,255,255,.6);font-size:clamp(12px,1.4vw,15px)}
.report-value{color:var(--white);font-weight:700;font-size:clamp(14px,1.6vw,17px)}
.report-stars{display:flex;gap:4px;margin:12px auto;justify-content:center}
.report-star{font-size:clamp(28px,5vw,40px);opacity:.2;transition:all .5s ease}
.report-star.earned{opacity:1;animation:starFill .5s ease}
.report-badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.badge{padding:6px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:clamp(11px,1.3vw,13px);color:var(--text)}
.badge.earned{border-color:var(--gold);color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.2)}
.report-room{display:flex;align-items:center;gap:8px;padding:4px 0}
.report-room-dot{width:10px;height:10px;border-radius:50%}
.report-btns{display:flex;gap:12px;justify-content:center;margin-top:20px}
.report-btn{padding:12px 28px;border-radius:25px;font-size:14px;font-weight:600;transition:all .3s ease}
.btn-copy{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:var(--white)}
.btn-copy:hover{background:rgba(255,255,255,.15)}
.btn-again{background:var(--teal);color:var(--bg);border:none}
.btn-again:hover{box-shadow:0 0 20px rgba(0,188,212,.4)}

/* === ROOM ATMOSPHERE === */
.room-bg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.room-bg-gradient{position:absolute;inset:0;opacity:.3;transition:background 1s ease}
.room-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px}

/* === TUTORIAL === */
.tutorial-skip{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);padding:6px 16px;border-radius:20px;font-size:12px;z-index:60}
.tutorial-title{font-size:clamp(20px,3vw,30px);color:var(--teal);font-weight:800;margin-bottom:4px}
.tutorial-sub{font-size:clamp(12px,1.5vw,16px);color:rgba(255,255,255,.5);margin-bottom:20px}

/* === FINAL LOCK === */
.final-lock-header{font-size:clamp(20px,3vw,30px);font-weight:900;color:var(--white);text-shadow:0 0 20px rgba(255,255,255,.3);margin-bottom:4px;animation:fadeIn .5s ease}
.final-lock-sub{color:rgba(255,255,255,.5);font-size:clamp(11px,1.3vw,14px);margin-bottom:16px}
.final-match-area{display:flex;gap:24px;align-items:flex-start;justify-content:center;width:100%}
.final-col{display:flex;flex-direction:column;gap:10px}
.final-card{padding:12px 18px;border:2px solid rgba(255,255,255,.15);border-radius:12px;font-size:clamp(12px,1.4vw,15px);font-weight:600;cursor:pointer;transition:all .3s ease;min-height:48px;min-width:clamp(120px,16vw,180px);display:flex;align-items:center;gap:6px;text-align:center;justify-content:center}
.final-card.term{background:rgba(255,255,255,.04)}
.final-card.target{background:rgba(255,255,255,.04)}
.final-card.selected{transform:scale(1.05);box-shadow:0 0 20px rgba(255,255,255,.2)}
.final-card.matched{pointer-events:none;box-shadow:0 0 12px rgba(0,255,136,.3);border-color:#00ff88;background:rgba(0,255,136,.08)}
.final-card.wrong-flash{animation:wrongShake .5s ease;border-color:#ff3366}

/* === PARTICLES === */
.particle{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:500}

/* === KEYFRAME ANIMATIONS === */
@keyframes countPulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes firePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.8}}
@keyframes scannerPulse{0%,100%{box-shadow:0 0 8px var(--room-color)}50%{box-shadow:0 0 20px var(--room-color)}}
@keyframes correctFlash{0%{box-shadow:0 0 0 rgba(0,255,136,0)}50%{box-shadow:0 0 30px rgba(0,255,136,.6)}100%{box-shadow:0 0 15px rgba(0,255,136,.3)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes digitReveal{0%{opacity:0;transform:scale(.3)}60%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes digitUnlock{0%{transform:scale(1)}50%{transform:scale(1.3);box-shadow:0 0 20px var(--room-color)}100%{transform:scale(1)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes doorOpen{0%{opacity:0;transform:scale(.95)}25%{opacity:1;transform:scale(1)}55%{transform:translateX(0)}100%{opacity:0;transform:translateX(-120%)}}
@keyframes lockPulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes mysteryPulse{0%,100%{box-shadow:0 0 10px var(--room-color)}50%{box-shadow:0 0 25px var(--room-color)}}
@keyframes overridePulse{0%,100%{box-shadow:0 0 15px var(--room-color)}50%{box-shadow:0 0 35px var(--room-color)}}
@keyframes dangerFlash{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes passTextPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.02)}}
@keyframes escapedGlow{0%,100%{text-shadow:0 0 40px rgba(0,188,212,.5)}50%{text-shadow:0 0 60px rgba(0,188,212,.8),0 0 100px rgba(0,188,212,.3)}}
@keyframes starFill{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes particleBurst{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <div class="brand-line">Mr. Jawad's Escape Room Simulations</div>
  <div class="start-title">Digestive System</div>
  <div class="start-divider"></div>
  <div class="start-subtitle">Unit Review</div>
  <button class="start-btn" onclick="startGame()">BEGIN ESCAPE</button>
  <div class="start-footer">DESIGNED BY MR. JAWAD</div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div class="room-bg">
    <div class="room-bg-gradient" id="roomBgGradient"></div>
    <div class="room-bg-grid"></div>
  </div>
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="room-label" id="roomLabel"></span>
      <span class="room-progress" id="roomProgress"></span>
    </div>
    <div class="topbar-right">
      <span class="streak-fire" id="streakFire">🔥</span>
      <span class="puzzles-cleared">Puzzles Cleared: <span class="count" id="puzzlesCount">0</span>/6</span>
    </div>
  </div>
  <!-- Code Vault -->
  <div class="code-vault" id="codeVault">
    <div class="vault-title">Code Vault</div>
    <div class="vault-rooms">
      <div class="vault-room"><div class="vault-room-label" style="color:#00ff88">🧬 R1</div><div class="vault-digits"><div class="vault-digit" id="v-r1d1">?</div><div class="vault-digit" id="v-r1d2">?</div></div></div>
      <div class="vault-room"><div class="vault-room-label" style="color:#ff8c00">⚗️ R2</div><div class="vault-digits"><div class="vault-digit" id="v-r2d1">?</div><div class="vault-digit" id="v-r2d2">?</div></div></div>
      <div class="vault-room"><div class="vault-room-label" style="color:#ff3366">🔴 R3</div><div class="vault-digits"><div class="vault-digit" id="v-r3d1">?</div><div class="vault-digit" id="v-r3d2">?</div></div></div>
    </div>
  </div>
  <!-- Mission Line -->
  <div class="mission-line" id="missionLine"></div>
  <!-- Puzzle Area -->
  <div class="puzzle-area" id="puzzleArea"></div>
  <!-- Bottom Bar -->
  <div class="bottombar" id="bottomBar">
    <button class="scanner-btn" id="scannerBtn" onclick="openScanner()">🔍 Scanner</button>
    <div class="progress-dots" id="progressDots"></div>
    <div style="width:80px"></div>
  </div>
</div>

<!-- SCANNER OVERLAY -->
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-header">🔍 SCANNER ACTIVE</div>
  <div class="scanner-text" id="scannerText"></div>
  <button class="scanner-dismiss" onclick="closeScanner()">Dismiss</button>
</div>

<!-- SCAN PREVIEW -->
<div class="scan-preview" id="scanPreview">
  <div class="scan-frame" id="scanFrame">
    <div class="scan-header">🔍 SCANNING ROOM...</div>
    <div class="scan-body" id="scanBody"></div>
    <button class="scan-continue" id="scanContinue" onclick="closeScanPreview()">Tap to continue</button>
  </div>
</div>

<!-- CODE ENTRY -->
<div class="code-entry-overlay" id="codeEntryOverlay">
  <div class="code-title" id="codeEntryTitle">Enter Exit Code</div>
  <div class="code-subtitle" id="codeEntrySubtitle"></div>
  <div class="code-digits">
    <input class="code-digit-input" id="codeDigit1" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
    <input class="code-digit-input" id="codeDigit2" type="text" maxlength="1" inputmode="numeric" autocomplete="off">
  </div>
  <button class="code-submit" onclick="submitCode()">UNLOCK</button>
  <div class="code-error" id="codeError">✖ Wrong code — try again</div>
</div>

<!-- PASS THE LAPTOP -->
<div class="pass-laptop-overlay" id="passLaptop">
  <div class="pass-text">PASS THE LAPTOP</div>
  <button class="pass-ready" id="passReadyBtn" onclick="passReady()">Ready</button>
</div>

<!-- DIGIT REVEAL -->
<div class="digit-reveal-overlay" id="digitReveal">
  <div class="digit-big" id="digitBig"></div>
  <div class="digit-label" id="digitLabel"></div>
  <button class="digit-continue" id="digitContinue">Continue</button>
</div>

<!-- ESCAPE REPORT -->
<div id="escapeReport" class="screen">
  <div class="report-brand">Mr. Jawad's Escape Room Simulations</div>
  <div class="escaped-text">ESCAPED!</div>
  <div class="report-stars" id="reportStars"></div>
  <div class="report-card" id="reportCard"></div>
  <div class="report-badges" id="reportBadges"></div>
  <div class="report-btns">
    <button class="report-btn btn-copy" onclick="copyReport()">📋 Copy Report</button>
    <button class="report-btn btn-again" onclick="location.reload()">🔄 Play Again</button>
  </div>
</div>

<script>
// ===========================
// STATE MANAGEMENT
// ===========================
const ROOMS = [
  {
    name:'Gut Transit',emoji:'🧬',color:'#00ff88',accent:'#004d29',light:'rgba(0,255,136,.15)',
    code:'47',digits:['4','7'],
    mission:'Restore the transit system before the pathway shuts down.',
    scanPreviews:[
      "The Scanner runs a preliminary sweep — the Story Map's digestion pathway appears: food being crushed in the mouth, acid swirling in the stomach, and tiny bumps absorbing nutrients in the small intestine.",
      "The Scanner runs a preliminary sweep — the Story Map's key organ visuals appear: the stomach with acid swirling, the intestine wall with finger-like bumps, and the squeezing muscle arrows."
    ],
    puzzles:[
      {
        type:'sequence',title:'Sequence Lock',digit:'4',
        cards:[{label:'Food crushed',icon:'🦷'},{label:'Acids dissolve',icon:'🧪'},{label:'Nutrients absorbed',icon:'💚'}],
        scannerText:"Scanning The Food Journey — the digestive path has three stages. Food gets broken physically first, then chemicals take over, then something happens in the small intestine.",
        strongScanner:['Food crushed','Acids dissolve']
      },
      {
        type:'match',title:'Match Lock',digit:'7',
        pairs:[
          {term:'Peristalsis',match:'Rhythmic squeezing 💪',distractors:['Acid coating','Nutrient capture']},
          {term:'Villi',match:'Finger-like bumps 🖐️',distractors:['Stomach muscles','Acid droplets']},
          {term:'Gastric acid',match:'pH 1–2 acid 🧪',distractors:['Protective coating','Squeezing waves']}
        ],
        scannerText:"Scanning The Food Journey — check the organ diagram. Three parts of the digestive tract had three different jobs. Picture what each part looked like."
      }
    ],
    transitionEmoji:'⚗️',transitionText:'THE ACID CHAMBER'
  },
  {
    name:'The Acid Chamber',emoji:'⚗️',color:'#ff8c00',accent:'#4d2900',light:'rgba(255,140,0,.15)',
    code:'29',digits:['2','9'],
    mission:'Stabilize the acid levels and restore absorption power.',
    scanPreviews:[
      "The Scanner runs a preliminary sweep — the Acid Lab simulation appears: the acid level slider, the food breakdown meter filling up, and the lining health bar dropping into red.",
      "The Scanner runs a preliminary sweep — the Absorption Zone simulation appears: the intestine cross-section showing villi density going from flat to densely packed bumps, with the absorption percentage climbing."
    ],
    puzzles:[
      {
        type:'system_scanner',title:'System Scanner',digit:'2',
        gauges:[
          {label:'Acid Level',reading:'HIGH',percent:95,color:'#ff8c00',icon:'🧪'},
          {label:'Enzyme Level',reading:'LOW',percent:15,color:'#666',icon:'🔬'},
          {label:'Food Breakdown',reading:'85%',percent:85,color:'#00ff88',icon:'🍖'},
          {label:'Lining Health',reading:'38%',percent:38,color:'#ff3366',icon:'⚠️',danger:true}
        ],
        question:'Why is lining health low?',
        options:[
          {text:'High acid burns lining',correct:true},
          {text:'Enzymes damaged it',correct:false},
          {text:'Low enzyme weakened it',correct:false}
        ],
        scannerText:"Scanning the Acid Lab — check the lining health gauge. When acid was cranked high, the red bar dropped while breakdown climbed.",
        strongOptions:['High acid burns lining','Enzymes damaged it']
      },
      {
        type:'mystery',title:'Mystery Input',digit:'9',
        chain:['Villi density increases','Surface area increases','???'],
        options:[
          {text:'Absorption rises',correct:true},
          {text:'Digestion speeds up',correct:false},
          {text:'Enzyme count rises',correct:false}
        ],
        scannerText:"Scanning Absorption Zone — check the absorption meter. When villi density went from None to Packed, surface area grew and something else climbed with it.",
        strongOptions:['Absorption rises','Digestion speeds up']
      }
    ],
    transitionEmoji:'🔴',transitionText:'SYSTEM MELTDOWN'
  },
  {
    name:'System Meltdown',emoji:'🔴',color:'#ff3366',accent:'#4d0f1e',light:'rgba(255,51,102,.15)',
    code:'51',digits:['5','1'],
    mission:'Diagnose the failures before the system crashes.',
    scanPreviews:[
      "The Scanner runs a preliminary sweep — the Informational Reading's villi comparison appears: healthy tall villi on one side, flattened villi on the other, with the absorption meter dropping to near-zero.",
      "The Scanner runs a preliminary sweep — multiple failure scenario icons from the reading appear: the battery icon, the bezoar blockage, the antacid bottle, and the flattened villi."
    ],
    puzzles:[
      {
        type:'visual_recall',title:'Visual Recall',digit:'5',
        question:'What happens when villi flatten?',
        options:[
          {text:'Absorption fails',correct:true},
          {text:'Acid increases',correct:false},
          {text:'Peristalsis speeds up',correct:false}
        ],
        scannerText:"Scanning Digestive System Failures — the Shrinking Athlete scenario. Check what happened to the villi, then look at the absorption reading when they went flat.",
        strongOptions:['Absorption fails','Peristalsis speeds up']
      },
      {
        type:'quick_fire',title:'Quick Fire',digit:'1',
        statements:[
          {text:'Enzymes need acid to activate',answer:true},
          {text:'Mucus lining protects stomach from acid',answer:true},
          {text:'Villi flatten to boost absorption',answer:false},
          {text:'A bezoar blocks the stomach exit',answer:true}
        ],
        scannerText:"Scanning Digestive System Failures — each scenario showed one thing going wrong. Check what happened to the system when each failure hit — did things get better or worse?"
      }
    ],
    transitionEmoji:null,transitionText:null
  }
];

const FINAL_LOCK={
  pairs:[
    {term:'Peristalsis',target:'Pushes food forward',color:'#00ff88',emoji:'🧬'},
    {term:'High acid, no mucus',target:'Lining health drops',color:'#ff8c00',emoji:'⚗️'},
    {term:'Villi flatten',target:'Absorption fails',color:'#ff3366',emoji:'🔴'}
  ]
};

let state={
  screen:'start',currentRoom:0,currentPuzzle:0,
  puzzlesSolved:0,firstTrySolves:0,streak:0,
  roomFirstTries:[0,0,0],roomScannerUsed:[false,false,false],roomAttempts:[[0,0],[0,0],[0,0]],
  wrongCount:0,overrideTriggered:false,puzzleSolving:false,scannerShown:false,
  startTime:null,
  // Quick fire state
  qfIndex:0,qfCorrect:0,qfWrongTotal:0,qfResults:[],qfRetryIndices:[],
  // Sequence state
  seqStep:0,
  // Match state
  matchPair:0,matchSelected:null,
  // Diagnostic state
  diagSlot:0,diagFilledChip:null,
  // Final lock state
  finalSelected:null,finalMatched:[false,false,false],
  // Badges
  badges:{cleanRoom:[false,false,false],comeback:false,noScanner:[true,true,true],deepScan:false},
  // Emergency skip
  shiftSStartTime:null,
  // Room skipped
  roomSkipped:[false,false,false],
  // Scan preview
  previewDone:false,
  // Game complete
  gameComplete:false
};

// ===========================
// UTILITY FUNCTIONS
// ===========================
function $(id){return document.getElementById(id)}
function closeAllOverlays(){
  try{
    ['scannerOverlay','scanPreview','codeEntryOverlay','passLaptop','digitReveal'].forEach(id=>{
      const el=$(id);if(el)el.classList.remove('active');
    });
  }catch(e){}
}
function closeScanner(){try{$('scannerOverlay').classList.remove('active')}catch(e){}}
function setRoomTheme(room){
  try{
    const r=ROOMS[room];
    document.documentElement.style.setProperty('--room-color',r.color);
    document.documentElement.style.setProperty('--room-accent',r.accent);
    document.documentElement.style.setProperty('--room-light',r.light);
    $('roomBgGradient').style.background=`radial-gradient(ellipse at center,${r.accent} 0%,var(--bg) 70%)`;
  }catch(e){}
}
function spawnParticles(x,y,color,count){
  try{
    const ct=Math.min(count||10,12);
    for(let i=0;i<ct;i++){
      const p=document.createElement('div');
      p.className='particle';
      const angle=Math.random()*Math.PI*2;
      const dist=60+Math.random()*80;
      p.style.cssText=`left:${x}px;top:${y}px;background:${color};--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;animation:particleBurst .6s ease forwards;`;
      document.body.appendChild(p);
      const cleanup=()=>{try{p.remove()}catch(e){}};
      p.addEventListener('animationend',cleanup,{once:true});
      setTimeout(cleanup,800);
    }
  }catch(e){}
}
function updatePuzzlesCleared(){
  try{
    const c=$('puzzlesCount');
    c.textContent=state.puzzlesSolved;
    c.classList.remove('pulse');
    void c.offsetWidth;
    c.classList.add('pulse');
  }catch(e){}
}
function updateStreak(){
  try{
    const f=$('streakFire');
    if(state.streak>=2)f.classList.add('active');
    else f.classList.remove('active');
  }catch(e){}
}
function updateProgressDots(){
  try{
    const d=$('progressDots');
    d.innerHTML='';
    for(let i=0;i<2;i++){
      const dot=document.createElement('div');
      dot.className='progress-dot'+(i<state.currentPuzzle?' filled':'');
      d.appendChild(dot);
    }
  }catch(e){}
}
function updateVaultDigit(room,puzzle,digit){
  try{
    const id=`v-r${room+1}d${puzzle+1}`;
    const el=$(id);
    if(el){
      el.textContent=digit;
      el.classList.add('revealed');
      el.style.setProperty('--room-color',ROOMS[room].color);
    }
  }catch(e){}
}
function getEarnedDigitsText(room){
  try{
    const r=ROOMS[room];
    const d1=$(`v-r${room+1}d1`).textContent;
    const d2=$(`v-r${room+1}d2`).textContent;
    return `Your digits: ${d1} ${d2}`;
  }catch(e){return ''}
}

// ===========================
// SCREEN MANAGEMENT
// ===========================
function showScreen(id){
  try{
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    $(id).classList.add('active');
  }catch(e){}
}

// ===========================
// START GAME
// ===========================
function startGame(){
  try{
    state.startTime=Date.now();
    showScreen('gameScreen');
    $('codeVault').classList.add('visible');
    showTutorial();
  }catch(e){console.error('startGame error',e)}
}

// ===========================
// TUTORIAL
// ===========================
function showTutorial(){
  try{
    $('roomLabel').textContent='Tutorial';
    $('roomProgress').textContent='';
    $('missionLine').textContent='Learn the tap mechanic before your escape begins.';
    $('bottomBar').style.display='none';
    document.documentElement.style.setProperty('--room-color','var(--teal)');
    $('roomBgGradient').style.background='radial-gradient(ellipse at center,#0a2a2e 0%,var(--bg) 70%)';
    
    const area=$('puzzleArea');
    area.innerHTML=`
      <button class="tutorial-skip" onclick="endTutorial()">Skip Tutorial</button>
      <div class="tutorial-title">Tutorial Lock</div>
      <div class="tutorial-sub">Tap a word on the LEFT, then tap its match on the RIGHT.</div>
      <div class="puzzle-content" id="tutorialContent"></div>
    `;
    
    const tutPairs=[{term:'Sun ☀️',match:'Hot 🔥'},{term:'Ice ❄️',match:'Cold 🥶'}];
    let tutPair=0,tutSel=null;
    
    function renderTutPair(){
      const tc=$('tutorialContent');
      if(!tc)return;
      const p=tutPairs[tutPair];
      const wrongOpts=tutPair===0?['Cold 🥶']:['Hot 🔥'];
      const allOpts=[p.match,...wrongOpts].sort(()=>Math.random()-.5);
      
      tc.innerHTML=`
        <div class="micro-progress">Pair ${tutPair+1} of 2</div>
        <div class="match-area">
          <div class="match-col"><div class="match-card" id="tutTerm" data-val="${p.term}">${p.term}</div></div>
          <div class="match-arrow">→</div>
          <div class="match-col" id="tutOptions"></div>
        </div>
        <div class="completed-pairs" id="tutCompleted"></div>
      `;
      const optCol=$('tutOptions');
      allOpts.forEach(o=>{
        const card=document.createElement('div');
        card.className='match-card';
        card.textContent=o;
        card.dataset.val=o;
        card.dataset.correct=o===p.match?'true':'false';
        card.addEventListener('click',function(){
          if(this.classList.contains('matched'))return;
          const termEl=$('tutTerm');
          if(!termEl.classList.contains('selected')){
            termEl.classList.add('selected');
          }
          if(this.dataset.correct==='true'){
            this.classList.add('correct','matched');
            termEl.classList.add('matched');
            setTimeout(()=>{
              tutPair++;
              if(tutPair>=tutPairs.length)endTutorial();
              else renderTutPair();
            },600);
          }else{
            this.classList.add('wrong');
            setTimeout(()=>this.classList.remove('wrong'),500);
          }
        });
        optCol.appendChild(card);
      });
    }
    renderTutPair();
  }catch(e){console.error('tutorial error',e);endTutorial();}
}

function endTutorial(){
  try{
    $('bottomBar').style.display='flex';
    startRoom(0);
  }catch(e){console.error('endTutorial error',e)}
}

// SCAN PREVIEW
// ===========================
function showScanPreview(roomIndex,puzzleIndex){

function closeScanPreview(){/* handled by onclick above */}

function finishScanPreview(roomIndex,puzzleIndex){

    loadPuzzle(roomIndex,puzzleIndex);

// ===========================
// PUZZLE LOADER
// ===========================
function loadPuzzle(roomIndex,puzzleIndex){
  try{
    state.currentRoom=roomIndex;
    state.currentPuzzle=puzzleIndex;
    state.wrongCount=0;
    state.overrideTriggered=false;
    state.puzzleSolving=false;
    state.scannerShown=false;
    closeAllOverlays();
    updateProgressDots();
    
    const room=ROOMS[roomIndex];
    const puzzle=room.puzzles[puzzleIndex];
    
    switch(puzzle.type){
      case 'sequence':renderSequence(room,puzzle);break;
      case 'match':renderMatch(room,puzzle);break;
      case 'system_scanner':renderSystemScanner(room,puzzle);break;
      case 'mystery':renderMystery(room,puzzle);break;
      case 'visual_recall':renderVisualRecall(room,puzzle);break;
      case 'quick_fire':renderQuickFire(room,puzzle);break;
      default:console.error('Unknown puzzle type',puzzle.type);
    }
    
    // Setup scanner button
    $('scannerBtn').onclick=function(){openScannerManual()};
    $('scannerBtn').style.color=room.color;
  }catch(e){console.error('loadPuzzle error',e)}
}

// ===========================
// SCANNER SYSTEM
// ===========================
function openScanner(){
  try{
    const room=ROOMS[state.currentRoom];
    const puzzle=room.puzzles[state.currentPuzzle];
    $('scannerText').textContent=puzzle.scannerText||'Scanning...';
    $('scannerOverlay').classList.add('active');
    state.scannerShown=true;
    state.badges.noScanner[state.currentRoom]=false;
  }catch(e){}
}
function openScannerManual(){openScanner();}

function handleWrongAnswer(onNarrow){
  try{
    state.wrongCount++;
    state.roomAttempts[state.currentRoom][state.currentPuzzle]++;
    
    if(state.wrongCount===1){
      // First wrong: auto-activate scanner + narrow options
      openScanner();
      if(typeof onNarrow==='function')onNarrow();
    }else if(state.wrongCount>=2&&!state.overrideTriggered){
      state.overrideTriggered=true;
      closeScanner();
      triggerOverride();
    }
  }catch(e){}
}

function triggerOverride(){
  // Override is implemented per-puzzle type in their render functions
  // This is called after the puzzle-specific wrong handler runs
}

// ===========================
// PUZZLE SOLVED
// ===========================
function puzzleSolved(digit){
  try{
    if(state.puzzleSolving)return;
    state.puzzleSolving=true;
    closeScanner();
    closeAllOverlays();
    
    state.puzzlesSolved++;
    updatePuzzlesCleared();
    
    // Track first try
    const attempts=state.roomAttempts[state.currentRoom][state.currentPuzzle];
    if(attempts===0){
      state.firstTrySolves++;
      state.streak++;
      state.roomFirstTries[state.currentRoom]++;
    }else{
      state.streak=0;
      if(state.scannerShown)state.badges.comeback=true;
      if(state.scannerShown&&attempts<=1)state.badges.deepScan=true;
    }
    updateStreak();
    
    // Update vault
    updateVaultDigit(state.currentRoom,state.currentPuzzle,digit);
    
    // Update progress dots
    const dots=$('progressDots').children;
    if(dots[state.currentPuzzle])dots[state.currentPuzzle].classList.add('filled');
    
    // Show digit reveal
    showDigitReveal(digit);
  }catch(e){console.error('puzzleSolved error',e)}
}

function showDigitReveal(digit){
  try{
    const room=ROOMS[state.currentRoom];
    $('digitBig').textContent=digit;
    $('digitBig').style.color=room.color;
    $('digitBig').style.textShadow=`0 0 60px ${room.color},0 0 120px ${room.color}`;
    // Reset animation
    $('digitBig').style.animation='none';
    void $('digitBig').offsetWidth;
    $('digitBig').style.animation='digitReveal .8s ease forwards';
    
    $('digitLabel').textContent=`Digit ${state.currentPuzzle+1} of 2 revealed`;
    $('digitReveal').classList.add('active');
    
    // Particles
    const rect=$('digitBig').getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2,rect.top+rect.height/2,room.color,10);
    
    $('digitContinue').onclick=function(){
      $('digitReveal').classList.remove('active');
      advanceAfterPuzzle();
    };
    // Also show continue after delay
    $('digitContinue').style.animation='none';
    void $('digitContinue').offsetWidth;
    $('digitContinue').style.animation='fadeIn .5s ease .8s forwards';
    $('digitContinue').style.opacity='0';
  }catch(e){advanceAfterPuzzle();}
}

function advanceAfterPuzzle(){
  try{
    if(state.currentPuzzle===0){
      // Load puzzle 2
      state.currentPuzzle=1;
      showScanPreview(state.currentRoom,1);
    }else{
      // Room complete — show code entry
      showCodeEntry();
    }
  }catch(e){}
}

// CODE ENTRY
// ===========================
function showCodeEntry(){
  try{
    closeAllOverlays();
    const room=ROOMS[state.currentRoom];
    $('codeEntryTitle').textContent='Enter Exit Code';
    $('codeEntryTitle').style.color=room.color;
    $('codeEntrySubtitle').textContent=getEarnedDigitsText(state.currentRoom);
    $('codeDigit1').value='';
    $('codeDigit2').value='';
    $('codeError').classList.remove('show');
    $('codeEntryOverlay').classList.add('active');
    $('codeDigit1').style.borderColor='rgba(255,255,255,.2)';
    $('codeDigit2').style.borderColor='rgba(255,255,255,.2)';
    
    // Auto-focus and auto-advance
    $('codeDigit1').focus();
    $('codeDigit1').oninput=function(){
      if(this.value.length===1)$('codeDigit2').focus();
    };
    $('codeDigit2').oninput=function(){
      if(this.value.length===1)submitCode();
    };
  }catch(e){}
}

function submitCode(){
  try{
    const room=ROOMS[state.currentRoom];
    const entered=$('codeDigit1').value+$('codeDigit2').value;
    if(entered===room.code){
      $('codeEntryOverlay').classList.remove('active');
      
      // Check clean room badge
      const attempts=state.roomAttempts[state.currentRoom];
      if(attempts[0]<=1&&attempts[1]<=1){
        state.badges.cleanRoom[state.currentRoom]=true;
      }
      
      if(state.currentRoom<2){
        showPassTheLaptop();
      }else{
        // All rooms done — show Final Lock
        showDoorTransition(null,true);
      }
    }else{
      $('codeError').classList.add('show');
      $('codeDigit1').value='';
      $('codeDigit2').value='';
      $('codeDigit1').focus();
      setTimeout(()=>$('codeError').classList.remove('show'),2000);
    }
  }catch(e){}
}

// ===========================
// DOOR TRANSITION
// ===========================
function showDoorTransition(nextRoom,isFinal){
  try{
    closeAllOverlays();
    const color=isFinal?'var(--teal)':(ROOMS[nextRoom]?ROOMS[nextRoom].color:'var(--teal)');
    const text=isFinal?'FINAL LOCK':(ROOMS[state.currentRoom]?ROOMS[state.currentRoom].transitionText||'':'');
    const emoji=isFinal?'🔒':(ROOMS[state.currentRoom]?ROOMS[state.currentRoom].transitionEmoji||'':'');
    const duration=isFinal?1800:1200;
    
    const overlay=document.createElement('div');
    overlay.className='door-overlay'+(isFinal?' final-door':'');
    overlay.innerHTML=`<div class="door-panel" style="border-color:${color};box-shadow:0 0 60px ${color}">
      <div class="lock-icon">${emoji}</div>
      <div class="door-room-text" style="color:${color}">${text}</div>
      ${isFinal?'<div class="final-text">FINAL LOCK</div>':''}
    </div>`;
    document.body.appendChild(overlay);
    
    // Safety timeout
    let doorDone=false;
    const safety=setTimeout(()=>{try{overlay.remove()}catch(e){};if(!doorDone){doorDone=true;afterDoor()}},duration+500);
    
    overlay.querySelector('.door-panel').addEventListener('animationend',function(){
      clearTimeout(safety);
      try{overlay.remove()}catch(e){}
      if(!doorDone){doorDone=true;afterDoor()}
    },{once:true});
    
    function afterDoor(){
      if(isFinal)showFinalLock();
      else if(nextRoom!==null)startRoom(nextRoom);
    }
  }catch(e){
    if(isFinal)showFinalLock();
    else if(nextRoom!==null)startRoom(nextRoom);
  }
}

// ===========================
// SEQUENCE LOCK
// ===========================
function renderSequence(room,puzzle){
  try{
    state.seqStep=0;
    const area=$('puzzleArea');
    const shuffled=[...puzzle.cards].sort(()=>Math.random()-.5);
    
    area.innerHTML=`
      <div class="puzzle-instruction">Tap the correct step in order</div>
      <div class="puzzle-title">${puzzle.title}</div>
      <div class="puzzle-content">
        <div class="micro-progress" id="seqProgress">Step 1 of 3</div>
        <div class="seq-slots" id="seqSlots">
          <div class="seq-slot active" id="seqSlot0"><span style="opacity:.4">1st</span></div>
          <div class="seq-arrow" style="color:${room.color}">→</div>
          <div class="seq-slot" id="seqSlot1"><span style="opacity:.4">2nd</span></div>
          <div class="seq-arrow" style="color:${room.color}">→</div>
          <div class="seq-slot" id="seqSlot2"><span style="opacity:.4">3rd</span></div>
        </div>
        <div class="puzzle-instruction" id="seqPrompt">What happens FIRST?</div>
        <div class="seq-options" id="seqOptions"></div>
      </div>
    `;
    
    const optContainer=$('seqOptions');
    shuffled.forEach((card,i)=>{
      const el=document.createElement('div');
      el.className='seq-card';
      el.innerHTML=`${card.icon} ${card.label}`;
      el.dataset.index=puzzle.cards.indexOf(card).toString();
      el.dataset.correct=(puzzle.cards.indexOf(card)===0)?'true':'false';
      el.addEventListener('click',function(){handleSeqPick(this,puzzle,room)});
      optContainer.appendChild(el);
    });
    
    // Override handler stored on puzzle
    puzzle._override=function(){
      try{
        const opts=$('seqOptions');
        if(!opts)return;
        const remaining=[...opts.querySelectorAll('.seq-card:not(.locked)')];
        let delay=0;
        for(let s=state.seqStep;s<3;s++){
          const correctIdx=s;
          const card=remaining.find(c=>parseInt(c.dataset.index)===correctIdx);
          if(card){
            setTimeout(()=>{
              try{
                card.classList.add('locked');
                const slot=$(`seqSlot${s}`);
                if(slot){
                  slot.innerHTML=`${puzzle.cards[s].icon} ${puzzle.cards[s].label}`;
                  slot.classList.add('filled');
                  slot.classList.remove('active');
                }
              }catch(e){}
            },delay);
            delay+=500;
          }
        }
        setTimeout(()=>puzzleSolved(puzzle.digit),delay+300);
      }catch(e){puzzleSolved(puzzle.digit);}
    };
  }catch(e){console.error('renderSequence error',e)}
}

function handleSeqPick(el,puzzle,room){
  try{
    if(el.classList.contains('locked')||el.classList.contains('wrong-flash')||state.overrideTriggered)return;
    const correctIdx=state.seqStep;
    const picked=parseInt(el.dataset.index);
    
    if(picked===correctIdx){
      // Correct
      el.classList.add('locked');
      const slot=$(`seqSlot${state.seqStep}`);
      slot.innerHTML=`${puzzle.cards[correctIdx].icon} ${puzzle.cards[correctIdx].label}`;
      slot.classList.add('filled');
      slot.classList.remove('active');
      
      state.seqStep++;
      if(state.seqStep>=3){
        $('seqProgress').textContent='Complete!';
        $('seqPrompt').textContent='';
        setTimeout(()=>puzzleSolved(puzzle.digit),500);
      }else{
        // Auto-place last card if step is 2
        if(state.seqStep===2){
          const lastCard=[...$('seqOptions').querySelectorAll('.seq-card:not(.locked)')][0];
          if(lastCard){
            setTimeout(()=>{
              lastCard.classList.add('locked');
              const s=$('seqSlot2');
              s.innerHTML=`${puzzle.cards[2].icon} ${puzzle.cards[2].label}`;
              s.classList.add('filled');
              $('seqProgress').textContent='Complete!';
              $('seqPrompt').textContent='';
              setTimeout(()=>puzzleSolved(puzzle.digit),500);
            },400);
          }
          return;
        }
        $('seqProgress').textContent=`Step ${state.seqStep+1} of 3`;
        $('seqPrompt').textContent='What happens NEXT?';
        const nextSlot=$(`seqSlot${state.seqStep}`);
        if(nextSlot)nextSlot.classList.add('active');
        // Un-dim all remaining cards
        [...$('seqOptions').querySelectorAll('.seq-card:not(.locked)')].forEach(c=>{
          c.classList.remove('dimmed');c.style.opacity='';c.style.pointerEvents='';
        });
      }
    }else{
      // Wrong
      el.classList.add('wrong-flash');
      setTimeout(()=>el.classList.remove('wrong-flash'),500);
      
      handleWrongAnswer(()=>{
        // Narrow to 2 options for current step
        try{
          if(puzzle.strongScanner){
            // Already narrowed by scanner text
          }
        }catch(e){}
      });
      
      if(state.overrideTriggered&&puzzle._override){
        setTimeout(()=>puzzle._override(),300);
      }
    }
  }catch(e){}
}

// ===========================
// MATCH LOCK
// ===========================
function renderMatch(room,puzzle){
  try{
    state.matchPair=0;
    state.matchSelected=null;
    
    const area=$('puzzleArea');
    area.innerHTML=`
      <div class="puzzle-instruction">👆 Tap a word on the LEFT, then tap its match on the RIGHT.</div>
      <div class="puzzle-title">${puzzle.title}</div>
      <div class="puzzle-content">
        <div class="micro-progress" id="matchProgress">Pair 1 of 3</div>
        <div class="match-area" id="matchArea"></div>
        <div class="completed-pairs" id="matchCompleted"></div>
      </div>
    `;
    
    renderMatchPair(puzzle,room);
    
    puzzle._override=function(){
      try{
        let delay=0;
        for(let p=state.matchPair;p<puzzle.pairs.length;p++){
          setTimeout(()=>{
            try{
              const comp=$('matchCompleted');
              if(comp){
                const pair=puzzle.pairs[p];
                comp.innerHTML+=`<div class="completed-pair">✔ ${pair.term} → ${pair.match}</div>`;
              }
            }catch(e){}
          },delay);
          delay+=500;
        }
        setTimeout(()=>puzzleSolved(puzzle.digit),delay+300);
      }catch(e){puzzleSolved(puzzle.digit);}
    };
  }catch(e){console.error('renderMatch error',e)}
}

function renderMatchPair(puzzle,room){
  try{
    const pair=puzzle.pairs[state.matchPair];
    const allOpts=[pair.match,...pair.distractors].sort(()=>Math.random()-.5);
    
    $('matchProgress').textContent=`Pair ${state.matchPair+1} of 3`;
    const ma=$('matchArea');
    ma.innerHTML=`
      <div class="match-col">
        <div class="match-card" id="matchTerm" style="border-color:${room.color};cursor:pointer" onclick="selectMatchTerm()">${pair.term}</div>
      </div>
      <div class="match-arrow" style="color:${room.color}">→</div>
      <div class="match-col" id="matchOpts"></div>
    `;
    
    const optsCol=$('matchOpts');
    allOpts.forEach(o=>{
      const card=document.createElement('div');
      card.className='match-card';
      card.textContent=o;
      card.dataset.correct=(o===pair.match)?'true':'false';
      card.addEventListener('click',function(){handleMatchPick(this,puzzle,room)});
      optsCol.appendChild(card);
    });
  }catch(e){}
}

function selectMatchTerm(){
  try{
    const t=$('matchTerm');
    if(t)t.classList.add('selected');
  }catch(e){}
}

function handleMatchPick(el,puzzle,room){
  try{
    // Guard against rapid clicks during animation
    if(el.classList.contains('dimmed')||el.classList.contains('wrong-flash')||el.classList.contains('matched')||el.classList.contains('correct'))return;
    // Auto-select term
    selectMatchTerm();
    
    if(el.dataset.correct==='true'){
      el.classList.add('correct','matched');
      $('matchTerm').classList.add('matched');
      const pair=puzzle.pairs[state.matchPair];
      const comp=$('matchCompleted');
      comp.innerHTML+=`<div class="completed-pair">✔ ${pair.term} → ${pair.match}</div>`;
      
      state.matchPair++;
      if(state.matchPair>=puzzle.pairs.length){
        $('matchProgress').textContent='Complete!';
        setTimeout(()=>puzzleSolved(puzzle.digit),500);
      }else{
        setTimeout(()=>renderMatchPair(puzzle,room),500);
      }
    }else{
      el.classList.add('wrong-flash');
      setTimeout(()=>{el.classList.remove('wrong-flash');el.classList.add('dimmed')},500);
      
      handleWrongAnswer(()=>{
        // Narrow to 2 choices
        try{
          const opts=[...$('matchOpts').querySelectorAll('.match-card:not(.dimmed)')];
          // Already narrowed by dimming wrong ones
        }catch(e){}
      });
      
      if(state.overrideTriggered&&puzzle._override){
        setTimeout(()=>puzzle._override(),300);
      }
    }
  }catch(e){}
}

// ===========================
// TAP SELECT HANDLER (shared by System Scanner, Mystery, Visual Recall)
// ===========================
function handleTapSelect(el,puzzle){
  try{
    if(el.classList.contains('dimmed')||el.classList.contains('override-highlight')||el.classList.contains('wrong')||el.classList.contains('correct'))return;
    
    if(el.dataset.correct==='true'){
      el.classList.add('correct');
      el.innerHTML=`✔ ${el.textContent}`;
      // For mystery, fill the box
      if(puzzle.type==='mystery'){
        const mb=$('mysteryBox');
        if(mb){mb.textContent=el.textContent.replace('✔ ','');mb.classList.add('filled');}
      }
      setTimeout(()=>puzzleSolved(puzzle.digit),500);
    }else{
      el.classList.add('wrong');
      el.innerHTML=`✖ ${el.textContent}`;
      setTimeout(()=>{
        el.classList.remove('wrong');
        el.classList.add('dimmed');
        el.innerHTML=`✖ ${el.textContent.replace('✖ ','')}`;
      },500);
      
      handleWrongAnswer(()=>{
        // Narrow to strong scanner options
        try{
          const containerId=puzzle.type==='system_scanner'?'ssOptions':
                            puzzle.type==='mystery'?'mysteryOptions':'vrOptions';
          const cards=[...$(containerId).querySelectorAll('.answer-card:not(.dimmed)')];
          if(puzzle.strongOptions){
            cards.forEach(c=>{
              const txt=c.textContent.replace('✖ ','').trim();
              if(!puzzle.strongOptions.includes(txt)){
                c.classList.add('dimmed');
              }
            });
          }
        }catch(e){}
      });
      
      if(state.overrideTriggered&&puzzle._override){
        setTimeout(()=>puzzle._override(),300);
      }
    }
  }catch(e){}
}

function showQFQuestion(puzzle){
  try{
    const indices=state.qfRetryIndices.length>0?state.qfRetryIndices:puzzle.statements.map((_,i)=>i);
    if(state.qfIndex>=indices.length){
      // Check results
      const correct=state.qfResults.filter(r=>r===true).length;
      if(correct>=3){
        puzzleSolved(puzzle.digit);
      }else{
        // Retry missed only
        state.qfRetryIndices=state.qfResults.map((r,i)=>r!==true?i:null).filter(i=>i!==null);
        state.qfIndex=0;
        renderQFDots(puzzle);
        showQFQuestion(puzzle);
      }

    const si=indices[state.qfIndex];

    });

let qfProcessing=false;
function qfAnswer(confirmed){
  try{
    if(qfProcessing||state.puzzleSolving)return;
    qfProcessing=true;
    const puzzle=ROOMS[state.currentRoom].puzzles[state.currentPuzzle];
    const indices=state.qfRetryIndices.length>0?state.qfRetryIndices:puzzle.statements.map((_,i)=>i);
    const si=indices[state.qfIndex];
    const stmt=puzzle.statements[si];
    const isCorrect=(confirmed===stmt.answer);
    
    if(isCorrect){
      state.qfResults[si]=true;
      const correctBtn=confirmed?$('qfConfirm'):$('qfReject');
      correctBtn.classList.add('flash-correct');
      const dot=document.querySelector(`#qfDot${si}`);
      if(dot){dot.classList.add('correct');dot.classList.remove('wrong','active');}
      setTimeout(()=>{
        try{correctBtn.classList.remove('flash-correct')}catch(e){}
        state.qfIndex++;
        qfProcessing=false;
        showQFQuestion(puzzle);
      },500);
    }else{
      state.qfResults[si]=false;
      state.qfWrongTotal++;
      state.roomAttempts[state.currentRoom][state.currentPuzzle]++;
      // Auto-activate scanner on first wrong
      if(state.qfWrongTotal===1&&!state.scannerShown){openScanner();}
      const btn=confirmed?$('qfConfirm'):$('qfReject');
      btn.classList.add('flash-wrong');
      const dot=document.querySelector(`#qfDot${si}`);
      if(dot){dot.classList.add('wrong');dot.classList.remove('active');}
      
      setTimeout(()=>{
        try{btn.classList.remove('flash-wrong')}catch(e){}
        state.qfIndex++;
        qfProcessing=false;
        
        // Check override threshold
        if(state.qfWrongTotal>=5&&puzzle._override){
          puzzle._override();
          return;
        }
        showQFQuestion(puzzle);
      },500);
    }
  }catch(e){}
}

function handleFinalSelect(el){
  try{
    if(el.classList.contains('matched')||state.overrideTriggered)return;
    const idx=parseInt(el.dataset.index);
    const side=el.dataset.side;
    
    if(!state.finalSelected){
      state.finalSelected={el,idx,side};
      el.classList.add('selected');
    }else{
      if(state.finalSelected.side===side){
        // Same side — switch selection
        state.finalSelected.el.classList.remove('selected');
        state.finalSelected={el,idx,side};
        el.classList.add('selected');
        return;
      }
      
      // Check match
      const termIdx=side==='term'?idx:state.finalSelected.idx;
      const targetIdx=side==='target'?idx:state.finalSelected.idx;
      
      if(termIdx===targetIdx){
        // Correct match
        el.classList.add('matched');
        state.finalSelected.el.classList.add('matched');
        state.finalSelected.el.classList.remove('selected');
        el.style.borderColor='#00ff88';
        state.finalSelected.el.style.borderColor='#00ff88';
        const pair=FINAL_LOCK.pairs[termIdx];
        el.style.boxShadow=`0 0 12px ${pair.color}`;
        state.finalSelected.el.style.boxShadow=`0 0 12px ${pair.color}`;
        
        state.finalMatched[termIdx]=true;
        state.finalSelected=null;
        
        if(state.finalMatched.every(m=>m)){
          setTimeout(()=>showEscapeAnimation(),600);
        }
      }else{
        // Wrong
        el.classList.add('wrong-flash');
        state.finalSelected.el.classList.add('wrong-flash');
        const prevSel=state.finalSelected.el;
        setTimeout(()=>{
          el.classList.remove('wrong-flash');
          prevSel.classList.remove('wrong-flash','selected');
        },500);
        state.finalSelected=null;
        
        state.wrongCount++;
        if(state.wrongCount===1){
          // Auto-open scanner
          $('scannerBtn').click();
        }else if(state.wrongCount>=2&&!state.overrideTriggered){
          state.overrideTriggered=true;
          closeScanner();
          // Auto-solve cascade
          let delay=0;
          FINAL_LOCK.pairs.forEach((p,i)=>{
            if(!state.finalMatched[i]){
              setTimeout(()=>{
                try{
                  const terms=[...$('finalTerms').children];
                  const targets=[...$('finalTargets').children];
                  const t=terms.find(c=>parseInt(c.dataset.index)===i);
                  const tg=targets.find(c=>parseInt(c.dataset.index)===i);
                  if(t&&tg){
                    t.classList.add('matched');t.style.borderColor='#00ff88';
                    tg.classList.add('matched');tg.style.borderColor='#00ff88';
                    state.finalMatched[i]=true;
                  }
                }catch(e){}
              },delay);
              delay+=500;
            }
          });
          setTimeout(()=>{
            if(state.finalMatched.every(m=>m))showEscapeAnimation();
          },delay+300);
        }
      }
    }
  }catch(e){}
}

function emergencySkip(){
  try{
    if(state.gameComplete)return;
    closeAllOverlays();
    
    // Detect screen state
    const isGameScreen=$('gameScreen').classList.contains('active');
    if(!isGameScreen)return;
    
    const roomLabel=$('roomLabel').textContent;
    if(roomLabel.includes('Final Lock')){
      // On Final Lock — go to report
      showEscapeAnimation();
      return;
    }
    
    // On a room — reveal digits and open code entry
    const room=ROOMS[state.currentRoom];
    state.roomSkipped[state.currentRoom]=true;
    
    // Reveal both digits
    room.digits.forEach((d,i)=>{
      updateVaultDigit(state.currentRoom,i,d);
      if(i>=state.currentPuzzle){
        state.puzzlesSolved++;
        updatePuzzlesCleared();
      }
    });
    
    // Mark puzzles as solved
    state.currentPuzzle=2;
    showCodeEntry();
  }catch(e){}
}

// ===========================
// INITIALIZATION
// ===========================
document.addEventListener('DOMContentLoaded',function(){
  try{
    // Pre-set code entry inputs to only accept numbers
    ['codeDigit1','codeDigit2'].forEach(id=>{
      const el=$(id);
      el.addEventListener('input',function(){
        this.value=this.value.replace(/[^0-9]/g,'');
      });
    });
  }catch(e){}
});
</script>
