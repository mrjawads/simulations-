<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBC &amp; Homeostasis Tutorial</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: #F0F4F8;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px;
  font-size: 18px;
  line-height: 1.5;
}

.container {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.progress-wrap {
  width: 100%;
  background: #dde4ec;
  border-radius: 12px;
  height: 18px;
  margin-bottom: 18px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6C63FF, #48bb78);
  border-radius: 12px;
  transition: width 0.5s ease;
  min-width: 0;
}
.progress-label {
  position: absolute;
  right: 8px;
  top: 0;
  line-height: 18px;
  font-size: 11px;
  font-weight: 700;
  color: #444;
}

.section {
  display: none;
  width: 100%;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  padding: 24px 20px;
  margin-bottom: 14px;
  animation: fadeUp 0.35s ease;
}
.section.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.anchor {
  width: 100%;
  border-radius: 14px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  margin: 12px 0;
}
.anchor .emoji { font-size: 52px; margin-right: 14px; flex-shrink: 0; }
.anchor .label { font-size: 20px; font-weight: 800; }

.anchor-a { background: #EDE9FE; border: 3px solid #8B5CF6; color: #5B21B6; }
.anchor-b { background: #DBEAFE; border: 3px solid #60A5FA; color: #1E40AF; }
.anchor-c { background: #FFEDD5; border: 3px solid #F97316; color: #9A3412; }

.rule-box {
  background: #F3E8FF;
  border: 3px solid #8B5CF6;
  border-radius: 12px;
  padding: 14px 16px;
  text-align: center;
  font-weight: 700;
  font-size: 19px;
  color: #5B21B6;
  margin: 10px 0;
}

.evidence-box {
  border-radius: 12px;
  padding: 14px 16px;
  margin: 8px 0;
  font-weight: 700;
  font-size: 17px;
  text-align: center;
}
.evidence-blue { background: #DBEAFE; border: 4px solid #60A5FA; color: #1E40AF; }
.evidence-red { background: #FEE2E2; border: 4px solid #F87171; color: #991B1B; }

.visual-row {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  margin: 12px 0;
}
.visual-row .v-card {
  flex: 1;
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  margin: 0 4px;
  font-weight: 700;
}
.v-stiff { background: #FEE2E2; border: 3px solid #F87171; color: #991B1B; }
.v-flex  { background: #D1FAE5; border: 3px solid #34D399; color: #065F46; }

.big-emoji { font-size: 48px; display: block; margin-bottom: 4px; }

.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  min-height: 48px;
  min-width: 48px;
  text-align: center;
}
.btn:active { transform: scale(0.97); }

.btn-primary { background: #6C63FF; color: #fff; box-shadow: 0 3px 10px rgba(108,99,255,0.3); }
.btn-primary:hover { background: #5a52e0; }
.btn-green { background: #48bb78; color: #fff; box-shadow: 0 3px 10px rgba(72,187,120,0.3); }
.btn-green:hover { background: #38a169; }

.btn-landing {
  width: 100%;
  padding: 18px 20px;
  font-size: 20px;
  margin: 8px 0;
  border-radius: 14px;
}

.choice-btn {
  display: block;
  width: 100%;
  padding: 16px 18px;
  border-radius: 12px;
  border: 3px solid #dde4ec;
  background: #fff;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  margin: 8px 0;
  text-align: left;
  transition: border-color 0.2s, background 0.2s;
  min-height: 48px;
  color: #1a1a2e;
}
.choice-btn:hover:not(.eliminated):not(.correct-glow) { border-color: #6C63FF; background: #f5f3ff; }
.choice-btn.selected { border-color: #6C63FF; background: #EDE9FE; }
.choice-btn.correct-glow { border-color: #34D399; background: #D1FAE5; color: #065F46; }
.choice-btn.eliminated {
  border-color: #d1d5db; background: #f3f4f6; color: #9ca3af;
  text-decoration: line-through; cursor: not-allowed; pointer-events: none;
}

.im-ready-pill {
  position: fixed;
  bottom: 18px;
  right: 18px;
  padding: 10px 18px;
  border-radius: 30px;
  background: #E5E7EB;
  color: #374151;
  font-size: 14px;
  font-weight: 700;
  border: 2px solid #D1D5DB;
  cursor: pointer;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: background 0.2s;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
}
.im-ready-pill:hover { background: #D1D5DB; }

.hint-box { border-radius: 12px; padding: 14px 16px; margin: 10px 0; animation: fadeUp 0.35s ease; }
.hint-observe { background: #DBEAFE; border: 2px solid #60A5FA; }
.hint-rule    { background: #EDE9FE; border: 2px solid #8B5CF6; }
.hint-elim    { background: #FFEDD5; border: 2px solid #F97316; }
.hint-confirm { background: #D1FAE5; border: 2px solid #34D399; }

.hint-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

.feedback { border-radius: 12px; padding: 14px 16px; margin: 10px 0; font-weight: 600; text-align: center; animation: fadeUp 0.3s ease; }
.feedback-correct { background: #D1FAE5; border: 2px solid #34D399; color: #065F46; }
.feedback-wrong   { background: #FEE2E2; border: 2px solid #F87171; color: #991B1B; }
.feedback-help    { background: #FEF3C7; border: 2px solid #F59E0B; color: #92400E; }

.mini-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 15px; }
.mini-table th, .mini-table td { padding: 8px 6px; border: 2px solid #dde4ec; text-align: center; font-weight: 600; }
.mini-table th { background: #EDE9FE; color: #5B21B6; font-size: 13px; }
.mini-table .highlight-green { background: #D1FAE5; color: #065F46; }
.mini-table .highlight-red   { background: #FEE2E2; color: #991B1B; }

.arrow-chain { display: flex; align-items: center; justify-content: center; margin: 14px 0; flex-wrap: wrap; }
.arrow-chain .step-box { background: #EDE9FE; border: 2px solid #8B5CF6; border-radius: 10px; padding: 8px 12px; font-weight: 700; font-size: 16px; color: #5B21B6; text-align: center; }
.arrow-chain .arrow { font-size: 28px; margin: 0 6px; color: #6C63FF; }

.back-btn { display: inline-block; padding: 8px 16px; border-radius: 10px; border: 2px solid #D1D5DB; background: #F9FAFB; color: #6B7280; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; min-height: 44px; min-width: 44px; }
.back-btn:hover { background: #E5E7EB; }

.tap-target { cursor: pointer; transition: transform 0.15s; min-height: 48px; min-width: 48px; }
.tap-target:active { transform: scale(0.97); }
.tap-target.tapped { box-shadow: 0 0 0 4px #6C63FF44; }

.sec-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; text-align: center; }
.sub-label { font-size: 14px; color: #6B7280; text-align: center; margin-bottom: 6px; font-weight: 600; }
.center { text-align: center; }
.mt-10 { margin-top: 10px; }
.mt-14 { margin-top: 14px; }

.practice-counter { font-size: 14px; font-weight: 700; color: #6B7280; text-align: center; margin-bottom: 8px; }
.recovery { text-align: center; padding: 30px 20px; }

.final-celebration { text-align: center; padding: 20px; }
.final-celebration .trophy { font-size: 72px; }
.final-anchors { display: flex; flex-direction: column; align-items: center; margin-top: 14px; }
.final-anchors .anchor { max-width: 340px; }

@media (max-width: 400px) {
  body { font-size: 16px; padding: 8px; }
  .anchor .emoji { font-size: 40px; }
  .anchor .label { font-size: 17px; }
  .btn-landing { font-size: 17px; padding: 14px 16px; }
  .arrow-chain .step-box { font-size: 14px; padding: 6px 8px; }
  .arrow-chain .arrow { font-size: 22px; }
}

@media (prefers-reduced-motion: reduce) {
  .section, .hint-box, .feedback { animation: none; }
  .progress-fill { transition: none; }
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
(function() {
  "use strict";

  /* ===== PURE STRING HTML ESCAPER — no DOM creation ===== */
  function esc(str) {
    if (typeof str !== "string") str = String(str);
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  /* ===== TIMEOUT MANAGER — prevents orphan timers ===== */
  var pendingTimers = [];
  function safeTimeout(fn, ms) {
    var id = setTimeout(function() { try { fn(); } catch(e) {} }, ms);
    pendingTimers.push(id);
    return id;
  }
  function clearAllTimers() {
    for (var i = 0; i < pendingTimers.length; i++) clearTimeout(pendingTimers[i]);
    pendingTimers = [];
  }

  /* ===== STATE ===== */
  var state = {
    screen: "landing",
    skippedToQuestion: false,
    tutorialStep: 0,
    practiceIndex: 0,
    practiceAnswers: [null, null, null],
    practiceCorrect: [false, false, false],
    practiceWrongOnce: [false, false, false],
    practiceCorrectCount: 0,
    showPracticeFeedback: false,
    practiceComplete: false,
    evidenceStep: 0,
    evidenceTapped: false,
    hintsRevealed: 0,
    wrongCount: 0,
    eliminatedChoices: [],
    selectedAnswer: null,
    showFeedback: false,
    mainComplete: false,
    showCorrectCelebration: false,
    locked: false
  };

  /* ===== CONTENT ===== */
  var ANCHORS = {
    A: { emoji: "\uD83D\uDCA7", label: "Water = Flex", cls: "anchor-a" },
    B: { emoji: "\uD83D\uDD2C", label: "Read the Data", cls: "anchor-b" },
    C: { emoji: "\u274C", label: "Doesn't Match", cls: "anchor-c" }
  };

  var PRACTICE = [
    { q: "RBCs take on water. Flexibility?", choices: ["Increases","Decreases"], correct: 0, explanation: "Water makes RBCs flexible!", anchor: "A",
      vis: '<div class="visual-row"><div class="v-card v-stiff"><span class="big-emoji">\uD83D\uDD34</span>No water<br>= Stiff</div><div class="v-card v-flex"><span class="big-emoji">\uD83D\uDCA7\uD83D\uDD34</span>+ Water<br>= Flexible</div></div>' },
    { q: "More flexible RBCs. Oxygen transfer?", choices: ["Increases","Decreases"], correct: 0, explanation: "Flexible = more oxygen moves!", anchor: "C",
      vis: '<div class="visual-row"><div class="v-card v-stiff"><span class="big-emoji">\uD83D\uDD34</span>Stiff<br>\u2193 18% oxygen</div><div class="v-card v-flex"><span class="big-emoji">\uD83D\uDFE2</span>Flexible<br>\u2191 21% oxygen</div></div>' },
    { q: "Water after exercise. Helpful?", choices: ["Yes \u2014 more oxygen","No \u2014 less oxygen"], correct: 0, explanation: "Water \u2192 flexible \u2192 more oxygen!", anchor: "A",
      vis: '<div class="arrow-chain"><div class="step-box">\uD83D\uDCA7 Water</div><div class="arrow">\u2192</div><div class="step-box">\uD83D\uDD34 Flex</div><div class="arrow">\u2192</div><div class="step-box">\uD83E\uDEC1 O\u2082 \u2191</div></div>' }
  ];

  var MAIN = {
    stem: "What evidence would support the claim that consuming water after exercise helps an athlete\u2019s body maintain homeostasis?",
    headers: ["","Number of RBCs\nTaking on Water","RBC\nFlexibility","Rate of Oxygen\nTransfer"],
    rows: [["(1)","increases","decreases","decreases"],["(2)","increases","increases","increases"],["(3)","decreases","increases","increases"],["(4)","decreases","decreases","decreases"]],
    choices: ["(1) increases / decreases / decreases","(2) increases / increases / increases","(3) decreases / increases / increases","(4) decreases / decreases / decreases"],
    correct: 1
  };

  var HINTS = [
    { cls: "hint-observe", label: "HINT 1 \u2014 OBSERVE",
      html: '<div class="anchor anchor-b" style="margin:8px 0"><span class="emoji">\uD83D\uDD2C</span><span class="label">Read the Data</span></div><div class="evidence-box evidence-blue">The study says: RBCs + water \u2192 <b>more flexible</b></div><p style="margin-top:8px;font-size:16px;">Which answers show flexibility <b>increasing</b>?</p>' },
    { cls: "hint-rule", label: "HINT 2 \u2014 RULE",
      html: '<div class="anchor anchor-a" style="margin:8px 0"><span class="emoji">\uD83D\uDCA7</span><span class="label">Water = Flex</span></div><div class="rule-box">Water \u2192 Flexible \u2192 More O\u2082</div><p style="margin-top:8px;font-size:16px;">All three columns should <b>increase</b>.</p>' },
    { cls: "hint-elim", label: "HINT 3 \u2014 ELIMINATE",
      html: '<div class="anchor anchor-c" style="margin:8px 0"><span class="emoji">\u274C</span><span class="label">Doesn\'t Match</span></div><p style="font-size:16px;">Any answer with <b>\u201Cdecreases\u201D</b> breaks the chain!</p>' },
    { cls: "hint-confirm", label: "HINT 4 \u2014 CONFIRM",
      html: '<div class="anchor anchor-b" style="margin:8px 0"><span class="emoji">\uD83D\uDD2C</span><span class="label">Read the Data</span></div><p style="font-size:16px;">Answer (2): all three <b>increase</b>.<br>Water \u2192 flex \u2192 O\u2082 \u2192 homeostasis! \u2705</p>' }
  ];

  /* ===== DOM REF ===== */
  var app = document.getElementById("app");
  if (!app) return;

  /* ===== HELPERS ===== */
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function progressPct() {
    if (state.mainComplete) return 100;
    if (state.screen === "question" || state.skippedToQuestion) return 80;
    if (state.screen === "evidence") return 45 + (state.evidenceStep / 2) * 35;
    if (state.screen === "practice") return 20 + (state.practiceIndex / 3) * 25;
    if (state.screen === "tutorial") return (state.tutorialStep / 2) * 20;
    return 0;
  }

  function anchorHTML(key) {
    var a = ANCHORS[key];
    return '<div class="anchor ' + a.cls + '"><span class="emoji">' + a.emoji + '</span><span class="label">' + esc(a.label) + '</span></div>';
  }

  function addElimination(preferIdx) {
    if (typeof preferIdx === "number" && preferIdx !== MAIN.correct && state.eliminatedChoices.indexOf(preferIdx) === -1) {
      state.eliminatedChoices.push(preferIdx); return;
    }
    for (var i = 0; i < MAIN.choices.length; i++) {
      if (i !== MAIN.correct && state.eliminatedChoices.indexOf(i) === -1) {
        state.eliminatedChoices.push(i); return;
      }
    }
  }

  /* ===== RENDER — reads state, never mutates it ===== */
  function render() {
    try {
      state.tutorialStep = clamp(state.tutorialStep, 0, 2);
      state.practiceIndex = clamp(state.practiceIndex, 0, 2);
      state.evidenceStep = clamp(state.evidenceStep, 0, 2);
      state.wrongCount = clamp(state.wrongCount, 0, 10);
      state.hintsRevealed = clamp(state.hintsRevealed, 0, 4);

      var html = "";
      var s = state.screen;

      if (s === "landing")   html = bLanding();
      else if (s === "complete")  html = bBar() + bComplete();
      else if (s === "tutorial")  html = bBar() + bTutorial() + bPill();
      else if (s === "practice")  html = bBar() + bPractice() + bPill();
      else if (s === "evidence")  html = bBar() + bEvidence() + bPill();
      else if (s === "question")  html = bBar() + bQuestion();

      app.innerHTML = html;
      bind();
    } catch (e) {
      app.innerHTML = '<div class="section active recovery"><p style="font-size:20px;">Something went wrong.</p><button class="btn btn-primary mt-14" id="rRestart">Restart</button><button class="btn btn-green mt-10" id="rQuestion">Go to Question</button></div>';
      var a = document.getElementById("rRestart");
      if (a) a.addEventListener("click", function() { resetAll(); });
      var b = document.getElementById("rQuestion");
      if (b) b.addEventListener("click", function() { skipToQuestion(); });
    }
  }

  /* ===== BUILD FUNCTIONS (pure — return strings only) ===== */

  function bLanding() {
    return '<div class="section active">' +
      '<div class="center"><span style="font-size:64px;">\uD83D\uDD34\uD83D\uDCA7</span></div>' +
      '<p class="sec-title" style="margin-top:12px;">Red Blood Cells &amp; Water</p>' +
      '<p class="sub-label">How water helps your blood carry oxygen</p>' +
      '<div class="mt-14">' +
        '<button class="btn btn-primary btn-landing" id="startTut">\uD83D\uDCDA Start Tutorial</button>' +
        '<button class="btn btn-green btn-landing" id="landReady">I\'m Ready \u2014 Take Me to the Question \u2192</button>' +
      '</div></div>';
  }

  function bBar() {
    var p = Math.round(progressPct());
    return '<div class="progress-wrap"><div class="progress-fill" style="width:' + p + '%"></div><span class="progress-label">' + p + '%</span></div>';
  }

  function bPill() {
    return '<button class="im-ready-pill" id="imReady">I\'m Ready \u2192</button>';
  }

  function bTutorial() {
    var s = state.tutorialStep;
    var h = '<div class="section active"><p class="sub-label">Tutorial \u2014 Step ' + (s+1) + ' of 2</p>';
    if (s === 0) {
      h += '<p class="sec-title">\uD83D\uDCA7 What Water Does to RBCs</p>';
      h += anchorHTML("A");
      h += '<div class="visual-row"><div class="v-card v-stiff"><span class="big-emoji">\uD83D\uDD34</span>No water<br>= Stiff</div><div class="v-card v-flex"><span class="big-emoji">\uD83D\uDCA7\uD83D\uDD34</span>+ Water<br>= Flexible!</div></div>';
      h += '<div class="rule-box">Water \u2192 Flexible \u2192 More O\u2082</div>';
      h += '<div class="center mt-14"><button class="btn btn-primary" id="tutNext">Next \u2192</button></div>';
    } else {
      h += '<p class="sec-title">\uD83D\uDD2C Reading the Evidence</p>';
      h += anchorHTML("B");
      h += '<p style="font-size:16px;text-align:center;margin:8px 0;">The study tested stiff vs. flexible:</p>';
      h += '<table class="mini-table"><tr><th></th><th>Flexibility</th><th>Oxygen Change</th></tr>';
      h += '<tr><td>Stiff</td><td class="highlight-red">Less flexible</td><td class="highlight-red">\u2193 18%</td></tr>';
      h += '<tr><td>Flex</td><td class="highlight-green">More flexible</td><td class="highlight-green">\u2191 21%</td></tr></table>';
      h += '<p style="font-size:16px;text-align:center;margin-top:8px;font-weight:700;color:#5B21B6;">Flexible = more oxygen. Always.</p>';
      h += '<div class="center mt-14"><button class="btn btn-primary" id="tutNext">Nice! Let\'s Practice \u2192</button></div>';
    }
    h += '</div>';
    return h;
  }

  function bPractice() {
    var idx = state.practiceIndex;
    var q = PRACTICE[idx];
    var h = '<div class="section active"><p class="sub-label">Practice</p>';
    h += '<p class="practice-counter">' + (idx+1) + ' of 3</p>';
    h += '<p class="sec-title">' + esc(q.q) + '</p>';

    if (!state.showPracticeFeedback) {
      for (var i = 0; i < q.choices.length; i++) {
        var sel = (state.practiceAnswers[idx] === i) ? " selected" : "";
        h += '<button class="choice-btn tap-target pChoice' + sel + '" data-i="' + i + '">' + esc(q.choices[i]) + '</button>';
      }
      var ok = state.practiceAnswers[idx] !== null;
      h += '<div class="center mt-10"><button class="btn btn-primary" id="pCheck"' + (ok ? '' : ' style="opacity:0.4;pointer-events:none;"') + '>Check</button></div>';
    } else {
      var right = (state.practiceAnswers[idx] === q.correct);
      if (right) {
        h += '<div class="feedback feedback-correct">\u2705 Correct!</div>';
        h += '<p style="text-align:center;font-weight:700;font-size:17px;margin:6px 0;">' + esc(q.explanation) + '</p>';
        h += q.vis + anchorHTML(q.anchor);
        h += '<div class="center mt-10"><button class="btn btn-primary" id="pNext">Next \u2192</button></div>';
      } else if (state.practiceAnswers[idx] === -1) {
        h += '<div class="feedback feedback-help">The answer is: <b>' + esc(q.choices[q.correct]) + '</b></div>';
        h += '<p style="text-align:center;font-weight:700;font-size:17px;margin:6px 0;">' + esc(q.explanation) + '</p>';
        h += q.vis + anchorHTML(q.anchor);
        h += '<div class="center mt-10"><button class="btn btn-primary" id="pNext">Next \u2192</button></div>';
      } else {
        h += '<div class="feedback feedback-wrong">\u274C Not quite. Try again!</div>';
        h += '<div class="center mt-10"><button class="btn btn-primary" id="pRetry">Try Again</button></div>';
      }
    }
    h += '</div>';
    return h;
  }

  function bEvidence() {
    var s = state.evidenceStep;
    var h = '<div class="section active"><p class="sub-label">Evidence \u2014 Step ' + (s+1) + ' of 2</p>';
    if (s === 0) {
      h += '<p class="sec-title">\uD83D\uDD2C Find the Proof</p>' + anchorHTML("B");
      h += '<p style="font-size:16px;text-align:center;margin:6px 0;">Tap the evidence that starts the chain:</p>';
      h += '<div class="evidence-box evidence-blue tap-target' + (state.evidenceTapped ? ' tapped' : '') + '" id="evTap">';
      h += '<span style="font-size:14px;font-weight:800;color:#1E40AF;">STUDY FINDING</span><br>\uD83D\uDCA7 RBCs + water \u2192 more flexible</div>';
      h += '<div class="evidence-box evidence-red"><span style="font-size:14px;font-weight:800;color:#991B1B;">STUDY FINDING</span><br>\uD83D\uDD34 More flexible \u2192 +21% oxygen</div>';
      if (state.evidenceTapped) {
        h += '<div class="feedback feedback-correct" style="margin-top:10px;">\u2705 That\'s the starting point!</div>';
        h += '<div class="center mt-10"><button class="btn btn-primary" id="evNext">Next \u2192</button></div>';
      } else {
        h += '<p style="font-size:14px;text-align:center;color:#6B7280;margin-top:8px;">Tap the blue box to start</p>';
      }
    } else {
      h += '<p class="sec-title">\uD83D\uDCA7 Connect It All</p>' + anchorHTML("A");
      h += '<div class="arrow-chain"><div class="step-box">\uD83D\uDCA7 Drink Water</div><div class="arrow">\u2192</div><div class="step-box">\uD83D\uDD34 RBCs Flex</div><div class="arrow">\u2192</div><div class="step-box">\uD83E\uDEC1 More O\u2082</div></div>';
      h += '<div class="rule-box">This IS homeostasis \u2014 body stays balanced!</div>';
      h += '<div class="center mt-14"><button class="btn btn-green" id="evDone">\u2705 Ready for the Question!</button></div>';
    }
    h += '</div>';
    return h;
  }

  function bQuestion() {
    var h = '<div class="section active">' + anchorHTML("A");
    h += '<p class="sec-title">The Real Question</p>';
    h += '<p style="font-size:16px;margin-bottom:10px;">' + esc(MAIN.stem) + '</p>';

    /* Table */
    h += '<table class="mini-table"><tr>';
    for (var c = 0; c < MAIN.headers.length; c++) {
      h += '<th>' + esc(MAIN.headers[c]).replace(/\n/g, '<br>') + '</th>';
    }
    h += '</tr>';
    for (var r = 0; r < MAIN.rows.length; r++) {
      var row = MAIN.rows[r];
      var elim = state.eliminatedChoices.indexOf(r) !== -1;
      h += '<tr style="' + (elim ? 'opacity:0.35;text-decoration:line-through;' : '') + '">';
      for (var j = 0; j < row.length; j++) {
        var cc = (r === MAIN.correct && state.wrongCount >= 4) ? ' class="highlight-green"' : '';
        h += '<td' + cc + '>' + esc(row[j]) + '</td>';
      }
      h += '</tr>';
    }
    h += '</table>';

    /* Choices */
    for (var i = 0; i < MAIN.choices.length; i++) {
      var cls = "choice-btn mChoice";
      if (state.eliminatedChoices.indexOf(i) !== -1) cls += " eliminated";
      else if (state.wrongCount >= 4 && i === MAIN.correct) cls += " correct-glow";
      else if (state.selectedAnswer === i) cls += " selected";
      h += '<button class="' + cls + '" data-i="' + i + '">' + esc(MAIN.choices[i]) + '</button>';
    }

    /* Submit */
    if (!state.locked && !state.showFeedback && state.wrongCount < 4) {
      var ok = state.selectedAnswer !== null && state.eliminatedChoices.indexOf(state.selectedAnswer) === -1;
      h += '<div class="center mt-10"><button class="btn btn-primary" id="mSubmit"' + (ok ? '' : ' style="opacity:0.4;pointer-events:none;"') + '>Submit Answer</button></div>';
    }

    /* 4+ wrong prompt */
    if (state.wrongCount >= 4 && !state.mainComplete) {
      h += '<div class="feedback feedback-help">The answer is highlighted. Tap it!</div>';
    }

    /* Feedback */
    if (state.showFeedback) {
      if (state.showCorrectCelebration) {
        h += '<div class="feedback feedback-correct">\uD83C\uDF89 You got it!</div>';
      } else {
        h += '<div class="feedback feedback-wrong">\u274C Not quite. Try again!</div>';
      }
    }

    /* Hints */
    for (var hi = 0; hi < state.hintsRevealed; hi++) {
      h += '<div class="hint-box ' + HINTS[hi].cls + '"><p class="hint-label">' + HINTS[hi].label + '</p>' + HINTS[hi].html + '</div>';
    }

    /* Back to tutorial */
    if (state.skippedToQuestion) {
      h += '<div class="center mt-14"><button class="back-btn" id="goBack">\u2190 Back to Tutorial</button></div>';
    }

    h += '</div>';
    return h;
  }

  function bComplete() {
    var h = '<div class="section active final-celebration"><span class="trophy">\uD83C\uDFC6</span>';
    h += '<p class="sec-title" style="margin-top:10px;">Amazing Work!</p>';
    h += '<p style="font-size:17px;margin:8px 0;">You proved water helps the body stay balanced.</p>';
    h += '<div class="final-anchors">' + anchorHTML("A") + anchorHTML("B") + anchorHTML("C") + '</div>';
    h += '<div class="arrow-chain" style="margin-top:14px;"><div class="step-box">\uD83D\uDCA7</div><div class="arrow">\u2192</div><div class="step-box">\uD83D\uDD34 Flex</div><div class="arrow">\u2192</div><div class="step-box">\uD83E\uDEC1 O\u2082\u2191</div><div class="arrow">\u2192</div><div class="step-box">\u2705 Homeostasis</div></div>';
    h += '</div>';
    return h;
  }

  /* ===== EVENT BINDING ===== */
  function bind() {
    try {
      on("startTut", function() { state.screen = "tutorial"; state.tutorialStep = 0; render(); });
      on("landReady", function() { skipToQuestion(); });
      on("imReady", function() { skipToQuestion(); });

      on("tutNext", function() {
        state.tutorialStep++;
        if (state.tutorialStep >= 2) { state.screen = "practice"; state.practiceIndex = 0; }
        render();
      });

      /* Practice choices — use closure to capture reference */
      each(".pChoice", function(btn) {
        btn.addEventListener("click", function() {
          var i = parseInt(btn.getAttribute("data-i"), 10);
          if (isNaN(i)) return;
          state.practiceAnswers[state.practiceIndex] = i;
          render();
        });
      });

      on("pCheck", function() {
        state.showPracticeFeedback = true;
        var idx = state.practiceIndex;
        var q = PRACTICE[idx];
        if (state.practiceAnswers[idx] === q.correct) {
          state.practiceCorrect[idx] = true;
          state.practiceCorrectCount = state.practiceCorrect.filter(function(v) { return v; }).length;
        } else {
          if (state.practiceWrongOnce[idx]) {
            state.practiceAnswers[idx] = -1;
          } else {
            state.practiceWrongOnce[idx] = true;
          }
        }
        render();
      });

      on("pRetry", function() {
        state.practiceAnswers[state.practiceIndex] = null;
        state.showPracticeFeedback = false;
        render();
      });

      on("pNext", function() {
        state.showPracticeFeedback = false;
        state.practiceIndex++;
        if (state.practiceIndex >= 3) {
          if (state.practiceCorrectCount >= 2) {
            state.practiceComplete = true;
            state.screen = "evidence";
            state.evidenceStep = 0;
          } else {
            for (var i = 0; i < 3; i++) {
              if (!state.practiceCorrect[i]) {
                state.practiceIndex = i;
                state.practiceAnswers[i] = null;
                state.practiceWrongOnce[i] = false;
                break;
              }
            }
          }
        }
        render();
      });

      on("evTap", function() { state.evidenceTapped = true; render(); });
      on("evNext", function() { state.evidenceStep = 1; state.evidenceTapped = false; render(); });
      on("evDone", function() { state.screen = "question"; render(); });

      /* Main question choices */
      each(".mChoice", function(btn) {
        btn.addEventListener("click", function() {
          if (state.locked) return;
          var i = parseInt(btn.getAttribute("data-i"), 10);
          if (isNaN(i)) return;
          if (state.eliminatedChoices.indexOf(i) !== -1) return;
          if (state.wrongCount >= 4) {
            if (i === MAIN.correct) doCorrect();
            return;
          }
          state.selectedAnswer = i;
          state.showFeedback = false;
          render();
        });
      });

      on("mSubmit", function() {
        if (state.locked || state.selectedAnswer === null) return;
        if (state.selectedAnswer === MAIN.correct) {
          doCorrect();
        } else {
          state.locked = true;
          state.showFeedback = true;
          state.wrongCount++;
          state.hintsRevealed = Math.min(state.wrongCount, 4);
          if (state.wrongCount === 2 || state.wrongCount === 3) {
            addElimination(state.selectedAnswer);
          }
          render();
          safeTimeout(function() {
            state.locked = false;
            state.showFeedback = false;
            state.selectedAnswer = null;
            render();
          }, 1200);
        }
      });

      on("goBack", function() {
        clearAllTimers();
        state.skippedToQuestion = false;
        state.screen = "tutorial";
        state.tutorialStep = 0;
        state.locked = false;
        render();
      });

      on("rRestart", function() { resetAll(); });
      on("rQuestion", function() { skipToQuestion(); });
    } catch(e) {}
  }

  /* ===== SMALL HELPERS ===== */
  function on(id, fn) {
    var el = document.getElementById(id);
    if (el) el.addEventListener("click", fn);
  }

  function each(sel, fn) {
    var els = document.querySelectorAll(sel);
    for (var i = 0; i < els.length; i++) fn(els[i]);
  }

  function doCorrect() {
    state.locked = true;
    state.mainComplete = true;
    state.showCorrectCelebration = true;
    state.showFeedback = true;
    render();
    safeTimeout(function() {
      state.screen = "complete";
      state.showCorrectCelebration = false;
      state.showFeedback = false;
      state.locked = false;
      render();
    }, 1800);
  }

  function skipToQuestion() {
    clearAllTimers();
    state.skippedToQuestion = true;
    state.screen = "question";
    state.locked = false;
    state.showFeedback = false;
    render();
  }

  function resetAll() {
    clearAllTimers();
    state.screen = "landing";
    state.skippedToQuestion = false;
    state.tutorialStep = 0;
    state.practiceIndex = 0;
    state.practiceAnswers = [null, null, null];
    state.practiceCorrect = [false, false, false];
    state.practiceWrongOnce = [false, false, false];
    state.practiceCorrectCount = 0;
    state.showPracticeFeedback = false;
    state.practiceComplete = false;
    state.evidenceStep = 0;
    state.evidenceTapped = false;
    state.hintsRevealed = 0;
    state.wrongCount = 0;
    state.eliminatedChoices = [];
    state.selectedAnswer = null;
    state.showFeedback = false;
    state.mainComplete = false;
    state.showCorrectCelebration = false;
    state.locked = false;
    render();
  }

  /* ===== INIT ===== */
  render();

})();
</script>
</body>
</html>
