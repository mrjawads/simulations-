<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Jawad's Escape Room — Heat Transfer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1a2e;--bg2:#16213e;--text:#e0e0e0;--text-bright:#ffffff;
--r1:#FF3333;--r1a:#FF8C00;--r1bg:rgba(255,51,51,0.08);--r1light:rgba(255,51,51,0.25);
--r2:#00E5FF;--r2a:#FFD600;--r2bg:rgba(0,229,255,0.08);--r2light:rgba(0,229,255,0.25);
--r3:#00E676;--r3a:#00BFA5;--r3bg:rgba(0,230,118,0.08);--r3light:rgba(0,230,118,0.25);
--success:#4CAF50;--error:#f44336;--warn:#FFD600;
--teal:#00BFA5;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
button:active{transform:scale(0.97)}

/* ===== SCREENS ===== */
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ===== START SCREEN ===== */
#startScreen{justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#1e2a4a 0%,var(--bg) 70%);text-align:center}
.start-brand{font-size:clamp(10px,1.4vw,14px);letter-spacing:4px;text-transform:uppercase;color:var(--teal);margin-bottom:16px;font-weight:600}
.start-title{font-size:clamp(28px,5vw,52px);font-weight:800;color:var(--text-bright);text-shadow:0 0 30px rgba(0,191,165,0.4),0 0 60px rgba(0,191,165,0.15);line-height:1.15;margin-bottom:12px}
.start-divider{width:60px;height:3px;background:var(--teal);margin:0 auto 14px;border-radius:2px;box-shadow:0 0 10px var(--teal)}
.start-subtitle{font-size:clamp(14px,2vw,20px);color:var(--text);opacity:0.85;margin-bottom:36px}
.start-btn{background:linear-gradient(135deg,var(--teal),#009688);color:#fff;font-size:clamp(16px,2.2vw,22px);font-weight:700;padding:14px 48px;border-radius:50px;box-shadow:0 0 20px rgba(0,191,165,0.4),0 4px 15px rgba(0,0,0,0.3);transition:all 0.3s ease;letter-spacing:1px}
.start-btn:hover{box-shadow:0 0 30px rgba(0,191,165,0.6),0 6px 20px rgba(0,0,0,0.3);transform:translateY(-2px) scale(1.02)}
.start-footer{position:absolute;bottom:24px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.25);font-weight:600}

/* ===== HUD ===== */
#hud{display:none;position:fixed;top:0;left:0;right:0;height:48px;background:rgba(22,33,62,0.95);border-bottom:1px solid rgba(255,255,255,0.08);z-index:20;padding:0 16px;align-items:center;justify-content:space-between;backdrop-filter:blur(4px)}
#hud.visible{display:flex}
.hud-left{display:flex;align-items:center;gap:12px}
.hud-room{font-size:clamp(13px,1.6vw,16px);font-weight:700;color:var(--text-bright)}
.hud-progress{font-size:12px;color:var(--text);opacity:0.7}
.hud-streak{font-size:18px;opacity:0;transition:opacity 0.3s}
.hud-streak.active{opacity:1;animation:fireFlicker 0.6s infinite alternate}
.hud-right{display:flex;align-items:center;gap:14px}
.hud-cleared{font-size:clamp(12px,1.4vw,15px);font-weight:600;color:var(--text);margin-left:auto}
.hud-cleared.pulse{animation:hudPulse 0.4s ease}

/* ===== CODE VAULT ===== */
.code-vault{display:flex;gap:8px;align-items:center}
.vault-room{display:flex;gap:3px;align-items:center;padding:3px 6px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1)}
.vault-room .vault-label{font-size:10px;opacity:0.5;margin-right:3px;font-weight:600}
.vault-digit{width:22px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:rgba(255,255,255,0.25);background:rgba(0,0,0,0.3);border-radius:4px;border:1px solid rgba(255,255,255,0.08);transition:all 0.4s ease}
.vault-digit.revealed{color:var(--text-bright);background:rgba(255,255,255,0.12);border-color:currentColor;animation:vaultReveal 0.5s ease}

/* ===== GAME AREA ===== */
#gameScreen{flex-direction:column;background:var(--bg)}
.room-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.mission-line{text-align:center;font-size:clamp(13px,1.6vw,17px);color:var(--text);opacity:0.8;font-style:italic;padding:56px 20px 8px;position:relative;z-index:1}
.puzzle-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 20px 60px;position:relative;z-index:1;overflow-y:auto}
.puzzle-instruction{font-size:clamp(12px,1.4vw,15px);color:var(--text);opacity:0.75;text-align:center;margin-bottom:12px}
.puzzle-micro{font-size:clamp(11px,1.2vw,13px);color:var(--text);opacity:0.6;text-align:center;margin-bottom:8px;font-weight:600;letter-spacing:1px}

/* ===== BOTTOM BAR ===== */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:15;background:rgba(22,33,62,0.9);border-top:1px solid rgba(255,255,255,0.06)}
.scanner-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text);transition:all 0.3s;position:relative}
.scanner-btn.glow{animation:scanPulse 1.5s infinite;border-color:var(--warn)}
.progress-dots{display:flex;gap:10px;position:absolute;left:50%;transform:translateX(-50%)}
.p-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.2);transition:all 0.4s}
.p-dot.filled{background:currentColor;border-color:currentColor;box-shadow:0 0 10px currentColor}

/* ===== CARDS ===== */
.card{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);border-radius:12px;padding:clamp(10px,1.5vw,16px) clamp(14px,2vw,20px);font-size:clamp(14px,1.8vw,18px);color:var(--text-bright);cursor:pointer;transition:all 0.3s ease;min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center;user-select:none;position:relative}
.card:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25)}
.card.selected{transform:scale(1.05);border-width:3px;box-shadow:0 0 20px currentColor;background:rgba(255,255,255,0.12)}
.card.selected::after{content:'▶ SELECTED';position:absolute;top:-10px;right:-5px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;background:currentColor;color:var(--bg)}
.card.correct{border-color:var(--success)!important;background:rgba(76,175,80,0.15)!important;box-shadow:0 0 15px rgba(76,175,80,0.4)!important}
.card.correct::before{content:'✔';position:absolute;top:4px;right:8px;font-size:14px;color:var(--success)}
.card.wrong{border-color:var(--error)!important;background:rgba(244,67,54,0.12)!important;animation:wrongShake 0.4s ease}
.card.wrong::before{content:'✖';position:absolute;top:4px;right:8px;font-size:14px;color:var(--error)}
.card.dimmed{opacity:0.35;pointer-events:none}
.card.locked{pointer-events:none;border-color:var(--success);background:rgba(76,175,80,0.1);box-shadow:0 0 10px rgba(76,175,80,0.2)}
.card.locked::before{content:'✔';position:absolute;top:4px;right:8px;font-size:14px;color:var(--success)}
.card.override-highlight{border-color:var(--warn)!important;box-shadow:0 0 25px rgba(255,214,0,0.5)!important;animation:overridePulse 0.8s infinite alternate}
.card.disabled{pointer-events:none;opacity:0.5}

/* ===== MATCH LOCK ===== */
.match-area{display:flex;gap:clamp(16px,3vw,40px);align-items:center;justify-content:center;width:100%;max-width:700px}
.match-col{display:flex;flex-direction:column;gap:12px;flex:1;max-width:280px}
.match-completed{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;width:100%;max-width:700px}
.match-done-pair{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 12px;border-radius:8px;background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.2);font-size:clamp(12px,1.3vw,14px);color:var(--success);opacity:0.7}
.match-arrow{font-size:16px;opacity:0.5}

/* ===== SEQUENCE LOCK ===== */
.seq-slots{display:flex;gap:12px;margin-bottom:20px;width:100%;max-width:600px;justify-content:center}
.seq-slot{flex:1;min-height:56px;border:2px dashed rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,1.4vw,15px);color:rgba(255,255,255,0.25);transition:all 0.3s;max-width:180px;padding:8px}
.seq-slot.active{border-color:currentColor;border-style:solid;box-shadow:0 0 12px currentColor}
.seq-slot.filled{background:rgba(76,175,80,0.1);border-color:var(--success);border-style:solid;color:var(--success)}
.seq-arrow{font-size:20px;color:rgba(255,255,255,0.2);display:flex;align-items:center}
.seq-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:600px}

/* ===== SYSTEM SCANNER ===== */
.gauge-panel{display:flex;gap:clamp(16px,3vw,32px);justify-content:center;align-items:flex-end;margin-bottom:20px;padding:16px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(255,255,255,0.08);max-width:500px;width:100%;height:200px;position:relative}
.gauge{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
.gauge-bar-wrap{flex:1;width:36px;background:rgba(255,255,255,0.05);border-radius:6px;border:1px solid rgba(255,255,255,0.1);position:relative;overflow:hidden;display:flex;align-items:flex-end}
.gauge-bar{width:100%;border-radius:4px;transition:height 1s ease;position:relative}
.gauge-reading{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;white-space:nowrap}
.gauge-label{font-size:clamp(10px,1.2vw,12px);margin-top:8px;text-align:center;font-weight:600;opacity:0.85}
.gauge-zone{position:absolute;right:-40px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;font-size:9px;font-weight:600;width:35px}
.zone-r{color:#f44336}.zone-y{color:#FFD600}.zone-g{color:#4CAF50}
.scanner-q{font-size:clamp(16px,2.2vw,22px);font-weight:700;color:var(--text-bright);text-align:center;margin-bottom:16px}
.answer-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:600px}

/* ===== QUICK FIRE ===== */
.qf-question{font-size:clamp(16px,2.4vw,24px);font-weight:700;color:var(--text-bright);text-align:center;margin-bottom:6px;padding:0 10px}
.qf-counter{font-size:13px;color:var(--text);opacity:0.6;margin-bottom:16px;text-align:center}
.qf-buttons{display:flex;gap:16px;justify-content:center}
.qf-btn{font-size:clamp(18px,2.5vw,26px);font-weight:800;padding:16px 40px;border-radius:14px;min-width:130px;letter-spacing:2px;transition:all 0.2s}
.qf-true{background:rgba(76,175,80,0.15);border:3px solid var(--success);color:var(--success)}
.qf-false{background:rgba(244,67,54,0.15);border:3px solid var(--error);color:var(--error)}
.qf-btn.flash-correct{background:rgba(76,175,80,0.35)!important;box-shadow:0 0 20px rgba(76,175,80,0.5)}
.qf-btn.flash-wrong{background:rgba(244,67,54,0.35)!important;box-shadow:0 0 20px rgba(244,67,54,0.5)}

/* ===== MYSTERY INPUT ===== */
.chain{display:flex;align-items:center;gap:clamp(4px,1vw,10px);justify-content:center;flex-wrap:wrap;margin-bottom:20px;max-width:700px;width:100%}
.chain-step{display:flex;flex-direction:column;align-items:center;gap:4px;padding:clamp(8px,1.2vw,14px);border-radius:10px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);min-width:clamp(70px,12vw,120px);text-align:center}
.chain-step .icon{font-size:clamp(18px,2.5vw,28px)}
.chain-step .label{font-size:clamp(10px,1.2vw,13px);font-weight:600;color:var(--text)}
.chain-step.mystery{border-style:dashed;border-color:var(--warn);background:rgba(255,214,0,0.06)}
.chain-step.mystery .label{color:var(--warn);font-size:clamp(16px,2vw,22px);font-weight:800}
.chain-step.solved{border-color:var(--success);background:rgba(76,175,80,0.1)}
.chain-step.solved .label{color:var(--success)}
.chain-arrow{font-size:clamp(16px,2vw,22px);color:rgba(255,255,255,0.25)}

/* ===== VISUAL RECALL ===== */
.thermos-visual{display:flex;justify-content:center;margin-bottom:20px}
.thermos{width:clamp(120px,20vw,180px);position:relative;display:flex;flex-direction:column;align-items:center}
.thermos-layer{width:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:clamp(9px,1.1vw,12px);font-weight:600;position:relative}
.t-outer{background:rgba(158,158,158,0.25);border:2px solid rgba(158,158,158,0.5);padding:8px;border-radius:14px}
.t-vacuum{background:transparent;border:2px dashed rgba(255,255,255,0.3);margin:4px;padding:6px;border-radius:10px;position:relative}
.t-vacuum-label{position:absolute;right:-80px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text);opacity:0.7;white-space:nowrap}
.t-silver{background:linear-gradient(180deg,rgba(192,192,192,0.3),rgba(160,160,160,0.2));border:1px solid rgba(192,192,192,0.5);margin:3px;padding:5px;border-radius:8px}
.t-inner{background:rgba(100,100,100,0.2);border:1px solid rgba(158,158,158,0.4);margin:2px;padding:4px;border-radius:6px}
.t-drink{background:linear-gradient(180deg,rgba(0,191,165,0.3),rgba(0,191,165,0.15));border:1px solid rgba(0,191,165,0.5);padding:clamp(16px,3vw,28px) clamp(12px,2vw,20px);border-radius:4px;color:var(--teal);font-weight:700}
.t-label{position:absolute;font-size:9px;color:var(--text);opacity:0.65;white-space:nowrap;font-weight:600}

/* ===== SPOT THE DIFF ===== */
.diff-area{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}

/* ===== SCANNER OVERLAY ===== */
.scanner-overlay{display:none;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,0.85);flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;animation:fadeIn 0.3s ease}
.scanner-overlay.active{display:flex}
.scanner-title{font-size:clamp(14px,1.8vw,18px);font-weight:700;color:var(--warn);margin-bottom:12px;text-transform:uppercase;letter-spacing:2px}
.scanner-text{font-size:clamp(13px,1.6vw,17px);color:var(--text);max-width:550px;line-height:1.6;margin-bottom:20px}
.scanner-dismiss{font-size:13px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);padding:6px 16px;border-radius:20px;margin-top:12px;cursor:pointer}

/* ===== CODE ENTRY ===== */
.code-entry-overlay{display:none;position:fixed;inset:0;z-index:35;background:rgba(10,10,30,0.95);flex-direction:column;align-items:center;justify-content:center;padding:20px}
.code-entry-overlay.active{display:flex}
.code-title{font-size:clamp(20px,3vw,28px);font-weight:800;color:var(--text-bright);margin-bottom:6px}
.code-subtitle{font-size:clamp(13px,1.6vw,16px);color:var(--text);opacity:0.8;margin-bottom:20px}
.code-digits{display:flex;gap:12px;margin-bottom:20px}
.code-digit-slot{width:clamp(50px,8vw,64px);height:clamp(56px,9vw,72px);border:3px solid rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(24px,4vw,36px);font-weight:800;color:var(--text-bright);background:rgba(0,0,0,0.3);transition:all 0.3s}
.code-digit-slot.filled{border-color:currentColor;box-shadow:0 0 12px currentColor}
.code-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px}
.numpad-btn{width:clamp(56px,8vw,68px);height:clamp(48px,7vw,56px);font-size:clamp(18px,2.5vw,24px);font-weight:700;border-radius:10px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);color:var(--text-bright);transition:all 0.2s}
.numpad-btn:hover{background:rgba(255,255,255,0.15)}
.code-feedback{font-size:14px;margin-top:12px;min-height:24px;font-weight:600}

/* ===== DIGIT REVEAL ===== */
.digit-reveal-overlay{display:none;position:fixed;inset:0;z-index:36;background:rgba(10,10,30,0.92);flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.3s}
.digit-reveal-overlay.active{display:flex}
.digit-big{font-size:clamp(60px,12vw,100px);font-weight:900;animation:digitReveal 0.8s ease;text-shadow:0 0 40px currentColor}
.digit-label{font-size:clamp(13px,1.6vw,16px);color:var(--text);margin-top:8px;opacity:0.7}
.digit-continue{margin-top:24px;padding:12px 32px;font-size:16px;font-weight:700;border-radius:30px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:var(--text-bright);transition:all 0.3s}

/* ===== PASS THE LAPTOP ===== */
.pass-overlay{display:none;position:fixed;inset:0;z-index:37;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.3s}
.pass-overlay.active{display:flex}
.pass-text{font-size:clamp(28px,5vw,48px);font-weight:900;color:var(--text-bright);letter-spacing:4px;text-shadow:0 0 30px currentColor;margin-bottom:24px}
.pass-ready{padding:14px 40px;font-size:clamp(16px,2vw,20px);font-weight:700;border-radius:30px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);color:var(--text-bright);transition:all 0.3s}

/* ===== DOOR TRANSITION ===== */
.door-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none}
.door-panel{width:80%;max-width:400px;height:70%;border-radius:20px;border:4px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative}
.door-lock{font-size:48px;opacity:0.8}
.door-text{font-size:clamp(18px,3vw,28px);font-weight:800;color:var(--text-bright);letter-spacing:3px;margin-top:12px;text-transform:uppercase}

/* ===== SCAN PREVIEW ===== */
.scan-preview-overlay{display:none;position:fixed;inset:0;z-index:34;background:rgba(10,10,30,0.95);flex-direction:column;align-items:center;justify-content:center;padding:20px}
.scan-preview-overlay.active{display:flex}
.scan-label{font-size:clamp(14px,1.8vw,18px);font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;animation:scanText 1.5s infinite}
.scan-content{max-width:500px;text-align:center;padding:20px;border:2px solid;border-radius:16px;animation:scanBorder 1.5s infinite}
.scan-content .icon{font-size:clamp(32px,5vw,48px);margin-bottom:8px}
.scan-content .desc{font-size:clamp(13px,1.5vw,16px);color:var(--text);opacity:0.8}

/* ===== FINAL LOCK ===== */
.final-lock-area{width:100%;max-width:650px}
.fl-pair-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:8px;border-radius:10px;transition:all 0.3s}
.fl-pair-row.active-pair{background:rgba(255,255,255,0.04)}
.fl-pair-row.dimmed-pair{opacity:0.3}
.fl-pair-row.locked-pair{opacity:0.7}
.fl-term{flex:1;padding:10px 14px;border-radius:10px;font-size:clamp(13px,1.5vw,16px);font-weight:700;text-align:center;border:2px solid;display:flex;align-items:center;justify-content:center;gap:6px}
.fl-arrow-sp{font-size:20px;color:rgba(255,255,255,0.2);min-width:30px;text-align:center}
.fl-targets{flex:1.2;display:flex;flex-direction:column;gap:6px}
.fl-target{padding:8px 12px;border-radius:8px;font-size:clamp(12px,1.3vw,14px);text-align:center;cursor:pointer;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:var(--text-bright);transition:all 0.3s}
.fl-target:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25)}
.fl-target.fl-matched{border-color:var(--success);background:rgba(76,175,80,0.12);pointer-events:none}
.fl-target.fl-wrong{border-color:var(--error);animation:wrongShake 0.4s}
.fl-target.fl-dimmed{opacity:0.3;pointer-events:none}
.fl-target.override-highlight{border-color:var(--warn)!important;box-shadow:0 0 20px rgba(255,214,0,0.4)!important;animation:overridePulse 0.8s infinite alternate}

/* ===== ESCAPE REPORT ===== */
#reportScreen{justify-content:flex-start;align-items:center;overflow-y:auto;padding:20px;background:radial-gradient(ellipse at top,#1e2a4a,var(--bg) 70%)}
.report-header{font-size:clamp(32px,6vw,56px);font-weight:900;color:var(--text-bright);text-align:center;margin:20px 0 6px;animation:reportGlow 2s infinite alternate;letter-spacing:3px}
.report-brand{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--teal);opacity:0.7;margin-bottom:20px}
.report-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px 28px;max-width:450px;width:100%;margin-bottom:16px}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.report-row:last-child{border-bottom:none}
.report-label{font-size:14px;color:var(--text);opacity:0.7}
.report-value{font-size:16px;font-weight:700;color:var(--text-bright)}
.report-stars{display:flex;gap:6px;margin:12px 0}
.report-star{font-size:28px;opacity:0.2;transition:all 0.5s}
.report-star.earned{opacity:1;animation:starFill 0.5s ease}
.report-badges{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--text)}
.badge.earned{background:rgba(255,214,0,0.1);border-color:rgba(255,214,0,0.3);color:var(--warn)}
.report-btns{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.report-btn{padding:12px 28px;font-size:15px;font-weight:700;border-radius:30px;transition:all 0.3s}
.btn-copy{background:rgba(0,191,165,0.15);border:2px solid var(--teal);color:var(--teal)}
.btn-again{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);color:var(--text-bright)}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes hudPulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes vaultReveal{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes digitReveal{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2);opacity:1}100%{transform:scale(1)}}
@keyframes scanPulse{0%,100%{box-shadow:0 0 5px rgba(255,214,0,0.3)}50%{box-shadow:0 0 20px rgba(255,214,0,0.6)}}
@keyframes overridePulse{0%{box-shadow:0 0 10px rgba(255,214,0,0.3)}100%{box-shadow:0 0 25px rgba(255,214,0,0.6)}}
@keyframes scanText{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes scanBorder{0%,100%{border-color:rgba(255,255,255,0.15)}50%{border-color:rgba(255,255,255,0.4)}}
@keyframes fireFlicker{0%{transform:scale(1)}100%{transform:scale(1.15);filter:brightness(1.3)}}
@keyframes reportGlow{0%{text-shadow:0 0 20px rgba(255,51,51,0.5)}33%{text-shadow:0 0 20px rgba(0,229,255,0.5)}66%{text-shadow:0 0 20px rgba(0,230,118,0.5)}100%{text-shadow:0 0 20px rgba(255,51,51,0.5)}}
@keyframes starFill{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
@keyframes particleBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{opacity:0}}
@keyframes doorAnim{0%{opacity:0;transform:scale(0.95)}25%{opacity:1;transform:scale(1)}55%{opacity:1;transform:scale(1)}100%{opacity:1;transform:translateX(-120%)}}
@keyframes doorAnimSlow{0%{opacity:0;transform:scale(0.95)}20%{opacity:1;transform:scale(1)}50%{opacity:1;transform:scale(1)}100%{opacity:1;transform:translateX(-120%)}}
@keyframes escapeText{0%{transform:scale(0);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes heatShimmer{0%,100%{opacity:0.03}50%{opacity:0.07}}
@keyframes gridPulse{0%,100%{opacity:0.04}50%{opacity:0.08}}
@keyframes shieldPulse{0%,100%{opacity:0.03}50%{opacity:0.06}}

/* ===== ROOM ATMOSPHERES ===== */
.room-atmos-1::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,51,51,0.03) 40px,rgba(255,51,51,0.03) 42px);animation:heatShimmer 3s infinite;pointer-events:none}
.room-atmos-2::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(0,229,255,0.04) 60px,rgba(0,229,255,0.04) 61px),repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(0,229,255,0.04) 60px,rgba(0,229,255,0.04) 61px);animation:gridPulse 3s infinite;pointer-events:none}
.room-atmos-3::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(0,230,118,0.04) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(0,191,165,0.03) 0%,transparent 50%);animation:shieldPulse 4s infinite;pointer-events:none}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <div class="start-brand">Mr. Jawad's Escape Room Simulations</div>
  <div class="start-title">Heat Transfer</div>
  <div class="start-divider"></div>
  <div class="start-subtitle">Unit Review</div>

</div>

</div>

<!-- CODE ENTRY -->
<div class="code-entry-overlay" id="codeEntry" data-overlay="code-entry">
  <div class="code-title" id="codeTitle">ENTER EXIT CODE</div>
  <div class="code-subtitle" id="codeSubtitle"></div>
  <div class="code-digits" id="codeDigits"></div>
  <div class="code-numpad" id="codeNumpad"></div>

<!-- DIGIT REVEAL -->

<!-- PASS THE LAPTOP -->

<!-- SCAN PREVIEW -->
